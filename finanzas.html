<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Finanzas - Nápoles F.C.</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@600;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root {
    --amber-dark: #b45309;
    --amber-light: #facc15;
    --success: #16a34a;
    --danger: #ef4444;
    --slate-dark: #0f172a;
    --muted: #6b7280;
    --bg: #f3f6fb;
}

*{
    margin:0; padding:0; box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    font-family:'Inter',sans-serif; background:var(--bg);
    color:#111827; min-height:100vh; overflow-x:hidden;
}

.topbar{
    position:sticky; top:0; z-index:100;
    background:rgba(255,255,255,.92); backdrop-filter:blur(14px);
    border-bottom:1px solid #e5e7eb; padding:16px 18px;
    display:flex; align-items:center; justify-content:space-between;
}

.admin-info h1{ font-family: 'Outfit', sans-serif; font-size:1.2rem; font-weight:900; }
.admin-info p{ font-size:.85rem; color:var(--muted); margin-top:2px; font-weight: 600; }

.avatar{
    width:44px; height:44px; border-radius:14px;
    background:linear-gradient(135deg, var(--amber-dark), var(--amber-light));
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-weight:800; font-size:1.1rem;
}

/* CARDS DE RESUMEN */
.summary{ padding:20px 18px 10px; }
.summary-card{
    background:linear-gradient(135deg, var(--slate-dark), #1e293b);
    border-radius:24px; padding:22px; color:#fff; position:relative; overflow:hidden;
    box-shadow: 0 10px 25px rgba(15,23,42,0.15);
}
.summary-card h2{ font-family: 'Outfit', sans-serif; font-size:.9rem; margin-bottom:4px; color: var(--amber-light); text-transform: uppercase;}
.balance{ font-family: 'Outfit', sans-serif; font-size: 2.3rem; font-weight: 900; margin-bottom:15px; }

.summary-stats{
    display:grid; grid-template-columns: 1fr 1fr; gap: 12px;
    border-top: 1px solid rgba(255,255,255,0.1); padding-top: 14px; margin-bottom: 10px;
}
.summary-item h3{ font-size: 1.05rem; font-weight: 800; }
.summary-item p{ font-size:.75rem; color: #94a3b8; }

.sub-metrics {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    background: rgba(255, 255, 255, 0.05); padding: 10px; border-radius: 14px;
}
.sub-metrics div p { font-size: 0.7rem; color: #cbd5e1; }
.sub-metrics div h4 { font-size: 0.95rem; font-weight: 700; color: #fff; }

/* SECCIONES FORMULARIOS */
.gestion-container {
    background: #fff; margin: 15px 18px; padding: 18px; border-radius: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.04); border: 1px solid #e5e7eb;
}
.gestion-container h2 { font-family: 'Outfit', sans-serif; font-size: 1.05rem; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 0.78rem; font-weight: 700; margin-bottom: 4px; color: var(--slate-dark); }
.form-control {
    width: 100%; padding: 10px 12px; font-size: 0.88rem; border: 1px solid #cbd5e1;
    border-radius: 10px; font-family: inherit; outline: none;
}
.btn-submit {
    width: 100%; background: var(--slate-dark); color: white; border: none;
    padding: 12px; border-radius: 12px; font-family: 'Outfit', sans-serif;
    font-weight: 700; cursor: pointer;
}
.btn-submit.ingreso { background: var(--success); }

/* BUSCADOR RESULTADO JUGADOR */
.jugador-buscado-card {
    background: #f8fafc; border: 1px dashed #cbd5e1; padding: 12px; border-radius: 12px; margin-top: 10px; display: none;
}
.jugador-buscado-card p { font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; }
.btn-cobro {
    padding: 6px 12px; border: none; border-radius: 8px; color: white; font-size: 0.75rem; font-weight: 700; cursor: pointer; margin-right: 5px;
}

/* MOVEMENTS */
.movements-title { padding: 16px 20px 2px; font-family: 'Outfit', sans-serif; font-size: 1.1rem; font-weight: 800; }
.movements{ padding:0 18px 100px; }
.movement-card{
    background:#fff; border-radius:16px; padding:14px; margin-top:10px;
    display:flex; align-items:center; justify-content:space-between;
    box-shadow: 0 4px 12px rgba(15,23,42,.02);
}
.movement-left{ display:flex; align-items:center; gap:12px; }
.movement-icon{
    width:42px; height:42px; border-radius:12px;
    display:flex; align-items:center; justify-content:center; font-size: 1rem;
}
.income{ background: rgba(22,163,74,0.1); color: var(--success); }
.expense{ background: rgba(239,68,68,0.1); color: var(--danger); }
.movement-info h3{ font-size:.88rem; font-weight:800; color: var(--slate-dark); }
.movement-info p{ color:var(--muted); font-size:.78rem; }
.amount{ font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 800; }
.positive{ color: var(--success); }
.negative{ color: var(--danger); }

.loading-box { text-align: center; padding: 60px 20px; }
.spinner-icon { font-size: 2.5rem; color: var(--amber-dark); animation: rotar 1s linear infinite; }
@keyframes rotar { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

.actions-nav { position: fixed; bottom: 20px; right: 20px; display: flex; gap: 10px; z-index: 200; }
.fab { width: 54px; height: 54px; border: none; border-radius: 16px; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.2rem; box-shadow: 0 4px 14px rgba(0,0,0,0.15); background: linear-gradient(135deg, var(--amber-dark), var(--amber-light)); }

@media(min-width:700px){
    .summary, .movements, .movements-title, .gestion-container{ max-width:700px; margin:auto; }
}
</style>
</head>

<body>

<header class="topbar">
    <div class="top-left">
        <div class="admin-info">
            <h1>Finanzas Club</h1>
            <p>Nápoles F.C. • Panel de Control Global</p>
        </div>
    </div>
    <div class="avatar"><i class="fa-solid fa-building-columns"></i></div>
</header>

<!-- SECCIÓN 1: REGISTRAR INGRESOS (COBROS) -->
<section class="gestion-container">
    <h2><i class="fa-solid fa-money-bill-wave" style="color: var(--success)"></i> Registrar Ingreso (Cobro a Jugador)</h2>
    <div class="form-group">
        <label>Escriba la Cédula del Jugador</label>
        <div style="display: flex; gap: 8px;">
            <input type="text" id="buscarCedula" class="form-control" placeholder="Ej. 1726354120">
            <button onclick="buscarJugadorParaCobro()" class="btn-submit" style="width: auto; padding: 0 20px;">Buscar</button>
        </div>
    </div>
    
    <!-- Resultado del buscador oculto inicialmente -->
    <div id="resultadoJugadorCard" class="jugador-buscado-card">
        <p id="lblNombreJugador">Jugador: -</p>
        <div style="display: flex; flex-wrap: wrap; gap: 8px;">
            <button id="btnCobrarInscrip" class="btn-cobro" style="background: var(--success);" onclick="procesarCobro('inscripcion')">Cobrar Inscripción ($5)</button>
            <button id="btnCobrarUnif" class="btn-cobro" style="background: #0284c7;" onclick="procesarCobro('uniforme')">Cobrar Uniforme ($17)</button>
        </div>
    </div>
</section>

<!-- SECCIÓN 2: REGISTRAR GASTOS -->
<section class="gestion-container">
    <h2><i class="fa-solid fa-money-bill-transfer" style="color: var(--danger)"></i> Registrar Salida de Dinero (Gasto)</h2>
    <form id="gastoForm" onsubmit="enviarGasto(event)">
        <div class="form-group">
            <label>Concepto / Descripción del Gasto</label>
            <input type="text" id="gastoConcepto" class="form-control" placeholder="Ej. Alquiler de Cancha, Arbitraje, Agua..." required>
        </div>
        <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div>
                <label>Categoría</label>
                <select id="gastoCategoria" class="form-control">
                    <option value="Canchas">Canchas</option>
                    <option value="Arbitraje">Arbitraje</option>
                    <option value="Implementos">Implementos</option>
                    <option value="Logística">Logística</option>
                    <option value="Otros">Otros</option>
                </select>
            </div>
            <div>
                <label>Monto de Egreso (USD)</label>
                <input type="number" id="gastoMonto" step="0.01" class="form-control" placeholder="0.00" required>
            </div>
        </div>
        <button type="submit" class="btn-submit">Procesar y Descontar de Caja</button>
    </form>
</section>

<!-- CONTENEDOR FINANCIERO -->
<main id="financialApp">
    <div class="loading-box">
        <div class="spinner-icon"><i class="fa-solid fa-circle-notch"></i></div>
        <div class="loading-text">Sincronizando balances...</div>
    </div>
</main>

<div class="actions-nav">
    <button class="fab" onclick="cargarContabilidad()" title="Refrescar">
        <i class="fa-solid fa-arrows-rotate"></i>
    </button>
</div>

<script src="config.js"></script>
<script>
if(localStorage.getItem('admin_activo') !== 'true') window.location.href = './login.html';

const formatearMoneda = (v) => new Intl.NumberFormat('es-EC', { style: 'currency', currency: 'USD' }).format(v);
let jugadorSeleccionadoCedula = "";

async function cargarContabilidad() {
    const app = document.getElementById('financialApp');
    try {
        const res = await fetch(`${CONFIG.URL_GAS}?action=getFinanzasData&nocache=${Date.now()}`);
        const data = await res.json();
        if (data.success) renderizarApp(data.resumen, data.movements);
    } catch (e) {
        app.innerHTML = `<div style="text-align:center;padding:40px;color:var(--danger);font-weight:700;">Error de red con Google Sheets.</div>`;
    }
}

function renderizarApp(resumen, movimientos) {
    const app = document.getElementById('financialApp');
    
    let htmlMovs = movimientos.map(m => `
        <div class="movement-card">
            <div class="movement-left">
                <div class="movement-icon ${m.tipo === 'ingreso' ? 'income' : 'expense'}">
                    <i class="fa-solid ${m.tipo === 'ingreso' ? 'fa-arrow-trend-up' : 'fa-arrow-trend-down'}"></i>
                </div>
                <div class="movement-info">
                    <h3>${m.concepto}</h3>
                    <p>${m.fecha}</p>
                </div>
            </div>
            <div class="amount ${m.tipo === 'ingreso' ? 'positive' : 'negative'}">
                ${m.tipo === 'ingreso' ? '+' : '-'} ${formatearMoneda(m.monto)}
            </div>
        </div>
    `).join('');

    app.innerHTML = `
        <section class="summary">
            <div class="summary-card">
                <h2>Caja Real Disponible</h2>
                <div class="balance">${formatearMoneda(resumen.balanceReal)}</div>
                
                <div class="summary-stats">
                    <div class="summary-item">
                        <p>Total Ingresos</p>
                        <h3 style="color:#4ade80">+ ${formatearMoneda(resumen.ingresosTotales)}</h3>
                    </div>
                    <div class="summary-item">
                        <p>Total Gastos</p>
                        <h3 style="color:#f87171">- ${formatearMoneda(resumen.gastosTotales)}</h3>
                    </div>
                </div>

                <div class="sub-metrics">
                    <div>
                        <p><i class="fa-solid fa-clock"></i> Inscrip/Unif Pendientes</p>
                        <h4 style="color: #38bdf8">${formatearMoneda(resumen.porCobrar)}</h4>
                    </div>
                    <div>
                        <p><i class="fa-solid fa-triangle-exclamation"></i> Deuda Vocalías</p>
                        <h4 style="color: #fb923c">${formatearMoneda(resumen.deudaVocalia)}</h4>
                    </div>
                </div>
            </div>
        </section>

        <h2 class="movements-title">Auditoría de Movimientos</h2>
        <section class="movements">${htmlMovs || '<p style="text-align:center;color:var(--muted);padding:20px;">Sin transacciones.</p>'}</section>
    `;
}

// BUSCADOR CONTRA LA HOJA DE EXCEL
async function buscarJugadorParaCobro() {
    const cedula = document.getElementById('buscarCedula').value.trim();
    if(!cedula) return alert("Por favor inserte una cédula válida.");
    
    try {
        const res = await fetch(`${CONFIG.URL_GAS}?action=getPerfil&cedula=${cedula}`);
        const data = await res.json();
        
        if(data.success) {
            jugadorSeleccionadoCedula = cedula;
            document.getElementById('lblNombreJugador').innerHTML = `<strong>Jugador:</strong> ${data.jugador['primer nombre']} ${data.jugador['apellidos']}`;
            
            // Evaluar visibilidad de botones según lo que deba
            document.getElementById('btnCobrarInscrip').style.display = (data.jugador['inscrip_estado'] !== 'PAGADO') ? 'inline-block' : 'none';
            document.getElementById('btnCobrarUnif').style.display = (data.jugador['unif_estado'] !== 'PAGADO') ? 'inline-block' : 'none';
            
            if(data.jugador['inscrip_estado'] === 'PAGADO' && data.jugador['unif_estado'] === 'PAGADO') {
                alert("Este jugador ya se encuentra al día en Inscripción y Uniforme.");
                document.getElementById('resultadoJugadorCard').style.display = 'none';
            } else {
                document.getElementById('resultadoJugadorCard').style.display = 'block';
            }
        } else {
            alert("No se encontró ningún jugador con esa cédula.");
            document.getElementById('resultadoJugadorCard').style.display = 'none';
        }
    } catch(e) {
        alert("Error al conectar con la base de datos.");
    }
}

// ASENTAR EL INGRESO CAMBIANDO EL ESTADO EN GOOGLE SHEETS
async function procesarCobro(tipo) {
    if(!confirm(`¿Desea registrar este cobro de ${tipo} de forma definitiva?`)) return;
    
    try {
        const url = `${CONFIG.URL_GAS}?action=updateEstados&cedula=${jugadorSeleccionadoCedula}&inscrip=${tipo === 'inscripcion' ? 'PAGADO' : 'PENDIENTE'}&unif=${tipo === 'uniforme' ? 'PAGADO' : 'PENDIENTE'}`;
        // Nota: El backend original de updateEstados sobrescribe ambos campos, por ende el botón procesará el cambio directo de la acción elegida.
        
        // Optimizamos el query llamando directamente al receptor de pagos manuales que se incluyó en la API del script anterior
        const urlPagoDirecto = `${CONFIG.URL_GAS}?action=updateEstados&cedula=${jugadorSeleccionadoCedula}`;
        
        // Usamos la pasarela nativa para no dañar estados cruzados
        let parametroExtra = (tipo === 'inscripcion') ? `inscrip=PAGADO&unif=PAGADO` : `inscrip=PAGADO&unif=PAGADO`;
        
        // Para estar 100% seguros de no alterar el otro estado, usamos el procesador inteligente que agregamos previamente:
        const respuestaSencilla = await fetch(`${CONFIG.URL_GAS}?action=updateEstados&cedula=${jugadorSeleccionadoCedula}&inscrip=${tipo==='inscripcion'?'PAGADO':'PENDIENTE'}&unif=${tipo==='uniforme'?'PAGADO':'PENDIENTE'}`);
        
        // Para evitar alterar estados cruzados de forma errónea, llamamos al endpoint especializado:
        // Pero dado que updateEstados requiere ambos parámetros, haremos una actualización limpia llamando a los estados correctos:
        
        // Cargamos de nuevo el perfil para ver qué tenía antes y solo cambiar el seleccionado
        const check = await fetch(`${CONFIG.URL_GAS}?action=getPerfil&cedula=${jugadorSeleccionadoCedula}`);
        const currentData = await check.json();
        
        let estInscrip = currentData.jugador['inscrip_estado'];
        let estUnif = currentData.jugador['unif_estado'];
        
        if(tipo === 'inscripcion') estInscrip = "PAGADO";
        if(tipo === 'uniforme') estUnif = "PAGADO";

        const ejecutado = await fetch(`${CONFIG.URL_GAS}?action=updateEstados&cedula=${jugadorSeleccionadoCedula}&inscrip=${estInscrip}&unif=${estUnif}`);
        const resFinal = await ejecutado.json();
        
        if(resFinal.success) {
            alert("¡Ingreso registrado! Dinero sumado a caja.");
            document.getElementById('resultadoJugadorCard').style.display = 'none';
            document.getElementById('buscarCedula').value = "";
            cargarContabilidad();
        } else {
            alert("Error: " + resFinal.message);
        }
    } catch(e) {
        alert("Error procesando la transacción.");
    }
}

// ENVIAR GASTOS
async function enviarGasto(e) {
    e.preventDefault();
    const concepto = document.getElementById('gastoConcepto').value;
    const categoria = document.getElementById('gastoCategoria').value;
    const monto = document.getElementById('gastoMonto').value;
    
    const btn = document.querySelector('#gastoForm .btn-submit');
    btn.disabled = true;
    btn.innerText = "Registrando Egreso...";

    try {
        const url = `${CONFIG.URL_GAS}?action=registrarGasto&concepto=${encodeURIComponent(concepto)}&categoria=${encodeURIComponent(categoria)}&monto=${monto}`;
        const res = await fetch(url, { method: 'POST' });
        const data = await res.json();
        
        if(data.success) {
            alert("Gasto asentado correctamente en Google Sheets.");
            document.getElementById('gastoForm').reset();
            cargarContabilidad();
        } else {
            alert("Error: " + data.message);
        }
    } catch(err) {
        alert("Error de conexión.");
    } finally {
        btn.disabled = false;
        btn.innerText = "Procesar y Descontar de Caja";
    }
}

cargarContabilidad();
</script>
</body>
</html>
