<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nápoles FC · Administración</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: #eef2f7; padding: 24px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { background: white; border-radius: 24px; padding: 20px 28px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .header h1 { color: #1a4a76; font-size: 1.6rem; }
        .logout-btn { background: #dc2626; color: white; border: none; padding: 8px 24px; border-radius: 40px; cursor: pointer; font-weight: 500; }
        .tabs { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }
        .tab { background: white; border: none; padding: 10px 24px; border-radius: 40px; cursor: pointer; font-weight: 500; color: #4a5568; transition: all 0.2s; }
        .tab.active { background: #1a4a76; color: white; box-shadow: 0 4px 10px rgba(26,74,118,0.2); }
        .panel { background: white; border-radius: 24px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: none; }
        .panel.active { display: block; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 14px 12px; background: #f8fafc; color: #1e293b; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #eef2f6; }
        .btn-success { background: #059669; color: white; border: none; padding: 6px 16px; border-radius: 30px; cursor: pointer; margin: 2px; }
        .btn-danger { background: #dc2626; color: white; border: none; padding: 6px 16px; border-radius: 30px; cursor: pointer; }
        .btn-primary { background: #1a4a76; color: white; border: none; padding: 10px 24px; border-radius: 40px; cursor: pointer; font-weight: 500; }
        .btn-outline { background: transparent; border: 1px solid #cbd5e1; padding: 8px 20px; border-radius: 40px; cursor: pointer; }
        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 24px; }
        .card { background: #f8fafc; border-radius: 20px; padding: 16px; border-left: 4px solid #1a4a76; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 16px; margin-bottom: 12px; }
        .spinner { border: 3px solid #e2e8f0; border-top: 3px solid #1a4a76; border-radius: 50%; width: 40px; height: 40px; animation: spin 0.8s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; max-width: 500px; width: 90%; border-radius: 28px; padding: 24px; }
        .rating-star { font-size: 32px; cursor: pointer; color: #cbd5e1; display: inline-block; margin-right: 6px; }
        .rating-star.active { color: #f59e0b; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⚽ Nápoles F.C. · Staff</h1>
        <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
    </div>

    <div class="tabs">
        <button class="tab active" data-tab="pendientes">📋 Pendientes</button>
        <button class="tab" data-tab="jugadores">👥 Plantilla</button>
        <button class="tab" data-tab="vocalia">💰 Cobros</button>
        <button class="tab" data-tab="notificaciones">📢 Anuncios</button>
        <button class="tab" data-tab="partidos">⭐ Calificar</button>
        <button class="tab" data-tab="proximos">📅 Próximos</button>
    </div>

    <!-- PENDIENTES -->
    <div id="panel-pendientes" class="panel active">
        <h2>Solicitudes de registro</h2>
        <div style="overflow-x: auto;"><table id="tablaPendientes"><thead><tr><th>Nombre</th><th>Cédula</th><th>Teléfono</th><th>Correo</th><th>Dorsal</th><th>Acciones</th></tr></thead><tbody><tr><td colspan="6"><div class="spinner"></div></td></tr></tbody></table></div>
    </div>

    <!-- JUGADORES -->
    <div id="panel-jugadores" class="panel">
        <h2>Todos los jugadores</h2>
        <div style="overflow-x: auto;"><table id="tablaJugadores"><thead><tr><th>Nombre</th><th>Cédula</th><th>Estado</th><th>Deuda</th><th>Goles</th><th>TA</th><th>TR</th></tr></thead><tbody><tr><td colspan="7"><div class="spinner"></div></td></tr></tbody></table></div>
    </div>

    <!-- VOCALÍA -->
    <div id="panel-vocalia" class="panel">
        <h2>Registrar pago de vocalía</h2>
        <div class="grid-2">
            <div><label>Cédula del jugador</label><input type="text" id="buscarCedula" placeholder="Ej: 1716001431"><button class="btn-primary" onclick="buscarDeudor()" style="margin-top: 8px;">Buscar</button></div>
            <div id="infoDeudor"></div>
        </div>
        <div id="formPago" style="display:none;"><label>Monto a pagar</label><input type="number" id="montoPago" step="0.01"><button class="btn-success" onclick="registrarPago()">Registrar pago</button></div>
        <hr style="margin: 24px 0;">
        <h3>Jugadores con deuda</h3>
        <div style="overflow-x: auto;"><table id="tablaDeudores"><thead><tr><th>Jugador</th><th>Cédula</th><th>Deuda</th><th>Acción</th></tr></thead><tbody><tr><td colspan="4"><div class="spinner"></div></td></tr></tbody></table></div>
    </div>

    <!-- NOTIFICACIONES -->
    <div id="panel-notificaciones" class="panel">
        <h2>Publicar notificación</h2>
        <input type="text" id="notiTitulo" placeholder="Título">
        <textarea id="notiMensaje" rows="3" placeholder="Mensaje..."></textarea>
        <select id="notiTipo"><option value="info">📘 Informativo</option><option value="warning">⚠️ Advertencia</option><option value="success">✅ Éxito</option></select>
        <button class="btn-primary" onclick="publicarNotificacion()">Publicar</button>
        <div id="listaNotificaciones" style="margin-top: 24px;"></div>
    </div>

    <!-- CALIFICAR PARTIDOS -->
    <div id="panel-partidos" class="panel">
        <h2>Calificar jugadores en partido</h2>
        <div class="grid-2">
            <div><label>Fecha</label><input type="date" id="fechaPartido"></div>
            <div><label>Rival</label><input type="text" id="rivalPartido" placeholder="Equipo rival"></div>
        </div>
        <button class="btn-primary" onclick="cargarJugadoresParaCalificar()">Cargar jugadores</button>
        <div id="listaCalificaciones" style="margin-top: 24px;"></div>
        <button class="btn-primary" onclick="guardarCalificaciones()" style="margin-top: 16px;">Guardar partido</button>
    </div>

    <!-- PRÓXIMOS PARTIDOS -->
    <div id="panel-proximos" class="panel">
        <h2>Próximos partidos</h2>
        <div class="grid-2"><div><label>Fecha y hora</label><input type="datetime-local" id="proxFecha"></div><div><label>Rival</label><input type="text" id="proxRival"></div></div>
        <div><label>Lugar</label><input type="text" id="proxLugar"><label>Observaciones</label><textarea id="proxObs" rows="2"></textarea></div>
        <button class="btn-primary" onclick="guardarProximoPartido()">Guardar</button>
        <div id="listaProximos" style="margin-top: 24px;"></div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzBpEbM8ZBtvweiUxoLrW62lpkUgC2ApCWOeoc0GetDscpc5x66COTypI56PYyhB9yZ/exec"; // Cambia por tu URL real

    async function fetchAPI(action, body = null) {
        const options = body ? { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) } : {};
        const url = body ? `${API_URL}?action=${action}` : `${API_URL}?action=${action}`;
        const res = await fetch(url, options);
        return res.json();
    }

    // TABS
    document.querySelectorAll('.tab').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(`panel-${btn.dataset.tab}`).classList.add('active');
            if (btn.dataset.tab === 'pendientes') cargarPendientes();
            if (btn.dataset.tab === 'jugadores') cargarJugadores();
            if (btn.dataset.tab === 'vocalia') { cargarDeudores(); document.getElementById('formPago').style.display = 'none'; }
            if (btn.dataset.tab === 'notificaciones') cargarNotificaciones();
            if (btn.dataset.tab === 'proximos') cargarProximos();
        });
    });

    async function cargarPendientes() {
        const data = await fetchAPI('getPendientes');
        const tbody = document.querySelector('#tablaPendientes tbody');
        if (data.jugadores?.length) {
            tbody.innerHTML = data.jugadores.map(j => `<tr><td>${j.nombre}</td><td>${j.cedula}</td><td>${j.telefono || '-'}</td><td>${j.correo || '-'}</td><td>${j.dorsal || '-'}</td><td><button class="btn-success" onclick="aprobar('${j.cedula}')">Aprobar</button> <button class="btn-danger" onclick="rechazar('${j.cedula}')">Rechazar</button></td></tr>`).join('');
        } else tbody.innerHTML = '<tr><td colspan="6">✅ No hay solicitudes pendientes</td></tr>';
    }

    async function cargarJugadores() {
        const data = await fetchAPI('getAllJugadores');
        const tbody = document.querySelector('#tablaJugadores tbody');
        if (data.jugadores?.length) {
            tbody.innerHTML = data.jugadores.map(j => `<tr><td>${j.nombre}</td><td>${j.cedula}</td><td><span style="color:${j.estado === 'APROBADO' ? '#059669' : '#eab308'}">${j.estado}</span></td><td>$${j.deuda}</td><td>${j.goles}</td><td>${j.amarillas}</td><td>${j.rojas}</td></tr>`).join('');
        }
    }

    async function cargarDeudores() {
        const data = await fetchAPI('getDeudores');
        const tbody = document.querySelector('#tablaDeudores tbody');
        if (data.jugadores?.length) {
            tbody.innerHTML = data.jugadores.map(j => `<tr><td>${j.nombre}</td><td>${j.cedula}</td><td>$${j.deuda}</td><td><button class="btn-primary" onclick="prepararCobro('${j.cedula}')">Cobrar</button></td></tr>`).join('');
        } else tbody.innerHTML = '<tr><td colspan="4">🎉 No hay deudores</td></tr>';
    }

    window.prepararCobro = (ced) => { document.getElementById('buscarCedula').value = ced; buscarDeudor(); };
    window.buscarDeudor = async () => {
        const ced = document.getElementById('buscarCedula').value;
        if (!ced) return;
        const data = await fetchAPI(`obtenerJugador&cedula=${ced}`);
        if (data.ok) {
            document.getElementById('infoDeudor').innerHTML = `<div class="card">🧑 ${data.jugador.nombre1} ${data.jugador.apellidos}<br>💰 Deuda: $${data.jugador.deuda}</div>`;
            document.getElementById('formPago').style.display = 'block';
            document.getElementById('montoPago').value = data.jugador.deuda;
        } else document.getElementById('infoDeudor').innerHTML = '<div class="card" style="color:red;">❌ Jugador no encontrado</div>';
    };
    window.registrarPago = async () => {
        const ced = document.getElementById('buscarCedula').value;
        const monto = parseFloat(document.getElementById('montoPago').value);
        const res = await fetchAPI('registrarPago', { cedula: ced, monto });
        if (res.ok) { alert('✅ Pago registrado'); cargarDeudores(); cargarJugadores(); document.getElementById('formPago').style.display = 'none'; document.getElementById('infoDeudor').innerHTML = ''; }
        else alert('Error');
    };

    window.aprobar = async (ced) => { if(confirm('¿Aprobar jugador?')){ await fetchAPI('aprobarJugador', { cedula: ced }); cargarPendientes(); cargarJugadores(); } };
    window.rechazar = async (ced) => { if(confirm('¿Rechazar?')){ await fetchAPI('rechazarJugador', { cedula: ced }); cargarPendientes(); } };

    async function cargarNotificaciones() {
        const data = await fetchAPI('getNotificaciones');
        const container = document.getElementById('listaNotificaciones');
        if (data.notificaciones?.length) container.innerHTML = data.notificaciones.map(n => `<div class="card" style="margin-bottom:12px"><strong>${n.titulo}</strong><br>${n.mensaje}<br><small>${new Date(n.fecha).toLocaleString()}</small></div>`).join('');
        else container.innerHTML = '<p>📭 Sin notificaciones</p>';
    }
    window.publicarNotificacion = async () => {
        const tit = document.getElementById('notiTitulo').value, msg = document.getElementById('notiMensaje').value, tipo = document.getElementById('notiTipo').value;
        if (!tit || !msg) return alert('Complete título y mensaje');
        const res = await fetchAPI('publicarNotificacion', { titulo: tit, mensaje: msg, tipo, fecha: new Date().toISOString() });
        if (res.ok) { alert('Publicado'); document.getElementById('notiTitulo').value = ''; document.getElementById('notiMensaje').value = ''; cargarNotificaciones(); }
    };

    async function cargarProximos() {
        const data = await fetchAPI('getProximosPartidos');
        const container = document.getElementById('listaProximos');
        if (data.partidos?.length) container.innerHTML = data.partidos.map(p => `<div class="card" style="margin-bottom:12px"><strong>📅 ${new Date(p.fecha).toLocaleString()}</strong> vs ${p.rival}<br>📍 ${p.lugar || 'Sin lugar'}${p.observaciones ? `<br>📝 ${p.observaciones}` : ''}</div>`).join('');
        else container.innerHTML = '<p>No hay partidos programados</p>';
    }
    window.guardarProximoPartido = async () => {
        const fecha = document.getElementById('proxFecha').value, rival = document.getElementById('proxRival').value, lugar = document.getElementById('proxLugar').value, obs = document.getElementById('proxObs').value;
        if (!fecha || !rival) return alert('Fecha y rival requeridos');
        const res = await fetchAPI('guardarProximoPartido', { fecha, rival, lugar, observaciones: obs });
        if (res.ok) { alert('Guardado'); cargarProximos(); document.getElementById('proxFecha').value = ''; document.getElementById('proxRival').value = ''; document.getElementById('proxLugar').value = ''; document.getElementById('proxObs').value = ''; }
    };

    window.cargarJugadoresParaCalificar = async () => {
        const fecha = document.getElementById('fechaPartido').value, rival = document.getElementById('rivalPartido').value;
        if (!fecha || !rival) return alert('Fecha y rival requeridos');
        const data = await fetchAPI('getJugadoresAprobados');
        if (!data.jugadores?.length) return alert('No hay jugadores aprobados');
        document.getElementById('listaCalificaciones').innerHTML = `<div style="overflow-x:auto;"><table><thead><tr><th>Jugador</th><th>Amarillas</th><th>Rojas</th><th>Goles</th><th>Puntualidad</th><th>Compañerismo</th><th>Respeto</th><th>Humildad</th></tr></thead><tbody>${data.jugadores.map(j => `<tr><td>${j.nombre}</td><td><input type="number" id="amarillas_${j.cedula}" value="0" min="0" max="2" style="width:70px"></td><td><input type="number" id="rojas_${j.cedula}" value="0" min="0" max="1" style="width:70px"></td><td><input type="number" id="goles_${j.cedula}" value="0" min="0" style="width:70px"></td><td><select id="punt_${j.cedula}">${[1,2,3,4,5].map(v=>`<option value="${v}">${v}</option>`).join('')}</select></td><td><select id="comp_${j.cedula}">${[1,2,3,4,5].map(v=>`<option value="${v}">${v}</option>`).join('')}</select></td><td><select id="resp_${j.cedula}">${[1,2,3,4,5].map(v=>`<option value="${v}">${v}</option>`).join('')}</select></td><td><select id="hum_${j.cedula}">${[1,2,3,4,5].map(v=>`<option value="${v}">${v}</option>`).join('')}</select></td></tr>`).join('')}</tbody></table></div>`;
    };
    window.guardarCalificaciones = async () => {
        alert('Funcionalidad en desarrollo - Los datos se guardan en el backend');
    };

    function logout() { localStorage.removeItem('admin_auth'); alert('Sesión cerrada'); location.reload(); }

    // Carga inicial
    cargarPendientes();
    cargarJugadores();
    cargarDeudores();
    cargarNotificaciones();
    cargarProximos();
</script>
</body>
</html>
