<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Admin | Nápoles F.C.</title>

<link
href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap"
rel="stylesheet">

<style>

:root{

    --bg:#07111f;
    --card:#0f1c2e;
    --border:#1d3557;

    --cyan:#00d2ff;
    --cyan2:#008f9b;

    --purple:#a855f7;

    --text:#ffffff;
    --muted:#94a3b8;

    --success:#10b981;
    --warning:#f59e0b;
    --danger:#ef4444;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{

    font-family:'Plus Jakarta Sans',sans-serif;

    background:var(--bg);

    color:var(--text);

    min-height:100vh;

    overflow-x:hidden;
}

/* =====================================================
   FONDO
===================================================== */

body::before,
body::after{

    content:'';

    position:fixed;

    width:900px;
    height:900px;

    border-radius:50%;

    filter:blur(130px);

    opacity:.45;

    z-index:-1;
}

body::before{

    background:#00d2ff;

    top:-300px;
    left:-250px;
}

body::after{

    background:#6d28d9;

    bottom:-300px;
    right:-250px;
}

/* =====================================================
   TOPBAR
===================================================== */

.topbar{

    position:sticky;
    top:0;

    z-index:999;

    backdrop-filter:blur(18px);

    background:rgba(7,17,31,.78);

    border-bottom:1px solid rgba(255,255,255,.06);

    padding:18px 20px;

    display:flex;
    align-items:center;
    justify-content:space-between;
}

.topbar h1{

    font-size:1.3rem;

    font-weight:800;

    background:
    linear-gradient(
    to right,
    #fff,
    #00d2ff
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.logout-btn{

    border:none;

    background:
    linear-gradient(
    135deg,
    #ef4444,
    #dc2626
    );

    color:#fff;

    padding:12px 16px;

    border-radius:14px;

    font-weight:800;

    cursor:pointer;
}

/* =====================================================
   TABS
===================================================== */

.tabs{

    display:flex;

    overflow:auto;

    gap:12px;

    padding:18px;

    position:sticky;

    top:74px;

    z-index:998;

    backdrop-filter:blur(18px);

    background:rgba(7,17,31,.88);

    border-bottom:1px solid rgba(255,255,255,.05);
}

.tabs::-webkit-scrollbar{
    display:none;
}

.tab-btn{

    flex:none;

    border:none;

    padding:14px 18px;

    border-radius:16px;

    background:#10233d;

    color:#cbd5e1;

    font-weight:700;

    cursor:pointer;

    transition:.3s;
}

.tab-btn.active{

    background:
    linear-gradient(
    135deg,
    var(--cyan2),
    var(--cyan)
    );

    color:#fff;

    box-shadow:
    0 10px 25px rgba(0,210,255,.25);
}

/* =====================================================
   CONTENT
===================================================== */

.content{

    padding:20px;

    padding-bottom:120px;
}

.tab-content{
    display:none;
}

.tab-content.active{
    display:block;
}

/* =====================================================
   CARDS
===================================================== */

.cards{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(180px,1fr));

    gap:18px;

    margin-bottom:24px;
}

.card{

    background:rgba(15,28,46,.92);

    border:1px solid rgba(255,255,255,.06);

    border-radius:24px;

    padding:22px;
}

.card h3{

    font-size:.9rem;

    color:#94a3b8;

    margin-bottom:12px;
}

.card p{

    font-size:2rem;

    font-weight:800;
}

/* =====================================================
   PANEL
===================================================== */

.panel{

    background:rgba(15,28,46,.95);

    border:1px solid rgba(255,255,255,.06);

    border-radius:28px;

    padding:22px;

    margin-bottom:24px;
}

.panel-title{

    display:flex;
    align-items:center;
    justify-content:space-between;

    margin-bottom:20px;
}

.panel-title h2{

    font-size:1.1rem;
}

/* =====================================================
   BUSCADOR
===================================================== */

.search{

    width:100%;

    height:58px;

    border:none;

    border-radius:18px;

    background:#0b1727;

    color:#fff;

    padding:0 18px;

    margin-bottom:18px;

    font-size:1rem;
}

/* =====================================================
   TABLA
===================================================== */

.table-wrap{

    overflow:auto;

    border-radius:20px;
}

table{

    width:100%;

    border-collapse:collapse;

    min-width:900px;
}

th{

    background:#0d2138;

    color:#00d2ff;

    font-size:.82rem;

    text-align:left;

    padding:16px;

    position:sticky;
    top:0;
}

td{

    padding:16px;

    border-bottom:1px solid rgba(255,255,255,.05);

    font-size:.92rem;
}

tr:hover{
    background:rgba(255,255,255,.03);
}

/* =====================================================
   ESTADOS
===================================================== */

.badge{

    padding:8px 12px;

    border-radius:999px;

    font-size:.75rem;

    font-weight:800;
}

.ok{
    background:rgba(16,185,129,.15);
    color:#10b981;
}

.pending{
    background:rgba(245,158,11,.15);
    color:#f59e0b;
}

/* =====================================================
   BUTTONS
===================================================== */

.action-btn{

    border:none;

    padding:10px 14px;

    border-radius:12px;

    color:#fff;

    font-weight:700;

    cursor:pointer;

    margin-right:8px;
}

.btn-edit{
    background:#2563eb;
}

.btn-approve{
    background:#10b981;
}

.btn-delete{
    background:#ef4444;
}

/* =====================================================
   FORM
===================================================== */

.form-grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));

    gap:18px;
}

.input{

    width:100%;

    height:56px;

    border:none;

    border-radius:16px;

    background:#091423;

    color:#fff;

    padding:0 16px;
}

.save-btn{

    width:100%;

    height:56px;

    border:none;

    border-radius:18px;

    background:
    linear-gradient(
    135deg,
    #6d28d9,
    #a855f7
    );

    color:#fff;

    font-weight:800;

    margin-top:18px;

    cursor:pointer;
}

@media(max-width:700px){

    .content{
        padding:16px;
    }

    .panel{
        padding:18px;
    }

    .tabs{
        top:72px;
    }
}

</style>

</head>

<body>

<!-- =====================================================
TOPBAR
===================================================== -->

<div class="topbar">

    <h1>NÁPOLES F.C. ADMIN</h1>

    <button
    class="logout-btn"
    onclick="logoutAdmin()">
        SALIR
    </button>

</div>

<!-- =====================================================
TABS
===================================================== -->

<div class="tabs">

    <button
    class="tab-btn active"
    onclick="openTab('dashboard',this)">
        🏠 Inicio
    </button>

    <button
    class="tab-btn"
    onclick="openTab('jugadores',this)">
        👥 Jugadores
    </button>

    <button
    class="tab-btn"
    onclick="openTab('partidos',this)">
        ⚽ Partidos
    </button>

    <button
    class="tab-btn"
    onclick="openTab('rivales',this)">
        🛡️ Rivales
    </button>

    <button
    class="tab-btn"
    onclick="openTab('pagos',this)">
        💰 Pagos
    </button>

    <button
    class="tab-btn"
    onclick="openTab('config',this)">
        ⚙️ Ajustes
    </button>

</div>

<!-- =====================================================
CONTENT
===================================================== -->

<div class="content">

    <!-- DASHBOARD -->

    <div
    id="dashboard"
    class="tab-content active">

        <div class="cards">

            <div class="card">
                <h3>Jugadores</h3>
                <p id="totalJugadores">0</p>
            </div>

            <div class="card">
                <h3>Aprobados</h3>
                <p id="totalAprobados">0</p>
            </div>

            <div class="card">
                <h3>Pendientes</h3>
                <p id="totalPendientes">0</p>
            </div>

            <div class="card">
                <h3>Partidos</h3>
                <p>12</p>
            </div>

        </div>

    </div>

    <!-- JUGADORES -->

    <div
    id="jugadores"
    class="tab-content">

        <div class="panel">

            <div class="panel-title">

                <h2>Lista de Jugadores</h2>

            </div>

            <input
            type="text"
            class="search"
            placeholder="Buscar jugador..."
            id="searchJugador">

            <div class="table-wrap">

                <table>

                    <thead>

                        <tr>

                            <th>Jugador</th>
                            <th>Cédula</th>
                            <th>Dorsal</th>
                            <th>Uniforme</th>
                            <th>Estado</th>
                            <th>Acciones</th>

                        </tr>

                    </thead>

                    <tbody id="tablaJugadores">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <!-- PARTIDOS -->

    <div
    id="partidos"
    class="tab-content">

        <div class="panel">

            <div class="panel-title">

                <h2>Programar Partido</h2>

            </div>

            <div class="form-grid">

                <input
                class="input"
                placeholder="Rival">

                <input
                class="input"
                type="date">

                <input
                class="input"
                type="time">

                <input
                class="input"
                placeholder="Cancha">

            </div>

            <button class="save-btn">
                GUARDAR PARTIDO
            </button>

        </div>

    </div>

    <!-- RIVALES -->

    <div
    id="rivales"
    class="tab-content">

        <div class="panel">

            <div class="panel-title">

                <h2>Agregar Rival</h2>

            </div>

            <div class="form-grid">

                <input
                class="input"
                placeholder="Nombre rival">

                <input
                class="input"
                placeholder="Ciudad">

                <input
                class="input"
                placeholder="Contacto">

            </div>

            <button class="save-btn">
                GUARDAR RIVAL
            </button>

        </div>

    </div>

    <!-- PAGOS -->

    <div
    id="pagos"
    class="tab-content">

        <div class="panel">

            <div class="panel-title">

                <h2>Control de Pagos</h2>

            </div>

            <p style="color:#94a3b8;">
                Próximamente módulo financiero.
            </p>

        </div>

    </div>

    <!-- CONFIG -->

    <div
    id="config"
    class="tab-content">

        <div class="panel">

            <div class="panel-title">

                <h2>Configuración</h2>

            </div>

            <button class="save-btn">
                RESPALDAR DATOS
            </button>

        </div>

    </div>

</div>

<script src="./config.js"></script>

<script>

// =====================================================
// SEGURIDAD ADMIN
// =====================================================

if(
    localStorage.getItem('admin_activo')
    !== 'true'
){
    window.location.href = './login.html';
}

// =====================================================
// TABS
// =====================================================

function openTab(id,btn){

    document
    .querySelectorAll('.tab-content')
    .forEach(tab => {

        tab.classList.remove('active');
    });

    document
    .querySelectorAll('.tab-btn')
    .forEach(b => {

        b.classList.remove('active');
    });

    document
    .getElementById(id)
    .classList.add('active');

    btn.classList.add('active');
}

// =====================================================
// LOGOUT
// =====================================================

function logoutAdmin(){

    localStorage.removeItem(
        'admin_activo'
    );

    window.location.href =
    './login.html';
}

// =====================================================
// CARGAR JUGADORES
// =====================================================

async function cargarJugadores(){

    try{

        const url =
`${CONFIG.URL_GAS}?action=getResumenJugadoresCompleto&t=${Date.now()}`;

        const response =
        await fetch(url);

        const data =
        await response.json();

        if(!data.ok) return;

        const tabla =
        document.getElementById(
            'tablaJugadores'
        );

        tabla.innerHTML = '';

        let aprobados = 0;
        let pendientes = 0;

        data.jugadores.forEach(j => {

            const estado =
            j.inscripEstado || 'PENDIENTE';

            if(estado === 'APROBADO'){
                aprobados++;
            }else{
                pendientes++;
            }

            tabla.innerHTML += `

            <tr>

                <td>
                    ${j.primerNombre}
                    ${j.apellidos}
                </td>

                <td>${j.cedula}</td>

                <td>${j.dorsal}</td>

                <td>${j.talla}</td>

                <td>

                    <span class="
                    badge
                    ${estado === 'APROBADO'
                    ? 'ok'
                    : 'pending'}">

                        ${estado}

                    </span>

                </td>

                <td>

                    <button
                    class="action-btn btn-edit">
                        Editar
                    </button>

                    <button
                    class="action-btn btn-approve">
                        Aprobar
                    </button>

                </td>

            </tr>
            `;
        });

        document.getElementById(
            'totalJugadores'
        ).textContent =
        data.jugadores.length;

        document.getElementById(
            'totalAprobados'
        ).textContent =
        aprobados;

        document.getElementById(
            'totalPendientes'
        ).textContent =
        pendientes;

    }catch(err){

        console.log(err);
    }
}

// =====================================================
// BUSCADOR
// =====================================================

document
.getElementById('searchJugador')
.addEventListener('keyup', function(){

    const filtro =
    this.value.toLowerCase();

    const filas =
    document.querySelectorAll(
        '#tablaJugadores tr'
    );

    filas.forEach(fila => {

        fila.style.display =
        fila.innerText
        .toLowerCase()
        .includes(filtro)
        ? ''
        : 'none';
    });

});

// =====================================================
// INIT
// =====================================================

cargarJugadores();

</script>

</body>
</html>
