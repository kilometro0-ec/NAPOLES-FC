<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Admin | Nápoles F.C.</title>

<link
href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap"
rel="stylesheet">

<style>

:root{

    --bg:#020c1a;

    --card:
    rgba(14,22,40,.82);

    --primary:#a855f7;

    --primary2:#7c3aed;

    --success:#16a34a;

    --danger:#dc2626;

    --warning:#f59e0b;

    --text:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:
    'Plus Jakarta Sans',
    sans-serif;

    background:
    radial-gradient(
    circle at top left,
    rgba(168,85,247,.18),
    transparent 35%
    ),
    radial-gradient(
    circle at bottom right,
    rgba(0,210,255,.18),
    transparent 35%
    ),
    var(--bg);

    min-height:100vh;

    color:var(--text);

    overflow-x:hidden;
}

header{

    padding:24px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    flex-wrap:wrap;

    gap:20px;
}

.logo{

    font-size:2rem;

    font-weight:800;

    background:
    linear-gradient(
    to right,
    #fff,
    #d8b4fe,
    #a855f7
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

.logout-btn{

    border:none;

    padding:14px 22px;

    border-radius:18px;

    background:
    linear-gradient(
    135deg,
    #7c3aed,
    #a855f7
    );

    color:#fff;

    font-weight:800;

    cursor:pointer;
}

.dashboard{

    width:100%;

    max-width:1400px;

    margin:auto;

    padding:0 20px 40px;
}

.stats{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));

    gap:20px;

    margin-bottom:30px;
}

.stat-card{

    background:var(--card);

    backdrop-filter:blur(18px);

    border:
    1px solid
    rgba(168,85,247,.25);

    border-radius:28px;

    padding:26px;

    box-shadow:
    0 0 25px
    rgba(168,85,247,.12);
}

.stat-title{

    font-size:.9rem;

    opacity:.8;

    margin-bottom:10px;
}

.stat-value{

    font-size:2rem;

    font-weight:800;
}

.search-box{

    margin-bottom:30px;
}

.search-box input{

    width:100%;

    min-height:64px;

    border:none;

    outline:none;

    border-radius:22px;

    padding:0 22px;

    background:
    rgba(20,30,50,.82);

    color:#fff;

    font-size:1rem;

    font-weight:700;

    border:
    1px solid
    rgba(168,85,247,.25);
}

.players-grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(340px,1fr));

    gap:22px;
}

.player-card{

    background:var(--card);

    backdrop-filter:blur(18px);

    border:
    1px solid
    rgba(168,85,247,.25);

    border-radius:28px;

    padding:24px;

    box-shadow:
    0 0 25px
    rgba(168,85,247,.12);

    transition:.25s;
}

.player-card:hover{

    transform:translateY(-4px);
}

.player-name{

    font-size:1.2rem;

    font-weight:800;

    margin-bottom:16px;
}

.player-info{

    line-height:1.9;

    opacity:.92;

    margin-bottom:18px;
}

.badges{

    display:flex;

    flex-wrap:wrap;

    gap:10px;

    margin-bottom:20px;
}

.badge{

    padding:9px 14px;

    border-radius:999px;

    font-size:.78rem;

    font-weight:800;
}

.aprobado{
    background:var(--success);
}

.pendiente{
    background:var(--danger);
}

.actions{

    display:grid;

    grid-template-columns:
    repeat(2,1fr);

    gap:12px;
}

.actions button{

    border:none;

    min-height:50px;

    border-radius:16px;

    cursor:pointer;

    font-weight:800;

    color:#fff;

    transition:.2s;
}

.btn-inscripcion{
    background:#2563eb;
}

.btn-uniforme{
    background:#16a34a;
}

.btn-medias{
    background:#f59e0b;
}

.btn-editar{
    background:#7c3aed;
}

.loading{

    text-align:center;

    padding:80px 20px;

    font-size:1.2rem;
}

.empty{

    text-align:center;

    padding:80px 20px;

    opacity:.8;
}

@media(max-width:640px){

    header{
        padding:20px;
    }

    .logo{
        font-size:1.5rem;
    }

    .actions{
        grid-template-columns:1fr;
    }
}

</style>

</head>

<body>

<header>

    <div class="logo">
        PANEL ADMIN NÁPOLES F.C.
    </div>

    <button
        class="logout-btn"
        id="logoutBtn">
        Cerrar Sesión
    </button>

</header>

<div class="dashboard">

    <!-- ESTADÍSTICAS -->

    <div class="stats">

        <div class="stat-card">

            <div class="stat-title">
                TOTAL JUGADORES
            </div>

            <div
            class="stat-value"
            id="totalJugadores">
                0
            </div>

        </div>

        <div class="stat-card">

            <div class="stat-title">
                INSCRIPCIONES APROBADAS
            </div>

            <div
            class="stat-value"
            id="totalAprobados">
                0
            </div>

        </div>

        <div class="stat-card">

            <div class="stat-title">
                PENDIENTES
            </div>

            <div
            class="stat-value"
            id="totalPendientes">
                0
            </div>

        </div>

    </div>

    <!-- BUSCADOR -->

    <div class="search-box">

        <input
            type="text"
            id="searchInput"
            placeholder="Buscar jugador por nombre, cédula o dorsal..."
        >

    </div>

    <!-- CONTENEDOR -->

    <div
    class="players-grid"
    id="playersContainer">

        <div class="loading">
            Cargando jugadores...
        </div>

    </div>

</div>

<script src="./config.js"></script>

<script>

// =====================================================
// SEGURIDAD
// =====================================================

if(
    localStorage.getItem(
        'admin_activo'
    ) !== 'true'
){

    window.location.href =
    './login.html';
}

// =====================================================
// ELEMENTOS
// =====================================================

const playersContainer =
document.getElementById(
    'playersContainer'
);

const totalJugadores =
document.getElementById(
    'totalJugadores'
);

const totalAprobados =
document.getElementById(
    'totalAprobados'
);

const totalPendientes =
document.getElementById(
    'totalPendientes'
);

const searchInput =
document.getElementById(
    'searchInput'
);

let jugadoresGlobal = [];

// =====================================================
// LOGOUT
// =====================================================

document
.getElementById('logoutBtn')
.addEventListener('click', () => {

    localStorage.removeItem(
        'admin_activo'
    );

    window.location.href =
    './login.html';
});

// =====================================================
// CARGAR
// =====================================================

async function cargarJugadores(){

    try{

        const url =
        `${CONFIG.URL_GAS}?action=getResumenJugadoresCompleto&t=${Date.now()}`;

        const response =
        await fetch(url);

        const data =
        await response.json();

        if(
            data.ok !== true
        ){

            playersContainer.innerHTML =
            'Error cargando jugadores';

            return;
        }

        jugadoresGlobal =
        data.jugadores;

        renderJugadores(
            jugadoresGlobal
        );

    }catch(error){

        playersContainer.innerHTML =
        'Error de conexión';
    }
}

// =====================================================
// RENDER
// =====================================================

function renderJugadores(lista){

    if(lista.length === 0){

        playersContainer.innerHTML =
        `<div class="empty">
            No hay resultados
        </div>`;

        return;
    }

    // STATS

    totalJugadores.textContent =
    lista.length;

    totalAprobados.textContent =
    lista.filter(j =>
    j.inscripEstado === 'APROBADO'
    ).length;

    totalPendientes.textContent =
    lista.filter(j =>
    j.inscripEstado !== 'APROBADO'
    ).length;

    // HTML

    playersContainer.innerHTML = '';

    lista.forEach(j => {

        playersContainer.innerHTML += `

        <div class="player-card">

            <div class="player-name">

                ${j.primerNombre}
                ${j.segundoNombre}
                ${j.apellidos}

            </div>

            <div class="player-info">

                <div>
                    📄 Cédula:
                    ${j.cedula}
                </div>

                <div>
                    👕 Camiseta:
                    ${j.nombreCamiseta}
                </div>

                <div>
                    🔢 Dorsal:
                    ${j.dorsal}
                </div>

                <div>
                    📏 Talla:
                    ${j.talla}
                </div>

            </div>

            <div class="badges">

                <div class="badge
                ${j.inscripEstado === 'APROBADO'
                ? 'aprobado'
                : 'pendiente'}">

                    INSCRIPCIÓN:
                    ${j.inscripEstado}

                </div>

                <div class="badge
                ${j.unifEstado === 'APROBADO'
                ? 'aprobado'
                : 'pendiente'}">

                    UNIFORME:
                    ${j.unifEstado}

                </div>

                <div class="badge
                ${j.mediasEstado === 'APROBADO'
                ? 'aprobado'
                : 'pendiente'}">

                    MEDIAS:
                    ${j.mediasEstado}

                </div>

            </div>

            <div class="actions">

                <button
                class="btn-inscripcion">

                    Aprobar Inscripción

                </button>

                <button
                class="btn-uniforme">

                    Aprobar Uniforme

                </button>

                <button
                class="btn-medias">

                    Aprobar Medias

                </button>

                <button
                class="btn-editar">

                    Editar Jugador

                </button>

            </div>

        </div>

        `;
    });
}

// =====================================================
// BUSCADOR
// =====================================================

searchInput.addEventListener('input', () => {

    const texto =
    searchInput.value
    .toLowerCase()
    .trim();

    const filtrados =
    jugadoresGlobal.filter(j => {

        return (

            `${j.primerNombre}
            ${j.segundoNombre}
            ${j.apellidos}`
            .toLowerCase()
            .includes(texto)

            ||

            String(j.cedula)
            .includes(texto)

            ||

            String(j.dorsal)
            .includes(texto)
        );
    });

    renderJugadores(
        filtrados
    );
});

// =====================================================
// INIT
// =====================================================

cargarJugadores();

</script>

</body>
</html>
