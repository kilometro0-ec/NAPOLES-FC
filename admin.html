<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nápoles FC · Admin</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    background:linear-gradient(135deg,#0f172a,#111827,#1e1b4b);
    min-height:100vh;
    color:white;
    padding:15px;
}

::-webkit-scrollbar{
    display:none;
}

.container{
    max-width:1200px;
    margin:auto;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.1);
    padding:15px;
    border-radius:25px;
    backdrop-filter:blur(10px);
    margin-bottom:20px;
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo-icon{
    width:45px;
    height:45px;
    border-radius:50%;
    background:linear-gradient(135deg,#3b82f6,#8b5cf6);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
}

.buttons{
    display:flex;
    gap:10px;
}

.btn{
    border:none;
    padding:10px 15px;
    border-radius:30px;
    cursor:pointer;
    color:white;
    font-size:.8rem;
}

.btn-refresh{
    background:#2563eb;
}

.btn-logout{
    background:#dc2626;
}

.dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:15px;
}

.card{
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    border-radius:25px;
    padding:20px;
    text-align:center;
    cursor:pointer;
    transition:.2s;
    backdrop-filter:blur(10px);
}

.card:hover{
    transform:translateY(-5px);
}

.card span{
    font-size:2rem;
    display:block;
    margin-bottom:10px;
}

.panel{
    display:none;
    margin-top:20px;
    background:rgba(255,255,255,.05);
    border-radius:25px;
    padding:20px;
    border:1px solid rgba(255,255,255,.08);
}

.panel.active{
    display:block;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

th{
    background:rgba(255,255,255,.08);
    padding:10px;
    text-align:left;
    color:#94a3b8;
}

td{
    padding:10px;
    border-bottom:1px solid rgba(255,255,255,.05);
}

input,select,textarea{
    width:100%;
    padding:10px;
    margin-top:8px;
    margin-bottom:12px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    border-radius:15px;
    color:white;
}

button.action{
    border:none;
    padding:7px 12px;
    border-radius:20px;
    cursor:pointer;
    color:white;
}

.approve{
    background:#059669;
}

.reject{
    background:#dc2626;
}

.back{
    margin-top:15px;
    background:#334155;
}

.loader{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.spinner{
    width:50px;
    height:50px;
    border:4px solid rgba(255,255,255,.1);
    border-top:4px solid #3b82f6;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

@media(max-width:768px){

    table{
        font-size:.75rem;
    }

    .dashboard{
        grid-template-columns:1fr 1fr;
    }

}
</style>
</head>

<body>

<div class="loader" id="loader">
    <div class="spinner"></div>
</div>

<div class="container">

    <div class="header">

        <div class="logo">
            <div class="logo-icon">⚽</div>
            <h2>Nápoles FC</h2>
        </div>

        <div class="buttons">
            <button class="btn btn-refresh" onclick="location.reload()">🔄</button>
            <button class="btn btn-logout" onclick="cerrarSesion()">🚪</button>
        </div>

    </div>

    <div id="dashboard">

        <div class="dashboard">

            <div class="card" onclick="abrirPanel('solicitudes')">
                <span>📋</span>
                <h3>Solicitudes</h3>
                <small>Aprobar jugadores</small>
            </div>

            <div class="card" onclick="abrirPanel('jugadores')">
                <span>👥</span>
                <h3>Plantilla</h3>
                <small>Jugadores activos</small>
            </div>

            <div class="card" onclick="abrirPanel('pagos')">
                <span>💰</span>
                <h3>Cobros</h3>
                <small>Pagos pendientes</small>
            </div>

            <div class="card" onclick="abrirPanel('notificaciones')">
                <span>📢</span>
                <h3>Anuncios</h3>
                <small>Mensajes club</small>
            </div>

        </div>

    </div>

    <!-- PANEL SOLICITUDES -->
    <div class="panel" id="panel-solicitudes">

        <h2>📋 Solicitudes Pendientes</h2>

        <table>

            <thead>
                <tr>
                    <th>Jugador</th>
                    <th>Dorsal</th>
                    <th>Acciones</th>
                </tr>
            </thead>

            <tbody id="tablaSolicitudes">
            </tbody>

        </table>

        <button class="btn back" onclick="volver()">← Volver</button>

    </div>

    <!-- PANEL JUGADORES -->
    <div class="panel" id="panel-jugadores">

        <h2>👥 Plantilla Oficial</h2>

        <table>

            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Cédula</th>
                    <th>Goles</th>
                    <th>TA</th>
                    <th>TR</th>
                </tr>
            </thead>

            <tbody id="tablaJugadores">
            </tbody>

        </table>

        <button class="btn back" onclick="volver()">← Volver</button>

    </div>

    <!-- PANEL PAGOS -->
    <div class="panel" id="panel-pagos">

        <h2>💰 Cobros</h2>

        <input type="text" id="cedulaPago" placeholder="Buscar por cédula">

        <button class="btn btn-refresh" onclick="buscarJugador()">
            Buscar
        </button>

        <div id="infoJugador"></div>

        <button class="btn back" onclick="volver()">← Volver</button>

    </div>

    <!-- PANEL NOTIFICACIONES -->
    <div class="panel" id="panel-notificaciones">

        <h2>📢 Publicar anuncio</h2>

        <input type="text" id="titulo" placeholder="Título">

        <textarea id="mensaje" rows="4" placeholder="Mensaje"></textarea>

        <button class="btn btn-refresh" onclick="publicarNotificacion()">
            Publicar
        </button>

        <div id="listaNotificaciones"></div>

        <button class="btn back" onclick="volver()">← Volver</button>

    </div>

</div>

<script src="config.js"></script>

<script>

const API_URL = CONFIG.URL_GAS;

if(localStorage.getItem("admin_auth") !== "true"){
    location.href = "login.html";
}

window.addEventListener("load",()=>{

    setTimeout(()=>{

        document.getElementById("loader").style.display="none";

    },1000);

});

function abrirPanel(panel){

    document.getElementById("dashboard").style.display="none";

    document.querySelectorAll(".panel").forEach(p=>{

        p.classList.remove("active");

    });

    const panelElement=document.getElementById("panel-"+panel);

    if(panelElement){

        panelElement.classList.add("active");

    }

    if(panel==="solicitudes"){
        cargarSolicitudes();
    }

    if(panel==="jugadores"){
        cargarJugadores();
    }

}

function volver(){

    document.getElementById("dashboard").style.display="block";

    document.querySelectorAll(".panel").forEach(p=>{

        p.classList.remove("active");

    });

}

function cerrarSesion(){

    localStorage.removeItem("admin_auth");

    alert("Sesión cerrada");

    location.reload();

}

async function fetchAPI(action,params={}){

    try{

        const controller=new AbortController();

        const timeout=setTimeout(()=>{

            controller.abort();

        },15000);

        const urlParams=new URLSearchParams({

            action,
            ...params

        });

        const response=await fetch(
            `${API_URL}?${urlParams.toString()}`,
            {
                signal:controller.signal
            }
        );

        clearTimeout(timeout);

        return await response.json();

    }catch(error){

        return{
            ok:false,
            error:error.message
        };

    }

}

async function cargarSolicitudes(){

    const data=await fetchAPI("getPendientes");

    const tbody=document.getElementById("tablaSolicitudes");

    if(data.jugadores && data.jugadores.length){

        tbody.innerHTML=data.jugadores.map(j=>`

            <tr>
                <td>${escapeHTML(j.nombreCamiseta || j.nombre)}</td>
                <td>#${escapeHTML(j.dorsal || "?")}</td>
                <td>

                    <button class="action approve"
                    onclick="aprobar('${j.cedula}')">
                    ✓
                    </button>

                    <button class="action reject"
                    onclick="rechazar('${j.cedula}')">
                    ✗
                    </button>

                </td>
            </tr>

        `).join("");

    }else{

        tbody.innerHTML=`
            <tr>
                <td colspan="3">
                    Sin solicitudes
                </td>
            </tr>
        `;

    }

}

async function cargarJugadores(){

    const data=await fetchAPI("getJugadoresAprobados");

    const tbody=document.getElementById("tablaJugadores");

    if(data.jugadores && data.jugadores.length){

        tbody.innerHTML=data.jugadores.map(j=>`

            <tr>
                <td>${escapeHTML(j.nombre)}</td>
                <td>${escapeHTML(j.cedula)}</td>
                <td>${j.goles || 0}</td>
                <td>${j.amarillas || 0}</td>
                <td>${j.rojas || 0}</td>
            </tr>

        `).join("");

    }else{

        tbody.innerHTML=`
            <tr>
                <td colspan="5">
                    No hay jugadores
                </td>
            </tr>
        `;

    }

}

async function aprobar(cedula){

    if(!confirm("¿Aprobar jugador?")){
        return;
    }

    const res=await fetchAPI("aprobarJugador",{
        cedula
    });

    if(res.ok){

        alert("Jugador aprobado");

        cargarSolicitudes();

    }else{

        alert("Error");

    }

}

async function rechazar(cedula){

    const motivo=prompt("Motivo del rechazo");

    if(!motivo){
        return;
    }

    const res=await fetchAPI("rechazarJugador",{
        cedula,
        motivo
    });

    if(res.ok){

        alert("Jugador rechazado");

        cargarSolicitudes();

    }else{

        alert("Error");

    }

}

async function buscarJugador(){

    const cedula=document.getElementById("cedulaPago").value;

    if(!cedula){
        return;
    }

    const data=await fetchAPI("obtenerDeudasJugador",{
        cedula
    });

    const info=document.getElementById("infoJugador");

    if(data.ok){

        info.innerHTML=`

            <div class="card">

                <h3>${escapeHTML(data.jugador.nombre)}</h3>

                <p>
                    💰 Deuda:
                    <strong>$${data.deudaTotal}</strong>
                </p>

            </div>

        `;

    }else{

        info.innerHTML=`
            <div class="card">
                Jugador no encontrado
            </div>
        `;

    }

}

async function publicarNotificacion(){

    const titulo=document.getElementById("titulo").value;

    const mensaje=document.getElementById("mensaje").value;

    if(!titulo || !mensaje){

        alert("Complete campos");

        return;

    }

    const res=await fetchAPI("publicarNotificacion",{

        titulo,
        mensaje,
        tipo:"info"

    });

    if(res.ok){

        alert("Publicado");

        document.getElementById("titulo").value="";
        document.getElementById("mensaje").value="";

    }else{

        alert("Error");

    }

}

function escapeHTML(text){

    if(!text){
        return "";
    }

    return text
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");

}

</script>

</body>
</html>
