<h2>Jugadores</h2>
<table id="tabla"></table>

<script>
async function cargar(){
  const res = await fetch("TU_URL?action=getJugadores");
  const data = await res.json();

  let html = "<tr><th>Cédula</th><th>Nombre</th><th>Dorsal</th></tr>";

  data.slice(1).forEach(r=>{
    html += `<tr>
      <td>${r[1]}</td>
      <td>${r[2]} ${r[4]}</td>
      <td>${r[9]}</td>
    </tr>`;
  });

  tabla.innerHTML = html;
}

cargar();
</script>
