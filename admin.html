<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nápoles FC · Administración</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: #f0f4f8; padding: 24px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { background: white; border-radius: 28px; padding: 20px 32px; margin-bottom: 28px; display: flex; justify-content: space-between; align-items: center; }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-icon { background: #1a4a76; width: 48px; height: 48px; border-radius: 24px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; }
        .header h1 { color: #1a4a76; font-size: 1.5rem; }
        .badge { background: #eef2ff; padding: 6px 14px; border-radius: 40px; font-size: 0.7rem; font-weight: 600; color: #1f4a8c; margin-left: 12px; }
        .logout-btn { background: white; border: 1px solid #e2e8f0; padding: 10px 28px; border-radius: 40px; cursor: pointer; font-weight: 600; }
        .tabs { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 28px; }
        .tab { background: white; border: 1px solid #e2e8f0; padding: 12px 28px; border-radius: 60px; cursor: pointer; font-weight: 600; color: #4a5568; }
        .tab.active { background: #1a4a76; color: white; }
        .panel { background: white; border-radius: 28px; padding: 28px; display: none; }
        .panel.active { display: block; }
        .panel h2 { font-size: 1.4rem; margin-bottom: 20px; color: #0f2b4d; }
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 14px 12px; background: #f8fafc; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; }
        .btn-success { background: #059669; color: white; border: none; padding: 6px 18px; border-radius: 30px; cursor: pointer; margin: 2px; }
        .btn-danger { background: #dc2626; color: white; border: none; padding: 6px 18px; border-radius: 30px; cursor: pointer; }
        .btn-primary { background: #1a4a76; color: white; border: none; padding: 10px 28px; border-radius: 40px; cursor: pointer; font-weight: 600; }
        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; margin-bottom: 24px; }
        .card { background: #f8fafc; border-radius: 20px; padding: 20px; border-left: 4px solid #1a4a76; margin-bottom: 12px; }
        .info-card { background: #fefce8; border-radius: 16px; padding: 16px; border-left: 4px solid #eab308; margin-top: 12px; }
        input, select, textarea { width: 100%; padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 16px; margin-bottom: 12px; }
        label { font-weight: 500; margin-bottom: 6px; display: block; color: #334155; }
        .spinner { border: 3px solid #e2e8f0; border-top: 3px solid #1a4a76; border-radius: 50%; width: 40px; height: 40px; animation: spin 0.8s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; max-width: 500px; width: 90%; border-radius: 28px; padding: 24px; }
        .badge-count { background: #dc2626; color: white; border-radius: 30px; padding: 2px 10px; font-size: 0.75rem; margin-left: 8px; }
        hr { margin: 20px 0; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo-area">
            <div class="logo-icon">⚽</div>
            <h1>Nápoles F.C. <span class="badge">STAFF</span></h1>
        </div>
        <button class="logout-btn" onclick="logout()">🔐 Cerrar sesión</button>
    </div>

    <div class="tabs">
        <button class="tab active" data-tab="pendientes">📋 Solicitudes <span id="pendientesCount" class="badge-count">0</span></button>
        <button class="tab" data-tab="jugadores">👥 Plantilla</button>
        <button class="tab" data-tab="vocalia">💰 Cobros</button>
        <button class="tab" data-tab="notificaciones">📢 Anuncios</button>
        <button class="tab" data-tab="partidos">⭐ Calificar</button>
        <button class="tab" data-tab="proximos">📅 Próximos</button>
    </div>

    <div id="panel-pendientes" class="panel active">
        <h2>📋 Solicitudes pendientes</h2>
        <div class="table-wrapper"><table id="tablaPendientes"><thead><tr><th>Nombre</th><th>Cédula</th><th>Teléfono</th><th>Correo</th><th>Dorsal</th><th>Acciones</th></tr></thead><tbody><tr><td colspan="6"><div class="spinner"></div></td></tr></tbody></table></div>
    </div>

    <div id="panel-jugadores" class="panel">
        <h2>👥 Todos los jugadores</h2>
        <div class="table-wrapper"><table id="tablaJugadores"><thead><tr><th>Nombre</th><th>Cédula</th><th>Estado</th><th>Deuda</th><th>Goles</th><th>TA</th><th>TR</th></tr></thead><tbody><tr><td colspan="7"><div class="spinner"></div></td></tr></tbody></table></div>
    </div>

    <div id="panel-vocalia" class="panel">
        <h2>💰 Registrar pago</h2>
        <div class="grid-2">
            <div><label>Cédula</label><input type="text" id="buscarCedula"><button class="btn-primary" onclick="buscarDeudor()">Buscar</button></div>
            <div id="infoDeudor"></div>
        </div>
        <div id="formPago" style="display:none;"><label>Monto</label><input type="number" id="montoPago"><button class="btn-success" onclick="registrarPago()">Registrar pago</button></div>
        <hr><h3>Deudores</h3>
        <div class="table-wrapper"><table id="tablaDeudores"><thead><tr><th>Jugador</th><th>Cédula</th><th>Deuda</th><th>Acción</th></tr></thead><tbody></td></tbody></table></div>
    </div>

    <div id="panel-notificaciones" class="panel">
        <h2>📢 Publicar anuncio</h2>
        <input type="text" id="notiTitulo" placeholder="Título">
        <textarea id="notiMensaje" rows="3" placeholder="Mensaje"></textarea>
        <select id="notiTipo"><option value="info">Informativo</option><option value="warning">Advertencia</option><option value="success">Éxito</option></select>
        <button class="btn-primary" onclick="publicarNotificacion()">Publicar</button>
        <div id="listaNotificaciones"></div>
    </div>

    <div id="panel-partidos" class="panel">
        <h2>⭐ Calificar partido</h2>
        <div class="grid-2">
            <div><label>Fecha</label><input type="date" id="fechaPartido"></div>
            <div><label>Rival</label><input type="text" id="rivalPartido"></div>
        </div>
        <button class="btn-primary" onclick="cargarJugadoresParaCalificar()">Cargar jugadores</button>
        <div id="listaCalificaciones"></div>
        <button class="btn-primary" onclick="guardarCalificaciones()">Guardar partido</button>
    </div>

    <div id="panel-proximos" class="panel">
        <h2>📅 Próximos partidos</h2>
        <div class="grid-2"><div><label>Fecha</label><input type="datetime-local" id="proxFecha"></div><div><label>Rival</label><input type="text" id="proxRival"></div></div>
        <div><label>Lugar</label><input type="text" id="proxLugar"><label>Observaciones</label><textarea id="proxObs"></textarea></div>
        <button class="btn-primary" onclick="guardarProximoPartido()">Guardar</button>
        <div id="listaProximos"></div>
    </div>
</div>

<div id="modalRechazo" class="modal">
    <div class="modal-content">
        <h3>Motivo del rechazo</h3>
        <textarea id="motivoRechazo" rows="3" placeholder="Ingrese el motivo..."></textarea>
        <button class="btn-primary" onclick="confirmarRechazo()">Confirmar</button>
        <button onclick="cerrarModalRechazo()">Cancelar</button>
    </div>
</div>

<script src="config.js"></script>
<script>
    const API_URL = CONFIG.URL_GAS;
    let currentCedulaRechazo = null;

    async function fetchAPI(action, params = {}) {
        const urlParams = new URLSearchParams({ action, ...params });
        const res = await fetch(`${API_URL}?${urlParams}`);
        return res.json();
    }

    // Tabs
    document.querySelectorAll('.tab').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(`panel-${btn.dataset.tab}`).classList.add('active');
            if (btn.dataset.tab === 'pendientes') cargarPendientes();
            if (btn.dataset.tab === 'jugadores') cargarJugadores();
            if (btn.dataset.tab === 'vocalia') cargarDeudores();
            if (btn.dataset.tab === 'notificaciones') cargarNotificaciones();
            if (btn.dataset.tab === 'proximos') cargarProximos();
        });
    });

    async function cargarPendientes() {
        const data = await fetchAPI('getPendientes');
        const tbody = document.querySelector('#tablaPendientes tbody');
        document.getElementById('pendientesCount').textContent = data.total || 0;
        if (data.jugadores?.length) {
            tbody.innerHTML = data.jugadores.map(j => `<tr><td>${j.nombre}</td><td>${j.cedula}</td><td>${j.telefono || '-'}</td><td>${j.correo || '-'}</td><td>#${j.dorsal || '?'}</td><td><button class="btn-success" onclick="aprobar('${j.cedula}')">✓ Aprobar</button> <button class="btn-danger" onclick="mostrarModalRechazo('${j.cedula}')">✗ Rechazar</button></td></tr>`).join('');
        } else tbody.innerHTML = '<tr><td colspan="6">✅ Sin solicitudes pendientes</td></tr>';
    }

    async function cargarJugadores() {
        const data = await fetchAPI('getAllJugadores');
        const tbody = document.querySelector('#tablaJugadores tbody');
        if (data.jugadores?.length) {
            tbody.innerHTML = data.jugadores.map(j => `<tr><td>${j.nombre}</td><td>${j.cedula}</td><td style="color:${j.estado === 'APROBADO' ? '#059669' : '#eab308'}">${j.estado}</td><td>$${j.deuda}</td><td>${j.goles}</td><td>${j.amarillas}</td><td>${j.rojas}</td></tr>`).join('');
        }
    }

    async function cargarDeudores() {
        const data = await fetchAPI('getDeudores');
        const tbody = document.querySelector('#tablaDeudores tbody');
        if (data.jugadores?.length) {
            tbody.innerHTML = data.jugadores.map(j => `<tr><td>${j.nombre}</td><td>${j.cedula}</td><td>$${j.deuda}</td><td><button class="btn-primary" onclick="prepararCobro('${j.cedula}')">Cobrar</button></td></tr>`).join('');
        } else tbody.innerHTML = '<tr><td colspan="4">🎉 Sin deudores</td></tr>';
    }

    async function cargarNotificaciones() {
        const data = await fetchAPI('getNotificaciones');
        const container = document.getElementById('listaNotificaciones');
        if (data.notificaciones?.length) {
            container.innerHTML = data.notificaciones.map(n => `<div class="card"><strong>${n.titulo}</strong><br>${n.mensaje}<br><small>${new Date(n.fecha).toLocaleString()}</small></div>`).join('');
        } else container.innerHTML = '<p>📭 Sin notificaciones</p>';
    }

    async function cargarProximos() {
        const data = await fetchAPI('getProximosPartidos');
        const container = document.getElementById('listaProximos');
        if (data.partidos?.length) {
            container.innerHTML = data.partidos.map(p => `<div class="card"><strong>📅 ${new Date(p.fecha).toLocaleString()}</strong><br>⚽ vs ${p.rival}<br>📍 ${p.lugar || 'Por definir'}</div>`).join('');
        } else container.innerHTML = '<p>⚽ No hay partidos</p>';
    }

    window.prepararCobro = (ced) => { document.getElementById('buscarCedula').value = ced; buscarDeudor(); };
    window.buscarDeudor = async () => {
        const ced = document.getElementById('buscarCedula').value;
        if (!ced) return;
        const data = await fetchAPI('obtenerJugador', { cedula: ced });
        if (data.ok) {
            document.getElementById('infoDeudor').innerHTML = `<div class="info-card">🧑 ${data.jugador.nombre1} ${data.jugador.apellidos}<br>💰 Deuda: $${data.jugador.deuda}</div>`;
            document.getElementById('formPago').style.display = 'block';
            document.getElementById('montoPago').value = data.jugador.deuda;
        }
    };
    window.registrarPago = async () => {
        const ced = document.getElementById('buscarCedula').value;
        const monto = parseFloat(document.getElementById('montoPago').value);
        const res = await fetchAPI('registrarPago', { cedula: ced, monto });
        if (res.ok) { alert('✅ Pago registrado'); cargarDeudores(); cargarJugadores(); document.getElementById('formPago').style.display = 'none'; document.getElementById('infoDeudor').innerHTML = ''; }
    };

    window.aprobar = async (ced) => { if(confirm('¿Aprobar?')){ await fetchAPI('aprobarJugador', { cedula: ced }); cargarPendientes(); cargarJugadores(); } };
    window.mostrarModalRechazo = (ced) => { currentCedulaRechazo = ced; document.getElementById('modalRechazo').style.display = 'flex'; };
    window.cerrarModalRechazo = () => { document.getElementById('modalRechazo').style.display = 'none'; document.getElementById('motivoRechazo').value = ''; };
    window.confirmarRechazo = async () => {
        const motivo = document.getElementById('motivoRechazo').value;
        if (!motivo) return alert('Ingrese un motivo');
        await fetchAPI('rechazarJugador', { cedula: currentCedulaRechazo, motivo });
        alert('❌ Jugador rechazado'); cargarPendientes(); cerrarModalRechazo();
    };

    window.publicarNotificacion = async () => {
        const titulo = document.getElementById('notiTitulo').value, mensaje = document.getElementById('notiMensaje').value, tipo = document.getElementById('notiTipo').value;
        if (!titulo || !mensaje) return alert('Complete los campos');
        await fetchAPI('publicarNotificacion', { titulo, mensaje, tipo });
        alert('✅ Publicado'); document.getElementById('notiTitulo').value = ''; document.getElementById('notiMensaje').value = ''; cargarNotificaciones();
    };

    window.guardarProximoPartido = async () => {
        const fecha = document.getElementById('proxFecha').value, rival = document.getElementById('proxRival').value, lugar = document.getElementById('proxLugar').value, observaciones = document.getElementById('proxObs').value;
        if (!fecha || !rival) return alert('Complete fecha y rival');
        await fetchAPI('guardarProximoPartido', { fecha, rival, lugar, observaciones });
        alert('✅ Guardado'); cargarProximos();
    };

    window.cargarJugadoresParaCalificar = async () => {
        const fecha = document.getElementById('fechaPartido').value, rival = document.getElementById('rivalPartido').value;
        if (!fecha || !rival) return alert('Complete fecha y rival');
        const data = await fetchAPI('getJugadoresAprobados');
        if (!data.jugadores?.length) return alert('No hay jugadores aprobados');
        document.getElementById('listaCalificaciones').innerHTML = `<div class="table-wrapper"><table><thead><tr><th>Jugador</th><th>Amarillas</th><th>Rojas</th><th>Goles</th><th>Puntualidad</th><th>Compañerismo</th><th>Respeto</th><th>Humildad</th></tr></thead><tbody>${data.jugadores.map(j => `<tr><td>${j.nombre}</td><td><input type="number" id="amarillas_${j.cedula}" value="0" min="0" max="2" style="width:70px"></td><td><input type="number" id="rojas_${j.cedula}" value="0" min="0" max="1" style="width:70px"></td><td><input type="number" id="goles_${j.cedula}" value="0" min="0" style="width:70px"></td><td><select id="punt_${j.cedula}">${[1,2,3,4,5].map(v=>`<option value="${v}">${v}</option>`).join('')}</select></td><td><select id="comp_${j.cedula}">${[1,2,3,4,5].map(v=>`<option value="${v}">${v}</option>`).join('')}</select></td><td><select id="resp_${j.cedula}">${[1,2,3,4,5].map(v=>`<option value="${v}">${v}</option>`).join('')}</select></td><td><select id="hum_${j.cedula}">${[1,2,3,4,5].map(v=>`<option value="${v}">${v}</option>`).join('')}</select></td></tr>`).join('')}</tbody></table></div>`;
    };

    window.guardarCalificaciones = async () => {
        const fecha = document.getElementById('fechaPartido').value, rival = document.getElementById('rivalPartido').value;
        const data = await fetchAPI('getJugadoresAprobados');
        if (!data.jugadores?.length) return;
        const cedulas = [], nombres = [], amarillas = [], rojas = [], goles = [], puntualidades = [], companerismos = [], respetos = [], humildades = [];
        for (const j of data.jugadores) {
            cedulas.push(j.cedula); nombres.push(j.nombre);
            amarillas.push(document.getElementById(`amarillas_${j.cedula}`)?.value || 0);
            rojas.push(document.getElementById(`rojas_${j.cedula}`)?.value || 0);
            goles.push(document.getElementById(`goles_${j.cedula}`)?.value || 0);
            puntualidades.push(document.getElementById(`punt_${j.cedula}`)?.value || 3);
            companerismos.push(document.getElementById(`comp_${j.cedula}`)?.value || 3);
            respetos.push(document.getElementById(`resp_${j.cedula}`)?.value || 3);
            humildades.push(document.getElementById(`hum_${j.cedula}`)?.value || 3);
        }
        const res = await fetchAPI('guardarPartido', { fecha, rival, cedulas: cedulas.join(','), nombres: nombres.join(','), amarillas: amarillas.join(','), rojas: rojas.join(','), goles: goles.join(','), puntualidades: puntualidades.join(','), companerismos: companerismos.join(','), respetos: respetos.join(','), humildades: humildades.join(',') });
        if (res.ok) alert('✅ Partido guardado');
        else alert('Error: ' + res.error);
    };

    function logout() { localStorage.removeItem('admin_auth'); location.reload(); }

    cargarPendientes(); cargarJugadores(); cargarDeudores(); cargarNotificaciones(); cargarProximos();
</script>
</body>
</html>
