<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Nápoles F.C. | Admin PRO</title>

<script src="https://cdn.tailwindcss.com"></script>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<link
href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Inter',sans-serif;

    background:#0f172a;

    color:white;

    overflow:hidden;
}

/* =========================
SIDEBAR
========================= */

.sidebar{

    width:280px;

    height:100vh;

    background:
    linear-gradient(
        180deg,
        #020617,
        #111827
    );

    border-right:
    1px solid rgba(255,255,255,.06);

    position:fixed;

    left:0;
    top:0;

    padding:24px;

    overflow-y:auto;
}

.logo{

    font-size:1.7rem;

    font-weight:800;

    color:#38bdf8;

    margin-bottom:40px;
}

.menu{

    display:flex;

    flex-direction:column;

    gap:12px;
}

.menu-btn{

    width:100%;

    border:none;

    background:none;

    color:#cbd5e1;

    padding:16px;

    border-radius:18px;

    display:flex;

    align-items:center;

    gap:14px;

    cursor:pointer;

    transition:.25s;

    font-weight:700;

    font-size:.95rem;
}

.menu-btn:hover{

    background:
    rgba(56,189,248,.12);

    color:white;
}

.menu-btn.active{

    background:
    linear-gradient(
        135deg,
        #0ea5e9,
        #0284c7
    );

    color:white;
}

/* =========================
MAIN
========================= */

.main{

    margin-left:280px;

    height:100vh;

    overflow-y:auto;

    padding:30px;
}

/* =========================
TOPBAR
========================= */

.topbar{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:30px;
}

.title{

    font-size:2rem;

    font-weight:800;
}

.admin-box{

    background:
    rgba(255,255,255,.06);

    padding:12px 18px;

    border-radius:16px;

    display:flex;

    align-items:center;

    gap:10px;

    font-weight:700;
}

/* =========================
CARDS
========================= */

.cards{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));

    gap:20px;

    margin-bottom:30px;
}

.card{

    background:
    linear-gradient(
        145deg,
        rgba(30,41,59,.95),
        rgba(15,23,42,.95)
    );

    border:
    1px solid rgba(255,255,255,.05);

    border-radius:24px;

    padding:24px;

    transition:.25s;
}

.card:hover{

    transform:translateY(-4px);

    border-color:
    rgba(56,189,248,.4);
}

.card h3{

    font-size:.9rem;

    color:#94a3b8;

    margin-bottom:12px;
}

.number{

    font-size:2rem;

    font-weight:800;

    color:#38bdf8;
}

/* =========================
SECTION
========================= */

.section{

    background:
    rgba(15,23,42,.95);

    border:
    1px solid rgba(255,255,255,.05);

    border-radius:28px;

    padding:24px;

    margin-bottom:30px;
}

.section-title{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:24px;
}

.section-title h2{

    font-size:1.3rem;

    font-weight:800;
}

/* =========================
TABLE
========================= */

.table-wrapper{

    overflow:auto;
}

table{

    width:100%;

    border-collapse:collapse;
}

th{

    background:
    rgba(255,255,255,.05);

    padding:14px;

    text-align:left;

    color:#94a3b8;

    font-size:.85rem;
}

td{

    padding:16px 14px;

    border-bottom:
    1px solid rgba(255,255,255,.05);
}

tr:hover{

    background:
    rgba(255,255,255,.03);
}

/* =========================
BUTTONS
========================= */

.btn{

    border:none;

    padding:10px 16px;

    border-radius:12px;

    cursor:pointer;

    font-weight:700;

    transition:.25s;
}

.btn:hover{
    transform:scale(1.04);
}

.btn-blue{

    background:#0ea5e9;

    color:white;
}

.btn-green{

    background:#10b981;

    color:white;
}

.btn-red{

    background:#ef4444;

    color:white;
}

/* =========================
FORMS
========================= */

.form-grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));

    gap:18px;
}

input{

    width:100%;

    height:52px;

    border:none;

    outline:none;

    border-radius:14px;

    background:
    rgba(255,255,255,.05);

    color:white;

    padding:0 16px;
}

input::placeholder{
    color:#64748b;
}

/* =========================
RESPONSIVE
========================= */

@media(max-width:900px){

    body{
        overflow:auto;
    }

    .sidebar{

        width:100%;

        height:auto;

        position:relative;
    }

    .main{
        margin-left:0;
    }
}

</style>

</head>

<body>

<!-- =========================
SIDEBAR
========================= -->

<div class="sidebar">

    <div class="logo">
        NÁPOLES F.C.
    </div>

    <div class="menu">

        <button
        class="menu-btn active"
        onclick="mostrarSeccion('dashboard', this)">

            <span class="material-symbols-outlined">
                dashboard
            </span>

            Dashboard

        </button>

        <button
        class="menu-btn"
        onclick="mostrarSeccion('jugadores', this)">

            <span class="material-symbols-outlined">
                groups
            </span>

            Jugadores

        </button>

        <button
        class="menu-btn"
        onclick="mostrarSeccion('partidos', this)">

            <span class="material-symbols-outlined">
                sports_soccer
            </span>

            Partidos

        </button>

        <button
        class="menu-btn"
        onclick="mostrarSeccion('rivales', this)">

            <span class="material-symbols-outlined">
                shield
            </span>

            Rivales

        </button>

        <button
        class="menu-btn"
        onclick="mostrarSeccion('finanzas', this)">

            <span class="material-symbols-outlined">
                payments
            </span>

            Finanzas

        </button>

        <button
        class="menu-btn"
        onclick="mostrarSeccion('uniformes', this)">

            <span class="material-symbols-outlined">
                inventory_2
            </span>

            Uniformes

        </button>

        <button
        class="menu-btn"
        onclick="mostrarSeccion('configuracion', this)">

            <span class="material-symbols-outlined">
                settings
            </span>

            Configuración

        </button>

    </div>

</div>

<!-- =========================
MAIN
========================= -->

<div class="main">

    <!-- TOPBAR -->

    <div class="topbar">

        <div
        class="title"
        id="tituloSeccion">

            Dashboard

        </div>

        <div class="admin-box">

            <span class="material-symbols-outlined">
                admin_panel_settings
            </span>

            Gata

        </div>

    </div>

    <!-- =========================
    DASHBOARD
    ========================= -->

    <div
    id="dashboard"
    class="content-section">

        <div class="cards">

            <div class="card">

                <h3>
                    Jugadores
                </h3>

                <div
                class="number"
                id="totalJugadores">

                    0

                </div>

            </div>

            <div class="card">

                <h3>
                    Aprobados
                </h3>

                <div
                class="number"
                id="totalAprobados">

                    0

                </div>

            </div>

            <div class="card">

                <h3>
                    Pendientes
                </h3>

                <div
                class="number"
                id="totalPendientes">

                    0

                </div>

            </div>

        </div>

    </div>

    <!-- =========================
    JUGADORES
    ========================= -->

    <div
    id="jugadores"
    class="content-section"
    style="display:none;">

        <div class="section">

            <div class="section-title">

                <h2>
                    Gestión de Jugadores
                </h2>

                <button
                class="btn btn-blue">

                    + Nuevo

                </button>

            </div>

            <input
            type="text"
            placeholder="Buscar jugador..."
            style="margin-bottom:20px;">

            <div class="table-wrapper">

                <table>

                    <thead>

                        <tr>

                            <th>
                                Cédula
                            </th>

                            <th>
                                Nombre
                            </th>

                            <th>
                                Dorsal
                            </th>

                            <th>
                                Estado
                            </th>

                            <th>
                                Acciones
                            </th>

                        </tr>

                    </thead>

                    <tbody id="tablaJugadores">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <!-- =========================
    PARTIDOS
    ========================= -->

    <div
    id="partidos"
    class="content-section"
    style="display:none;">

        <div class="section">

            <div class="section-title">

                <h2>
                    Programar Partido
                </h2>

            </div>

            <div class="form-grid">

                <input
                type="text"
                placeholder="Rival">

                <input
                type="date">

                <input
                type="time">

                <input
                type="text"
                placeholder="Estadio">

            </div>

            <div
            style="margin-top:20px;">

                <button
                class="btn btn-green">

                    Guardar Partido

                </button>

            </div>

        </div>

    </div>

    <!-- =========================
    RIVALES
    ========================= -->

    <div
    id="rivales"
    class="content-section"
    style="display:none;">

        <div class="section">

            <div class="section-title">

                <h2>
                    Rivales
                </h2>

            </div>

            <div class="form-grid">

                <input
                type="text"
                placeholder="Nombre rival">

                <input
                type="text"
                placeholder="Ciudad">

            </div>

            <div
            style="margin-top:20px;">

                <button
                class="btn btn-blue">

                    Agregar Rival

                </button>

            </div>

        </div>

    </div>

    <!-- =========================
    FINANZAS
    ========================= -->

    <div
    id="finanzas"
    class="content-section"
    style="display:none;">

        <div class="section">

            <div class="section-title">

                <h2>
                    Finanzas
                </h2>

            </div>

            <div class="cards">

                <div class="card">

                    <h3>
                        Ingresos
                    </h3>

                    <div class="number">

                        $0

                    </div>

                </div>

                <div class="card">

                    <h3>
                        Pendientes
                    </h3>

                    <div class="number">

                        $0

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- =========================
    UNIFORMES
    ========================= -->

    <div
    id="uniformes"
    class="content-section"
    style="display:none;">

        <div class="section">

            <div class="section-title">

                <h2>
                    Uniformes
                </h2>

            </div>

            <div class="cards">

                <div class="card">

                    <h3>
                        Entregados
                    </h3>

                    <div class="number">

                        0

                    </div>

                </div>

                <div class="card">

                    <h3>
                        Pendientes
                    </h3>

                    <div class="number">

                        0

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- =========================
    CONFIG
    ========================= -->

    <div
    id="configuracion"
    class="content-section"
    style="display:none;">

        <div class="section">

            <div class="section-title">

                <h2>
                    Configuración
                </h2>

            </div>

            <button
            class="btn btn-red"
            onclick="cerrarSesion()">

                Cerrar Sesión

            </button>

        </div>

    </div>

</div>

<!-- =========================
SCRIPT
========================= -->

<script src="./config.js"></script>

<script>

function mostrarSeccion(id, btn){

    const secciones =
    document.querySelectorAll(
    '.content-section'
    );

    secciones.forEach(sec => {

        sec.style.display =
        'none';

    });

    document.getElementById(id)
    .style.display = 'block';

    document.getElementById(
    'tituloSeccion'
    ).textContent =
    id.charAt(0).toUpperCase()
    + id.slice(1);

    document
    .querySelectorAll('.menu-btn')
    .forEach(b => {

        b.classList.remove(
        'active'
        );

    });

    btn.classList.add(
    'active'
    );
}

/* =========================
CERRAR SESIÓN
========================= */

function cerrarSesion(){

    localStorage.clear();

    window.location.href =
    './login.html';
}

/* =========================
CARGAR JUGADORES
========================= */

const tabla =
document.getElementById(
'tablaJugadores'
);

async function cargarJugadores(){

    try{

        const url =
`${CONFIG.URL_GAS}?action=getResumenJugadoresCompleto&t=${Date.now()}`;

        const response =
        await fetch(url);

        const data =
        await response.json();

        if(!data.ok){

            alert(
            'Error cargando jugadores'
            );

            return;
        }

        const jugadores =
        data.jugadores || [];

        document.getElementById(
        'totalJugadores'
        ).textContent =
        jugadores.length;

        let aprobados = 0;
        let pendientes = 0;

        tabla.innerHTML = '';

        jugadores.forEach(j => {

            if(
                j.inscripEstado ===
                'APROBADO'
            ){

                aprobados++;

            }else{

                pendientes++;
            }

            tabla.innerHTML += `

            <tr>

                <td>
                    ${j.cedula}
                </td>

                <td>
                    ${j.primerNombre}
                    ${j.apellidos}
                </td>

                <td>
                    ${j.dorsal || '-'}
                </td>

                <td>
                    ${j.inscripEstado}
                </td>

                <td>

                    <button
                    class="btn btn-green">

                        Aprobar

                    </button>

                    <button
                    class="btn btn-red">

                        Eliminar

                    </button>

                </td>

            </tr>

            `;
        });

        document.getElementById(
        'totalAprobados'
        ).textContent =
        aprobados;

        document.getElementById(
        'totalPendientes'
        ).textContent =
        pendientes;

    }catch(error){

        console.error(error);

        alert(
        'Error conectando con GAS'
        );
    }
}

cargarJugadores();

</script>

</body>

</html>
