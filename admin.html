<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Gata Admin - Nápoles F.C.</title>

<script src="https://cdn.tailwindcss.com"></script>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<link
href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
rel="stylesheet" />

<style>

*{
    font-family:'Inter',sans-serif;
    -webkit-tap-highlight-color:transparent;
}

body{
    background:#081120;
    color:white;
    overflow-x:hidden;
}

/* =====================================================
   FONDO
===================================================== */

.bg-glow{
    position:fixed;
    inset:0;
    z-index:-1;
    overflow:hidden;
}

.bg-glow::before,
.bg-glow::after{

    content:'';

    position:absolute;

    width:550px;
    height:550px;

    border-radius:50%;

    filter:blur(120px);

    opacity:.45;

    animation:moveGlow 12s infinite ease-in-out;
}

.bg-glow::before{
    background:#00d2ff;
    top:-200px;
    left:-150px;
}

.bg-glow::after{
    background:#7c3aed;
    bottom:-200px;
    right:-150px;
    animation-delay:6s;
}

@keyframes moveGlow{

    0%{
        transform:
        translate(0,0)
        scale(1);
    }

    50%{
        transform:
        translate(60px,50px)
        scale(1.15);
    }

    100%{
        transform:
        translate(0,0)
        scale(1);
    }
}

/* =====================================================
   GLASS
===================================================== */

.glass{

    background:
    rgba(12,18,35,.72);

    backdrop-filter:
    blur(18px);

    border:
    1px solid rgba(255,255,255,.08);
}

/* =====================================================
   PANTALLAS
===================================================== */

.screen{
    display:none;
}

.screen.active{
    display:block;
}

/* =====================================================
   SCROLL
===================================================== */

::-webkit-scrollbar{
    width:0;
    height:0;
}

</style>

</head>

<body>

<div class="bg-glow"></div>

<!-- =====================================================
     HOME
===================================================== -->

<section
id="homeScreen"
class="screen active min-h-screen pb-10">

    <!-- HEADER -->

    <div class="px-5 pt-6 pb-4">

        <div class="flex items-center justify-between">

            <div>

                <h1 class="text-3xl font-extrabold">
                    Gata Admin
                </h1>

                    Nápoles F.C.
                </p>

            </div>

            <button
                onclick="logout()"
                class="
                w-12
                h-12
                rounded-2xl
                glass
                flex

                justify-center

                    id="totalJugadores"

            </div>

            <div class="glass rounded-3xl p-5">

            </div>

        </div>

    </div>

    <!-- MENU -->

        <!-- JUGADORES -->

        <button
            onclick="openScreen('jugadoresScreen')"
            class="
            w-full
            glass
            rounded-3xl
            p-5
            flex
            items-center
            justify-between
            "
        >

            <div class="flex items-center gap-4">

                <div
                    class="
                    w-14
                    h-14
                    rounded-2xl
                    bg-cyan-500/20
                    flex
                    items-center
                    justify-center
                    "
                >
                    <span class="material-symbols-outlined text-cyan-300 text-3xl">
                        sports_soccer
                    </span>
                </div>

                <div class="text-left">

                    <h2 class="font-extrabold text-lg">
                        Jugadores
                    </h2>

                    <p
                        id="jugadoresPendientesText"
                        class="text-sm text-gray-300"
                    >
                        0 pendientes
                    </p>

                </div>

            </div>

            <span class="material-symbols-outlined text-3xl">
                chevron_right
            </span>

        </button>

        <!-- PARTIDOS -->

        <button
            onclick="openScreen('partidosScreen')"
            class="
            w-full
            glass
            rounded-3xl
            p-5
            flex
            items-center
            justify-between
            "
        >

            <div class="flex items-center gap-4">

                <div
                    class="
                    w-14
                    h-14
                    rounded-2xl
                    bg-purple-500/20
                    flex
                    items-center
                    justify-center
                    "
                >
                    <span class="material-symbols-outlined text-purple-300 text-3xl">
                        shield
                    </span>
                </div>

                <div class="text-left">

                    <h2 class="font-extrabold text-lg">
                        Partidos
                    </h2>

                    <p class="text-sm text-gray-300">
                        Gestionar partidos
                    </p>

                </div>

            </div>

            <span class="material-symbols-outlined text-3xl">
                chevron_right
            </span>

        </button>

        <!-- RIVALES -->

        <button
            onclick="openScreen('rivalesScreen')"
            class="
            w-full
            glass
            rounded-3xl
            p-5
            flex
            items-center
            justify-between
            "
        >

            <div class="flex items-center gap-4">

                <div
                    class="
                    w-14
                    h-14
                    rounded-2xl
                    bg-orange-500/20
                    flex
                    items-center
                    justify-center
                    "
                >
                    <span class="material-symbols-outlined text-orange-300 text-3xl">
                        groups
                    </span>
                </div>

                <div class="text-left">

                    <h2 class="font-extrabold text-lg">
                        Rivales
                    </h2>

                    <p class="text-sm text-gray-300">
                        Equipos registrados
                    </p>

                </div>

            </div>

            <span class="material-symbols-outlined text-3xl">
                chevron_right
            </span>

        </button>

        <!-- UNIFORMES -->

        <button
            onclick="openScreen('uniformesScreen')"
            class="
            w-full
            glass
            rounded-3xl
            p-5
            flex
            items-center
            justify-between
            "
        >

            <div class="flex items-center gap-4">

                <div
                    class="
                    w-14
                    h-14
                    rounded-2xl
                    bg-pink-500/20
                    flex
                    items-center
                    justify-center
                    "
                >
                    <span class="material-symbols-outlined text-pink-300 text-3xl">
                        inventory_2
                    </span>
                </div>

                <div class="text-left">

                    <h2 class="font-extrabold text-lg">
                        Uniformes
                    </h2>

                    <p class="text-sm text-gray-300">
                        Estado de entrega
                    </p>

                </div>

            </div>

            <span class="material-symbols-outlined text-3xl">
                chevron_right
            </span>

        </button>

        <!-- FINANZAS -->

        <button
            onclick="openScreen('finanzasScreen')"
            class="
            w-full
            glass
            rounded-3xl
            p-5
            flex
            items-center
            justify-between
            "
        >

            <div class="flex items-center gap-4">

                <div
                    class="
                    w-14
                    h-14
                    rounded-2xl
                    bg-green-500/20
                    flex
                    items-center
                    justify-center
                    "
                >
                    <span class="material-symbols-outlined text-green-300 text-3xl">
                        payments
                    </span>
                </div>

                <div class="text-left">

                    <h2 class="font-extrabold text-lg">
                        Finanzas
                    </h2>

                    <p class="text-sm text-gray-300">
                        Pagos y gastos
                    </p>

                </div>

            </div>

            <span class="material-symbols-outlined text-3xl">
                chevron_right
            </span>

        </button>

    </div>

</section>

<!-- =====================================================
     JUGADORES
===================================================== -->

<section
id="jugadoresScreen"
class="screen min-h-screen pb-10">

    <div
        class="
        sticky
        top-0
        z-40
        glass
        border-b
        border-white/10
        "
    >

        <div class="px-5 py-4 flex items-center gap-4">

            <button
                onclick="backHome()"
                class="
                w-11
                h-11
                rounded-2xl
                bg-white/10
                flex
                items-center
                justify-center
                "
            >
                <span class="material-symbols-outlined">
                    arrow_back
                </span>
            </button>

            <h2 class="text-2xl font-extrabold">
                Jugadores
            </h2>

        </div>

    </div>

    <div class="px-5 pt-5">

        <input
            type="text"
            id="searchJugador"
            placeholder="Buscar jugador..."
            class="
            w-full
            glass
            rounded-2xl
            px-5
            py-4
            outline-none
            "
        >

    </div>

    <div
        id="listaJugadores"
        class="
        px-5
        pt-5
        space-y-4
        "
    ></div>

</section>

<!-- =====================================================
     PARTIDOS
===================================================== -->

<section
id="partidosScreen"
class="screen min-h-screen pb-10">

    <div class="sticky top-0 z-40 glass border-b border-white/10">

        <div class="px-5 py-4 flex items-center gap-4">

            <button
                onclick="backHome()"
                class="
                w-11
                h-11
                rounded-2xl
                bg-white/10
                flex
                items-center
                justify-center
                "
            >
                <span class="material-symbols-outlined">
                    arrow_back
                </span>
            </button>

            <h2 class="text-2xl font-extrabold">
                Partidos
            </h2>

        </div>

    </div>

    <div class="p-5">

        <div class="glass rounded-3xl p-5 space-y-4">

            <input
                type="text"
                id="partidoRival"
                placeholder="Nombre rival"
                class="
                w-full
                bg-black/20
                rounded-2xl
                p-4
                outline-none
                "
            >

            <input
                type="date"
                id="partidoFecha"
                class="
                w-full
                bg-black/20
                rounded-2xl
                p-4
                outline-none
                "
            >

            <button
                onclick="guardarPartido()"
                class="
                w-full
                py-4
                rounded-2xl
                bg-cyan-500
                font-extrabold
                "
            >
                Guardar Partido
            </button>

        </div>

    </div>

</section>

<!-- =====================================================
     RIVALES
===================================================== -->

<section
id="rivalesScreen"
class="screen min-h-screen pb-10">

    <div class="sticky top-0 z-40 glass border-b border-white/10">

        <div class="px-5 py-4 flex items-center gap-4">

            <button
                onclick="backHome()"
                class="
                w-11
                h-11
                rounded-2xl
                bg-white/10
                flex
                items-center
                justify-center
                "
            >
                <span class="material-symbols-outlined">
                    arrow_back
                </span>
            </button>

            <h2 class="text-2xl font-extrabold">
                Rivales
            </h2>

        </div>

    </div>

</section>

<!-- =====================================================
     UNIFORMES
===================================================== -->

<section
id="uniformesScreen"
class="screen min-h-screen pb-10">

    <div class="sticky top-0 z-40 glass border-b border-white/10">

        <div class="px-5 py-4 flex items-center gap-4">

            <button
                onclick="backHome()"
                class="
                w-11
                h-11
                rounded-2xl
                bg-white/10
                flex
                items-center
                justify-center
                "
            >
                <span class="material-symbols-outlined">
                    arrow_back
                </span>
            </button>

            <h2 class="text-2xl font-extrabold">
                Uniformes
            </h2>

        </div>

    </div>

</section>

<!-- =====================================================
     FINANZAS
===================================================== -->

<section
id="finanzasScreen"
class="screen min-h-screen pb-10">

    <div class="sticky top-0 z-40 glass border-b border-white/10">

        <div class="px-5 py-4 flex items-center gap-4">

            <button
                onclick="backHome()"
                class="
                w-11
                h-11
                rounded-2xl
                bg-white/10
                flex
                items-center
                justify-center
                "
            >
                <span class="material-symbols-outlined">
                    arrow_back
                </span>
            </button>

            <h2 class="text-2xl font-extrabold">
                Finanzas
            </h2>

        </div>

    </div>

</section>

<script src="./config.js"></script>

<script>

// =====================================================
// SEGURIDAD
// =====================================================

if(
    localStorage.getItem('admin_activo')
    !== 'true'
){
    window.location.href =
    './login.html';
}

// =====================================================
// CAMBIO PANTALLAS
// =====================================================

function openScreen(id){

    document
    .querySelectorAll('.screen')
    .forEach(el=>{

        el.classList.remove('active');
    });

    document
    .getElementById(id)
    .classList.add('active');

    window.scrollTo(0,0);
}

function backHome(){

    document
    .querySelectorAll('.screen')
    .forEach(el=>{

        el.classList.remove('active');
    });

    document
    .getElementById('homeScreen')
    .classList.add('active');

    window.scrollTo(0,0);
}

// =====================================================
// LOGOUT
// =====================================================

function logout(){

    localStorage.removeItem(
        'admin_activo'
    );

    window.location.href =
    './login.html';
}

// =====================================================
// CARGAR JUGADORES
// =====================================================

async function cargarJugadores(){

    try{

        const response =
        await fetch(
        `${CONFIG.URL_GAS}?action=getResumenJugadoresCompleto&t=${Date.now()}`
        );

        const data =
        await response.json();

        if(!data.ok) return;

        const jugadores =
        data.jugadores || [];

        renderJugadores(
            jugadores
        );

        document
        .getElementById('totalJugadores')
        .textContent =
        jugadores.length;

        const pendientes =
        jugadores.filter(j=>
            j.inscripEstado !== 'APROBADO'
        ).length;

        document
        .getElementById('pendientes')
        .textContent =
        pendientes;

        document
        .getElementById('jugadoresPendientesText')
        .textContent =
        `${pendientes} pendientes`;

    }catch(err){

        console.error(err);
    }
}

// =====================================================
// RENDER JUGADORES
// =====================================================

function renderJugadores(jugadores){

    const cont =
    document.getElementById(
        'listaJugadores'
    );

    cont.innerHTML='';

    jugadores.forEach(j=>{

        cont.innerHTML += `

        <div class="
        player-card
        glass
        rounded-3xl
        p-5
        ">

            <div class="
            flex
            justify-between
            items-center
            gap-3
            ">

                <div>

                    <h3 class="
                    text-lg
                    font-extrabold
                    ">
                        ${j.primerNombre || ''}
                        ${j.apellidos || ''}
                    </h3>

                    <p class="
                    text-cyan-300
                    text-sm
                    mt-1
                    ">
                        #${j.dorsal || '--'}
                    </p>

                    <p class="
                    text-gray-400
                    text-xs
                    mt-1
                    ">
                        ${j.cedula}
                    </p>

                </div>

                <div class="text-right">

                    <span class="
                    px-3
                    py-1
                    rounded-full
                    text-xs
                    font-bold
                    ${
                        j.inscripEstado === 'APROBADO'
                        ?
                        'bg-green-500/20 text-green-300'
                        :
                        'bg-yellow-500/20 text-yellow-300'
                    }
                    ">
                        ${j.inscripEstado}
                    </span>

                    <div class="
                    flex
                    gap-2
                    mt-3
                    justify-end
                    ">

                        <button
                            onclick="
                            aprobarJugador('${j.cedula}')
                            "
                            class="
                            w-10
                            h-10
                            rounded-2xl
                            bg-green-500/20
                            "
                        >
                            ✅
                        </button>

                        <button
                            onclick="
                            editarJugador('${j.cedula}')
                            "
                            class="
                            w-10
                            h-10
                            rounded-2xl
                            bg-cyan-500/20
                            "
                        >
                            ✏️
                        </button>

                    </div>

                </div>

            </div>

        </div>

        `;
    });
}

// =====================================================
// BUSCADOR
// =====================================================

document
.getElementById('searchJugador')
.addEventListener('input',e=>{

    const val =
    e.target.value.toLowerCase();

    document
    .querySelectorAll('.player-card')
    .forEach(card=>{

        card.style.display =
        card.innerText
        .toLowerCase()
        .includes(val)
        ?
        'block'
        :
        'none';
    });
});

// =====================================================
// ACCIONES
// =====================================================

function aprobarJugador(cedula){

    alert(
        'Aprobar jugador: '
        + cedula
    );
}

function editarJugador(cedula){

    alert(
        'Editar jugador: '
        + cedula
    );
}

function guardarPartido(){

    const rival =
    document.getElementById(
        'partidoRival'
    ).value;

    alert(
        'Partido guardado vs '
        + rival
    );
}

// =====================================================
// INIT
// =====================================================

cargarJugadores();

</script>

</body>
</html>
