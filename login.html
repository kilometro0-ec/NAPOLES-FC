<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nápoles F.C. - Acceso Jugadores</title>
    
    <!-- Configuración PWA e iOS -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Nápoles FC">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1165/1165187.png">
    <meta name="theme-color" content="#020c1a">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00d2ff;
            --primary-dark: #008f9b;
            --accent: #FFD700;
            --bg-dark: #020c1a;
            --glass: rgba(12, 25, 45, 0.7);
            --admin-glow: rgba(139, 92, 246, 0.4);
            --admin-border: #a78bfa;
            --admin-bg-morado: rgba(139, 92, 246, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(0, 210, 255, 0.15), transparent 50%),
                linear-gradient(rgba(2, 12, 26, 0.8), rgba(2, 12, 26, 0.8)),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%2300d2ff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            color: white;
            overflow-x: hidden;
        }

        body.admin-mode-body {
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(139, 92, 246, 0.2), transparent 55%),
                linear-gradient(rgba(2, 12, 26, 0.85), rgba(2, 12, 26, 0.85));
        }

        body.admin-mode-body .login-card {
            border-color: var(--admin-border);
            box-shadow: 0 0 18px rgba(139, 92, 246, 0.5), 0 25px 50px -12px black;
            background: rgba(18, 25, 55, 0.75);
        }

        body.admin-mode-body .logo-area h1 {
            background: linear-gradient(to right, #e9d5ff, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
        }

        body.admin-mode-body .input-group label {
            color: #c084fc;
        }

        body.admin-mode-body .btn-submit {
            background: linear-gradient(135deg, #8b5cf6, #a78bfa);
        }

        .login-card {
            max-width: 420px;
            width: 100%;
            background: var(--glass);
            backdrop-filter: blur(20px) saturate(180%);
            border-radius: 2.5rem;
            border: 1px solid rgba(0, 210, 255, 0.4);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3), 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 3rem 2.5rem;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo-area h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .input-group {
            margin-bottom: 2rem;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        input {
            width: 100%;
            padding: 1.2rem;
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.2rem;
            color: white;
            font-size: 1.3rem;
            font-weight: 600;
            text-align: center;
            letter-spacing: 4px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.9);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
        }

        input.admin-mode {
            background: var(--admin-bg-morado);
            border-color: var(--admin-border);
            color: #f0e6ff;
            letter-spacing: 2px;
            box-shadow: 0 0 12px rgba(139, 92, 246, 0.4);
        }

        .btn-submit {
            width: 100%;
            padding: 1.2rem;
            border-radius: 1.2rem;
            border: none;
            background: linear-gradient(135deg, var(--primary-dark) 0%, #00d2ff 100%);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 0.5rem;
        }

        .btn-submit:disabled {
            background: #1e293b;
            color: #475569;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .footer-links {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.9rem;
        }

        .footer-links a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 700;
        }

        .btn-download {
            background: rgba(0, 210, 255, 0.15);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 0.7rem 1.2rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1.2rem;
            display: inline-block;
        }

        .toast-message {
            background: rgba(0, 0, 0, 0.8);
            border-left: 4px solid var(--primary);
            padding: 0.8rem 1rem;
            border-radius: 0.8rem;
            margin-top: 1rem;
            font-size: 0.8rem;
            text-align: left;
            word-break: break-word;
            display: none;
        }

        .toast-message.error {
            border-left-color: #ef4444;
            background: rgba(239, 68, 68, 0.2);
            color: #fecaca;
        }

        .toast-message.success {
            border-left-color: #10b981;
            background: rgba(16, 185, 129, 0.2);
            color: #a7f3d0;
        }

        .toast-message.info {
            border-left-color: var(--primary);
            background: rgba(0, 210, 255, 0.1);
            color: #bae6fd;
        }

        .debug-panel {
            margin-top: 1.5rem;
            padding: 0.8rem;
            background: rgba(0,0,0,0.5);
            border-radius: 1rem;
            font-size: 0.7rem;
            text-align: center;
        }

        .debug-panel button {
            background: none;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 0.4rem 0.8rem;
            border-radius: 1rem;
            cursor: pointer;
            margin: 0.2rem;
        }

        .debug-panel pre {
            background: #000;
            padding: 0.5rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            font-size: 0.7rem;
            margin-top: 0.5rem;
            display: none;
            text-align: left;
        }
        .debug-panel button.warning {
            border-color: #f59e0b;
            color: #f59e0b;
        }
    </style>
</head>
<body>

<div class="login-card">

    <div class="logo-area">
        <h1>NÁPOLES F.C.</h1>
        <p>Panel de Control de Jugadores</p>
    </div>

    <div class="input-group">
        <label>Número de Cédula</label>
        <input type="text" id="loginCedula" maxlength="20" placeholder="0000000000" inputmode="text" autocomplete="off">
    </div>

    <button id="btnLogin" class="btn-submit" disabled>Iniciar Sesión</button>

    <div id="toast" class="toast-message"></div>

    <div class="footer-links">
        ¿Eres nuevo en el club?<br><br>
        <a href="registro.html">CREAR CUENTA NUEVA ✨</a>
        <div id="containerDownload">
            <span id="manualDownloadBtn" class="btn-download">📲 DESCARGAR APK OFICIAL</span>
        </div>
    </div>

    <!-- Panel de depuración -->
    <div class="debug-panel">
        <button id="btnVerLocalStorage">🔍 Ver localStorage</button>
        <button id="btnLimpiarSession">🗑️ Limpiar sesión</button>
        <button id="btnIrPerfil" style="background:#00d2ff20;">➡️ Ir a perfil manualmente</button>
        <button id="btnDesactivarSW" class="warning">⚠️ Desactivar Service Worker</button>
        <pre id="localStorageContent"></pre>
        <div style="margin-top: 6px; color:#aaa;">✅ No hay recargas automáticas. Los errores permanecen visibles.</div>
    </div>

</div>

<script src="config.js"></script>

<script>
// ============================
// EVITAR RECARGAS ACCIDENTALES
// ============================
// Prevenir que el usuario recargue con F5 (opcional, pero solo para depuración)
window.addEventListener('keydown', function(e) {
    if (e.key === 'F5' || (e.ctrlKey && e.key === 'r')) {
        e.preventDefault();
        showToast('⚠️ Recarga manual deshabilitada para depuración. Usa el botón de recargar del navegador si es necesario.', 'error');
    }
});

// ============================
// TOAST PERSISTENTE (no se borra con recargas)
// ============================
function showToast(message, type = 'info') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = `toast-message ${type}`;
    toast.style.display = 'block';
    console.log(`[${type.toUpperCase()}] ${message}`);
    
    // Guardar el último mensaje en sessionStorage por si la página se recarga
    sessionStorage.setItem('lastToast', JSON.stringify({message, type, timestamp: Date.now()}));
}

// Restaurar último toast si hubo recarga
const lastToast = sessionStorage.getItem('lastToast');
if (lastToast) {
    try {
        const {message, type} = JSON.parse(lastToast);
        showToast(message, type);
    } catch(e) {}
}

// ============================
// CONFIGURACIÓN Y DEPURACIÓN
// ============================
if (typeof CONFIG === 'undefined') {
    showToast('❌ ERROR CRÍTICO: config.js no cargado.', 'error');
} else if (!CONFIG.URL_GAS) {
    showToast('❌ ERROR: CONFIG.URL_GAS no definida.', 'error');
} else {
    console.log('✅ config.js:', CONFIG);
}

// Elementos
const cedulaInput = document.getElementById('loginCedula');
const btnLogin = document.getElementById('btnLogin');
const bodyElem = document.body;
const ADMIN_SECRET = "GataFiera54321";
const ADMIN_COLOR_TRIGGER = "Gata";

function actualizarModoVisual() {
    const valor = cedulaInput.value.trim();
    btnLogin.disabled = valor === "";
    if (valor.includes(ADMIN_COLOR_TRIGGER)) {
        bodyElem.classList.add('admin-mode-body');
        cedulaInput.classList.add('admin-mode');
    } else {
        bodyElem.classList.remove('admin-mode-body');
        cedulaInput.classList.remove('admin-mode');
    }
}
cedulaInput.addEventListener('input', () => {
    actualizarModoVisual();
    const toast = document.getElementById('toast');
    toast.style.display = 'none';
    sessionStorage.removeItem('lastToast');
});

// Botones de depuración
document.getElementById('btnVerLocalStorage').addEventListener('click', () => {
    const pre = document.getElementById('localStorageContent');
    const session = localStorage.getItem('jugador_actual');
    if (session) {
        try {
            const parsed = JSON.parse(session);
            pre.textContent = JSON.stringify(parsed, null, 2);
        } catch(e) {
            pre.textContent = `Error parse: ${e.message}\nRaw: ${session}`;
        }
    } else {
        pre.textContent = 'No hay sesión (jugador_actual)';
    }
    pre.style.display = 'block';
    setTimeout(() => pre.style.display = 'none', 10000);
});

document.getElementById('btnLimpiarSession').addEventListener('click', () => {
    localStorage.removeItem('jugador_actual');
    showToast('🗑️ Sesión eliminada', 'info');
    document.getElementById('localStorageContent').style.display = 'none';
});

document.getElementById('btnIrPerfil').addEventListener('click', () => {
    const session = localStorage.getItem('jugador_actual');
    if (session) {
        showToast('Redirigiendo a perfil.html...', 'info');
        window.location.href = 'perfil.html';
    } else {
        showToast('❌ No hay sesión activa. Inicia sesión primero.', 'error');
    }
});

// Desactivar Service Worker (forzar recarga sin él)
document.getElementById('btnDesactivarSW').addEventListener('click', async () => {
    if ('serviceWorker' in navigator) {
        const registrations = await navigator.serviceWorker.getRegistrations();
        for (let registration of registrations) {
            await registration.unregister();
            console.log('SW desregistrado:', registration);
        }
        showToast('✅ Service Worker desactivado. Recarga la página para aplicar cambios.', 'success');
        setTimeout(() => location.reload(), 1500);
    } else {
        showToast('No hay Service Worker activo.', 'info');
    }
});

// ============================
// LOGIN PRINCIPAL (SIN RECARGAS)
// ============================
btnLogin.addEventListener('click', async () => {
    const valorIngresado = cedulaInput.value.trim();
    console.log('Login para:', valorIngresado);

    if (valorIngresado === ADMIN_SECRET) {
        localStorage.setItem('admin_session', 'true');
        showToast('✅ Acceso ADMIN, redirigiendo...', 'success');
        setTimeout(() => window.location.href = 'admin.html', 500);
        return;
    }

    if (!/^\d{10}$/.test(valorIngresado)) {
        showToast('❌ Cédula inválida – 10 dígitos', 'error');
        return;
    }

    btnLogin.disabled = true;
    const originalText = btnLogin.innerText;
    btnLogin.innerText = 'VERIFICANDO...';
    showToast('⏳ Verificando cédula...', 'info');

    try {
        const url = `${CONFIG.URL_GAS}?action=validarRegistro&cedula=${encodeURIComponent(valorIngresado)}&t=${Date.now()}`;
        const resp = await fetch(url);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        console.log('Respuesta:', data);

        if (data.success === false) {
            showToast(`⚠️ Error servidor: ${data.error}`, 'error');
            return;
        }

        if (data.cedulaExiste === true) {
            const estadoRaw = data.estado || '';
            const estadoNorm = estadoRaw.toString().trim().toUpperCase();
            if (estadoNorm === 'APROBADO') {
                if (!data.datosJugador) {
                    showToast('⚠️ Datos de jugador no recibidos', 'error');
                    return;
                }
                const sesion = {
                    ...data.datosJugador,
                    cedula: valorIngresado,
                    loginTime: Date.now()
                };
                localStorage.setItem('jugador_actual', JSON.stringify(sesion));
                const comprobacion = localStorage.getItem('jugador_actual');
                if (!comprobacion) throw new Error('No se pudo guardar sesión');
                showToast('✅ Sesión guardada. Redirigiendo al perfil...', 'success');
                setTimeout(() => {
                    window.location.href = 'perfil.html';
                }, 800);
                return;
            } else {
                showToast(`⏳ Estado actual: "${estadoRaw}". Se requiere APROBADO.`, 'error');
                return;
            }
        } else if (data.cedulaExiste === false) {
            showToast('❌ Cédula no registrada.', 'error');
            return;
        } else {
            showToast('⚠️ Respuesta inesperada del servidor.', 'error');
        }
    } catch (error) {
        console.error(error);
        showToast(`🔌 Error: ${error.message}`, 'error');
    } finally {
        btnLogin.disabled = false;
        btnLogin.innerText = originalText;
    }
});

cedulaInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter' && !btnLogin.disabled) btnLogin.click();
});

actualizarModoVisual();

// ============================
// PWA (instalación, sin recargas)
// ============================
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    const manualBtn = document.getElementById('manualDownloadBtn');
    if (manualBtn) {
        manualBtn.innerHTML = "👕 INSTALAR APP";
        manualBtn.style.background = "linear-gradient(135deg,#FFD700,#B8860B)";
        manualBtn.style.color = "#000";
    }
});
document.getElementById('manualDownloadBtn')?.addEventListener('click', async () => {
    if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') document.getElementById('containerDownload').style.display = 'none';
        deferredPrompt = null;
    } else {
        alert("Abre el menú del navegador y selecciona 'Instalar app'");
    }
});

// No registrar Service Worker aquí para evitar recargas inesperadas
// Si quieres mantenerlo, comenta la siguiente línea:
// if ('serviceWorker' in navigator) { ... }
</script>
</body>
</html>
