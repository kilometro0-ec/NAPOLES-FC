<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nápoles F.C. - Acceso Jugadores</title>
    
    <!-- Configuración PWA e iOS -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Nápoles FC">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1165/1165187.png">
    <meta name="theme-color" content="#020c1a">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00d2ff;
            --primary-dark: #008f9b;
            --accent: #FFD700;
            --bg-dark: #020c1a;
            --glass: rgba(12, 25, 45, 0.7);
            --admin-glow: rgba(139, 92, 246, 0.4);
            --admin-border: #a78bfa;
            --admin-bg-morado: rgba(139, 92, 246, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(0, 210, 255, 0.15), transparent 50%),
                linear-gradient(rgba(2, 12, 26, 0.8), rgba(2, 12, 26, 0.8)),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%2300d2ff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            color: white;
            overflow-x: hidden;
            transition: all 0.3s ease;
        }

        body.admin-mode-body {
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(139, 92, 246, 0.2), transparent 55%),
                linear-gradient(rgba(2, 12, 26, 0.85), rgba(2, 12, 26, 0.85));
        }

        body.admin-mode-body .login-card {
            border-color: var(--admin-border);
            box-shadow: 0 0 18px rgba(139, 92, 246, 0.5), 0 25px 50px -12px black;
            background: rgba(18, 25, 55, 0.75);
        }

        body.admin-mode-body .logo-area h1 {
            background: linear-gradient(to right, #e9d5ff, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
        }

        body.admin-mode-body .input-group label {
            color: #c084fc;
        }

        body.admin-mode-body .btn-submit {
            background: linear-gradient(135deg, #8b5cf6, #a78bfa);
        }

        .login-card {
            max-width: 420px;
            width: 100%;
            background: var(--glass);
            backdrop-filter: blur(20px) saturate(180%);
            border-radius: 2.5rem;
            border: 1px solid rgba(0, 210, 255, 0.4);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3), 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 3rem 2.5rem;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo-area h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .input-group {
            margin-bottom: 2rem;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        input {
            width: 100%;
            padding: 1.2rem;
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.2rem;
            color: white;
            font-size: 1.3rem;
            font-weight: 600;
            text-align: center;
            letter-spacing: 4px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.9);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
        }

        input.admin-mode {
            background: var(--admin-bg-morado);
            border-color: var(--admin-border);
            color: #f0e6ff;
            letter-spacing: 2px;
            box-shadow: 0 0 12px rgba(139, 92, 246, 0.4);
        }

        .btn-submit {
            width: 100%;
            padding: 1.2rem;
            border-radius: 1.2rem;
            border: none;
            background: linear-gradient(135deg, var(--primary-dark) 0%, #00d2ff 100%);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 0.5rem;
        }

        .btn-submit:disabled {
            background: #1e293b;
            color: #475569;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .footer-links {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.9rem;
        }

        .footer-links a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 700;
        }

        .btn-download {
            background: rgba(0, 210, 255, 0.15);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 0.7rem 1.2rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1.2rem;
            display: inline-block;
        }

        .error-toast {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            padding: 1rem;
            border-radius: 1rem;
            margin-top: 1.5rem;
            display: none;
            text-align: center;
            font-size: 0.85rem;
        }

        @media (display-mode: standalone) {
            #containerDownload {
                display: none !important;
            }
        }
    </style>
</head>
<body>

<div class="login-card">

    <div class="logo-area">
        <h1>NÁPOLES F.C.</h1>
        <p>Panel de Control de Jugadores</p>
    </div>

    <div class="input-group">
        <label>Número de Cédula</label>

        <input
            type="text"
            id="loginCedula"
            maxlength="20"
            placeholder="0000000000"
            inputmode="text"
            autocomplete="off"
        >
    </div>

    <button id="btnLogin" class="btn-submit" disabled>
        Iniciar Sesión
    </button>

    <div id="mensajeError" class="error-toast"></div>

    <div class="footer-links">

        ¿Eres nuevo en el club?
        <br><br>

        <a href="registro.html">
            CREAR CUENTA NUEVA ✨
        </a>

        <div id="containerDownload">
            <span id="manualDownloadBtn" class="btn-download">
                📲 DESCARGAR APK OFICIAL
            </span>
        </div>

    </div>

</div>

<script src="config.js"></script>

<script>

if(typeof CONFIG === 'undefined'){
    alert('CONFIG.JS NO CARGADO');
}

const cedulaInput = document.getElementById('loginCedula');
const btnLogin = document.getElementById('btnLogin');
const errorDiv = document.getElementById('mensajeError');
const manualBtn = document.getElementById('manualDownloadBtn');
const containerDownload = document.getElementById('containerDownload');
const bodyElem = document.body;

const ADMIN_SECRET = "GataFiera54321";
const ADMIN_COLOR_TRIGGER = "Gata";


// ============================
// MODO VISUAL ADMIN
// ============================

function actualizarModoVisual(){

    const valor = cedulaInput.value.trim();

    btnLogin.disabled = valor === "";

    if(valor.includes(ADMIN_COLOR_TRIGGER)){

        bodyElem.classList.add('admin-mode-body');
        cedulaInput.classList.add('admin-mode');

    }else{

        bodyElem.classList.remove('admin-mode-body');
        cedulaInput.classList.remove('admin-mode');

    }
}

cedulaInput.addEventListener('input', () => {

    actualizarModoVisual();

    errorDiv.style.display = 'none';

});


// ============================
// LOGIN
// ============================

btnLogin.addEventListener('click', async () => {

    const valorIngresado = cedulaInput.value.trim();

    // ADMIN
    if(valorIngresado === ADMIN_SECRET){

        localStorage.setItem('admin_session', 'true');

        window.location.href = 'admin.html';

        return;
    }

    // VALIDAR CÉDULA
    if(!/^\d{10}$/.test(valorIngresado)){

        mostrarError('❌ Cédula inválida');

        return;
    }

    btnLogin.disabled = true;
    btnLogin.innerText = 'VERIFICANDO...';

    try{

        const URL =
        `${CONFIG.URL_GAS}?action=validarRegistro&cedula=${valorIngresado}`;

        const respuesta = await fetch(URL);

        if(!respuesta.ok){
            throw new Error('Servidor no disponible');
        }

        const data = await respuesta.json();

        console.log(data);

        // ============================
        // SI EXISTE
        // ============================

        if(
            data.cedulaExiste === true &&
            data.estado === "APROBADO"
        ){

            localStorage.setItem(
                'jugador_actual',
                JSON.stringify({
                    ...data.datosJugador,
                    cedula: valorIngresado,
                    loginTime: Date.now()
                })
            );

            window.location.href = 'perfil.html';

            return;
        }

        // NO EXISTE
        if(data.cedulaExiste === false){

            mostrarError('❌ Cédula no registrada');

            return;
        }

        // PENDIENTE
        if(data.estado !== "APROBADO"){

            mostrarError(
                '⏳ Cuenta pendiente de aprobación'
            );

            return;
        }

        mostrarError('⚠️ Error inesperado');

    }catch(error){

        console.error(error);

        mostrarError('🔌 Error de conexión');

    }finally{

        btnLogin.disabled = false;

        btnLogin.innerText = 'INICIAR SESIÓN';

        actualizarModoVisual();

    }

});


// ============================
// ERROR
// ============================

function mostrarError(msj){

    errorDiv.innerText = msj;

    errorDiv.style.display = 'block';

    setTimeout(() => {

        errorDiv.style.display = 'none';

    }, 5000);
}


// ============================
// ENTER PARA LOGIN
// ============================

cedulaInput.addEventListener('keypress', (e) => {

    if(e.key === 'Enter' && !btnLogin.disabled){

        btnLogin.click();

    }

});


// ============================
// INICIALIZAR
// ============================

actualizarModoVisual();


// ============================
// PWA
// ============================

let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {

    e.preventDefault();

    deferredPrompt = e;

    manualBtn.innerHTML = "👕 INSTALAR APP";

    manualBtn.style.background =
    "linear-gradient(135deg,#FFD700,#B8860B)";

    manualBtn.style.color = "#000";

});

manualBtn.addEventListener('click', async () => {

    if(deferredPrompt){

        deferredPrompt.prompt();

        const { outcome } =
        await deferredPrompt.userChoice;

        if(outcome === 'accepted'){

            containerDownload.style.display = 'none';

        }

        deferredPrompt = null;

    }else{

        alert(
            "⚽ Abre el menú del navegador y selecciona INSTALAR APP"
        );

    }

});


// ============================
// SERVICE WORKER
// ============================

if('serviceWorker' in navigator){

    window.addEventListener('load', () => {

        navigator.serviceWorker
        .register('sw.js')
        .then(() => {

            console.log('SW ACTIVO');

        })
        .catch(err => {

            console.log(err);

        });

    });

}

</script>

</body>
</html>
