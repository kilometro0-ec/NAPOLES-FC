<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Nápoles F.C. - Acceso</title>

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#020c1a">

<link rel="icon" href="data:,">

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

/* =========================
   BASE ORIGINAL
========================= */

:root{
    --primary:#00d2ff;
    --primary-dark:#008f9b;
    --accent:#FFD700;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Plus Jakarta Sans',sans-serif;
    background:#020c1a;
    min-height:100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    color:#fff;
    position:relative;
    overflow:hidden;
}

/* GLOW BACKGROUND */
body::before,
body::after{
    content:'';
    position:absolute;
    width:900px;
    height:900px;
    border-radius:50%;
    filter:blur(130px);
    opacity:.85;
    z-index:0;
    animation:moveGlow 14s infinite ease-in-out;
}

body::before{
    background:radial-gradient(circle, rgba(0,210,255,.95), transparent);
    top:-340px;
    left:-260px;
}

body::after{
    background:radial-gradient(circle, rgba(111,0,255,.95), transparent);
    bottom:-340px;
    right:-260px;
    animation-delay:7s;
}

@keyframes moveGlow{
    0%{transform:translate(0,0) scale(1);}
    50%{transform:translate(-90px,120px) scale(.9);}
    100%{transform:translate(0,0) scale(1);}
}

/* =========================
   CARD
========================= */

.login-card{
    width:100%;
    max-width:430px;
    background:rgba(10,18,35,.76);
    backdrop-filter:blur(24px);
    border:1px solid rgba(0,210,255,.45);
    border-radius:34px;
    padding:42px 30px;
    position:relative;
    z-index:2;
    transition:.4s;
}

/* 🔥 GATA MODE (PULSO REAL) */
.login-card.admin-mode{
    border:1px solid rgba(168,85,247,.95);
    animation:glowPulse 1.1s infinite ease-in-out;
}

@keyframes glowPulse{
    0%{
        box-shadow:0 0 10px rgba(168,85,247,.25);
    }
    50%{
        box-shadow:0 0 45px rgba(168,85,247,.85);
    }
    100%{
        box-shadow:0 0 10px rgba(168,85,247,.25);
    }
}

/* BOTÓN MORADO EN GATA */
.login-card.admin-mode .btn-submit{
    background:linear-gradient(135deg,#6d28d9,#a855f7);
}

/* =========================
   INPUT
========================= */

input{
    width:100%;
    min-height:62px;
    border-radius:18px;
    border:2px solid rgba(255,255,255,.06);
    background:rgba(15,23,42,.7);
    color:#fff;
    font-size:1rem;
    font-weight:700;
    text-align:center;
}

/* =========================
   BOTÓN
========================= */

.btn-submit{
    width:100%;
    height:58px;
    border:none;
    border-radius:18px;
    background:linear-gradient(135deg,#008f9b,#00d2ff);
    color:#fff;
    font-weight:800;
    cursor:pointer;
    margin-top:18px;
}

/* =========================
   ERROR
========================= */

.error-message{
    display:none;
    margin-top:18px;
    padding:14px;
    border-radius:14px;
    background:rgba(239,68,68,.16);
    border:1px solid rgba(239,68,68,.35);
    color:#fecaca;
    text-align:center;
}

/* =========================
   REGÍSTRATE
========================= */

.gold-link{
    color:#FFD700;
    font-weight:800;
    text-decoration:none;
}

/* =========================
   BOTÓN APP
========================= */

.install-btn{
    margin-top:22px;
    width:100%;
    padding:14px;
    border-radius:999px;
    border:none;
    background:linear-gradient(135deg,#00d2ff,#008f9b);
    color:#fff;
    font-weight:800;
    cursor:pointer;
}

</style>

</head>

<body>

<div class="login-card" id="loginCard">

    <h2 style="text-align:center;">NÁPOLES F.C.</h2>
    <p style="text-align:center;opacity:.7;">Acceso PRO</p>

    <input id="input" placeholder="Cédula o clave admin">

    <button class="btn-submit" id="btn" disabled>INGRESAR</button>

    <div class="error-message" id="error"></div>

    <!-- 🔥 BOTÓN QUE FALTABA -->
    <button class="install-btn" id="installBtn">
        📲 DESCARGAR APP
    </button>

    <p style="text-align:center;margin-top:18px;">
        ¿No tienes cuenta?
        <a class="gold-link" href="./index.html">REGÍSTRATE ✨</a>
    </p>

</div>

<!-- 🔊 SONIDO -->
<audio id="sound">
    <source src="https://assets.mixkit.co/sfx/preview/mixkit-unlock-game-notification-253.wav">
</audio>

<script>

const input = document.getElementById("input");
const btn = document.getElementById("btn");
const card = document.getElementById("loginCard");
const error = document.getElementById("error");
const sound = document.getElementById("sound");

let gataActive = false;

// =========================
// INPUT (GATA DETECTOR)
// =========================

input.addEventListener("input", () => {

    const val = input.value.trim();

    btn.disabled = !val;

    if(val.includes("Gata")){

        card.classList.add("admin-mode");

        if(!gataActive){
            sound.currentTime = 0;
            sound.play();
            gataActive = true;
        }

    }else{

        card.classList.remove("admin-mode");
        gataActive = false;
    }

});

// =========================
// LOGIN
// =========================

btn.addEventListener("click", async () => {

    const val = input.value.trim();

    btn.textContent = "CONECTANDO...";

    try{

        if(val === "GataFiera54321"){

            localStorage.setItem("admin","true");

            setTimeout(()=>{
                window.location.href="admin.html";
            },500);

            return;
        }

        if(!/^\d{10}$/.test(val)){
            throw "Cédula inválida";
        }

        const res = await fetch("YOUR_GAS_URL?action=validarRegistro&cedula="+val);
        const data = await res.json();

        if(data.success && data.cedulaExiste && data.estado==="APROBADO"){

            localStorage.setItem("jugador", JSON.stringify(data.datosJugador));
            window.location.href="perfil.html";
            return;
        }

        throw "Acceso no válido";

    }catch(e){

        error.style.display="block";
        error.textContent=e;

    }finally{

        btn.textContent="INGRESAR";
    }

});

// =========================
// BOTÓN DESCARGA APP
// =========================

document.getElementById("installBtn").addEventListener("click", () => {

    alert(`📲 INSTALAR APP

1. Menú del navegador
2. "Instalar aplicación"
3. Agregar a inicio`);
});

</script>

</body>
</html>
