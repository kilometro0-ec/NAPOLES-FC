<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nápoles F.C. - Acceso Jugadores</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --primary-dark: #008f9b;
            --accent: #FFD700;
            --bg-dark: #020c1a;
            --glass: rgba(12, 25, 45, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(0, 210, 255, 0.15), transparent 50%),
                linear-gradient(rgba(2, 12, 26, 0.8), rgba(2, 12, 26, 0.8)),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%2300d2ff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            color: white;
            overflow-x: hidden;
            /* Habilitar pull-to-refresh */
            overscroll-behavior: auto;
        }

        .login-card {
            max-width: 420px;
            width: 100%;
            background: var(--glass);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 2.5rem;
            border: 1px solid rgba(0, 210, 255, 0.4);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3), 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 3rem 2.5rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.5), 0 30px 50px -12px rgba(0, 0, 0, 0.6);
            border-color: rgba(0, 210, 255, 0.8);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-area {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo-area h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .logo-area p {
            color: #94a3b8;
            font-size: 0.95rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 2rem;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .input-wrapper {
            position: relative;
        }

        input {
            width: 100%;
            padding: 1.2rem 1.5rem;
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.2rem;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            text-align: center;
            letter-spacing: 4px;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.9);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
        }

        .btn-submit {
            width: 100%;
            padding: 1.2rem;
            border-radius: 1.2rem;
            border: none;
            background: linear-gradient(135deg, var(--primary-dark) 0%, #00d2ff 100%);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(0, 210, 255, 0.3);
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 20px 25px -5px rgba(0, 210, 255, 0.4);
            filter: brightness(1.1);
        }

        .btn-submit:disabled {
            background: #1e293b;
            color: #475569;
            cursor: not-allowed;
            box-shadow: none;
        }

        .footer-links {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.9rem;
        }

        .footer-links a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
        }

        .footer-links a:hover {
            color: white;
            text-shadow: 0 0 10px var(--accent);
        }

        .btn-download {
            background: rgba(0, 210, 255, 0.15);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 0.7rem 1.2rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 1.2rem;
            display: inline-block;
            width: auto;
        }

        .btn-download:hover {
            background: var(--primary);
            color: #0a1928;
            box-shadow: 0 0 12px rgba(0, 210, 255, 0.6);
        }

        .error-toast {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            padding: 1rem;
            border-radius: 1rem;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            text-align: center;
            display: none;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        @media (max-width: 480px) {
            .login-card { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo-area">
        <h1>NÁPOLES F.C.</h1>
        <p>Panel de Control de Jugadores</p>
    </div>

    <div class="input-group">
        <label>Número de Cédula</label>
        <div class="input-wrapper">
            <input type="text" id="loginCedula" maxlength="10" placeholder="0000000000" inputmode="numeric">
        </div>
    </div>

    <button id="btnLogin" class="btn-submit" disabled>Iniciar Sesión</button>

    <div id="mensajeError" class="error-toast"></div>

    <div class="footer-links">
        ¿Eres nuevo en el club? <br><br>
        <a href="index.html">CREAR CUENTA NUEVA ✨</a>
        <div style="margin-top: 1rem;">
            <span id="manualDownloadBtn" class="btn-download">📲 DESCARGAR APP OFICIAL (APK)</span>
        </div>
    </div>
</div>

<script>
    // ==========================================================
    // 1. CONFIGURACIÓN DEL APK (CAMBIA ESTA URL POR LA REAL)
    const URL_APK = "https://tu-servidor.com/apk/napoles-fc.apk";  // <--- REEMPLAZAR
    // ==========================================================

    // 2. URL DEL BACKEND (cambiar si es necesario)
    const URL_GAS = "https://script.google.com/macros/s/AKfycbzw2Ef4Wja_Nu1Gks7o5yAP-xBgH0R5WAiXgaKhJ_0Z4r6PRrkHSwoMyf8WbMoASgKv/exec";
    
    // 3. FUNCIÓN DE DESCARGA
    function descargarAPK() {
        if (!URL_APK || URL_APK === "https://tu-servidor.com/apk/napoles-fc.apk") {
            alert("📦 La APK oficial estará disponible próximamente. ¡Gracias por registrarte!");
        } else {
            const link = document.createElement('a');
            link.href = URL_APK;
            link.download = "napoles-fc.apk";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    }

    // 4. DESCARGA AUTOMÁTICA SI VIENE DEL REGISTRO (sessionStorage)
    if (sessionStorage.getItem('autoDownloadAPK') === 'true') {
        descargarAPK();
        sessionStorage.removeItem('autoDownloadAPK'); // para que no se repita en recargas
    }

    // 5. LÓGICA DE LOGIN
    const cedulaInput = document.getElementById('loginCedula');
    const btnLogin = document.getElementById('btnLogin');
    const errorDiv = document.getElementById('mensajeError');
    const manualBtn = document.getElementById('manualDownloadBtn');

    cedulaInput.addEventListener('input', (e) => {
        let value = e.target.value.replace(/\D/g, '');
        e.target.value = value.slice(0, 10);
        btnLogin.disabled = e.target.value.length !== 10;
        errorDiv.style.display = 'none';
    });

    btnLogin.addEventListener('click', async () => {
        const cedula = cedulaInput.value;
        errorDiv.style.display = 'none';
        btnLogin.disabled = true;
        btnLogin.innerText = 'PROCESANDO...';

        try {
            const resp = await fetch(`${URL_GAS}?action=validarRegistro&cedula=${cedula}`);
            const data = await resp.json();

            if (!data.cedulaExiste) {
                mostrarError("La cédula no figura en nuestra base de datos.");
                return;
            }

            if (data.estado === "APROBADO") {
                localStorage.setItem('jugador_aprobado', JSON.stringify({
                    cedula: cedula,
                    expira: Date.now() + 86400000
                }));
                window.location.href = 'perfil.html';
            } else {
                mostrarError("Tu cuenta está en revisión. Contacta al delegado del equipo.");
            }
        } catch (err) {
            mostrarError("Error de red. Verifica tu conexión.");
        } finally {
            btnLogin.disabled = false;
            btnLogin.innerText = 'INICIAR SESIÓN';
        }
    });

    function mostrarError(mensaje) {
        errorDiv.innerText = "⚠️ " + mensaje;
        errorDiv.style.display = 'block';
    }

    // 6. DESCARGA MANUAL
    manualBtn.addEventListener('click', descargarAPK);

    // 7. HABILITAR PULL-TO-REFRESH en móviles (sin interferir)
    let touchStartY = 0;
    document.body.addEventListener('touchstart', (e) => {
        touchStartY = e.touches[0].clientY;
    });
    document.body.addEventListener('touchmove', (e) => {
        const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
        const moveY = e.touches[0].clientY;
        // Solo evitar si hay scroll hacia abajo estando en la cima
        if (scrollTop === 0 && moveY > touchStartY) {
            // No prevenir default para permitir refresco
            return;
        }
    });
</script>
</body>
</html>
