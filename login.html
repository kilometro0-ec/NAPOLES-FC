<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nápoles F.C. - Acceso Jugadores</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020c1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/1165/1165187.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00d2ff; --primary-dark: #008f9b; --accent: #FFD700;
            --bg-dark: #020c1a; --glass: rgba(12, 25, 45, 0.72);
            --admin-glow: rgba(139, 92, 246, 0.45); --admin-border: #a78bfa; --admin-bg: rgba(139, 92, 246, 0.18);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top, rgba(0, 210, 255, 0.14), transparent 45%),
                linear-gradient(rgba(2, 12, 26, 0.92), rgba(2, 12, 26, 0.96));
            background-color: var(--bg-dark);
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; color: white;
        }
        .login-card {
            width: 100%; max-width: 430px; background: var(--glass); backdrop-filter: blur(18px) saturate(180%);
            border: 1px solid rgba(0, 210, 255, 0.35); border-radius: 34px; padding: 38px 28px;
            box-shadow: 0 0 18px rgba(0, 210, 255, 0.18), 0 18px 45px rgba(0, 0, 0, 0.55);
        }
        .logo-area { text-align: center; margin-bottom: 34px; }
        .logo-area img { width: 92px; height: 92px; margin-bottom: 18px; }
        .logo-area h1 { font-size: 2rem; font-weight: 800; background: linear-gradient(to right, #fff, var(--primary)); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .input-group { margin-bottom: 24px; }
        .input-group label { display: block; margin-bottom: 10px; color: var(--primary); font-size: .8rem; font-weight: 700; letter-spacing: 1.6px; text-transform: uppercase; }
        input {
            width: 100%; height: 62px; border-radius: 18px; border: 2px solid rgba(255, 255, 255, 0.06);
            background: rgba(15, 23, 42, 0.7); color: white; font-size: 1.15rem; font-weight: 700; text-align: center; outline: none;
        }
        input:focus { border-color: var(--primary); background: rgba(15, 23, 42, 0.92); }
        .btn-submit {
            width: 100%; height: 58px; border: none; border-radius: 18px;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            color: white; font-size: 1rem; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: .25s;
        }
        .btn-submit:disabled { opacity: .5; cursor: not-allowed; }
        .error-message { display: none; margin-top: 18px; padding: 14px; border-radius: 14px; background: rgba(239, 68, 68, 0.16); border: 1px solid rgba(239, 68, 68, 0.35); color: #fecaca; text-align: center; font-size: .88rem; }
        .footer-links { margin-top: 34px; text-align: center; }
        .footer-links a { color: var(--accent); text-decoration: none; font-weight: 800; }
        .btn-download { margin-top: 18px; padding: 12px 20px; border-radius: 999px; background: rgba(0, 210, 255, 0.14); border: 1px solid rgba(0, 210, 255, 0.45); color: var(--primary); font-weight: 700; cursor: pointer; }

        /* MODO ADMIN */
        body.admin-mode-body .login-card { border-color: var(--admin-border); }
        input.admin-mode { border-color: var(--admin-border); background: var(--admin-bg); }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-area">
            <img src="https://raw.githubusercontent.com/Kilometro0-Ec/NapolesFC/main/logo.png" alt="Nápoles F.C.">
            <h1>NÁPOLES F.C.</h1>
            <p>Acceso de Jugadores</p>
        </div>

        <!-- El "for" del label debe coincidir con el "id" del input -->
        <div class="input-group">
            <label for="loginCedula">Número de Cédula o Clave</label>
            <input type="text" id="loginCedula" maxlength="30" placeholder="1234567890" autocomplete="off">
        </div>

        <button id="btnLogin" class="btn-submit" disabled>Iniciar Sesión</button>
        <div id="errorMsg" class="error-message"></div>

        <div class="footer-links">
            <p>¿Nuevo en el club? <a href="registro.html">REGÍSTRATE ✨</a></p>
            <button id="manualDownloadBtn" class="btn-download">📲 INSTALAR APP</button>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        const cedulaInput = document.getElementById('loginCedula');
        const btnLogin = document.getElementById('btnLogin');
        const errorDiv = document.getElementById('errorMsg');
        const bodyElem = document.body;

        const ADMIN_SECRET = "GataFiera54321";
        const ADMIN_TRIGGER = "Gata";

        function mostrarError(msg) {
            errorDiv.innerText = msg;
            errorDiv.style.display = 'block';
            setTimeout(() => { errorDiv.style.display = 'none'; }, 6000);
        }

        cedulaInput.addEventListener('input', () => {
            const val = cedulaInput.value.trim();
            btnLogin.disabled = val === '';
            if (val.includes(ADMIN_TRIGGER)) {
                bodyElem.classList.add('admin-mode-body');
                cedulaInput.classList.add('admin-mode');
            } else {
                bodyElem.classList.remove('admin-mode-body');
                cedulaInput.classList.remove('admin-mode');
            }
        });

        btnLogin.addEventListener('click', async (e) => {
            e.preventDefault(); // Evita recarga de página
            const val = cedulaInput.value.trim();

            if (val === ADMIN_SECRET) {
                localStorage.setItem('admin_session', 'true');
                window.location.href = 'admin.html';
                return;
            }

            if (!/^\d{10}$/.test(val)) {
                mostrarError("❌ La cédula debe tener 10 dígitos");
                return;
            }

            btnLogin.disabled = true;
            btnLogin.innerText = "VERIFICANDO...";

            try {
                const url = `${CONFIG.URL_GAS}?action=validarRegistro&cedula=${val}&t=${Date.now()}`;
                const res = await fetch(url);
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('userCedula', val);
                    localStorage.setItem('jugador_actual', JSON.stringify(data.datos));
                    window.location.href = 'perfil.html';
                } else {
                    mostrarError("⚠️ " + data.message);
                }
            } catch (err) {
                mostrarError("🔌 Error de conexión. Revisa config.js");
            } finally {
                btnLogin.disabled = false;
                btnLogin.innerText = "Iniciar Sesión";
            }
        });
    </script>
</body>
</html>
