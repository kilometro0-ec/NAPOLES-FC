<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Nápoles F.C. - Acceso</title>

<link rel="manifest" href="./manifest.json">

<meta name="theme-color" content="#020c1a">

<link rel="icon" href="data:,">

<link
href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap"
rel="stylesheet">

<style>

/* ===== TU DISEÑO ORIGINAL (SIN CAMBIOS) ===== */

:root{
    --primary:#00d2ff;
    --primary-dark:#008f9b;
    --accent:#FFD700;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    height:100%;
}

body{

    font-family:'Plus Jakarta Sans',sans-serif;

    background:#020c1a;

    min-height:100dvh;

    display:flex;

    align-items:center;

    justify-content:center;

    padding:20px;

    color:#fff;

    overflow-x:hidden;
    overflow-y:auto;

    position:relative;
}

/* ===== resto de tu CSS intacto ===== */

body::before,
body::after{
    content:'';
    position:absolute;
    width:950px;
    height:950px;
    border-radius:50%;
    filter:blur(130px);
    opacity:.85;
    z-index:0;
    animation:moveGlow 14s infinite ease-in-out;
}

body::before{
    background:radial-gradient(circle, rgba(0,210,255,.95), transparent);
    top:-340px;
    left:-260px;
}

body::after{
    background:radial-gradient(circle, rgba(111,0,255,.95), transparent);
    bottom:-340px;
    right:-260px;
    animation-delay:7s;
}

@keyframes moveGlow{
    0%{transform:translate(0,0) scale(1);}
    50%{transform:translate(-90px,120px) scale(.9);}
    100%{transform:translate(0,0) scale(1);}
}

/* CARD */

.login-card{
    width:100%;
    max-width:430px;
    background:rgba(10,18,35,.76);
    backdrop-filter:blur(24px);
    border:1px solid rgba(0,210,255,.45);
    border-radius:34px;
    padding:42px 30px;
    position:relative;
    z-index:2;
}

.login-card.admin-mode{
    border:1px solid rgba(168,85,247,.95);
}

.logo-area{
    text-align:center;
    margin-bottom:38px;
}

.logo-area h1{
    font-size:2rem;
    font-weight:800;
    background:linear-gradient(to right,#fff,var(--primary));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.logo-area p{
    color:#d7f7ff;
    font-weight:700;
}

.input-group{
    margin-bottom:28px;
}

.input-group label{
    display:block;
    margin-bottom:12px;
    color:var(--primary);
    font-weight:700;
}

input{
    width:100%;
    min-height:62px;
    border-radius:18px;
    border:2px solid rgba(255,255,255,.06);
    background:rgba(15,23,42,.7);
    color:#fff;
    font-size:1rem;
    font-weight:700;
    text-align:center;
}

.btn-submit{
    width:100%;
    height:58px;
    border:none;
    border-radius:18px;
    background:linear-gradient(135deg,var(--primary-dark),var(--primary));
    color:#fff;
    font-weight:800;
    cursor:pointer;
}

.error-message{
    display:none;
    margin-top:20px;
    padding:14px;
    border-radius:14px;
    background:rgba(239,68,68,.16);
    border:1px solid rgba(239,68,68,.35);
    color:#fecaca;
    text-align:center;
}

.footer-links{
    margin-top:34px;
    text-align:center;
}

#manualDownloadBtn{
    margin-top:24px;
    padding:14px 24px;
    border-radius:999px;
    border:none;
    background:linear-gradient(135deg,#00d2ff,#008f9b);
    color:#fff;
    font-weight:800;
}

</style>

</head>

<body>

<div class="login-card" id="loginCard">

    <div class="logo-area">
        <h1>NÁPOLES F.C.</h1>
        <p>Acceso de Jugadores PRO</p>
    </div>

    <form id="formLogin">

        <div class="input-group">

            <label>Ingresa tus credenciales</label>

            <input
                type="text"
                id="loginCedula"
                placeholder="Cédula o clave admin"
                autocomplete="off"
                required
            >

        </div>

        <button type="submit" id="btnLogin" class="btn-submit" disabled>
            Ingresa al Vestuario
        </button>

    </form>

    <div id="errorMsg" class="error-message"></div>

    <div class="footer-links">

        <p>
            ¿No tienes cuenta?
            <a href="./index.html">REGÍSTRATE ✨</a>
        </p>

        <button id="manualDownloadBtn" type="button">
            📲 INSTALAR APP
        </button>

    </div>

</div>

<script src="./config.js"></script>

<script>

// =========================
// ELEMENTOS
// =========================

const formLogin =
document.getElementById('formLogin');

const cedulaInput =
document.getElementById('loginCedula');

const btnLogin =
document.getElementById('btnLogin');

const errorDiv =
document.getElementById('errorMsg');

const loginCard =
document.getElementById('loginCard');

// =========================
// INPUT
// =========================

cedulaInput.addEventListener('input', () => {

    const val = cedulaInput.value.trim();

    btnLogin.disabled = !val;

});

// =========================
// ERROR
// =========================

function mostrarError(msg){

    errorDiv.style.display = 'block';
    errorDiv.textContent = msg;

    setTimeout(()=>{
        errorDiv.style.display = 'none';
    },4000);

}

// =========================
// LOGIN
// =========================

formLogin.addEventListener('submit', async (e) => {

    e.preventDefault();

    const valor = cedulaInput.value.trim();

    btnLogin.disabled = true;
    btnLogin.textContent = 'CONECTANDO...';

    try{

        // ==================================================
        // ADMIN (SIN CÉDULA, SOLO CLAVE)
        // ==================================================

        if(valor === 'GataFiera54321'){

            const url =
            `${CONFIG.URL_GAS}?action=loginAdmin&clave=${encodeURIComponent(valor)}`;

            const res = await fetch(url);
            const data = await res.json();

            if(data.success && data.acceso){

                localStorage.setItem('tokenAdmin', data.token);
                localStorage.setItem('admin_activo', 'true');

                window.location.href = './admin.html';
                return;
            }

            mostrarError(data.error || '❌ Error admin');
            return;
        }

        // ==================================================
        // JUGADOR
        // ==================================================

        if(!/^\d{10}$/.test(valor)){

            mostrarError('❌ Cédula inválida');
            return;
        }

        const url =
        `${CONFIG.URL_GAS}?action=validarRegistro&cedula=${valor}`;

        const res = await fetch(url);
        const data = await res.json();

        if(data.success && data.cedulaExiste && data.estado === 'APROBADO'){

            localStorage.setItem(
                'jugador_actual',
                JSON.stringify(data.datosJugador)
            );

            localStorage.setItem('userCedula', valor);

            window.location.href = './perfil.html';

            return;
        }

        mostrarError('❌ Acceso no válido');

    }catch(err){

        console.error(err);
        mostrarError('🔌 Error de conexión');

    }finally{

        btnLogin.disabled = false;
        btnLogin.textContent = 'Ingresa al Vestuario';
    }

});

// =========================
// BOTÓN INSTALAR
// =========================

document.getElementById('manualDownloadBtn')
.addEventListener('click', () => {

    alert(`📲 INSTALAR APP

1. Abrir menú del navegador
2. Instalar aplicación
3. Agregar a pantalla principal`);

});

</script>

</body>
</html>
