<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nápoles F.C. - Acceso Jugadores</title>

    <!-- PWA Config -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020c1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00d2ff;
            --primary-dark: #008f9b;
            --accent: #FFD700;
            --bg-dark: #020c1a;
            --glass: rgba(12, 25, 45, 0.72);
            --admin-border: #a78bfa;
            --admin-bg: rgba(139, 92, 246, 0.18);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top, rgba(0, 210, 255, 0.14), transparent 45%),
                linear-gradient(rgba(2, 12, 26, 0.92), rgba(2, 12, 26, 0.96));
            background-color: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }

        .login-card {
            width: 100%;
            max-width: 430px;
            background: var(--glass);
            backdrop-filter: blur(18px) saturate(180%);
            border: 1px solid rgba(0, 210, 255, 0.35);
            border-radius: 34px;
            padding: 38px 28px;
            box-shadow: 0 0 18px rgba(0, 210, 255, 0.18), 0 18px 45px rgba(0, 0, 0, 0.55);
            text-align: center;
        }

        .logo-area img { width: 92px; height: 92px; margin-bottom: 18px; filter: drop-shadow(0 0 12px var(--primary)); }
        .logo-area h1 { font-size: 2rem; font-weight: 800; background: linear-gradient(to right, #fff, var(--primary)); -webkit-background-clip: text; color: transparent; margin-bottom: 8px; }
        .logo-area p { font-size: 0.9rem; opacity: 0.8; margin-bottom: 30px; }

        .input-group { margin-bottom: 24px; text-align: left; }
        .input-group label { display: block; margin-bottom: 10px; color: var(--primary); font-size: .75rem; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; }

        input {
            width: 100%; height: 60px; border-radius: 16px; border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.6); color: white; font-size: 1.2rem; font-weight: 700;
            text-align: center; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); background: rgba(15, 23, 42, 0.9); box-shadow: 0 0 15px rgba(0, 210, 255, 0.2); }

        .btn-submit {
            width: 100%; height: 58px; border: none; border-radius: 16px;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            color: white; font-size: 1rem; font-weight: 800; text-transform: uppercase;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }

        .error-message {
            display: none; margin-top: 20px; padding: 15px; border-radius: 12px;
            background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.4);
            color: #ffcfcf; font-size: 0.85rem; font-weight: 600;
        }

        .footer-links { margin-top: 35px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 25px; }
        .footer-links a { color: var(--accent); text-decoration: none; font-weight: 800; }
        
        /* Estilo Dinámico Admin */
        body.admin-mode-body .login-card { border-color: var(--admin-border); box-shadow: 0 0 20px rgba(167, 139, 250, 0.3); }
        input.admin-mode { border-color: var(--admin-border); background: var(--admin-bg); }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-area">
            <img src="https://raw.githubusercontent.com/Kilometro0-Ec/NapolesFC/main/logo.png" alt="Nápoles F.C.">
            <h1>NÁPOLES F.C.</h1>
            <p>Acceso Oficial de Jugadores</p>
        </div>

        <form id="formLogin">
            <div class="input-group">
                <label for="loginCedula">Cédula de Identidad</label>
                <input type="text" id="loginCedula" maxlength="20" placeholder="Ej: 1716001431" autocomplete="off" inputmode="numeric">
            </div>

            <button type="submit" id="btnLogin" class="btn-submit" disabled>Entrar al Vestuario</button>
        </form>

        <div id="errorMsg" class="error-message"></div>

        <div class="footer-links">
            <p>¿No estás registrado? <a href="registro.html">¡ÚNETE AQUÍ! ✨</a></p>
        </div>
    </div>

    <!-- Archivo de configuración con la URL de Google -->
    <script src="config.js"></script>

    <script>
        const formLogin = document.getElementById('formLogin');
        const cedulaInput = document.getElementById('loginCedula');
        const btnLogin = document.getElementById('btnLogin');
        const errorDiv = document.getElementById('errorMsg');
        const bodyElem = document.body;

        const ADMIN_SECRET = "GataFiera54321"; // Clave Maestra
        const ADMIN_TRIGGER = "Gata"; // Activador visual

        function mostrarError(msj) {
            errorDiv.innerHTML = msj;
            errorDiv.style.display = 'block';
            // Vibración en celulares si falla
            if (navigator.vibrate) navigator.vibrate(100);
        }

        // Detector de escritura para habilitar botón y modo admin
        cedulaInput.addEventListener('input', () => {
            const val = cedulaInput.value.trim();
            btnLogin.disabled = val.length < 4;
            errorDiv.style.display = 'none';

            if (val.includes(ADMIN_TRIGGER)) {
                bodyElem.classList.add('admin-mode-body');
                cedulaInput.classList.add('admin-mode');
            } else {
                bodyElem.classList.remove('admin-mode-body');
                cedulaInput.classList.remove('admin-mode');
            }
        });

        // PROCESO DE LOGIN
        formLogin.addEventListener('submit', async (e) => {
            e.preventDefault(); 
            const valor = cedulaInput.value.trim();

            // 1. Verificar si es Admin
            if (valor === ADMIN_SECRET) {
                localStorage.setItem('admin_session', 'true');
                window.location.href = 'admin.html';
                return;
            }

            // 2. Bloquear botón mientras carga
            btnLogin.disabled = true;
            btnLogin.innerText = "BUSCANDO EN NÓMINA...";

            try {
                // 3. Llamada al Servidor de Google
                // Agregamos un timestamp (&t=) para evitar caché del navegador
                const url = `${CONFIG.URL_GAS}?action=validarRegistro&cedula=${valor}&t=${Date.now()}`;
                
                const response = await fetch(url, {
                    method: 'GET',
                    mode: 'cors'
                });

                if (!response.ok) throw new Error("Error de red");

                const data = await response.json();

                // 4. Analizar respuesta
                if (data.success === true) {
                    // JUGADOR APROBADO: Guardamos y redirigimos
                    localStorage.setItem('userCedula', valor);
                    localStorage.setItem('jugador_actual', JSON.stringify(data.datos));
                    
                    // Pequeña pausa visual de éxito
                    btnLogin.style.background = "#22c55e";
                    btnLogin.innerText = "¡BIENVENIDO!";
                    
                    setTimeout(() => {
                        window.location.href = 'perfil.html';
                    }, 800);

                } else {
                    // JUGADOR NO APROBADO O NO REGISTRADO
                    mostrarError(`⚠️ ${data.message}`);
                    btnLogin.disabled = false;
                    btnLogin.innerText = "Entrar al Vestuario";
                }

            } catch (err) {
                console.error("Error de conexión:", err);
                mostrarError("🔌 Error de conexión con el club. Verifica tu internet o la URL del script.");
                btnLogin.disabled = false;
                btnLogin.innerText = "Reintentar Acceso";
            }
        });
    </script>
</body>
</html>
