<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nápoles F.C. - Acceso Jugadores</title>
    
    <!-- Configuración PWA e iOS -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Nápoles FC">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1165/1165187.png">
    <meta name="theme-color" content="#020c1a">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00d2ff;
            --primary-dark: #008f9b;
            --accent: #FFD700;
            --bg-dark: #020c1a;
            --glass: rgba(12, 25, 45, 0.7);
            --admin-glow: rgba(139, 92, 246, 0.4);
            --admin-border: #a78bfa;
            --admin-bg-morado: rgba(139, 92, 246, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(0, 210, 255, 0.15), transparent 50%),
                linear-gradient(rgba(2, 12, 26, 0.8), rgba(2, 12, 26, 0.8)),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%2300d2ff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            color: white;
            overflow-x: hidden;
            transition: all 0.3s ease;
        }

        body.admin-mode-body {
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(139, 92, 246, 0.2), transparent 55%),
                linear-gradient(rgba(2, 12, 26, 0.85), rgba(2, 12, 26, 0.85)),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23a78bfa' fill-opacity='0.08'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        body.admin-mode-body .login-card {
            border-color: var(--admin-border);
            box-shadow: 0 0 18px rgba(139, 92, 246, 0.5), 0 25px 50px -12px black;
            background: rgba(18, 25, 55, 0.75);
        }

        .login-card {
            max-width: 420px;
            width: 100%;
            background: var(--glass);
            backdrop-filter: blur(20px) saturate(180%);
            border-radius: 2.5rem;
            border: 1px solid rgba(0, 210, 255, 0.4);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3), 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 3rem 2.5rem;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo-area h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .input-group {
            margin-bottom: 2rem;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        input {
            width: 100%;
            padding: 1.2rem;
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.2rem;
            color: white;
            font-size: 1.3rem;
            font-weight: 600;
            text-align: center;
            letter-spacing: 4px;
            outline: none;
        }

        .btn-submit {
            width: 100%;
            padding: 1.2rem;
            border-radius: 1.2rem;
            border: none;
            background: linear-gradient(135deg, var(--primary-dark) 0%, #00d2ff 100%);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-submit:disabled {
            opacity: .6;
        }

        .error-toast {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            padding: 1rem;
            border-radius: 1rem;
            margin-top: 1.5rem;
            display: none;
            text-align: center;
        }

    </style>
</head>
<body>

<div class="login-card">

    <div class="logo-area">
        <h1>NÁPOLES F.C.</h1>
        <p>Panel de Control de Jugadores</p>
    </div>

    <div class="input-group">
        <label>Número de Cédula</label>

        <input
            type="text"
            id="loginCedula"
            maxlength="20"
            placeholder="0000000000"
            inputmode="numeric"
        >
    </div>

    <button id="btnLogin" class="btn-submit" disabled>
        Iniciar Sesión
    </button>

    <div id="mensajeError" class="error-toast"></div>

</div>

<script src="config.js"></script>

<script>

const cedulaInput =
document.getElementById('loginCedula');

const btnLogin =
document.getElementById('btnLogin');

const errorDiv =
document.getElementById('mensajeError');

const bodyElem =
document.body;

const ADMIN_SECRET = "GataFiera54321";

const ADMIN_COLOR_TRIGGER = "Gata";

// =======================

function actualizarModoVisual(){

    const valor = cedulaInput.value;

    btnLogin.disabled =
    valor.trim() === "";

    if(valor.includes(ADMIN_COLOR_TRIGGER)){

        bodyElem.classList.add(
            'admin-mode-body'
        );

    }else{

        bodyElem.classList.remove(
            'admin-mode-body'
        );

    }

}

cedulaInput.addEventListener('input',()=>{

    actualizarModoVisual();

    errorDiv.style.display='none';

});

// =======================

btnLogin.addEventListener('click', async()=>{

    const valorIngresado =
    cedulaInput.value.trim();

    if(!valorIngresado){

        mostrarError(
            'Ingresa la cédula'
        );

        return;

    }

    // ADMIN
    if(valorIngresado === ADMIN_SECRET){

        window.location.href='admin.html';

        return;

    }

    // VALIDAR CÉDULA
    if(!/^\d{10}$/.test(valorIngresado)){

        mostrarError(
            'La cédula debe tener 10 dígitos'
        );

        return;

    }

    try{

        btnLogin.disabled=true;

        btnLogin.innerText='VERIFICANDO...';

        const resp = await fetch(
            `${CONFIG.URL_GAS}?action=validarRegistro&cedula=${valorIngresado}&t=${Date.now()}`
        );

        const text =
        await resp.text();

        console.log(
            'LOGIN RAW:',
            text
        );

        const data =
        JSON.parse(text);

        console.log(data);

        if(
            data &&
            data.cedulaExiste === true &&
            data.estado === 'APROBADO'
        ){

            localStorage.setItem(
                'jugador_actual',
                JSON.stringify({

                    cedula:
                    valorIngresado,

                    expira:
                    Date.now() +
                    (CONFIG.TIEMPO_SESION || 86400000)

                })
            );

            window.location.href =
            'perfil.html';

            return;

        }

        if(
            data.cedulaExiste &&
            data.estado !== 'APROBADO'
        ){

            mostrarError(
                'Cuenta en revisión'
            );

            return;

        }

        mostrarError(
            'La cédula no existe'
        );

    }catch(err){

        console.error(err);

        mostrarError(
            'Error de conexión'
        );

    }finally{

        btnLogin.disabled=false;

        btnLogin.innerText=
        'INICIAR SESIÓN';

    }

});

// =======================

function mostrarError(msj){

    errorDiv.innerText=msj;

    errorDiv.style.display='block';

}

// =======================

actualizarModoVisual();

</script>

</body>
</html>
