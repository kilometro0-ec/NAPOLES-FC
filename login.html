<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nápoles F.C. - Acceso Jugadores</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 50%, #0a0f1e 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Efecto de fondo */
        body::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, transparent 70%);
            top: -25%;
            left: -25%;
            pointer-events: none;
        }

        .login-container {
            max-width: 450px;
            width: 100%;
            z-index: 1;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header del club */
        .club-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .club-logo {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #1a1f2e, #0f1420);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            border: 2px solid #D4AF37;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
        }

        .club-logo i {
            font-size: 3rem;
            color: #D4AF37;
        }

        .club-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD700, #D4AF37);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }

        .club-header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            margin-top: 8px;
        }

        /* Tarjeta de login */
        .login-card {
            background: rgba(10, 20, 40, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 32px 28px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .input-group label i {
            margin-right: 8px;
            color: #D4AF37;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #D4AF37;
            font-size: 1rem;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 16px 14px 45px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 60px;
            font-size: 1rem;
            color: #fff;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #D4AF37;
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        .input-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        /* Botón login */
        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #D4AF37, #FFD700);
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 700;
            color: #0a0f1e;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        /* Mensajes de estado */
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            text-align: center;
            display: none;
        }

        .message.error {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid rgba(231, 76, 60, 0.5);
            color: #e74c3c;
            display: block;
        }

        .message.success {
            background: rgba(46, 204, 113, 0.2);
            border: 1px solid rgba(46, 204, 113, 0.5);
            color: #2ecc71;
            display: block;
        }

        .message.info {
            background: rgba(52, 152, 219, 0.2);
            border: 1px solid rgba(52, 152, 219, 0.5);
            color: #3498db;
            display: block;
        }

        /* Info adicional */
        .info-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
        }

        .info-footer i {
            margin: 0 4px;
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(10, 15, 30, 0.3);
            border-top-color: #0a0f1e;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .login-btn.disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="club-header">
            <div class="club-logo">
                <i class="fas fa-futbol"></i>
            </div>
            <h1>NÁPOLES F.C.</h1>
            <p>Club Atlético Nápoles - Área de Jugadores</p>
        </div>

        <div class="login-card">
            <form id="loginForm" onsubmit="return false;">
                <div class="input-group">
                    <label><i class="fas fa-id-card"></i> NÚMERO DE CÉDULA</label>
                    <div class="input-wrapper">
                        <i class="fas fa-id-card"></i>
                        <input 
                            type="text" 
                            id="cedula" 
                            placeholder="Ingrese su cédula sin puntos ni espacios" 
                            autocomplete="off"
                            maxlength="10"
                            required
                        >
                    </div>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> INGRESAR
                </button>
            </form>

            <div id="messageContainer"></div>

            <div class="info-footer">
                <i class="fas fa-shield-alt"></i> Datos protegidos · Solo para miembros del club
            </div>
        </div>
    </div>

    <script>
        // ⚠️ ACTUALIZA ESTA URL CON LA DE TU APLICACIÓN WEB ⚠️
        const URL_GAS = "https://script.google.com/macros/s/AKfycbxCV9O-HjoeyDkybzaLLCwgEZAWFu6RRmta3yLLIW1azi-Lrr3ppDU3tBOLjpn4oiwr/exec";

        const loginBtn = document.getElementById('loginBtn');
        const cedulaInput = document.getElementById('cedula');

        // Permitir solo números
        cedulaInput.addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '');
        });

        // Login al presionar Enter
        cedulaInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                realizarLogin();
            }
        });

        // Evento del botón login
        loginBtn.addEventListener('click', realizarLogin);

        async function realizarLogin() {
            const cedula = cedulaInput.value.trim();
            
            // Validar que la cédula no esté vacía
            if (!cedula) {
                mostrarMensaje('Por favor, ingrese su número de cédula', 'error');
                return;
            }

            // Validar longitud mínima (ajusta según tu país)
            if (cedula.length < 6) {
                mostrarMensaje('La cédula debe tener al menos 6 dígitos', 'error');
                return;
            }

            // Mostrar loading
            loginBtn.disabled = true;
            loginBtn.classList.add('disabled');
            loginBtn.innerHTML = '<span class="spinner"></span> VERIFICANDO...';
            
            // Limpiar mensajes anteriores
            limpiarMensajes();

            try {
                // Verificar si el jugador existe y está aprobado
                const url = `${URL_GAS}?action=validarRegistro&cedula=${encodeURIComponent(cedula)}&t=${Date.now()}`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.cedulaExiste) {
                    // Verificar estado del jugador
                    if (data.estado === 'APROBADO') {
                        // Guardar sesión
                        const session = {
                            cedula: cedula,
                            nombre: data.nombre,
                            expira: Date.now() + (24 * 60 * 60 * 1000) // 24 horas
                        };
                        localStorage.setItem('jugador_aprobado', JSON.stringify(session));
                        
                        mostrarMensaje(`✅ ¡Bienvenido ${data.nombre}! Redirigiendo...`, 'success');
                        
                        // Redirigir al perfil después de 1 segundo
                        setTimeout(() => {
                            window.location.href = 'perfil.html';
                        }, 1000);
                    } else if (data.estado === 'PENDIENTE') {
                        mostrarMensaje(
                            '⏳ Tu cuenta está pendiente de aprobación por el administrador. ' +
                            'En breve recibirás una notificación cuando sea activada.',
                            'info'
                        );
                        loginBtn.disabled = false;
                        loginBtn.classList.remove('disabled');
                        loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> INGRESAR';
                    } else {
                        mostrarMensaje('❌ Tu cuenta ha sido rechazada. Contacta al administrador para más información.', 'error');
                        loginBtn.disabled = false;
                        loginBtn.classList.remove('disabled');
                        loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> INGRESAR';
                    }
                } else {
                    mostrarMensaje(
                        '❌ Cédula no registrada. Si ya te registraste, espera la aprobación del administrador. ' +
                        'De lo contrario, completa el formulario de registro.',
                        'error'
                    );
                    loginBtn.disabled = false;
                    loginBtn.classList.remove('disabled');
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> INGRESAR';
                }
            } catch (error) {
                console.error('Error de conexión:', error);
                mostrarMensaje(
                    '⚠️ Error de conexión con el servidor. Verifica tu conexión a internet y vuelve a intentar.',
                    'error'
                );
                loginBtn.disabled = false;
                loginBtn.classList.remove('disabled');
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> INGRESAR';
            }
        }

        function mostrarMensaje(texto, tipo) {
            const container = document.getElementById('messageContainer');
            container.innerHTML = `<div class="message ${tipo}">${texto}</div>`;
        }

        function limpiarMensajes() {
            const container = document.getElementById('messageContainer');
            container.innerHTML = '';
        }

        // Verificar si ya hay sesión activa
        function verificarSesionExistente() {
            const session = JSON.parse(localStorage.getItem('jugador_aprobado'));
            if (session && session.cedula && Date.now() < session.expira) {
                // Sesión válida, redirigir directamente al perfil
                window.location.href = 'perfil.html';
            } else if (session) {
                // Sesión expirada
                localStorage.removeItem('jugador_aprobado');
            }
        }

        // Ejecutar al cargar la página
        verificarSesionExistente();
    </script>
</body>
</html>
