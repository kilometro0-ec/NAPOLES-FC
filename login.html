<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Nápoles F.C. - Acceso</title>

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#020c1a">
<link rel="icon" href="data:,">

<link
href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap"
rel="stylesheet">

<style>

/* ===== TU DISEÑO (NO TOCADO) ===== */

:root{
    --primary:#00d2ff;
    --primary-dark:#008f9b;
    --accent:#FFD700;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Plus Jakarta Sans',sans-serif;
    background:#020c1a;
    min-height:100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    color:#fff;
    overflow:hidden;
}

/* GLOW */
body::before,
body::after{
    content:'';
    position:absolute;
    width:950px;
    height:950px;
    border-radius:50%;
    filter:blur(130px);
    opacity:.85;
    z-index:0;
}

body::before{
    background:radial-gradient(circle,rgba(0,210,255,.95),transparent);
    top:-340px;left:-260px;
}

body::after{
    background:radial-gradient(circle,rgba(168,85,247,.95),transparent);
    bottom:-340px;right:-260px;
}

/* CARD */
.login-card{
    width:100%;
    max-width:430px;
    background:rgba(10,18,35,.76);
    backdrop-filter:blur(24px);
    border:1px solid rgba(0,210,255,.45);
    border-radius:34px;
    padding:42px 30px;
    z-index:2;
}

.login-card.admin-mode{
    border:1px solid rgba(168,85,247,.95);
}

.logo-area{
    text-align:center;
    margin-bottom:38px;
}

.logo-area h1{
    font-size:2rem;
    font-weight:800;
    color:#fff;
}

.logo-area p{
    font-size:1rem;
    font-weight:700;
    opacity:.8;
}

.input-group{
    margin-bottom:28px;
}

input{
    width:100%;
    min-height:62px;
    border-radius:18px;
    border:2px solid rgba(255,255,255,.1);
    background:rgba(15,23,42,.7);
    color:#fff;
    font-size:1rem;
    font-weight:700;
    text-align:center;
}

.btn-submit{
    width:100%;
    height:58px;
    border:none;
    border-radius:18px;
    background:linear-gradient(135deg,var(--primary-dark),var(--primary));
    color:#fff;
    font-weight:800;
    cursor:pointer;
}

.error-message{
    display:none;
    margin-top:20px;
    padding:14px;
    border-radius:14px;
    background:rgba(239,68,68,.16);
    border:1px solid rgba(239,68,68,.35);
    text-align:center;
}

.footer-links{
    margin-top:34px;
    text-align:center;
}

.footer-links a{
    color:#FFD700;
    font-weight:800;
    text-decoration:none;
}

</style>

<script src="./config.js"></script>

</head>

<body>

<div class="login-card" id="loginCard">

    <div class="logo-area">
        <h1>NÁPOLES F.C.</h1>
        <p>Acceso de Jugadores PRO</p>
    </div>

    <form id="formLogin">

        <div class="input-group">

            <input
                type="text"
                id="loginCedula"
                placeholder="Cédula o clave"
                autocomplete="off"
                required
            >

        </div>

        <button type="submit" id="btnLogin" class="btn-submit">
            INGRESAR
        </button>

    </form>

    <div id="errorMsg" class="error-message"></div>

    <div class="footer-links">
        <a href="./index.html">REGÍSTRATE ✨</a>
    </div>

</div>

<script>

/* =========================================
ELEMENTOS
========================================= */

const formLogin =
document.getElementById('formLogin');

const cedulaInput =
document.getElementById('loginCedula');

const btnLogin =
document.getElementById('btnLogin');

const errorMsg =
document.getElementById('errorMsg');

const loginCard =
document.getElementById('loginCard');

/* =========================================
ERROR
========================================= */

function error(texto){

    errorMsg.style.display = 'block';
    errorMsg.innerText = texto;

    setTimeout(()=>{
        errorMsg.style.display = 'none';
    },4000);
}

/* =========================================
LOGIN
========================================= */

formLogin.addEventListener('submit', async (e)=>{

    e.preventDefault();

    const valor = cedulaInput.value.trim();

    if(!valor){
        error("Ingresa datos");
        return;
    }

    btnLogin.disabled = true;
    btnLogin.innerText = "CONECTANDO...";

    try{

        /* ADMIN */
        const adminURL =
        `${CONFIG.URL_GAS}?action=loginAdmin&clave=${valor}`;

        const adminRes = await fetch(adminURL);
        const adminData = await adminRes.json();

        if(adminData.ok && adminData.acceso){

            localStorage.setItem('admin_activo','true');

            window.location.href = "./admin.html";
            return;
        }

        /* JUGADOR */
        if(!/^\d{10}$/.test(valor)){
            error("Cédula inválida");
            return;
        }

        const userURL =
        `${CONFIG.URL_GAS}?action=validarRegistro&cedula=${valor}`;

        const res = await fetch(userURL);
        const data = await res.json();

        if(data.ok && data.cedulaExiste && data.estado === "APROBADO"){

            localStorage.setItem(
                "jugador_actual",
                JSON.stringify(data.datosJugador)
            );

            localStorage.setItem("userCedula", valor);

            window.location.href = "./perfil.html";
            return;
        }

        error("Acceso no autorizado o no aprobado");

    }catch(err){

        console.log(err);
        error("Error de conexión");

    }finally{

        btnLogin.disabled = false;
        btnLogin.innerText = "INGRESAR";
    }

});

</script>

</body>
</html>
