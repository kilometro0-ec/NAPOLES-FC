<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Nápoles F.C. - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

:root{
    --gold:#D4AF37;
    --gold-light:#f5e6a3;
    --bg:#060912;
    --card:rgba(255,255,255,.06);
    --border:rgba(255,255,255,.08);
    --text:#fff;
    --muted:#b3b3b3;
    --danger:#e74c3c;
    --success:#2ecc71;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    font-family:'Inter',sans-serif;
    color:var(--text);

    background:
    radial-gradient(circle at top,#142244 0%,#060912 100%);
}

.login-container{
    width:100%;
    max-width:420px;
}

.login-card{
    position:relative;
    overflow:hidden;

    background:linear-gradient(
        145deg,
        rgba(15,25,45,.95),
        rgba(5,10,20,.98)
    );

    border:1px solid rgba(212,175,55,.25);

    border-radius:28px;

    padding:30px 24px;

    backdrop-filter:blur(12px);

    box-shadow:
    0 15px 40px rgba(0,0,0,.45),
    0 0 25px rgba(212,175,55,.08);
}

.login-card::before{
    content:'';
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;

    background:linear-gradient(
        90deg,
        transparent,
        rgba(212,175,55,.08),
        transparent
    );

    animation:shine 4s linear infinite;
}

@keyframes shine{
    0%{left:-100%;}
    100%{left:100%;}
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo-circle{
    width:90px;
    height:90px;
    border-radius:50%;

    margin:auto auto 15px;

    display:flex;
    align-items:center;
    justify-content:center;

    background:rgba(212,175,55,.1);

    border:2px solid rgba(212,175,55,.3);

    box-shadow:0 0 25px rgba(212,175,55,.2);
}

.logo-circle i{
    font-size:2.5rem;
    color:var(--gold);
}

.logo h1{
    font-family:'Outfit',sans-serif;
    font-size:1.7rem;
    font-weight:900;
    letter-spacing:2px;
    color:var(--gold);
}

.logo p{
    margin-top:6px;
    color:var(--muted);
    font-size:.9rem;
}

.form-group{
    margin-bottom:18px;
}

.form-label{
    display:block;
    margin-bottom:8px;
    font-size:.85rem;
    color:var(--gold-light);
    font-weight:700;
    letter-spacing:1px;
}

.input-wrapper{
    position:relative;
}

.input-wrapper i{
    position:absolute;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    color:var(--gold);
    font-size:1rem;
}

.form-input{
    width:100%;
    height:56px;

    border:none;
    outline:none;

    border-radius:16px;

    background:rgba(255,255,255,.05);

    border:1px solid rgba(255,255,255,.06);

    color:white;

    padding:0 15px 0 48px;

    font-size:1rem;

    transition:.25s;
}

.form-input:focus{
    border-color:rgba(212,175,55,.45);

    box-shadow:
    0 0 0 3px rgba(212,175,55,.08),
    0 0 20px rgba(212,175,55,.12);
}

.form-input::placeholder{
    color:#8d8d8d;
}

.login-btn{
    width:100%;
    height:56px;

    margin-top:8px;

    border:none;
    border-radius:18px;

    cursor:pointer;

    background:linear-gradient(
        135deg,
        #D4AF37,
        #f0d56b
    );

    color:#111;

    font-weight:900;
    font-size:1rem;
    letter-spacing:1px;

    transition:.25s;

    box-shadow:
    0 10px 25px rgba(212,175,55,.25);
}

.login-btn:hover{
    transform:translateY(-2px);
}

.login-btn:active{
    transform:scale(.98);
}

.status-box{
    margin-top:18px;
    padding:14px;
    border-radius:14px;
    display:none;
    font-size:.9rem;
    line-height:1.4;
}

.status-error{
    background:rgba(231,76,60,.12);
    border:1px solid rgba(231,76,60,.25);
    color:#ffb0a8;
}

.status-success{
    background:rgba(46,204,113,.12);
    border:1px solid rgba(46,204,113,.25);
    color:#b8ffd5;
}

.loading{
    display:none;
    text-align:center;
    margin-top:20px;
}

.spinner{
    width:40px;
    height:40px;
    margin:auto;

    border-radius:50%;

    border:4px solid rgba(255,255,255,.08);
    border-top:4px solid var(--gold);

    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

.footer{
    margin-top:25px;
    text-align:center;
    color:#7f7f7f;
    font-size:.75rem;
}

</style>
</head>

<body>

<div class="login-container">

    <div class="login-card">

        <div class="logo">

            <div class="logo-circle">
                <i class="fa-solid fa-shield-halved"></i>
            </div>

            <h1>NÁPOLES F.C.</h1>

            <p>Acceso de jugadores</p>

        </div>

        <form id="loginForm">

            <div class="form-group">

                <label class="form-label">
                    CÉDULA
                </label>

                <div class="input-wrapper">

                    <i class="fa-solid fa-id-card"></i>

                    <input
                        type="text"
                        id="cedula"
                        class="form-input"
                        placeholder="Ingrese su cédula"
                        required
                    >

                </div>

            </div>

            <button type="submit" class="login-btn" id="btnLogin">
                INGRESAR
            </button>

        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
        </div>

        <div class="status-box" id="statusBox"></div>

        <div class="footer">
            Sistema Oficial Nápoles F.C.
        </div>

    </div>

</div>

<script src="config.js"></script>

<script>

/* =========================================================
   VALIDAR CONFIG
========================================================= */

if(!window.CONFIG || !CONFIG.API_URL){

    alert("Error cargando config.js");

    throw new Error("CONFIG no encontrado");

}

/* =========================================================
   ELEMENTOS
========================================================= */

const form = document.getElementById("loginForm");
const cedulaInput = document.getElementById("cedula");
const loading = document.getElementById("loading");
const statusBox = document.getElementById("statusBox");
const btnLogin = document.getElementById("btnLogin");

/* =========================================================
   LIMPIAR SESIÓN VIEJA
========================================================= */

localStorage.removeItem("jugador");

/* =========================================================
   MOSTRAR MENSAJE
========================================================= */

function mostrarMensaje(tipo,mensaje){

    statusBox.style.display = "block";

    statusBox.className = "status-box";

    if(tipo === "error"){
        statusBox.classList.add("status-error");
    }else{
        statusBox.classList.add("status-success");
    }

    statusBox.innerHTML = mensaje;
}

/* =========================================================
   LOGIN
========================================================= */

form.addEventListener("submit", async (e)=>{

    e.preventDefault();

    const cedula = cedulaInput.value.trim();

    if(!cedula){

        mostrarMensaje("error","Ingrese la cédula");

        return;
    }

    try{

        loading.style.display = "block";

        btnLogin.disabled = true;

        statusBox.style.display = "none";

        /* ============================================
           CONSULTAR API
        ============================================ */

        const response = await fetch(
            `${CONFIG.API_URL}?cedula=${encodeURIComponent(cedula)}`
        );

        if(!response.ok){

            throw new Error("Error del servidor");

        }

        const data = await response.json();

        console.log("Respuesta API:",data);

        /* ============================================
           VALIDAR RESPUESTA
        ============================================ */

        if(!data){

            mostrarMensaje(
                "error",
                "No se encontraron datos"
            );

            return;
        }

        /* ============================================
           JUGADOR APROBADO
        ============================================ */

        if(data.estado === "APROBADO"){

            localStorage.setItem(
                "jugador",
                JSON.stringify(data)
            );

            mostrarMensaje(
                "success",
                "Acceso autorizado..."
            );

            setTimeout(()=>{

                window.location.href = "perfil.html";

            },800);

        }

        /* ============================================
           PENDIENTE
        ============================================ */

        else if(data.estado === "PENDIENTE"){

            mostrarMensaje(
                "error",
                "Tu registro aún está pendiente de aprobación."
            );

        }

        /* ============================================
           BLOQUEADO
        ============================================ */

        else if(data.estado === "BLOQUEADO"){

            mostrarMensaje(
                "error",
                "Tu acceso fue bloqueado."
            );

        }

        /* ============================================
           NO EXISTE
        ============================================ */

        else{

            mostrarMensaje(
                "error",
                "Jugador no encontrado."
            );

        }

    }

    catch(error){

        console.error(error);

        mostrarMensaje(
            "error",
            "Error conectando con el servidor."
        );

    }

    finally{

        loading.style.display = "none";

        btnLogin.disabled = false;

    }

});

</script>

</body>
</html>
