<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nápoles F.C. - Acceso Jugadores</title>
    
    <!-- Configuración PWA e iOS -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Nápoles FC">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1165/1165187.png">
    <meta name="theme-color" content="#020c1a">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00d2ff;
            --primary-dark: #008f9b;
            --accent: #FFD700;
            --bg-dark: #020c1a;
            --glass: rgba(12, 25, 45, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(0, 210, 255, 0.15), transparent 50%),
                linear-gradient(rgba(2, 12, 26, 0.8), rgba(2, 12, 26, 0.8)),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%2300d2ff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            color: white;
            overflow-x: hidden;
        }

        .login-card {
            max-width: 420px;
            width: 100%;
            background: var(--glass);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 2.5rem;
            border: 1px solid rgba(0, 210, 255, 0.4);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3), 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 3rem 2.5rem;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-area { text-align: center; margin-bottom: 2.5rem; }
        .logo-area h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .input-group { margin-bottom: 2rem; }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        input {
            width: 100%;
            padding: 1.2rem;
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.2rem;
            color: white;
            font-size: 1.3rem;
            font-weight: 600;
            text-align: center;
            letter-spacing: 4px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.9);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
        }

        .btn-submit {
            width: 100%;
            padding: 1.2rem;
            border-radius: 1.2rem;
            border: none;
            background: linear-gradient(135deg, var(--primary-dark) 0%, #00d2ff 100%);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 0.5rem;
        }

        .btn-submit:disabled { background: #1e293b; color: #475569; cursor: not-allowed; opacity: 0.7; }

        .footer-links { margin-top: 2rem; text-align: center; font-size: 0.9rem; }
        .footer-links a { color: var(--accent); text-decoration: none; font-weight: 700; }

        .btn-download {
            background: rgba(0, 210, 255, 0.15);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 0.7rem 1.2rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1.2rem;
            display: inline-block;
        }

        .error-toast {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            padding: 1rem;
            border-radius: 1rem;
            margin-top: 1.5rem;
            display: none;
            text-align: center;
            font-size: 0.85rem;
        }

        @media (display-mode: standalone) {
            #containerDownload { display: none !important; }
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo-area">
        <h1>NÁPOLES F.C.</h1>
        <p>Panel de Control de Jugadores</p>
    </div>

    <div class="input-group">
        <label>Número de Cédula</label>
        <input type="text" id="loginCedula" maxlength="10" placeholder="0000000000" inputmode="numeric">
    </div>

    <button id="btnLogin" class="btn-submit" disabled>Iniciar Sesión</button>

    <div id="mensajeError" class="error-toast"></div>

    <div class="footer-links">
        ¿Eres nuevo en el club? <br><br>
        <a href="registro.html">CREAR CUENTA NUEVA ✨</a>
        
        <div id="containerDownload">
            <span id="manualDownloadBtn" class="btn-download">📲 DESCARGAR APK OFICIAL</span>
        </div>
    </div>
</div>

<script>
    // REEMPLAZA con tu URL del Web App de Google Apps Script
    const URL_GAS = "https://script.google.com/macros/s/AKfycbxGkRjKO-6HXVBUdzLPzoiPYAd5wR_zSfAHRWHaRKW0bxHxAm7HDL3eJY7s6QPU6S2g/exec";
    
    const cedulaInput = document.getElementById('loginCedula');
    const btnLogin = document.getElementById('btnLogin');
    const errorDiv = document.getElementById('mensajeError');
    const manualBtn = document.getElementById('manualDownloadBtn');
    const containerDownload = document.getElementById('containerDownload');

    if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
        containerDownload.style.display = 'none';
    }

    cedulaInput.addEventListener('input', (e) => {
        let value = e.target.value.replace(/\D/g, '');
        e.target.value = value.slice(0, 10);
        btnLogin.disabled = e.target.value.length !== 10;
        errorDiv.style.display = 'none';
    });

    btnLogin.addEventListener('click', async () => {
        const cedula = cedulaInput.value;
        btnLogin.disabled = true;
        btnLogin.innerText = 'VERIFICANDO...';
        errorDiv.style.display = 'none';

        try {
            // Llamada corregida: obtener datos completos del jugador
            const resp = await fetch(`${URL_GAS}?action=validarRegistro&cedula=${cedula}`);
            const data = await resp.json();

            if (data.cedulaExiste && data.estado === "APROBADO" && data.datosJugador) {
                // Guardar TODOS los datos del jugador en localStorage
                localStorage.setItem('jugador_actual', JSON.stringify({
                    ...data.datosJugador,
                    cedula: cedula,
                    expira: Date.now() + 86400000
                }));
                window.location.href = 'perfil.html';
            } else if (!data.cedulaExiste) {
                mostrarError("La cédula no está registrada.");
            } else if (data.estado !== "APROBADO") {
                mostrarError("Tu cuenta está en revisión por el delegado. Estado actual: " + (data.estado || "PENDIENTE"));
            } else {
                mostrarError("No se pudieron cargar tus datos. Contacta al administrador.");
            }
        } catch (err) {
            console.error(err);
            mostrarError("Error de conexión con el servidor.");
        } finally {
            btnLogin.disabled = false;
            btnLogin.innerText = 'INICIAR SESIÓN';
        }
    });

    function mostrarError(msj) {
        errorDiv.innerText = "⚠️ " + msj;
        errorDiv.style.display = 'block';
    }

    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        manualBtn.innerHTML = "👕 INSTALAR APP (CAMISETA)";
        manualBtn.style.background = "linear-gradient(135deg, #FFD700 0%, #B8860B 100%)";
        manualBtn.style.color = "#000";
    });

    manualBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') containerDownload.style.display = 'none';
            deferredPrompt = null;
        } else {
            alert("⚽ Abre el menú de tu navegador y selecciona 'Instalar' o 'Añadir a pantalla de inicio'.");
        }
    });

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(err => console.log(err));
    }
</script>
</body>
</html>
