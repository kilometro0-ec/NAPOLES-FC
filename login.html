<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Nápoles FC</title>
    
    <!-- Soporte PWA para instalación directa -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#b59461">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <link rel="stylesheet" href="estilos.css">
    <style>
        input { text-transform: uppercase; } 
        #loginCedula { text-transform: none; } /* Mantiene números limpios */
        
        .contenedor-login {
            max-width: 400px;
            margin: 80px auto;
            padding: 30px;
            background-color: var(--gris-suave);
            border: 1px solid var(--dorado);
            border-radius: 15px;
            text-align: center;
        }
        .logo-login {
            font-size: 50px;
            margin-bottom: 10px;
        }
        .mensaje-error {
            color: #ff4444;
            font-size: 0.85em;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="contenedor-login">
        <div class="logo-login">⚽</div>
        <h2>Acceso Jugadores</h2>
        <p style="color: var(--dorado); font-size: 0.9em;">Nápoles F.C. 2026</p>

        <form id="formLogin">
            <label>Número de Cédula</label>
            <input type="text" id="loginCedula" placeholder="Ingrese su identificación" maxlength="10" required>
            
            <button type="submit" id="btnEntrar" class="btn-accion">Entrar al Club</button>
            <p id="errorLogin" class="mensaje-error">Cédula no registrada o pendiente de aprobación.</p>
        </form>

        <div style="margin-top: 20px;">
            <a href="index.html" style="color: var(--dorado); text-decoration: none; font-size: 0.8em;">¿No estás registrado? Inscríbete aquí</a>
        </div>
    </div>

    <script>
        // URL de tu Web App de Google (la misma que usas en api.js)
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzLctY39LIa_aVSFKCIQl306huhIk6CiZzrUC2PczfeVlTJ9-V9Vt9giq1A2mYveAHW/exec";

        document.getElementById('formLogin').addEventListener('submit', async (e) => {
            e.preventDefault();
            const cedula = document.getElementById('loginCedula').value.trim();
            const btn = document.getElementById('btnEntrar');
            const errorMsg = document.getElementById('errorLogin');

            btn.innerText = "VERIFICANDO...";
            btn.disabled = true;
            errorMsg.style.display = 'none';

            try {
                // Se usa 'action=login' para coincidir con tu función doGet unificada
                const response = await fetch(`${SCRIPT_URL}?action=login&cedula=${cedula}`);
                const resultado = await response.json();

                if (resultado.success) {
                    // Guardamos la sesión
                    localStorage.setItem('jugador_aprobado', 'true');
                    localStorage.setItem('datos_jugador', JSON.stringify(resultado.datos));
                    
                    // Redireccionamos al Perfil
                    window.location.href = 'perfil.html';
                } else {
                    errorMsg.style.display = 'block';
                    btn.innerText = "ENTRAR AL CLUB";
                    btn.disabled = false;
                }
            } catch (error) {
                console.error(error);
                alert("Error de conexión. Intente más tarde.");
                btn.disabled = false;
                btn.innerText = "ENTRAR AL CLUB";
            }
        });

        // Registrar Service Worker para permitir la instalación desde el navegador
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('Error SW', err));
            });
        }
    </script>

    <!-- Scripts de soporte que ya tienes en tu carpeta -->
    <script src="api.js"></script>
    <script src="nav.js"></script>
</body>
</html>
