<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>Nápoles F.C. - Acceso Jugadores</title>

    <!-- PWA -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#020c1a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <style>

        :root{
            --primary:#00d2ff;
            --primary-dark:#008f9b;
            --accent:#FFD700;
            --bg-dark:#020c1a;
            --glass:rgba(12,25,45,.72);
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            -webkit-tap-highlight-color:transparent;
        }

        body{
            font-family:'Plus Jakarta Sans',sans-serif;

            background:
            radial-gradient(circle at top, rgba(0,210,255,.14), transparent 45%),
            linear-gradient(rgba(2,12,26,.92), rgba(2,12,26,.96));

            background-color:var(--bg-dark);

            min-height:100vh;

            display:flex;
            align-items:center;
            justify-content:center;

            padding:20px;

            color:#fff;

            overflow-x:hidden;
        }

        .login-card{
            width:100%;
            max-width:430px;

            background:var(--glass);

            backdrop-filter:blur(18px) saturate(180%);

            border:1px solid rgba(0,210,255,.35);

            border-radius:34px;

            padding:38px 28px;

            box-shadow:
            0 0 18px rgba(0,210,255,.18),
            0 18px 45px rgba(0,0,0,.55);
        }

        .logo-area{
            text-align:center;
            margin-bottom:34px;
        }

        .logo-area img{
            width:92px;
            height:92px;
            margin-bottom:18px;
            object-fit:contain;

            filter:drop-shadow(0 0 12px rgba(0,210,255,.35));
        }

        .logo-area h1{
            font-size:2rem;
            font-weight:800;

            background:linear-gradient(to right,#fff,var(--primary));

            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;

            margin-bottom:8px;
        }

        .logo-area p{
            opacity:.8;
            font-size:.95rem;
        }

        .input-group{
            margin-bottom:24px;
        }

        .input-group label{
            display:block;

            margin-bottom:10px;

            color:var(--primary);

            font-size:.8rem;
            font-weight:700;

            letter-spacing:1.6px;
            text-transform:uppercase;
        }

        input{
            width:100%;

            min-height:62px;

            border-radius:18px;

            border:2px solid rgba(255,255,255,.06);

            background:rgba(15,23,42,.7);

            color:#fff;

            font-size:1.05rem;
            font-weight:700;

            padding:0 18px;

            text-align:center;

            outline:none;

            transition:.25s;
        }

        input:focus{
            border-color:var(--primary);
            background:rgba(15,23,42,.92);
        }

        .btn-submit{
            width:100%;
            height:58px;

            border:none;
            border-radius:18px;

            background:
            linear-gradient(
                135deg,
                var(--primary-dark),
                var(--primary)
            );

            color:#fff;

            font-size:1rem;
            font-weight:800;

            letter-spacing:1.5px;
            text-transform:uppercase;

            cursor:pointer;

            transition:.25s;

            margin-top:10px;
        }

        .btn-submit:disabled{
            opacity:.55;
            cursor:not-allowed;
        }

        .error-message{
            display:none;

            margin-top:18px;

            padding:14px;

            border-radius:14px;

            background:rgba(239,68,68,.16);

            border:1px solid rgba(239,68,68,.35);

            color:#fecaca;

            text-align:center;

            font-size:.88rem;
            font-weight:600;
        }

        .footer-links{
            margin-top:34px;
            text-align:center;
        }

        .footer-links a{
            color:var(--accent);

            text-decoration:none;

            font-weight:800;
            font-size:.95rem;
        }

        .install-btn{
            padding:10px 20px;

            border-radius:999px;

            background:rgba(0,210,255,.1);

            border:1px solid var(--primary);

            color:var(--primary);

            font-weight:700;

            cursor:pointer;

            margin-top:10px;
        }

        @media(max-width:480px){

            body{
                padding:12px;
            }

            .login-card{
                padding:28px 20px;
                border-radius:28px;
            }

            .logo-area h1{
                font-size:1.7rem;
            }

            input{
                min-height:56px;
                font-size:1rem;
            }

            .btn-submit{
                height:54px;
                font-size:.95rem;
            }
        }

    </style>
</head>

<body>

<div class="login-card">

    <div class="logo-area">

        <!-- Logo local -->
        <img src="./logo.png" alt="Nápoles FC">

        <h1>NÁPOLES F.C.</h1>

        <p>Acceso de Jugadores PRO</p>

    </div>

    <form id="formLogin">

        <div class="input-group">

            <label for="loginCedula">
                Cédula
            </label>

            <input
                type="text"
                id="loginCedula"
                maxlength="10"
                placeholder="0000000000"
                autocomplete="username"
                inputmode="numeric"
                required
            >

        </div>

        <button
            type="submit"
            id="btnLogin"
            class="btn-submit"
            disabled
        >
            Ingresa al Vestuario
        </button>

    </form>

    <div id="errorMsg" class="error-message"></div>

    <div class="footer-links">

        <p style="margin-bottom:15px;">

            ¿No tienes cuenta?

            <a href="./registro.html">
                REGÍSTRATE ✨
            </a>

        </p>

        <button id="manualDownloadBtn" class="install-btn">
            📲 INSTALAR APP
        </button>

    </div>

</div>

<!-- CONFIG EN RAÍZ -->
<script src="./config.js"></script>

<script>

    // =========================
    // ELEMENTOS
    // =========================

    const formLogin = document.getElementById('formLogin');

    const cedulaInput = document.getElementById('loginCedula');

    const btnLogin = document.getElementById('btnLogin');

    const errorDiv = document.getElementById('errorMsg');

    // =========================
    // ERROR
    // =========================

    function mostrarError(msj){

        errorDiv.textContent = msj;

        errorDiv.style.display = 'block';

        setTimeout(() => {

            errorDiv.style.display = 'none';

        }, 5000);
    }

    // =========================
    // INPUT
    // =========================

    cedulaInput.addEventListener('input', () => {

        // SOLO NUMEROS

        cedulaInput.value =
        cedulaInput.value.replace(/\D/g,'');

        const val =
        cedulaInput.value.trim();

        btnLogin.disabled =
        !val;

    });

    // =========================
    // LOGIN
    // =========================

    formLogin.addEventListener('submit', async (e) => {

        e.preventDefault();

        const valor =
        cedulaInput.value.trim();

        // =========================
        // INTERNET
        // =========================

        if(!navigator.onLine){

            mostrarError(
                '📡 Sin conexión a internet'
            );

            return;
        }

        // =========================
        // VALIDAR CEDULA
        // =========================

        if(!/^\d{10}$/.test(valor)){

            mostrarError(
                '❌ La cédula debe tener 10 dígitos'
            );

            return;
        }

        // =========================
        // VALIDAR CONFIG
        // =========================

        if(typeof CONFIG === 'undefined'){

            mostrarError(
                '❌ No se cargó config.js'
            );

            return;
        }

        if(!CONFIG.URL_GAS){

            mostrarError(
                '❌ URL_GAS no existe'
            );

            return;
        }

        // =========================
        // UI
        // =========================

        btnLogin.disabled = true;

        btnLogin.textContent =
        'CONECTANDO...';

        try{

            const url =
            `${CONFIG.URL_GAS}?action=validarRegistro&cedula=${valor}&t=${Date.now()}`;

            console.log('Consultando:', url);

            const response =
            await fetch(url);

            if(!response.ok){

                throw new Error(
                    'Servidor no disponible'
                );
            }

            const text =
            await response.text();

            let data;

            try{

                data = JSON.parse(text);

            }catch{

                console.error(text);

                throw new Error(
                    'Respuesta inválida del servidor'
                );
            }

            console.log(data);

            // =========================
            // APROBADO
            // =========================

            if(
                data.ok === true &&
                data.cedulaExiste === true &&
                data.estado === 'APROBADO'
            ){

                localStorage.setItem(
                    'jugador_actual',
                    JSON.stringify(data.datosJugador)
                );

                localStorage.setItem(
                    'userCedula',
                    valor
                );

                window.location.assign(
                    'perfil.html'
                );

                return;
            }

            // =========================
            // PENDIENTE
            // =========================

            if(
                data.ok === true &&
                data.cedulaExiste === true
            ){

                mostrarError(
                    `⏳ Estado actual: ${data.estado}`
                );

                return;
            }

            // =========================
            // NO EXISTE
            // =========================

            if(
                data.ok === true &&
                data.cedulaExiste === false
            ){

                mostrarError(
                    '❌ Jugador no encontrado'
                );

                return;
            }

            // =========================
            // ERROR GENERAL
            // =========================

            mostrarError(
                data.error ||
                '⚠️ Error inesperado'
            );

        }catch(error){

            console.error(error);

            mostrarError(
                error.message ||
                '🔌 Error de conexión'
            );

        }finally{

            btnLogin.disabled = false;

            btnLogin.textContent =
            'Ingresa al Vestuario';
        }

    });

</script>

</body>
</html>
