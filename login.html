<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nápoles F.C. - Acceso Jugadores</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Nápoles FC">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1165/1165187.png">
    <meta name="theme-color" content="#020c1a">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00d2ff;
            --primary-dark: #008f9b;
            --accent: #FFD700;
            --bg-dark: #020c1a;
            --glass: rgba(12, 25, 45, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(0, 210, 255, 0.15), transparent 50%),
                linear-gradient(rgba(2, 12, 26, 0.8), rgba(2, 12, 26, 0.8));
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            color: white;
        }

        .login-card {
            max-width: 420px;
            width: 100%;
            background: var(--glass);
            backdrop-filter: blur(20px) saturate(180%);
            border-radius: 2.5rem;
            border: 1px solid rgba(0, 210, 255, 0.4);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
            padding: 3rem 2.5rem;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-area { text-align: center; margin-bottom: 2.5rem; }
        .logo-area h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .input-group { margin-bottom: 2rem; }
        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        input {
            width: 100%;
            padding: 1.2rem;
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.2rem;
            color: white;
            font-size: 1.3rem;
            font-weight: 600;
            text-align: center;
            letter-spacing: 4px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
        }

        .btn-submit {
            width: 100%;
            padding: 1.2rem;
            border-radius: 1.2rem;
            border: none;
            background: linear-gradient(135deg, var(--primary-dark) 0%, #00d2ff 100%);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-submit:disabled { background: #1e293b; color: #475569; cursor: not-allowed; opacity: 0.7; }

        .footer-links { margin-top: 2rem; text-align: center; font-size: 0.9rem; }
        .footer-links a { color: var(--accent); text-decoration: none; font-weight: 700; }

        .btn-download {
            background: rgba(0, 210, 255, 0.15);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 0.7rem 1.2rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1.2rem;
            display: inline-block;
        }

        .error-toast {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            padding: 1rem;
            border-radius: 1rem;
            margin-top: 1.5rem;
            display: none;
            text-align: center;
            font-size: 0.85rem;
        }

        .loading-indicator {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 1rem;
            font-size: 0.8rem;
            color: var(--primary);
        }

        .loading-indicator.active { display: flex; }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0, 210, 255, 0.3);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (display-mode: standalone) {
            #containerDownload { display: none !important; }
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo-area">
        <h1>NÁPOLES F.C.</h1>
        <p>Panel de Control de Jugadores</p>
    </div>

    <div class="input-group">
        <label>Número de Cédula</label>
        <input type="text" id="loginCedula" maxlength="10" placeholder="0000000000" inputmode="numeric">
    </div>

    <button id="btnLogin" class="btn-submit" disabled>Iniciar Sesión</button>
    
    <div class="loading-indicator" id="loadingIndicator">
        <div class="spinner"></div>
        <span>Verificando con el servidor...</span>
    </div>

    <div id="mensajeError" class="error-toast"></div>

    <div class="footer-links">
        ¿Eres nuevo en el club? <br><br>
        <a href="registro.html">CREAR CUENTA NUEVA ✨</a>
        
        <div id="containerDownload">
            <span id="manualDownloadBtn" class="btn-download">📲 INSTALAR APP</span>
        </div>
    </div>
</div>

<script>
    const URL_GAS = "https://script.google.com/macros/s/AKfycbzDd_upVUwAl3ORyxhAbPbN1ZS-NwpYhtCUTyLInjHWsrIUt4OhyShgo_xIn8Pfxw/exec";
    
    const cedulaInput = document.getElementById('loginCedula');
    const btnLogin = document.getElementById('btnLogin');
    const errorDiv = document.getElementById('mensajeError');
    const loadingIndicator = document.getElementById('loadingIndicator');
    const manualBtn = document.getElementById('manualDownloadBtn');
    const containerDownload = document.getElementById('containerDownload');

    // Verificar si ya hay sesión activa
    const sesionGuardada = localStorage.getItem('jugador_aprobado');
    if (sesionGuardada) {
        try {
            const datos = JSON.parse(sesionGuardada);
            if (datos.expira && datos.expira > Date.now() && datos.cedula) {
                window.location.href = 'perfil.html';
            } else {
                localStorage.removeItem('jugador_aprobado');
            }
        } catch(e) {
            localStorage.removeItem('jugador_aprobado');
        }
    }

    if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
        containerDownload.style.display = 'none';
    }

    cedulaInput.addEventListener('input', (e) => {
        let value = e.target.value.replace(/\D/g, '');
        e.target.value = value.slice(0, 10);
        btnLogin.disabled = e.target.value.length !== 10;
        errorDiv.style.display = 'none';
    });

    async function fetchWithTimeout(url, timeout = 15000) {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), timeout);
        try {
            const response = await fetch(url, { signal: controller.signal });
            clearTimeout(timeoutId);
            return response;
        } catch (error) {
            clearTimeout(timeoutId);
            throw error;
        }
    }

    btnLogin.addEventListener('click', async () => {
        const cedula = cedulaInput.value;
        
        if (cedula.length !== 10) {
            mostrarError("La cédula debe tener 10 dígitos.");
            return;
        }
        
        btnLogin.disabled = true;
        const originalText = btnLogin.innerText;
        btnLogin.innerText = 'VERIFICANDO...';
        errorDiv.style.display = 'none';
        loadingIndicator.classList.add('active');
        
        try {
            const url = `${URL_GAS}?action=validarRegistro&cedula=${encodeURIComponent(cedula)}&t=${Date.now()}`;
            const resp = await fetchWithTimeout(url);
            const data = await resp.json();
            
            console.log('Respuesta del servidor:', data);
            
            if (data.cedulaExiste === true && data.estado === "APROBADO") {
                localStorage.setItem('jugador_aprobado', JSON.stringify({
                    cedula: cedula,
                    nombre: data.nombre || 'Jugador',
                    expira: Date.now() + 86400000
                }));
                window.location.href = 'perfil.html';
            } else if (data.cedulaExiste === false) {
                mostrarError("❌ La cédula no está registrada. Debes crear una cuenta primero.");
            } else if (data.estado === "PENDIENTE") {
                mostrarError("⏳ Tu cuenta está en revisión por el delegado. Espera la aprobación.");
            } else {
                mostrarError("⚠️ Error en la verificación. Intenta de nuevo.");
            }
        } catch (err) {
            console.error('Error de conexión:', err);
            if (err.name === 'AbortError') {
                mostrarError("⏱️ Tiempo de espera agotado. Verifica tu conexión a internet.");
            } else {
                mostrarError("📡 No se pudo conectar con el servidor. Verifica tu internet y vuelve a intentar.");
            }
        } finally {
            loadingIndicator.classList.remove('active');
            btnLogin.disabled = false;
            btnLogin.innerText = originalText;
        }
    });

    function mostrarError(msj) {
        errorDiv.innerText = "⚠️ " + msj;
        errorDiv.style.display = 'block';
        setTimeout(() => {
            if (errorDiv.style.display === 'block') {
                errorDiv.style.opacity = '0';
                setTimeout(() => {
                    errorDiv.style.display = 'none';
                    errorDiv.style.opacity = '1';
                }, 300);
            }
        }, 5000);
    }

    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        manualBtn.innerHTML = "👕 INSTALAR APP";
        manualBtn.style.background = "linear-gradient(135deg, #FFD700 0%, #B8860B 100%)";
        manualBtn.style.color = "#000";
    });

    manualBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') containerDownload.style.display = 'none';
            deferredPrompt = null;
        } else {
            alert("Abre el menú del navegador y selecciona 'Instalar aplicación' o 'Añadir a pantalla de inicio'.");
        }
    });

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(err => console.log('SW error:', err));
    }
</script>
</body>
</html>
