<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Admin</title>

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:#111827;
  padding:30px;
  border-radius:20px;
  width:300px;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.error{
  color:red;
  margin-top:10px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="box">

<h2>Login Admin</h2>

<input type="password" id="clave" placeholder="Ingrese clave">

<button onclick="login()">Ingresar</button>

<div id="msg" class="error"></div>

</div>

<script src="./config.js"></script>

<script>

async function login(){

  const clave = document.getElementById('clave').value;
  const msg = document.getElementById('msg');

  if(!clave){
    msg.innerText = "Ingrese clave";
    return;
  }

  try{

    const res = await fetch(`${CONFIG.URL_GAS}?action=loginAdmin&clave=${encodeURIComponent(clave)}`);
    const data = await res.json();

    console.log(data);

    if(data.ok && data.acceso){

      localStorage.setItem('admin_activo','true');

      window.location.href = "./jugadores.html";

    }else{

      msg.innerText = "Clave incorrecta";
    }

  }catch(err){

    msg.innerText = "Error de conexión";
  }
}

</script>

</body>
</html>
