<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Nápoles F.C. - Acceso</title>

<link rel="manifest" href="./manifest.json">

<meta name="theme-color" content="#020c1a">

<link rel="icon" href="data:,">

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
    --primary:#00d2ff;
    --primary-dark:#008f9b;
    --accent:#FFD700;
    --bg-dark:#020c1a;
    --glass:rgba(12,25,45,.72);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    font-family:'Plus Jakarta Sans',sans-serif;
    background:#020c1a;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    color:#fff;
    overflow:hidden;
    position:relative;
}

body::before,
body::after{
    content:'';
    position:absolute;
    width:700px;
    height:700px;
    border-radius:50%;
    filter:blur(100px);
    opacity:.35;
    animation:moveGlow 10s infinite ease-in-out;
    z-index:0;
}

body::before{
    background:#00d2ff;
    top:-250px;
    left:-200px;
}

body::after{
    background:#0044ff;
    bottom:-250px;
    right:-200px;
    animation-delay:5s;
}

@keyframes moveGlow{

    0%{
        transform:translate(0,0) scale(1);
    }

    25%{
        transform:translate(80px,40px) scale(1.1);
    }

    50%{
        transform:translate(-50px,80px) scale(.95);
    }

    75%{
        transform:translate(50px,-60px) scale(1.05);
    }

    100%{
        transform:translate(0,0) scale(1);
    }
}

.login-card{

    width:100%;
    max-width:430px;

    background:var(--glass);

    backdrop-filter:blur(18px) saturate(180%);

    border:1px solid rgba(0,210,255,.35);

    border-radius:34px;

    padding:38px 28px;

    box-shadow:
    0 0 18px rgba(0,210,255,.18),
    0 18px 45px rgba(0,0,0,.55);

    position:relative;
    z-index:2;

    transition:.35s;
}

.logo-area{
    text-align:center;
    margin-bottom:34px;
}

.logo-area img{
    display:none;
}

.logo-area h1{

    font-size:2rem;
    font-weight:800;

    background:linear-gradient(to right,#fff,var(--primary));

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    margin-bottom:8px;
}

.logo-area p{

    opacity:.9;
    font-size:1rem;
    font-weight:700;
    color:#d7f7ff;
    letter-spacing:1px;
}

.input-group{
    margin-bottom:24px;
}

.input-group label{

    display:block;

    margin-bottom:10px;

    color:var(--primary);

    font-size:.8rem;
    font-weight:700;

    letter-spacing:1.6px;
    text-transform:uppercase;
}

input{

    width:100%;

    min-height:62px;

    border-radius:18px;

    border:2px solid rgba(255,255,255,.06);

    background:rgba(15,23,42,.7);

    color:#fff;

    font-size:1.05rem;
    font-weight:700;

    padding:0 18px;

    text-align:center;

    outline:none;

    transition:.25s;
}

input:focus{

    border-color:var(--primary);

    background:rgba(15,23,42,.92);

    box-shadow:0 0 18px rgba(0,210,255,.35);
}

.btn-submit{

    width:100%;
    height:58px;

    border:none;
    border-radius:18px;

    background:
    linear-gradient(
        135deg,
        var(--primary-dark),
        var(--primary)
    );

    color:#fff;

    font-size:1rem;
    font-weight:800;

    letter-spacing:1.5px;
    text-transform:uppercase;

    cursor:pointer;

    transition:.25s;

    margin-top:10px;
}

.error-message{

    display:none;

    margin-top:18px;

    padding:14px;

    border-radius:14px;

    background:rgba(239,68,68,.16);

    border:1px solid rgba(239,68,68,.35);

    color:#fecaca;

    text-align:center;

    font-size:.88rem;
    font-weight:600;
}

</style>

</head>

<body>

<div class="login-card">

    <div class="logo-area">

        <h1>NÁPOLES F.C.</h1>

        <p>Acceso de Jugadores PRO</p>

    </div>

    <form id="formLogin">

        <div class="input-group">

            <label>
                Cédula o Clave Admin
            </label>

            <input
                type="text"
                id="loginCedula"
                placeholder="Cédula o clave"
                autocomplete="off"
                required
            >

        </div>

        <button
            type="submit"
            id="btnLogin"
            class="btn-submit"
            disabled
        >
            Ingresa al Vestuario
        </button>

    </form>

    <div id="errorMsg"
    class="error-message"></div>

</div>

<script src="./config.js"></script>

<script>

const formLogin =
document.getElementById('formLogin');

const cedulaInput =
document.getElementById('loginCedula');

const btnLogin =
document.getElementById('btnLogin');

const errorDiv =
document.getElementById('errorMsg');

const loginCard =
document.querySelector('.login-card');

// =====================================================
// ERROR
// =====================================================

function mostrarError(msj){

    errorDiv.textContent = msj;

    errorDiv.style.display = 'block';

    setTimeout(() => {

        errorDiv.style.display = 'none';

    }, 5000);
}

// =====================================================
// INPUT
// =====================================================

cedulaInput.addEventListener('input', () => {

    const val =
    cedulaInput.value.trim();

    btnLogin.disabled =
    !val;

    // EFECTO MORADO

    if(val.includes('Gata')){

        loginCard.style.border =
        '1px solid rgba(168,85,247,.7)';

        loginCard.style.boxShadow =
        '0 0 25px rgba(168,85,247,.45), 0 18px 45px rgba(0,0,0,.55)';

    }else{

        loginCard.style.border =
        '1px solid rgba(0,210,255,.35)';

        loginCard.style.boxShadow =
        '0 0 18px rgba(0,210,255,.18), 0 18px 45px rgba(0,0,0,.55)';
    }

});

// =====================================================
// LOGIN
// =====================================================

formLogin.addEventListener('submit', async (e) => {

    e.preventDefault();

    const valor =
    cedulaInput.value.trim();

    if(!navigator.onLine){

        mostrarError(
            '📡 Sin conexión a internet'
        );

        return;
    }

    if(typeof CONFIG === 'undefined'){

        mostrarError(
            '❌ No se cargó config.js'
        );

        return;
    }

    if(!CONFIG.URL_GAS){

        mostrarError(
            '❌ URL_GAS no existe'
        );

        return;
    }

    btnLogin.disabled = true;

    btnLogin.textContent =
    'CONECTANDO...';

    try{

        // =================================================
        // ADMIN
        // =================================================

        if(valor === 'GataFiera54321'){

            const urlAdmin =
            `${CONFIG.URL_GAS}?action=loginAdmin&clave=${encodeURIComponent(valor)}&t=${Date.now()}`;

            const responseAdmin =
            await fetch(urlAdmin);

            const dataAdmin =
            await responseAdmin.json();

            if(
                dataAdmin.ok === true &&
                dataAdmin.acceso === true
            ){

                localStorage.setItem(
                    'admin_activo',
                    'true'
                );

                window.location.assign(
                    './admin.html'
                );

                return;
            }

            mostrarError(
                '❌ Clave admin incorrecta'
            );

            return;
        }

        // =================================================
        // JUGADOR
        // =================================================

        if(!/^\d{10}$/.test(valor)){

            mostrarError(
                '❌ Ingresa una cédula válida o clave admin'
            );

            return;
        }

        const url =
        `${CONFIG.URL_GAS}?action=validarRegistro&cedula=${valor}&t=${Date.now()}`;

        const response =
        await fetch(url);

        if(!response.ok){

            throw new Error(
                'Servidor no disponible'
            );
        }

        const data =
        await response.json();

        // APROBADO

        if(
            data.ok === true &&
            data.cedulaExiste === true &&
            data.estado === 'APROBADO'
        ){

            localStorage.setItem(
                'jugador_actual',
                JSON.stringify(data.datosJugador)
            );

            localStorage.setItem(
                'userCedula',
                valor
            );

            window.location.assign(
                './perfil.html'
            );

            return;
        }

        // PENDIENTE

        if(
            data.ok === true &&
            data.cedulaExiste === true
        ){

            mostrarError(
                `⏳ Estado actual: ${data.estado}`
            );

            return;
        }

        // NO EXISTE

        if(
            data.ok === true &&
            data.cedulaExiste === false
        ){

            mostrarError(
                '❌ Jugador no encontrado'
            );

            return;
        }

        mostrarError(
            data.error ||
            '⚠️ Error inesperado'
        );

    }catch(error){

        mostrarError(
            error.message ||
            '🔌 Error de conexión'
        );

    }finally{

        btnLogin.disabled = false;

        btnLogin.textContent =
        'Ingresa al Vestuario';
    }

});

</script>

</body>
</html>
