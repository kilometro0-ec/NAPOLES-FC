<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Nápoles F.C. - Acceso Jugadores</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@600;800;900&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

:root{
    --gold:#D4AF37;
    --gold-light:#f5e6a3;
    --bg:#060912;
    --card-bg:rgba(255,255,255,.05);
    --text:#fff;
    --muted:#9ca3af;
    --danger:#e74c3c;
    --success:#2ecc71;
    --info:#3498db;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;

    font-family:'Inter',sans-serif;

    color:var(--text);

    background:
    radial-gradient(circle at top,#111a33 0%,#060912 100%);
}

.login-container{
    width:100%;
    max-width:420px;
}

.login-card{

    background:
    linear-gradient(
        145deg,
        rgba(10,20,40,.9),
        rgba(5,10,20,.97)
    );

    border-radius:28px;

    border:1px solid rgba(212,175,55,.25);

    backdrop-filter:blur(10px);

    overflow:hidden;

    position:relative;

    padding:30px 24px;

    box-shadow:
    0 20px 40px rgba(0,0,0,.45),
    0 0 30px rgba(212,175,55,.08);
}

.login-card::before{
    content:'';

    position:absolute;

    top:0;
    left:-100%;

    width:100%;
    height:100%;

    background:
    linear-gradient(
        90deg,
        transparent,
        rgba(212,175,55,.08),
        transparent
    );

    animation:shine 4s infinite linear;
}

@keyframes shine{

    0%{
        left:-100%;
    }

    100%{
        left:100%;
    }

}

.logo-area{
    text-align:center;
    margin-bottom:30px;
}

.logo-circle{

    width:90px;
    height:90px;

    border-radius:50%;

    margin:0 auto 18px;

    display:flex;
    align-items:center;
    justify-content:center;

    background:
    rgba(212,175,55,.08);

    border:
    2px solid rgba(212,175,55,.25);

    box-shadow:
    0 0 25px rgba(212,175,55,.15);
}

.logo-circle i{
    font-size:2.7rem;
    color:var(--gold);
}

.logo-title{

    font-family:'Outfit',sans-serif;

    font-size:1.8rem;

    font-weight:900;

    letter-spacing:2px;

    color:var(--gold);
}

.logo-sub{

    margin-top:8px;

    font-size:.9rem;

    color:var(--muted);
}

.form-group{
    margin-bottom:20px;
}

.form-label{

    display:block;

    margin-bottom:10px;

    font-size:.85rem;

    font-weight:700;

    letter-spacing:1px;

    color:var(--gold-light);
}

.input-box{
    position:relative;
}

.input-box i{

    position:absolute;

    top:50%;
    left:16px;

    transform:translateY(-50%);

    color:var(--gold);
}

.input-box input{

    width:100%;
    height:58px;

    border:none;
    outline:none;

    border-radius:18px;

    background:
    rgba(255,255,255,.05);

    border:
    1px solid rgba(255,255,255,.08);

    padding-left:50px;

    color:white;

    font-size:1rem;

    transition:.3s;
}

.input-box input:focus{

    border-color:
    rgba(212,175,55,.4);

    box-shadow:
    0 0 20px rgba(212,175,55,.12);
}

.input-box input::placeholder{
    color:#7f7f7f;
}

.login-btn{

    width:100%;
    height:58px;

    border:none;

    border-radius:18px;

    cursor:pointer;

    font-size:1rem;

    font-weight:900;

    letter-spacing:1px;

    background:
    linear-gradient(
        135deg,
        #D4AF37,
        #f7df84
    );

    color:#111;

    transition:.25s;

    box-shadow:
    0 10px 25px rgba(212,175,55,.25);
}

.login-btn:hover{
    transform:translateY(-2px);
}

.login-btn:active{
    transform:scale(.98);
}

.login-btn:disabled{
    opacity:.7;
    cursor:not-allowed;
}

.message{

    margin-top:18px;

    padding:14px;

    border-radius:14px;

    font-size:.9rem;

    display:none;
}

.message.error{

    background:
    rgba(231,76,60,.12);

    border:
    1px solid rgba(231,76,60,.25);

    color:#ffb0a8;
}

.message.success{

    background:
    rgba(46,204,113,.12);

    border:
    1px solid rgba(46,204,113,.25);

    color:#baffd5;
}

.message.info{

    background:
    rgba(52,152,219,.12);

    border:
    1px solid rgba(52,152,219,.25);

    color:#b8ddff;
}

.spinner{

    width:40px;
    height:40px;

    margin:20px auto 0;

    border-radius:50%;

    border:
    4px solid rgba(255,255,255,.08);

    border-top:
    4px solid var(--gold);

    animation:spin 1s linear infinite;

    display:none;
}

@keyframes spin{

    100%{
        transform:rotate(360deg);
    }

}

.footer{

    margin-top:25px;

    text-align:center;

    font-size:.75rem;

    color:#6b7280;
}

</style>
</head>

<body>

<div class="login-container">

    <div class="login-card">

        <div class="logo-area">

            <div class="logo-circle">
                <i class="fa-solid fa-shield-halved"></i>
            </div>

            <div class="logo-title">
                NÁPOLES F.C.
            </div>

            <div class="logo-sub">
                Plataforma Oficial de Jugadores
            </div>

        </div>

        <form id="loginForm">

            <div class="form-group">

                <label class="form-label">
                    CÉDULA
                </label>

                <div class="input-box">

                    <i class="fa-solid fa-id-card"></i>

                    <input
                        type="text"
                        id="cedula"
                        placeholder="Ingrese su cédula"
                        autocomplete="off"
                        required
                    >

                </div>

            </div>

            <button
                type="submit"
                class="login-btn"
                id="btnLogin"
            >
                INGRESAR
            </button>

        </form>

        <div class="spinner" id="spinner"></div>

        <div class="message" id="mensaje"></div>

        <div class="footer">
            Sistema Deportivo Nápoles F.C.
        </div>

    </div>

</div>

<!-- =========================
     CONFIG
========================= -->

<script src="config.js"></script>

<!-- =========================
     LOGIN
========================= -->

<script>

/* =========================================
   VALIDAR CONFIG
========================================= */

if(!window.CONFIG || !CONFIG.API_URL){

    alert("Error cargando config.js");

    throw new Error("CONFIG no cargado");

}

/* =========================================
   ELEMENTOS
========================================= */

const form = document.getElementById("loginForm");

const cedulaInput =
document.getElementById("cedula");

const btnLogin =
document.getElementById("btnLogin");

const spinner =
document.getElementById("spinner");

const mensaje =
document.getElementById("mensaje");

/* =========================================
   LIMPIAR SESIÓN ANTERIOR
========================================= */

localStorage.removeItem("jugador");

/* =========================================
   MOSTRAR MENSAJE
========================================= */

function mostrarMensaje(texto,tipo="error"){

    mensaje.style.display = "block";

    mensaje.className = "message";

    mensaje.classList.add(tipo);

    mensaje.innerHTML = texto;
}

/* =========================================
   LOGIN
========================================= */

form.addEventListener("submit", async(e)=>{

    e.preventDefault();

    const cedula =
    cedulaInput.value.trim();

    if(!cedula){

        mostrarMensaje(
            "Ingrese la cédula"
        );

        return;
    }

    try{

        btnLogin.disabled = true;

        spinner.style.display = "block";

        mensaje.style.display = "none";

        /* =====================================
           CONSULTAR API
        ===================================== */

        const response = await fetch(
            `${CONFIG.API_URL}?cedula=${encodeURIComponent(cedula)}`
        );

        if(!response.ok){

            throw new Error(
                "Error del servidor"
            );

        }

        const data =
        await response.json();

        console.log(data);

        /* =====================================
           VALIDAR EXISTENCIA
        ===================================== */

        if(!data ||
           Object.keys(data).length === 0){

            mostrarMensaje(
                "Jugador no encontrado"
            );

            return;
        }

        /* =====================================
           APROBADO
        ===================================== */

        if(data.estado === "APROBADO"){

            localStorage.setItem(
                "jugador",
                JSON.stringify(data)
            );

            mostrarMensaje(
                "Acceso autorizado",
                "success"
            );

            setTimeout(()=>{

                window.location.href =
                "perfil.html";

            },700);

        }

        /* =====================================
           PENDIENTE
        ===================================== */

        else if(
            data.estado === "PENDIENTE"
        ){

            mostrarMensaje(
                "Jugador pendiente de aprobación"
            );

        }

        /* =====================================
           BLOQUEADO
        ===================================== */

        else if(
            data.estado === "BLOQUEADO"
        ){

            mostrarMensaje(
                "Jugador bloqueado"
            );

        }

        /* =====================================
           ERROR GENERAL
        ===================================== */

        else{

            mostrarMensaje(
                "Acceso denegado"
            );

        }

    }

    catch(error){

        console.error(error);

        mostrarMensaje(
            "Error conectando con el servidor"
        );

    }

    finally{

        spinner.style.display = "none";

        btnLogin.disabled = false;

    }

});

</script>

</body>
</html>
