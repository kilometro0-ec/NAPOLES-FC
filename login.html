<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nápoles F.C. - Acceso Jugadores</title>
    
    <!-- PWA & iOS -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Nápoles FC">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1165/1165187.png">
    <meta name="theme-color" content="#020c1a">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00d2ff;
            --primary-dark: #008f9b;
            --accent: #FFD700;
            --bg-dark: #020c1a;
            --glass: rgba(12, 25, 45, 0.7);
            --admin-glow: rgba(139, 92, 246, 0.4);
            --admin-border: #a78bfa;
            --admin-bg-morado: rgba(139, 92, 246, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(0, 210, 255, 0.15), transparent 50%),
                linear-gradient(rgba(2, 12, 26, 0.8), rgba(2, 12, 26, 0.8)),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%2300d2ff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            color: white;
        }

        .login-card {
            max-width: 420px;
            width: 100%;
            background: var(--glass);
            backdrop-filter: blur(20px) saturate(180%);
            border-radius: 2.5rem;
            border: 1px solid rgba(0, 210, 255, 0.4);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3), 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 3rem 2.5rem;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo-area h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .input-group {
            margin-bottom: 2rem;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        input {
            width: 100%;
            padding: 1.2rem;
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.2rem;
            color: white;
            font-size: 1.3rem;
            font-weight: 600;
            text-align: center;
            letter-spacing: 4px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.9);
        }

        .btn-submit {
            width: 100%;
            padding: 1.2rem;
            border-radius: 1.2rem;
            border: none;
            background: linear-gradient(135deg, var(--primary-dark) 0%, #00d2ff 100%);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-submit:disabled {
            background: #1e293b;
            color: #475569;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .footer-links {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.9rem;
        }

        .footer-links a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 700;
        }

        .btn-download {
            background: rgba(0, 210, 255, 0.15);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 0.7rem 1.2rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1.2rem;
            display: inline-block;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #fecaca;
            padding: 0.8rem 1rem;
            border-radius: 0.8rem;
            margin-top: 1rem;
            font-size: 0.8rem;
            text-align: center;
            display: none;
        }

        /* Modo admin visual */
        body.admin-mode-body .login-card {
            border-color: var(--admin-border);
            box-shadow: 0 0 18px rgba(139, 92, 246, 0.5);
        }
        body.admin-mode-body .input-group label { color: #c084fc; }
        input.admin-mode { background: var(--admin-bg-morado); border-color: var(--admin-border); }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo-area">
        <h1>NÁPOLES F.C.</h1>
        <p>Panel de Control de Jugadores</p>
    </div>

    <div class="input-group">
        <label>Número de Cédula / Clave Admin</label>
        <input type="text" id="loginCedula" maxlength="30" placeholder="1234567890" inputmode="text" autocomplete="off">
    </div>

    <button id="btnLogin" class="btn-submit" disabled>Iniciar Sesión</button>
    <div id="errorMsg" class="error-message"></div>

    <div class="footer-links">
        ¿Eres nuevo en el club?<br><br>
        <a href="registro.html">CREAR CUENTA NUEVA ✨</a>
        <div id="containerDownload">
            <span id="manualDownloadBtn" class="btn-download">📲 DESCARGAR APK OFICIAL</span>
        </div>
    </div>
</div>

<!-- Cargar configuración -->
<script src="config.js"></script>

<script>
    // ======================== ELEMENTOS ========================
    const cedulaInput = document.getElementById('loginCedula');
    const btnLogin = document.getElementById('btnLogin');
    const errorDiv = document.getElementById('errorMsg');
    const bodyElem = document.body;

    const ADMIN_SECRET = "GataFiera54321";
    const ADMIN_COLOR_TRIGGER = "Gata";

    // ======================== UTILIDADES ========================
    function mostrarError(mensaje) {
        errorDiv.textContent = mensaje;
        errorDiv.style.display = 'block';
        setTimeout(() => {
            errorDiv.style.display = 'none';
        }, 5000);
    }

    function actualizarModoVisual() {
        const valor = cedulaInput.value.trim();
        btnLogin.disabled = valor === "";
        if (valor.includes(ADMIN_COLOR_TRIGGER)) {
            bodyElem.classList.add('admin-mode-body');
            cedulaInput.classList.add('admin-mode');
        } else {
            bodyElem.classList.remove('admin-mode-body');
            cedulaInput.classList.remove('admin-mode');
        }
    }

    cedulaInput.addEventListener('input', () => {
        actualizarModoVisual();
        errorDiv.style.display = 'none';
    });

    // ======================== LOGIN PRINCIPAL ========================
    btnLogin.addEventListener('click', async () => {
        const valorIngresado = cedulaInput.value.trim();

        // 🔐 ACCESO ADMINISTRADOR (sin validación numérica)
        if (valorIngresado === ADMIN_SECRET) {
            localStorage.setItem('admin_session', 'true');
            window.location.href = 'admin.html';
            return;
        }

        // Validar que sea una cédula de 10 dígitos (solo para jugadores)
        if (!/^\d{10}$/.test(valorIngresado)) {
            mostrarError('❌ Cédula inválida – debe tener 10 dígitos numéricos');
            return;
        }

        // Deshabilitar botón mientras se consulta
        btnLogin.disabled = true;
        const textoOriginal = btnLogin.innerText;
        btnLogin.innerText = 'VERIFICANDO...';

        try {
            if (typeof CONFIG === 'undefined' || !CONFIG.URL_GAS) {
                throw new Error('Configuración no cargada. Revisa config.js');
            }

            const url = `${CONFIG.URL_GAS}?action=validarRegistro&cedula=${encodeURIComponent(valorIngresado)}&t=${Date.now()}`;
            console.log('Consultando:', url);
            const respuesta = await fetch(url);

            if (!respuesta.ok) {
                throw new Error(`Error HTTP ${respuesta.status}`);
            }

            const data = await respuesta.json();
            console.log('Respuesta del servidor:', data);

            if (data.cedulaExiste === true) {
                const estadoNormalizado = (data.estado || '').toString().trim().toUpperCase();
                
                if (estadoNormalizado === 'APROBADO') {
                    if (!data.datosJugador) {
                        mostrarError('⚠️ Datos del jugador no recibidos. Contacta al administrador.');
                        return;
                    }
                    
                    const sesion = {
                        ...data.datosJugador,
                        cedula: valorIngresado,
                        loginTime: Date.now()
                    };
                    localStorage.setItem('jugador_actual', JSON.stringify(sesion));
                    
                    window.location.href = 'perfil.html';
                    return;
                } else {
                    mostrarError(`⏳ Estado actual: "${data.estado}". Se requiere APROBADO para ingresar.`);
                    return;
                }
            } else if (data.cedulaExiste === false) {
                mostrarError('❌ Cédula no registrada. Regístrate primero.');
                return;
            } else {
                mostrarError('⚠️ Respuesta inesperada del servidor.');
                console.error('Formato inesperado:', data);
                return;
            }

        } catch (error) {
            console.error('Error en login:', error);
            mostrarError(`🔌 Error de conexión: ${error.message}. Verifica tu internet.`);
        } finally {
            btnLogin.disabled = false;
            btnLogin.innerText = textoOriginal;
            actualizarModoVisual();
        }
    });

    // Enter para login
    cedulaInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !btnLogin.disabled) {
            btnLogin.click();
        }
    });

    actualizarModoVisual();

    // ======================== PWA - INSTALACIÓN ========================
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        const manualBtn = document.getElementById('manualDownloadBtn');
        if (manualBtn) {
            manualBtn.innerHTML = "👕 INSTALAR APP";
            manualBtn.style.background = "linear-gradient(135deg,#FFD700,#B8860B)";
            manualBtn.style.color = "#000";
        }
    });

    document.getElementById('manualDownloadBtn')?.addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                document.getElementById('containerDownload').style.display = 'none';
            }
            deferredPrompt = null;
        } else {
            alert("⚽ Abre el menú del navegador y selecciona 'Instalar App'");
        }
    });
</script>
</body>
</html>
