<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Jugadores | Nápoles FC</title>
    
    <!-- Configuración PWA para instalación directa -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#b59461">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <link rel="stylesheet" href="estilos.css">
    <style>
        .contenedor-login {
            max-width: 400px;
            margin: 60px auto;
            padding: 30px;
            background-color: var(--gris-suave);
            border: 1px solid var(--dorado);
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .logo-login {
            font-size: 60px;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px var(--dorado));
        }
        .mensaje-error {
            color: #ff4444;
            font-size: 0.85em;
            margin-top: 15px;
            display: none;
            background: rgba(255, 68, 68, 0.1);
            padding: 10px;
            border-radius: 5px;
        }
        .loader-login {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid var(--azul-noche);
            border-top: 3px solid var(--dorado);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="contenedor-login">
        <div class="logo-login">⚽</div>
        <h2 style="color: white; margin-bottom: 5px;">Acceso Jugadores</h2>
        <p style="color: var(--dorado); font-size: 0.9em; margin-bottom: 25px; letter-spacing: 1px;">NÁPOLES F.C. 2026</p>

        <form id="formLogin">
            <label style="display: block; text-align: left; margin-bottom: 8px;">Número de Cédula</label>
            <input type="text" id="loginCedula" placeholder="Ej: 172XXXXXXX" maxlength="10" pattern="\d{10}" required 
                   style="width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid var(--dorado); background: #1a1a1a; color: white;">
            
            <button type="submit" id="btnEntrar" class="btn-accion" style="width: 100%;">
                <span id="textBtn">ENTRAR AL CLUB</span>
                <div id="loaderBtn" class="loader-login"></div>
            </button>
            
            <p id="errorLogin" class="mensaje-error">⚠️ Cédula no registrada o en proceso de validación.</p>
        </form>

        <div style="margin-top: 25px; border-top: 1px solid rgba(181, 148, 97, 0.2); padding-top: 20px;">
            <a href="index.html" style="color: var(--dorado); text-decoration: none; font-size: 0.85em;">¿Eres nuevo? <strong>Regístrate aquí</strong></a>
        </div>
    </div>

    <script>
        // URL de tu Script de Google (la misma de api.js)
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzLctY39LIa_aVSFKCIQl306huhIk6CiZzrUC2PczfeVlTJ9-V9Vt9giq1A2mYveAHW/exec";

        document.getElementById('formLogin').addEventListener('submit', async (e) => {
            e.preventDefault();
            const cedula = document.getElementById('loginCedula').value.trim();
            const btn = document.getElementById('btnEntrar');
            const textBtn = document.getElementById('textBtn');
            const loaderBtn = document.getElementById('loaderBtn');
            const errorMsg = document.getElementById('errorLogin');

            // Estado de carga
            textBtn.style.display = 'none';
            loaderBtn.style.display = 'block';
            btn.disabled = true;
            errorMsg.style.display = 'none';

            try {
                // Petición al servidor (Google Sheets)
                const response = await fetch(`${SCRIPT_URL}?action=login&cedula=${cedula}`);
                const resultado = await response.json();

                if (resultado.success) {
                    // 1. Guardamos la sesión localmente
                    localStorage.setItem('jugador_aprobado', 'true');
                    localStorage.setItem('datos_jugador', JSON.stringify(resultado.datos));
                    
                    // 2. Redirección inmediata al perfil
                    window.location.href = 'perfil.html';
                } else {
                    // Cédula no encontrada
                    errorMsg.style.display = 'block';
                    resetBtn();
                }
            } catch (error) {
                console.error("Error de Login:", error);
                alert("Problema de conexión. Verifica tu internet e intenta de nuevo.");
                resetBtn();
            }
        });

        function resetBtn() {
            const btn = document.getElementById('btnEntrar');
            const textBtn = document.getElementById('textBtn');
            const loaderBtn = document.getElementById('loaderBtn');
            textBtn.style.display = 'block';
            loaderBtn.style.display = 'none';
            btn.disabled = false;
        }

        // Registro de PWA para instalación desde navegador
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW error', err));
            });
        }
    </script>

    <!-- Scripts de soporte -->
    <script src="api.js"></script>
    <script src="nav.js"></script>
</body>
</html>
