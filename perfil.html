<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nápoles F.C. - Mi Perfil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 50%, #0a0f1e 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 16px;
            color: #fff;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: radial-gradient(circle at 20% 80%, rgba(212, 175, 55, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        .profile-container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        .profile-header {
            background: rgba(10, 20, 40, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            text-align: center;
        }
        .profile-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFD700, #D4AF37);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .profile-header p {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
            margin-top: 4px;
        }
        .player-card {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.15) 0%, rgba(10, 20, 40, 0.8) 100%);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            position: relative;
            overflow: hidden;
        }
        .player-photo-section {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .player-photo-wrapper { position: relative; }
        .player-photo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid #D4AF37;
            padding: 4px;
            background: linear-gradient(135deg, #1a1f2e, #0f1420);
        }
        .player-photo img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        .ovr-badge {
            position: absolute;
            bottom: -5px;
            right: -10px;
            background: linear-gradient(135deg, #FFD700, #D4AF37);
            color: #0a0f1e;
            font-weight: 800;
            font-size: 1.2rem;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 3px solid #0a0f1e;
            font-family: 'Outfit', sans-serif;
        }
        .player-info { flex: 1; min-width: 180px; text-align: center; }
        .player-name {
            font-size: 1.5rem;
            font-weight: 800;
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #fff, #D4AF37);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .dorsal-badge {
            display: inline-block;
            background: rgba(212, 175, 55, 0.2);
            border: 1px solid rgba(212, 175, 55, 0.5);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #D4AF37;
            margin-top: 8px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: rgba(10, 20, 40, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-icon { font-size: 24px; margin-bottom: 6px; }
        .stat-label { font-size: 0.65rem; text-transform: uppercase; color: rgba(255,255,255,0.5); }
        .stat-value { font-size: 1.5rem; font-weight: 800; color: #D4AF37; }
        .values-section, .payments-section {
            background: rgba(10, 20, 40, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #D4AF37;
        }
        .values-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .value-item {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .value-name { font-size: 0.75rem; display: flex; align-items: center; gap: 6px; }
        .value-score { font-weight: 700; color: #D4AF37; }
        .payments-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .payment-item {
            text-align: center;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
        }
        .payment-status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 700;
            margin-top: 8px;
        }
        .pagado { background: #2ecc71; color: #fff; }
        .pendiente { background: #e74c3c; color: #fff; }
        .logout-btn {
            width: 100%;
            background: rgba(231, 76, 60, 0.15);
            border: 1px solid rgba(231, 76, 60, 0.3);
            border-radius: 60px;
            padding: 14px;
            color: #e74c3c;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        .loading-screen { text-align: center; padding: 60px 20px; }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(212, 175, 55, 0.2);
            border-top-color: #D4AF37;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .debug-info {
            background: rgba(0,0,0,0.7);
            padding: 10px;
            margin-top: 20px;
            border-radius: 8px;
            font-size: 10px;
            font-family: monospace;
            word-break: break-all;
            display: block;
        }
    </style>
</head>
<body>
<div class="profile-container">
    <div id="perfilContent">
        <div class="loading-screen"><div class="spinner"></div><p>CARGANDO PERFIL...</p></div>
    </div>
    <div id="debugInfo" class="debug-info" style="display:none;"></div>
</div>

<script>
    const URL_GAS = "https://script.google.com/macros/s/AKfycbzkx0jy898-7kBEfGVWtPXPoTMuf4VsJWB7l7tldRwCk_-em_YcMpIpgEUns3muSEKA/exec";

    const session = JSON.parse(localStorage.getItem('jugador_aprobado'));
    if (!session || !session.cedula || Date.now() > session.expira) {
        localStorage.removeItem('jugador_aprobado');
        window.location.href = 'login.html';
    } else {
        cargarPerfil(session.cedula);
    }

    // FUNCIÓN ULTRA MEJORADA para convertir URL de Drive a imagen directa
    function convertirUrlDrive(url) {
        if (!url || url === 'null' || url === '' || url === 'undefined') return null;
        
        // Limpiar la URL
        let cleanUrl = String(url).trim();
        
        // Si ya es URL de imagen directa correcta
        if (cleanUrl.includes('drive.google.com/uc?export=view')) return cleanUrl;
        if (cleanUrl.includes('drive.google.com/thumbnail?id=')) return cleanUrl;
        
        // MÉTODO 1: Extraer ID de /d/ID/ (formato más común)
        let match = cleanUrl.match(/\/d\/([a-zA-Z0-9_-]+)/);
        if (match && match[1]) {
            return `https://drive.google.com/uc?export=view&id=${match[1]}`;
        }
        
        // MÉTODO 2: Extraer ID de id=ID
        match = cleanUrl.match(/[?&]id=([a-zA-Z0-9_-]+)/);
        if (match && match[1]) {
            return `https://drive.google.com/uc?export=view&id=${match[1]}`;
        }
        
        // MÉTODO 3: Extraer ID de /uc?id=ID
        match = cleanUrl.match(/uc\?id=([a-zA-Z0-9_-]+)/);
        if (match && match[1]) {
            return `https://drive.google.com/uc?export=view&id=${match[1]}`;
        }
        
        // MÉTODO 4: Si la URL es solo el ID (más de 25 caracteres alfanuméricos)
        if (cleanUrl.match(/^[a-zA-Z0-9_-]{25,}$/)) {
            return `https://drive.google.com/uc?export=view&id=${cleanUrl}`;
        }
        
        // MÉTODO 5: Buscar cualquier cadena larga que parezca un ID
        match = cleanUrl.match(/([a-zA-Z0-9_-]{28,})/);
        if (match && match[1]) {
            return `https://drive.google.com/uc?export=view&id=${match[1]}`;
        }
        
        return cleanUrl;
    }

    async function cargarPerfil(cedula) {
        const container = document.getElementById('perfilContent');
        const debugDiv = document.getElementById('debugInfo');
        const cedulaLimpia = String(cedula).replace(/[^0-9]/g, '');
        
        try {
            const url = `${URL_GAS}?action=obtenerJugador&cedula=${encodeURIComponent(cedulaLimpia)}&t=${Date.now()}`;
            const resp = await fetch(url);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const data = await resp.json();
            
            // Mostrar debug
            debugDiv.style.display = 'block';
            debugDiv.innerHTML = `<strong>DEBUG:</strong><br>`;
            debugDiv.innerHTML += `Cédula: ${cedulaLimpia}<br>`;
            debugDiv.innerHTML += `Data recibida: ${JSON.stringify(data, null, 2).substring(0, 500)}<br>`;
            
            if (data.ok && data.jugador) {
                const j = data.jugador;
                
                debugDiv.innerHTML += `<br><strong>URL Rostro original:</strong> ${j.urlRostro || 'NO HAY URL'}<br>`;
                
                const goles = j.goles || 0;
                const amarillas = j.amarillas || 0;
                const rojas = j.rojas || 0;
                const companerismo = j.companerismo || 0;
                const respeto = j.respeto || 0;
                const humildad = j.humildad || 0;
                const puntualidad = j.puntualidad || 0;
                const dorsal = j.dorsal || '--';
                const nombreCamiseta = j.nombreCamiseta || j.nombre1 || 'JUGADOR';
                const nombreCompleto = `${j.nombre1 || ''} ${j.apellidos || ''}`.trim();
                const partidos = j.partidosJugados || 0;
                const vocaliasPendientes = j.vocaliasPendientes || 0;
                
                const promedio = (Number(companerismo) + Number(respeto) + Number(humildad) + Number(puntualidad)) / 4;
                const ovrMostrar = Math.min(99, Math.max(40, Math.round(promedio * 10) || 60));
                
                // CONVERTIR LA URL DE LA FOTO
                let fotoUrl = convertirUrlDrive(j.urlRostro);
                debugDiv.innerHTML += `<strong>URL convertida:</strong> ${fotoUrl || 'NO SE PUDO CONVERTIR'}<br>`;
                
                // Si no hay foto, usar avatar
                if (!fotoUrl) {
                    const inicial = nombreCompleto.charAt(0).toUpperCase();
                    fotoUrl = `https://ui-avatars.com/api/?background=D4AF37&color=0a1428&bold=true&size=130&name=${encodeURIComponent(inicial)}`;
                    debugDiv.innerHTML += `<strong>Usando avatar:</strong> ${fotoUrl}<br>`;
                }
                
                container.innerHTML = `
                    <div class="profile-header">
                        <h1>⚜️ NÁPOLES F.C. ⚜️</h1>
                        <p>Club Atlético Nápoles - Miembro Oficial</p>
                    </div>
                    
                    <div class="player-card">
                        <div class="player-photo-section">
                            <div class="player-photo-wrapper">
                                <div class="player-photo">
                                    <img src="${fotoUrl}" alt="${nombreCamiseta}" 
                                         onerror="this.src='https://ui-avatars.com/api/?background=0a1428&color=D4AF37&bold=true&size=130&name=${encodeURIComponent(nombreCompleto.charAt(0))}'">
                                </div>
                                <div class="ovr-badge">${ovrMostrar}</div>
                            </div>
                            <div class="player-info">
                                <div class="player-name">${nombreCompleto.toUpperCase()}</div>
                                <div class="dorsal-badge"><i class="fas fa-hashtag"></i> DORSAL ${dorsal}</div>
                                <div style="font-size:0.7rem; margin-top:8px;"><i class="fas fa-id-card"></i> ${cedulaLimpia}</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="stats-grid">
                        <div class="stat-card"><div class="stat-icon"><i class="fas fa-futbol"></i></div><div class="stat-label">GOLES</div><div class="stat-value">${goles}</div></div>
                        <div class="stat-card"><div class="stat-icon"><i class="fas fa-square" style="color:#f1c40f;"></i></div><div class="stat-label">AMARILLAS</div><div class="stat-value">${amarillas}</div></div>
                        <div class="stat-card"><div class="stat-icon"><i class="fas fa-square" style="color:#e74c3c;"></i></div><div class="stat-label">ROJAS</div><div class="stat-value">${rojas}</div></div>
                    </div>
                    
                    <div class="values-section">
                        <div class="section-title"><i class="fas fa-chart-line"></i> VALORES HUMANOS <span style="font-size:0.6rem; margin-left:auto;">(${partidos} partidos)</span></div>
                        <div class="values-grid">
                            <div class="value-item"><span class="value-name"><i class="fas fa-handshake"></i> Compañerismo</span><span class="value-score">${companerismo}/10</span></div>
                            <div class="value-item"><span class="value-name"><i class="fas fa-heart"></i> Respeto</span><span class="value-score">${respeto}/10</span></div>
                            <div class="value-item"><span class="value-name"><i class="fas fa-leaf"></i> Humildad</span><span class="value-score">${humildad}/10</span></div>
                            <div class="value-item"><span class="value-name"><i class="fas fa-clock"></i> Puntualidad</span><span class="value-score">${puntualidad}/10</span></div>
                        </div>
                    </div>
                    
                    <div class="payments-section">
                        <div class="section-title"><i class="fas fa-credit-card"></i> ESTADO DE PAGOS</div>
                        <div class="payments-grid">
                            <div class="payment-item"><i class="fas fa-file-signature"></i><div>Inscripción</div><span class="payment-status-badge ${j.inscripEstado === 'PAGADO' ? 'pagado' : 'pendiente'}">${j.inscripEstado || 'PENDIENTE'}</span></div>
                            <div class="payment-item"><i class="fas fa-tshirt"></i><div>Uniforme</div><span class="payment-status-badge ${j.unifEstado === 'PAGADO' ? 'pagado' : 'pendiente'}">${j.unifEstado || 'PENDIENTE'}</span></div>
                            <div class="payment-item"><i class="fas fa-socks"></i><div>Medias</div><span class="payment-status-badge ${j.mediasEstado === 'PAGADO' ? 'pagado' : 'pendiente'}">${j.mediasEstado || 'PENDIENTE'}</span></div>
                        </div>
                        <div style="margin-top:12px; text-align:center; padding:10px; background:rgba(0,0,0,0.3); border-radius:16px;">
                            <i class="fas fa-coins"></i> Vocalía: 
                            <strong style="color:${j.estadoPagoVocalia === 'PAGADO' ? '#2ecc71' : '#e74c3c'}">
                                ${j.estadoPagoVocalia || 'PENDIENTE'}
                            </strong>
                            ${vocaliasPendientes > 0 ? `<span style="font-size:0.7rem; margin-left:8px;">(Deuda: $${vocaliasPendientes})</span>` : ''}
                        </div>
                    </div>
                    
                    <button class="logout-btn" id="cerrarSesion"><i class="fas fa-sign-out-alt"></i> CERRAR SESIÓN</button>
                `;
                
                document.getElementById('cerrarSesion').onclick = () => {
                    localStorage.removeItem('jugador_aprobado');
                    window.location.href = 'login.html';
                };
            } else {
                container.innerHTML = `<div class="loading-screen"><p>❌ ${data.mensaje || 'JUGADOR NO ENCONTRADO'}</p><button onclick="localStorage.removeItem('jugador_aprobado');location.href='login.html'" style="margin-top:20px; background:#D4AF37; border:none; padding:10px 20px; border-radius:50px;">VOLVER</button></div>`;
            }
        } catch (error) {
            debugDiv.style.display = 'block';
            debugDiv.innerHTML += `<br><strong>ERROR:</strong> ${error.message}<br>`;
            container.innerHTML = `<div class="loading-screen"><p>❌ ERROR DE CONEXIÓN</p><button onclick="location.reload()" style="margin-top:20px; background:#D4AF37; border:none; padding:10px 20px; border-radius:50px;">REINTENTAR</button></div>`;
        }
    }
</script>
</body>
</html>
