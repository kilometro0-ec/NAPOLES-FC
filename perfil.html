<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Pro | Nápoles FC</title>
    <link rel="stylesheet" href="estilos.css">
    <style>
        .perfil-grid {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 25px;
            max-width: 1100px;
            margin: 30px auto;
            padding: 20px;
        }

        /* DISEÑO DE LA CAMISETA PROFESIONAL */
        .camiseta-container {
            background: linear-gradient(180deg, #001a33 0%, #000 100%);
            border: 2px solid var(--dorado);
            border-radius: 20px;
            height: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            position: relative;
        }

        .foto-camiseta {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid var(--dorado);
            object-fit: cover;
            background: #222;
            margin-bottom: 25px;
        }

        .nombre-estampado {
            font-size: 28px;
            font-weight: 800;
            color: white;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-family: 'Arial Black', sans-serif;
            margin-bottom: 5px;
        }

        .numero-estampado {
            font-size: 160px;
            font-weight: 900;
            color: var(--dorado);
            line-height: 0.8;
            font-family: 'Impact', sans-serif;
            text-shadow: 5px 5px 0px rgba(0,0,0,0.8);
        }

        /* MODAL OBLIGATORIO */
        #modalEleccion {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .caja-eleccion {
            background: var(--azul-noche);
            padding: 40px;
            border: 2px solid var(--dorado);
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 450px;
        }

        /* FICHA DE DATOS */
        .ficha-datos {
            background: var(--gris-suave);
            padding: 25px;
            border-radius: 15px;
            border-top: 4px solid var(--dorado);
        }

        .dato-fila {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 5px;
        }

        @media (max-width: 850px) {
            .perfil-grid { grid-template-columns: 1fr; }
            .camiseta-container { order: -1; }
        }
    </style>
</head>
<body>

    <!-- MODAL DE ELECCIÓN PRIMERA VEZ -->
    <div id="modalEleccion">
        <div class="caja-eleccion">
            <h2 style="color: var(--dorado);">CONFIGURACIÓN INICIAL</h2>
            <p style="margin-bottom: 25px;">Selecciona los datos de tu uniforme oficial</p>
            
            <label style="display: block; text-align: left; margin-bottom: 5px;">Nombre en la Camiseta (Columna B o C)</label>
            <select id="selectNombre" class="btn-accion" style="margin-bottom: 20px; width: 100%;"></select>
            
            <label style="display: block; text-align: left; margin-bottom: 5px;">Número de Dorsal</label>
            <input type="number" id="inputNumero" min="1" max="99" placeholder="Ej: 10" class="btn-accion" style="margin-bottom: 30px; width: 100%;">
            
            <button onclick="guardarConfig()" class="btn-accion" style="width: 100%;">CONFIRMAR E INGRESAR</button>
        </div>
    </div>

    <div class="perfil-grid">
        <!-- IZQUIERDA: DATOS COMPLETOS -->
        <div class="info-area">
            <div class="ficha-datos">
                <h3 style="color: var(--dorado); margin-top: 0;">DATOS DEL JUGADOR</h3>
                <div class="dato-fila"><span>Primer Nombre:</span><strong id="txtB">---</strong></div>
                <div class="dato-fila"><span>Segundo Nombre:</span><strong id="txtC">---</strong></div>
                <div class="dato-fila"><span>Apellidos:</span><strong id="txtD">---</strong></div>
                <div class="dato-fila"><span>Cédula:</span><strong id="txtCI">---</strong></div>
                
                <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 20px 0;">
                
                <h3 style="color: var(--dorado);">ESTADÍSTICAS</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div style="background: #000; padding: 15px; border-radius: 10px;">
                        <small>GOLES</small><br><span id="valG" style="font-size: 1.5em; color: var(--dorado);">0</span>
                    </div>
                    <div style="background: #000; padding: 15px; border-radius: 10px;">
                        <small>AMARILLAS</small><br><span id="valA" style="font-size: 1.5em; color: #ffcc00;">0</span>
                    </div>
                </div>
            </div>

            <button onclick="cerrarSesion()" style="margin-top: 20px; background: none; border: 1px solid #ff4444; color: #ff4444; padding: 10px 15px; border-radius: 5px; cursor: pointer;">
                Cerrar Sesión
            </button>
        </div>

        <!-- DERECHA: CAMISETA -->
        <div class="camiseta-container">
            <img id="camImg" src="https://via.placeholder.com/150" class="foto-camiseta">
            <div id="camNom" class="nombre-estampado">NOMBRE</div>
            <div id="camNum" class="numero-estampado">--</div>
            <p style="margin-top: 20px; color: var(--dorado); letter-spacing: 3px; font-size: 0.7em;">NÁPOLES FC OFFICIAL</p>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const j = JSON.parse(localStorage.getItem('datos_jugador'));
            if(!j) { window.location.href = 'login.html'; return; }

            // 1. Mostrar datos completos (Columnas B, C, D)
            document.getElementById('txtB').innerText = j.nombre1 || "---";
            document.getElementById('txtC').innerText = j.nombre2 || "---";
            document.getElementById('txtD').innerText = j.apellidos || "---";
            document.getElementById('txtCI').innerText = j.cedula;
            document.getElementById('valG').innerText = j.goles || 0;
            document.getElementById('valA').innerText = j.amarillas || 0;
            document.getElementById('camImg').src = j.foto || 'https://via.placeholder.com/150';

            // 2. Verificar si ya eligió camiseta
            if(!j.nomCamiseta || !j.numDorsal) {
                abrirModal(j);
            } else {
                actualizarVistaCamiseta(j.nomCamiseta, j.numDorsal);
            }
        });

        function abrirModal(j) {
            document.getElementById('modalEleccion').style.display = 'flex';
            const select = document.getElementById('selectNombre');
            
            // Opciones obligatorias de Columna B o C
            const b = j.nombre1 || "NOMBRE";
            const c = j.nombre2 || "";
            
            let html = `<option value="${b}">${b} (1er Nombre)</option>`;
            if(c) html += `<option value="${c}">${c} (2do Nombre)</option>`;
            
            select.innerHTML = html;
        }

        function guardarConfig() {
            const nom = document.getElementById('selectNombre').value;
            const num = document.getElementById('inputNumero').value;
            const j = JSON.parse(localStorage.getItem('datos_jugador'));

            if(!num || num < 1 || num > 99) {
                alert("Número de dorsal inválido");
                return;
            }

            // Guardar local
            j.nomCamiseta = nom;
            j.numDorsal = num;
            localStorage.setItem('datos_jugador', JSON.stringify(j));

            actualizarVistaCamiseta(nom, num);
            document.getElementById('modalEleccion').style.display = 'none';
        }

        function actualizarVistaCamiseta(nom, num) {
            document.getElementById('camNom').innerText = nom;
            document.getElementById('camNum').innerText = num;
        }

        function cerrarSesion() {
            localStorage.clear();
            window.location.href = 'login.html';
        }
    </script>

    <script src="nav.js"></script>
</body>
</html>
