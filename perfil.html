<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nápoles F.C. - Mi Perfil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-gold: #D4AF37;
            --dark-bg: #060912;
            --card-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(212, 175, 55, 0.2);
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: radial-gradient(circle at top, #111a33 0%, #060912 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 15px;
            color: var(--text-main);
            display: flex;
            justify-content: center;
        }

        .profile-container { width: 100%; max-width: 450px; }

        .profile-header { text-align: center; margin-bottom: 15px; }
        .profile-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.4rem;
            color: var(--primary-gold);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- FILA DE TARJETAS (ID CARDS) --- */
        .cards-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
            align-items: stretch;
        }

        /* TARJETA 1: FOTO E IDENTIDAD */
        .id-card-identity {
            background: linear-gradient(145deg, rgba(212, 175, 55, 0.1), rgba(10, 20, 40, 0.9));
            border-radius: 20px;
            border: 1.5px solid var(--glass-border);
            padding: 15px 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .photo-wrapper {
            position: relative;
            width: 85px;
            margin-bottom: 10px;
        }

        .player-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid var(--primary-gold);
            object-fit: cover;
            background: #000;
        }

        .ovr-badge {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background: var(--primary-gold);
            color: #000;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 0.9rem;
            border: 2px solid #0b1426;
            font-family: 'Outfit';
        }

        .ci-text {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        /* TARJETA 2: CAMISETA GIRATORIA */
        .id-card-jersey-wrap {
            perspective: 800px;
            height: 180px;
        }

        .jersey-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            animation: rotateJersey 8s infinite linear;
        }

        @keyframes rotateJersey {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        .face-jersey {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #0a1428, #000);
            border-radius: 20px;
            border: 1.5px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backface-visibility: visible;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .jersey-name {
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            font-weight: 800;
            text-transform: uppercase;
            color: #fff;
            z-index: 1;
        }

        .jersey-number {
            font-family: 'Outfit', sans-serif;
            font-size: 4rem;
            font-weight: 900;
            color: var(--primary-gold);
            line-height: 1;
            z-index: 1;
        }

        /* --- BOTÓN ACTUALIZAR DEBAJO DE LAS CARDS --- */
        .sync-container { text-align: center; margin-bottom: 20px; }
        .btn-sync {
            background: rgba(212, 175, 55, 0.1);
            color: var(--primary-gold);
            border: 1px solid var(--glass-border);
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
        }

        /* --- ESTADÍSTICAS Y BLOQUES --- */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .stat-card {
            background: var(--card-bg); border-radius: 15px; padding: 10px;
            text-align: center; border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-val { font-size: 1.1rem; font-weight: 800; color: #fff; }
        .stat-lab { font-size: 0.55rem; color: var(--text-muted); text-transform: uppercase; }

        .section-box {
            background: var(--card-bg); border-radius: 18px; padding: 15px;
            margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05);
        }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.8rem; }
        .info-row span:last-child { font-weight: 700; color: var(--primary-gold); }

        .btn-logout {
            width: 100%; padding: 12px; border-radius: 12px; border: none;
            background: rgba(231, 76, 60, 0.1); color: #e74c3c;
            font-weight: 700; cursor: pointer; margin-top: 10px;
        }

        .spinner { width: 40px; height: 40px; border: 3px solid rgba(212, 175, 55, 0.1); border-top-color: var(--primary-gold); border-radius: 50%; animation: spin 1s infinite linear; margin: 100px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="profile-container" id="perfilContent">
    <div class="spinner"></div>
</div>

<script src="config.js"></script>
<script>
    const session = JSON.parse(localStorage.getItem('jugador_actual'));
    
    if (!session || !session.cedula || Date.now() > session.expira) {
        localStorage.removeItem('jugador_actual');
        window.location.href = 'login.html';
    } else {
        cargarPerfil(session.cedula);
    }

    async function cargarPerfil(cedula) {
        const container = document.getElementById('perfilContent');
        const ciLimpia = String(cedula).replace(/[^0-9]/g, '');
        
        try {
            const url = `${CONFIG.URL_GAS}?action=getPerfil&cedula=${encodeURIComponent(ciLimpia)}&t=${Date.now()}`;
            const resp = await fetch(url);
            const data = await resp.json();
            
            if (data.success && data.jugador) {
                const j = data.jugador;
                const ovr = Math.round(((Number(j.companerismo||8) + Number(j.respeto||8) + Number(j.humildad||8) + Number(j.puntualidad||8)) / 4) * 10);
                const nombreDorso = j.nombreCamiseta || j.primerNombre || 'NÁPOLES';

                container.innerHTML = `
                    <div class="profile-header">
                        <h1>⚜️ MI PERFIL ⚜️</h1>
                    </div>

                    <!-- FILA DE ID CARDS -->
                    <div class="cards-row">
                        <!-- TARJETA IDENTIDAD -->
                        <div class="id-card-identity">
                            <div class="photo-wrapper">
                                <img src="${j.urlFotoRostro || CONFIG.DEFAULT_AVATAR}" class="player-img" onerror="this.src='${CONFIG.DEFAULT_AVATAR}'">
                                <div class="ovr-badge">${ovr}</div>
                            </div>
                            <div style="font-weight:700; font-size:0.85rem; color:white;">${escapeHtml(j.primerNombre)}</div>
                            <div class="ci-text">CI: ${ciLimpia}</div>
                        </div>

                        <!-- TARJETA CAMISETA GIRATORIA -->
                        <div class="id-card-jersey-wrap">
                            <div class="jersey-card-inner">
                                <div class="face-jersey">
                                    <div class="jersey-name">${escapeHtml(nombreDorso)}</div>
                                    <div class="jersey-number">${j.dorsal || '00'}</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="sync-container">
                        <button class="btn-sync" onclick="refrescarPerfil()">
                            <i class="fas fa-sync-alt"></i> SINCRONIZAR DATOS
                        </button>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-card"><div class="stat-val">${j.goles || 0}</div><div class="stat-lab">Goles</div></div>
                        <div class="stat-card"><div class="stat-val" style="color:#f1c40f;">${j.amarillas || 0}</div><div class="stat-lab">Amarillas</div></div>
                        <div class="stat-card"><div class="stat-val" style="color:#e74c3c;">${j.rojas || 0}</div><div class="stat-lab">Rojas</div></div>
                    </div>

                    <div class="section-box">
                        <div class="info-row"><span>Compañerismo</span><span>${j.companerismo || 8}/10</span></div>
                        <div class="info-row"><span>Respeto</span><span>${j.respeto || 8}/10</span></div>
                        <div class="info-row"><span>Puntualidad</span><span>${j.puntualidad || 8}/10</span></div>
                    </div>

                    <div class="section-box">
                        <div class="info-row"><span>Deuda Vocalía</span><span style="color:${Number(j.deudaVocalia) > 0 ? '#e74c3c' : '#2ecc71'}">$${j.deudaVocalia || 0}</span></div>
                        <div class="info-row"><span>Uniforme</span><span>${j.unifEstado || 'PENDIENTE'}</span></div>
                    </div>

                    <button class="btn-logout" onclick="cerrarSesion()">SALIR</button>
                `;
            }
        } catch (e) {
            container.innerHTML = `<div style="text-align:center; padding:50px;">❌ Error de conexión</div>`;
        }
    }

    function refrescarPerfil() { 
        document.getElementById('perfilContent').innerHTML = '<div class="spinner"></div>';
        cargarPerfil(session.cedula); 
    }
    
    function cerrarSesion() { localStorage.removeItem('jugador_actual'); window.location.href = 'login.html'; }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
</script>

</body>
</html>
