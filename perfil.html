<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nápoles F.C. - Mi Perfil</title>
    <link rel="stylesheet" href="estilos.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #0a1428, #030711);
            font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Contenedor principal estilo PES - responsivo */
        .pes-container {
            max-width: 550px;
            width: 100%;
            background: rgba(10, 20, 40, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            border: 1px solid rgba(212, 175, 55, 0.4);
            overflow: hidden;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            transition: all 0.3s;
        }

        /* Header */
        .pes-header {
            background: linear-gradient(135deg, #1e2a4a, #0f172a);
            padding: 1.2rem;
            text-align: center;
            border-bottom: 2px solid var(--dorado, #B59461);
        }
        .pes-header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #B59461, #ffe6a3);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }
        .pes-header p {
            color: rgba(255,255,255,0.7);
            font-size: 0.8rem;
        }

        /* Tarjeta jugador (responsive) */
        .player-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem 1rem 1rem;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(212,175,55,0.3);
        }
        .player-photo {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 3px solid #B59461;
            overflow: hidden;
            background: #1a2b48;
            margin-bottom: 1rem;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
        }
        .player-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .player-name {
            font-size: 1.5rem;
            font-weight: 800;
            color: #B59461;
            text-transform: uppercase;
            text-align: center;
        }
        .player-dorsal {
            font-size: 2.2rem;
            font-weight: 900;
            background: rgba(0,0,0,0.6);
            padding: 4px 20px;
            border-radius: 50px;
            margin: 8px 0;
            color: white;
        }
        .player-shirtname {
            background: rgba(212,175,55,0.2);
            padding: 5px 18px;
            border-radius: 30px;
            color: #B59461;
            font-weight: 500;
            font-size: 0.9rem;
        }

        /* Panel de estadísticas - listado vertical */
        .stats-panel {
            padding: 1rem 1.2rem 1.5rem;
        }
        .stat-item {
            background: rgba(0,0,0,0.4);
            border-radius: 60px;
            padding: 10px 18px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }
        .stat-label {
            font-weight: 500;
            color: #ddd;
            font-size: 0.9rem;
        }
        .stat-value {
            font-weight: 700;
            color: #B59461;
            background: rgba(0,0,0,0.5);
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.9rem;
        }

        .btn-cerrar {
            background: linear-gradient(95deg, #e74c3c, #c0392b);
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 60px;
            font-weight: bold;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.2s;
        }
        .btn-cerrar:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }

        .loading, .error-mensaje {
            text-align: center;
            padding: 2rem;
            color: #B59461;
            font-weight: 500;
        }
        .error-mensaje { color: #ff5e5e; }

        /* Ajustes para pantallas muy pequeñas */
        @media (max-width: 480px) {
            body { padding: 0.8rem; }
            .player-photo { width: 100px; height: 100px; }
            .player-name { font-size: 1.2rem; }
            .player-dorsal { font-size: 1.8rem; }
            .stat-item { padding: 8px 12px; }
            .stat-label { font-size: 0.8rem; }
            .stat-value { font-size: 0.8rem; padding: 2px 10px; }
        }
    </style>
</head>
<body>
<div class="pes-container">
    <div class="pes-header">
        <h1>⚽ MI PERFIL</h1>
        <p>NÁPOLES F.C. · TEMPORADA 2025</p>
    </div>
    <div id="perfilContent" class="loading">⏳ Cargando datos del jugador...</div>
</div>

<script>
    // IMPORTANTE: Usa la misma URL_GAS que en frontend.js y login.html
    const URL_GAS = "https://script.google.com/macros/s/AKfycbzw2Ef4Wja_Nu1Gks7o5yAP-xBgH0R5WAiXgaKhJ_0Z4r6PRrkHSwoMyf8WbMoASgKv/exec";

    let session = null;
    try {
        const raw = localStorage.getItem('jugador_aprobado');
        if (raw) {
            session = JSON.parse(raw);
            if (Date.now() > session.expira) {
                localStorage.removeItem('jugador_aprobado');
                session = null;
            }
        }
    } catch(e) {}

    if (!session || !session.cedula) {
        window.location.href = 'login.html';
    } else {
        cargarPerfil(session.cedula);
    }

    async function cargarPerfil(cedula) {
        const container = document.getElementById('perfilContent');
        container.innerHTML = '<div class="loading">⏳ Cargando datos...</div>';
        try {
            const resp = await fetch(`${URL_GAS}?action=obtenerJugador&cedula=${cedula}`);
            const data = await resp.json();
            if (data.ok) {
                const nombreCompleto = `${data.nombre1 || ''} ${data.nombre2 || ''} ${data.apellidos || ''}`.trim();
                const fotoRostro = data.urlRostro || 'data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22100%22%20height%3D%22100%22%20viewBox%3D%220%200%20100%20100%22%3E%3Crect%20fill%3D%22%231A2B48%22%20width%3D%22100%22%20height%3D%22100%22%2F%3E%3Ctext%20fill%3D%22%23B59461%22%20x%3D%2250%25%22%20y%3D%2250%25%22%20text-anchor%3D%22middle%22%20dy%3D%22.3em%22%20font-size%3D%2240%22%3E⚽%3C%2Ftext%3E%3C%2Fsvg%3E';
                const dorsal = data.dorsal || '00';
                const nombreCamiseta = data.nombreCamiseta || nombreCompleto.split(' ')[0] || 'JUGADOR';

                // Si el backend no envía goles/amarillas/rojas se inicializan en 0
                const goles = data.goles || 0;
                const amarillas = data.amarillas || 0;
                const rojas = data.rojas || 0;
                const valoracion = 82; // Valoración base (luego se puede calcular)

                container.innerHTML = `
                    <div>
                        <div class="player-card">
                            <div class="player-photo">
                                <img src="${fotoRostro}" alt="Foto rostro" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22100%22%20height%3D%22100%22%20viewBox%3D%220%200%20100%20100%22%3E%3Crect%20fill%3D%22%231A2B48%22%20width%3D%22100%22%20height%3D%22100%22%2F%3E%3Ctext%20fill%3D%22%23B59461%22%20x%3D%2250%25%22%20y%3D%2250%25%22%20text-anchor%3D%22middle%22%20dy%3D%22.3em%22%20font-size%3D%2240%22%3E⚽%3C%2Ftext%3E%3C%2Fsvg%3E'">
                            </div>
                            <div class="player-name">${nombreCamiseta.toUpperCase()}</div>
                            <div class="player-dorsal">#${dorsal}</div>
                            <div class="player-shirtname">${nombreCamiseta}</div>
                        </div>
                        <div class="stats-panel">
                            <div class="stat-item"><span class="stat-label">📄 Cédula</span><span class="stat-value">${data.cedula || '---'}</span></div>
                            <div class="stat-item"><span class="stat-label">👤 Nombre completo</span><span class="stat-value">${nombreCompleto}</span></div>
                            <div class="stat-item"><span class="stat-label">🎂 Fecha nacimiento</span><span class="stat-value">${data.fechaNac || '---'}</span></div>
                            <div class="stat-item"><span class="stat-label">📞 Teléfono</span><span class="stat-value">${data.telefono || '---'}</span></div>
                            <div class="stat-item"><span class="stat-label">✉️ Correo</span><span class="stat-value">${data.correo || '---'}</span></div>
                            <div class="stat-item"><span class="stat-label">⚽ Goles</span><span class="stat-value">${goles}</span></div>
                            <div class="stat-item"><span class="stat-label">🟨 Amarillas</span><span class="stat-value">${amarillas}</span></div>
                            <div class="stat-item"><span class="stat-label">🟥 Rojas</span><span class="stat-value">${rojas}</span></div>
                            <div class="stat-item"><span class="stat-label">⭐ Valoración</span><span class="stat-value">${valoracion}</span></div>
                            <button id="cerrarSesion" class="btn-cerrar">🚪 CERRAR SESIÓN</button>
                        </div>
                    </div>
                `;
                document.getElementById('cerrarSesion').addEventListener('click', () => {
                    localStorage.removeItem('jugador_aprobado');
                    window.location.href = 'login.html';
                });
            } else {
                container.innerHTML = `<div class="error-mensaje">❌ No se encontraron datos. Redirigiendo...</div>`;
                setTimeout(() => window.location.href = 'login.html', 2000);
            }
        } catch (error) {
            console.error(error);
            container.innerHTML = `<div class="error-mensaje">⚠️ Error de conexión. Intenta más tarde.</div>`;
        }
    }
</script>
</body>
</html>
