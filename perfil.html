<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nápoles F.C. - Mi Perfil</title>
    <!-- Importación de fuentes más modernas -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --dorado: #D4AF37;
            --dorado-brillante: #FFD700;
            --azul-oscuro: #0a1428;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(212, 175, 55, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--azul-oscuro);
            /* Fondo con profundidad */
            background-image: 
                radial-gradient(circle at top right, rgba(212, 175, 55, 0.1), transparent 400px),
                radial-gradient(circle at bottom left, rgba(0, 82, 212, 0.1), transparent 400px);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            color: #fff;
        }

        /* Contenedor con efecto Cristal */
        .pes-container {
            max-width: 500px;
            width: 100%;
            background: rgba(10, 20, 40, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 2rem;
            border: 1px solid var(--glass-border);
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header con degradado metálico */
        .pes-header {
            background: linear-gradient(to bottom, rgba(255,255,255,0.05), transparent);
            padding: 2rem 1rem;
            text-align: center;
            position: relative;
        }

        .pes-header h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #fff 0%, var(--dorado) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .pes-header::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 25%;
            width: 50%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--dorado), transparent);
        }

        /* Tarjeta de Jugador */
        .player-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            background: radial-gradient(circle at center, rgba(212, 175, 55, 0.05) 0%, transparent 70%);
        }

        .player-photo-wrapper {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .player-photo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid var(--dorado);
            padding: 5px;
            background: var(--azul-oscuro);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
        }

        .player-photo img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .ovr-badge {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: var(--dorado);
            color: #000;
            font-weight: 800;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 3px solid var(--azul-oscuro);
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .player-name {
            font-size: 1.8rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 0.2rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .player-dorsal-tag {
            background: var(--dorado);
            color: #000;
            padding: 2px 15px;
            border-radius: 5px;
            font-weight: 700;
            font-size: 0.9rem;
            transform: skewX(-15deg);
        }

        /* Panel de Stats Moderno */
        .stats-panel {
            padding: 1.5rem;
            display: grid;
            gap: 0.8rem;
        }

        .stat-item {
            background: var(--glass-bg);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .stat-item:hover {
            background: rgba(255,255,255,0.08);
            border-color: var(--glass-border);
            transform: translateX(5px);
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
            font-weight: 600;
        }

        .stat-value {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            color: var(--dorado-brillante);
            font-size: 1.1rem;
        }

        /* Botón de Salida */
        .btn-cerrar {
            background: transparent;
            border: 1px solid #ff5e5e;
            color: #ff5e5e;
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-cerrar:hover {
            background: #ff5e5e;
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 94, 94, 0.3);
        }

        /* Pantallas de carga */
        .loading {
            padding: 4rem;
            text-align: center;
            color: var(--dorado);
            font-size: 1.2rem;
            font-weight: 600;
        }

        @media (max-width: 480px) {
            .pes-container { border-radius: 0; min-height: 100vh; }
            .player-photo { width: 120px; height: 120px; }
        }
    </style>
</head>
<body>

<div class="pes-container">
    <div id="perfilContent">
        <div class="loading">⏳ SINCRONIZANDO PERFIL...</div>
    </div>
</div>

<script>
    const URL_GAS = "https://script.google.com/macros/s/AKfycbzw2Ef4Wja_Nu1Gks7o5yAP-xBgH0R5WAiXgaKhJ_0Z4r6PRrkHSwoMyf8WbMoASgKv/exec";

    // Manejo de sesión básica
    let session = JSON.parse(localStorage.getItem('jugador_aprobado'));
    if (!session || Date.now() > session.expira) {
        window.location.href = 'login.html';
    } else {
        cargarPerfil(session.cedula);
    }

    async function cargarPerfil(cedula) {
        const container = document.getElementById('perfilContent');
        try {
            const resp = await fetch(`${URL_GAS}?action=obtenerJugador&cedula=${cedula}`);
            const data = await resp.json();
            
            if (data.ok) {
                const nombreCompleto = `${data.nombre1 || ''} ${data.apellidos || ''}`.trim();
                const fotoRostro = data.urlRostro || 'https://via.placeholder.com/150';
                
                container.innerHTML = `
                    <div class="pes-header">
                        <h1>PERFIL JUGADOR</h1>
                    </div>
                    
                    <div class="player-card">
                        <div class="player-photo-wrapper">
                            <div class="player-photo">
                                <img src="${fotoRostro}" alt="Foto Rostro">
                            </div>
                            <div class="ovr-badge">82</div>
                        </div>
                        <div class="player-name">${(data.nombreCamiseta || data.nombre1).toUpperCase()}</div>
                        <div class="player-dorsal-tag">DORSAL ${data.dorsal || '00'}</div>
                    </div>

                    <div class="stats-panel">
                        <div class="stat-item">
                            <span class="stat-label">Identificación</span>
                            <span class="stat-value">${data.cedula}</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Nombre Completo</span>
                            <span class="stat-value">${nombreCompleto}</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Goles Marcados</span>
                            <span class="stat-value">⚽ ${data.goles || 0}</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Tarjetas Amarillas</span>
                            <span class="stat-value" style="color: #f1c40f">🟨 ${data.amarillas || 0}</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Tarjetas Rojas</span>
                            <span class="stat-value" style="color: #e74c3c">🟥 ${data.rojas || 0}</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Temporada</span>
                            <span class="stat-value">2025/26</span>
                        </div>
                        
                        <button id="cerrarSesion" class="btn-cerrar">Cerrar Sesión</button>
                    </div>
                `;

                document.getElementById('cerrarSesion').onclick = () => {
                    localStorage.removeItem('jugador_aprobado');
                    window.location.href = 'login.html';
                };
            }
        } catch (error) {
            container.innerHTML = `<div class="loading">⚠️ Error al cargar datos</div>`;
        }
    }
</script>
</body>
</html>
