<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nápoles F.C. - Mi Perfil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-gold: #D4AF37;
            --light-gold: #FFD700;
            --dark-bg: #060912;
            --card-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(212, 175, 55, 0.2);
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: radial-gradient(circle at top, #111a33 0%, #060912 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 20px 16px;
            color: var(--text-main);
        }

        .profile-container { max-width: 450px; margin: 0 auto; }

        /* --- Header --- */
        .profile-header { text-align: center; margin-bottom: 25px; }
        .profile-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            background: linear-gradient(135deg, var(--light-gold), var(--primary-gold));
            -webkit-background-clip: text; background-clip: text; color: transparent;
            margin-bottom: 5px;
        }

        /* --- Tarjeta Jugador --- */
        .player-card {
            background: linear-gradient(145deg, rgba(212, 175, 55, 0.1), rgba(10, 20, 40, 0.9));
            backdrop-filter: blur(15px);
            border-radius: 28px;
            padding: 30px 20px;
            margin-bottom: 20px;
            border: 1px solid var(--glass-border);
            position: relative;
            text-align: center;
        }

        .player-photo-wrapper { position: relative; width: 130px; margin: 0 auto 15px; }
        .player-photo {
            width: 130px; height: 130px; border-radius: 50%;
            border: 3px solid var(--primary-gold); padding: 5px; background: #060912;
        }
        .player-photo img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        .ovr-badge {
            position: absolute; bottom: 5px; right: -5px;
            background: var(--primary-gold); color: #000;
            font-weight: 800; width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 12px; border: 3px solid #060912;
            font-family: 'Outfit', sans-serif; font-size: 1.2rem;
            transform: rotate(-5deg);
        }

        .player-name { font-family: 'Outfit', sans-serif; font-size: 1.6rem; font-weight: 800; }
        .dorsal-badge {
            background: var(--primary-gold); color: #000;
            padding: 4px 15px; border-radius: 8px;
            font-weight: 700; font-size: 0.8rem; margin-top: 8px; display: inline-block;
        }

        /* --- Stats --- */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card {
            background: var(--card-bg); border-radius: 20px; padding: 15px 10px;
            text-align: center; border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-icon { font-size: 1.2rem; margin-bottom: 8px; color: var(--primary-gold); }
        .stat-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; }
        .stat-value { font-size: 1.4rem; font-weight: 800; font-family: 'Outfit', sans-serif; }

        /* --- Secciones --- */
        .section-box {
            background: var(--card-bg); border-radius: 24px; padding: 20px;
            margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05);
        }
        .section-title {
            font-size: 0.9rem; font-weight: 700; margin-bottom: 15px;
            color: var(--primary-gold); display: flex; align-items: center; gap: 10px; text-transform: uppercase;
        }

        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .info-item {
            background: rgba(255,255,255,0.03); padding: 12px; border-radius: 15px;
            display: flex; flex-direction: column;
        }
        .info-item span:first-child { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 4px; }
        .info-value { font-weight: 700; color: var(--primary-gold); }

        /* --- Pagos --- */
        .payments-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .payment-pill {
            text-align: center; padding: 10px 5px; border-radius: 15px; background: rgba(0,0,0,0.2);
            font-size: 0.65rem;
        }
        .status-tag {
            display: block; margin-top: 5px; padding: 2px 0; border-radius: 5px; font-weight: 700;
        }
        .pagado { background: rgba(46, 204, 113, 0.15); color: #2ecc71; }
        .pendiente { background: rgba(231, 76, 60, 0.15); color: #e74c3c; }

        /* --- Botones --- */
        .btn {
            width: 100%; padding: 15px; border-radius: 15px; border: none;
            font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .btn-refresh {
            background: transparent; border: 1px solid var(--primary-gold);
            color: var(--primary-gold); margin-bottom: 15px;
        }
        .btn-logout { background: #e74c3c; color: white; margin-top: 10px; }
        
        /* --- Loading --- */
        .loading-screen { text-align: center; padding: 60px 0; }
        .spinner {
            width: 40px; height: 40px; border: 3px solid rgba(212, 175, 55, 0.1);
            border-top-color: var(--primary-gold); border-radius: 50%;
            animation: spin 1s infinite linear; margin: 0 auto 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="profile-container" id="mainContainer">
    <div id="perfilContent">
        <div class="loading-screen">
            <div class="spinner"></div>
            <p style="opacity: 0.6; font-size: 0.8rem;">CONECTANDO CON EL CLUB...</p>
        </div>
    </div>
</div>

<!-- Importamos tu CONFIG -->
<script src="config.js"></script>

<script>
    // Tu lógica de sesión usando el CONFIG proporcionado
    const session = JSON.parse(localStorage.getItem('jugador_actual'));
    
    if (!session || !session.cedula || Date.now() > session.expira) {
        localStorage.removeItem('jugador_actual');
        window.location.href = 'login.html';
    } else {
        cargarPerfil(session.cedula);
    }

    async function cargarPerfil(cedula) {
        const container = document.getElementById('perfilContent');
        const cedulaLimpia = String(cedula).replace(/[^0-9]/g, '');
        
        try {
            // Usamos CONFIG.URL_GAS de tu archivo config.js
            const url = `${CONFIG.URL_GAS}?action=getPerfil&cedula=${encodeURIComponent(cedulaLimpia)}&t=${Date.now()}`;
            const resp = await fetch(url);
            const data = await resp.json();
            
            if (data.success && data.jugador) {
                const j = data.jugador;
                
                // Cálculo de OVR (Media)
                const v = {
                    comp: Number(j.companerismo) || 8,
                    resp: Number(j.respeto) || 8,
                    humi: Number(j.humildad) || 8,
                    punt: Number(j.puntualidad) || 8
                };
                const promedio = (v.comp + v.resp + v.humi + v.punt) / 4;
                const ovr = Math.min(99, Math.max(40, Math.round(promedio * 10)));
                
                // Fotos y Nombres
                const fotoUrl = j.urlFotoRostro || CONFIG.DEFAULT_AVATAR;
                const nombre = `${j.primerNombre || ''} ${j.apellidos || ''}`.trim() || j.nombreCamiseta || 'Jugador';

                container.innerHTML = `
                    <button class="btn btn-refresh" onclick="location.reload()">
                        <i class="fas fa-sync-alt"></i> ACTUALIZAR PERFIL
                    </button>

                    <div class="profile-header">
                        <h1>⚜️ ${CONFIG.APP_NAME} ⚜️</h1>
                        <p>Miembro Oficial • v${CONFIG.VERSION}</p>
                    </div>

                    <div class="player-card">
                        <div class="player-photo-wrapper">
                            <div class="player-photo">
                                <img src="${fotoUrl}" onerror="this.src='${CONFIG.DEFAULT_AVATAR}'">
                            </div>
                            <div class="ovr-badge">${ovr}</div>
                        </div>
                        <div class="player-name">${escapeHtml(nombre)}</div>
                        <div class="dorsal-badge">DORSAL ${j.dorsal || '--'}</div>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-futbol"></i></div>
                            <div class="stat-label">Goles</div>
                            <div class="stat-value">${j.goles || 0}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon" style="color:#f1c40f"><i class="fas fa-square"></i></div>
                            <div class="stat-label">Amarillas</div>
                            <div class="stat-value">${j.amarillas || 0}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon" style="color:#e74c3c"><i class="fas fa-square"></i></div>
                            <div class="stat-label">Rojas</div>
                            <div class="stat-value">${j.rojas || 0}</div>
                        </div>
                    </div>

                    <div class="section-box">
                        <div class="section-title"><i class="fas fa-chart-line"></i> Valores Humanos</div>
                        <div class="info-grid">
                            <div class="info-item"><span>Compañerismo</span><span class="info-value">${v.comp}/10</span></div>
                            <div class="info-item"><span>Respeto</span><span class="info-value">${v.resp}/10</span></div>
                            <div class="info-item"><span>Humildad</span><span class="info-value">${v.humi}/10</span></div>
                            <div class="info-item"><span>Puntualidad</span><span class="info-value">${v.punt}/10</span></div>
                        </div>
                    </div>

                    <div class="section-box">
                        <div class="section-title"><i class="fas fa-wallet"></i> Vocalía</div>
                        <div class="info-grid" style="margin-bottom:10px">
                            <div class="info-item"><span>Valor Base</span><span class="info-value">$${j.valorVocalia || 0}</span></div>
                            <div class="info-item"><span>Pendientes</span><span class="info-value">${j.vocaliasPendientes || 0}</span></div>
                        </div>
                        <div style="background:rgba(0,0,0,0.3); padding:15px; border-radius:15px; display:flex; justify-content:space-between; align-items:center;">
                            <span style="font-size:0.8rem">Deuda Total:</span>
                            <strong style="color:${(j.deudaVocalia || 0) > 0 ? '#e74c3c' : '#2ecc71'}; font-size:1.2rem">
                                $${j.deudaVocalia || 0}
                            </strong>
                        </div>
                    </div>

                    <div class="section-box">
                        <div class="section-title"><i class="fas fa-credit-card"></i> Estado de Pagos</div>
                        <div class="payments-grid">
                            <div class="payment-pill">
                                Inscrip.
                                <span class="status-tag ${j.inscripEstado === 'PAGADO' ? 'pagado' : 'pendiente'}">${j.inscripEstado || 'PEND.'}</span>
                            </div>
                            <div class="payment-pill">
                                Uniforme
                                <span class="status-tag ${j.unifEstado === 'PAGADO' ? 'pagado' : 'pendiente'}">${j.unifEstado || 'PEND.'}</span>
                            </div>
                            <div class="payment-pill">
                                Medias
                                <span class="status-tag ${j.mediasEstado === 'PAGADO' ? 'pagado' : 'pendiente'}">${j.mediasEstado || 'N/A'}</span>
                            </div>
                        </div>
                    </div>

                    <button class="btn btn-logout" onclick="cerrarSesion()">
                        <i class="fas fa-sign-out-alt"></i> CERRAR SESIÓN
                    </button>
                `;
            }
        } catch (e) {
            container.innerHTML = `<div class="loading-screen">❌ Error de conexión</div>`;
        }
    }

    function cerrarSesion() {
        localStorage.removeItem('jugador_actual');
        window.location.href = 'login.html';
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
</script>

</body>
</html>
