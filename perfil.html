<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Nápoles F.C. - Mi Perfil</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@600;800;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

/* TODO TU CSS ORIGINAL EXACTO */

</style>
</head>

<body>

<div class="profile-container" id="perfilContent">
    <div class="spinner"></div>
</div>

<script src="config.js"></script>

<script>

function escapeHtml(str){

    if(!str) return '';

    return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');

}

// =======================

function validateConfig(){

    if(typeof CONFIG === 'undefined'){

        throw new Error(
            'No se pudo cargar config.js'
        );

    }

    if(!CONFIG.URL_GAS){

        throw new Error(
            'URL_GAS no definida'
        );

    }

}

// =======================

async function cargarPerfil(cedula){

    const container =
    document.getElementById(
        'perfilContent'
    );

    try{

        validateConfig();

        const url =
        `${CONFIG.URL_GAS}?action=getPerfil&cedula=${encodeURIComponent(cedula)}&t=${Date.now()}`;

        const resp =
        await fetch(url);

        const text =
        await resp.text();

        console.log(
            'PERFIL RAW:',
            text
        );

        const data =
        JSON.parse(text);

        console.log(data);

        if(
            data.success &&
            data.jugador
        ){

            const j =
            data.jugador;

            container.innerHTML = `

            <div class="profile-header">
                <h1>⚜️ PANEL NÁPOLES ⚜️</h1>
            </div>

            <div class="cards-row">

                <div class="id-card-identity glass-card">

                    <img
                        src="${j.urlFotoRostro}"
                        class="player-img"
                        onerror="this.src='${CONFIG.DEFAULT_AVATAR}'"
                    >

                    <div style="
                        font-weight:900;
                        font-family:'Outfit';
                        text-transform:uppercase;
                        font-size:.9rem;
                    ">
                        ${escapeHtml(j.primerNombre)}
                        ${escapeHtml(j.segundoNombre)}
                    </div>

                    <div style="
                        font-size:.6rem;
                        color:#aaa;
                        margin-top:4px;
                    ">
                        C.I.
                        ${escapeHtml(j.cedula)}
                    </div>

                </div>

                <div class="id-card-jersey-wrap">

                    <div class="jersey-card-inner">

                        <div class="face-jersey-front">

                            <div class="jersey-top-name">
                                ${escapeHtml(j.nombreCamiseta)}
                            </div>

                            <div class="jersey-number">
                                ${escapeHtml(j.dorsal)}
                            </div>

                        </div>

                        <div class="face-jersey-back">

                            <div class="jersey-top-name">
                                ${escapeHtml(j.nombreCamiseta)}
                            </div>

                            <div class="jersey-number">
                                ${escapeHtml(j.dorsal)}
                            </div>

                        </div>

                    </div>

                </div>

            </div>

            <div class="section-box">

                <div class="section-title">
                    Estadísticas
                </div>

                <div class="stats-grid">

                    <div class="stat-card">
                        <div class="stat-value">
                            ${j.partidosJugados || 0}
                        </div>
                        <div class="stat-label">
                            PARTIDOS
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-value">
                            ${j.goles || 0}
                        </div>
                        <div class="stat-label">
                            GOLES
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-value">
                            ${j.amarillas || 0}
                        </div>
                        <div class="stat-label">
                            AMARILLAS
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-value">
                            ${j.rojas || 0}
                        </div>
                        <div class="stat-label">
                            ROJAS
                        </div>
                    </div>

                </div>

            </div>

            <button class="btn-logout" onclick="cerrarSesion()">
                CERRAR SESIÓN
            </button>

            `;

        }else{

            container.innerHTML =
            `
            <div class="error-message">
                Jugador no encontrado
            </div>
            `;

        }

    }catch(e){

        console.error(e);

        container.innerHTML =
        `
        <div class="error-message">
            ${escapeHtml(e.message)}
        </div>
        `;

    }

}

// =======================

function cerrarSesion(){

    localStorage.removeItem(
        'jugador_actual'
    );

    window.location.href =
    'login.html';

}

// =======================

(async()=>{

    try{

        const sessionText =
        localStorage.getItem(
            'jugador_actual'
        );

        if(!sessionText){

            window.location.href =
            'login.html';

            return;

        }

        const session =
        JSON.parse(sessionText);

        const cedula =
        session.cedula || '';

        if(!cedula){

            window.location.href =
            'login.html';

            return;

        }

        await cargarPerfil(
            cedula
        );

    }catch(e){

        console.error(e);

        document.getElementById(
            'perfilContent'
        ).innerHTML =
        `
        <div class="error-message">
            Error cargando perfil
        </div>
        `;

    }

})();

</script>

</body>
</html>
