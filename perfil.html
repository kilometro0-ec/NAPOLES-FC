<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nápoles F.C. - Mi Perfil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 50%, #0a0f1e 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 16px;
            color: #fff;
        }
        .profile-container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            z-index: 1;
        }
        .profile-header {
            background: rgba(10, 20, 40, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            text-align: center;
        }
        .profile-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFD700, #D4AF37);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .player-card {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.15) 0%, rgba(10, 20, 40, 0.8) 100%);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }
        .player-photo-section {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .player-photo-wrapper { position: relative; }
        .player-photo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid #D4AF37;
            padding: 4px;
            background: linear-gradient(135deg, #1a1f2e, #0f1420);
        }
        .player-photo img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        .ovr-badge {
            position: absolute;
            bottom: -5px;
            right: -10px;
            background: linear-gradient(135deg, #FFD700, #D4AF37);
            color: #0a0f1e;
            font-weight: 800;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 3px solid #0a0f1e;
        }
        .player-name {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #D4AF37);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .dorsal-badge {
            background: rgba(212, 175, 55, 0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: inline-block;
            margin-top: 8px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: rgba(10, 20, 40, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 12px;
            text-align: center;
        }
        .stat-icon { font-size: 1.5rem; margin-bottom: 6px; }
        .stat-label { font-size: 0.7rem; opacity: 0.7; }
        .stat-value { font-size: 1.5rem; font-weight: 800; color: #D4AF37; }
        .values-section, .payments-section {
            background: rgba(10, 20, 40, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .section-title {
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #D4AF37;
        }
        .values-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .value-item {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 10px 12px;
            display: flex;
            justify-content: space-between;
        }
        .value-score { font-weight: 700; color: #D4AF37; }
        .payments-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .payment-item {
            text-align: center;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
        }
        .payment-status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 700;
            margin-top: 8px;
        }
        .pagado { background: #2ecc71; color: #fff; }
        .pendiente { background: #e74c3c; color: #fff; }
        .null { background: #7f8c8d; color: #fff; }
        .logout-btn {
            width: 100%;
            background: rgba(231, 76, 60, 0.15);
            border: 1px solid rgba(231, 76, 60, 0.3);
            border-radius: 60px;
            padding: 14px;
            color: #e74c3c;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }
        .logout-btn:hover {
            background: rgba(231, 76, 60, 0.3);
        }
        .loading-screen { text-align: center; padding: 60px 20px; }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(212, 175, 55, 0.2);
            border-top-color: #D4AF37;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .refresh-btn {
            background: rgba(212, 175, 55, 0.2);
            border: 1px solid #D4AF37;
            border-radius: 50px;
            padding: 8px 16px;
            color: #D4AF37;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 16px;
            width: 100%;
        }
    </style>
</head>
<body>
<div class="profile-container">
    <div id="perfilContent">
        <div class="loading-screen"><div class="spinner"></div><p>CARGANDO PERFIL...</p></div>
    </div>
</div>

<!-- 🔥 Cargar configuración centralizada - SIN URL hardcodeada -->
<script src="config.js"></script>

<script>
    // Verificar que config.js se cargó correctamente
    if (typeof CONFIG === 'undefined') {
        console.error('❌ config.js no cargado correctamente');
        alert('Error de configuración. Recarga la página o contacta al administrador.');
    }

    // 🔥 Usar 'jugador_actual' que es como se guarda en login.html
    const session = JSON.parse(localStorage.getItem('jugador_actual'));
    
    if (!session || !session.cedula || Date.now() > session.expira) {
        localStorage.removeItem('jugador_actual');
        window.location.href = 'login.html';
    } else {
        cargarPerfil(session.cedula);
    }

    async function cargarPerfil(cedula) {
        const container = document.getElementById('perfilContent');
        const cedulaLimpia = String(cedula).replace(/[^0-9]/g, '');
        
        try {
            // 🔥 Usar CONFIG.URL_GAS (viene de config.js) - SIN URL hardcodeada
            const url = `${CONFIG.URL_GAS}?action=validarRegistro&cedula=${encodeURIComponent(cedulaLimpia)}&t=${Date.now()}`;
            const resp = await fetch(url);
            const data = await resp.json();
            
            if (data.cedulaExiste && data.datosJugador) {
                const j = data.datosJugador;
                
                // Calcular promedio de valores
                const companerismo = Number(j.companerismo) || 8;
                const respeto = Number(j.respeto) || 8;
                const humildad = Number(j.humildad) || 8;
                const puntualidad = Number(j.puntualidad) || 8;
                const promedio = (companerismo + respeto + humildad + puntualidad) / 4;
                const ovrMostrar = Math.min(99, Math.max(40, Math.round(promedio * 10) || 60));
                
                // Usar URL de foto o avatar por defecto
                let fotoUrl = j.urlFotoRostro || CONFIG.DEFAULT_AVATAR;
                
                // Formatear nombres
                const nombreCompleto = `${j.primerNombre || ''} ${j.segundoNombre || ''} ${j.apellidos || ''}`.trim();
                const nombreMostrar = nombreCompleto || j.nombreCamiseta || 'Jugador';
                
                // Determinar estado de medias
                let mediasEstadoText = j.mediasEstado || 'null';
                let mediasClass = '';
                if (mediasEstadoText === 'PAGADO') mediasClass = 'pagado';
                else if (mediasEstadoText === 'PENDIENTE') mediasClass = 'pendiente';
                else mediasClass = 'null';
                
                let mediasLabel = mediasEstadoText;
                if (mediasEstadoText === 'null') mediasLabel = 'NO REQUIERE';
                
                container.innerHTML = `
                    <button class="refresh-btn" onclick="refrescarPerfil()"><i class="fas fa-sync-alt"></i> REFRESCAR DATOS</button>
                    <div class="profile-header">
                        <h1>⚜️ NÁPOLES F.C. ⚜️</h1>
                        <p>Club Atlético Nápoles - Miembro Oficial</p>
                    </div>
                    <div class="player-card">
                        <div class="player-photo-section">
                            <div class="player-photo-wrapper">
                                <div class="player-photo">
                                    <img src="${fotoUrl}" alt="foto" onerror="this.src='${CONFIG.DEFAULT_AVATAR}'">
                                </div>
                                <div class="ovr-badge">${ovrMostrar}</div>
                            </div>
                            <div class="player-info">
                                <div class="player-name">${escapeHtml(nombreMostrar)}</div>
                                <div class="dorsal-badge"><i class="fas fa-hashtag"></i> DORSAL ${j.dorsal || '--'}</div>
                                <div style="font-size:0.7rem; margin-top:8px;"><i class="fas fa-id-card"></i> ${cedulaLimpia}</div>
                            </div>
                        </div>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-card"><div class="stat-icon"><i class="fas fa-futbol"></i></div><div class="stat-label">GOLES</div><div class="stat-value">${j.goles || 0}</div></div>
                        <div class="stat-card"><div class="stat-icon"><i class="fas fa-square" style="color:#f1c40f;"></i></div><div class="stat-label">AMARILLAS</div><div class="stat-value">${j.amarillas || 0}</div></div>
                        <div class="stat-card"><div class="stat-icon"><i class="fas fa-square" style="color:#e74c3c;"></i></div><div class="stat-label">ROJAS</div><div class="stat-value">${j.rojas || 0}</div></div>
                    </div>
                    <div class="values-section">
                        <div class="section-title"><i class="fas fa-chart-line"></i> VALORES HUMANOS</div>
                        <div class="values-grid">
                            <div class="value-item"><span><i class="fas fa-handshake"></i> Compañerismo</span><span class="value-score">${companerismo}/10</span></div>
                            <div class="value-item"><span><i class="fas fa-heart"></i> Respeto</span><span class="value-score">${respeto}/10</span></div>
                            <div class="value-item"><span><i class="fas fa-leaf"></i> Humildad</span><span class="value-score">${humildad}/10</span></div>
                            <div class="value-item"><span><i class="fas fa-clock"></i> Puntualidad</span><span class="value-score">${puntualidad}/10</span></div>
                        </div>
                    </div>
                    <div class="payments-section">
                        <div class="section-title"><i class="fas fa-credit-card"></i> ESTADO DE PAGOS</div>
                        <div class="payments-grid">
                            <div class="payment-item"><i class="fas fa-file-signature"></i><div>Inscripción</div><span class="payment-status-badge ${j.inscripEstado === 'PAGADO' ? 'pagado' : 'pendiente'}">${j.inscripEstado || 'PENDIENTE'}</span></div>
                            <div class="payment-item"><i class="fas fa-tshirt"></i><div>Uniforme</div><span class="payment-status-badge ${j.unifEstado === 'PAGADO' ? 'pagado' : 'pendiente'}">${j.unifEstado || 'PENDIENTE'}</span></div>
                            <div class="payment-item"><i class="fas fa-socks"></i><div>Medias</div><span class="payment-status-badge ${mediasClass}">${mediasLabel}</span></div>
                        </div>
                        <div style="margin-top:12px; text-align:center; padding:10px; background:rgba(0,0,0,0.3); border-radius:16px;">
                            <i class="fas fa-coins"></i> Deuda Vocalía: <strong style="color:${(j.deudaVocalia || 0) > 0 ? '#e74c3c' : '#2ecc71'}">$${j.deudaVocalia || 0}</strong>
                        </div>
                        <div style="margin-top:8px; text-align:center; font-size:0.7rem; opacity:0.7;">
                            <i class="fas fa-tag"></i> Talla: ${j.tallaUni || 'No asignada'} | <i class="fas fa-tshirt"></i> Camiseta: ${j.nombreCamiseta || '-'}
                        </div>
                    </div>
                    <button class="logout-btn" id="cerrarSesion"><i class="fas fa-sign-out-alt"></i> CERRAR SESIÓN</button>
                `;
                
                document.getElementById('cerrarSesion').onclick = () => {
                    localStorage.removeItem('jugador_actual');
                    window.location.href = 'login.html';
                };
            } else {
                container.innerHTML = `<div class="loading-screen"><p>❌ ${data.error || 'JUGADOR NO ENCONTRADO'}</p><button onclick="localStorage.removeItem('jugador_actual');location.href='login.html'" style="margin-top:20px; background:#D4AF37; border:none; padding:10px 20px; border-radius:50px; cursor:pointer;">VOLVER</button></div>`;
            }
        } catch (error) {
            console.error('Error cargando perfil:', error);
            container.innerHTML = `<div class="loading-screen"><p>❌ ERROR DE CONEXIÓN</p><button onclick="location.reload()" style="margin-top:20px; background:#D4AF37; border:none; padding:10px 20px; border-radius:50px; cursor:pointer;">REINTENTAR</button></div>`;
        }
    }
    
    async function refrescarPerfil() {
        const sessionActual = JSON.parse(localStorage.getItem('jugador_actual'));
        if (sessionActual && sessionActual.cedula) {
            await cargarPerfil(sessionActual.cedula);
        } else {
            window.location.href = 'login.html';
        }
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    window.refrescarPerfil = refrescarPerfil;
</script>
</body>
</html>
