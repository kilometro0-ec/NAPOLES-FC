<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Nápoles F.C. - Mi Perfil</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@600;800;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

:root{
    --gold:#D4AF37;
    --bg:#060912;
    --card:rgba(255,255,255,.05);
    --text:#fff;
    --muted:#9ca3af;
    --success:#2ecc71;
    --danger:#e74c3c;
    --warning:#f39c12;
    --info:#3498db;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    background:
    radial-gradient(
        circle at top,
        #111a33 0%,
        #060912 100%
    );

    font-family:'Inter',sans-serif;

    color:var(--text);

    min-height:100vh;

    padding:15px;

    display:flex;

    justify-content:center;
}

.profile-container{
    width:100%;
    max-width:460px;
}

.profile-header{
    text-align:center;
    margin-bottom:20px;
}

.profile-header h1{
    font-family:'Outfit',sans-serif;
    color:var(--gold);
    font-size:1.3rem;
    letter-spacing:2px;
}

.cards-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin-bottom:15px;
}

.glass-card{
    background:
    linear-gradient(
        145deg,
        rgba(10,20,40,.85),
        rgba(5,10,20,.95)
    );

    border-radius:20px;

    border:1px solid rgba(212,175,55,.25);

    overflow:hidden;

    position:relative;
}

.id-card-identity{
    padding:15px;
    text-align:center;
}

.player-img{
    width:80px;
    height:80px;
    border-radius:50%;
    border:3px solid var(--gold);
    object-fit:cover;
    margin-bottom:10px;
    background:#000;
}

.id-card-jersey-wrap{
    perspective:900px;
    height:180px;
}

.jersey-card-inner{
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
    animation:rotateCard 12s linear infinite;
}

@keyframes rotateCard{

    from{
        transform:rotateY(0deg);
    }

    to{
        transform:rotateY(360deg);
    }
}

.face-front,
.face-back{

    position:absolute;

    width:100%;
    height:100%;

    border-radius:20px;

    backface-visibility:hidden;

    background:
    linear-gradient(
        145deg,
        #0a1428,
        #000814
    );

    border:2px solid rgba(212,175,55,.4);

    display:flex;

    flex-direction:column;

    align-items:center;

    justify-content:center;
}

.face-back{
    transform:rotateY(180deg);
}

.jersey-name{
    font-size:.7rem;
    color:#f5e6a3;
    text-transform:uppercase;
    letter-spacing:2px;
    font-weight:800;
}

.jersey-number{
    font-size:4.5rem;
    font-family:'Outfit';
    font-weight:900;
    line-height:1;
    color:var(--gold);
}

.section-box,
.stats-section,
.performance-section{

    background:var(--card);

    border-radius:20px;

    padding:15px;

    margin-bottom:15px;

    border:1px solid rgba(255,255,255,.05);

    backdrop-filter:blur(5px);
}

.section-title{

    display:flex;

    align-items:center;

    gap:8px;

    margin-bottom:15px;

    color:var(--gold);

    font-size:.8rem;

    font-weight:800;

    text-transform:uppercase;
}

.stats-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
}

.stat-card{

    background:rgba(0,0,0,.35);

    border-radius:16px;

    padding:10px 5px;

    text-align:center;
}

.stat-icon{
    font-size:1.3rem;
    margin-bottom:8px;
}

.stat-value{
    font-size:1.5rem;
    font-family:'Outfit';
    font-weight:900;
}

.stat-label{
    font-size:.55rem;
    color:var(--muted);
}

.performance-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
}

.metric-card{

    background:rgba(0,0,0,.35);

    border-radius:16px;

    padding:14px 10px;

    text-align:center;
}

.progress-circle{
    position:relative;
    width:85px;
    height:85px;
    margin:auto;
}

.progress-circle svg{
    width:100%;
    height:100%;
    transform:rotate(-90deg);
}

.progress-bg{
    stroke:rgba(255,255,255,.08);
    stroke-width:8;
    fill:none;
}

.progress-fill{
    stroke-width:8;
    fill:none;
    stroke-linecap:round;
}

.progress-text{

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    font-size:1.3rem;

    font-weight:900;
}

.metric-title{
    margin-top:10px;
    font-size:.7rem;
    font-weight:700;
}

.average-box{

    margin-top:15px;

    background:rgba(212,175,55,.08);

    border:1px solid rgba(212,175,55,.2);

    border-radius:15px;

    padding:15px;

    text-align:center;
}

.average-score{
    font-size:2.2rem;
    font-weight:900;
    color:var(--gold);
    font-family:'Outfit';
}

.btn-sync,
.btn-logout{

    width:100%;

    border:none;

    border-radius:14px;

    padding:14px;

    font-weight:800;

    cursor:pointer;
}

.btn-sync{

    background:rgba(212,175,55,.12);

    color:var(--gold);

    border:1px solid rgba(212,175,55,.3);

    margin-bottom:15px;
}

.btn-logout{

    background:rgba(231,76,60,.12);

    color:#e74c3c;
}

.spinner{

    width:45px;
    height:45px;

    border:4px solid rgba(255,255,255,.08);

    border-top-color:var(--gold);

    border-radius:50%;

    animation:spin 1s linear infinite;

    margin:120px auto;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

.error-message{
    text-align:center;
    padding:60px 20px;
    color:#e74c3c;
}

</style>

</head>

<body>

<div class="profile-container" id="perfilContent">

    <div class="spinner"></div>

</div>

<script src="config.js"></script>

<script>

/* =========================================
UTILIDADES
========================================= */

function escapeHtml(str){

    if(!str) return '';

    return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function sanitizeUrl(url){

    if(!url) return CONFIG.DEFAULT_AVATAR;

    let clean = String(url).trim();

    if(clean.startsWith('javascript:')){
        return CONFIG.DEFAULT_AVATAR;
    }

    return clean;
}

function calcularEdad(fechaNacimiento){

    if(!fechaNacimiento) return '--';

    let fecha = new Date(fechaNacimiento);

    if(isNaN(fecha.getTime())){

        let partes = fechaNacimiento.split(/[\/\-]/);

        if(partes.length === 3){

            fecha = new Date(
                parseInt(partes[2]),
                parseInt(partes[1]) - 1,
                parseInt(partes[0])
            );
        }
    }

    if(isNaN(fecha.getTime())) return '--';

    let hoy = new Date();

    let edad =
    hoy.getFullYear() -
    fecha.getFullYear();

    let mes =
    hoy.getMonth() -
    fecha.getMonth();

    if(
        mes < 0 ||
        (
            mes === 0 &&
            hoy.getDate() < fecha.getDate()
        )
    ){
        edad--;
    }

    return edad;
}

/* =========================================
VERIFICAR NOTICIAS
========================================= */

async function verificarNoticiasPendientes(
    cedula
){

    try{

        const response =
        await fetch(

            CONFIG.URL_GAS +

            '?accion=verificarNotificaciones&cedula=' +

            encodeURIComponent(cedula)

        );

        const data =
        await response.json();

        if(data.length > 0){

            mostrarPantallaNoticias(
                data,
                cedula
            );

        }else{

            cargarPerfil(cedula);

        }

    }catch(error){

        console.error(error);

        cargarPerfil(cedula);
    }
}

/* =========================================
PANTALLA BLOQUEANTE
========================================= */

function mostrarPantallaNoticias(
    noticias,
    cedula
){

    const container =
    document.getElementById(
        'perfilContent'
    );

    let html = '';

    noticias.forEach(item => {

        html += `

        <div style="
            background:rgba(255,255,255,.05);
            border-radius:20px;
            padding:18px;
            margin-bottom:18px;
            border:1px solid rgba(255,255,255,.08);
        ">

            <div style="
                color:var(--gold);
                font-weight:900;
                font-size:1rem;
                margin-bottom:12px;
            ">
                📢 ${item.titulo}
            </div>

            <div style="
                color:#e5e7eb;
                line-height:1.6;
                font-size:.9rem;
            ">
                ${item.mensaje}
            </div>

            <button
                onclick="
                    confirmarNoticiaBloqueante(
                        '${item.id}',
                        '${cedula}'
                    )
                "
                style="
                    width:100%;
                    margin-top:18px;
                    border:none;
                    border-radius:16px;
                    padding:16px;
                    background:linear-gradient(
                        135deg,
                        #2ecc71,
                        #27ae60
                    );
                    color:#fff;
                    font-weight:900;
                    cursor:pointer;
                ">

                ✅ CONFIRMAR Y CONTINUAR

            </button>

        </div>
        `;
    });

    container.innerHTML = `

    <div style="
        min-height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
    ">

        <div style="
            width:100%;
            max-width:500px;
        ">

            <div style="
                text-align:center;
                margin-bottom:25px;
            ">

                <div style="
                    font-size:3rem;
                    margin-bottom:10px;
                ">
                    ⚜️
                </div>

                <div style="
                    font-size:1.3rem;
                    font-weight:900;
                    color:var(--gold);
                ">
                    Noticias del Club
                </div>

                <div style="
                    color:var(--muted);
                    margin-top:8px;
                    font-size:.85rem;
                ">
                    Debes confirmar para continuar
                </div>

            </div>

            ${html}

        </div>

    </div>
    `;
}

/* =========================================
CONFIRMAR
========================================= */

async function confirmarNoticiaBloqueante(
    idNotificacion,
    cedula
){

    try{

        await fetch(CONFIG.URL_GAS,{

            method:'POST',

            body:JSON.stringify({

                accion:'confirmarNotificacion',

                idNotificacion:idNotificacion,

                cedula:cedula

            })

        });

        verificarNoticiasPendientes(
            cedula
        );

    }catch(error){

        console.error(error);
    }
}

/* =========================================
CARGAR PERFIL
========================================= */

async function cargarPerfil(cedula){

    const container =
    document.getElementById(
        'perfilContent'
    );

    try{

        const url =

        `${CONFIG.URL_GAS}?action=getPerfil&cedula=${encodeURIComponent(cedula)}&t=${Date.now()}`;

        const resp =
        await fetch(url);

        const data =
        await resp.json();

        if(data.success && data.jugador){

            const j =
            data.jugador;

            const nombre =
            escapeHtml(
                j.primerNombre || ''
            );

            const dorsal =
            escapeHtml(
                j.dorsal || '00'
            );

            const foto =
            sanitizeUrl(
                j.urlFotoRostro
            );

            container.innerHTML = `

            <div class="profile-header">

                <h1>
                    ⚜️ PANEL NÁPOLES ⚜️
                </h1>

            </div>

            <div class="cards-row">

                <div class="id-card-identity glass-card">

                    <img
                        src="${foto}"
                        class="player-img"
                        onerror="this.src='${CONFIG.DEFAULT_AVATAR}'">

                    <div style="
                        font-weight:900;
                        font-family:'Outfit';
                        font-size:.9rem;
                        text-transform:uppercase;
                    ">

                        ${nombre}

                    </div>

                    <div style="
                        font-size:.65rem;
                        color:var(--muted);
                        margin-top:4px;
                    ">

                        <i class="fas fa-id-card"></i>
                        ${cedula}

                    </div>

                </div>

                <div class="id-card-jersey-wrap">

                    <div class="jersey-card-inner">

                        <div class="face-front">

                            <div class="jersey-name">
                                NÁPOLES
                            </div>

                            <div class="jersey-number">
                                ${dorsal}
                            </div>

                        </div>

                        <div class="face-back">

                            <div class="jersey-name">
                                NÁPOLES FC
                            </div>

                            <div class="jersey-number">
                                ${dorsal}
                            </div>

                        </div>

                    </div>

                </div>

            </div>

            <button
                class="btn-sync"
                onclick="window.recargarPerfil()">

                <i class="fas fa-sync-alt"></i>

                ACTUALIZAR INFORMACIÓN

            </button>

            <button
                class="btn-logout"
                onclick="window.cerrarSesion()">

                <i class="fas fa-sign-out-alt"></i>

                CERRAR SESIÓN

            </button>

            <div style="height:40px;"></div>

            `;

        }else{

            container.innerHTML = `

            <div class="error-message">

                Jugador no encontrado

            </div>
            `;
        }

    }catch(e){

        console.error(e);

        container.innerHTML = `

        <div class="error-message">

            Error de conexión

        </div>
        `;
    }
}

/* =========================================
RECARGAR
========================================= */

window.recargarPerfil = async function(){

    const session =
    JSON.parse(
        localStorage.getItem(
            'jugador_actual'
        )
    );

    if(!session || !session.cedula){

        window.location.href =
        'login.html';

        return;
    }

    document.getElementById(
        'perfilContent'
    ).innerHTML =
    '<div class="spinner"></div>';

    verificarNoticiasPendientes(
        session.cedula
    );
};

/* =========================================
CERRAR SESION
========================================= */

window.cerrarSesion = function(){

    if(confirm('¿Cerrar sesión?')){

        localStorage.removeItem(
            'jugador_actual'
        );

        window.location.href =
        'login.html';
    }
};

/* =========================================
INIT
========================================= */

(function(){

    const session =
    JSON.parse(
        localStorage.getItem(
            'jugador_actual'
        )
    );

    if(!session || !session.cedula){

        window.location.href =
        'login.html';

        return;
    }

    verificarNoticiasPendientes(
        session.cedula
    );

})();

</script>

</body>
</html>
