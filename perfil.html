<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nápoles F.C. - Mi Perfil</title>
    <link href="https://script.google.com/macros/s/AKfycbzDd_upVUwAl3ORyxhAbPbN1ZS-NwpYhtCUTyLInjHWsrIUt4OhyShgo_xIn8Pfxw/exec">
    <style>
        :root {
            --dorado: #D4AF37;
            --dorado-brillante: #FFD700;
            --azul-oscuro: #0a1428;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(212, 175, 55, 0.3);
            --rojo-error: #ff5e5e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--azul-oscuro);
            background-image: 
                radial-gradient(circle at top right, rgba(212, 175, 55, 0.1), transparent 400px),
                radial-gradient(circle at bottom left, rgba(0, 82, 212, 0.1), transparent 400px);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            color: #fff;
        }

        .pes-container {
            max-width: 480px;
            width: 100%;
            background: rgba(10, 20, 40, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 2rem;
            border: 1px solid var(--glass-border);
            overflow-y: auto;
            max-height: 95vh;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .pes-header {
            padding: 1.5rem 1rem;
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
        }

        .pes-header h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #fff 0%, var(--dorado) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .player-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem;
            background: radial-gradient(circle at center, rgba(212, 175, 55, 0.08) 0%, transparent 70%);
        }

        .player-photo-wrapper { position: relative; margin-bottom: 1rem; }

        .player-photo {
            width: 130px; height: 130px;
            border-radius: 50%;
            border: 3px solid var(--dorado);
            padding: 4px;
            background: var(--azul-oscuro);
        }

        .player-photo img {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .ovr-badge {
            position: absolute; bottom: 0; right: 0;
            background: var(--dorado);
            color: #000;
            font-weight: 800;
            width: 42px; height: 42px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
            border: 3px solid var(--azul-oscuro);
            font-size: 1.1rem;
        }

        .player-name { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.3rem; }
        
        .player-dorsal-tag {
            background: var(--dorado);
            color: #000;
            padding: 2px 12px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.8rem;
            transform: skewX(-15deg);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
            padding: 1rem;
        }

        .stat-box {
            background: var(--glass-bg);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
        }

        .stat-label {
            display: block;
            font-size: 0.65rem;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .stat-value {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--dorado-brillante);
        }

        .full-width { grid-column: span 2; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; }

        .btn-cerrar {
            grid-column: span 2;
            background: transparent;
            border: 1px solid var(--rojo-error);
            color: var(--rojo-error);
            padding: 0.8rem;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .btn-cerrar:hover { background: var(--rojo-error); color: #fff; }

        .loading { padding: 5rem; text-align: center; color: var(--dorado); }
    </style>
</head>
<body>

<div class="pes-container">
    <div id="perfilContent">
        <div class="loading">⌛ SINCRONIZANDO DATOS...</div>
    </div>
</div>

<script>
    const URL_GAS = "https://script.google.com/macros/s/AKfycbzw2Ef4Wja_Nu1Gks7o5yAP-xBgH0R5WAiXgaKhJ_0Z4r6PRrkHSwoMyf8WbMoASgKv/exec";

    let session = JSON.parse(localStorage.getItem('jugador_aprobado'));
    if (!session || Date.now() > session.expira) {
        window.location.href = 'login.html';
    } else {
        cargarPerfil(session.cedula);
    }

    async function cargarPerfil(cedula) {
        const container = document.getElementById('perfilContent');
        try {
            const resp = await fetch(`${URL_GAS}?action=obtenerJugador&cedula=${cedula}`);
            const data = await resp.json();
            
            if (data.ok) {
                // Cálculo de Valoración General (OVR) basado en los 5 valores humanos
                const p = parseInt(data.puntualidad) || 0;
                const o = parseInt(data.obediencia) || 0;
                const c = parseInt(data.companerismo) || 0;
                const r = parseInt(data.respeto) || 0;
                const h = parseInt(data.humildad) || 0;
                
                // Promedio escala 1-10 convertido a escala 1-100 para estilo FIFA/PES
                const ovrCalculada = Math.round(((p + o + c + r + h) / 5) * 10);

                container.innerHTML = `
                    <div class="pes-header">
                        <h1>MI PERFIL NÁPOLES</h1>
                    </div>
                    
                    <div class="player-card">
                        <div class="player-photo-wrapper">
                            <div class="player-photo">
                                <img src="${data.urlRostro || 'https://via.placeholder.com/150'}" alt="Foto">
                            </div>
                            <div class="ovr-badge">${ovrCalculada || 60}</div>
                        </div>
                        <div class="player-name">${(data.nombreCamiseta || data.nombre1).toUpperCase()}</div>
                        <div class="player-dorsal-tag">DORSAL ${data.dorsal || '00'}</div>
                    </div>

                    <div class="stats-grid">
                        <!-- Datos Principales -->
                        <div class="stat-box full-width">
                            <span class="stat-label">Cédula de Identidad</span>
                            <span class="stat-value" style="font-size:1rem; color:#fff;">${data.cedula}</span>
                        </div>

                        <!-- Estadísticas de Campo -->
                        <div class="stat-box">
                            <span class="stat-label">Goles</span>
                            <span class="stat-value">⚽ ${data.goles || 0}</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-label">Sanciones</span>
                            <span class="stat-value">🟨 ${data.amarillas || 0} 🟥 ${data.rojas || 0}</span>
                        </div>

                        <!-- Valores Humanos (Nuevos campos) -->
                        <div class="stat-box">
                            <span class="stat-label">Compañerismo</span>
                            <span class="stat-value">${data.companerismo || 0}/10</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-label">Respeto</span>
                            <span class="stat-value">${data.respeto || 0}/10</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-label">Humildad</span>
                            <span class="stat-value">${data.humildad || 0}/10</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-label">Puntualidad</span>
                            <span class="stat-value">${data.puntualidad || 0}/10</span>
                        </div>

                        <div class="stat-box full-width">
                            <span class="stat-label">Estado de Pago Vocalía</span>
                            <span class="stat-value" style="color: ${data.estadoPago === 'PAGADO' ? '#2ecc71' : '#e74c3c'}">
                                ${data.estadoPago || 'PENDIENTE'}
                            </span>
                        </div>

                        <button id="cerrarSesion" class="btn-cerrar">Cerrar Sesión</button>
                    </div>
                `;

                document.getElementById('cerrarSesion').onclick = () => {
                    localStorage.removeItem('jugador_aprobado');
                    window.location.href = 'login.html';
                };
            }
        } catch (error) {
            container.innerHTML = `<div class="loading">⚠️ ERROR DE CONEXIÓN</div>`;
        }
    }
</script>
</body>
</html>
