<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Perfil Jugador</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    background:#020c1a;
    font-family:'Plus Jakarta Sans',sans-serif;
    color:white;
    padding:20px;
}

.card{
    max-width:500px;
    margin:auto;
    background:rgba(12,25,45,.8);
    border:1px solid rgba(0,210,255,.3);
    border-radius:30px;
    padding:30px;
}

h1{
    text-align:center;
    color:#00d2ff;
}

.foto{
    width:140px;
    height:140px;
    border-radius:50%;
    object-fit:cover;
    display:block;
    margin:auto;
    border:4px solid #00d2ff;
}

.item{
    margin-top:18px;
}

.label{
    color:#00d2ff;
    font-size:.8rem;
    margin-bottom:4px;
}

.valor{
    background:#111c30;
    padding:15px;
    border-radius:15px;
    font-weight:600;
}

.btn{
    width:100%;
    margin-top:30px;
    padding:16px;
    border:none;
    border-radius:18px;
    background:linear-gradient(135deg,#008f9b,#00d2ff);
    color:white;
    font-weight:700;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="card">

    <h1>MI PERFIL</h1>

    <img id="fotoJugador"
    class="foto"
    src="https://cdn-icons-png.flaticon.com/512/149/149071.png">

    <div class="item">
        <div class="label">NOMBRES</div>
        <div class="valor" id="nombre"></div>
    </div>

    <div class="item">
        <div class="label">CÉDULA</div>
        <div class="valor" id="cedula"></div>
    </div>

    <div class="item">
        <div class="label">POSICIÓN</div>
        <div class="valor" id="posicion"></div>
    </div>

    <div class="item">
        <div class="label">ESTADO</div>
        <div class="valor" id="estado"></div>
    </div>

    <button class="btn" onclick="cerrarSesion()">
        CERRAR SESIÓN
    </button>

</div>

<script>

const jugador = JSON.parse(
    localStorage.getItem("jugador_actual")
);

if(!jugador){
    window.location.href = "login.html";
}

document.getElementById("nombre").innerText =
jugador.nombre || "No disponible";

document.getElementById("cedula").innerText =
jugador.cedula || "No disponible";

document.getElementById("posicion").innerText =
jugador.posicion || "No disponible";

document.getElementById("estado").innerText =
jugador.estado || "ACTIVO";

if(jugador.foto){
    document.getElementById("fotoJugador").src =
    jugador.foto;
}

function cerrarSesion(){

    localStorage.removeItem("jugador_actual");

    window.location.href = "login.html";
}

</script>

</body>
</html>
