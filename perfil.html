<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nápoles F.C. - Mi Perfil</title>
    <link rel="stylesheet" href="estilos.css">
    <style>
        .perfil-dato {
            background: rgba(0,0,0,0.3);
            border-radius: 30px;
            padding: 12px 20px;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
        }
        .perfil-dato strong { color: var(--dorado); }
        .fotos-perfil {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .foto-item {
            text-align: center;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 10px;
            width: 180px;
        }
        .foto-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid var(--dorado);
        }
        .foto-item p {
            margin-top: 8px;
            color: var(--dorado);
            font-weight: bold;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: var(--dorado);
        }
        .error-mensaje {
            background: rgba(255,94,94,0.2);
            border-left: 4px solid #ff5e5e;
            padding: 12px;
            border-radius: 12px;
            margin: 15px 0;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="contenedor-principal" style="max-width: 550px;">
    <h2 style="text-align:center;">⚽ MI PERFIL ⚽</h2>
    <div id="perfilContent">
        <div class="loading">Cargando datos del jugador...</div>
    </div>
</div>

<script>
    const URL_GAS = "https://script.google.com/macros/s/AKfycbyOZObCnKnnbwwuwTO8CULGvh1-c9hiUqAhBs15N3ceMYaFQaiHtTQWGJgugbodinP6/exec";

    // Obtener sesión
    let session = null;
    try {
        const raw = localStorage.getItem('jugador_aprobado');
        if (raw) {
            session = JSON.parse(raw);
            if (Date.now() > session.expira) {
                localStorage.removeItem('jugador_aprobado');
                session = null;
            }
        }
    } catch(e) {
        console.error("Error al leer sesión:", e);
    }

    if (!session || !session.cedula) {
        // No hay sesión válida, redirigir al login
        window.location.href = 'login.html';
    } else {
        // Cargar perfil con la cédula de la sesión
        cargarPerfil(session.cedula);
    }

    async function cargarPerfil(cedula) {
        const container = document.getElementById('perfilContent');
        container.innerHTML = '<div class="loading">⏳ Cargando datos del jugador...</div>';
        
        try {
            console.log("Consultando jugador con cédula:", cedula);
            const resp = await fetch(`${URL_GAS}?action=obtenerJugador&cedula=${cedula}`);
            const data = await resp.json();
            console.log("Respuesta del backend:", data);

            if (data.ok) {
                // Construir el HTML del perfil
                container.innerHTML = `
                    <div class="fotos-perfil">
                        <div class="foto-item"><p>📸 FOTO PERFIL</p><img id="fotoRostro" src="${data.urlRostro || ''}" alt="Foto rostro" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22100%22%20height%3D%22100%22%20viewBox%3D%220%200%20100%20100%22%3E%3Crect%20fill%3D%22%23333%22%20width%3D%22100%22%20height%3D%22100%22%2F%3E%3Ctext%20fill%3D%22%23B59461%22%20x%3D%2250%25%22%20y%3D%2250%25%22%20text-anchor%3D%22middle%22%20dy%3D%22.3em%22%3ESin%20foto%3C%2Ftext%3E%3C%2Fsvg%3E'"></div>
                        <div class="foto-item"><p>🪪 FOTO CÉDULA</p><img id="fotoCedula" src="${data.urlCedula || ''}" alt="Foto cédula" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22100%22%20height%3D%22100%22%20viewBox%3D%220%200%20100%20100%22%3E%3Crect%20fill%3D%22%23333%22%20width%3D%22100%22%20height%3D%22100%22%2F%3E%3Ctext%20fill%3D%22%23B59461%22%20x%3D%2250%25%22%20y%3D%2250%25%22%20text-anchor%3D%22middle%22%20dy%3D%22.3em%22%3ESin%20foto%3C%2Ftext%3E%3C%2Fsvg%3E'"></div>
                    </div>
                    <div class="perfil-dato"><strong>Cédula:</strong> <span>${data.cedula || '---'}</span></div>
                    <div class="perfil-dato"><strong>Nombre completo:</strong> <span>${(data.nombre1 || '')} ${(data.nombre2 || '')} ${(data.apellidos || '')}</span></div>
                    <div class="perfil-dato"><strong>Fecha de nacimiento:</strong> <span>${data.fechaNac || '---'}</span></div>
                    <div class="perfil-dato"><strong>Teléfono:</strong> <span>${data.telefono || '---'}</span></div>
                    <div class="perfil-dato"><strong>Correo:</strong> <span>${data.correo || '---'}</span></div>
                    <div class="perfil-dato"><strong>Dorsal:</strong> <span>${data.dorsal || '---'}</span></div>
                    <div class="perfil-dato"><strong>Nombre en camiseta:</strong> <span>${data.nombreCamiseta || '---'}</span></div>
                    <button id="cerrarSesion" class="btn-accion">🚪 CERRAR SESIÓN</button>
                `;
                // Agregar evento al botón después de inyectar el HTML
                document.getElementById('cerrarSesion').addEventListener('click', () => {
                    localStorage.removeItem('jugador_aprobado');
                    window.location.href = 'login.html';
                });
            } else {
                container.innerHTML = `<div class="error-mensaje">❌ No se encontraron datos para la cédula ${cedula}. Redirigiendo...</div>`;
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            }
        } catch (error) {
            console.error("Error al cargar perfil:", error);
            container.innerHTML = `<div class="error-mensaje">⚠️ Error de conexión. Intenta más tarde.</div>`;
        }
    }
</script>
</body>
</html>
