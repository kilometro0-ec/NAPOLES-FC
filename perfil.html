<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nápoles F.C. - Mi Perfil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-gold: #D4AF37;
            --light-gold: #FFD700;
            --dark-bg: #060912;
            --card-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(212, 175, 55, 0.2);
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: radial-gradient(circle at top, #111a33 0%, #060912 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 20px 16px;
            color: var(--text-main);
            line-height: 1.5;
        }

        .profile-container {
            max-width: 450px;
            margin: 0 auto;
        }

        /* --- Header --- */
        .profile-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .profile-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--light-gold), var(--primary-gold));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 5px;
        }

        .profile-header p {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- Player Main Card --- */
        .player-card {
            background: linear-gradient(145deg, rgba(212, 175, 55, 0.1), rgba(10, 20, 40, 0.9));
            backdrop-filter: blur(15px);
            border-radius: 28px;
            padding: 30px 20px;
            margin-bottom: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .player-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .player-photo-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            text-align: center;
        }

        .player-photo-wrapper { position: relative; }

        .player-photo {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 3px solid var(--primary-gold);
            padding: 5px;
            background: #060912;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .player-photo img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .ovr-badge {
            position: absolute;
            bottom: 5px;
            right: -5px;
            background: var(--primary-gold);
            color: #000;
            font-weight: 800;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            border: 3px solid #060912;
            font-family: 'Outfit', sans-serif;
            font-size: 1.2rem;
            transform: rotate(-5deg);
        }

        .player-name {
            font-family: 'Outfit', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            margin-top: 10px;
        }

        .dorsal-badge {
            background: var(--primary-gold);
            color: #000;
            padding: 4px 15px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.8rem;
            margin-top: 8px;
            display: inline-block;
        }

        /* --- Stats Grid --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 15px 10px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:active { transform: scale(0.95); }

        .stat-icon { font-size: 1.2rem; margin-bottom: 8px; color: var(--primary-gold); }
        .stat-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; }
        .stat-value { font-size: 1.4rem; font-weight: 800; font-family: 'Outfit', sans-serif; }

        /* --- Sections --- */
        .section-box {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .section-title {
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--primary-gold);
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .values-grid, .payments-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .value-item {
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .value-item span:first-child { font-size: 0.75rem; color: var(--text-muted); }
        .value-score { font-weight: 700; color: var(--primary-gold); font-size: 1rem; }

        /* --- Payments --- */
        .payments-grid { grid-template-columns: repeat(3, 1fr); }
        .payment-item {
            background: rgba(0,0,0,0.2);
            padding: 12px 8px;
            border-radius: 18px;
            text-align: center;
            font-size: 0.7rem;
        }

        .payment-item i { font-size: 1.1rem; margin-bottom: 8px; display: block; opacity: 0.8; }

        .status-pill {
            display: block;
            margin-top: 8px;
            padding: 3px 0;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.6rem;
        }

        .pagado { background: rgba(46, 204, 113, 0.2); color: #2ecc71; }
        .pendiente { background: rgba(231, 76, 60, 0.2); color: #e74c3c; }

        /* --- Buttons --- */
        .refresh-btn {
            background: transparent;
            border: 1px solid var(--primary-gold);
            color: var(--primary-gold);
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            font-weight: 700;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .refresh-btn:hover { background: var(--primary-gold); color: #000; }

        .logout-btn {
            width: 100%;
            background: #e74c3c;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 15px;
            font-weight: 700;
            margin-top: 10px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.3);
        }

        .loading-screen { text-align: center; padding: 100px 20px; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(212, 175, 55, 0.1);
            border-top: 3px solid var(--primary-gold);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .debt-container {
            margin-top: 15px;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
