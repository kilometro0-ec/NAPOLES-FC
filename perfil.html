<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nápoles F.C. - Mi Perfil</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --dorado: #D4AF37;
            --dorado-brillante: #FFD700;
            --azul-oscuro: #0a1428;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(212, 175, 55, 0.3);
            --rojo-error: #ff5e5e;
            --verde-pagado: #2ecc71;
            --rojo-pendiente: #e74c3c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--azul-oscuro);
            background-image: 
                radial-gradient(circle at top right, rgba(212, 175, 55, 0.1), transparent 400px),
                radial-gradient(circle at bottom left, rgba(0, 82, 212, 0.1), transparent 400px);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            color: #fff;
        }

        .pes-container {
            max-width: 480px;
            width: 100%;
            background: rgba(10, 20, 40, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 2rem;
            border: 1px solid var(--glass-border);
            overflow-y: auto;
            max-height: 95vh;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .pes-header {
            padding: 1.5rem 1rem;
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
        }

        .pes-header h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #fff 0%, var(--dorado) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .player-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem;
            background: radial-gradient(circle at center, rgba(212, 175, 55, 0.08) 0%, transparent 70%);
        }

        .player-photo-wrapper { position: relative; margin-bottom: 1rem; }

        .player-photo {
            width: 130px; height: 130px;
            border-radius: 50%;
            border: 3px solid var(--dorado);
            padding: 4px;
            background: var(--azul-oscuro);
        }

        .player-photo img {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .ovr-badge {
            position: absolute; bottom: 0; right: 0;
            background: var(--dorado);
            color: #000;
            font-weight: 800;
            width: 42px; height: 42px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
            border: 3px solid var(--azul-oscuro);
            font-size: 1.1rem;
        }

        .player-name { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.3rem; }
        
        .player-dorsal-tag {
            background: var(--dorado);
            color: #000;
            padding: 2px 12px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.8rem;
            transform: skewX(-15deg);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
            padding: 1rem;
        }

        .stat-box {
            background: var(--glass-bg);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
        }

        .stat-label {
            display: block;
            font-size: 0.65rem;
            color: #aaa;
            text-transform: uppercase;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--dorado-brillante);
        }

        .full-width { grid-column: span 2; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; }
        
        .full-width .stat-label { margin-bottom: 0; }
        .full-width .stat-value { font-size: 1rem; }

        .btn-cerrar {
            grid-column: span 2;
            background: transparent;
            border: 1px solid var(--rojo-error);
            color: var(--rojo-error);
            padding: 0.8rem;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }

        .btn-cerrar:hover { background: var(--rojo-error); color: #fff; }

        .loading { 
            padding: 5rem; 
            text-align: center; 
            color: var(--dorado);
            font-weight: 500;
        }
        
        .error-loading {
            color: var(--rojo-error);
        }

        /* Estilos específicos para datos de tarjetas */
        .tarjetas-container {
            display: inline-flex;
            gap: 12px;
            align-items: center;
            justify-content: center;
        }
        
        .tarjeta-amarilla {
            color: #f1c40f;
        }
        
        .tarjeta-roja {
            color: #e74c3c;
        }
    </style>
</head>
<body>

<div class="pes-container">
    <div id="perfilContent">
        <div class="loading">⚽ SINCRONIZANDO DATOS... ⚽</div>
    </div>
</div>

<script>
    // URL CORREGIDA del Google Apps Script (usamos la que proporcionaste originalmente)
    const URL_GAS = "https://script.google.com/macros/s/AKfycbzw2Ef4Wja_Nu1Gks7o5yAP-xBgH0R5WAiXgaKhJ_0Z4r6PRrkHSwoMyf8WbMoASgKv/exec";

    // Verificar sesión activa
    let session = JSON.parse(localStorage.getItem('jugador_aprobado'));
    if (!session || Date.now() > session.expira) {
        window.location.href = 'login.html';
    } else {
        cargarPerfil(session.cedula);
    }

    async function cargarPerfil(cedula) {
        const container = document.getElementById('perfilContent');
        try {
            // Mostramos loading actualizado
            container.innerHTML = '<div class="loading">📡 CARGANDO PERFIL DE JUGADOR...</div>';
            
            // Llamada correcta a la API con el parámetro action=obtenerJugador
            const resp = await fetch(`${URL_GAS}?action=obtenerJugador&cedula=${encodeURIComponent(cedula)}`);
            
            if (!resp.ok) {
                throw new Error(`Error HTTP: ${resp.status}`);
            }
            
            const data = await resp.json();
            
            if (data.ok && data.jugador) {
                // Extraemos el objeto jugador
                const jugador = data.jugador;
                
                // Valores por defecto para campos que podrían venir undefined
                const goles = jugador.goles !== undefined && jugador.goles !== null ? jugador.goles : 0;
                const amarillas = jugador.amarillas !== undefined && jugador.amarillas !== null ? jugador.amarillas : 0;
                const rojas = jugador.rojas !== undefined && jugador.rojas !== null ? jugador.rojas : 0;
                const companerismo = jugador.companerismo !== undefined && jugador.companerismo !== null ? jugador.companerismo : 0;
                const respeto = jugador.respeto !== undefined && jugador.respeto !== null ? jugador.respeto : 0;
                const humildad = jugador.humildad !== undefined && jugador.humildad !== null ? jugador.humildad : 0;
                const puntualidad = jugador.puntualidad !== undefined && jugador.puntualidad !== null ? jugador.puntualidad : 0;
                const estadoPago = jugador.estadoPago || 'PENDIENTE';
                const dorsal = jugador.dorsal || '--';
                const nombreCamiseta = jugador.nombreCamiseta || jugador.nombre1 || 'JUGADOR';
                const cedulaJugador = jugador.cedula || cedula;
                
                // Cálculo de Valoración General (OVR) basado en los 5 valores humanos (escala 1-10 -> 1-100)
                const promedio = (parseInt(companerismo) + parseInt(respeto) + parseInt(humildad) + parseInt(puntualidad)) / 4;
                const ovrCalculada = Math.round(promedio * 10);
                const ovrMostrar = isNaN(ovrCalculada) ? 60 : (ovrCalculada < 40 ? 40 : ovrCalculada);
                
                // Imagen: buscamos urlRostro o fallback con placeholder
                let fotoUrl = jugador.urlRostro || '';
                // Si la URL no es válida o está vacía, usamos placeholder con iniciales
                if (!fotoUrl || fotoUrl.trim() === '') {
                    // Placeholder con avatar por defecto con la inicial del nombre
                    const inicial = nombreCamiseta.charAt(0).toUpperCase();
                    fotoUrl = `https://ui-avatars.com/api/?background=D4AF37&color=0a1428&bold=true&size=130&name=${encodeURIComponent(inicial)}`;
                }
                
                // Construir HTML con todos los datos correctamente mostrados
                container.innerHTML = `
                    <div class="pes-header">
                        <h1>⚜️ MI PERFIL NÁPOLES ⚜️</h1>
                    </div>
                    
                    <div class="player-card">
                        <div class="player-photo-wrapper">
                            <div class="player-photo">
                                <img src="${fotoUrl}" alt="Foto de ${nombreCamiseta}" onerror="this.src='https://ui-avatars.com/api/?background=0a1428&color=D4AF37&bold=true&size=130&name=${encodeURIComponent(nombreCamiseta.substring(0,2))}'">
                            </div>
                            <div class="ovr-badge">${ovrMostrar}</div>
                        </div>
                        <div class="player-name">${nombreCamiseta.toUpperCase()}</div>
                        <div class="player-dorsal-tag">👕 DORSAL ${dorsal}</div>
                    </div>

                    <div class="stats-grid">
                        <!-- Datos Principales: Cédula -->
                        <div class="stat-box full-width">
                            <span class="stat-label">📄 Cédula de Identidad</span>
                            <span class="stat-value" style="font-size:1rem; color:#fff;">${cedulaJugador}</span>
                        </div>

                        <!-- Estadísticas de Campo: Goles y Tarjetas -->
                        <div class="stat-box">
                            <span class="stat-label">⚽ Goles</span>
                            <span class="stat-value">⚽ ${goles}</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-label">🃏 Tarjetas</span>
                            <div class="tarjetas-container">
                                <span class="stat-value tarjeta-amarilla">🟨 ${amarillas}</span>
                                <span class="stat-value tarjeta-roja">🟥 ${rojas}</span>
                            </div>
                        </div>

                        <!-- Valores Humanos (Campos corregidos) -->
                        <div class="stat-box">
                            <span class="stat-label">🤝 Compañerismo</span>
                            <span class="stat-value">${companerismo}/10</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-label">🙏 Respeto</span>
                            <span class="stat-value">${respeto}/10</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-label">💙 Humildad</span>
                            <span class="stat-value">${humildad}/10</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-label">⏰ Puntualidad</span>
                            <span class="stat-value">${puntualidad}/10</span>
                        </div>

                        <!-- Estado de Pago Vocalía -->
                        <div class="stat-box full-width">
                            <span class="stat-label">💰 Estado de Pago Vocalía</span>
                            <span class="stat-value" style="color: ${estadoPago === 'PAGADO' ? '#2ecc71' : '#e74c3c'}; font-weight:700;">
                                ${estadoPago === 'PAGADO' ? '✅ PAGADO' : '⚠️ PENDIENTE'}
                            </span>
                        </div>

                        <button id="cerrarSesion" class="btn-cerrar">🚪 Cerrar Sesión</button>
                    </div>
                `;

                // Agregar evento de cierre de sesión
                document.getElementById('cerrarSesion').onclick = () => {
                    localStorage.removeItem('jugador_aprobado');
                    window.location.href = 'login.html';
                };
            } else {
                // Si la API responde pero no hay jugador
                container.innerHTML = `<div class="loading error-loading">❌ JUGADOR NO ENCONTRADO O DATOS INCOMPLETOS</div>`;
                setTimeout(() => {
                    localStorage.removeItem('jugador_aprobado');
                    window.location.href = 'login.html';
                }, 2000);
            }
        } catch (error) {
            console.error('Error al cargar perfil:', error);
            container.innerHTML = `<div class="loading error-loading">⚠️ ERROR DE CONEXIÓN: ${error.message}<br>Reintentando...</div>`;
            // Opcional: reintentar después de 3 segundos
            setTimeout(() => {
                if (localStorage.getItem('jugador_aprobado')) {
                    cargarPerfil(cedula);
                }
            }, 3000);
        }
    }
</script>
</body>
</html>
