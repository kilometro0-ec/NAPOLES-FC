<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Nápoles F.C. - Mi Perfil</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@600;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

:root{
    --primary-gold:#D4AF37;
    --dark-bg:#060912;
    --card-bg:rgba(255,255,255,.05);
    --text-main:#fff;
    --text-muted:#a0a0a0;
    --danger:#e74c3c;
    --success:#2ecc71;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    background:radial-gradient(circle at top,#111a33 0%,#060912 100%);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    padding:15px;
    color:#fff;
    display:flex;
    justify-content:center;
}

.profile-container{
    width:100%;
    max-width:450px;
}

.profile-header{
    text-align:center;
    margin-bottom:20px;
}

.profile-header h1{
    font-family:'Outfit';
    color:var(--primary-gold);
    font-size:1.4rem;
    letter-spacing:2px;
}

.cards-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin-bottom:20px;
}

.glass-card{
    background:linear-gradient(145deg,rgba(10,20,40,.85),rgba(5,10,20,.95));
    border-radius:20px;
    border:1px solid rgba(212,175,55,.3);
}

.id-card-identity{
    padding:15px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.player-img{
    width:80px;
    height:80px;
    border-radius:50%;
    border:3px solid var(--primary-gold);
    object-fit:cover;
    margin-bottom:10px;
    background:#000;
}

.id-card-jersey-wrap{
    perspective:800px;
    height:180px;
}

.jersey-card-inner{
    position:relative;
    width:100%;
    height:100%;
    transform-style:preserve-3d;
    animation:rotateCard 12s linear infinite;
}

@keyframes rotateCard{
    from{transform:rotateY(0deg);}
    to{transform:rotateY(360deg);}
}

.face-jersey-front,
.face-jersey-back{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:20px;
    border:2px solid rgba(212,175,55,.4);
    background:linear-gradient(145deg,#0a1428,#000814);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    backface-visibility:hidden;
}

.face-jersey-back{
    transform:rotateY(180deg);
}

.jersey-top-name{
    position:absolute;
    top:15px;
    font-size:.7rem;
    letter-spacing:2px;
    color:#f5e6a3;
    font-weight:900;
    text-transform:uppercase;
}

.jersey-number{
    font-size:4.5rem;
    font-family:'Outfit';
    font-weight:900;
    color:var(--primary-gold);
}

.section-box{
    background:var(--card-bg);
    border-radius:20px;
    padding:15px;
    margin-bottom:15px;
    border:1px solid rgba(255,255,255,.05);
}

.section-title{
    color:var(--primary-gold);
    font-size:.8rem;
    font-weight:800;
    margin-bottom:15px;
    text-transform:uppercase;
}

.stats-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}

.stat-card{
    background:rgba(0,0,0,.35);
    border-radius:16px;
    padding:15px;
    text-align:center;
}

.stat-value{
    font-size:1.7rem;
    font-weight:900;
    margin-top:5px;
}

.stat-label{
    font-size:.65rem;
    color:var(--text-muted);
    margin-top:5px;
}

.performance-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
}

.metric-card{
    background:rgba(0,0,0,.35);
    border-radius:16px;
    padding:15px;
    text-align:center;
}

.progress-circle{
    position:relative;
    width:90px;
    height:90px;
    margin:0 auto 10px;
}

.progress-circle svg{
    width:100%;
    height:100%;
    transform:rotate(-90deg);
}

.progress-circle-bg{
    stroke:rgba(255,255,255,.1);
    stroke-width:8;
    fill:none;
}

.progress-circle-fill{
    stroke-width:8;
    fill:none;
    stroke-linecap:round;
}

.progress-circle-fill.puntualidad{stroke:#3498db;}
.progress-circle-fill.companerismo{stroke:#2ecc71;}
.progress-circle-fill.respeto{stroke:#f39c12;}
.progress-circle-fill.humildad{stroke:#9b59b6;}

.progress-circle-text{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:1.4rem;
    font-weight:900;
}

.btn-sync,
.btn-logout{
    width:100%;
    border:none;
    border-radius:14px;
    padding:14px;
    font-weight:800;
    cursor:pointer;
}

.btn-sync{
    background:rgba(212,175,55,.15);
    border:1px solid var(--primary-gold);
    color:var(--primary-gold);
    margin-bottom:15px;
}

.btn-logout{
    background:rgba(231,76,60,.15);
    color:#e74c3c;
}

.spinner{
    width:40px;
    height:40px;
    border:3px solid rgba(255,255,255,.1);
    border-top-color:var(--primary-gold);
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:100px auto;
}

@keyframes spin{
    to{transform:rotate(360deg);}
}

.error-message{
    text-align:center;
    padding:50px;
    color:#e74c3c;
}

.debt-box{
    background:rgba(0,0,0,.4);
    border-radius:14px;
    padding:14px;
    margin-top:15px;
}

.debt-row{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
}

.total-box{
    margin-top:15px;
    background:rgba(231,76,60,.12);
    padding:15px;
    border-radius:14px;
    text-align:center;
}

@media(max-width:400px){

    .jersey-number{
        font-size:3.5rem;
    }

    .player-img{
        width:65px;
        height:65px;
    }

}

</style>
</head>

<body>

<div class="profile-container" id="perfilContent">
    <div class="spinner"></div>
</div>

<script src="config.js"></script>

<script>

function escapeHtml(str){

    if(!str) return '';

    return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');

}

function validateConfig(){

    if(typeof CONFIG === 'undefined'){
        throw new Error('No se pudo cargar config.js');
    }

    if(!CONFIG.URL_GAS){
        throw new Error('URL_GAS no definida');
    }

    if(!CONFIG.DEFAULT_AVATAR){
        CONFIG.DEFAULT_AVATAR='https://via.placeholder.com/80';
    }

}

function calcularEdad(fechaNacimiento){

    if(!fechaNacimiento) return '--';

    const fecha = new Date(fechaNacimiento);

    if(isNaN(fecha.getTime())) return '--';

    const hoy = new Date();

    let edad = hoy.getFullYear() - fecha.getFullYear();

    const mes = hoy.getMonth() - fecha.getMonth();

    if(mes < 0 || (mes === 0 && hoy.getDate() < fecha.getDate())){
        edad--;
    }

    return edad;

}

function renderProgressCircle(value,colorClass){

    const radius=40;
    const circumference=2*Math.PI*radius;
    const percent=value/10;
    const offset=circumference-(percent*circumference);

    return `
    <div class="progress-circle">

        <svg viewBox="0 0 100 100">

            <circle
                class="progress-circle-bg"
                cx="50"
                cy="50"
                r="40"
            />

            <circle
                class="progress-circle-fill ${colorClass}"
                cx="50"
                cy="50"
                r="40"
                stroke-dasharray="${circumference}"
                stroke-dashoffset="${offset}"
            />

        </svg>

        <div class="progress-circle-text">
            ${value}
        </div>

    </div>
    `;

}

async function cargarPerfil(cedula){

    const container=document.getElementById('perfilContent');

    try{

        validateConfig();

        const url=`${CONFIG.URL_GAS}?action=getPerfil&cedula=${encodeURIComponent(cedula)}&t=${Date.now()}`;

        const resp=await fetch(url);

        const data=await resp.json();

        if(data.success && data.jugador){

            const j=data.jugador;

            const jugador={

                primerNombre:escapeHtml(j.primerNombre || ''),
                segundoNombre:escapeHtml(j.segundoNombre || ''),
                urlFotoRostro:escapeHtml(j.urlFotoRostro || CONFIG.DEFAULT_AVATAR),

                fechaNacimiento:escapeHtml(j.fechaNacimiento || ''),

                nombreCamiseta:escapeHtml(j.nombreCamiseta || 'NÁPOLES'),

                dorsal:escapeHtml(j.dorsal || '00'),

                tallaUni:escapeHtml(j.tallaUni || 'M'),

                partidosJugados:Number(j.partidosJugados) || 0,

                goles:Number(j.goles) || 0,

                amarillas:Number(j.amarillas) || 0,

                rojas:Number(j.rojas) || 0,

                puntualidad:Number(j.puntualidad) || 0,

                companerismo:Number(j.companerismo) || 0,

                respeto:Number(j.respeto) || 0,

                humildad:Number(j.humildad) || 0,

                deudaVocalia:Number(j.deudaVocalia) || 0,

                multaEspecial:Number(j.multaEspecial) || 0,

                inscripEstado:escapeHtml(j.inscripEstado || 'PENDIENTE'),

                unifEstado:escapeHtml(j.unifEstado || 'PENDIENTE'),

                mediasEstado:escapeHtml(j.mediasEstado || 'PENDIENTE')

            };

            const edad=calcularEdad(jugador.fechaNacimiento);

            const deudaTarjetas=
                (jugador.amarillas * 1.5) +
                (jugador.rojas * 3) +
                jugador.multaEspecial;

            const totalGeneral=
                jugador.deudaVocalia + deudaTarjetas;

            container.innerHTML=`

            <div class="profile-header">
                <h1>⚜️ PANEL NÁPOLES ⚜️</h1>
            </div>

            <div class="cards-row">

                <div class="id-card-identity glass-card">

                    <img
                        src="${jugador.urlFotoRostro}"
                        class="player-img"
                        onerror="this.src='${CONFIG.DEFAULT_AVATAR}'"
                    >

                    <div style="
                        font-weight:900;
                        font-family:'Outfit';
                        text-transform:uppercase;
                        font-size:.9rem;
                    ">
                        ${jugador.primerNombre}
                        ${jugador.segundoNombre}
                    </div>

                    <div style="
                        font-size:.6rem;
                        color:var(--text-muted);
                        margin-top:4px;
                    ">
                        C.I. ${cedula}
                    </div>

                    <div style="
                        margin-top:10px;
                        background:rgba(212,175,55,.12);
                        padding:6px 12px;
                        border-radius:12px;
                        color:var(--primary-gold);
                        font-size:.75rem;
                        font-weight:700;
                    ">
                        🎂 ${edad} AÑOS
                    </div>

                </div>

                <div class="id-card-jersey-wrap">

                    <div class="jersey-card-inner">

                        <div class="face-jersey-front">

                            <div class="jersey-top-name">
                                ${jugador.nombreCamiseta}
                            </div>

                            <div class="jersey-number">
                                ${jugador.dorsal}
                            </div>

                        </div>

                        <div class="face-jersey-back">

                            <div class="jersey-top-name">
                                ${jugador.nombreCamiseta}
                            </div>

                            <div class="jersey-number">
                                ${jugador.dorsal}
                            </div>

                        </div>

                    </div>

                </div>

            </div>

            <button class="btn-sync" onclick="window.recargarPerfil()">
                <i class="fas fa-sync-alt"></i>
                ACTUALIZAR INFORMACIÓN
            </button>

            <div class="section-box">

                <div class="section-title">
                    Estadísticas
                </div>

                <div class="stats-grid">

                    ${jugador.partidosJugados > 0 ? `
                    <div class="stat-card">
                        <i class="fas fa-running"></i>
                        <div class="stat-value">${jugador.partidosJugados}</div>
                        <div class="stat-label">PARTIDOS</div>
                    </div>
                    ` : ''}

                    ${jugador.goles > 0 ? `
                    <div class="stat-card">
                        <i class="fas fa-futbol"></i>
                        <div class="stat-value">${jugador.goles}</div>
                        <div class="stat-label">GOLES</div>
                    </div>
                    ` : ''}

                    ${jugador.amarillas > 0 ? `
                    <div class="stat-card">
                        <i class="fas fa-square" style="color:#f39c12"></i>
                        <div class="stat-value">${jugador.amarillas}</div>
                        <div class="stat-label">AMARILLAS</div>
                    </div>
                    ` : ''}

                    ${jugador.rojas > 0 ? `
                    <div class="stat-card">
                        <i class="fas fa-square" style="color:#e74c3c"></i>
                        <div class="stat-value">${jugador.rojas}</div>
                        <div class="stat-label">ROJAS</div>
                    </div>
                    ` : ''}

                </div>

            </div>

            <div class="section-box">

                <div class="section-title">
                    Rendimiento Humano
                </div>

                <div class="performance-grid">

                    <div class="metric-card">
                        ${renderProgressCircle(jugador.puntualidad,'puntualidad')}
                        <div>Puntualidad</div>
                    </div>

                    <div class="metric-card">
                        ${renderProgressCircle(jugador.companerismo,'companerismo')}
                        <div>Compañerismo</div>
                    </div>

                    <div class="metric-card">
                        ${renderProgressCircle(jugador.respeto,'respeto')}
                        <div>Respeto</div>
                    </div>

                    <div class="metric-card">
                        ${renderProgressCircle(jugador.humildad,'humildad')}
                        <div>Humildad</div>
                    </div>

                </div>

            </div>

            <div class="section-box">

                <div class="section-title">
                    Estado Administrativo
                </div>

                <div class="stats-grid">

                    ${jugador.inscripEstado.toUpperCase().includes('PENDIENTE') ? `
                    <div class="stat-card">
                        <i class="fas fa-file-signature"></i>
                        <div class="stat-label">INSCRIPCIÓN</div>
                    </div>
                    ` : ''}

                    ${jugador.unifEstado.toUpperCase().includes('PENDIENTE') ? `
                    <div class="stat-card">
                        <i class="fas fa-tshirt"></i>
                        <div class="stat-label">UNIFORME</div>
                    </div>
                    ` : ''}

                    ${jugador.mediasEstado.toUpperCase().includes('PENDIENTE') ? `
                    <div class="stat-card">
                        <i class="fas fa-socks"></i>
                        <div class="stat-label">MEDIAS</div>
                    </div>
                    ` : ''}

                    ${jugador.deudaVocalia > 0 ? `
                    <div class="stat-card">
                        <i class="fas fa-dollar-sign"></i>
                        <div class="stat-value">
                            $${jugador.deudaVocalia.toFixed(2)}
                        </div>
                        <div class="stat-label">VOCALÍA</div>
                    </div>
                    ` : ''}

                </div>

                ${deudaTarjetas > 0 ? `

                <div class="debt-box">

                    <div style="
                        margin-bottom:12px;
                        color:#e74c3c;
                        font-weight:800;
                    ">
                        MULTAS Y TARJETAS
                    </div>

                    ${jugador.amarillas > 0 ? `
                    <div class="debt-row">
                        <span>Amarillas (${jugador.amarillas})</span>
                        <strong>$${(jugador.amarillas * 1.5).toFixed(2)}</strong>
                    </div>
                    ` : ''}

                    ${jugador.rojas > 0 ? `
                    <div class="debt-row">
                        <span>Rojas (${jugador.rojas})</span>
                        <strong>$${(jugador.rojas * 3).toFixed(2)}</strong>
                    </div>
                    ` : ''}

                    ${jugador.multaEspecial > 0 ? `
                    <div class="debt-row">
                        <span>Multa Especial</span>
                        <strong>$${jugador.multaEspecial.toFixed(2)}</strong>
                    </div>
                    ` : ''}

                </div>

                ` : ''}

                ${totalGeneral > 0 ? `
                <div class="total-box">

                    <div style="
                        font-size:.7rem;
                        color:#aaa;
                        margin-bottom:6px;
                    ">
                        TOTAL GENERAL PENDIENTE
                    </div>

                    <div style="
                        font-size:2rem;
                        font-weight:900;
                        color:#e74c3c;
                    ">
                        $${totalGeneral.toFixed(2)}
                    </div>

                </div>
                ` : ''}

            </div>

            <button class="btn-logout" onclick="window.cerrarSesion()">
                <i class="fas fa-sign-out-alt"></i>
                CERRAR SESIÓN
            </button>

            <div style="height:30px;"></div>

            `;

        }else{

            container.innerHTML=`
            <div class="error-message">
                Jugador no encontrado
            </div>
            `;

        }

    }catch(e){

        container.innerHTML=`
        <div class="error-message">
            ${escapeHtml(e.message)}
        </div>
        `;

    }

}

window.recargarPerfil=async function(){

    const sessionText=localStorage.getItem('jugador_actual');

    if(!sessionText){

        window.location.href='login.html';
        return;

    }

    const session=JSON.parse(sessionText);

    const cedula=
        session.cedula ||
        session.ci ||
        session.Cedula ||
        session.usuario ||
        session.user ||
        '';

    if(!cedula){

        window.location.href='login.html';
        return;

    }

    document.getElementById('perfilContent').innerHTML=
    '<div class="spinner"></div>';

    await cargarPerfil(cedula);

}

window.cerrarSesion=function(){

    localStorage.removeItem('jugador_actual');

    window.location.href='login.html';

}

(function(){

    try{

        validateConfig();

        const sessionText=localStorage.getItem('jugador_actual');

        console.log('SESSION:',sessionText);

        if(!sessionText){

            alert('No existe sesión');

            window.location.href='login.html';

            return;

        }

        const session=JSON.parse(sessionText);

        const cedula=
            session.cedula ||
            session.ci ||
            session.Cedula ||
            session.usuario ||
            session.user ||
            '';

        console.log('CEDULA:',cedula);

        if(!cedula){

            alert('No se encontró la cédula');

            window.location.href='login.html';

            return;

        }

        cargarPerfil(cedula);

    }catch(e){

        console.error(e);

        document.getElementById('perfilContent').innerHTML=
        '<div class="error-message">'+
        escapeHtml(e.message)+
        '</div>';

    }

})();

</script>

</body>
</html>
