<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Nápoles F.C. - Mi Perfil</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@600;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

:root{
    --primary-gold:#D4AF37;
    --primary-gold-light:#f5e6a3;
    --dark-bg:#060912;
    --card-bg:rgba(255,255,255,0.05);
    --text-main:#fff;
    --text-muted:#a0a0a0;
    --success:#2ecc71;
    --danger:#e74c3c;
    --warning:#f39c12;
    --info:#3498db;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    background:radial-gradient(circle at top,#111a33 0%,#060912 100%);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    padding:15px;
    color:var(--text-main);
    display:flex;
    justify-content:center;
}

.profile-container{
    width:100%;
    max-width:450px;
}

.profile-header{
    text-align:center;
    margin-bottom:20px;
}

.profile-header h1{
    font-family:'Outfit',sans-serif;
    font-size:1.3rem;
    color:var(--primary-gold);
    text-transform:uppercase;
    letter-spacing:2px;
}

.cards-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin-bottom:20px;
}

.glass-card{
    background:linear-gradient(145deg,rgba(10,20,40,.85),rgba(5,10,20,.95));
    border-radius:20px;
    border:1px solid rgba(212,175,55,.3);
    backdrop-filter:blur(10px);
    overflow:hidden;
    position:relative;
}

.id-card-identity{
    padding:15px;
    text-align:center;
}

.player-img{
    width:80px;
    height:80px;
    border-radius:50%;
    border:3px solid var(--primary-gold);
    object-fit:cover;
    margin-bottom:10px;
    background:#000;
}

.id-card-jersey-wrap{
    perspective:800px;
    height:180px;
}

.jersey-card-inner{
    position:relative;
    width:100%;
    height:100%;
    transform-style:preserve-3d;
    animation:rotateJersey 12s linear infinite;
}

@keyframes rotateJersey{
    from{transform:rotateY(0deg);}
    to{transform:rotateY(360deg);}
}

.face-jersey-front,
.face-jersey-back{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:20px;
    backface-visibility:hidden;
    background:linear-gradient(145deg,#0a1428,#000814);
    border:2px solid rgba(212,175,55,.4);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

.face-jersey-back{
    transform:rotateY(180deg);
}

.jersey-number{
    font-size:4.5rem;
    font-weight:900;
    color:var(--primary-gold);
    font-family:'Outfit';
    line-height:1;
}

.jersey-name{
    font-size:.7rem;
    font-weight:800;
    color:var(--primary-gold-light);
    text-transform:uppercase;
    letter-spacing:2px;
}

.stats-section,
.performance-section,
.section-box{
    background:var(--card-bg);
    border-radius:20px;
    padding:15px;
    margin-bottom:15px;
    border:1px solid rgba(255,255,255,.05);
    backdrop-filter:blur(5px);
}

.section-title{
    font-size:.8rem;
    font-weight:800;
    color:var(--primary-gold);
    margin-bottom:15px;
    text-transform:uppercase;
    display:flex;
    align-items:center;
    gap:8px;
}

.stats-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
}

.stat-card-modern{
    background:rgba(0,0,0,.35);
    border-radius:16px;
    padding:10px 5px;
    text-align:center;
}

.stat-icon{
    font-size:1.4rem;
    margin-bottom:8px;
}

.stat-value{
    font-size:1.5rem;
    font-weight:900;
    font-family:'Outfit';
}

.stat-label-modern{
    font-size:.55rem;
    color:var(--text-muted);
}

.performance-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
}

.metric-card{
    background:rgba(0,0,0,.35);
    border-radius:16px;
    padding:15px 10px;
    text-align:center;
}

.progress-circle{
    position:relative;
    width:85px;
    height:85px;
    margin:auto;
}

.progress-circle svg{
    width:100%;
    height:100%;
    transform:rotate(-90deg);
}

.progress-circle-bg{
    stroke:rgba(255,255,255,.1);
    stroke-width:8;
    fill:none;
}

.progress-circle-fill{
    stroke-width:8;
    fill:none;
    stroke-linecap:round;
}

.progress-circle-text{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:1.3rem;
    font-weight:900;
}

.metric-title{
    margin-top:10px;
    font-size:.7rem;
    font-weight:700;
}

.average-container{
    margin-top:15px;
    background:rgba(212,175,55,.08);
    border:1px solid rgba(212,175,55,.2);
    border-radius:16px;
    padding:15px;
    text-align:center;
}

.average-score{
    font-size:2.2rem;
    font-weight:900;
    color:var(--primary-gold);
    font-family:'Outfit';
}

.admin-stats-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
}

.admin-stat-card{
    background:rgba(0,0,0,.35);
    border-radius:16px;
    padding:12px;
    text-align:center;
}

.admin-stat-icon{
    font-size:1.7rem;
    margin-bottom:8px;
}

.admin-stat-value{
    font-size:1.2rem;
    font-weight:900;
}

.admin-stat-label{
    font-size:.65rem;
    color:var(--text-muted);
    margin-top:4px;
}

.admin-stat-status{
    margin-top:8px;
    padding:4px 8px;
    border-radius:20px;
    font-size:.65rem;
    display:inline-block;
}

.status-badge-pending{
    background:rgba(231,76,60,.15);
    color:var(--danger);
}

.status-badge-warning{
    background:rgba(243,156,18,.15);
    color:var(--warning);
}

.status-badge-info{
    background:rgba(52,152,219,.15);
    color:var(--info);
}

.debt-container{
    background:rgba(0,0,0,.4);
    border-radius:14px;
    padding:12px;
    margin-top:15px;
}

.debt-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.debt-label{
    font-size:.75rem;
    color:var(--text-muted);
}

.debt-amount{
    font-size:1.4rem;
    font-weight:900;
}

.progress-bar-bg{
    background:rgba(255,255,255,.08);
    border-radius:10px;
    height:8px;
    overflow:hidden;
    margin-top:10px;
}

.progress-bar-fill{
    height:100%;
    border-radius:10px;
    background:linear-gradient(90deg,#e74c3c,#f39c12);
}

.debt-message{
    margin-top:10px;
    font-size:.7rem;
    padding:8px;
    border-radius:10px;
    text-align:center;
}

.admin-details{
    display:flex;
    justify-content:space-between;
    margin-top:15px;
    padding-top:15px;
    border-top:1px solid rgba(255,255,255,.08);
}

.detail-item{
    text-align:center;
    flex:1;
}

.detail-label{
    font-size:.6rem;
    color:var(--text-muted);
}

.detail-value{
    font-size:.8rem;
    font-weight:700;
    color:var(--primary-gold);
}

.btn-sync,
.btn-logout{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    font-weight:800;
    cursor:pointer;
}

.btn-sync{
    margin-bottom:15px;
    background:rgba(212,175,55,.12);
    color:var(--primary-gold);
    border:1px solid rgba(212,175,55,.3);
}

.btn-logout{
    background:rgba(231,76,60,.12);
    color:#e74c3c;
}

.spinner{
    width:45px;
    height:45px;
    border:4px solid rgba(255,255,255,.08);
    border-top-color:var(--primary-gold);
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:120px auto;
}

@keyframes spin{
    to{transform:rotate(360deg);}
}

.error-message{
    text-align:center;
    padding:60px 20px;
    color:#e74c3c;
}

</style>
</head>

<body>

<div class="profile-container" id="perfilContent">
    <div class="spinner"></div>
</div>

<script src="config.js"></script>

<script>

function escapeHtml(str){
    if(!str) return '';
    return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function sanitizeUrl(url){
    if(!url) return CONFIG.DEFAULT_AVATAR;
    let clean = String(url).trim();
    if(clean.startsWith('javascript:')) return CONFIG.DEFAULT_AVATAR;
    return clean;
}

function calcularEdad(fechaNacimiento){

    if(!fechaNacimiento) return '--';

    let fecha = new Date(fechaNacimiento);

    if(isNaN(fecha.getTime())){

        let partes = fechaNacimiento.split(/[\/\-]/);

        if(partes.length === 3){

            fecha = new Date(
                parseInt(partes[2]),
                parseInt(partes[1]) - 1,
                parseInt(partes[0])
            );

        }
    }

    if(isNaN(fecha.getTime())) return '--';

    let hoy = new Date();

    let edad = hoy.getFullYear() - fecha.getFullYear();

    let mes = hoy.getMonth() - fecha.getMonth();

    if(mes < 0 || (mes === 0 && hoy.getDate() < fecha.getDate())){
        edad--;
    }

    return edad;
}

function renderProgressCircle(valor,color){

    let value = Math.min(10,Math.max(0,Number(valor)||0));

    let radius = 40;

    let circumference = 2 * Math.PI * radius;

    let percent = value / 10;

    let dash = circumference - (percent * circumference);

    return `
    <div class="progress-circle">
        <svg viewBox="0 0 100 100">
            <circle class="progress-circle-bg" cx="50" cy="50" r="40"></circle>

            <circle
                class="progress-circle-fill"
                cx="50"
                cy="50"
                r="40"
                stroke="${color}"
                stroke-dasharray="${circumference}"
                stroke-dashoffset="${dash}">
            </circle>
        </svg>

        <div class="progress-circle-text">${value}</div>
    </div>
    `;
}

async function cargarPerfil(cedula){

    const container = document.getElementById('perfilContent');

    try{

        const url = `${CONFIG.URL_GAS}?action=getPerfil&cedula=${encodeURIComponent(cedula)}&t=${Date.now()}`;

        const resp = await fetch(url);

        const data = await resp.json();

        if(data.success && data.jugador){

            const j = data.jugador;

            const sanitized = {

                primerNombre:escapeHtml(j.primerNombre || ''),
                segundoNombre:escapeHtml(j.segundoNombre || ''),
                urlFotoRostro:sanitizeUrl(j.urlFotoRostro),
                fechaNacimiento:j.fechaNacimiento || '',
                nombreCamiseta:escapeHtml(j.nombreCamiseta || 'NAPOLES'),
                dorsal:escapeHtml(j.dorsal || '00'),
                tallaUni:escapeHtml(j.tallaUni || 'M'),

                partidosJugados:Number(j.partidosJugados) || 0,
                goles:Number(j.goles) || 0,
                amarillas:Number(j.amarillas) || 0,
                rojas:Number(j.rojas) || 0,

                puntualidad:Number(j.puntualidad) || 0,
                companerismo:Number(j.companerismo) || 0,
                respeto:Number(j.respeto) || 0,
                humildad:Number(j.humildad) || 0,

                inscripEstado:escapeHtml(j.inscripEstado || 'PENDIENTE'),
                unifEstado:escapeHtml(j.unifEstado || 'PENDIENTE'),
                mediasEstado:escapeHtml(j.mediasEstado || 'PENDIENTE')

            };

            const edad = calcularEdad(sanitized.fechaNacimiento);

            const promedio = Math.round(
                (
                    sanitized.puntualidad +
                    sanitized.companerismo +
                    sanitized.respeto +
                    sanitized.humildad
                ) / 4
            );

            let deudaInscripcion = sanitized.inscripEstado.toUpperCase().includes('PENDIENTE') ? 5 : 0;

            let deudaUniforme = sanitized.unifEstado.toUpperCase().includes('PENDIENTE') ? 17 : 0;

            let deudaMedias = sanitized.mediasEstado.toUpperCase().includes('PENDIENTE') ? 2 : 0;

            let totalAdmin = deudaInscripcion + deudaUniforme + deudaMedias;

            container.innerHTML = `

            <div class="profile-header">
                <h1>⚜️ PANEL NÁPOLES ⚜️</h1>
            </div>

            <div class="cards-row">

                <div class="id-card-identity glass-card">

                    <img
                        src="${sanitized.urlFotoRostro}"
                        class="player-img"
                        onerror="this.src='${CONFIG.DEFAULT_AVATAR}'">

                    <div style="font-weight:900;font-family:'Outfit';font-size:.9rem;text-transform:uppercase;">
                        ${sanitized.primerNombre} ${sanitized.segundoNombre}
                    </div>

                    <div style="font-size:.65rem;color:var(--text-muted);margin-top:4px;">
                        <i class="fas fa-id-card"></i>
                        ${cedula}
                    </div>

                    <div style="margin-top:10px;background:rgba(212,175,55,.12);padding:6px 12px;border-radius:12px;font-size:.75rem;color:var(--primary-gold);">
                        <i class="fas fa-cake-candles"></i>
                        ${edad} años
                    </div>

                </div>

                <div class="id-card-jersey-wrap">

                    <div class="jersey-card-inner">

                        <div class="face-jersey-front">
                            <div class="jersey-name">${sanitized.nombreCamiseta}</div>
                            <div class="jersey-number">${sanitized.dorsal}</div>
                            <div style="font-size:.6rem;margin-top:5px;">
                                Talla ${sanitized.tallaUni}
                            </div>
                        </div>

                        <div class="face-jersey-back">
                            <div class="jersey-name">NÁPOLES FC</div>
                            <div class="jersey-number">${sanitized.dorsal}</div>
                            <div style="font-size:.6rem;margin-top:5px;">
                                Ecuador
                            </div>
                        </div>

                    </div>

                </div>

            </div>

            <button class="btn-sync" onclick="window.recargarPerfil()">
                <i class="fas fa-sync-alt"></i>
                ACTUALIZAR INFORMACIÓN
            </button>

            <div class="stats-section">

                <div class="stats-grid">

                    <div class="stat-card-modern">
                        <div class="stat-icon" style="color:#3498db">
                            <i class="fas fa-running"></i>
                        </div>

                        <div class="stat-value">${sanitized.partidosJugados}</div>

                        <div class="stat-label-modern">
                            PARTIDOS
                        </div>
                    </div>

                    <div class="stat-card-modern">
                        <div class="stat-icon" style="color:#2ecc71">
                            <i class="fas fa-futbol"></i>
                        </div>

                        <div class="stat-value">${sanitized.goles}</div>

                        <div class="stat-label-modern">
                            GOLES
                        </div>
                    </div>

                    <div class="stat-card-modern">
                        <div class="stat-icon" style="color:#f39c12">
                            <i class="fas fa-square"></i>
                        </div>

                        <div class="stat-value">${sanitized.amarillas}</div>

                        <div class="stat-label-modern">
                            AMARILLAS
                        </div>
                    </div>

                    <div class="stat-card-modern">
                        <div class="stat-icon" style="color:#e74c3c">
                            <i class="fas fa-square"></i>
                        </div>

                        <div class="stat-value">${sanitized.rojas}</div>

                        <div class="stat-label-modern">
                            ROJAS
                        </div>
                    </div>

                </div>

            </div>

            <div class="performance-section">

                <div class="section-title">
                    <i class="fas fa-heart"></i>
                    Rendimiento Humano
                </div>

                <div class="performance-grid">

                    <div class="metric-card">
                        ${renderProgressCircle(sanitized.puntualidad,'#3498db')}
                        <div class="metric-title">Puntualidad</div>
                    </div>

                    <div class="metric-card">
                        ${renderProgressCircle(sanitized.companerismo,'#2ecc71')}
                        <div class="metric-title">Compañerismo</div>
                    </div>

                    <div class="metric-card">
                        ${renderProgressCircle(sanitized.respeto,'#f39c12')}
                        <div class="metric-title">Respeto</div>
                    </div>

                    <div class="metric-card">
                        ${renderProgressCircle(sanitized.humildad,'#9b59b6')}
                        <div class="metric-title">Humildad</div>
                    </div>

                </div>

                <div class="average-container">

                    <div style="font-size:.7rem;color:var(--text-muted);">
                        PROMEDIO GENERAL
                    </div>

                    <div class="average-score">
                        ${promedio}/10
                    </div>

                </div>

            </div>

            <!-- ESTADO ADMINISTRATIVO -->

            <div class="section-box">

                <div class="section-title">
                    <i class="fas fa-chart-line"></i>
                    Estado Administrativo
                </div>

                <div class="admin-stats-grid">

                    ${deudaInscripcion > 0 ? `

                    <div class="admin-stat-card">

                        <div class="admin-stat-icon">
                            <i class="fas fa-file-signature" style="color:#e74c3c;"></i>
                        </div>

                        <div class="admin-stat-value" style="color:#e74c3c;">
                            $5
                        </div>

                        <div class="admin-stat-label">
                            INSCRIPCIÓN
                        </div>

                        <div class="admin-stat-status status-badge-pending">
                            PENDIENTE
                        </div>

                    </div>

                    ` : ''}

                    ${deudaUniforme > 0 ? `

                    <div class="admin-stat-card">

                        <div class="admin-stat-icon">
                            <i class="fas fa-tshirt" style="color:#f39c12;"></i>
                        </div>

                        <div class="admin-stat-value" style="color:#f39c12;">
                            $17
                        </div>

                        <div class="admin-stat-label">
                            UNIFORME
                        </div>

                        <div class="admin-stat-status status-badge-warning">
                            PENDIENTE
                        </div>

                    </div>

                    ` : ''}

                    ${deudaMedias > 0 ? `

                    <div class="admin-stat-card">

                        <div class="admin-stat-icon">
                            <i class="fas fa-socks" style="color:#3498db;"></i>
                        </div>

                        <div class="admin-stat-value" style="color:#3498db;">
                            $2
                        </div>

                        <div class="admin-stat-label">
                            MEDIAS
                        </div>

                        <div class="admin-stat-status status-badge-info">
                            PENDIENTE
                        </div>

                    </div>

                    ` : ''}

                </div>

                <div class="debt-container">

                    <div class="debt-header">

                        <span class="debt-label">
                            TOTAL PENDIENTE
                        </span>

                        <span class="debt-amount" style="color:${totalAdmin > 0 ? '#e74c3c' : '#2ecc71'}">
                            $${totalAdmin.toFixed(2)}
                        </span>

                    </div>

                    <div class="progress-bar-bg">

                        <div
                            class="progress-bar-fill"
                            style="width:${Math.min((totalAdmin/24)*100,100)}%">
                        </div>

                    </div>

                    <div
                        class="debt-message"
                        style="
                            background:${totalAdmin === 0
                                ? 'rgba(46,204,113,.1)'
                                : 'rgba(231,76,60,.1)'};
                        ">

                        ${
                            totalAdmin === 0
                            ? '✅ Jugador al día'
                            : '⚠️ Existen valores pendientes'
                        }

                    </div>

                </div>

                <div class="admin-details">

                    <div class="detail-item">
                        <div class="detail-label">TALLA</div>
                        <div class="detail-value">${sanitized.tallaUni}</div>
                    </div>

                    <div class="detail-item">
                        <div class="detail-label">DORSAL</div>
                        <div class="detail-value">${sanitized.dorsal}</div>
                    </div>

                    <div class="detail-item">
                        <div class="detail-label">ACTUALIZADO</div>
                        <div class="detail-value">
                            ${new Date().toLocaleDateString()}
                        </div>
                    </div>

                </div>

            </div>

            <button class="btn-logout" onclick="window.cerrarSesion()">
                <i class="fas fa-sign-out-alt"></i>
                CERRAR SESIÓN
            </button>

            <div style="height:30px;"></div>

            `;

        }else{

            container.innerHTML = `
            <div class="error-message">
                Jugador no encontrado
            </div>
            `;

        }

    }catch(e){

        console.error(e);

        container.innerHTML = `
        <div class="error-message">
            Error de conexión
        </div>
        `;

    }

}

window.recargarPerfil = async function(){

    const session = JSON.parse(localStorage.getItem('jugador_actual'));

    if(!session || !session.cedula){

        window.location.href='login.html';
        return;

    }

    document.getElementById('perfilContent').innerHTML =
    '<div class="spinner"></div>';

    cargarPerfil(session.cedula);

};

window.cerrarSesion = function(){

    if(confirm('¿Cerrar sesión?')){

        localStorage.removeItem('jugador_actual');

        window.location.href='login.html';

    }

};

(function(){

    const session = JSON.parse(localStorage.getItem('jugador_actual'));

    if(!session || !session.cedula){

        window.location.href='login.html';
        return;

    }

    cargarPerfil(session.cedula);

})();

</script>

</body>
</html>
