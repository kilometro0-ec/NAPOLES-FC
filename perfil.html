<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nápoles F.C. - Mi Perfil</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --dorado: #D4AF37;
            --dorado-brillante: #FFD700;
            --azul-oscuro: #0a1428;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(212, 175, 55, 0.3);
            --rojo-error: #ff5e5e;
            --verde-pagado: #2ecc71;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--azul-oscuro);
            background-image: radial-gradient(circle at top right, rgba(212, 175, 55, 0.1), transparent 400px);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            color: #fff;
        }

        .pes-container {
            max-width: 480px;
            width: 100%;
            background: rgba(10, 20, 40, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            border: 1px solid var(--glass-border);
            overflow-y: auto;
            max-height: 95vh;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .pes-header {
            padding: 1.5rem 1rem;
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
        }

        .pes-header h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #fff 0%, var(--dorado) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .player-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem;
        }

        .player-photo-wrapper { position: relative; margin-bottom: 1rem; }

        .player-photo {
            width: 130px; height: 130px;
            border-radius: 50%;
            border: 3px solid var(--dorado);
            padding: 4px;
            background: var(--azul-oscuro);
        }

        .player-photo img {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .ovr-badge {
            position: absolute; bottom: 0; right: 0;
            background: var(--dorado);
            color: #000;
            font-weight: 800;
            width: 42px; height: 42px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
            border: 3px solid var(--azul-oscuro);
            font-size: 1.1rem;
        }

        .player-name { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.3rem; }
        
        .player-dorsal-tag {
            background: var(--dorado);
            color: #000;
            padding: 2px 12px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.8rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
            padding: 1rem;
        }

        .stat-box {
            background: var(--glass-bg);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
        }

        .stat-label {
            display: block;
            font-size: 0.65rem;
            color: #aaa;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .stat-value {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--dorado-brillante);
        }

        .full-width { grid-column: span 2; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; }
        .full-width .stat-label { margin-bottom: 0; }
        .full-width .stat-value { font-size: 1rem; }

        .btn-cerrar {
            grid-column: span 2;
            background: transparent;
            border: 1px solid var(--rojo-error);
            color: var(--rojo-error);
            padding: 0.8rem;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }

        .btn-cerrar:hover { background: var(--rojo-error); color: #fff; }

        .loading { 
            padding: 3rem; 
            text-align: center; 
            color: var(--dorado);
        }
        
        .error-loading { color: var(--rojo-error); }
        
        .tarjeta-amarilla { color: #f1c40f; }
        .tarjeta-roja { color: #e74c3c; }
    </style>
</head>
<body>

<div class="pes-container">
    <div id="perfilContent">
        <div class="loading">⚽ CARGANDO PERFIL... ⚽</div>
    </div>
</div>

<script>
    const URL_GAS = "https://script.google.com/macros/s/AKfycbzDd_upVUwAl3ORyxhAbPbN1ZS-NwpYhtCUTyLInjHWsrIUt4OhyShgo_xIn8Pfxw/exec";

    // Verificar sesión activa
    const session = JSON.parse(localStorage.getItem('jugador_aprobado'));
    
    if (!session || !session.cedula || Date.now() > session.expira) {
        localStorage.removeItem('jugador_aprobado');
        window.location.href = 'login.html';
    } else {
        cargarPerfil(session.cedula);
    }

    async function cargarPerfil(cedula) {
        const container = document.getElementById('perfilContent');
        let reintentos = 0;
        const maxReintentos = 3;
        
        async function intentarCargar() {
            try {
                container.innerHTML = '<div class="loading">📡 SINCRONIZANDO CON EL SERVIDOR...</div>';
                
                const url = `${URL_GAS}?action=obtenerJugador&cedula=${encodeURIComponent(cedula)}&t=${Date.now()}`;
                const resp = await fetch(url);
                
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                
                const data = await resp.json();
                
                if (data.ok && data.jugador) {
                    const j = data.jugador;
                    
                    const goles = j.goles || 0;
                    const amarillas = j.amarillas || 0;
                    const rojas = j.rojas || 0;
                    const companerismo = j.companerismo || 0;
                    const respeto = j.respeto || 0;
                    const humildad = j.humildad || 0;
                    const puntualidad = j.puntualidad || 0;
                    const estadoPago = j.estadoPago || 'PENDIENTE';
                    const dorsal = j.dorsal || '--';
                    const nombreCamiseta = j.nombreCamiseta || j.nombre1 || 'JUGADOR';
                    
                    const promedio = (Number(companerismo) + Number(respeto) + Number(humildad) + Number(puntualidad)) / 4;
                    const ovrMostrar = Math.min(99, Math.max(40, Math.round(promedio * 10) || 60));
                    
                    let fotoUrl = j.urlRostro || '';
                    if (!fotoUrl || fotoUrl.trim() === '') {
                        const inicial = nombreCamiseta.charAt(0).toUpperCase();
                        fotoUrl = `https://ui-avatars.com/api/?background=D4AF37&color=0a1428&bold=true&size=130&name=${encodeURIComponent(inicial)}`;
                    }
                    
                    container.innerHTML = `
                        <div class="pes-header">
                            <h1>⚜️ MI PERFIL NÁPOLES ⚜️</h1>
                        </div>
                        <div class="player-card">
                            <div class="player-photo-wrapper">
                                <div class="player-photo">
                                    <img src="${fotoUrl}" alt="${nombreCamiseta}" onerror="this.src='https://ui-avatars.com/api/?background=0a1428&color=D4AF37&bold=true&size=130&name=${encodeURIComponent(nombreCamiseta.substring(0,2))}'">
                                </div>
                                <div class="ovr-badge">${ovrMostrar}</div>
                            </div>
                            <div class="player-name">${nombreCamiseta.toUpperCase()}</div>
                            <div class="player-dorsal-tag">👕 DORSAL ${dorsal}</div>
                        </div>
                        <div class="stats-grid">
                            <div class="stat-box full-width">
                                <span class="stat-label">📄 Cédula</span>
                                <span class="stat-value" style="color:#fff;">${cedula}</span>
                            </div>
                            <div class="stat-box">
                                <span class="stat-label">⚽ Goles</span>
                                <span class="stat-value">${goles}</span>
                            </div>
                            <div class="stat-box">
                                <span class="stat-label">🃏 Tarjetas</span>
                                <div style="display:flex; gap:8px; justify-content:center;">
                                    <span class="stat-value tarjeta-amarilla">🟨 ${amarillas}</span>
                                    <span class="stat-value tarjeta-roja">🟥 ${rojas}</span>
                                </div>
                            </div>
                            <div class="stat-box">
                                <span class="stat-label">🤝 Compañerismo</span>
                                <span class="stat-value">${companerismo}/10</span>
                            </div>
                            <div class="stat-box">
                                <span class="stat-label">🙏 Respeto</span>
                                <span class="stat-value">${respeto}/10</span>
                            </div>
                            <div class="stat-box">
                                <span class="stat-label">💙 Humildad</span>
                                <span class="stat-value">${humildad}/10</span>
                            </div>
                            <div class="stat-box">
                                <span class="stat-label">⏰ Puntualidad</span>
                                <span class="stat-value">${puntualidad}/10</span>
                            </div>
                            <div class="stat-box full-width">
                                <span class="stat-label">💰 Estado de Pago</span>
                                <span class="stat-value" style="color: ${estadoPago === 'PAGADO' ? '#2ecc71' : '#e74c3c'}">
                                    ${estadoPago === 'PAGADO' ? '✅ PAGADO' : '⚠️ PENDIENTE'}
                                </span>
                            </div>
                            <button id="cerrarSesion" class="btn-cerrar">🚪 CERRAR SESIÓN</button>
                        </div>
                    `;
                    
                    document.getElementById('cerrarSesion').onclick = () => {
                        localStorage.removeItem('jugador_aprobado');
                        window.location.href = 'login.html';
                    };
                } else {
                    container.innerHTML = `<div class="loading error-loading">❌ ${data.mensaje || 'Jugador no encontrado'}</div>`;
                    setTimeout(() => {
                        localStorage.removeItem('jugador_aprobado');
                        window.location.href = 'login.html';
                    }, 2000);
                }
            } catch (error) {
                console.error('Error:', error);
                reintentos++;
                if (reintentos < maxReintentos) {
                    container.innerHTML = `<div class="loading error-loading">⚠️ Error de conexión (Intento ${reintentos}/${maxReintentos})<br>Reconectando...</div>`;
                    setTimeout(intentarCargar, 2000);
                } else {
                    container.innerHTML = `<div class="loading error-loading">❌ No se pudo conectar al servidor.<br>Verifica tu internet y recarga la página.</div>`;
                }
            }
        }
        
        intentarCargar();
    }
</script>
</body>
</html>
