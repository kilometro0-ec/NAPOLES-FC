<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nápoles F.C. - Mi Perfil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-gold: #D4AF37;
            --light-gold: #FFD700;
            --dark-bg: #060912;
            --card-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(212, 175, 55, 0.2);
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: radial-gradient(circle at top, #111a33 0%, #060912 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 20px 16px;
            color: var(--text-main);
            display: flex;
            justify-content: center;
        }

        .profile-container { width: 100%; max-width: 400px; }

        .profile-header { text-align: center; margin-bottom: 20px; }
        .profile-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.6rem;
            background: linear-gradient(135deg, var(--light-gold), var(--primary-gold));
            -webkit-background-clip: text; background-clip: text; color: transparent;
        }

        /* --- ID CARD GIRATORIA (THE JERSEY CARD) --- */
        .id-card-wrapper {
            perspective: 1000px;
            width: 100%;
            height: 300px;
            margin-bottom: 25px;
        }

        .id-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .id-card-wrapper.is-flipped .id-card-inner {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 24px;
            border: 2px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* LADO A: ESTILO CAMISETA */
        .face-front {
            background: linear-gradient(145deg, #0a1428 0%, #060912 100%);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .jersey-icon {
            font-size: 5rem;
            color: var(--primary-gold);
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.4));
            margin-bottom: 10px;
        }

        .jersey-name {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 900;
            text-transform: uppercase;
            color: #fff;
            letter-spacing: 1px;
        }

        .jersey-number {
            font-family: 'Outfit', sans-serif;
            font-size: 4.5rem;
            font-weight: 900;
            color: var(--primary-gold);
            line-height: 1;
        }

        /* LADO B: FOTO Y CI */
        .face-back {
            background: linear-gradient(145deg, rgba(212, 175, 55, 0.1), #060912);
            transform: rotateY(180deg);
            padding: 20px;
        }

        .photo-container {
            position: relative;
            margin-bottom: 15px;
        }

        .player-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--primary-gold);
            object-fit: cover;
            padding: 4px;
            background: #000;
        }

        .ovr-badge {
            position: absolute;
            bottom: 0;
            right: -5px;
            background: var(--primary-gold);
            color: #000;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
            border: 3px solid #060912;
            font-family: 'Outfit', sans-serif;
        }

        .ci-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        /* ÚNICO BOTÓN ACTUALIZAR DENTRO DE LA CARD */
        .btn-sync {
            background: var(--primary-gold);
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-sync:active { transform: scale(0.9); }

        /* --- SECCIONES DE INFO --- */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .stat-card {
            background: var(--card-bg); border-radius: 18px; padding: 12px;
            text-align: center; border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-val { font-size: 1.2rem; font-weight: 800; color: #fff; font-family: 'Outfit'; }
        .stat-lab { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; }

        .section-box {
            background: var(--card-bg); border-radius: 20px; padding: 15px;
            margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05);
        }
        .box-title { font-size: 0.8rem; font-weight: 700; color: var(--primary-gold); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }

        .info-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.85rem; }
        .info-row span:first-child { color: var(--text-muted); }
        .info-row span:last-child { font-weight: 700; color: var(--primary-gold); }

        .btn-logout {
            width: 100%; padding: 14px; border-radius: 15px; border: none;
            background: rgba(231, 76, 60, 0.2); color: #e74c3c;
            font-weight: 700; cursor: pointer; margin-top: 10px;
        }

        .spinner { width: 40px; height: 40px; border: 3px solid rgba(212, 175, 55, 0.1); border-top-color: var(--primary-gold); border-radius: 50%; animation: spin 1s infinite linear; margin: 100px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="profile-container" id="perfilContent">
    <div class="spinner"></div>
</div>

<script src="config.js"></script>
<script>
    const session = JSON.parse(localStorage.getItem('jugador_actual'));
    
    if (!session || !session.cedula || Date.now() > session.expira) {
        localStorage.removeItem('jugador_actual');
        window.location.href = 'login.html';
    } else {
        cargarPerfil(session.cedula);
    }

    async function cargarPerfil(cedula) {
        const container = document.getElementById('perfilContent');
        const ciLimpia = String(cedula).replace(/[^0-9]/g, '');
        
        try {
            const url = `${CONFIG.URL_GAS}?action=getPerfil&cedula=${encodeURIComponent(ciLimpia)}&t=${Date.now()}`;
            const resp = await fetch(url);
            const data = await resp.json();
            
            if (data.success && data.jugador) {
                const j = data.jugador;
                
                // Cálculo de Media (OVR)
                const comp = Number(j.companerismo) || 8;
                const respV = Number(j.respeto) || 8;
                const hum = Number(j.humildad) || 8;
                const punt = Number(j.puntualidad) || 8;
                const ovr = Math.round(((comp + respV + hum + punt) / 4) * 10);
                
                const nombreCard = j.nombreCamiseta || j.primerNombre || 'JUGADOR';

                container.innerHTML = `
                    <div class="profile-header">
                        <h1>⚜️ ${CONFIG.APP_NAME} ⚜️</h1>
                    </div>

                    <!-- ID CARD GIRATORIA -->
                    <div class="id-card-wrapper" id="idCard">
                        <div class="id-card-inner">
                            
                            <!-- LADO A: LA CAMISETA -->
                            <div class="card-face face-front">
                                <i class="fas fa-tshirt jersey-icon"></i>
                                <div class="jersey-name">${escapeHtml(nombreCard)}</div>
                                <div class="jersey-number">${j.dorsal || '00'}</div>
                                <div style="margin-top:15px; font-size:0.6rem; opacity:0.5; letter-spacing:1px;">GIRAR TARJETA</div>
                            </div>

                            <!-- LADO B: FOTO Y BOTÓN ACTUALIZAR -->
                            <div class="card-face face-back">
                                <div class="photo-container">
                                    <img src="${j.urlFotoRostro || CONFIG.DEFAULT_AVATAR}" class="player-img" onerror="this.src='${CONFIG.DEFAULT_AVATAR}'">
                                    <div class="ovr-badge">${ovr}</div>
                                </div>
                                <div style="font-weight:800; font-size:1.1rem; color:var(--primary-gold);">${escapeHtml(j.primerNombre)} ${escapeHtml(j.apellidos)}</div>
                                <div class="ci-text"><i class="fas fa-id-card"></i> CI: ${ciLimpia}</div>
                                
                                <button class="btn-sync" onclick="event.stopPropagation(); refrescarPerfil()">
                                    <i class="fas fa-sync-alt"></i> ACTUALIZAR DATOS
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- STATS FÚTBOL -->
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-val">${j.goles || 0}</div>
                            <div class="stat-lab">Goles</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-val" style="color:#f1c40f;">${j.amarillas || 0}</div>
                            <div class="stat-lab">Amarillas</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-val" style="color:#e74c3c;">${j.rojas || 0}</div>
                            <div class="stat-lab">Rojas</div>
                        </div>
                    </div>

                    <!-- VALORES HUMANOS -->
                    <div class="section-box">
                        <div class="box-title"><i class="fas fa-star"></i> VALORES HUMANOS</div>
                        <div class="info-row"><span>Compañerismo</span><span>${comp}/10</span></div>
                        <div class="info-row"><span>Respeto</span><span>${respV}/10</span></div>
                        <div class="info-row"><span>Humildad</span><span>${hum}/10</span></div>
                        <div class="info-row"><span>Puntualidad</span><span>${punt}/10</span></div>
                    </div>

                    <!-- FINANZAS / VOCALÍA -->
                    <div class="section-box">
                        <div class="box-title"><i class="fas fa-wallet"></i> VOCALÍA Y PAGOS</div>
                        <div class="info-row"><span>Deuda Total</span><span style="color:${Number(j.deudaVocalia) > 0 ? '#e74c3c' : '#2ecc71'}">$${j.deudaVocalia || 0}</span></div>
                        <div class="info-row"><span>Inscripción</span><span>${j.inscripEstado || 'PENDIENTE'}</span></div>
                        <div class="info-row"><span>Uniforme</span><span>${j.unifEstado || 'PENDIENTE'}</span></div>
                    </div>

                    <button class="btn-logout" onclick="cerrarSesion()">CERRAR SESIÓN</button>
                `;

                // Agregar evento de giro
                document.getElementById('idCard').addEventListener('click', function() {
                    this.classList.toggle('is-flipped');
                });

            } else {
                container.innerHTML = `<div style="text-align:center; padding:50px;">❌ Jugador no encontrado</div>`;
            }
        } catch (e) {
            container.innerHTML = `<div style="text-align:center; padding:50px;">❌ Error de conexión</div>`;
        }
    }

    function refrescarPerfil() { 
        document.getElementById('perfilContent').innerHTML = '<div class="spinner"></div>';
        cargarPerfil(session.cedula); 
    }
    
    function cerrarSesion() { localStorage.removeItem('jugador_actual'); window.location.href = 'login.html'; }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
</script>

</body>
</html>
