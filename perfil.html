<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nápoles F.C. - Mi Perfil | Multas y Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-gold: #D4AF37;
            --primary-gold-light: #f5e6a3;
            --primary-gold-glow: rgba(212, 175, 55, 0.6);
            --dark-bg: #060912;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --success: #2ecc71;
            --success-dark: #27ae60;
            --danger: #e74c3c;
            --danger-dark: #c0392b;
            --warning: #f39c12;
            --info: #3498db;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: radial-gradient(circle at top, #111a33 0%, #060912 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 15px;
            color: var(--text-main);
            display: flex;
            justify-content: center;
        }

        .profile-container { width: 100%; max-width: 450px; }

        .profile-header { text-align: center; margin-bottom: 20px; }
        .profile-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.4rem;
            color: var(--primary-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        /* --- FILA DE TARJETAS (IDENTIDAD Y CAMISETA) --- */
        .cards-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .glass-card {
            background: linear-gradient(145deg, rgba(10, 20, 40, 0.85), rgba(5, 10, 20, 0.95));
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.15), rgba(212, 175, 55, 0.3), rgba(212, 175, 55, 0.15), transparent);
            animation: shimmer 3s infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            20% { left: 100%; }
            100% { left: 100%; }
        }

        .id-card-identity {
            padding: 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
        }

        .player-img {
            width: 80px; height: 80px;
            border-radius: 50%;
            border: 3px solid var(--primary-gold);
            object-fit: cover;
            margin-bottom: 10px;
            background: #000;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            transition: transform 0.3s ease;
        }

        /* --- TARJETA DE CAMISETA 3D --- */
        .id-card-jersey-wrap { perspective: 800px; height: 180px; position: relative; z-index: 2; }
        .jersey-card-inner {
            position: relative; width: 100%; height: 100%;
            transform-style: preserve-3d;
            border-radius: 20px;
            animation: rotateJerseySmooth 12s infinite linear;
        }
        @keyframes rotateJerseySmooth { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }
        .id-card-jersey-wrap:hover .jersey-card-inner { animation-play-state: paused; }
        .face-jersey-front, .face-jersey-back {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(145deg, #0a1428, #000814);
            border-radius: 20px; border: 2px solid rgba(212, 175, 55, 0.5);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            backface-visibility: hidden;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
        }
        .face-jersey-front { transform: rotateY(0deg); }
        .face-jersey-back { transform: rotateY(180deg); background: linear-gradient(145deg, #1a0f2a, #0a0418); }
        .jersey-number { font-size: 4.5rem; font-weight: 900; color: var(--primary-gold); font-family: 'Outfit'; line-height: 1; text-shadow: 0 0 20px rgba(212, 175, 55, 0.5); }
        .jersey-name { font-size: 0.7rem; font-weight: 800; opacity: 0.9; letter-spacing: 2px; color: var(--primary-gold-light); text-transform: uppercase; }

        /* --- ESTADÍSTICAS (solo si hay datos) --- */
        .stats-section {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 5px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(5px);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        .stat-card-modern {
            background: linear-gradient(135deg, rgba(0,0,0,0.3), rgba(0,0,0,0.5));
            border-radius: 18px;
            padding: 12px 8px;
            text-align: center;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-value { font-size: 1.8rem; font-weight: 900; font-family: 'Outfit'; line-height: 1; margin-bottom: 5px; }
        .stat-label-modern { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        .stat-sub { font-size: 0.55rem; color: rgba(255,255,255,0.4); margin-top: 5px; }
        .stat-card-modern.jugados .stat-value { color: #3498db; }
        .stat-card-modern.goles .stat-value { color: #2ecc71; }
        .stat-card-modern.amarillas .stat-value { color: #f39c12; }
        .stat-card-modern.rojas .stat-value { color: #e74c3c; }

        /* SECCIONES COMUNES */
        .section-box, .performance-section, .multas-section {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }
        .section-title {
            font-size: 0.8rem; font-weight: 800; color: var(--primary-gold);
            margin-bottom: 15px; text-transform: uppercase; display: flex;
            align-items: center; gap: 8px;
        }
        .admin-stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
            margin-bottom: 15px;
        }
        .admin-stat-card {
            background: linear-gradient(135deg, rgba(0,0,0,0.4), rgba(0,0,0,0.2));
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.3s ease;
        }
        .admin-stat-icon { font-size: 1.8rem; margin-bottom: 8px; }
        .admin-stat-value { font-size: 1.3rem; font-weight: 800; margin-bottom: 5px; }
        .admin-stat-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .admin-stat-status {
            font-size: 0.7rem; margin-top: 6px; padding: 3px 8px; border-radius: 20px; display: inline-block; font-weight: 700;
        }
        .status-badge-paid { background: rgba(46, 204, 113, 0.2); color: var(--success); border: 1px solid rgba(46, 204, 113, 0.3); }
        .status-badge-pending { background: rgba(231, 76, 60, 0.2); color: var(--danger); border: 1px solid rgba(231, 76, 60, 0.3); }
        .status-badge-warning { background: rgba(243, 156, 18, 0.2); color: var(--warning); border: 1px solid rgba(243, 156, 18, 0.3); }

        .debt-container {
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            padding: 12px;
            margin-top: 15px;
        }
        .debt-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .debt-amount.danger { color: var(--danger); }
        .debt-amount.success { color: var(--success); }
        .progress-bar-bg { background: rgba(255,255,255,0.1); border-radius: 10px; height: 8px; overflow: hidden; margin: 10px 0; }
        .progress-bar-fill { height: 100%; border-radius: 10px; transition: width 0.5s ease; }
        .progress-bar-fill.low-debt { background: linear-gradient(90deg, var(--success), var(--warning)); }
        .progress-bar-fill.medium-debt { background: linear-gradient(90deg, var(--warning), var(--danger)); }
        .progress-bar-fill.high-debt { background: linear-gradient(90deg, var(--danger), #8b0000); }

        /* MULTAS TARJETAS */
        .multas-card {
            background: rgba(0,0,0,0.4);
            border-radius: 16px;
            padding: 12px;
            margin-top: 8px;
            border-left: 4px solid var(--warning);
        }
        .multa-item {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 0.85rem;
        }
        .multa-total {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--primary-gold);
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: 8px;
            padding-top: 8px;
            text-align: right;
        }
        .btn-sync, .btn-logout {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-sync {
            background: linear-gradient(135deg, transparent, rgba(212, 175, 55, 0.1));
            border: 1px solid var(--primary-gold);
            color: var(--primary-gold);
            margin-bottom: 15px;
        }
        .btn-logout {
            background: rgba(231, 76, 60, 0.1);
            border: none;
            color: #e74c3c;
            margin-top: 10px;
        }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(212, 175, 55, 0.1); border-top-color: var(--primary-gold); border-radius: 50%; animation: spin 1s infinite linear; margin: 100px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-message { text-align: center; padding: 50px; color: var(--danger); }
        .hidden { display: none; }
        @media (max-width: 400px) {
            .jersey-number { font-size: 3.5rem; }
            .id-card-jersey-wrap { height: 160px; }
            .stat-value { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
<div class="profile-container" id="perfilContent"><div class="spinner"></div></div>
<script src="config.js"></script>
<script>
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function validateConfig() {
        if (typeof CONFIG === 'undefined') throw new Error('No se pudo cargar config.js');
        if (!CONFIG.URL_GAS) throw new Error('URL_GAS no definida');
        if (!CONFIG.DEFAULT_AVATAR) CONFIG.DEFAULT_AVATAR = 'https://via.placeholder.com/80/111a33/D4AF37?text=PLAYER';
    }
    function getStatusBadgeClass(val) {
        if (!val) return 'status-badge-pending';
        const v = String(val).toUpperCase();
        if (v.includes('PENDIENTE') || v === 'NO') return 'status-badge-pending';
        if (v.includes('PAGADO') || v.includes('ENTREGADO') || v === 'SI') return 'status-badge-paid';
        return 'status-badge-warning';
    }
    function getDebtProgress(debtAmount) {
        let percentage = Math.min((debtAmount / 7) * 100, 100);
        let fillClass = 'low-debt';
        if (debtAmount > 5) fillClass = 'high-debt';
        else if (debtAmount > 3) fillClass = 'medium-debt';
        return { percentage, fillClass };
    }
    function getDebtMessage(debtAmount) {
        if (debtAmount === 0) return { text: '✅ ¡AL DÍA! Sin deudas con vocalía', type: 'success' };
        if (debtAmount < 3) return { text: '⚠️ Deuda baja. Regulariza pronto', type: 'warning' };
        if (debtAmount < 5) return { text: '⚠️⚠️ Deuda moderada. Comunícate con vocalía', type: 'warning' };
        return { text: '🔴 ¡ATENCIÓN! Deuda cercana al límite máximo ($7)', type: 'danger' };
    }

    // Cálculo de multas: amarilla = 1.5 USD, roja = 3 USD
    function calcularMultasTarjetas(amarillas, rojas, multaExtra = 0) {
        const montoAmarillas = (amarillas || 0) * 1.5;
        const montoRojas = (rojas || 0) * 3;
        const total = montoAmarillas + montoRojas + (multaExtra || 0);
        return { amarillasMonto: montoAmarillas, rojasMonto: montoRojas, total, multaExtra };
    }

    async function cargarPerfil(cedula) {
        const container = document.getElementById('perfilContent');
        try {
            validateConfig();
            const url = `${CONFIG.URL_GAS}?action=getPerfil&cedula=${encodeURIComponent(cedula)}&t=${Date.now()}`;
            const resp = await fetch(url);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const data = await resp.json();
            if (data.success && data.jugador) {
                const j = data.jugador;
                const partidos = Number(j.partidosJugados) || 0;
                const goles = Number(j.goles) || 0;
                const amarillas = Number(j.amarillas) || 0;
                const rojas = Number(j.rojas) || 0;
                
                // ---- Lógica de visualización condicional de estadísticas: solo si hay datos >0 O al menos 1 partido jugado ----
                const hasStatsData = (partidos > 0) || (goles > 0) || (amarillas > 0) || (rojas > 0);
                
                // Estado administrativo: solo elementos PENDIENTES o en estado no completado
                const inscripPendiente = (j.inscripEstado || 'PENDIENTE').toUpperCase() !== 'PAGADO';
                const unifPendiente = (j.unifEstado || 'PENDIENTE').toUpperCase() !== 'ENTREGADO';
                const mediasPendiente = (j.mediasEstado && j.mediasEstado !== 'null' && j.mediasEstado !== 'undefined' && j.mediasEstado.toUpperCase() !== 'ENTREGADO');
                const tieneDeuda = (Number(j.deudaVocalia) || 0) > 0;
                const multaExtraEspecial = (j.multaEspecial ? Number(j.multaEspecial) : 0);
                const multas = calcularMultasTarjetas(amarillas, rojas, multaExtraEspecial);
                const tieneMultas = (multas.total > 0);
                
                // Datos base sanitizados
                const sanitized = {
                    primerNombre: escapeHtml(j.primerNombre || ''),
                    segundoNombre: escapeHtml(j.segundoNombre || ''),
                    urlFotoRostro: escapeHtml(j.urlFotoRostro || CONFIG.DEFAULT_AVATAR),
                    nombreCamiseta: escapeHtml(j.nombreCamiseta || 'NÁPOLES'),
                    dorsal: escapeHtml(j.dorsal || '00'),
                    tallaUni: escapeHtml(j.tallaUni || 'M'),
                    partidosJugados: partidos,
                    goles: goles,
                    amarillas: amarillas,
                    rojas: rojas,
                    deudaVocalia: Number(j.deudaVocalia) || 0,
                    inscripEstado: escapeHtml(j.inscripEstado || 'PENDIENTE'),
                    unifEstado: escapeHtml(j.unifEstado || 'PENDIENTE'),
                    mediasEstado: (j.mediasEstado === 'null' || !j.mediasEstado) ? 'N/A' : escapeHtml(j.mediasEstado)
                };
                
                const debtProgress = getDebtProgress(sanitized.deudaVocalia);
                const debtMessage = getDebtMessage(sanitized.deudaVocalia);
                
                // Construcción de sección estadística condicional
                let statsHtml = '';
                if (hasStatsData) {
                    statsHtml = `
                        <div class="stats-section">
                            <div class="stats-grid">
                                ${partidos > 0 ? `<div class="stat-card-modern jugados"><div class="stat-value">${partidos}</div><div class="stat-label-modern">PARTIDOS</div><div class="stat-sub">Jugados</div></div>` : ''}
                                ${goles > 0 ? `<div class="stat-card-modern goles"><div class="stat-value">${goles}</div><div class="stat-label-modern">GOLES</div><div class="stat-sub">Anotados</div></div>` : ''}
                                ${amarillas > 0 ? `<div class="stat-card-modern amarillas"><div class="stat-value">${amarillas}</div><div class="stat-label-modern">AMARILLAS</div><div class="stat-sub">Tarjetas</div></div>` : ''}
                                ${rojas > 0 ? `<div class="stat-card-modern rojas"><div class="stat-value">${rojas}</div><div class="stat-label-modern">ROJAS</div><div class="stat-sub">Tarjetas</div></div>` : ''}
                            </div>
                        </div>
                    `;
                } else {
                    statsHtml = `<div class="section-box" style="text-align:center; color:var(--text-muted);"><i class="fas fa-chart-simple"></i> Sin estadísticas registradas aún</div>`;
                }
                
                // SECCIÓN ADMINISTRATIVA: solo mostrar lo que está pendiente o deuda >0 (si todo está al dia, mostrar mensaje)
                let adminItemsHtml = '';
                let hasPendingAdmin = false;
                if (inscripPendiente) { hasPendingAdmin = true;
                    adminItemsHtml += `<div class="admin-stat-card"><div class="admin-stat-icon"><i class="fas fa-file-signature"></i></div><div class="admin-stat-value">${sanitized.inscripEstado}</div><div class="admin-stat-label">Inscripción</div><div class="admin-stat-status status-badge-pending"><i class="fas fa-clock"></i> Pendiente</div></div>`;
                }
                if (unifPendiente) { hasPendingAdmin = true;
                    adminItemsHtml += `<div class="admin-stat-card"><div class="admin-stat-icon"><i class="fas fa-tshirt"></i></div><div class="admin-stat-value">${sanitized.unifEstado}</div><div class="admin-stat-label">Uniforme</div><div class="admin-stat-status status-badge-pending"><i class="fas fa-hourglass-half"></i> Pendiente</div></div>`;
                }
                if (mediasPendiente && sanitized.mediasEstado !== 'N/A') { hasPendingAdmin = true;
                    adminItemsHtml += `<div class="admin-stat-card"><div class="admin-stat-icon"><i class="fas fa-socks"></i></div><div class="admin-stat-value">${sanitized.mediasEstado}</div><div class="admin-stat-label">Medias</div><div class="admin-stat-status status-badge-pending"><i class="fas fa-clock"></i> Por entregar</div></div>`;
                }
                // Deuda Vocalía si es >0 tambien se muestra de forma destacada luego en sección específica, pero como elemento administrativo pendiente lo mostramos aparte (se incluye en deuda container)
                // Pero el contenedor de deuda se mostrará siempre con deuda o no. La consigna: solo aparece lo pendiente --> pero deuda es aparte en el bloque de deuda.
                // Para el bloque "Estado Administrativo" completo solo mostramos si hay al menos un item pendiente, si no, mostramos mensaje "Todo al día"
                const adminBlockHtml = (hasPendingAdmin) ? `
                    <div class="section-box">
                        <div class="section-title"><i class="fas fa-clipboard-list"></i> Gestión Pendiente</div>
                        <div class="admin-stats-grid">${adminItemsHtml}</div>
                    </div>
                ` : (tieneDeuda ? `` : `<div class="section-box"><div class="section-title"><i class="fas fa-check-circle"></i> Estado Administrativo</div><div style="text-align:center; padding:10px; color:var(--success);"><i class="fas fa-thumbs-up"></i> ¡Todo en regla! Sin pendientes</div></div>`);
                
                // Bloque de deuda vocalía (si existe deuda o incluso si no, se muestra para mantener info)
                let vocaliaHtml = '';
                if (tieneDeuda) {
                    vocaliaHtml = `<div class="debt-container">
                            <div class="debt-header"><span class="debt-label"><i class="fas fa-dollar-sign"></i> DEUDA CON VOCALÍA</span>
                            <span class="debt-amount danger">$${sanitized.deudaVocalia.toFixed(2)}</span></div>
                            <div class="progress-bar-bg"><div class="progress-bar-fill ${debtProgress.fillClass}" style="width: ${debtProgress.percentage}%"></div></div>
                            <div class="debt-message" style="background:rgba(231,76,60,0.1);"><i class="fas fa-exclamation-triangle"></i> ${debtMessage.text}</div>
                        </div>`;
                } else {
                    vocaliaHtml = `<div class="debt-container" style="background:rgba(46,204,113,0.1); border-left:3px solid var(--success);">
                            <div class="debt-header"><span class="debt-label"><i class="fas fa-check-circle"></i> VOCALÍA</span>
                            <span class="debt-amount success">$${sanitized.deudaVocalia.toFixed(2)}</span></div>
                            <div class="debt-message"><i class="fas fa-smile-wink"></i> Sin deudas activas. ¡En orden!</div>
                        </div>`;
                }
                
                // ---- NUEVA SECCIÓN MULTAS POR TARJETAS (si tiene amarillas/rojas o multa especial) ----
                let multasHtml = '';
                if (tieneMultas || amarillas > 0 || rojas > 0 || multaExtraEspecial > 0) {
                    multasHtml = `
                        <div class="section-box multas-section">
                            <div class="section-title"><i class="fas fa-gavel"></i> Sanciones & Multas</div>
                            <div class="multas-card">
                                ${amarillas > 0 ? `<div class="multa-item"><span><i class="fas fa-square" style="color:#f39c12;"></i> Tarjetas Amarillas (x${amarillas})</span><span>$${(amarillas * 1.5).toFixed(2)}</span></div>` : ''}
                                ${rojas > 0 ? `<div class="multa-item"><span><i class="fas fa-square" style="color:#e74c3c;"></i> Tarjetas Rojas (x${rojas})</span><span>$${(rojas * 3).toFixed(2)}</span></div>` : ''}
                                ${multaExtraEspecial > 0 ? `<div class="multa-item"><span><i class="fas fa-exclamation-triangle" style="color:#f39c12;"></i> Multa Especial</span><span>$${multaExtraEspecial.toFixed(2)}</span></div>` : ''}
                                <div class="multa-total"><i class="fas fa-coins"></i> TOTAL MULTAS: $${multas.total.toFixed(2)}</div>
                                <div style="font-size:0.65rem; color:var(--text-muted); margin-top:8px;">⚠️ Amarilla: $1.50 | Roja: $3.00. Pagar en tesorería.</div>
                            </div>
                        </div>
                    `;
                } else {
                    multasHtml = `<div class="section-box multas-section" style="background:rgba(46,204,113,0.05);">
                        <div class="section-title"><i class="fas fa-hand-peace"></i> Sin Multas</div>
                        <div style="text-align:center; padding:8px; color:var(--success);"><i class="fas fa-check-circle"></i> Conducta disciplinaria limpia. Sin sanciones económicas.</div>
                    </div>`;
                }
                
                // (Rendimiento humano se mantiene pero con valores por defecto si no existen)
                const puntualidad = Number(j.puntualidad) || 0;
                const companerismo = Number(j.companerismo) || 0;
                const respeto = Number(j.respeto) || 0;
                const humildad = Number(j.humildad) || 0;
                const performanceAverage = Math.round((puntualidad + companerismo + respeto + humildad) / 4);
                const starCount = Math.floor(performanceAverage / 2);
                const starHtml = Array(5).fill(0).map((_, i) => `<i class="fas fa-star" style="color: var(--warning); opacity: ${i < starCount ? 1 : 0.3};"></i>`).join('');
                let perfMessage = '';
                if (performanceAverage >= 9) perfMessage = '🏆 Excelente, eres un ejemplo.';
                else if (performanceAverage >= 7) perfMessage = '👍 Muy bien, sigue así.';
                else if (performanceAverage >= 5) perfMessage = '⚠️ Puedes mejorar en equipo.';
                else perfMessage = '🔴 Necesitas mejorar actitud y compromiso.';
                
                const performanceHtml = `
                    <div class="performance-section">
                        <div class="section-title"><i class="fas fa-heartbeat"></i> Rendimiento Humano</div>
                        <div style="display:grid; grid-template-columns:repeat(2,1fr); gap:12px;">
                            <div style="text-align:center;"><div style="font-size:1.8rem; font-weight:800; color:#3498db;">${puntualidad}</div><div style="font-size:0.65rem;">Puntualidad</div></div>
                            <div style="text-align:center;"><div style="font-size:1.8rem; font-weight:800; color:#2ecc71;">${companerismo}</div><div style="font-size:0.65rem;">Compañerismo</div></div>
                            <div style="text-align:center;"><div style="font-size:1.8rem; font-weight:800; color:#f39c12;">${respeto}</div><div style="font-size:0.65rem;">Respeto</div></div>
                            <div style="text-align:center;"><div style="font-size:1.8rem; font-weight:800; color:#9b59b6;">${humildad}</div><div style="font-size:0.65rem;">Humildad</div></div>
                        </div>
                        <div class="average-container" style="margin-top:12px; background:rgba(0,0,0,0.3); border-radius:14px; padding:10px; text-align:center;">
                            <div>PROMEDIO GENERAL: <strong style="color:var(--primary-gold); font-size:1.4rem;">${performanceAverage}/10</strong></div>
                            <div class="average-stars" style="margin:5px 0;">${starHtml}</div>
                            <div style="font-size:0.7rem;"><i class="fas fa-comment-dots"></i> ${perfMessage}</div>
                        </div>
                    </div>
                `;
                
                const finalHtml = `
                    <div class="profile-header"><h1>⚜️ PANEL NÁPOLES ⚜️</h1></div>
                    <div class="cards-row">
                        <div class="id-card-identity glass-card">
                            <img src="${sanitized.urlFotoRostro}" class="player-img" onerror="this.src='${CONFIG.DEFAULT_AVATAR}'">
                            <div style="font-weight:900; font-family:'Outfit'; text-transform:uppercase;">${sanitized.primerNombre} ${sanitized.segundoNombre}</div>
                            <div style="font-size:0.6rem; color:var(--text-muted);">C.I. ${escapeHtml(cedula)}</div>
                        </div>
                        <div class="id-card-jersey-wrap"><div class="jersey-card-inner">
                            <div class="face-jersey-front"><div class="jersey-name">${sanitized.nombreCamiseta}</div><div class="jersey-number">${sanitized.dorsal}</div><div style="font-size:0.55rem;">${sanitized.tallaUni}</div></div>
                            <div class="face-jersey-back"><div class="jersey-name">${sanitized.nombreCamiseta}</div><div class="jersey-number">${sanitized.dorsal}</div><div style="font-size:0.55rem;">Nápoles FC</div></div>
                        </div></div>
                    </div>
                    <button class="btn-sync" onclick="window.recargarPerfil()"><i class="fas fa-sync-alt"></i> ACTUALIZAR INFORMACIÓN</button>
                    ${statsHtml}
                    ${performanceHtml}
                    ${adminBlockHtml}
                    <div class="section-box"><div class="section-title"><i class="fas fa-hand-holding-usd"></i> Situación Vocalía</div>${vocaliaHtml}</div>
                    ${multasHtml}
                    <button class="btn-logout" onclick="window.cerrarSesion()"><i class="fas fa-sign-out-alt"></i> CERRAR SESIÓN</button>
                    <div style="height:30px;"></div>
                `;
                container.innerHTML = finalHtml;
            } else {
                container.innerHTML = `<div class="error-message">⚠️ No se encontraron datos. <br><button onclick="window.cerrarSesion()" style="margin-top:10px;">Volver</button></div>`;
            }
        } catch (e) {
            console.error(e);
            container.innerHTML = `<div class="error-message">Error: ${escapeHtml(e.message)}<br><button onclick="window.location.reload()">Reintentar</button></div>`;
        }
    }
    
    window.recargarPerfil = async function() {
        const session = JSON.parse(localStorage.getItem('jugador_actual'));
        if (!session || !session.cedula) { window.location.href = 'login.html'; return; }
        const container = document.getElementById('perfilContent');
        container.innerHTML = '<div class="spinner"></div>';
        await cargarPerfil(session.cedula);
    };
    window.cerrarSesion = function() {
        if (confirm('Cerrar sesión?')) { localStorage.removeItem('jugador_actual'); window.location.href = 'login.html'; }
    };
    (function() {
        const session = JSON.parse(localStorage.getItem('jugador_actual'));
        if (!session || !session.cedula) { window.location.href = 'login.html'; return; }
        cargarPerfil(session.cedula);
    })();
</script>
</body>
</html>
