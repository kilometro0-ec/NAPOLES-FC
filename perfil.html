<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Pro | Nápoles FC</title>
    <link rel="stylesheet" href="estilos.css">
    <style>
        :root {
            --oro-brillante: #d4af37;
            --azul-deep: #001226;
        }

        .perfil-grid {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }

        /* DISEÑO DE LA CAMISETA */
        .camiseta-container {
            background: #111;
            border: 2px solid var(--dorado);
            border-radius: 15px;
            height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background-image: radial-gradient(circle, #1a1a1a 10%, transparent 10%);
            background-size: 20px 20px;
        }

        .numero-camiseta {
            font-size: 120px;
            font-weight: 900;
            color: var(--dorado);
            line-height: 1;
            text-shadow: 3px 3px 0px #000;
        }

        .nombre-camiseta {
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-top: -10px;
        }

        /* MODAL OBLIGATORIO */
        #modalEleccion {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .caja-eleccion {
            background: var(--azul-noche);
            padding: 30px;
            border: 2px solid var(--dorado);
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
        }

        /* ESTADÍSTICAS ESTILO CARTA */
        .card-stats {
            background: var(--gris-suave);
            border-radius: 15px;
            padding: 20px;
            border-left: 5px solid var(--dorado);
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        @media (max-width: 768px) {
            .perfil-grid { grid-template-columns: 1fr; }
            .camiseta-container { order: -1; }
        }
    </style>
</head>
<body>

    <!-- MODAL DE ELECCIÓN PRIMERA VEZ -->
    <div id="modalEleccion">
        <div class="caja-eleccion">
            <h2 style="color: var(--dorado);">PERSONALIZA TU EQUIPO</h2>
            <p>Escoge cómo aparecerás en la cancha</p>
            
            <label>Nombre en Camiseta</label>
            <select id="selectNombre" class="btn-accion" style="background: #111; margin-bottom: 15px;"></select>
            
            <label>Número de Dorsal (1-99)</label>
            <input type="number" id="inputNumero" min="1" max="99" placeholder="Ej: 10" class="btn-accion" style="background: #111; margin-bottom: 20px;">
            
            <button onclick="guardarEleccion()" class="btn-accion">GUARDAR PARA SIEMPRE</button>
        </div>
    </div>

    <div class="perfil-grid">
        <!-- INFO IZQUIERDA -->
        <div class="info-jugador">
            <div class="card-stats">
                <h1 id="txtNombreReal" style="margin: 0; color: white;">NOMBRE APELLIDO</h1>
                <p id="txtCedula" style="color: var(--dorado);"></p>
                
                <div class="stats-area" style="margin-top: 20px;">
                    <div class="stat-row"><span>GOLES ANOTADOS</span><strong id="valGoles" style="color: var(--dorado);">0</strong></div>
                    <div class="stat-row"><span>TARJETAS AMARILLAS</span><strong id="valAmarillas" style="color: #ffeb3b;">0</strong></div>
                    <div class="stat-row"><span>TARJETAS ROJAS</span><strong id="valRojas" style="color: #f44336;">0</strong></div>
                    <div class="stat-row"><span>ESTADO DEL SOCIO</span><strong id="valEstado">PENDIENTE</strong></div>
                </div>
            </div>
        </div>

        <!-- CAMISETA DERECHA -->
        <div class="camiseta-container">
            <div style="position: absolute; top: 20px; font-size: 12px; color: #444;">NÁPOLES FC OFFICIAL KIT</div>
            <div id="camNum" class="numero-camiseta">--</div>
            <div id="camNom" class="nombre-camiseta">JUGADOR</div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const j = JSON.parse(localStorage.getItem('datos_jugador'));
            if(!j) { window.location.href = 'login.html'; return; }

            // Llenar datos básicos
            document.getElementById('txtNombreReal').innerText = j.nombre;
            document.getElementById('txtCedula').innerText = "D.N.I. " + j.cedula;
            document.getElementById('valGoles').innerText = j.goles || 0;
            document.getElementById('valAmarillas').innerText = j.amarillas || 0;
            document.getElementById('valRojas').innerText = j.rojas || 0;
            document.getElementById('valEstado').innerText = j.estado;

            // ¿Es la primera vez? (Si no tiene nombre de camiseta ni número)
            if(!j.nombreCamiseta || !j.numeroCamiseta) {
                mostrarModal(j);
            } else {
                actualizarCamiseta(j.nombreCamiseta, j.numeroCamiseta);
            }
        });

        function mostrarModal(j) {
            document.getElementById('modalEleccion').style.display = 'flex';
            const select = document.getElementById('selectNombre');
            
            // Opciones de nombre basadas en sus datos reales
            const nombres = j.nombre.split(" "); // Asumiendo que viene "Nombre1 Apellido"
            const opcion1 = nombres[0]; // Primer Nombre
            const opcion2 = nombres[1] || ""; // Apellido o Segundo nombre
            
            select.innerHTML = `
                <option value="${opcion1}">${opcion1}</option>
                <option value="${opcion2}">${opcion2}</option>
            `;
        }

        async function guardarEleccion() {
            const nom = document.getElementById('selectNombre').value;
            const num = document.getElementById('inputNumero').value;
            const j = JSON.parse(localStorage.getItem('datos_jugador'));

            if(!num || num < 1 || num > 99) { alert("Elige un número válido entre 1 y 99"); return; }

            // Aquí enviarías a Google Sheets para guardar permanentemente
            // Por ahora, actualizamos la vista y el local para simular éxito
            j.nombreCamiseta = nom;
            j.numeroCamiseta = num;
            localStorage.setItem('datos_jugador', JSON.stringify(j));

            actualizarCamiseta(nom, num);
            document.getElementById('modalEleccion').style.display = 'none';
            
            alert("¡Camiseta configurada! Bienvenido al club.");
        }

        function actualizarCamiseta(nom, num) {
            document.getElementById('camNum').innerText = num;
            document.getElementById('camNom').innerText = nom;
        }
    </script>
</body>
</html>
