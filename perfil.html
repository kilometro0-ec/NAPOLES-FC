<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nápoles F.C. - Mi Perfil</title>
    <link rel="stylesheet" href="estilos.css">
    <style>
        .perfil-dato {
            background: rgba(0,0,0,0.3);
            border-radius: 30px;
            padding: 12px 20px;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
        }
        .perfil-dato strong { color: var(--dorado); }
        .fotos-perfil {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .foto-item {
            text-align: center;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 10px;
            width: 180px;
        }
        .foto-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid var(--dorado);
        }
        .foto-item p {
            margin-top: 8px;
            color: var(--dorado);
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="contenedor-principal" style="max-width: 550px;">
    <h2 style="text-align:center;">⚽ MI PERFIL ⚽</h2>
    <div id="perfilContent">
        <div class="fotos-perfil" id="fotosContainer">
            <div class="foto-item"><p>📸 FOTO PERFIL</p><img id="fotoRostro" src="" alt="Foto rostro"></div>
            <div class="foto-item"><p>🪪 FOTO CÉDULA</p><img id="fotoCedula" src="" alt="Foto cédula"></div>
        </div>
        <div class="perfil-dato"><strong>Cédula:</strong> <span id="perfilCedula">---</span></div>
        <div class="perfil-dato"><strong>Nombre completo:</strong> <span id="perfilNombre">---</span></div>
        <div class="perfil-dato"><strong>Fecha de nacimiento:</strong> <span id="perfilFecha">---</span></div>
        <div class="perfil-dato"><strong>Teléfono:</strong> <span id="perfilTelefono">---</span></div>
        <div class="perfil-dato"><strong>Correo:</strong> <span id="perfilCorreo">---</span></div>
        <div class="perfil-dato"><strong>Dorsal:</strong> <span id="perfilDorsal">---</span></div>
        <div class="perfil-dato"><strong>Nombre en camiseta:</strong> <span id="perfilCamiseta">---</span></div>
        <button id="cerrarSesion" class="btn-accion">🚪 CERRAR SESIÓN</button>
    </div>
</div>

<script>
    const URL_GAS = "https://script.google.com/macros/s/AKfycbyOZObCnKnnbwwuwTO8CULGvh1-c9hiUqAhBs15N3ceMYaFQaiHtTQWGJgugbodinP6/exec";

    async function cargarPerfil(cedula) {
        try {
            const resp = await fetch(`${URL_GAS}?action=obtenerJugador&cedula=${cedula}`);
            const data = await resp.json();
            if (data.ok) {
                document.getElementById('perfilCedula').innerText = data.cedula;
                document.getElementById('perfilNombre').innerText = `${data.nombre1} ${data.nombre2} ${data.apellidos}`;
                document.getElementById('perfilFecha').innerText = data.fechaNac;
                document.getElementById('perfilTelefono').innerText = data.telefono;
                document.getElementById('perfilCorreo').innerText = data.correo;
                document.getElementById('perfilDorsal').innerText = data.dorsal;
                document.getElementById('perfilCamiseta').innerText = data.nombreCamiseta;
                if (data.urlRostro) document.getElementById('fotoRostro').src = data.urlRostro;
                if (data.urlCedula) document.getElementById('fotoCedula').src = data.urlCedula;
            } else {
                alert("No se pudieron cargar los datos.");
            }
        } catch (error) {
            console.error(error);
            alert("Error al cargar perfil.");
        }
    }

    // Verificar sesión
    let session = null;
    try {
        const raw = localStorage.getItem('jugador_aprobado');
        if (raw) {
            session = JSON.parse(raw);
            if (Date.now() > session.expira) {
                localStorage.removeItem('jugador_aprobado');
                session = null;
            }
        }
    } catch(e) {}

    if (!session || !session.cedula) {
        window.location.href = 'login.html';
    } else {
        cargarPerfil(session.cedula);
    }

    document.getElementById('cerrarSesion').addEventListener('click', () => {
        localStorage.removeItem('jugador_aprobado');
        window.location.href = 'login.html';
    });
</script>
</body>
</html>
