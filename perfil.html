<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nápoles F.C. - Perfil Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-gold: #D4AF37;
            --light-gold: #FFD700;
            --dark-bg: #060912;
            --card-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(212, 175, 55, 0.2);
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: radial-gradient(circle at top, #111a33 0%, #060912 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 15px;
            color: var(--text-main);
            display: flex;
            justify-content: center;
        }

        .profile-container { width: 100%; max-width: 450px; }

        .profile-header { text-align: center; margin-bottom: 20px; }
        .profile-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.4rem;
            color: var(--primary-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        /* --- FILA DE TARJETAS (ID CARDS) --- */
        .cards-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        /* TARJETA 1: FOTO E IDENTIDAD (CON PULSO) */
        .id-card-identity {
            background: linear-gradient(145deg, rgba(212, 175, 55, 0.15), rgba(10, 20, 40, 0.95));
            border-radius: 20px;
            border: 2px solid var(--primary-gold);
            padding: 20px 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            animation: pulseGlow 2.5s infinite ease-in-out; /* Animación Palpitar */
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); box-shadow: 0 0 5px rgba(212, 175, 55, 0.2); }
            50% { transform: scale(1.03); box-shadow: 0 0 20px rgba(212, 175, 55, 0.5); }
            100% { transform: scale(1); box-shadow: 0 0 5px rgba(212, 175, 55, 0.2); }
        }

        .photo-wrapper {
            position: relative;
            width: 90px;
            margin-bottom: 10px;
        }

        .player-img {
            width: 85px; height: 85px;
            border-radius: 50%;
            border: 2px solid var(--primary-gold);
            object-fit: cover;
            background: #000;
            padding: 3px;
        }

        .ovr-badge {
            position: absolute;
            bottom: 0; right: 0;
            background: var(--primary-gold);
            color: #000;
            width: 34px; height: 34px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1rem;
            border: 2px solid #060912;
            font-family: 'Outfit';
        }

        /* TARJETA 2: CAMISETA (GIRO 3D) */
        .id-card-jersey-wrap {
            perspective: 1000px;
            height: 190px;
        }

        .jersey-card-inner {
            position: relative;
            width: 100%; height: 100%;
            transform-style: preserve-3d;
            animation: rotateJersey 10s infinite linear; /* Animación Giro */
        }

        @keyframes rotateJersey {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        .face-jersey {
            position: absolute;
            width: 100%; height: 100%;
            background: linear-gradient(145deg, #0a1428, #000);
            border-radius: 20px;
            border: 2px solid var(--glass-border);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            backface-visibility: visible;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }

        .jersey-name {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem; font-weight: 800;
            text-transform: uppercase; color: #fff;
            letter-spacing: 1px;
            margin-bottom: -5px;
        }

        .jersey-number {
            font-family: 'Outfit', sans-serif;
            font-size: 4.8rem; font-weight: 900;
            color: var(--primary-gold);
            line-height: 1;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3));
        }

        /* --- CONTENIDO ADICIONAL --- */
        .sync-container { text-align: center; margin-bottom: 20px; }
        .btn-sync {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--primary-gold);
            color: var(--primary-gold);
            padding: 8px 18px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-sync:active { transform: scale(0.95); }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .stat-card {
            background: var(--card-bg); border-radius: 15px; padding: 12px;
            text-align: center; border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-val { font-size: 1.3rem; font-weight: 800; color: #fff; display: block; }
        .stat-lab { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; }

        .section-box {
            background: var(--card-bg); border-radius: 20px; padding: 18px;
            margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05);
        }
        .section-title {
            font-size: 0.8rem; font-weight: 800; color: var(--primary-gold);
            margin-bottom: 12px; text-transform: uppercase;
            display: flex; align-items: center; gap: 10px;
        }

        .info-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.85rem; }
        .info-row span:first-child { color: var(--text-muted); }
        .info-row span:last-child { font-weight: 700; color: #fff; }
        .val-gold { color: var(--primary-gold) !important; }

        .btn-logout {
            width: 100%; padding: 15px; border-radius: 15px; border: none;
            background: rgba(231, 76, 60, 0.1); color: #e74c3c;
            font-weight: 800; cursor: pointer; margin-top: 10px;
        }

        .spinner { width: 40px; height: 40px; border: 3px solid rgba(212, 175, 55, 0.1); border-top-color: var(--primary-gold); border-radius: 50%; animation: spin 1s infinite linear; margin: 100px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="profile-container" id="perfilContent">
    <div class="spinner"></div>
</div>

<script src="config.js"></script>
<script>
    const session = JSON.parse(localStorage.getItem('jugador_actual'));
    
    if (!session || !session.cedula || Date.now() > session.expira) {
        localStorage.removeItem('jugador_actual');
        window.location.href = 'login.html';
    } else {
        cargarPerfil(session.cedula);
    }

    async function cargarPerfil(cedula) {
        const container = document.getElementById('perfilContent');
        const ciLimpia = String(cedula).replace(/[^0-9]/g, '');
        
        try {
            const url = `${CONFIG.URL_GAS}?action=getPerfil&cedula=${encodeURIComponent(ciLimpia)}&t=${Date.now()}`;
            const resp = await fetch(url);
            const data = await resp.json();
            
            if (data.success && data.jugador) {
                const j = data.jugador;
                
                // Cálculo de Media
                const comp = Number(j.companerismo) || 8;
                const respV = Number(j.respeto) || 8;
                const hum = Number(j.humildad) || 8;
                const punt = Number(j.puntualidad) || 8;
                const ovr = Math.round(((comp + respV + hum + punt) / 4) * 10);
                
                const nombreDorso = j.nombreCamiseta || j.primerNombre || 'NÁPOLES';

                container.innerHTML = `
                    <div class="profile-header">
                        <h1>⚜️ ${CONFIG.APP_NAME} ⚜️</h1>
                    </div>

                    <!-- FILA DE ID CARDS SUPERIOR -->
                    <div class="cards-row">
                        <!-- ID CARD 1: IDENTIDAD -->
                        <div class="id-card-identity">
                            <div class="photo-wrapper">
                                <img src="${j.urlFotoRostro || CONFIG.DEFAULT_AVATAR}" class="player-img" onerror="this.src='${CONFIG.DEFAULT_AVATAR}'">
                                <div class="ovr-badge">${ovr}</div>
                            </div>
                            <div style="font-weight:800; font-size:0.95rem; color:white;">${escapeHtml(j.primerNombre)}</div>
                            <div style="font-size:0.65rem; color:var(--text-muted);">CI: ${ciLimpia}</div>
                        </div>

                        <!-- ID CARD 2: CAMISETA 3D -->
                        <div class="id-card-jersey-wrap">
                            <div class="jersey-card-inner">
                                <div class="face-jersey">
                                    <div class="jersey-name">${escapeHtml(nombreDorso)}</div>
                                    <div class="jersey-number">${j.dorsal || '00'}</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="sync-container">
                        <button class="btn-sync" onclick="refrescarPerfil()">
                            <i class="fas fa-sync-alt"></i> ACTUALIZAR DATOS
                        </button>
                    </div>

                    <!-- ESTADÍSTICAS EN CANCHA -->
                    <div class="stats-grid">
                        <div class="stat-card">
                            <span class="stat-val">${j.goles || 0}</span>
                            <span class="stat-lab">Goles</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-val" style="color:#f1c40f;">${j.amarillas || 0}</span>
                            <span class="stat-lab">Amarillas</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-val" style="color:#e74c3c;">${j.rojas || 0}</span>
                            <span class="stat-lab">Rojas</span>
                        </div>
                    </div>

                    <!-- SECCIÓN: VALORES -->
                    <div class="section-box">
                        <div class="section-title"><i class="fas fa-star"></i> Atributos Humanos</div>
                        <div class="info-row"><span>Compañerismo</span><span class="val-gold">${comp}/10</span></div>
                        <div class="info-row"><span>Respeto</span><span class="val-gold">${respV}/10</span></div>
                        <div class="info-row"><span>Humildad</span><span class="val-gold">${hum}/10</span></div>
                        <div class="info-row"><span>Puntualidad</span><span class="val-gold">${punt}/10</span></div>
                    </div>

                    <!-- SECCIÓN: ADMINISTRACIÓN -->
                    <div class="section-box">
                        <div class="section-title"><i class="fas fa-shield-alt"></i> Estado Administrativo</div>
                        <div class="info-row"><span>Deuda Vocalía</span><span style="color:${Number(j.deudaVocalia) > 0 ? '#e74c3c' : '#2ecc71'}">$${j.deudaVocalia || 0}</span></div>
                        <div class="info-row"><span>Inscripción</span><span>${j.inscripEstado || 'PAGADO'}</span></div>
                        <div class="info-row"><span>Uniforme</span><span>${j.unifEstado || 'ENTREGADO'}</span></div>
                        <div class="info-row"><span>Talla</span><span class="val-gold">${j.tallaUni || 'M'}</span></div>
                    </div>

                    <button class="btn-logout" onclick="cerrarSesion()">CERRAR SESIÓN</button>
                `;

            } else {
                container.innerHTML = `<div style="text-align:center; padding:50px;">❌ Jugador no encontrado</div>`;
            }
        } catch (e) {
            container.innerHTML = `<div style="text-align:center; padding:50px;">❌ Error de conexión con el servidor</div>`;
        }
    }

    function refrescarPerfil() { 
        document.getElementById('perfilContent').innerHTML = '<div class="spinner"></div>';
        cargarPerfil(session.cedula); 
    }
    
    function cerrarSesion() { 
        localStorage.removeItem('jugador_actual'); 
        window.location.href = 'login.html'; 
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
</script>

</body>
</html>
