<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nápoles F.C. - Mi Perfil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-gold: #D4AF37;
            --primary-gold-light: #f5e6a3;
            --primary-gold-glow: rgba(212, 175, 55, 0.6);
            --dark-bg: #060912;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --success: #2ecc71;
            --success-dark: #27ae60;
            --danger: #e74c3c;
            --danger-dark: #c0392b;
            --warning: #f39c12;
            --info: #3498db;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: radial-gradient(circle at top, #111a33 0%, #060912 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 15px;
            color: var(--text-main);
            display: flex;
            justify-content: center;
        }

        .profile-container { width: 100%; max-width: 450px; }

        .profile-header { text-align: center; margin-bottom: 20px; }
        .profile-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.4rem;
            color: var(--primary-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        /* --- FILA DE TARJETAS (IDENTIDAD Y CAMISETA) --- */
        .cards-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        /* ESTILO BASE COMÚN PARA AMBAS TARJETAS */
        .glass-card {
            background: linear-gradient(145deg, rgba(10, 20, 40, 0.85), rgba(5, 10, 20, 0.95));
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.15), rgba(212, 175, 55, 0.3), rgba(212, 175, 55, 0.15), transparent);
            animation: shimmer 3s infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            20% { left: 100%; }
            100% { left: 100%; }
        }

        .glass-card::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, transparent 30%, rgba(212, 175, 55, 0.4), rgba(212, 175, 55, 0.1), rgba(212, 175, 55, 0.4), transparent 70%);
            border-radius: 22px;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
            z-index: 0;
        }

        .glass-card:hover::after {
            opacity: 1;
            animation: borderGlow 1.5s ease-in-out infinite;
        }

        @keyframes borderGlow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        .id-card-identity {
            padding: 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
            animation: softPulse 3s infinite ease-in-out;
        }

        @keyframes softPulse {
            0%, 100% { box-shadow: 0 0 5px rgba(212, 175, 55, 0.2); border-color: rgba(212, 175, 55, 0.3); }
            50% { box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); border-color: rgba(212, 175, 55, 0.6); }
        }

        .player-img {
            width: 80px; height: 80px;
            border-radius: 50%;
            border: 3px solid var(--primary-gold);
            object-fit: cover;
            margin-bottom: 10px;
            background: #000;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            transition: transform 0.3s ease;
            position: relative;
            z-index: 2;
        }

        .player-img:hover { transform: scale(1.05); }

        /* --- TARJETA DE CAMISETA 3D --- */
        .id-card-jersey-wrap { perspective: 800px; height: 180px; position: relative; z-index: 2; }
        
        .jersey-card-inner {
            position: relative; width: 100%; height: 100%;
            transform-style: preserve-3d;
            border-radius: 20px;
            animation: rotateJerseySmooth 12s infinite linear;
            will-change: transform;
        }

        @keyframes rotateJerseySmooth {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        .id-card-jersey-wrap:hover .jersey-card-inner { animation-play-state: paused; }

        .face-jersey-front, .face-jersey-back {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(145deg, #0a1428, #000814);
            border-radius: 20px; border: 2px solid rgba(212, 175, 55, 0.5);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            backface-visibility: hidden;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
            overflow: hidden;
        }
        
        .face-jersey-front { transform: rotateY(0deg); }
        .face-jersey-back { transform: rotateY(180deg); background: linear-gradient(145deg, #1a0f2a, #0a0418); }

        .face-jersey-front::before, .face-jersey-back::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.25) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .id-card-jersey-wrap:hover .face-jersey-front::before,
        .id-card-jersey-wrap:hover .face-jersey-back::before {
            opacity: 1;
            animation: lensFlare 2s infinite;
        }

        @keyframes lensFlare {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 0.3; }
            50% { transform: translate(15%, 15%) rotate(45deg); opacity: 0.7; }
            100% { transform: translate(-15%, -15%) rotate(90deg); opacity: 0.3; }
        }

        .jersey-number { font-size: 4.5rem; font-weight: 900; color: var(--primary-gold); font-family: 'Outfit'; line-height: 1; text-shadow: 0 0 20px rgba(212, 175, 55, 0.5); letter-spacing: 2px; }
        .jersey-name { font-size: 0.7rem; font-weight: 800; opacity: 0.9; letter-spacing: 2px; color: var(--primary-gold-light); text-transform: uppercase; margin-bottom: 5px; }

        /* --- ESTADÍSTICAS --- */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .stat-card {
            background: var(--card-bg); border-radius: 12px; padding: 10px 5px;
            text-align: center; border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            border-color: rgba(212, 175, 55, 0.3);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .stat-val { display: block; font-size: 1.1rem; font-weight: 800; }
        .stat-lab { font-size: 0.55rem; color: var(--text-muted); text-transform: uppercase; }

        /* --- BLOQUES DE INFO MEJORADOS --- */
        .section-box {
            background: var(--card-bg); 
            border-radius: 18px; 
            padding: 15px;
            margin-bottom: 12px; 
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }
        .section-box:hover {
            border-color: rgba(212, 175, 55, 0.2);
            transform: translateY(-2px);
        }
        .section-title {
            font-size: 0.8rem; 
            font-weight: 800; 
            color: var(--primary-gold);
            margin-bottom: 12px; 
            text-transform: uppercase; 
            display: flex; 
            align-items: center; 
            gap: 8px;
        }

        /* --- ESTILOS MEJORADOS PARA ESTADO ADMINISTRATIVO --- */
        .admin-stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 15px;
        }

        .admin-stat-card {
            background: linear-gradient(135deg, rgba(0,0,0,0.4), rgba(0,0,0,0.2));
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .admin-stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .admin-stat-card:hover::before {
            left: 100%;
        }

        .admin-stat-card:hover {
            transform: translateY(-3px);
            border-color: rgba(212, 175, 55, 0.4);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .admin-stat-icon {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .admin-stat-value {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .admin-stat-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .admin-stat-status {
            font-size: 0.7rem;
            margin-top: 6px;
            padding: 3px 8px;
            border-radius: 20px;
            display: inline-block;
            font-weight: 700;
        }

        .status-badge-paid { background: rgba(46, 204, 113, 0.2); color: var(--success); border: 1px solid rgba(46, 204, 113, 0.3); }
        .status-badge-pending { background: rgba(231, 76, 60, 0.2); color: var(--danger); border: 1px solid rgba(231, 76, 60, 0.3); }
        .status-badge-warning { background: rgba(243, 156, 18, 0.2); color: var(--warning); border: 1px solid rgba(243, 156, 18, 0.3); }
        .status-badge-info { background: rgba(52, 152, 219, 0.2); color: var(--info); border: 1px solid rgba(52, 152, 219, 0.3); }

        /* Barra de progreso para deuda */
        .debt-container {
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            padding: 12px;
            margin-top: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .debt-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 5px;
        }

        .debt-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .debt-amount {
            font-size: 1.2rem;
            font-weight: 800;
        }

        .debt-amount.danger { color: var(--danger); }
        .debt-amount.success { color: var(--success); }

        .progress-bar-bg {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, var(--danger), var(--warning));
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease;
            width: 0%;
        }

        .progress-bar-fill.low-debt { background: linear-gradient(90deg, var(--success), var(--warning)); }
        .progress-bar-fill.medium-debt { background: linear-gradient(90deg, var(--warning), var(--danger)); }
        .progress-bar-fill.high-debt { background: linear-gradient(90deg, var(--danger), #8b0000); }

        .debt-message {
            font-size: 0.7rem;
            margin-top: 8px;
            text-align: center;
            padding: 5px;
            border-radius: 8px;
        }

        /* Detalles adicionales */
        .admin-details {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-top: 1px solid rgba(255,255,255,0.08);
            margin-top: 10px;
        }

        .detail-item {
            text-align: center;
            flex: 1;
        }

        .detail-label {
            font-size: 0.6rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .detail-value {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--primary-gold);
        }

        .info-row {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 10px 0; 
            border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 0.85rem;
        }
        .info-row:last-child { border: none; }
        .info-label { display: flex; align-items: center; gap: 10px; color: var(--text-muted); }
        .info-label i { width: 16px; text-align: center; color: var(--primary-gold); }
        .info-value { font-weight: 700; color: #fff; }

        .status-red { color: var(--danger) !important; }
        .status-green { color: var(--success) !important; }

        .btn-sync {
            width: 100%; 
            background: linear-gradient(135deg, transparent, rgba(212, 175, 55, 0.1));
            border: 1px solid var(--primary-gold);
            color: var(--primary-gold); 
            padding: 12px; 
            border-radius: 12px;
            font-weight: 700; 
            font-size: 0.8rem; 
            cursor: pointer; 
            margin-bottom: 15px;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px;
            transition: 0.3s;
        }
        .btn-sync:hover:not(:disabled) {
            background: rgba(212, 175, 55, 0.2);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }
        .btn-sync:active:not(:disabled) { transform: scale(0.98); }
        .btn-sync:disabled { opacity: 0.7; cursor: not-allowed; }

        .btn-logout {
            width: 100%; 
            padding: 15px; 
            border-radius: 15px; 
            border: none;
            background: rgba(231, 76, 60, 0.1); 
            color: #e74c3c;
            font-weight: 800; 
            cursor: pointer; 
            margin-top: 10px;
            transition: 0.3s;
        }
        .btn-logout:hover {
            background: rgba(231, 76, 60, 0.2);
            transform: translateY(-2px);
        }

        .spinner { 
            width: 40px; 
            height: 40px; 
            border: 3px solid rgba(212, 175, 55, 0.1); 
            border-top-color: var(--primary-gold); 
            border-radius: 50%; 
            animation: spin 1s infinite linear; 
            margin: 100px auto; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .error-message { text-align: center; padding: 50px; color: var(--danger); }
        
        @media (max-width: 400px) {
            .jersey-number { font-size: 3.5rem; }
            .player-img { width: 65px; height: 65px; }
            .id-card-jersey-wrap { height: 160px; }
            .admin-stat-value { font-size: 1rem; }
            .admin-stat-icon { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<div class="profile-container" id="perfilContent">
    <div class="spinner"></div>
</div>

<script src="config.js"></script>
<script>
    function escapeHtml(str) {
        if (!str) return '';
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function validateConfig() {
        if (typeof CONFIG === 'undefined') throw new Error('No se pudo cargar config.js');
        if (!CONFIG.URL_GAS) throw new Error('URL_GAS no está definida');
        if (!CONFIG.DEFAULT_AVATAR) CONFIG.DEFAULT_AVATAR = 'https://via.placeholder.com/80/111a33/D4AF37?text=PLAYER';
    }

    function getStatusClass(val) {
        if (!val) return 'status-red';
        const v = String(val).toUpperCase();
        if (v.includes('PENDIENTE') || v.includes('DEBE') || v === 'NO') return 'status-red';
        if (v.includes('PAGADO') || v.includes('ENTREGADO') || v === 'SI' || v === 'OK') return 'status-green';
        return '';
    }

    function getStatusBadgeClass(val) {
        if (!val) return 'status-badge-pending';
        const v = String(val).toUpperCase();
        if (v.includes('PENDIENTE') || v.includes('DEBE') || v === 'NO') return 'status-badge-pending';
        if (v.includes('PAGADO') || v.includes('ENTREGADO') || v === 'SI' || v === 'OK') return 'status-badge-paid';
        return 'status-badge-info';
    }

    function getDebtProgress(debtAmount) {
        const maxDebt = 200;
        let percentage = Math.min((debtAmount / maxDebt) * 100, 100);
        let fillClass = 'low-debt';
        if (debtAmount > 100) fillClass = 'high-debt';
        else if (debtAmount > 50) fillClass = 'medium-debt';
        return { percentage, fillClass };
    }

    function getDebtMessage(debtAmount) {
        if (debtAmount === 0) return { text: '✅ ¡AL DÍA! No tienes deudas pendientes', type: 'success' };
        if (debtAmount < 50) return { text: '⚠️ Deuda baja. Regulariza pronto para seguir participando', type: 'warning' };
        if (debtAmount < 100) return { text: '⚠️⚠️ Deuda moderada. Comunícate con vocalía', type: 'warning' };
        return { text: '🔴 ¡ATENCIÓN! Deuda crítica. Riesgo de suspensión', type: 'danger' };
    }

    function handleSessionError(error) {
        if (error && (error.includes('sesión') || error.includes('token') || error.includes('auth'))) {
            localStorage.removeItem('jugador_actual');
            window.location.href = 'login.html';
            return true;
        }
        return false;
    }

    async function cargarPerfil(cedula) {
        const container = document.getElementById('perfilContent');
        
        try {
            validateConfig();
            
            const url = `${CONFIG.URL_GAS}?action=getPerfil&cedula=${encodeURIComponent(cedula)}&t=${Date.now()}`;
            console.log('Consultando:', url);
            
            const resp = await fetch(url);
            if (!resp.ok) throw new Error(`Error HTTP: ${resp.status}`);
            
            const data = await resp.json();
            
            if (!data.success && data.error && handleSessionError(data.error)) return;
            
            if (data.success && data.jugador) {
                const j = data.jugador;
                
                const sanitized = {
                    primerNombre: escapeHtml(j.primerNombre || ''),
                    segundoNombre: escapeHtml(j.segundoNombre || ''),
                    urlFotoRostro: escapeHtml(j.urlFotoRostro || CONFIG.DEFAULT_AVATAR),
                    nombreCamiseta: escapeHtml(j.nombreCamiseta || 'NÁPOLES'),
                    dorsal: escapeHtml(j.dorsal || '00'),
                    tallaUni: escapeHtml(j.tallaUni || 'M'),
                    partidosJugados: Number(j.partidosJugados) || 0,
                    goles: Number(j.goles) || 0,
                    amarillas: Number(j.amarillas) || 0,
                    rojas: Number(j.rojas) || 0,
                    puntualidad: Number(j.puntualidad) || 0,
                    companerismo: Number(j.companerismo) || 0,
                    respeto: Number(j.respeto) || 0,
                    humildad: Number(j.humildad) || 0,
                    deudaVocalia: Number(j.deudaVocalia) || 0,
                    inscripEstado: escapeHtml(j.inscripEstado || 'PENDIENTE'),
                    unifEstado: escapeHtml(j.unifEstado || 'PENDIENTE'),
                    mediasEstado: (j.mediasEstado === 'null' || !j.mediasEstado || j.mediasEstado === 'undefined') ? 'N/A' : escapeHtml(j.mediasEstado)
                };

                const debtProgress = getDebtProgress(sanitized.deudaVocalia);
                const debtMessage = getDebtMessage(sanitized.deudaVocalia);
                
                container.innerHTML = `
                    <div class="profile-header">
                        <h1>⚜️ PANEL NÁPOLES ⚜️</h1>
                    </div>

                    <div class="cards-row">
                        <div class="id-card-identity glass-card">
                            <img src="${sanitized.urlFotoRostro}" class="player-img" onerror="this.src='${CONFIG.DEFAULT_AVATAR}'">
                            <div style="font-weight:900; font-family:'Outfit'; text-transform:uppercase; font-size:0.9rem;">
                                ${sanitized.primerNombre} ${sanitized.segundoNombre}
                            </div>
                            <div style="font-size:0.6rem; color:var(--text-muted); margin-top:2px;">
                                <i class="fas fa-id-card"></i> C.I. ${escapeHtml(cedula)}
                            </div>
                        </div>

                        <div class="id-card-jersey-wrap">
                            <div class="jersey-card-inner">
                                <div class="face-jersey-front">
                                    <div class="jersey-name">${sanitized.nombreCamiseta}</div>
                                    <div class="jersey-number">${sanitized.dorsal}</div>
                                    <div style="font-size:0.55rem; opacity:0.6; margin-top:5px;">
                                        <i class="fas fa-tshirt"></i> ${sanitized.tallaUni}
                                    </div>
                                </div>
                                <div class="face-jersey-back">
                                    <div class="jersey-name">${sanitized.nombreCamiseta}</div>
                                    <div class="jersey-number">${sanitized.dorsal}</div>
                                    <div style="font-size:0.55rem; opacity:0.6; margin-top:5px;">
                                        <i class="fas fa-heart"></i> Nápoles FC
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <button class="btn-sync" onclick="window.recargarPerfil()">
                        <i class="fas fa-sync-alt"></i> ACTUALIZAR INFORMACIÓN
                    </button>

                    <div class="stats-grid">
                        <div class="stat-card">
                            <i class="fas fa-running" style="color:var(--primary-gold)"></i>
                            <span class="stat-val">${sanitized.partidosJugados}</span>
                            <span class="stat-lab">P. Jugados</span>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-futbol"></i>
                            <span class="stat-val">${sanitized.goles}</span>
                            <span class="stat-lab">Goles</span>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-clone" style="color:#f1c40f"></i>
                            <span class="stat-val">${sanitized.amarillas}</span>
                            <span class="stat-lab">Amas.</span>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-clone" style="color:#e74c3c"></i>
                            <span class="stat-val">${sanitized.rojas}</span>
                            <span class="stat-lab">Rojas</span>
                        </div>
                    </div>

                    <div class="section-box">
                        <div class="section-title"><i class="fas fa-star"></i> Rendimiento Humano</div>
                        <div class="info-row">
                            <div class="info-label"><i class="fas fa-clock"></i> Puntualidad</div>
                            <div class="info-value">${sanitized.puntualidad}/10</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label"><i class="fas fa-handshake"></i> Compañerismo</div>
                            <div class="info-value">${sanitized.companerismo}/10</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label"><i class="fas fa-balance-scale"></i> Respeto</div>
                            <div class="info-value">${sanitized.respeto}/10</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label"><i class="fas fa-heart"></i> Humildad</div>
                            <div class="info-value">${sanitized.humildad}/10</div>
                        </div>
                    </div>

                    <!-- ESTADO ADMINISTRATIVO MEJORADO -->
                    <div class="section-box">
                        <div class="section-title">
                            <i class="fas fa-chart-line"></i> Estado Administrativo
                            <i class="fas fa-shield-alt" style="margin-left:auto; font-size:0.7rem; opacity:0.7;"></i>
                        </div>

                        <!-- Tarjetas de estado rápido -->
                        <div class="admin-stats-grid">
                            <div class="admin-stat-card">
                                <div class="admin-stat-icon">
                                    <i class="fas fa-file-signature"></i>
                                </div>
                                <div class="admin-stat-value">${sanitized.inscripEstado}</div>
                                <div class="admin-stat-label">Inscripción</div>
                                <div class="admin-stat-status ${getStatusBadgeClass(sanitized.inscripEstado)}">
                                    <i class="fas ${sanitized.inscripEstado === 'PAGADO' ? 'fa-check-circle' : 'fa-clock'}"></i>
                                    ${sanitized.inscripEstado === 'PAGADO' ? 'Completada' : 'Pendiente'}
                                </div>
                            </div>
                            <div class="admin-stat-card">
                                <div class="admin-stat-icon">
                                    <i class="fas fa-tshirt"></i>
                                </div>
                                <div class="admin-stat-value">${sanitized.unifEstado}</div>
                                <div class="admin-stat-label">Uniforme</div>
                                <div class="admin-stat-status ${getStatusBadgeClass(sanitized.unifEstado)}">
                                    <i class="fas ${sanitized.unifEstado === 'ENTREGADO' ? 'fa-check-circle' : 'fa-truck'}"></i>
                                    ${sanitized.unifEstado === 'ENTREGADO' ? 'Entregado' : 'Pendiente'}
                                </div>
                            </div>
                        </div>

                        <!-- Sección de Deuda con barra de progreso -->
                        <div class="debt-container">
                            <div class="debt-header">
                                <span class="debt-label"><i class="fas fa-dollar-sign"></i> DEUDA CON VOCALÍA</span>
                                <span class="debt-amount ${sanitized.deudaVocalia > 0 ? 'danger' : 'success'}">
                                    $${sanitized.deudaVocalia.toFixed(2)}
                                </span>
                            </div>
                            <div class="progress-bar-bg">
                                <div class="progress-bar-fill ${debtProgress.fillClass}" style="width: ${debtProgress.percentage}%"></div>
                            </div>
                            <div class="debt-message" style="background: ${debtMessage.type === 'success' ? 'rgba(46,204,113,0.1)' : debtMessage.type === 'warning' ? 'rgba(243,156,18,0.1)' : 'rgba(231,76,60,0.1)'}">
                                <i class="fas ${debtMessage.type === 'success' ? 'fa-smile-wink' : debtMessage.type === 'warning' ? 'fa-exclamation-triangle' : 'fa-skull-crosswalk'}"></i>
                                ${debtMessage.text}
                            </div>
                        </div>

                        <!-- Detalles adicionales -->
                        <div class="admin-details">
                            <div class="detail-item">
                                <div class="detail-label"><i class="fas fa-socks"></i> Medias</div>
                                <div class="detail-value">${sanitized.mediasEstado}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label"><i class="fas fa-ruler-combined"></i> Talla</div>
                                <div class="detail-value">${sanitized.tallaUni}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label"><i class="fas fa-calendar-alt"></i> Última cuota</div>
                                <div class="detail-value">${new Date().toLocaleDateString()}</div>
                            </div>
                        </div>

                        <!-- Leyenda de estados -->
                        <div style="display: flex; justify-content: center; gap: 15px; margin-top: 12px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 0.6rem;">
                            <span><i class="fas fa-circle" style="color: var(--success); font-size: 0.5rem;"></i> Pagado/Entregado</span>
                            <span><i class="fas fa-circle" style="color: var(--danger); font-size: 0.5rem;"></i> Pendiente</span>
                            <span><i class="fas fa-circle" style="color: var(--warning); font-size: 0.5rem;"></i> En proceso</span>
                        </div>
                    </div>

                    <button class="btn-logout" onclick="window.cerrarSesion()">
                        <i class="fas fa-sign-out-alt"></i> CERRAR SESIÓN
                    </button>
                    <div style="height: 30px;"></div>
                `;
            } else {
                container.innerHTML = `
                    <div class="error-message">
                        <i class="fas fa-user-slash"></i><br>
                        Jugador no encontrado.<br>
                        <small>${escapeHtml(data.error || 'Error desconocido')}</small>
                        <br><br>
                        <button onclick="window.cerrarSesion()" style="margin-top:15px; padding:10px 20px; background:rgba(212,175,55,0.2); border:1px solid var(--primary-gold); color:var(--primary-gold); border-radius:8px; cursor:pointer;">
                            Volver al login
                        </button>
                    </div>
                `;
            }
        } catch (e) {
            console.error('Error:', e);
            container.innerHTML = `
                <div class="error-message">
                    <i class="fas fa-wifi"></i><br>
                    Error de conexión.<br>
                    <small>${escapeHtml(e.message)}</small>
                    <br><br>
                    <button onclick="window.recargarPerfil()" style="margin:5px; padding:10px 20px; background:rgba(212,175,55,0.2); border:1px solid var(--primary-gold); color:var(--primary-gold); border-radius:8px; cursor:pointer;">
                        Reintentar
                    </button>
                    <button onclick="window.cerrarSesion()" style="margin:5px; padding:10px 20px; background:rgba(231,76,60,0.2); border:1px solid #e74c3c; color:#e74c3c; border-radius:8px; cursor:pointer;">
                        Cerrar sesión
                    </button>
                </div>
            `;
        }
    }
    
    window.recargarPerfil = async function() {
        const session = JSON.parse(localStorage.getItem('jugador_actual'));
        if (!session || !session.cedula) {
            window.location.href = 'login.html';
            return;
        }
        
        const btn = document.querySelector('.btn-sync');
        if (btn) {
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ACTUALIZANDO...';
        }
        
        const container = document.getElementById('perfilContent');
        container.innerHTML = '<div class="spinner"></div>';
        
        try {
            await cargarPerfil(session.cedula);
        } finally {
            if (btn) {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sync-alt"></i> ACTUALIZAR INFORMACIÓN';
            }
        }
    };

    window.cerrarSesion = function() {
        if (confirm('¿Estás seguro de que deseas cerrar sesión?')) {
            localStorage.removeItem('jugador_actual');
            window.location.href = 'login.html';
        }
    };

    (function() {
        try {
            validateConfig();
            const session = JSON.parse(localStorage.getItem('jugador_actual'));
            if (!session || !session.cedula) {
                window.location.href = 'login.html';
                return;
            }
            cargarPerfil(session.cedula);
        } catch (e) {
            console.error('Error de inicialización:', e);
            document.getElementById('perfilContent').innerHTML = 
                '<div class="error-message"><i class="fas fa-exclamation-triangle"></i><br>Error de configuración: ' + escapeHtml(e.message) + '</div>';
        }
    })();
</script>

</body>
</html>
