<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nápoles F.C. - Mi Perfil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-gold: #D4AF37;
            --dark-bg: #060912;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --success: #2ecc71;
            --danger: #e74c3c;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: radial-gradient(circle at top, #111a33 0%, #060912 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 15px;
            color: var(--text-main);
            display: flex;
            justify-content: center;
        }

        .profile-container { width: 100%; max-width: 450px; }

        .profile-header { text-align: center; margin-bottom: 20px; }
        .profile-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.4rem;
            color: var(--primary-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- FILA DE TARJETAS (IDENTIDAD Y CAMISETA) --- */
        .cards-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .id-card-identity {
            background: linear-gradient(145deg, rgba(212, 175, 55, 0.15), rgba(10, 20, 40, 0.95));
            border-radius: 20px;
            border: 2px solid var(--primary-gold);
            padding: 15px;
            text-align: center;
            animation: pulseGlow 2.5s infinite ease-in-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); box-shadow: 0 0 5px rgba(212, 175, 55, 0.2); }
            50% { transform: scale(1.02); box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }
        }

        .player-img {
            width: 80px; height: 80px;
            border-radius: 50%;
            border: 2px solid var(--primary-gold);
            object-fit: cover;
            margin-bottom: 10px;
            background: #000;
        }

        .id-card-jersey-wrap { perspective: 1000px; height: 180px; }
        .jersey-card-inner {
            position: relative; width: 100%; height: 100%;
            transform-style: preserve-3d;
            animation: rotateJersey 12s infinite linear;
        }
        @keyframes rotateJersey { from { transform: rotateY(0); } to { transform: rotateY(360deg); } }

        .face-jersey {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(145deg, #0a1428, #000);
            border-radius: 20px; border: 2px solid var(--glass-border);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            backface-visibility: hidden;
        }

        .jersey-number { font-size: 4.5rem; font-weight: 900; color: var(--primary-gold); font-family: 'Outfit'; line-height: 1; }

        /* --- ESTADÍSTICAS --- */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .stat-card {
            background: var(--card-bg); border-radius: 12px; padding: 10px 5px;
            text-align: center; border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-val { display: block; font-size: 1.1rem; font-weight: 800; }
        .stat-lab { font-size: 0.55rem; color: var(--text-muted); text-transform: uppercase; }

        /* --- BLOQUES DE INFO --- */
        .section-box {
            background: var(--card-bg); border-radius: 18px; padding: 15px;
            margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05);
        }
        .section-title {
            font-size: 0.8rem; font-weight: 800; color: var(--primary-gold);
            margin-bottom: 12px; text-transform: uppercase; display: flex; align-items: center; gap: 8px;
        }

        .info-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 0.85rem;
        }
        .info-row:last-child { border: none; }
        .info-label { display: flex; align-items: center; gap: 10px; color: var(--text-muted); }
        .info-label i { width: 16px; text-align: center; color: var(--primary-gold); }
        .info-value { font-weight: 700; color: #fff; }

        /* COLORES DINÁMICOS */
        .status-red { color: var(--danger) !important; }
        .status-green { color: var(--success) !important; }

        .btn-sync {
            width: 100%; background: transparent; border: 1px solid var(--primary-gold);
            color: var(--primary-gold); padding: 12px; border-radius: 12px;
            font-weight: 700; font-size: 0.8rem; cursor: pointer; margin-bottom: 15px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: 0.3s;
        }
        .btn-sync:active { background: rgba(212, 175, 55, 0.1); transform: scale(0.98); }

        .btn-logout {
            width: 100%; padding: 15px; border-radius: 15px; border: none;
            background: rgba(231, 76, 60, 0.1); color: #e74c3c;
            font-weight: 800; cursor: pointer; margin-top: 10px;
        }

        .spinner { width: 40px; height: 40px; border: 3px solid rgba(212, 175, 55, 0.1); border-top-color: var(--primary-gold); border-radius: 50%; animation: spin 1s infinite linear; margin: 100px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="profile-container" id="perfilContent">
    <div class="spinner"></div>
</div>

<script src="config.js"></script>
<script>
    const session = JSON.parse(localStorage.getItem('jugador_actual'));
    
    if (!session || !session.cedula) {
        window.location.href = 'login.html';
    } else {
        cargarPerfil(session.cedula);
    }

    async function cargarPerfil(cedula) {
        const container = document.getElementById('perfilContent');
        try {
            const url = `${CONFIG.URL_GAS}?action=getPerfil&cedula=${cedula}&t=${Date.now()}`;
            const resp = await fetch(url);
            const data = await resp.json();
            
            if (data.success && data.jugador) {
                const j = data.jugador;
                
                // Lógica de colores para estados de texto
                const getStatusClass = (val) => {
                    if (!val) return 'status-red';
                    const v = String(val).toUpperCase();
                    if (v.includes('PENDIENTE') || v.includes('DEBE') || v === 'NO') return 'status-red';
                    if (v.includes('PAGADO') || v.includes('ENTREGADO') || v === 'SI' || v === 'OK') return 'status-green';
                    return '';
                };

                container.innerHTML = `
                    <div class="profile-header">
                        <h1>⚜️ PANEL NÁPOLES ⚜️</h1>
                    </div>

                    <div class="cards-row">
                        <!-- TARJETA DE IDENTIDAD -->
                        <div class="id-card-identity">
                            <img src="${j.urlFotoRostro || 'https://via.placeholder.com/150'}" class="player-img">
                            <div style="font-weight:900; font-family:'Outfit'; text-transform:uppercase; font-size:0.9rem;">${j.primerNombre}</div>
                            <div style="font-size:0.6rem; color:var(--text-muted); margin-top:2px;">C.I. ${cedula}</div>
                        </div>

                        <!-- TARJETA DE CAMISETA (GIRO 3D) -->
                        <div class="id-card-jersey-wrap">
                            <div class="jersey-card-inner">
                                <div class="face-jersey">
                                    <div style="font-size:0.7rem; font-weight:800; opacity:0.7; letter-spacing:1px;">${j.nombreCamiseta || 'NÁPOLES'}</div>
                                    <div class="jersey-number">${j.dorsal || '00'}</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <button class="btn-sync" onclick="location.reload()">
                        <i class="fas fa-sync-alt"></i> ACTUALIZAR INFORMACIÓN
                    </button>

                    <!-- ESTADÍSTICAS DE JUEGO -->
                    <div class="stats-grid">
                        <div class="stat-card">
                            <i class="fas fa-running" style="color:var(--primary-gold)"></i>
                            <span class="stat-val">${j.partidosJugados || 0}</span>
                            <span class="stat-lab">P. Jugados</span>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-futbol"></i>
                            <span class="stat-val">${j.goles || 0}</span>
                            <span class="stat-lab">Goles</span>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-clone" style="color:#f1c40f"></i>
                            <span class="stat-val">${j.amarillas || 0}</span>
                            <span class="stat-lab">Amas.</span>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-clone" style="color:#e74c3c"></i>
                            <span class="stat-val">${j.rojas || 0}</span>
                            <span class="stat-lab">Rojas</span>
                        </div>
                    </div>

                    <!-- RENDIMIENTO HUMANO (PROMEDIOS) -->
                    <div class="section-box">
                        <div class="section-title"><i class="fas fa-star"></i> Rendimiento Humano</div>
                        <div class="info-row">
                            <div class="info-label"><i class="fas fa-clock"></i> Puntualidad</div>
                            <div class="info-value">${j.puntualidad || 0}/10</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label"><i class="fas fa-handshake"></i> Compañerismo</div>
                            <div class="info-value">${j.companerismo || 0}/10</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label"><i class="fas fa-balance-scale"></i> Respeto</div>
                            <div class="info-value">${j.respeto || 0}/10</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label"><i class="fas fa-heart"></i> Humildad</div>
                            <div class="info-value">${j.humildad || 0}/10</div>
                        </div>
                    </div>

                    <!-- GESTIÓN ADMINISTRATIVA -->
                    <div class="section-box">
                        <div class="section-title"><i class="fas fa-wallet"></i> Estado Administrativo</div>
                        <div class="info-row">
                            <div class="info-label"><i class="fas fa-exclamation-circle"></i> Deuda Vocalía</div>
                            <div class="info-value ${Number(j.deudaVocalia) > 0 ? 'status-red' : 'status-green'}">$${j.deudaVocalia || 0}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label"><i class="fas fa-file-invoice-dollar"></i> Inscripción</div>
                            <div class="info-value ${getStatusClass(j.inscripEstado)}">${j.inscripEstado || 'PENDIENTE'}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label"><i class="fas fa-tshirt"></i> Uniforme</div>
                            <div class="info-value ${getStatusClass(j.unifEstado)}">${j.unifEstado || 'PENDIENTE'}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label"><i class="fas fa-socks"></i> Medias</div>
                            <div class="info-value ${getStatusClass(j.mediasEstado)}">${(j.mediasEstado === 'null' || !j.mediasEstado) ? 'N/A' : j.mediasEstado}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label"><i class="fas fa-ruler"></i> Talla</div>
                            <div class="info-value" style="color:var(--primary-gold)">${j.tallaUni || 'POR DEFINIR'}</div>
                        </div>
                    </div>

                    <button class="btn-logout" onclick="cerrarSesion()">CERRAR SESIÓN</button>
                    <div style="height: 30px;"></div>
                `;
            } else {
                container.innerHTML = `<p style="text-align:center; padding:50px;">Jugador no encontrado.</p>`;
            }
        } catch (e) {
            console.error(e);
            container.innerHTML = `<p style="text-align:center; padding:50px;">Error de conexión.</p>`;
        }
    }

    function cerrarSesion() {
        localStorage.removeItem('jugador_actual');
        window.location.href = 'login.html';
    }
</script>

</body>
</html>
