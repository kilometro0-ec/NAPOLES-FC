        /* --- FILA DE TARJETAS (ID CARDS) --- */
        .cards-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        /* TARJETA 1: FOTO E IDENTIDAD (PALPITANTE) */
        .id-card-identity {
            background: linear-gradient(145deg, rgba(212, 175, 55, 0.15), rgba(10, 20, 40, 0.95));
            border-radius: 20px;
            border: 2px solid var(--primary-gold);
            padding: 20px 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: pulseGlow 2.5s infinite ease-in-out;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); box-shadow: 0 0 5px rgba(212, 175, 55, 0.2); }
            50% { transform: scale(1.03); box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }
            100% { transform: scale(1); box-shadow: 0 0 5px rgba(212, 175, 55, 0.2); }
        }

        .photo-wrapper {
            position: relative;
            width: 90px;
            margin-bottom: 10px;
        }

        .player-img {
            width: 85px; height: 85px;
            border-radius: 50%;
            border: 2px solid var(--primary-gold);
            object-fit: cover;
            background: #000;
            padding: 3px;
        }

        .ovr-badge {
            position: absolute;
            bottom: 0; right: 0;
            background: var(--primary-gold);
            color: #000;
            width: 34px; height: 34px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1rem;
            border: 2px solid #060912;
            font-family: 'Outfit';
        }

        /* TARJETA 2: CAMISETA (GIRO 3D) */
        .id-card-jersey-wrap {
            perspective: 1000px;
            height: 190px;
        }

        .jersey-card-inner {
            position: relative;
            width: 100%; height: 100%;
            transform-style: preserve-3d;
            animation: rotateJersey 12s infinite linear;
        }

        @keyframes rotateJersey {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        .face-jersey {
            position: absolute;
            width: 100%; height: 100%;
            background: linear-gradient(145deg, #0a1428, #000);
            border-radius: 20px;
            border: 2px solid var(--glass-border);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            backface-visibility: visible;
        }

        .jersey-name {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem; font-weight: 800;
            text-transform: uppercase; color: #fff;
            margin-bottom: -5px;
        }

        .jersey-number {
            font-family: 'Outfit', sans-serif;
            font-size: 4.8rem; font-weight: 900;
            color: var(--primary-gold);
            line-height: 1;
        }

        /* --- BOTÓN ACTUALIZAR --- */
        .sync-container { text-align: center; margin-bottom: 20px; }
        .btn-sync {
            background: transparent;
            border: 1px solid var(--primary-gold);
            color: var(--primary-gold);
            padding: 8px 20px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* --- ESTADÍSTICAS CON ICONOS --- */
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            margin-bottom: 15px; 
        }
        
        .stat-card {
            background: var(--card-bg); 
            border-radius: 15px; 
            padding: 15px;
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        
        .stat-icon { font-size: 1.2rem; margin-bottom: 2px; }
        .stat-val { font-size: 1.4rem; font-weight: 800; color: #fff; font-family: 'Outfit'; }
        .stat-lab { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; }

        /* Iconos específicos */
        .icon-goal { color: #fff; }
        .icon-yellow { color: #f1c40f; }
        .icon-red { color: #e74c3c; }
        .icon-match { color: var(--primary-gold); }

        /* --- BLOQUES DE INFORMACIÓN --- */
        .section-box {
            background: var(--card-bg); border-radius: 20px; padding: 18px;
            margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05);
        }
        .section-title {
            font-size: 0.8rem; font-weight: 800; color: var(--primary-gold);
            margin-bottom: 12px; text-transform: uppercase;
            display: flex; align-items: center; gap: 10px;
        }

        .info-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.85rem; }
        .info-row span:first-child { color: var(--text-muted); }
        .info-row span:last-child { font-weight: 700; color: #fff; }
        .val-gold { color: var(--primary-gold) !important; }

        .btn-logout {
            width: 100%; padding: 15px; border-radius: 15px; border: none;
            background: rgba(231, 76, 60, 0.1); color: #e74c3c;
            font-weight: 800; cursor: pointer; margin-top: 10px;
        }

        .spinner { width: 40px; height: 40px; border: 3px solid rgba(212, 175, 55, 0.1); border-top-color: var(--primary-gold); border-radius: 50%; animation: spin 1s infinite linear; margin: 100px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="profile-container" id="perfilContent">
    <div class="spinner"></div>
</div>

<script src="config.js"></script>
<script>
    const session = JSON.parse(localStorage.getItem('jugador_actual'));
    
    if (!session || !session.cedula || Date.now() > session.expira) {
        localStorage.removeItem('jugador_actual');
        window.location.href = 'login.html';
    } else {
        cargarPerfil(session.cedula);
    }

    async function cargarPerfil(cedula) {
        const container = document.getElementById('perfilContent');
        const ciLimpia = String(cedula).replace(/[^0-9]/g, '');
        
        try {
            const url = `${CONFIG.URL_GAS}?action=getPerfil&cedula=${encodeURIComponent(ciLimpia)}&t=${Date.now()}`;
            const resp = await fetch(url);
            const data = await resp.json();
            
            if (data.success && data.jugador) {
                const j = data.jugador;
                
                // Lógica de valores: Usa el valor de la celda o 0 si está vacía
                const comp = Number(j.companerismo) || 0;
                const respV = Number(j.respeto) || 0;
                const hum = Number(j.humildad) || 0;
                const punt = Number(j.puntualidad) || 0;
                const ovr = Math.round(((comp + respV + hum + punt) / 4) * 10);
                
                const nombreDorso = j.nombreCamiseta || j.primerNombre || 'JUGADOR';

                container.innerHTML = `
                    <div class="profile-header">
                        <h1>⚜️ PERFIL OFICIAL ⚜️</h1>
                    </div>

                    <div class="cards-row">
                        <!-- ID FOTO -->
                        <div class="id-card-identity">
                            <div class="photo-wrapper">
                                <img src="${j.urlFotoRostro || CONFIG.DEFAULT_AVATAR}" class="player-img" onerror="this.src='${CONFIG.DEFAULT_AVATAR}'">
                                <div class="ovr-badge">${ovr}</div>
                            </div>
                            <div style="font-weight:800; font-size:0.95rem;">${escapeHtml(j.primerNombre)}</div>
                            <div style="font-size:0.65rem; color:var(--text-muted);">CI: ${ciLimpia}</div>
                        </div>

                        <!-- ID CAMISETA -->
                        <div class="id-card-jersey-wrap">
                            <div class="jersey-card-inner">
                                <div class="face-jersey">
                                    <div class="jersey-name">${escapeHtml(nombreDorso)}</div>
                                    <div class="jersey-number">${j.dorsal || '00'}</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="sync-container">
                        <button class="btn-sync" onclick="refrescarPerfil()">
                            <i class="fas fa-sync-alt"></i> Sincronizar Datos
                        </button>
                    </div>

                    <!-- ESTADÍSTICAS CON ICONOS -->
                    <div class="stats-grid">
                        <div class="stat-card">
                            <i class="fas fa-stopwatch stat-icon icon-match"></i>
                            <span class="stat-val">${j.partidosJugados || 0}</span>
                            <span class="stat-lab">Partidos</span>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-futbol stat-icon icon-goal"></i>
                            <span class="stat-val">${j.goles || 0}</span>
                            <span class="stat-lab">Goles</span>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-square stat-icon icon-yellow"></i>
                            <span class="stat-val">${j.amarillas || 0}</span>
                            <span class="stat-lab">Amarillas</span>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-square stat-icon icon-red"></i>
                            <span class="stat-val">${j.rojas || 0}</span>
                            <span class="stat-lab">Rojas</span>
                        </div>
                    </div>

                    <div class="section-box">
                        <div class="section-title"><i class="fas fa-chart-pie"></i> Valores Humanos</div>
                        <div class="info-row"><span>Compañerismo</span><span class="val-gold">${comp}/10</span></div>
                        <div class="info-row"><span>Respeto</span><span class="val-gold">${respV}/10</span></div>
                        <div class="info-row"><span>Humildad</span><span class="val-gold">${hum}/10</span></div>
                        <div class="info-row"><span>Puntualidad</span><span class="val-gold">${punt}/10</span></div>
                    </div>

                    <div class="section-box">
                        <div class="section-title"><i class="fas fa-file-invoice"></i> Administrativo</div>
                        <div class="info-row"><span>Deuda Vocalía</span><span style="color:${Number(j.deudaVocalia) > 0 ? '#e74c3c' : '#2ecc71'}">$${j.deudaVocalia || 0}</span></div>
                        <div class="info-row"><span>Inscripción</span><span>${j.inscripEstado || 'PENDIENTE'}</span></div>
                        <div class="info-row"><span>Uniforme</span><span>${j.unifEstado || 'PENDIENTE'}</span></div>
                        <div class="info-row"><span>Talla</span><span class="val-gold">${j.tallaUni || '-'}</span></div>
                    </div>

                    <button class="btn-logout" onclick="cerrarSesion()">CERRAR SESIÓN</button>
                `;
            }
        } catch (e) {
            container.innerHTML = `<div style="text-align:center; padding:50px;">❌ Error de conexión</div>`;
        }
    }

    function refrescarPerfil() { 
        document.getElementById('perfilContent').innerHTML = '<div class="spinner"></div>';
        cargarPerfil(session.cedula); 
    }
    
    function cerrarSesion() { localStorage.removeItem('jugador_actual'); window.location.href = 'login.html'; }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
</script>

</body>
</html>
