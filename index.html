<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registro - Nápoles F.C.</title>
    <link rel="stylesheet" href="estilos.css">
    <!-- Google Fonts para un look más Pro -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="contenedor-principal">
        <header>
            <img src="logo-napoles.png" alt="Logo Nápoles FC" class="logo-equipo">
            <h2>Registro de Jugador</h2>
        </header>

        <form id="formRegistro" onsubmit="event.preventDefault();">
            
            <!-- PASO 1: VALIDACIÓN INICIAL -->
            <div id="paso1" class="seccion-formulario">
                <label>Cédula de Identidad (10 dígitos)</label>
                <input type="number" id="ced" name="cedula" placeholder="Ej: 17255..." required>

                <label>Número de Transacción (Comprobante)</label>
                <input type="text" id="trans" name="transaccion" placeholder="Código de depósito/transferencia" required>

                <button type="button" class="btn-accion" onclick="validarDatosIniciales()">Verificar y Continuar</button>
            </div>

            <!-- PASO 2: DATOS PERSONALES -->
            <div id="paso2" class="seccion-formulario" style="display:none;">
                <label>Primer Nombre</label>
                <input type="text" id="n1" name="nombre1" required>

                <label>Segundo Nombre</label>
                <input type="text" id="n2" name="nombre2">

                <label>Apellidos Completos</label>
                <input type="text" id="ape" name="apellidos" required>

                <label>Fecha de Nacimiento</label>
                <input type="date" name="fechaNac" required>

                <label>Teléfono de Contacto</label>
                <input type="tel" name="telefono" placeholder="099..." required>

                <label>Correo Electrónico</label>
                <input type="email" id="correo" name="correo" required>

                <button type="button" class="btn-accion" onclick="verPaso(3)">Siguiente Paso</button>
            </div>

            <!-- PASO 3: EQUIPACIÓN Y DORSAL -->
            <div id="paso3" class="seccion-formulario" style="display:none;">
                <label>Nombre en la Camiseta</label>
                <select id="selectNombreCamiseta" name="nombreCamiseta" class="input-select">
                    <!-- Se llena automáticamente con JS -->
                </select>

                <label>Selecciona tu Dorsal</label>
                <select id="selectDorsal" name="dorsal" required class="input-select">
                    <option value="">Cargando números disponibles...</option>
                </select>

                <button type="button" class="btn-accion" onclick="verPaso(4)">Último Paso: Fotos</button>
            </div>

            <!-- PASO 4: SEGURIDAD (FOTOS) -->
            <div id="paso4" class="seccion-formulario" style="display:none;">
                <label>Foto del Rostro (Claridad frontal)</label>
                <input type="file" accept="image/*" capture="user" onchange="procesarFoto(this, 'fotoRostroB64')">
                <input type="hidden" id="fotoRostroB64" name="fotoRostroB64">

                <label>Foto de la Cédula (Lado frontal)</label>
                <input type="file" accept="image/*" onchange="procesarFoto(this, 'fotoCedulaB64')">
                <input type="hidden" id="fotoCedulaB64" name="fotoCedulaB64">

                <button type="button" class="btn-accion" onclick="enviarTodo()">Finalizar Registro</button>
            </div>

            <!-- Campo oculto para el estado -->
            <input type="hidden" name="estado" value="PENDIENTE">
        </form>
    </div>

    <!-- PANTALLA DE CARGA PROFESIONAL -->
    <div id="loader">
        <div class="spinner-balon"></div>
        <p>Validando con el Club...</p>
    </div>

    <!-- ANIMACIÓN FINAL DE ÉXITO -->
    <div id="final-animacion">
        <div class="balon-animado"></div>
        <h3 id="final-status">PROCESANDO...</h3>
        <p id="final-mensaje">Estamos guardando tus datos en la base del Nápoles F.C.</p>
    </div>

    <!-- SCRIPTS -->
    <script src="script.js"></script>
    <script src="api.js"></script>
    <script>
        // Función simple para cambiar entre pasos en el HTML
        function verPaso(paso) {
            document.querySelectorAll('.seccion-formulario').forEach(div => div.style.display = 'none');
            document.getElementById('paso' + paso).style.display = 'block';
            window.scrollTo(0,0);
        }

        // Función para convertir fotos a Base64 antes de enviar
        function procesarFoto(input, targetId) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onloadend = function() {
                document.getElementById(targetId).value = reader.result;
            }
            if (file) reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
