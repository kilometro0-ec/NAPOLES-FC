<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nápoles FC - Plataforma Oficial</title>
    <style>
        /* Colores extraídos del uniforme 2026 */
        :root {
            --azul-noche: #1A2B48;
            --cardenillo: #008B94;
            --dorado: #B59461;
            --blanco: #ffffff;
        }

        body {
            background-color: var(--azul-noche);
            color: var(--blanco);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .contenedor {
            background-color: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--dorado);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 { color: var(--dorado); text-align: center; margin-bottom: 25px; }

        label { display: block; margin-top: 15px; font-size: 14px; color: var(--cardenillo); }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid var(--dorado);
            background: transparent;
            color: white;
            box-sizing: border-box;
        }

        .paso { display: none; }
        .paso.activo { display: block; }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 25px;
            border: none;
            border-radius: 8px;
            background-color: var(--cardenillo);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background-color: #00737a; transform: scale(1.02); }

        .btn-secundario { background-color: transparent; border: 1px solid var(--dorado); margin-top: 10px; }
    </style>
</head>
<body>

<div class="contenedor">
    <h2>NÁPOLES FC</h2>
    
    <form id="formularioRegistro">
        <!-- PASO 1: DATOS PERSONALES -->
        <div id="paso1" class="paso activo">
            <label>1er Nombre</label>
            <input type="text" id="nombre1" required>
            
            <label>2do Nombre</label>
            <input type="text" id="nombre2">
            
            <label>Apellidos</label>
            <input type="text" id="apellidos" required>
            
            <label>Cédula</label>
            <input type="number" id="cedula" required>
            
            <button type="button" onclick="irAPaso(2)">Siguiente: Contacto</button>
        </div>

        <!-- PASO 2: CONTACTO -->
        <div id="paso2" class="paso">
            <label>Fecha de Nacimiento</label>
            <input type="date" id="fechaNac">
            
            <label>Teléfono</label>
            <input type="tel" id="telefono">
            
            <label>Correo Electrónico</label>
            <input type="email" id="correo">
            
            <button type="button" onclick="irAPaso(3)">Siguiente: Fotos</button>
            <button type="button" class="btn-secundario" onclick="irAPaso(1)">Volver</button>
        </div>

        <!-- PASO 3: FOTOS -->
        <div id="paso3" class="paso">
            <label>Foto de Rostro (Fondo Blanco)</label>
            <input type="file" id="fotoRostro" accept="image/*">
            
            <label>Foto de Cédula</label>
            <input type="file" id="fotoCedula" accept="image/*">
            
            <button type="submit">FINALIZAR INSCRIPCIÓN</button>
            <button type="button" class="btn-secundario" onclick="irAPaso(2)">Volver</button>
        </div>
    </form>
</div>

<script>
    function irAPaso(paso) {
        document.querySelectorAll('.paso').forEach(p => p.classList.remove('activo'));
        document.getElementById('paso' + paso).classList.add('activo');
    }

    // El código para enviar a Google Sheets irá aquí en el siguiente paso
</script>

</body>
</html>
