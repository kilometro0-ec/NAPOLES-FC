<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nápoles F.C. - Registro Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        /* ==================== RESET Y VARIABLES ==================== */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        :root {
            --azul-noche: #1A2B48;
            --cardenillo: #008B94;
            --dorado: #D4AF37;
            --dorado-oscuro: #B59461;
            --blanco-puro: #ffffff;
            --gris-suave: rgba(255, 255, 255, 0.1);
            --negro-trans: rgba(0, 0, 0, 0.4);
            --rojo-error: #e74c3c;
            --verde-exito: #2ecc71;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #0a1928, #020c1a);
            font-family: 'Inter', 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
        }

        /* ==================== CONTENEDOR PRINCIPAL ==================== */
        .contenedor-principal {
            max-width: 520px;
            width: 100%;
            margin: 20px auto;
            background: rgba(26, 43, 72, 0.75);
            backdrop-filter: blur(18px);
            border-radius: 2rem;
            border: 1px solid rgba(181, 148, 97, 0.4);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(181, 148, 97, 0.15) inset;
            padding: 2rem 1.8rem;
            transition: transform 0.25s ease, box-shadow 0.3s;
            animation: slideUp 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .contenedor-principal:hover {
            transform: translateY(-5px);
            box-shadow: 0 35px 55px rgba(0, 0, 0, 0.5);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ==================== HEADER ==================== */
        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--dorado), #F3D572);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            margin-bottom: 0.4rem;
        }

        .subtitulo {
            color: #b0c4de;
            font-size: 0.85rem;
            font-weight: 400;
        }

        .badge {
            display: inline-block;
            background: rgba(0, 139, 148, 0.2);
            border-radius: 60px;
            padding: 0.3rem 1rem;
            font-size: 0.7rem;
            color: var(--dorado);
            margin-top: 0.6rem;
            font-weight: 500;
        }

        /* ==================== PASOS ==================== */
        .paso {
            display: none;
            animation: fadeSlide 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .paso.activo {
            display: block;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* ==================== CAMPOS ==================== */
        .campo {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #9ab3cf;
            margin-bottom: 0.25rem;
        }

        input, select {
            width: 100%;
            padding: 0.9rem 1.2rem;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(181, 148, 97, 0.5);
            border-radius: 1rem;
            color: white;
            font-size: 1rem;
            font-family: 'Inter', monospace;
            transition: all 0.25s;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--cardenillo);
            box-shadow: 0 0 0 3px rgba(0, 139, 148, 0.3);
            background: rgba(0, 0, 0, 0.7);
            transform: scale(1.01);
        }

        input.error, select.error {
            border-color: var(--rojo-error);
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        input::placeholder, select::placeholder {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85rem;
        }

        select option {
            background: var(--azul-noche);
            color: white;
            padding: 10px;
        }

        .help-note {
            font-size: 0.7rem;
            color: #8db5d0;
            margin-top: 0.3rem;
            margin-left: 0.8rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Mensaje de éxito al subir foto */
        .mensaje-exito-foto {
            color: var(--verde-exito);
            font-size: 0.75rem;
            margin-top: 5px;
            margin-left: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
            animation: fadeInLeft 0.3s ease;
        }

        @keyframes fadeInLeft {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* ==================== BOTONES ==================== */
        .btn-primary {
            background: linear-gradient(105deg, var(--cardenillo), #006b74);
            border: none;
            padding: 0.9rem;
            width: 100%;
            border-radius: 3rem;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: white;
            cursor: pointer;
            margin-top: 1.2rem;
            transition: all 0.25s;
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            background: linear-gradient(105deg, #00a5b3, #00808a);
            box-shadow: 0 10px 20px rgba(0, 139, 148, 0.4);
        }

        .btn-primary:active {
            transform: translateY(1px);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.4s, height 0.4s;
            z-index: -1;
        }

        .btn-primary:active::after {
            width: 200px;
            height: 200px;
        }

        /* Grid para paso 5 */
        .grid-2cols {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* ==================== LOADER ==================== */
        #loader {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
            z-index: 10000;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(212, 175, 55, 0.25);
            border-top: 4px solid var(--dorado);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #loader-texto {
            color: white;
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* ==================== MODAL ÉXITO ==================== */
        #modalExito {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            justify-content: center;
            align-items: center;
            z-index: 10002;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-card {
            background: linear-gradient(145deg, #1A2B48, #0f1a2e);
            border-radius: 2rem;
            padding: 2rem;
            text-align: center;
            border: 2px solid var(--dorado);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            max-width: 320px;
            width: 85%;
            animation: modalZoom 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
        }

        @keyframes modalZoom {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-card h2 {
            color: var(--dorado);
            margin-bottom: 0.8rem;
            font-size: 1.5rem;
        }

        .modal-card p {
            color: white !important;
            font-size: 1rem;
        }

        #contador {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--dorado), #ffd700);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-block;
            min-width: 50px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* ==================== TOASTS ==================== */
        .toast-notification {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px);
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 10001;
            animation: toastSlideUp 0.3s ease forwards;
            border-left: 4px solid var(--dorado);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            font-size: 0.85rem;
            max-width: 90%;
        }

        .toast-notification.error {
            border-left-color: var(--rojo-error);
            background: rgba(30, 20, 20, 0.95);
        }

        .toast-notification.success {
            border-left-color: var(--verde-exito);
            background: rgba(20, 30, 20, 0.95);
        }

        @keyframes toastSlideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* ==================== RESPONSIVE ==================== */
        @media (max-width: 550px) {
            body {
                padding: 1rem;
            }
            .contenedor-principal {
                padding: 1.5rem;
            }
            h1 {
                font-size: 1.5rem;
            }
            input, select, .btn-primary {
                padding: 0.8rem 1rem;
            }
            .grid-2cols {
                grid-template-columns: 1fr;
                gap: 10px;
            }
        }
    </style>
</head>
<body>

<div class="contenedor-principal">
    <header>
        <h1>NÁPOLES F.C.</h1>
        <p class="subtitulo">Formulario de registro oficial</p>
        <div class="badge">🏆 Temporada 2026 - 2027</div>
    </header>

    <form id="formRegistro">
        <!-- PASO 1: CÉDULA -->
        <div id="paso1" class="paso activo">
            <div class="campo">
                <label>🔢 CÉDULA (10 dígitos)</label>
                <input type="text" id="ced" maxlength="10" placeholder="Ej: 1234567890" autocomplete="off">
                <div class="help-note"><span>🔑</span> Ingresa tu número de cédula para empezar</div>
            </div>
            <button type="button" id="btnCedula" class="btn-primary" disabled>Validar cédula</button>
        </div>

        <!-- PASO 2: DATOS PERSONALES -->
        <div id="paso2" class="paso">
            <div class="campo"><label>📝 Primer nombre</label><input type="text" id="n1" placeholder="Ej: LEONARDO"></div>
            <div class="campo"><label>📝 Segundo nombre (opcional)</label><input type="text" id="n2" placeholder="Ej: ADRIAN"></div>
            <div class="campo"><label>📝 Apellidos</label><input type="text" id="ape" placeholder="Ej: MUÑOZ BUENDIA"></div>
            <div class="campo"><label>📅 Fecha de nacimiento</label><input type="date" id="fecha"></div>
            <button type="button" id="btnPaso2" class="btn-primary" disabled>Siguiente</button>
        </div>

        <!-- PASO 3: CONTACTO -->
        <div id="paso3" class="paso">
            <div class="campo"><label>📞 Teléfono (10 dígitos)</label><input type="tel" id="tel" maxlength="10" placeholder="Ej: 0991234567"></div>
            <div class="campo"><label>✉️ Correo electrónico</label><input type="email" id="correo" placeholder="tú@ejemplo.com"></div>
            <button type="button" id="btnPaso3" class="btn-primary" disabled>Siguiente</button>
        </div>

        <!-- PASO 4: FOTOS -->
        <div id="paso4" class="paso">
            <div class="campo">
                <label>📸 Foto de perfil (sonríe)</label>
                <input type="file" id="rostro" accept="image/jpeg,image/png">
                <div id="mensajeRostro" class="mensaje-exito-foto" style="display: none;">✓ Documento subido con éxito</div>
            </div>
            <div class="campo">
                <label>🪪 Foto de tu cédula (frontal)</label>
                <input type="file" id="cedulaFile" accept="image/jpeg,image/png">
                <div id="mensajeCedula" class="mensaje-exito-foto" style="display: none;">✓ Documento subido con éxito</div>
            </div>
            <button type="button" id="btnPaso4" class="btn-primary" disabled>Siguiente</button>
        </div>

        <!-- PASO 5: PERSONALIZA TU ARMADURA -->
        <div id="paso5" class="paso">
            <div class="grid-2cols">
                <div class="campo">
                    <label>🏷️ Nombre en tu camiseta</label>
                    <select id="nombreCamiseta">
                        <option value="">Selecciona</option>
                    </select>
                </div>
                <div class="campo">
                    <label>🔢 Número en tu dorsal</label>
                    <select id="dorsal">
                        <option value="">Selecciona</option>
                    </select>
                </div>
            </div>
            <button type="button" id="btnPaso5" class="btn-primary" disabled>Siguiente</button>
        </div>

        <!-- PASO 6: VALORES -->
        <div id="paso6" class="paso">
            <div class="campo">
                <label>🧦 Medias extras (+$2)</label>
                <select id="medias">
                    <option value="">Selecciona</option>
                    <option value="NO">No</option>
                    <option value="SI">Sí</option>
                </select>
            </div>
            <div class="campo">
                <label>💰 N° transacción inscripción ($5)</label>
                <input id="inscripcion" placeholder="Ej: PAGO-12345">
            </div>
            <div class="campo">
                <label>👕 N° transacción uniforme (abono 75% + medias)</label>
                <input id="uniforme" placeholder="Ej: PAGO-67890">
            </div>
            <button type="button" id="btnFinal" class="btn-primary" disabled>Finalizar registro</button>
        </div>

        <input type="hidden" id="fotoRostroB64">
        <input type="hidden" id="fotoCedulaB64">
    </form>
</div>

<div id="loader">
    <div class="spinner"></div>
    <div id="loader-texto">Procesando...</div>
</div>

<div id="modalExito">
    <div class="modal-card">
        <h2>✅ ¡Registro exitoso!</h2>
        <p>Redirigiendo en <span id="contador">3</span> segundos...</p>
    </div>
</div>

<!-- ✅ SOLO ESTO - ELIMINÉ TODO EL JAVASCRIPT INCRUSTADO -->
<script src="frontend.js"></script>
</body>
</html>
