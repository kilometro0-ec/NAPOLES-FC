<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nápoles F.C. - Registro Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --azul-noche: #1A2B48;
            --cardenillo: #008B94;
            --dorado: #D4AF37;
            --rojo-error: #e74c3c;
            --verde-exito: #2ecc71;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #0a1928, #020c1a);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .contenedor-principal {
            max-width: 520px;
            width: 100%;
            background: rgba(26, 43, 72, 0.75);
            backdrop-filter: blur(18px);
            border-radius: 2rem;
            border: 1px solid rgba(181, 148, 97, 0.4);
            padding: 2rem 1.8rem;
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--dorado), #F3D572);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 0.4rem;
        }

        .subtitulo {
            color: #b0c4de;
            font-size: 0.85rem;
            text-align: center;
        }

        .badge {
            display: block;
            text-align: center;
            background: rgba(0, 139, 148, 0.2);
            border-radius: 60px;
            padding: 0.3rem 1rem;
            font-size: 0.7rem;
            color: var(--dorado);
            margin: 0.6rem auto 0;
            width: fit-content;
        }

        .countdown-container {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 1rem;
            padding: 0.8rem;
            margin-top: 1rem;
            text-align: center;
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .countdown-number {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--dorado), #ffd700);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: block;
        }

        .countdown-label {
            font-size: 0.6rem;
            color: #b0c4de;
        }

        .paso {
            display: none;
            animation: fadeSlide 0.4s ease;
        }

        .paso.activo {
            display: block;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .campo {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: #9ab3cf;
            margin-bottom: 0.25rem;
        }

        input, select {
            width: 100%;
            padding: 0.9rem 1.2rem;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(181, 148, 97, 0.5);
            border-radius: 1rem;
            color: white;
            font-size: 1rem;
            font-family: 'Inter', monospace;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--cardenillo);
            box-shadow: 0 0 0 3px rgba(0, 139, 148, 0.3);
        }

        input.error, select.error {
            border-color: var(--rojo-error);
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .file-input-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .file-input-wrapper input {
            flex: 1;
        }

        .visto-icon {
            font-size: 1.3rem;
            display: none;
        }

        .mensaje-exito-foto {
            color: var(--verde-exito);
            font-size: 0.75rem;
            margin-top: 5px;
            margin-left: 12px;
            display: none;
        }

        .btn-primary {
            background: linear-gradient(105deg, var(--cardenillo), #006b74);
            border: none;
            padding: 0.9rem;
            width: 100%;
            border-radius: 3rem;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            margin-top: 1.2rem;
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            background: linear-gradient(105deg, #00a5b3, #00808a);
        }

        .grid-2cols {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        #loader {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 10000;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(212, 175, 55, 0.25);
            border-top: 4px solid var(--dorado);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #modalExito {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            justify-content: center;
            align-items: center;
            z-index: 10002;
        }

        .modal-card {
            background: linear-gradient(145deg, #1A2B48, #0f1a2e);
            border-radius: 2rem;
            padding: 2rem;
            text-align: center;
            border: 2px solid var(--dorado);
            max-width: 320px;
            width: 85%;
        }

        .modal-card h2 {
            color: var(--dorado);
            margin-bottom: 0.8rem;
        }

        .toast-notification {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 10001;
            border-left: 4px solid var(--dorado);
            font-size: 0.85rem;
        }

        .toast-notification.error {
            border-left-color: var(--rojo-error);
        }

        @media (max-width: 550px) {
            .contenedor-principal {
                padding: 1.5rem;
            }
            .grid-2cols {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="contenedor-principal">
    <h1>⚓ NÁPOLES F.C.</h1>
    <p class="subtitulo">Formulario de registro oficial</p>
    <div class="badge">🏆 Temporada 2026 - 2027</div>
    
    <div class="countdown-container">
        <div class="countdown" id="countdown">
            <div class="countdown-item">
                <span class="countdown-number" id="days">00</span>
                <span class="countdown-label">Días</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="hours">00</span>
                <span class="countdown-label">Horas</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="minutes">00</span>
                <span class="countdown-label">Minutos</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="seconds">00</span>
                <span class="countdown-label">Segundos</span>
            </div>
        </div>
    </div>

    <form id="formRegistro">
        <div id="paso1" class="paso activo">
            <div class="campo">
                <label>🔢 CÉDULA (10 dígitos)</label>
                <input type="text" id="ced" maxlength="10" placeholder="Ej: 1234567890">
            </div>
            <button type="button" id="btnCedula" class="btn-primary" disabled>Validar cédula</button>
        </div>

        <div id="paso2" class="paso">
            <div class="campo"><label>📝 Primer nombre</label><input type="text" id="n1" placeholder="Ej: LEONARDO"></div>
            <div class="campo"><label>📝 Segundo nombre (opcional)</label><input type="text" id="n2" placeholder="Ej: ADRIAN"></div>
            <div class="campo"><label>📝 Apellidos</label><input type="text" id="ape" placeholder="Ej: MUÑOZ BUENDIA"></div>
            <div class="campo"><label>📅 Fecha de nacimiento</label><input type="date" id="fecha"></div>
            <button type="button" id="btnPaso2" class="btn-primary" disabled>Siguiente</button>
        </div>

        <div id="paso3" class="paso">
            <div class="campo"><label>📞 Teléfono (10 dígitos)</label><input type="tel" id="tel" maxlength="10" placeholder="Ej: 0991234567"></div>
            <div class="campo"><label>✉️ Correo electrónico</label><input type="email" id="correo" placeholder="tú@ejemplo.com"></div>
            <button type="button" id="btnPaso3" class="btn-primary" disabled>Siguiente</button>
        </div>

        <div id="paso4" class="paso">
            <div class="campo">
                <label>📸 Foto de perfil</label>
                <div class="file-input-wrapper">
                    <input type="file" id="rostro" accept="image/jpeg,image/png">
                    <span id="vistoRostro" class="visto-icon">✅</span>
                </div>
                <div id="mensajeRostro" class="mensaje-exito-foto">✓ Documento subido</div>
            </div>
            <div class="campo">
                <label>🪪 Foto de cédula</label>
                <div class="file-input-wrapper">
                    <input type="file" id="cedulaFile" accept="image/jpeg,image/png">
                    <span id="vistoCedula" class="visto-icon">✅</span>
                </div>
                <div id="mensajeCedula" class="mensaje-exito-foto">✓ Documento subido</div>
            </div>
            <button type="button" id="btnPaso4" class="btn-primary" disabled>Siguiente</button>
        </div>

        <div id="paso5" class="paso">
            <div class="grid-2cols">
                <div class="campo">
                    <label>🏷️ Nombre en camiseta</label>
                    <select id="nombreCamiseta"><option value="">Selecciona</option></select>
                </div>
                <div class="campo">
                    <label>🔢 Número dorsal</label>
                    <select id="dorsal"><option value="">Selecciona</option></select>
                </div>
            </div>
            <div class="campo">
                <label>🧦 Talla de uniforme</label>
                <select id="tallaUni">
                    <option value="">Selecciona</option>
                    <option value="S">S</option><option value="M">M</option>
                    <option value="L">L</option><option value="XL">XL</option>
                    <option value="XXL">XXL</option>
                </select>
            </div>
            <button type="button" id="btnPaso5" class="btn-primary" disabled>Siguiente</button>
        </div>

        <div id="paso6" class="paso">
            <div class="campo">
                <label>🧦 Medias extras (+$2)</label>
                <select id="medias">
                    <option value="">Selecciona</option>
                    <option value="NO">No</option>
                    <option value="SI">Sí</option>
                </select>
            </div>
            <div class="campo">
                <label>💰 N° transacción inscripción ($5)</label>
                <input id="inscripcion" placeholder="Ej: PAGO-12345">
            </div>
            <div class="campo">
                <label>👕 N° transacción uniforme</label>
                <input id="uniforme" placeholder="Ej: PAGO-67890">
            </div>
            <button type="button" id="btnFinal" class="btn-primary" disabled>Finalizar registro</button>
        </div>

        <input type="hidden" id="fotoRostroB64">
        <input type="hidden" id="fotoCedulaB64">
    </form>
</div>

<div id="loader"><div class="spinner"></div><div id="loader-texto">Procesando...</div></div>
<div id="modalExito"><div class="modal-card"><h2>✅ ¡Registro exitoso!</h2><p>Redirigiendo...</p></div></div>

<script>
    function mostrarToast(mensaje, tipo = 'error') {
        const toast = document.createElement('div');
        toast.className = `toast-notification ${tipo}`;
        toast.innerHTML = `<span>${tipo === 'error' ? '❌' : '✅'}</span><span>${mensaje}</span>`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }

    function mostrarLoader(visible, texto = "Procesando...") {
        document.getElementById('loader').style.display = visible ? "flex" : "none";
        if (texto) document.getElementById('loader-texto').innerText = texto;
    }

    function verPaso(n) {
        document.querySelectorAll(".paso").forEach(p => p.classList.remove("activo"));
        document.getElementById(`paso${n}`).classList.add("activo");
    }

    // Countdown
    function actualizarCountdown() {
        const fechaObjetivo = new Date(2026, 4, 8, 23, 0, 0);
        const ahora = new Date();
        const diferencia = fechaObjetivo - ahora;
        if (diferencia <= 0) return;
        const days = Math.floor(diferencia / (1000*60*60*24));
        const hours = Math.floor((diferencia % (86400000)) / 3600000);
        const minutes = Math.floor((diferencia % 3600000) / 60000);
        const seconds = Math.floor((diferencia % 60000) / 1000);
        document.getElementById('days').textContent = String(days).padStart(2,'0');
        document.getElementById('hours').textContent = String(hours).padStart(2,'0');
        document.getElementById('minutes').textContent = String(minutes).padStart(2,'0');
        document.getElementById('seconds').textContent = String(seconds).padStart(2,'0');
    }
    setInterval(actualizarCountdown, 1000);
    actualizarCountdown();

    // PASO 1
    const ced = document.getElementById('ced');
    const btnCedula = document.getElementById('btnCedula');
    ced.addEventListener('input', () => {
        ced.value = ced.value.replace(/\D/g, '').slice(0,10);
        btnCedula.disabled = ced.value.length !== 10;
    });
    
    btnCedula.addEventListener('click', () => {
        if (ced.value.length !== 10) return;
        mostrarLoader(true, "Validando cédula...");
        google.script.run
            .withSuccessHandler((resultado) => {
                mostrarLoader(false);
                if (resultado.existe) {
                    mostrarToast("⚠️ Esta cédula ya está registrada.", "error");
                } else {
                    mostrarToast("✅ Cédula válida", "success");
                    verPaso(2);
                }
            })
            .withFailureHandler((error) => {
                mostrarLoader(false);
                mostrarToast("Error: " + error.message, "error");
            })
            .validarCedula(ced.value);
    });

    // PASO 2
    const n1 = document.getElementById('n1'), n2 = document.getElementById('n2');
    const ape = document.getElementById('ape'), fecha = document.getElementById('fecha');
    const btnPaso2 = document.getElementById('btnPaso2');
    
    function validarPaso2() {
        btnPaso2.disabled = !(n1.value.trim() && ape.value.trim() && fecha.value);
    }
    [n1, n2, ape, fecha].forEach(el => el.addEventListener('input', validarPaso2));
    
    btnPaso2.addEventListener('click', () => {
        if (!n1.value.trim()) return;
        if (!ape.value.trim()) return;
        if (!fecha.value) return;
        verPaso(3);
    });

    // PASO 3
    const tel = document.getElementById('tel'), correo = document.getElementById('correo');
    const btnPaso3 = document.getElementById('btnPaso3');
    
    function validarPaso3() {
        btnPaso3.disabled = !(tel.value.replace(/\D/g, '').length === 10 && correo.value.includes('@'));
    }
    [tel, correo].forEach(el => el.addEventListener('input', validarPaso3));
    tel.addEventListener('input', e => e.target.value = e.target.value.replace(/\D/g, '').slice(0,10));
    
    btnPaso3.addEventListener('click', () => {
        if (tel.value.replace(/\D/g, '').length !== 10) return;
        if (!correo.value.includes('@')) return;
        verPaso(4);
    });

    // PASO 4 - Fotos
    const rostro = document.getElementById('rostro'), cedulaFile = document.getElementById('cedulaFile');
    const fotoRostroB64 = document.getElementById('fotoRostroB64');
    const fotoCedulaB64 = document.getElementById('fotoCedulaB64');
    const btnPaso4 = document.getElementById('btnPaso4');
    
    function archivoABase64(file, inputHidden, mensajeElem, vistoElem) {
        return new Promise((resolve) => {
            if (!file) return resolve(null);
            const reader = new FileReader();
            reader.onload = () => {
                inputHidden.value = reader.result;
                if (mensajeElem) mensajeElem.style.display = 'flex';
                if (vistoElem) vistoElem.style.display = 'inline-block';
                resolve(true);
            };
            reader.onerror = () => resolve(null);
            reader.readAsDataURL(file);
        });
    }
    
    function verificarFotos() {
        btnPaso4.disabled = !(fotoRostroB64.value && fotoCedulaB64.value);
    }
    
    rostro.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (file && file.size > 2*1024*1024) {
            mostrarToast("Imagen no debe superar 2MB", "error");
            rostro.value = '';
            return;
        }
        await archivoABase64(file, fotoRostroB64, document.getElementById('mensajeRostro'), document.getElementById('vistoRostro'));
        verificarFotos();
    });
    
    cedulaFile.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (file && file.size > 2*1024*1024) {
            mostrarToast("Imagen no debe superar 2MB", "error");
            cedulaFile.value = '';
            return;
        }
        await archivoABase64(file, fotoCedulaB64, document.getElementById('mensajeCedula'), document.getElementById('vistoCedula'));
        verificarFotos();
    });
    
    btnPaso4.addEventListener('click', () => {
        if (!fotoRostroB64.value || !fotoCedulaB64.value) return;
        mostrarLoader(true, "Cargando dorsales...");
        const selectNombre = document.getElementById('nombreCamiseta');
        const selectDorsal = document.getElementById('dorsal');
        selectNombre.innerHTML = '<option value="">Selecciona</option>';
        selectDorsal.innerHTML = '<option value="">Selecciona</option>';
        selectNombre.add(new Option(n1.value.trim(), n1.value.trim()));
        if (n2.value.trim()) selectNombre.add(new Option(n2.value.trim(), n2.value.trim()));
        
        google.script.run
            .withSuccessHandler((ocupados) => {
                for (let i = 1; i <= 99; i++) {
                    if (!ocupados.includes(String(i))) {
                        selectDorsal.add(new Option(i, i));
                    }
                }
                mostrarLoader(false);
                verPaso(5);
            })
            .withFailureHandler((error) => {
                mostrarLoader(false);
                mostrarToast("Error: " + error.message, "error");
            })
            .obtenerDorsalesOcupados();
    });

    // PASO 5
    const nombreCamiseta = document.getElementById('nombreCamiseta');
    const dorsal = document.getElementById('dorsal');
    const tallaUni = document.getElementById('tallaUni');
    const btnPaso5 = document.getElementById('btnPaso5');
    
    function validarPaso5() {
        btnPaso5.disabled = !(nombreCamiseta.value && dorsal.value && tallaUni.value);
    }
    [nombreCamiseta, dorsal, tallaUni].forEach(el => el.addEventListener('change', validarPaso5));
    
    btnPaso5.addEventListener('click', () => {
        if (!nombreCamiseta.value || !dorsal.value || !tallaUni.value) return;
        verPaso(6);
    });

    // PASO 6
    const medias = document.getElementById('medias');
    const inscripcion = document.getElementById('inscripcion');
    const uniforme = document.getElementById('uniforme');
    const btnFinal = document.getElementById('btnFinal');
    
    function validarPaso6() {
        btnFinal.disabled = !(medias.value && inscripcion.value.trim() && uniforme.value.trim());
    }
    [medias, inscripcion, uniforme].forEach(el => el.addEventListener('input', validarPaso6));
    
    btnFinal.addEventListener('click', () => {
        if (btnFinal.disabled) return;
        mostrarLoader(true, "Registrando jugador...");
        
        const datos = {
            cedula: ced.value,
            primerNombre: n1.value.trim(),
            segundoNombre: n2.value.trim(),
            apellidos: ape.value.trim(),
            fechaNacimiento: fecha.value,
            telefono: tel.value.replace(/\D/g, ''),
            correo: correo.value.trim().toLowerCase(),
            fotoRostro: fotoRostroB64.value,
            fotoCedula: fotoCedulaB64.value,
            nombreCamiseta: nombreCamiseta.value,
            dorsal: dorsal.value,
            tallaUniforme: tallaUni.value,
            mediasExtras: medias.value,
            transaccionInscripcion: inscripcion.value.trim(),
            transaccionUniforme: uniforme.value.trim()
        };
        
        google.script.run
            .withSuccessHandler((resultado) => {
                mostrarLoader(false);
                if (resultado.ok) {
                    document.getElementById('modalExito').style.display = 'flex';
                    setTimeout(() => {
                        window.location.reload();
                    }, 3000);
                } else {
                    mostrarToast("❌ Error: " + resultado.mensaje, "error");
                }
            })
            .withFailureHandler((error) => {
                mostrarLoader(false);
                mostrarToast("Error: " + error.message, "error");
            })
            .registrarJugador(datos);
    });
</script>
</body>
</html>
