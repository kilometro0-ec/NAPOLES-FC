<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nápoles F.C. - Registro</title>
<link rel="stylesheet" href="estilos.css">
<style>
/* Estilos mínimos adicionales (complemento) */
.paso { display: none; }
.paso.activo { display: block; animation: fade 0.3s ease; }
@keyframes fade {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
.btn-accion:disabled, button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
}
#loader {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    color: #fff;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 9999;
}
.visto-img {
    display: inline-block;
    margin-left: 10px;
    font-weight: bold;
    font-size: 1.2rem;
}
</style>
</head>
<body>

<div class="contenedor-principal">
    <header>
        <h2>NÁPOLES F.C.</h2>
        <p>Registro oficial</p>
    </header>

    <form id="formRegistro">
        <!-- PASO 1 -->
        <div id="paso1" class="paso activo">
            <input type="text" id="ced" maxlength="10" placeholder="CÉDULA (10 dígitos)" autocomplete="off">
            <button type="button" id="btnCedula" class="btn-accion" disabled>VALIDAR</button>
        </div>

        <!-- PASO 2 -->
        <div id="paso2" class="paso">
            <input type="text" id="n1" placeholder="PRIMER NOMBRE">
            <input type="text" id="n2" placeholder="SEGUNDO NOMBRE (OBLIGATORIO)">
            <input type="text" id="ape" placeholder="APELLIDOS">
            <input type="date" id="fecha" placeholder="FECHA DE NACIMIENTO">
            <button type="button" id="btnPaso2" class="btn-accion" disabled>SIGUIENTE</button>
        </div>

        <!-- PASO 3 -->
        <div id="paso3" class="paso">
            <input type="tel" id="tel" maxlength="10" placeholder="TELÉFONO (10 dígitos)">
            <input type="email" id="correo" placeholder="CORREO ELECTRÓNICO">
            <button type="button" id="btnPaso3" class="btn-accion" disabled>SIGUIENTE</button>
        </div>

        <!-- PASO 4 -->
        <div id="paso4" class="paso">
            <h3>FOTO PERFIL</h3>
            <input type="file" id="rostro" accept="image/jpeg,image/png">
            <span id="vistoRostro" class="visto-img"></span>
            <h3>FOTO CÉDULA</h3>
            <input type="file" id="cedulaFile" accept="image/jpeg,image/png">
            <span id="vistoCedula" class="visto-img"></span>
            <button type="button" id="btnPaso4" class="btn-accion" disabled>SIGUIENTE</button>
        </div>

        <!-- PASO 5 -->
        <div id="paso5" class="paso">
            <h3>ARMADURA</h3>
            <select id="nombreCamiseta"></select>
            <select id="dorsal"></select>
            <button type="button" id="btnPaso5" class="btn-accion" disabled>SIGUIENTE</button>
        </div>

        <!-- PASO 6 -->
        <div id="paso6" class="paso">
            <select id="medias">
                <option value="">¿MEDIAS EXTRAS? (+$2)</option>
                <option value="NO">NO</option>
                <option value="SI">SI</option>
            </select>
            <input type="text" id="inscripcion" placeholder="N° TRANSACCIÓN INSCRIPCIÓN ($5)">
            <input type="text" id="uniforme" placeholder="N° TRANSACCIÓN UNIFORME ($18 + medias)">
            <button type="button" id="btnFinal" class="btn-accion" disabled>FINALIZAR</button>
        </div>

        <!-- Campos ocultos para imágenes base64 -->
        <input type="hidden" id="fotoRostroB64">
        <input type="hidden" id="fotoCedulaB64">
    </form>
</div>

<!-- Loader -->
<div id="loader">
    <div class="spinner-balon"></div>
    <h3 id="loader-texto">Procesando...</h3>
</div>

<!-- Modal de éxito -->
<div id="modalExito">
    <div class="modal-content">
        <h2>🎉 ¡REGISTRO EXITOSO! 🎉</h2>
        <p>Bienvenido a Nápoles F.C.</p>
        <p>Redirigiendo en <span id="contador">3</span> segundos...</p>
        <div style="margin-top:20px;">
            <div class="spinner-balon" style="width:40px; height:40px; margin:0 auto;"></div>
        </div>
    </div>
</div>

<script src="frontend.js"></script>
</body>
</html>
