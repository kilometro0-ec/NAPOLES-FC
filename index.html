<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro - Nápoles F.C.</title>

<link rel="icon" href="favicon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1A2B48">

<link rel="stylesheet" href="estilos.css">

<style>
.nav-napoles{display:none !important;}

.paso{display:none;}
.paso.activo{display:block;animation:fade .3s ease;}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

.btn-accion:disabled{
opacity:.4;
pointer-events:none;
}

.btn-accion.loading{
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(.96)}
100%{transform:scale(1)}
}

#contenedor-camara{
position:relative;
width:280px;
height:280px;
margin:20px auto;
border-radius:20px;
overflow:hidden;
border:2px solid #B59461;
}

#video,#previewCamara{
width:100%;
height:100%;
object-fit:cover;
transform:scaleX(-1);
}

#previewCamara{
position:absolute;
top:0;
left:0;
display:none;
}

.guia{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:200px;
height:200px;
border:3px dashed #fff;
border-radius:50%;
box-shadow:0 0 0 1000px rgba(0,0,0,.5);
}

#loader{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
backdrop-filter:blur(6px);
justify-content:center;
align-items:center;
flex-direction:column;
color:#fff;
}
</style>

</head>

<body>

<div class="contenedor-principal">

<header>
<h2>NAPOLES F.C.</h2>
<p>Ficha de inscripción - Temporada 2026</p>
</header>

<form id="formRegistro">

<!-- PASO 1 -->
<div id="paso1" class="paso activo">
<input id="ced" maxlength="10" placeholder="CÉDULA">
<button type="button" id="btnCedula" class="btn-accion" disabled>VALIDAR</button>
</div>

<!-- PASO 2 -->
<div id="paso2" class="paso">
<input id="ced2" readonly>
<input id="n1" placeholder="PRIMER NOMBRE">
<input id="ape" placeholder="APELLIDOS">
<input type="date" id="fecha">
<button type="button" id="btnPaso2" class="btn-accion" disabled>SIGUIENTE</button>
</div>

<!-- PASO 3 -->
<div id="paso3" class="paso">
<input id="tel" placeholder="09XXXXXXXX">
<input id="correo" placeholder="correo@email.com">
<button type="button" id="btnPaso3" class="btn-accion" disabled>SIGUIENTE</button>
</div>

<!-- PASO 4 -->
<div id="paso4" class="paso">
<div id="contenedor-camara">
<video id="video" autoplay></video>
<img id="previewCamara">
<div class="guia"></div>
</div>

<button type="button" id="btnCamara">Activar Cámara</button>
<button type="button" id="btnFoto">Capturar</button>
<input type="file" id="cedulaFile">
<button type="button" id="btnPaso4" class="btn-accion" disabled>SIGUIENTE</button>
</div>

<!-- PASO 5 -->
<div id="paso5" class="paso">
<select id="nombreCamiseta"></select>
<select id="dorsal"></select>
<button type="button" id="btnPaso5" class="btn-accion" disabled>SIGUIENTE</button>
</div>

<!-- PASO 6 -->
<div id="paso6" class="paso">
<select id="medias">
<option value="">Medias extras</option>
<option value="NO">NO</option>
<option value="SI">SI</option>
</select>

<input id="inscripcion" placeholder="Pago inscripción">
<input id="uniforme" placeholder="Pago uniforme">

<button type="button" id="btnFinal" class="btn-accion" disabled>FINALIZAR</button>
</div>

<input type="hidden" id="fotoRostroB64">
<input type="hidden" id="fotoCedulaB64">

</form>

</div>

<div id="loader">
<p>Procesando...</p>
</div>

<script src="api.js"></script>

<script>

// 🔥 APK LINK
const APK_URL = "https://TU-USUARIO.github.io/TU-REPO/apk/miapp.apk";

// evitar submit
formRegistro.onsubmit = e => e.preventDefault();

// PASO FINAL
btnFinal.onclick = async () => {

loader.style.display = "flex";

await enviarRegistro();

loader.style.display = "none";

// 🔥 DESCARGA APK
const link = document.createElement("a");
link.href = APK_URL;
link.download = "NapolisFC.apk";
document.body.appendChild(link);
link.click();
document.body.removeChild(link);

// 🔥 REDIRECCIÓN
setTimeout(() => {
window.location.href = "login.html";
}, 1200);

};

</script>

</body>
</html>
