<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro - Nápoles F.C.</title>

<link rel="icon" href="favicon.png">
<link rel="stylesheet" href="estilos.css">

<style>
.paso{display:none;}
.paso.activo{display:block;}

.btn-accion:disabled{
    opacity:0.4;
    pointer-events:none;
}

.btn-accion.loading{
    animation:pulse 1s infinite;
}

@keyframes pulse{
    0%{transform:scale(1)}
    50%{transform:scale(0.96)}
    100%{transform:scale(1)}
}

/* LOADER PRO */
#loader{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(26,43,72,0.95);
    z-index:9999;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.spinner-balon{
    width:60px;
    height:60px;
    border:5px solid rgba(255,255,255,0.2);
    border-top:5px solid #B59461;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin-bottom:15px;
}

@keyframes spin{
    to{transform:rotate(360deg)}
}

/* CAMARA */
#contenedor-camara{
    position:relative;
    width:280px;
    height:280px;
    margin:20px auto;
    border-radius:20px;
    overflow:hidden;
    border:2px solid #B59461;
}

#video, #previewCamara{
    width:100%;
    height:100%;
    object-fit:cover;
    transform:scaleX(-1);
}

#previewCamara{
    position:absolute;
    top:0;
    left:0;
    display:none;
}
</style>
</head>

<body>

<div class="contenedor-principal">

<h2>NAPOLES F.C.</h2>

<form id="formRegistro">

<!-- PASO 1 -->
<div id="paso1" class="paso activo">
<input id="ced" maxlength="10" placeholder="Cédula (10 dígitos)">
<button type="button" id="btnCedula" class="btn-accion" disabled>
VALIDAR JUGADOR
</button>
</div>

<!-- PASO 2 -->
<div id="paso2" class="paso">
<input id="ced2" readonly>

<input id="n1" placeholder="Primer Nombre">
<input id="n2" placeholder="Segundo Nombre">
<input id="ape" placeholder="Apellidos">

<input type="date" id="fecha">

<button type="button" id="btnPaso2" class="btn-accion" disabled>SIGUIENTE</button>
</div>

<!-- PASO 3 -->
<div id="paso3" class="paso">
<input id="tel" placeholder="09XXXXXXXX">
<input id="correo" placeholder="correo@email.com">

<button type="button" id="btnPaso3" class="btn-accion" disabled>SIGUIENTE</button>
</div>

<!-- PASO 4 -->
<div id="paso4" class="paso">

<div id="contenedor-camara">
<video id="video" autoplay></video>
<img id="previewCamara">
</div>

<button type="button" id="btnCamara" class="btn-accion">Activar Cámara</button>
<button type="button" id="btnFoto" class="btn-accion" style="background:#B59461">
Capturar Foto
</button>

<input type="file" id="cedulaFile">

<button type="button" id="btnPaso4" class="btn-accion" disabled>SIGUIENTE</button>
</div>

<!-- PASO 5 -->
<div id="paso5" class="paso">

<h3>⚔️ Escoge tu Armadura</h3>

<select id="nombreCamiseta"></select>
<select id="dorsal"></select>

<button type="button" id="btnPaso5" class="btn-accion" disabled>SIGUIENTE</button>
</div>

<!-- PASO 6 -->
<div id="paso6" class="paso">

<select id="medias">
<option value="">Medias</option>
<option>NO</option>
<option>SI</option>
</select>

<input id="inscripcion" maxlength="10" placeholder="Comprobante ($5)">
<input id="uniforme" maxlength="10" placeholder="Comprobante ($18)">

<button type="button" id="btnFinal" class="btn-accion" disabled>
FINALIZAR
</button>

</div>

<input type="hidden" id="fotoRostroB64">

</form>
</div>

<!-- LOADER -->
<div id="loader">
<div class="spinner-balon"></div>
<p id="loader-texto">Procesando...</p>
</div>

<script src="api.js"></script>

<script>

// evitar recarga
formRegistro.addEventListener("submit",e=>e.preventDefault());

let fotoCapturada = false;

// ================= PASO 1 =================
ced.oninput = ()=>{
    btnCedula.disabled = ced.value.length !== 10;
};

btnCedula.onclick = async ()=>{

    btnCedula.classList.add("loading");
    loader(true,"Validando cédula...");

    const r = await validarCedulaServidor(ced.value);

    if(!r.ok){
        alert("❌ " + r.msg);
        loader(false);
        btnCedula.classList.remove("loading");
        return;
    }

    loader(true,"Cédula validada ✔");

    setTimeout(()=>{
        ced2.value = ced.value;
        ced.readOnly = true;
        ced.style.opacity = "0.6";

        verPaso(2);

        loader(false);
        btnCedula.classList.remove("loading");
    },800);
};

// ================= PASO 2 =================
[n1,ape,fecha].forEach(i=>{
    i.oninput = ()=>btnPaso2.disabled = !(n1.value && ape.value && fecha.value);
});
btnPaso2.onclick = ()=>verPaso(3);

// ================= PASO 3 =================
[tel,correo].forEach(i=>{
    i.oninput = ()=>{
        btnPaso3.disabled = !( /^09\d{8}$/.test(tel.value) && /\S+@\S+\.\S+/.test(correo.value));
    }
});
btnPaso3.onclick = ()=>verPaso(4);

// ================= CAMARA =================
btnCamara.onclick = iniciarCamara;

btnFoto.onclick = ()=>{
    capturarFoto();

    previewCamara.style.display="block";
    video.style.display="none";

    fotoCapturada = true;
    validarPaso4();
};

// ================= PASO 4 =================
function validarPaso4(){
    btnPaso4.disabled = !(fotoCapturada && cedulaFile.files.length > 0);
}

cedulaFile.onchange = validarPaso4;

btnPaso4.onclick = async ()=>{
    await cargarArmadura();
    verPaso(5);
};

// ================= PASO 5 =================
[nombreCamiseta,dorsal].forEach(s=>{
    s.onchange = ()=>{
        btnPaso5.disabled = !(nombreCamiseta.value && dorsal.value);
    };
});
btnPaso5.onclick = ()=>verPaso(6);

// ================= PASO 6 =================
[medias,inscripcion,uniforme].forEach(i=>{
    i.oninput = ()=>{
        btnFinal.disabled = !(medias.value && inscripcion.value.length===10 && uniforme.value.length===10);
    };
});

btnFinal.onclick = ()=>enviarRegistro();

</script>

</body>
</html>
