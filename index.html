<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registro | Nápoles FC</title>
    
    <!-- Enlaces a tus archivos -->
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="estilos.css">
    
    <style>
        /* Clases de utilidad para la lógica de pasos que no estaban en tu CSS */
        .paso-contenido { display: none; }
        .paso-activo { display: block; animation: fadeIn 0.4s ease; }
        
        .progreso-puntos { 
            display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; 
        }
        .punto { 
            width: 10px; height: 10px; border-radius: 50%; background: var(--gris-suave); 
            border: 1px solid var(--dorado); 
        }
        .punto.activo { background: var(--dorado); transform: scale(1.2); }

        #video, #preview { 
            width: 100%; border-radius: 10px; border: 1px solid var(--dorado); 
            background: #000; margin-top: 10px; transform: scaleX(-1);
        }

        #loader {
            display: none; position: fixed; inset: 0; 
            background: rgba(26, 43, 72, 0.95); z-index: 9999;
            text-align: center; padding-top: 40vh;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="loader">
        <h2 style="color: var(--blanco-puro);">ENVIANDO DATOS...</h2>
        <p style="color: var(--dorado);">Espera un momento</p>
    </div>

    <div class="contenedor-principal">
        <header>
            <h2>Nápoles F.C.</h2>
            <div class="progreso-puntos">
                <div id="p1" class="punto activo"></div>
                <div id="p2" class="punto"></div>
                <div id="p3" class="punto"></div>
            </div>
        </header>

        <form id="formRegistro">
            
            <!-- PASO 1: Identidad -->
            <div id="step1" class="paso-contenido paso-activo">
                <label>Información Personal</label>
                <input type="text" name="nombre1" placeholder="Primer Nombre" required>
                <input type="text" name="nombre2" placeholder="Segundo Nombre">
                <input type="text" name="apellidos" placeholder="Apellidos Completos" required>
                <input type="text" name="cedula" placeholder="Cédula de Identidad" required>
                
                <button type="button" class="btn-accion" onclick="verPaso(2)">Siguiente</button>
            </div>

            <!-- PASO 2: Deporte -->
            <div id="step2" class="paso-contenido">
                <label>Datos Deportivos</label>
                <input type="date" name="fechaNac" required>
                <input type="tel" name="telefono" placeholder="WhatsApp (Ej: 0987654321)" required>
                <input type="text" name="nombreCamiseta" placeholder="Nombre en Camiseta">
                <input type="number" name="dorsal" placeholder="Número de Dorsal">
                
                <div style="display: flex; gap: 10px;">
                    <button type="button" class="btn-accion" style="background: #444;" onclick="verPaso(1)">Atrás</button>
                    <button type="button" class="btn-accion" onclick="verPaso(3)">Siguiente</button>
                </div>
            </div>

            <!-- PASO 3: Foto -->
            <div id="step3" class="paso-contenido">
                <label>Foto Oficial</label>
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas" style="display:none;"></canvas>
                <img id="preview" style="display:none;">
                
                <input type="hidden" id="fotoRostroB64" name="fotoRostroB64">
                
                <button type="button" id="btnCapturar" class="btn-accion" style="background: var(--dorado);">📷 CAPTURAR FOTO</button>
                
                <div style="display: flex; gap: 10px;">
                    <button type="button" class="btn-accion" style="background: #444;" onclick="verPaso(2)">Atrás</button>
                    <button type="submit" class="btn-accion">FINALIZAR</button>
                </div>
            </div>
        </form>
    </div>

    <!-- Scripts -->
    <script src="nav.js"></script>
    <script src="api.js"></script>

    <script>
        let stream;

        async function iniciarCamara() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById('video').srcObject = stream;
            } catch (e) { alert("Cámara no disponible."); }
        }

        function verPaso(n) {
            document.querySelectorAll('.paso-contenido').forEach(p => p.classList.remove('paso-activo'));
            document.querySelectorAll('.punto').forEach(p => p.classList.remove('activo'));
            
            document.getElementById('step' + n).classList.add('paso-activo');
            document.getElementById('p' + n).classList.add('activo');
            
            if(n === 3) iniciarCamara();
        }

        document.getElementById('btnCapturar').onclick = () => {
            const v = document.getElementById('video');
            const c = document.getElementById('canvas');
            const p = document.getElementById('preview');
            const b = document.getElementById('btnCapturar');

            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            const data = c.toDataURL('image/jpeg', 0.8);
            
            document.getElementById('fotoRostroB64').value = data;
            p.src = data;
            p.style.display = 'block';
            v.style.display = 'none';
            b.innerText = "🔄 REPETIR FOTO";
            
            if(stream) stream.getTracks().forEach(t => t.stop());
            
            b.onclick = () => { 
                p.style.display = 'none'; 
                v.style.display = 'block'; 
                b.innerText = "📷 CAPTURAR FOTO";
                iniciarCamara();
                // Re-asignar el click original
                location.reload(); 
            };
        };
    </script>
</body>
</html>
