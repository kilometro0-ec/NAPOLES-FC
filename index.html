<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nápoles F.C. · Gol de Oro · Inscripciones</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --azul-noche: #0a1a2f;
            --dorado: #F5B81B;
            --rojo-error: #e74c3c;
            --verde-exito: #2ecc71;
        }
        body {
            background: radial-gradient(circle at 20% 30%, #0a1428, #01060f);
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .contenedor-principal {
            max-width: 540px;
            width: 100%;
            background: rgba(10, 26, 47, 0.85);
            backdrop-filter: blur(18px);
            border-radius: 2rem;
            border: 2px solid rgba(245, 184, 27, 0.6);
            padding: 2rem 1.8rem;
            animation: slideUp 0.6s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #F9D976, #F39F1A);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
        }
        .golden-extra-container {
            background: rgba(0,0,0,0.5);
            border-radius: 1.8rem;
            padding: 1rem;
            text-align: center;
            margin: 1rem 0;
            border: 1px solid var(--dorado);
        }
        .golden-message { font-size: 1.5rem; font-weight: 800; color: #FFDD88; }
        .paso { display: none; animation: fade 0.3s ease; }
        .paso.activo { display: block; }
        @keyframes fade { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .campo { margin-bottom: 1.2rem; }
        label { display: block; font-size: 0.75rem; font-weight: 700; color: #FFE2A4; margin-bottom: 0.25rem; }
        input, select {
            width: 100%;
            padding: 0.9rem 1.2rem;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(245, 184, 27, 0.6);
            border-radius: 1rem;
            color: white;
            font-size: 1rem;
        }
        input:focus, select:focus { border-color: var(--dorado); outline: none; box-shadow: 0 0 0 3px rgba(245,184,27,0.4); }
        .btn-primary {
            background: linear-gradient(105deg, #D4AF37, #B47C00);
            border: none;
            padding: 0.9rem;
            width: 100%;
            border-radius: 3rem;
            font-weight: 800;
            text-transform: uppercase;
            color: #0a1e2c;
            cursor: pointer;
            margin-top: 1.2rem;
        }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .grid-2cols { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .conditional-field { display: none; margin-top: 0.5rem; }
        .conditional-field.visible { display: block; }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #0A1428ee;
            backdrop-filter: blur(12px);
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            z-index: 10001;
            border-left: 5px solid var(--dorado);
        }
        #loader {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(245,184,27,0.3);
            border-top: 4px solid var(--dorado);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 550px) { .contenedor-principal { padding: 1.3rem; } .grid-2cols { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="contenedor-principal">
    <h1>⚽ NÁPOLES F.C. ⚽</h1>
    <div class="golden-extra-container">
        <div class="golden-message">⚡ GOL DE ORO ⚡</div>
        <div class="golden-sub">Cierre: Viernes 11:00 PM</div>
    </div>

    <form id="formRegistro">
        <!-- PASO 1: Cédula -->
        <div id="paso1" class="paso activo">
            <div class="campo"><label>🔢 CÉDULA (10 dígitos)</label><input type="text" id="ced" maxlength="10" placeholder="Ej: 1234567890"></div>
            <button type="button" id="btnCedula" class="btn-primary" disabled>Validar cédula</button>
        </div>

        <!-- PASO 2: Nombres y fecha -->
        <div id="paso2" class="paso">
            <div class="campo"><label>Primer nombre</label><input type="text" id="n1"></div>
            <div class="campo"><label>Segundo nombre (opcional)</label><input type="text" id="n2"></div>
            <div class="campo"><label>Apellidos</label><input type="text" id="ape"></div>
            <div class="campo"><label>Fecha de nacimiento</label><input type="date" id="fecha"></div>
            <button type="button" id="btnPaso2" class="btn-primary" disabled>Siguiente</button>
        </div>

        <!-- PASO 3: Contacto -->
        <div id="paso3" class="paso">
            <div class="campo"><label>Teléfono (10 dígitos)</label><input type="tel" id="tel" maxlength="10"></div>
            <div class="campo"><label>Correo electrónico</label><input type="email" id="correo"></div>
            <button type="button" id="btnPaso3" class="btn-primary" disabled>Siguiente</button>
        </div>

        <!-- PASO 4: Fotos -->
        <div id="paso4" class="paso">
            <div class="campo"><label>📸 Foto de perfil</label><input type="file" id="rostro" accept="image/jpeg,image/png"></div>
            <div class="campo"><label>🪪 Foto de cédula (frontal)</label><input type="file" id="cedulaFile" accept="image/jpeg,image/png"></div>
            <button type="button" id="btnPaso4" class="btn-primary" disabled>Siguiente</button>
        </div>

        <!-- PASO 5: Dorsal y nombre camiseta -->
        <div id="paso5" class="paso">
            <div class="grid-2cols">
                <div class="campo"><label>Nombre en camiseta</label><select id="nombreCamiseta"><option value="">Selecciona</option></select></div>
                <div class="campo"><label>Número de dorsal</label><select id="dorsal"><option value="">Selecciona</option></select></div>
            </div>
            <button type="button" id="btnPaso5" class="btn-primary" disabled>Siguiente</button>
        </div>

        <!-- PASO 6: Categoría, talla, medias, pagos -->
        <div id="paso6" class="paso">
            <div class="campo"><label>⚧ Categoría</label>
                <select id="categoria" required>
                    <option value="">Selecciona</option>
                    <option value="Masculino">Masculino</option>
                    <option value="Femenino">Femenino</option>
                </select>
            </div>
            <div class="campo"><label>👕 Talla de uniforme</label>
                <select id="talla">
                    <option value="">Selecciona</option>
                    <option value="38">38</option><option value="40">40</option><option value="42">42</option>
                    <option value="44">44</option><option value="46">46</option><option value="48">48</option>
                </select>
            </div>
            <div class="campo"><label>🧦 Medias extras (+$2)</label>
                <select id="medias"><option value="">Selecciona</option><option value="NO">No</option><option value="SI">Sí</option></select>
            </div>

            <!-- Pago de inscripción -->
            <div class="campo"><label>💰 N° transferencia inscripción ($5) - solo números 5 a 10 dígitos</label>
                <input type="text" id="inscripcion" placeholder="Ej: 123456789" pattern="\d{5,10}">
            </div>

            <!-- Pago del uniforme -->
            <div class="campo"><label>👕 ¿Pagaste el uniforme? ($17)</label>
                <select id="pagoUniformeOpcion">
                    <option value="">Selecciona</option>
                    <option value="SI">Sí, ya pagué</option>
                    <option value="NO">No pagaré hoy, prometo pagar</option>
                </select>
            </div>
            <div id="campoTransaccionUni" class="conditional-field">
                <label>🔢 N° transferencia uniforme (5 a 10 dígitos)</label>
                <input type="text" id="transaccionUniforme" placeholder="Ej: 987654321" pattern="\d{5,10}">
            </div>
            <div id="campoFechaPromesa" class="conditional-field">
                <label>📅 Fecha compromiso de pago (máximo 5 días desde hoy)</label>
                <input type="date" id="fechaPromesaPago">
            </div>

            <button type="button" id="btnFinal" class="btn-primary" disabled>⚽ FINALIZAR REGISTRO ⚽</button>
        </div>

        <input type="hidden" id="fotoRostroB64">
        <input type="hidden" id="fotoCedulaB64">
    </form>
</div>

<div id="loader"><div class="spinner"></div><div id="loader-texto">Procesando...</div></div>

<script src="config.js"></script>
<script>
    (function(){
        if(typeof CONFIG === 'undefined' || !CONFIG.URL_GAS){
            alert("Error crítico: config.js no encontrado o URL no definida.");
            return;
        }
        const URL_GAS = CONFIG.URL_GAS;
        let registroAbierto = true;

        // ----- Toast -----
        function mostrarToast(mensaje, tipo='info', duracion=4000){
            const existing = document.querySelector('.toast');
            if(existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<span>${tipo==='error'?'❌':tipo==='success'?'✅':'⚡'}</span> ${mensaje}`;
            document.body.appendChild(toast);
            setTimeout(()=> toast.remove(), duracion);
        }

        function mostrarLoader(visible, texto="Procesando..."){ 
            const loader = document.getElementById('loader');
            loader.style.display = visible ? "flex" : "none";
            if(texto) document.getElementById('loader-texto').innerText = texto;
        }

        function verPaso(n){ 
            document.querySelectorAll(".paso").forEach(p=>p.classList.remove("activo")); 
            document.getElementById(`paso${n}`).classList.add("activo"); 
        }

        function marcarError(input, msg){ 
            input.classList.add('error'); 
            mostrarToast(msg, "error", 2500); 
            setTimeout(()=>input.classList.remove('error'),500); 
        }

        // ----- Verificar fecha límite -----
        async function verificarEstadoRegistro(){
            mostrarLoader(true, "Verificando plazo...");
            try{
                const resp = await fetch(`${URL_GAS}?action=checkRegistrationOpen`);
                const data = await resp.json();
                registroAbierto = data.open === true;
                if(!registroAbierto){
                    document.querySelectorAll('input, select, button').forEach(el => el.disabled = true);
                    document.querySelector('.contenedor-principal').style.opacity = '0.6';
                    mostrarToast("⛔ INSCRIPCIONES CERRADAS. Plazo finalizado.", "error", 8000);
                }
            }catch(e){ console.error(e); mostrarToast("Error verificando plazo", "error"); }
            finally{ mostrarLoader(false); }
        }

        // ----- Lógica de campos -----
        const ced = document.getElementById('ced');
        const btnCedula = document.getElementById('btnCedula');
        ced.addEventListener('input', ()=>{
            ced.value = ced.value.replace(/\D/g,'').slice(0,10);
            btnCedula.disabled = ced.value.length !== 10 || !registroAbierto;
        });

        btnCedula.addEventListener('click', async ()=>{
            if(!registroAbierto) return mostrarToast("Plazo cerrado", "error");
            if(ced.value.length !== 10) return marcarError(ced, "Cédula 10 dígitos");
            mostrarLoader(true, "Validando...");
            try{
                const resp = await fetch(`${URL_GAS}?action=validarRegistro&cedula=${ced.value}`);
                const data = await resp.json();
                if(data.cedulaExiste) mostrarToast("⚠️ Cédula ya registrada", "error");
                else { mostrarToast("✅ Cédula válida", "success"); verPaso(2); }
            }catch(e){ mostrarToast("Error de conexión", "error"); }
            mostrarLoader(false);
        });

        // Paso 2
        const n1 = document.getElementById('n1'), n2 = document.getElementById('n2'), ape = document.getElementById('ape'), fecha = document.getElementById('fecha');
        const btnPaso2 = document.getElementById('btnPaso2');
        function validarPaso2(){
            const fechaVal = fecha.value && !isNaN(new Date(fecha.value));
            let fechaOk = true;
            if(fechaVal && new Date(fecha.value) > new Date()) fechaOk = false;
            btnPaso2.disabled = !(n1.value.trim() && ape.value.trim() && fechaVal && fechaOk);
        }
        [n1,n2,ape,fecha].forEach(el=>el.addEventListener('input',validarPaso2));
        btnPaso2.addEventListener('click',()=>{
            if(!n1.value.trim()) return marcarError(n1,"Primer nombre obligatorio");
            if(!ape.value.trim()) return marcarError(ape,"Apellidos obligatorios");
            if(!fecha.value) return marcarError(fecha,"Fecha nacimiento");
            if(new Date(fecha.value) > new Date()) return marcarError(fecha,"Fecha futura");
            verPaso(3);
        });

        // Paso 3
        const tel = document.getElementById('tel'), correo = document.getElementById('correo'), btnPaso3 = document.getElementById('btnPaso3');
        tel.addEventListener('input', e=>e.target.value=e.target.value.replace(/\D/g,'').slice(0,10));
        function validarPaso3(){ btnPaso3.disabled = !(tel.value.replace(/\D/g,'').length===10 && correo.value.includes('@') && correo.value.includes('.')); }
        [tel,correo].forEach(el=>el.addEventListener('input',validarPaso3));
        btnPaso3.addEventListener('click',()=>{
            if(tel.value.replace(/\D/g,'').length!==10) return marcarError(tel,"Teléfono 10 dígitos");
            if(!correo.value.includes('@')||!correo.value.includes('.')) return marcarError(correo,"Email inválido");
            verPaso(4);
        });

        // Paso 4 fotos
        const rostro = document.getElementById('rostro'), cedulaFile = document.getElementById('cedulaFile');
        const fotoRostroB64 = document.getElementById('fotoRostroB64'), fotoCedulaB64 = document.getElementById('fotoCedulaB64');
        const btnPaso4 = document.getElementById('btnPaso4');
        function archivoABase64(file, inputHidden){
            return new Promise((resolve, reject)=>{
                if(!file) return resolve(null);
                const reader = new FileReader();
                reader.onload = ()=> { inputHidden.value = reader.result; resolve(true); };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }
        function verificarFotos(){ btnPaso4.disabled = !(fotoRostroB64.value && fotoCedulaB64.value); }
        rostro.addEventListener('change', async(e)=>{
            const f = e.target.files[0];
            if(f && !f.type.startsWith('image/')) return mostrarToast("Formato imagen", "error");
            if(f && f.size>2*1024*1024) return mostrarToast("Max 2MB", "error");
            await archivoABase64(f, fotoRostroB64);
            verificarFotos();
        });
        cedulaFile.addEventListener('change', async(e)=>{
            const f = e.target.files[0];
            if(f && !f.type.startsWith('image/')) return mostrarToast("Formato imagen", "error");
            if(f && f.size>2*1024*1024) return mostrarToast("Max 2MB", "error");
            await archivoABase64(f, fotoCedulaB64);
            verificarFotos();
        });
        btnPaso4.addEventListener('click', async ()=>{
            if(!fotoRostroB64.value) return mostrarToast("Foto de perfil requerida","error");
            if(!fotoCedulaB64.value) return mostrarToast("Foto de cédula requerida","error");
            mostrarLoader(true, "Cargando dorsales...");
            const selectNombre = document.getElementById('nombreCamiseta');
            const selectDorsal = document.getElementById('dorsal');
            selectNombre.innerHTML = '<option value="">Selecciona</option>';
            selectDorsal.innerHTML = '<option value="">Selecciona</option>';
            selectNombre.add(new Option(n1.value.trim(), n1.value.trim()));
            if(n2.value.trim()) selectNombre.add(new Option(n2.value.trim(), n2.value.trim()));
            try{
                const resp = await fetch(`${URL_GAS}?action=getDorsales`);
                const ocupados = await resp.json();
                for(let i=1;i<=99;i++) if(!ocupados.includes(String(i))) selectDorsal.add(new Option(i,i));
                if(selectDorsal.options.length===1) throw new Error("No hay dorsales libres");
            }catch(e){ mostrarToast("Error cargando dorsales", "error"); mostrarLoader(false); return; }
            mostrarLoader(false);
            verPaso(5);
        });

        // Paso 5
        const nombreCamiseta = document.getElementById('nombreCamiseta'), dorsal = document.getElementById('dorsal'), btnPaso5 = document.getElementById('btnPaso5');
        function validarPaso5(){ btnPaso5.disabled = !(nombreCamiseta.value && dorsal.value); }
        nombreCamiseta.addEventListener('change',validarPaso5); dorsal.addEventListener('change',validarPaso5);
        btnPaso5.addEventListener('click',()=>{ if(nombreCamiseta.value && dorsal.value) verPaso(6); else mostrarToast("Selecciona nombre y dorsal","error"); });

        // Paso 6: lógica condicional pago uniforme
        const pagoUniformeOpcion = document.getElementById('pagoUniformeOpcion');
        const campoTransaccionUni = document.getElementById('campoTransaccionUni');
        const campoFechaPromesa = document.getElementById('campoFechaPromesa');
        const transaccionUniforme = document.getElementById('transaccionUniforme');
        const fechaPromesaPago = document.getElementById('fechaPromesaPago');
        const categoria = document.getElementById('categoria');
        const talla = document.getElementById('talla');
        const medias = document.getElementById('medias');
        const inscripcionInput = document.getElementById('inscripcion');
        const btnFinal = document.getElementById('btnFinal');

        function actualizarCamposPago() {
            const opcion = pagoUniformeOpcion.value;
            campoTransaccionUni.classList.remove('visible');
            campoFechaPromesa.classList.remove('visible');
            if (opcion === 'SI') {
                campoTransaccionUni.classList.add('visible');
            } else if (opcion === 'NO') {
                campoFechaPromesa.classList.add('visible');
                // Establecer fechas mínima hoy, máxima hoy+5
                const hoy = new Date();
                const max = new Date();
                max.setDate(hoy.getDate() + 5);
                fechaPromesaPago.min = hoy.toISOString().split('T')[0];
                fechaPromesaPago.max = max.toISOString().split('T')[0];
                fechaPromesaPago.value = hoy.toISOString().split('T')[0];
            }
            validarPaso6();
        }
        pagoUniformeOpcion.addEventListener('change', actualizarCamposPago);
        transaccionUniforme.addEventListener('input', validarPaso6);
        fechaPromesaPago.addEventListener('change', validarPaso6);

        function validarPaso6(){
            let ok = true;
            if(!categoria.value) ok = false;
            if(!talla.value) ok = false;
            if(!medias.value) ok = false;
            // Validar transferencia inscripción: números de 5 a 10 dígitos
            const numInsc = inscripcionInput.value.trim();
            if(!/^\d{5,10}$/.test(numInsc)) ok = false;
            // Validar pago uniforme
            const opcion = pagoUniformeOpcion.value;
            if(opcion === 'SI'){
                const numUni = transaccionUniforme.value.trim();
                if(!/^\d{5,10}$/.test(numUni)) ok = false;
            } else if(opcion === 'NO'){
                if(!fechaPromesaPago.value) ok = false;
            } else {
                ok = false;
            }
            btnFinal.disabled = !ok;
        }
        [categoria, talla, medias, inscripcionInput].forEach(el=>el.addEventListener('input', validarPaso6));
        [categoria, talla, medias, inscripcionInput].forEach(el=>el.addEventListener('change', validarPaso6));

        // Reglas para solo números en transferencias
        inscripcionInput.addEventListener('input', function(e){
            this.value = this.value.replace(/\D/g, '').slice(0,10);
        });
        transaccionUniforme.addEventListener('input', function(e){
            this.value = this.value.replace(/\D/g, '').slice(0,10);
        });

        // Finalizar registro
        btnFinal.addEventListener('click', async ()=>{
            if(btnFinal.disabled || !registroAbierto) return;
            mostrarLoader(true, "Registrando... ¡GOL DE ORO!");
            let pagoUniformeData = {};
            const opcion = pagoUniformeOpcion.value;
            if(opcion === 'SI'){
                pagoUniformeData = { pagado: true, transaccion: transaccionUniforme.value.trim() };
            } else {
                pagoUniformeData = { pagado: false, fechaPromesa: fechaPromesaPago.value };
            }

            const payload = {
                ced: ced.value,
                n1: n1.value.trim(),
                n2: n2.value.trim(),
                ape: ape.value.trim(),
                fecha: fecha.value,
                tel: tel.value.replace(/\D/g,''),
                correo: correo.value.trim().toLowerCase(),
                categoria: categoria.value,
                talla: talla.value,
                medias: medias.value,
                nombreCamiseta: nombreCamiseta.value,
                dorsal: dorsal.value,
                inscripcion: inscripcionInput.value.trim(),
                pagoUniformeOpcion: opcion,
                transaccionUniforme: pagoUniformeData.transaccion || '',
                fechaPromesaPago: pagoUniformeData.fechaPromesa || '',
                fotoRostroB64: fotoRostroB64.value,
                fotoCedulaB64: fotoCedulaB64.value
            };
            try{
                const response = await fetch(URL_GAS, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams(payload)
                });
                const result = await response.json();
                if(result && result.ok){
                    mostrarLoader(false);
                    alert("✅ Registro exitoso. Redirigiendo...");
                    window.location.href = 'login.html';
                } else throw new Error(result?.error || "Error del servidor");
            }catch(e){
                mostrarLoader(false);
                mostrarToast("Error: "+e.message, "error");
            }
        });

        // Inicializar
        window.addEventListener('DOMContentLoaded', async ()=>{
            await verificarEstadoRegistro();
            // Convertir a mayúsculas excepto email
            document.querySelectorAll('input:not([type="email"]):not([type="file"]):not([type="hidden"])').forEach(inp=>{
                inp.addEventListener('input',function(){ if(this.id !== 'correo') this.value = this.value.toUpperCase(); });
            });
            actualizarCamposPago();
        });
    })();
</script>
</body>
</html>
