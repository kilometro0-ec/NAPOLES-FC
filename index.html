<body>

<div class="contenedor-principal">

<!-- 🟦 CARD PRINCIPAL -->
<div style="background:#111;border-radius:20px;padding:20px;box-shadow:0 10px 30px #000">

<h1 style="text-align:center;color:#fff;margin:0">NAPOLES F.C.</h1>
<p style="text-align:center;color:#ccc;margin:5px 0">Ficha de Inscripción</p>
<p style="text-align:center;color:gold;margin-bottom:15px">Temporada 2026 - 2027</p>

<form id="formRegistro">

<!-- PASO 1 -->
<div id="paso1" class="paso activo">

<label>Cédula de Identidad</label>
<input id="ced" maxlength="10" placeholder="Ej: 1723456789">

<button type="button" id="btnCedula" class="btn-accion" disabled>
Validar Jugador
</button>

</div>

<!-- PASO 2 -->
<div id="paso2" class="paso">

<label>Cédula</label>
<input id="ced2" readonly>

<input id="n1" placeholder="PRIMER NOMBRE">
<input id="n2" placeholder="SEGUNDO NOMBRE">
<input id="ape" placeholder="APELLIDOS">

<label>Fecha de Nacimiento</label>
<input type="date" id="fecha">

<button type="button" id="btnPaso2" class="btn-accion" disabled>Siguiente</button>

</div>

<!-- PASO 3 -->
<div id="paso3" class="paso">

<input id="tel" placeholder="TELÉFONO (09XXXXXXXX)">
<input id="correo" placeholder="CORREO ELECTRÓNICO">

<button type="button" id="btnPaso3" class="btn-accion" disabled>Siguiente</button>

</div>

<!-- PASO 4 -->
<div id="paso4" class="paso">

<p style="text-align:center;color:#ccc">Captura tu foto y sube tu cédula</p>

<div id="contenedor-camara">
<video id="video" autoplay></video>
<img id="previewCamara">
<div class="guia"></div>
</div>

<button type="button" id="btnCamara" class="btn-accion">Activar Cámara</button>
<button type="button" id="btnFoto" class="btn-accion" style="background:#B59461">
Capturar Foto
</button>

<label>Subir Foto de Cédula</label>
<input type="file" id="cedulaFile">

<button type="button" id="btnPaso4" class="btn-accion" disabled>
Siguiente
</button>

</div>

<!-- PASO 5 -->
<div id="paso5" class="paso">

<h3 style="color:gold;text-align:center">⚔️ Arma tu Armadura</h3>

<label>Nombre en camiseta</label>
<select id="nombreCamiseta"></select>

<label>Dorsal</label>
<select id="dorsal"></select>

<button id="btnPaso5" class="btn-accion" disabled>Siguiente</button>

</div>

<!-- PASO 6 -->
<div id="paso6" class="paso">

<label>¿Deseas agregar medias extras?</label>
<select id="medias">
<option value="">Seleccionar</option>
<option value="NO">NO ($0)</option>
<option value="SI">SI (+$2)</option>
</select>

<label>Comprobante Inscripción ($5)</label>
<input id="inscripcion" maxlength="12" placeholder="Ej: 0001234567">

<label>Comprobante Uniforme ($18)</label>
<input id="uniforme" maxlength="12" placeholder="Ej: 0001234567">

<button id="btnFinal" class="btn-accion" disabled>Finalizar Registro</button>

</div>

</form>
</div>
</div>

<!-- LOADER PRO -->
<div id="loader">
<div style="width:60px;height:60px;border:5px solid #fff;border-top:5px solid gold;border-radius:50%;animation:spin 1s linear infinite"></div>
<p id="loader-texto">Procesando...</p>
</div>

<style>
@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}
</style>

<script src="api.js"></script>

<script>

// 🔥 MAYÚSCULAS AUTOMÁTICAS
document.addEventListener("input",e=>{
    if(e.target.id !== "correo"){
        e.target.value = e.target.value.toUpperCase();
    }
});

// PASO 1
ced.oninput = ()=> btnCedula.disabled = ced.value.length !== 10;

btnCedula.onclick = async ()=>{
    btnCedula.classList.add("loading");
    loader(true,"Validando cédula...");

    const r = await validarCedulaServidor(ced.value);

    if(!r.ok){
        alert("❌ " + r.msg);
        loader(false);
        btnCedula.classList.remove("loading");
        return;
    }

    ced2.value = ced.value;
    ced.readOnly = true;

    verPaso(2);

    loader(false);
    btnCedula.classList.remove("loading");
};

// PASO 2
document.querySelectorAll("#paso2 input").forEach(i=>{
    i.oninput = ()=> btnPaso2.disabled = !n1.value || !ape.value || !fecha.value;
});
btnPaso2.onclick = ()=>verPaso(3);

// PASO 3
document.querySelectorAll("#paso3 input").forEach(i=>{
    i.oninput = ()=>{
        btnPaso3.disabled = !( /^09\d{8}$/.test(tel.value) && /\S+@\S+\.\S+/.test(correo.value) );
    }
});
btnPaso3.onclick = ()=>verPaso(4);

// CÁMARA
btnCamara.onclick = iniciarCamara;

btnFoto.onclick = ()=>{
    capturarFoto();
    previewCamara.style.display="block";
    video.style.display="none";
};

// PASO 4
cedulaFile.onchange = ()=>{
    const reader = new FileReader();
    reader.onload = ()=> fotoCedulaB64.value = reader.result;
    reader.readAsDataURL(cedulaFile.files[0]);

    btnPaso4.disabled = !(previewCamara.src && cedulaFile.files.length);
};

btnPaso4.onclick = async ()=>{
    loader(true,"Procesando imágenes...");
    await cargarDorsales();
    cargarNombres();
    loader(false);
    verPaso(5);
};

// PASO 5
document.querySelectorAll("#paso5 select").forEach(s=>{
    s.onchange = ()=> btnPaso5.disabled = !(nombreCamiseta.value && dorsal.value);
});
btnPaso5.onclick = ()=>verPaso(6);

// PASO 6
document.querySelectorAll("#paso6 input, #paso6 select").forEach(i=>{
    i.oninput = ()=>{
        btnFinal.disabled = !(medias.value && inscripcion.value.length>=4 && uniforme.value.length>=4);
    }
});

// FINAL
btnFinal.onclick = async ()=>{
    loader(true,"Guardando información...");

    await enviarRegistro();

    loader(false);

    alert("✅ Registro completado correctamente.\nBienvenido a Nápoles F.C.");
};

</script>

</body>
