<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro - Nápoles F.C.</title>

<!-- PWA -->
<link rel="icon" href="favicon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1A2B48">

<!-- CSS GLOBAL (TU DISEÑO PRO) -->
<link rel="stylesheet" href="estilos.css">

<!-- FUENTES -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>
/* 🔴 OCULTAR NAV SOLO AQUÍ */
.nav-napoles{display:none !important;}

/* 🔥 CONTROL DE PASOS */
.paso{display:none;}
.paso.activo{display:block;}

/* 📷 CÁMARA PRO */
#contenedor-camara{
    position:relative;
    width:280px;
    height:280px;
    margin:20px auto;
    overflow:hidden;
    border-radius:20px;
    border:2px solid var(--dorado);
}

#video{
    width:100%;
    height:100%;
    object-fit:cover;
    transform:scaleX(-1);
}

.guia{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:200px;
    height:200px;
    border:3px dashed white;
    border-radius:50%;
    box-shadow:0 0 0 1000px rgba(0,0,0,0.5);
}

.preview{
    width:90px;
    margin-top:10px;
    border-radius:10px;
}
</style>

</head>

<body>

<div class="contenedor-principal">

<header>
    <div class="texto-logo">NAPOLES F.C.</div>
    <h2>Ficha de Inscripción</h2>
</header>

<form id="formRegistro">

<!-- ================= PASO 1 ================= -->
<div id="paso1" class="paso activo seccion-formulario">
<label>Cédula de Identidad</label>
<input id="ced" name="cedula" maxlength="10" placeholder="10 dígitos" required>
<button type="button" class="btn-accion" onclick="validarCedulaEstricta()">Validar Jugador</button>
</div>

<!-- ================= PASO 2 ================= -->
<div id="paso2" class="paso seccion-formulario">
<input id="n1" name="nombre1" placeholder="Primer Nombre" required>
<input id="n2" name="nombre2" placeholder="Segundo Nombre">
<input id="ape" name="apellidos" placeholder="Apellidos" required>

<label>Fecha de Nacimiento</label>
<input type="date" name="fechaNac" required>

<button type="button" class="btn-accion" onclick="validarPaso2()">Siguiente</button>
</div>

<!-- ================= PASO 3 ================= -->
<div id="paso3" class="paso seccion-formulario">
<input name="telefono" placeholder="09XXXXXXXX" maxlength="10" required>
<input name="correo" placeholder="Correo electrónico" required>

<button type="button" class="btn-accion" onclick="validarPaso3()">Siguiente</button>
</div>

<!-- ================= PASO 4 ================= -->
<div id="paso4" class="paso seccion-formulario">

<div id="contenedor-camara">
    <video id="video" autoplay playsinline></video>
    <div class="guia"></div>
</div>

<button type="button" class="btn-accion" onclick="iniciarCamara()">Activar Cámara</button>
<button type="button" class="btn-accion" onclick="capturarFoto()">Capturar Foto</button>

<img id="previewRostro" class="preview">

<label>Foto de Cédula</label>
<input type="file" accept="image/*" onchange="previewFile(this,'previewCedula','fotoCedulaB64')" required>
<img id="previewCedula" class="preview">

<input type="hidden" id="fotoRostroB64" name="fotoRostroB64">
<input type="hidden" id="fotoCedulaB64" name="fotoCedulaB64">

<button type="button" class="btn-accion" onclick="validarPaso4()">Siguiente</button>
</div>

<!-- ================= PASO 5 ================= -->
<div id="paso5" class="paso seccion-formulario">

<label>Nombre en Camiseta</label>
<select id="selectNombreCamiseta" name="nombreCamiseta" required></select>

<label>Número de Dorsal</label>
<select id="selectDorsal" name="dorsal" required></select>

<button type="button" class="btn-accion" onclick="verPaso(6)">Siguiente</button>
</div>

<!-- ================= PASO 6 ================= -->
<div id="paso6" class="paso seccion-formulario">

<label>¿Desea Medias Extras?</label>
<select name="mediasExtras" required>
<option value="">Seleccione</option>
<option value="NO">NO</option>
<option value="SI">SI (+$2)</option>
</select>

<label>Comprobante Inscripción</label>
<input name="transaccionInscripcion" required>

<label>Comprobante Uniforme</label>
<input name="transaccionUniforme" required>

<button type="button" class="btn-accion" onclick="enviarRegistro()">Finalizar Inscripción</button>

</div>

</form>
</div>

<!-- LOADER -->
<div id="loader">
    <div class="spinner-balon"></div>
    <p id="loader-texto">Procesando...</p>
</div>

<!-- JS -->
<script src="api.js"></script>

<script>
// 🔥 SERVICE WORKER (OBLIGATORIO PARA PWA)
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
