<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripción | Nápoles FC</title>
    <!-- Enlace a tu archivo de estilos -->
    <link rel="stylesheet" href="estilos.css">
    <link rel="icon" href="/NAPOLES-FC/img/favicon.png">
</head>
<body>

    <!-- Pantalla de carga -->
    <div id="loader">
        <div class="spinner"></div>
        <h2>⚙️ PROCESANDO REGISTRO...</h2>
        <p>Enviando datos al sistema de Nápoles FC</p>
    </div>

    <div class="contenedor-principal" id="contenido">
        <header>
            <img src="/NAPOLES-FC/img/logo.png" alt="Logo Nápoles" class="logo">
            <h2>NÁPOLES F.C.</h2>
            <p class="subtitulo">Registro Oficial de Jugadores 2026</p>
        </header>

        <form id="formRegistro">
            <!-- PASO 1: Datos Personales -->
            <div id="paso1" class="seccion-paso">
                <h3>Paso 1: Información Personal</h3>
                <input type="text" name="nombre1" placeholder="Primer Nombre" required>
                <input type="text" name="nombre2" placeholder="Segundo Nombre" required>
                <input type="text" name="apellidos" placeholder="Apellidos Completos" required>
                <input type="text" name="cedula" placeholder="Número de Cédula" maxlength="10" required>
                <button type="button" class="btn-sig" onclick="irA(2)">SIGUIENTE</button>
            </div>

            <!-- PASO 2: Contacto y Uniforme -->
            <div id="paso2" class="seccion-paso seccion-oculta">
                <h3>Paso 2: Contacto y Uniforme</h3>
                <label>Fecha de Nacimiento:</label>
                <input type="date" name="fechaNac" required>
                <input type="tel" name="telefono" placeholder="WhatsApp (Ej: 0991234567)" required>
                <input type="email" name="correo" placeholder="Correo Electrónico" required>
                <input type="text" name="nombreCamiseta" placeholder="Nombre en la Camiseta">
                <input type="number" name="dorsal" placeholder="Número de Dorsal Preferido">
                <div class="botones-flex">
                    <button type="button" class="btn-atras" onclick="irA(1)">ATRÁS</button>
                    <button type="button" class="btn-sig" onclick="irA(3)">SIGUIENTE</button>
                </div>
            </div>

            <!-- PASO 3: Validación Facial -->
            <div id="paso3" class="seccion-paso seccion-oculta">
                <h3>Paso 3: Foto de Registro</h3>
                <div class="camara-box">
                    <video id="video" autoplay playsinline></video>
                    <canvas id="canvas" style="display:none;"></canvas>
                    <img id="preview" style="display:none; width:100%; border-radius:10px;">
                </div>
                
                <button type="button" id="btnFoto" class="btn-foto">📷 CAPTURAR FOTO</button>
                
                <!-- Campo oculto para la foto -->
                <input type="hidden" id="fotoRostroB64" name="fotoRostroB64">
                
                <div class="botones-flex">
                    <button type="button" class="btn-atras" onclick="irA(2)">ATRÁS</button>
                    <button type="submit" class="btn-fin">FINALIZAR REGISTRO</button>
                </div>
            </div>
        </form>
    </div>

    <!-- SCRIPTS EXTERNOS -->
    <!-- 1. El que maneja los pasos (Siguiente/Atrás) -->
    <script src="nav.js"></script>
    <!-- 2. El que maneja la cámara y el envío a Google -->
    <script src="api.js"></script>

</body>
</html>
