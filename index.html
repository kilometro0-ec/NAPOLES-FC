<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Nápoles F.C. - Registro Oficial</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        background: radial-gradient(circle at 10% 20%, #0a1928, #020c1a);
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
    }
    .registro-container {
        max-width: 560px;
        width: 100%;
        background: rgba(12, 25, 45, 0.65);
        backdrop-filter: blur(18px);
        border-radius: 2.5rem;
        border: 1px solid rgba(0, 143, 155, 0.3);
        box-shadow: 0 30px 50px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(0, 143, 155, 0.15) inset;
        padding: 2rem 1.8rem;
        transition: transform 0.25s ease, box-shadow 0.3s;
    }
    .registro-container:hover {
        transform: translateY(-3px);
        box-shadow: 0 35px 55px rgba(0, 0, 0, 0.5);
    }
    .header {
        text-align: center;
        margin-bottom: 2.2rem;
    }
    .header h1 {
        font-size: 2rem;
        font-weight: 800;
        background: linear-gradient(135deg, #D4AF37, #F3D572);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        letter-spacing: -0.5px;
        margin-bottom: 0.4rem;
    }
    .header p {
        color: #b0c4de;
        font-size: 0.9rem;
        font-weight: 400;
    }
    .badge {
        display: inline-block;
        background: rgba(0, 143, 155, 0.2);
        border-radius: 60px;
        padding: 0.4rem 1.5rem;
        font-size: 0.9rem;
        color: #8fcbdb;
        margin-top: 0.6rem;
        font-weight: 500;
    }
    .paso {
        display: none;
        animation: fadeSlide 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }
    .paso.activo {
        display: block;
    }
    @keyframes fadeSlide {
        0% { opacity: 0; transform: translateY(12px); }
        100% { opacity: 1; transform: translateY(0); }
    }
    .campo {
        margin-bottom: 1.2rem;
    }
    label {
        display: block;
        font-size: 0.75rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #9ab3cf;
        margin-bottom: 0.25rem;
    }
    input, select {
        width: 100%;
        padding: 0.9rem 1.2rem;
        background: rgba(0, 0, 0, 0.45);
        border: 1px solid rgba(0, 143, 155, 0.6);
        border-radius: 2rem;
        color: white;
        font-size: 1rem;
        font-family: 'Inter', monospace;
        transition: all 0.25s;
        outline: none;
    }
    input:focus, select:focus {
        border-color: #008f9b;
        box-shadow: 0 0 0 3px rgba(0, 143, 155, 0.3);
        background: rgba(0, 0, 0, 0.7);
    }
    input.error, select.error {
        border-color: #ff6b6b;
        animation: shake 0.3s ease;
    }
    @keyframes shake {
        0%,100% { transform: translateX(0); }
        25% { transform: translateX(-4px); }
        75% { transform: translateX(4px); }
    }
    .help-note {
        font-size: 0.7rem;
        color: #8db5d0;
        margin-top: 0.3rem;
        margin-left: 0.8rem;
        font-style: italic;
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .btn-primary {
        background: linear-gradient(105deg, #008f9b, #006b74);
        border: none;
        padding: 0.9rem;
        width: 100%;
        border-radius: 3rem;
        font-weight: 700;
        font-size: 1rem;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: white;
        cursor: pointer;
        margin-top: 1.2rem;
        transition: all 0.25s;
        box-shadow: 0 5px 12px rgba(0, 0, 0, 0.3);
    }
    .btn-primary:hover:not(:disabled) {
        transform: translateY(-2px);
        background: linear-gradient(105deg, #00a5b3, #00808a);
        box-shadow: 0 10px 20px rgba(0, 143, 155, 0.4);
    }
    .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
    }
    .visto-img {
        font-size: 1.3rem;
        color: #2ecc71;
        animation: pop 0.2s ease;
        display: inline-block;
        margin-left: 8px;
    }
    @keyframes pop {
        0% { transform: scale(0); }
        80% { transform: scale(1.2); }
        100% { transform: scale(1); }
    }
    .radio-group {
        display: flex;
        gap: 1.5rem;
        margin: 0.5rem 0 0.2rem;
    }
    .radio-group label {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.9rem;
        text-transform: none;
        font-weight: normal;
        color: #b0c4de;
        cursor: pointer;
    }
    .radio-group input {
        width: auto;
        margin: 0;
        transform: scale(1.1);
    }
    .condicional {
        margin-top: 0.8rem;
        transition: all 0.2s;
    }
    .aviso-pago {
        background: rgba(0, 0, 0, 0.4);
        border-left: 3px solid #ffb347;
        padding: 0.6rem 1rem;
        border-radius: 1rem;
        font-size: 0.8rem;
        color: #f3d572;
    }
    #loader, #modalExito { display: none; }
    #modalExito {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(12px);
        justify-content: center;
        align-items: center;
        z-index: 20000;
    }
    .modal-card {
        background: rgba(10, 25, 45, 0.95);
        border-radius: 2rem;
        padding: 2rem;
        text-align: center;
        border: 2px solid #008f9b;
        max-width: 300px;
        width: 85%;
        animation: zoom 0.3s ease;
    }
    @keyframes zoom {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
    }
    .modal-card h2 { color: #008f9b; margin-bottom: 0.8rem; }
    .toast {
        position: fixed;
        bottom: 25px;
        left: 50%;
        transform: translateX(-50%);
        background: #1e2a3e;
        backdrop-filter: blur(12px);
        padding: 0.75rem 1.5rem;
        border-radius: 3rem;
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 500;
        z-index: 10001;
        animation: toastIn 0.25s ease;
        box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        border-left: 5px solid #008f9b;
        color: white;
        font-size: 0.85rem;
        max-width: 90%;
    }
    .toast.error { border-left-color: #ff6b6b; }
    .toast.success { border-left-color: #2ecc71; }
    @keyframes toastIn {
        from { opacity: 0; transform: translateX(-50%) translateY(20px); }
        to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    @media (max-width: 550px) {
        .registro-container { padding: 1.5rem; }
        .header h1 { font-size: 1.6rem; }
        input, select, .btn-primary { padding: 0.8rem 1rem; }
    }
</style>
</head>
<body>

<div class="registro-container">
    <div class="header">
        <h1>NAPOLES F.C.</h1>
        <p>Formulario de registro oficial</p>
        <div class="badge">🏆 Temporada 2026 - 2027</div>
    </div>

    <form id="formRegistro">
        <!-- PASO 1: Cédula -->
        <div id="paso1" class="paso activo">
            <div class="campo">
                <label>🔢 CÉDULA (10 dígitos)</label>
                <input type="text" id="ced" maxlength="10" placeholder="Ej: 1234567890" autocomplete="off">
                <div class="help-note"><span>🔑</span> Ingresa tu número de cédula para empezar</div>
            </div>
            <button type="button" id="btnCedula" class="btn-primary" disabled>Validar</button>
        </div>

        <!-- PASO 2: Datos personales -->
        <div id="paso2" class="paso">
            <div class="campo"><label>Primer nombre</label><input type="text" id="n1" placeholder="Ej: LEONARDO"></div>
            <div class="campo"><label>Segundo nombre</label><input type="text" id="n2" placeholder="ADRIAN"></div>
            <div class="campo"><label>Apellidos</label><input type="text" id="ape" placeholder="Ej: MUÑOZ BUENDIA"></div>
            <div class="campo"><label>Fecha de nacimiento</label><input type="date" id="fecha"></div>
            <div class="help-note"><span>📅</span> Aquí debes ingresar tu fecha de nacimiento</div>
            <button type="button" id="btnPaso2" class="btn-primary" disabled>Siguiente</button>
        </div>

        <!-- PASO 3: Contacto -->
        <div id="paso3" class="paso">
            <div class="campo"><label>Teléfono (10 dígitos)</label><input type="tel" id="tel" maxlength="10" placeholder="Ej: 0991234567"></div>
            <div class="campo"><label>Correo electrónico</label><input type="email" id="correo" placeholder="tú@ejemplo.com"></div>
            <div class="help-note"><span>📞</span> Queremos estar en contacto contigo</div>
            <button type="button" id="btnPaso3" class="btn-primary" disabled>Siguiente</button>
        </div>

        <!-- PASO 4: Fotos -->
        <div id="paso4" class="paso">
            <div class="campo"><label>📸 Foto perfil... Sonrie</label><input type="file" id="rostro" accept="image/jpeg,image/png"><span id="vistoRostro" class="visto-img"></span></div>
            <div class="campo"><label>🪪 Foto de tu cédula (L. Frontal)</label><input type="file" id="cedulaFile" accept="image/jpeg,image/png"><span id="vistoCedula" class="visto-img"></span></div>
            <button type="button" id="btnPaso4" class="btn-primary" disabled>Siguiente</button>
        </div>

        <!-- PASO 5: Armadura -->
        <div id="paso5" class="paso">
            <div class="campo"><label>🏷️ Nombre en tu camiseta</label><select id="nombreCamiseta"></select></div>
            <div class="campo"><label>🔢 Número de tu dorsal</label><select id="dorsal"></select></div>
            <button type="button" id="btnPaso5" class="btn-primary" disabled>Siguiente</button>
        </div>

        <!-- PASO 6: Valores con pago de uniforme -->
        <div id="paso6" class="paso">
            <div class="campo"><label>🧦 Medias extras (+$2)</label>
                <select id="medias">
                    <option value="">Selecciona</option>
                    <option value="NO">No</option>
                    <option value="SI">Sí</option>
                </select>
            </div>
            <div class="campo"><label>💰 N° transacción valor de inscripción ($5)</label>
                <input id="inscripcion" placeholder="Ej: PAGO-12345">
            </div>
            <div class="campo">
                <label>👕 Pago del uniforme (abono 75% + medias)</label>
                <div class="radio-group">
                    <label><input type="radio" name="pagoUniforme" value="si"> Sí, ya pagué</label>
                    <label><input type="radio" name="pagoUniforme" value="no"> No, aún no pago</label>
                </div>
                <div id="uniformeCondicional" class="condicional"></div>
                <input type="hidden" id="uniforme" value="">
            </div>
            <button type="button" id="btnFinal" class="btn-primary" disabled>Finalizar registro</button>
        </div>

        <input type="hidden" id="fotoRostroB64">
        <input type="hidden" id="fotoCedulaB64">
    </form>
</div>

<div id="loader"><div class="spinner" style="width:60px;height:60px;border:4px solid rgba(0,143,155,0.25);border-top:4px solid #008f9b;border-radius:50%;animation:spin 0.8s linear infinite;"></div><div id="loader-texto">Procesando...</div></div>
<div id="modalExito"><div class="modal-card"><h2>✅ ¡Registro exitoso!</h2><p>Redirigiendo en <span id="contador">3</span> segundos...</p></div></div>

<script>
    // ========== FIX BOTÓN VALIDAR CÉDULA ==========
    // Activa el botón cuando la cédula tenga 10 dígitos (solo números)
    const cedInput = document.getElementById('ced');
    const btnValidar = document.getElementById('btnCedula');
    if (cedInput && btnValidar) {
        cedInput.addEventListener('input', function(e) {
            // Solo números y máximo 10 caracteres
            this.value = this.value.replace(/\D/g, '').slice(0, 10);
            btnValidar.disabled = (this.value.length !== 10);
        });
    }

    // ========== LÓGICA PARA EL PAGO DEL UNIFORME (Sí/No) ==========
    const radios = document.querySelectorAll('input[name="pagoUniforme"]');
    const condicionalDiv = document.getElementById('uniformeCondicional');
    const uniformeHidden = document.getElementById('uniforme');

    function actualizarCampoUniforme() {
        const selected = document.querySelector('input[name="pagoUniforme"]:checked');
        if (!selected) {
            condicionalDiv.innerHTML = '';
            uniformeHidden.value = '';
            return;
        }
        if (selected.value === 'si') {
            condicionalDiv.innerHTML = `
                <div style="margin-top:8px;">
                    <input type="text" id="transaccionUniforme" placeholder="Número de transacción del pago" style="width:100%; padding:0.8rem 1rem; border-radius:2rem; border:1px solid rgba(0,143,155,0.6); background:rgba(0,0,0,0.45); color:white;">
                </div>
            `;
            const txInput = document.getElementById('transaccionUniforme');
            if (txInput) {
                txInput.addEventListener('input', () => {
                    uniformeHidden.value = txInput.value;
                    validarPaso6();
                });
                uniformeHidden.value = txInput.value || '';
            }
        } else {
            condicionalDiv.innerHTML = `
                <div class="aviso-pago">
                    ⚠️ Debes abonar <strong>$10</strong> hasta el <strong>viernes 8 de mayo</strong>.<br>
                    ¿Qué día vas a pagar?
                    <select id="diaPago" style="margin-top:8px; padding:0.5rem; border-radius:1rem; background:#1e2a3e; color:white;">
                        <option value="">Selecciona un día</option>
                        <option value="Viernes 8 de mayo">Viernes 8 de mayo</option>
                        <option value="Sábado 9 de mayo">Sábado 9 de mayo</option>
                        <option value="Lunes 11 de mayo">Lunes 11 de mayo</option>
                        <option value="Martes 12 de mayo">Martes 12 de mayo</option>
                    </select>
                </div>
            `;
            const selectDia = document.getElementById('diaPago');
            if (selectDia) {
                selectDia.addEventListener('change', () => {
                    uniformeHidden.value = `PAGO PENDIENTE - pagará el ${selectDia.value}`;
                    validarPaso6();
                });
                uniformeHidden.value = `PAGO PENDIENTE - pagará el ${selectDia.value || '?'}`;
            }
        }
        validarPaso6();
    }

    radios.forEach(radio => radio.addEventListener('change', actualizarCampoUniforme));

    // Validación del paso 6 para habilitar el botón final
    const medias = document.getElementById('medias');
    const inscripcion = document.getElementById('inscripcion');
    const btnFinal = document.getElementById('btnFinal');

    function validarPaso6() {
        const mediasOk = medias.value !== "";
        const inscripcionOk = inscripcion.value.trim() !== "";
        const pagoSeleccionado = document.querySelector('input[name="pagoUniforme"]:checked');
        let uniformeOk = false;
        if (pagoSeleccionado) {
            if (pagoSeleccionado.value === 'si') {
                const txInput = document.getElementById('transaccionUniforme');
                uniformeOk = txInput && txInput.value.trim() !== "";
            } else {
                const diaSelect = document.getElementById('diaPago');
                uniformeOk = diaSelect && diaSelect.value !== "";
            }
        }
        btnFinal.disabled = !(mediasOk && inscripcionOk && pagoSeleccionado && uniformeOk);
    }

    medias.addEventListener('change', validarPaso6);
    inscripcion.addEventListener('input', validarPaso6);
    
    // Escuchar cambios en los campos dinámicos (se agregan después)
    document.addEventListener('input', (e) => {
        if (e.target.id === 'transaccionUniforme' || e.target.id === 'diaPago') validarPaso6();
    });
    document.addEventListener('change', (e) => {
        if (e.target.id === 'diaPago') validarPaso6();
    });
    
    // Observador para cuando se crean los campos dinámicos
    const observer = new MutationObserver(() => validarPaso6());
    observer.observe(condicionalDiv, { childList: true, subtree: true });
</script>

<!-- Aquí cargamos frontend.js si existe, para el resto de funciones (pasos, imágenes, dorsales, envío) -->
<script src="frontend.js"></script>
</body>
</html>
