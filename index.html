<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripción | Nápoles FC</title>
    <link rel="icon" href="/NAPOLES-FC/img/favicon.png">
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .contenedor-principal { max-width: 500px; background: white; margin: auto; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .seccion-oculta { display: none; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 10px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        .btn-sig { background: #B59461; color: white; }
        .btn-fin { background: #008B94; color: white; }
        #video { width: 100%; border-radius: 10px; background: #000; }
        #loader { display: none; text-align: center; color: #B59461; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loader">⚙️ PROCESANDO REGISTRO, ESPERE...</div>

    <div class="contenedor-principal" id="contenido">
        <header style="text-align: center;">
            <h2 style="color: #1A2B48;">NAPOLES F.C.</h2>
            <p>Registro de Jugadores 2026</p>
        </header>

        <form id="formRegistro">
            <!-- PASO 1 -->
            <div id="paso1">
                <input type="text" name="nombre1" placeholder="Primer Nombre" required>
                <input type="text" name="nombre2" placeholder="Segundo Nombre" required>
                <input type="text" name="apellidos" placeholder="Apellidos Completos" required>
                <input type="text" name="cedula" placeholder="Cédula" maxlength="10" required>
                <button type="button" class="btn-sig" onclick="irA(2)">SIGUIENTE</button>
            </div>

            <!-- PASO 2 -->
            <div id="paso2" class="seccion-oculta">
                <input type="date" name="fechaNac" required>
                <input type="tel" name="telefono" placeholder="WhatsApp" required>
                <input type="email" name="correo" placeholder="Correo Electrónico" required>
                <button type="button" class="btn-sig" onclick="irA(3)">SIGUIENTE</button>
            </div>

            <!-- PASO 3 -->
            <div id="paso3" class="seccion-oculta">
                <video id="video" autoplay playsinline></video>
                <button type="button" id="btnFoto">📷 CAPTURAR FOTO</button>
                <canvas id="canvas" style="display:none;"></canvas>
                <img id="preview" style="display:none; width:100%; border-radius:10px;">
                <input type="hidden" id="fotoRostroB64" name="fotoRostroB64">
                
                <button type="submit" class="btn-fin">FINALIZAR REGISTRO</button>
            </div>
        </form>
    </div>

    <script>
        const scriptURL = 'AQUÍ_PEGA_TU_URL_DE_GOOGLE_APPS_SCRIPT';
        let stream;

        function irA(paso) {
            document.getElementById('paso1').classList.add('seccion-oculta');
            document.getElementById('paso2').classList.add('seccion-oculta');
            document.getElementById('paso3').classList.add('seccion-oculta');
            document.getElementById('paso' + paso).classList.remove('seccion-oculta');
            if(paso === 3) abrirCamara();
        }

        async function abrirCamara() {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            document.getElementById('video').srcObject = stream;
        }

        document.getElementById('btnFoto').onclick = () => {
            const v = document.getElementById('video');
            const c = document.getElementById('canvas');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            const data = c.toDataURL('image/jpeg');
            document.getElementById('fotoRostroB64').value = data;
            document.getElementById('preview').src = data;
            document.getElementById('preview').style.display = 'block';
            v.style.display = 'none';
            stream.getTracks().forEach(t => t.stop());
        };

        document.getElementById('formRegistro').onsubmit = e => {
            e.preventDefault();
            document.getElementById('loader').style.display = 'block';
            document.getElementById('contenido').style.opacity = '0.3';

            fetch(scriptURL, { method: 'POST', body: new FormData(e.target)})
            .then(res => {
                alert('¡REGISTRO EXITOSO! Nápoles FC le da la bienvenida.');
                location.reload();
            })
            .catch(err => alert('Error: ' + err.message));
        };
    </script>
</body>
</html>
