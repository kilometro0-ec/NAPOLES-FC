<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registro - Nápoles F.C.</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="estilos.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        .nav-napoles, #nav-inferior, nav { display: none !important; }
        body { margin-bottom: 0 !important; }
    </style>
</head>
<body>

    <div class="contenedor-principal">
        <header>
            <img src="img/logo-napoles.png" alt="NAPOLES FC" id="logo-club">
            <h2>Registro Oficial</h2>
        </header>

        <form id="formRegistro" onsubmit="event.preventDefault();">
            
            <!-- PASO 1: VALIDACIÓN -->
            <div id="paso1">
                <h3>Paso 1: Validación</h3>
                <label>Cédula de Identidad</label>
                <input type="number" id="ced" name="cedula" placeholder="10 dígitos" required>
                <button type="button" class="btn-accion" onclick="validarPaso1()">Verificar Cédula</button>
            </div>

            <!-- PASO 2: DATOS PERSONALES -->
            <div id="paso2" style="display:none;">
                <h3>Paso 2: Datos Personales</h3>
                <label>Primer Nombre</label>
                <input type="text" id="n1" name="nombre1" required>
                <label>Segundo Nombre</label>
                <input type="text" id="n2" name="nombre2">
                <label>Apellidos Completos</label>
                <input type="text" id="ape" name="apellidos" required>
                <label>Fecha de Nacimiento</label>
                <input type="date" name="fechaNac" required>
                <button type="button" class="btn-accion" onclick="verPaso(3)">Siguiente</button>
            </div>

            <!-- PASO 3: CONTACTO -->
            <div id="paso3" style="display:none;">
                <h3>Paso 3: Contacto</h3>
                <label>Teléfono WhatsApp</label>
                <input type="tel" name="telefono" placeholder="09XXXXXXXX" required>
                <label>Correo Electrónico</label>
                <input type="email" name="correo" required>
                <button type="button" class="btn-accion" onclick="verPaso(4)">Siguiente</button>
            </div>

            <!-- PASO 4: FOTOS -->
            <div id="paso4" style="display:none;">
                <h3>Paso 4: Documentación</h3>
                <label>Foto del Rostro (Selfie)</label>
                <input type="file" accept="image/*" capture="user" onchange="aBase64(this, 'fotoRostroB64')">
                <input type="hidden" id="fotoRostroB64" name="fotoRostroB64">

                <label>Foto de la Cédula</label>
                <input type="file" accept="image/*" onchange="aBase64(this, 'fotoCedulaB64')">
                <input type="hidden" id="fotoCedulaB64" name="fotoCedulaB64">
                <button type="button" class="btn-accion" onclick="abrirArmadura()">Siguiente</button>
            </div>

            <!-- PASO 5: ARMADURA -->
            <div id="paso5" style="display:none;">
                <h3>Paso 5: Armadura</h3>
                <label>Nombre en la Camiseta</label>
                <select id="selectNombreCamiseta" name="nombreCamiseta"></select>
                <label>Dorsal Disponible</label>
                <select id="selectDorsal" name="dorsal"></select>
                <button type="button" class="btn-accion" onclick="verPaso(6)">Ir a Pagos</button>
            </div>

            <!-- PASO 6: PAGOS -->
            <div id="paso6" style="display:none;">
                <h3>Paso 6: Pagos</h3>
                <div class="pago-box">
                    <p><b>Inscripción: $5.00</b></p>
                    <input type="text" name="transaccionInscripcion" placeholder="N° Transacción Inscripción">
                </div>
                <div class="pago-box">
                    <p><b>Uniforme: $18.00</b></p>
                    <input type="text" name="transaccionUniforme" placeholder="N° Transacción Uniforme">
                </div>
                <label class="check-label">
                    <input type="checkbox" name="mediasExtras" value="2"> ¿Medias Extras? (+$2.00)
                </label>
                <button type="button" class="btn-accion" onclick="enviarRegistro()">Finalizar Todo</button>
            </div>
        </form>
    </div>

    <div id="loader"><div class="spinner-balon"></div><p>Cargando...</p></div>
    <div id="final-animacion">
        <div class="spinner-balon"></div>
        <h3 id="final-status">GUARDANDO...</h3>
        <p id="final-mensaje">Bienvenido a la familia.</p>
    </div>

    <script src="api.js"></script>
    <script>
        function verPaso(n) {
            for(let i=1; i<=6; i++) {
                const p = document.getElementById('paso'+i);
                if(p) p.style.display = (i === n) ? 'block' : 'none';
            }
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
