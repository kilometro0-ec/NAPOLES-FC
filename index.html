<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro - Nápoles F.C.</title>

<link rel="icon" href="favicon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0a">

<link rel="stylesheet" href="estilos.css">

<style>
body{background:#0a0a0a;color:#fff;font-family:sans-serif}
.contenedor-principal{max-width:420px;margin:auto;padding:20px}
.paso{display:none}
.paso.activo{display:block}

input,select{
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:8px;
    border:none;
}

button{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:#fff;
    border:none;
    border-radius:10px;
    font-weight:bold;
}

#contenedor-camara{
    position:relative;
    width:260px;
    height:260px;
    margin:auto;
    overflow:hidden;
    border-radius:15px;
    border:2px solid #2563eb;
}

#video{
    width:100%;
    height:100%;
    object-fit:cover;
    transform:scaleX(-1);
}

.guia{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:180px;
    height:180px;
    border:3px dashed #fff;
    border-radius:50%;
    box-shadow:0 0 0 1000px rgba(0,0,0,0.6);
}

.preview{width:90px;margin-top:10px;border-radius:8px}

#loader{
    display:none;
    position:fixed;
    inset:0;
    background:#000c;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}
</style>

</head>
<body>

<div class="contenedor-principal">

<h2>NAPOLES F.C.</h2>

<form id="formRegistro">

<!-- PASO 1 -->
<div id="paso1" class="paso activo">
<input id="ced" name="cedula" placeholder="CÉDULA (10 DÍGITOS)" maxlength="10" required>
<button type="button" onclick="validarCedulaEstricta()">VALIDAR</button>
</div>

<!-- PASO 2 -->
<div id="paso2" class="paso">
<input id="n1" name="nombre1" placeholder="PRIMER NOMBRE" required>
<input id="n2" name="nombre2" placeholder="SEGUNDO NOMBRE">
<input id="ape" name="apellidos" placeholder="APELLIDOS" required>

<label>FECHA DE NACIMIENTO</label>
<input type="date" name="fechaNac" required>

<button type="button" onclick="validarPaso2()">SIGUIENTE</button>
</div>

<!-- PASO 3 -->
<div id="paso3" class="paso">
<input name="telefono" placeholder="09XXXXXXXX" maxlength="10" required>
<input name="correo" placeholder="correo@email.com" required>

<button type="button" onclick="validarPaso3()">SIGUIENTE</button>
</div>

<!-- PASO 4 -->
<div id="paso4" class="paso">

<div id="contenedor-camara">
<video id="video" autoplay playsinline></video>
<div class="guia"></div>
</div>

<button type="button" onclick="iniciarCamara()">ACTIVAR CÁMARA</button>
<button type="button" onclick="capturarFoto()">CAPTURAR</button>

<img id="previewRostro" class="preview">

<input type="file" accept="image/*" onchange="previewFile(this,'previewCedula','fotoCedulaB64')" required>
<img id="previewCedula" class="preview">

<input type="hidden" id="fotoRostroB64" name="fotoRostroB64">
<input type="hidden" id="fotoCedulaB64" name="fotoCedulaB64">

<button type="button" onclick="validarPaso4()">SIGUIENTE</button>
</div>

<!-- PASO 5 -->
<div id="paso5" class="paso">
<select id="selectNombreCamiseta" name="nombreCamiseta" required></select>
<select id="selectDorsal" name="dorsal" required></select>
<button type="button" onclick="verPaso(6)">SIGUIENTE</button>
</div>

<!-- PASO 6 -->
<div id="paso6" class="paso">
<select name="mediasExtras" required>
<option value="">MEDIAS</option>
<option value="NO">NO</option>
<option value="SI">SI</option>
</select>

<input name="transaccionInscripcion" placeholder="COMPROBANTE INSCRIPCIÓN" required>
<input name="transaccionUniforme" placeholder="COMPROBANTE UNIFORME" required>

<button type="button" onclick="enviarRegistro()">FINALIZAR</button>
</div>

</form>
</div>

<div id="loader"><p id="loader-texto">PROCESANDO...</p></div>

<script src="api.js"></script>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
