<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Nápoles F.C.</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0a">

    <!-- Estilos -->
    <link rel="stylesheet" href="estilos.css">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="contenedor-principal">

    <header>
        <div class="texto-logo">NAPOLES F.C.</div>
        <h2>Ficha de Inscripción</h2>
    </header>

    <form id="formRegistro">

        <!-- PASO 1 -->
        <div id="paso1">
            <h3>Paso 1: Validación</h3>
            <input type="number" id="ced" name="cedula" placeholder="Cédula (10 dígitos)" required>
            <button type="button" onclick="validarCedulaEstricta()">Validar</button>
        </div>

        <!-- PASO 2 -->
        <div id="paso2" style="display:none;">
            <h3>Datos</h3>
            <input type="text" id="n1" name="nombre1" placeholder="Primer Nombre" required>
            <input type="text" id="n2" name="nombre2" placeholder="Segundo Nombre">
            <input type="text" id="ape" name="apellidos" placeholder="Apellidos" required>
            <input type="date" name="fechaNac" required>
            <button type="button" onclick="verPaso(3)">Siguiente</button>
        </div>

        <!-- PASO 3 -->
        <div id="paso3" style="display:none;">
            <h3>Contacto</h3>
            <input type="tel" name="telefono" placeholder="WhatsApp" required>
            <input type="email" name="correo" placeholder="Correo" required>
            <button type="button" onclick="verPaso(4)">Siguiente</button>
        </div>

        <!-- PASO 4 -->
        <div id="paso4" style="display:none;">
            <h3>Fotos</h3>

            <div id="contenedor-camara">
                <video id="video" autoplay playsinline></video>
                <div class="guia-circular"></div>
            </div>

            <button type="button" onclick="iniciarCamara()">Activar Cámara</button>
            <button type="button" onclick="capturarFoto()">Tomar Foto</button>

            <canvas id="canvas" style="display:none;"></canvas>
            <input type="hidden" id="fotoRostroB64" name="fotoRostroB64">

            <input type="file" accept="image/*" onchange="aBase64(this,'fotoCedulaB64')" required>
            <input type="hidden" id="fotoCedulaB64" name="fotoCedulaB64">

            <button type="button" onclick="abrirArmadura()">Siguiente</button>
        </div>

        <!-- PASO 5 -->
        <div id="paso5" style="display:none;">
            <h3>Uniforme</h3>
            <select id="selectNombreCamiseta" name="nombreCamiseta"></select>
            <select id="selectDorsal" name="dorsal"></select>
            <button type="button" onclick="verPaso(6)">Siguiente</button>
        </div>

        <!-- PASO 6 -->
        <div id="paso6" style="display:none;">
            <h3>Pago</h3>

            <select name="mediasExtras" id="mediasExtras" required>
                <option value="">Medias extras</option>
                <option value="NO">NO</option>
                <option value="SI">SI (+$2)</option>
            </select>

            <input type="text" name="transaccionInscripcion" placeholder="Comprobante inscripción" required>
            <input type="text" name="transaccionUniforme" placeholder="Comprobante uniforme" required>

            <button type="button" onclick="enviarRegistro()">Finalizar</button>
        </div>

    </form>

</div>

<div id="loader">
    <p id="loader-texto">Cargando...</p>
</div>

<!-- Scripts -->
<script src="api.js"></script>
<script src="nav.js"></script>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
