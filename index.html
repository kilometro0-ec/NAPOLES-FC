<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nápoles F.C. - Registro</title>

<link rel="stylesheet" href="estilos.css">

<style>
.paso{display:none;}
.paso.activo{display:block;animation:fade .25s ease;}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

.btn-accion:disabled{opacity:.4;pointer-events:none;}

.btn-accion.loading{
animation:pulse .8s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(.97)}
100%{transform:scale(1)}
}

#contenedor-camara{
position:relative;
width:280px;height:280px;
margin:20px auto;
border-radius:20px;
overflow:hidden;
border:2px solid #B59461;
}

#video,#previewCamara{
width:100%;height:100%;
object-fit:cover;
transform:scaleX(-1);
}

#previewCamara{position:absolute;top:0;left:0;display:none;}

.guia{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
width:200px;height:200px;
border:3px dashed #fff;
border-radius:50%;
box-shadow:0 0 0 1000px rgba(0,0,0,.5);
}

#loader{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
justify-content:center;
align-items:center;
flex-direction:column;
color:#fff;
}
</style>
</head>

<body>

<div class="contenedor-principal">

<header>
<h2>NAPOLES F.C.</h2>
<p>Ficha de Inscripción - 2026</p>
</header>

<form id="formRegistro">

<!-- PASO 1 -->
<div id="paso1" class="paso activo">
<input id="ced" maxlength="10" placeholder="CÉDULA 10 dígitos">
<button type="button" id="btnCedula" class="btn-accion" disabled>VALIDAR</button>
</div>

<!-- PASO 2 -->
<div id="paso2" class="paso">
<input id="ced2" readonly>
<input id="n1" placeholder="PRIMER NOMBRE">
<input id="n2" placeholder="SEGUNDO NOMBRE">
<input id="ape" placeholder="APELLIDOS">
<input type="date" id="fecha">
<button type="button" id="btnPaso2" class="btn-accion" disabled>SIGUIENTE</button>
</div>

<!-- PASO 3 -->
<div id="paso3" class="paso">
<input id="tel" placeholder="09XXXXXXXX">
<input id="correo" placeholder="correo@email.com">
<button type="button" id="btnPaso3" class="btn-accion" disabled>SIGUIENTE</button>
</div>

<!-- PASO 4 -->
<div id="paso4" class="paso">

<div id="contenedor-camara">
<video id="video" autoplay></video>
<img id="previewCamara">
<div class="guia"></div>
</div>

<button type="button" id="btnCamara" class="btn-accion">CÁMARA</button>
<button type="button" id="btnFoto" class="btn-accion">FOTO</button>

<input type="file" id="cedulaFile">

<button type="button" id="btnPaso4" class="btn-accion" disabled>SIGUIENTE</button>
</div>

<!-- PASO 5 -->
<div id="paso5" class="paso">
<h3>ARMA TU EQUIPO</h3>

<select id="nombreCamiseta"></select>
<select id="dorsal"></select>

<button type="button" id="btnPaso5" class="btn-accion" disabled>SIGUIENTE</button>
</div>

<!-- PASO 6 -->
<div id="paso6" class="paso">

<select id="medias">
<option value="">Medias ($2 extra)</option>
<option value="NO">NO</option>
<option value="SI">SI</option>
</select>

<input id="inscripcion" placeholder="Pago inscripción $5">
<input id="uniforme" placeholder="Pago uniforme $18">

<button type="button" id="btnFinal" class="btn-accion" disabled>FINALIZAR</button>

</div>

<input type="hidden" id="fotoRostroB64">
<input type="hidden" id="fotoCedulaB64">

</form>
</div>

<div id="loader">
<p id="loader-texto">Procesando...</p>
</div>

<script src="api.js"></script>

<script>
const $ = id => document.getElementById(id);

function verPaso(n){
document.querySelectorAll(".paso").forEach(p=>p.classList.remove("activo"));
$("paso"+n).classList.add("activo");
}

function loader(on,text){
$("loader").style.display = on?"flex":"none";
$("loader-texto").innerText = text;
}

// CI
$("ced").oninput=()=>{
$("btnCedula").disabled = $("ced").value.length!==10;
};

$("btnCedula").onclick=async()=>{
loader(true,"Validando CI...");
const r=await validarCedulaServidor($("ced").value);
if(!r.ok){alert(r.msg);loader(false);return;}
$("ced2").value=$("ced").value;
verPaso(2);
loader(false);
};

// paso 2
document.querySelectorAll("#paso2 input").forEach(i=>{
i.oninput=()=>{
$("btnPaso2").disabled=!(n1.value&&ape.value&&fecha.value);
};
});
$("btnPaso2").onclick=()=>verPaso(3);

// paso 3
document.querySelectorAll("#paso3 input").forEach(i=>{
i.oninput=()=>{
$("btnPaso3").disabled=!(/^09\d{8}$/.test(tel.value)&&correo.value.includes("@"));
};
});
$("btnPaso3").onclick=()=>verPaso(4);

// cámara
let stream;

$("btnCamara").onclick=async()=>{
stream=await navigator.mediaDevices.getUserMedia({video:true});
$("video").srcObject=stream;
};

$("btnFoto").onclick=()=>{
const c=document.createElement("canvas");
c.width=video.videoWidth;
c.height=video.videoHeight;
c.getContext("2d").drawImage(video,0,0);
$("fotoRostroB64").value=c.toDataURL("image/jpeg");
$("previewCamara").src=c.toDataURL();
$("previewCamara").style.display="block";
};

// paso 4
$("btnPaso4").onclick=async()=>{
await cargarArmadura();
verPaso(5);
};

// paso 5
$("btnPaso5").onclick=()=>verPaso(6);

// paso 6
$("btnFinal").onclick=async()=>{
loader(true,"Guardando...");
await enviarRegistro();
loader(false);
alert("REGISTRO EXITOSO");
};
</script>

</body>
</html>
