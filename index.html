<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nápoles F.C.</title>

<link rel="stylesheet" href="estilos.css">

<style>
.paso{display:none;}
.paso.activo{display:block;}

.btn-accion{width:100%;padding:14px;margin-top:15px}

#loader{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.8);
justify-content:center;
align-items:center;
color:white;
flex-direction:column;
z-index:9999;
}

#contenedor-camara{
width:280px;height:280px;margin:auto;
position:relative;border-radius:15px;
overflow:hidden;border:2px solid #B59461;
}

#video,#previewCamara{
width:100%;height:100%;object-fit:cover;
transform:scaleX(-1);
}

.guia{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
width:180px;height:180px;
border:3px dashed white;
border-radius:50%;
}
</style>
</head>

<body>

<div class="contenedor-principal">

<h2 style="text-align:center">NAPOLES F.C.</h2>
<p style="text-align:center">Ficha de inscripción 2026-2027</p>

<form id="formRegistro">

<!-- PASO 1 -->
<div id="paso1" class="paso activo">
<input id="ced" placeholder="CÉDULA">
<button type="button" id="btnCedula" class="btn-accion" disabled>VALIDAR</button>
</div>

<!-- PASO 2 -->
<div id="paso2" class="paso">
<input id="ced2" readonly>
<input id="n1" placeholder="NOMBRE 1">
<input id="n2" placeholder="NOMBRE 2">
<input id="ape" placeholder="APELLIDOS">
<input type="date" id="fecha">
<button type="button" id="btnPaso2" class="btn-accion">SIGUIENTE</button>
</div>

<!-- PASO 3 -->
<div id="paso3" class="paso">
<input id="tel" placeholder="TEL">
<input id="correo" placeholder="CORREO">
<button type="button" id="btnPaso3" class="btn-accion">SIGUIENTE</button>
</div>

<!-- PASO 4 -->
<div id="paso4" class="paso">

<div id="contenedor-camara">
<video id="video" autoplay></video>
<img id="previewCamara">
<div class="guia"></div>
</div>

<button type="button" id="btnCamara">CAMARA</button>
<button type="button" id="btnFoto">FOTO</button>

<input type="file" id="cedulaFile">

<button type="button" id="btnPaso4">SIGUIENTE</button>
</div>

<!-- PASO 5 -->
<div id="paso5" class="paso">
<h3>ARMADURA</h3>
<select id="nombreCamiseta"></select>
<select id="dorsal"></select>
<button type="button" id="btnPaso5">SIGUIENTE</button>
</div>

<!-- PASO 6 -->
<div id="paso6" class="paso">
<select id="medias">
<option value="">MEDIAS</option>
<option>NO</option>
<option>SI</option>
</select>

<input id="inscripcion" placeholder="INSCRIPCIÓN">
<input id="uniforme" placeholder="UNIFORME">

<button type="button" id="btnFinal">FINALIZAR</button>
</div>

<input type="hidden" id="fotoRostroB64">
<input type="hidden" id="fotoCedulaB64">

</form>
</div>

<div id="loader">
<p id="loader-texto">Cargando...</p>
</div>

<script src="api.js"></script>

<script>

function verPaso(n){
document.querySelectorAll(".paso").forEach(p=>p.classList.remove("activo"));
document.getElementById("paso"+n).classList.add("activo");
}

function loader(on,text){
document.getElementById("loader-texto").innerText=text;
document.getElementById("loader").style.display=on?"flex":"none";
}

ced.oninput=()=>btnCedula.disabled=ced.value.length!==10;

btnCedula.onclick=async()=>{
loader(true,"Validando...");
const r=await validarCedulaServidor(ced.value);
if(!r.ok){alert(r.msg);loader(false);return;}
ced2.value=ced.value;
verPaso(2);
loader(false);
};

btnPaso2.onclick=()=>verPaso(3);
btnPaso3.onclick=()=>verPaso(4);

btnCamara.onclick=async()=>{
stream=await navigator.mediaDevices.getUserMedia({video:true});
video.srcObject=stream;
};

btnFoto.onclick=()=>{
const c=document.createElement("canvas");
c.width=video.videoWidth;
c.height=video.videoHeight;
c.getContext("2d").drawImage(video,0,0);
const img=c.toDataURL("image/jpeg");
fotoRostroB64.value=img;
previewCamara.src=img;
stream.getTracks().forEach(t=>t.stop());
};

btnPaso4.onclick=async()=>{
await cargarArmadura();
verPaso(5);
};

async function cargarArmadura(){
nombreCamiseta.innerHTML="";
dorsal.innerHTML="";

nombreCamiseta.add(new Option(n1.value,n1.value));

const r=await fetch(URL_GAS+"?action=getDorsales");
const usados=await r.json();

for(let i=1;i<=99;i++){
if(!usados.includes(String(i))){
dorsal.add(new Option(i,i));
}
}
}

btnPaso5.onclick=()=>verPaso(6);

btnFinal.onclick=async()=>{
loader(true,"Guardando...");
await enviarRegistro();
loader(false);
alert("REGISTRO EXITOSO");
};

</script>

</body>
</html>
