<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nápoles F.C. Registro</title>

<link rel="stylesheet" href="estilos.css">
<link rel="manifest" href="manifest.json">

<style>
.paso{display:none;}
.paso.activo{display:block;animation:fade .25s ease;}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

.pasos-bar{
display:flex;
justify-content:space-between;
margin:10px 0 20px;
font-size:12px;
opacity:.8;
}

.paso-ind{
padding:4px 8px;
border-radius:10px;
background:#ddd;
}

.paso-ind.activo{
background:#1A2B48;
color:#fff;
}

.btn-accion:disabled{opacity:.4}
#loader{display:none}
.preview{font-size:12px;opacity:.7}
input,select{
width:100%;
margin:6px 0;
padding:10px;
}
</style>
</head>

<body>

<div class="contenedor-principal">

<header>
<h2>NÁPOLES F.C.</h2>
<p>Registro de jugadores</p>
</header>

<!-- PROGRESO -->
<div class="pasos-bar">
<span id="p1" class="paso-ind activo">1</span>
<span id="p2" class="paso-ind">2</span>
<span id="p3" class="paso-ind">3</span>
<span id="p4" class="paso-ind">4</span>
<span id="p5" class="paso-ind">5</span>
<span id="p6" class="paso-ind">6</span>
</div>

<form id="formRegistro">

<!-- PASO 1 -->
<div id="paso1" class="paso activo">
<h3>Ingresa tu cédula</h3>
<input id="ced" maxlength="10" placeholder="CÉDULA">
<button type="button" id="btnCedula" disabled>VALIDAR</button>
</div>

<!-- PASO 2 -->
<div id="paso2" class="paso">
<h3>Datos personales</h3>
<input id="n1" placeholder="Primer nombre">
<input id="n2" placeholder="Segundo nombre">
<input id="ape" placeholder="Apellidos">
<input type="date" id="fecha">

<button type="button" id="btnPaso2" disabled>SIGUIENTE</button>
</div>

<!-- PASO 3 -->
<div id="paso3" class="paso">
<h3>Contacto</h3>
<input id="tel" placeholder="Teléfono">
<input id="correo" placeholder="Correo">

<button type="button" id="btnPaso3" disabled>SIGUIENTE</button>
</div>

<!-- PASO 4 -->
<div id="paso4" class="paso">
<h3>Sube tus fotos</h3>

<label>Foto de perfil</label>
<input type="file" id="rostroFile" accept="image/*">
<div class="preview" id="txtRostro">Sin imagen</div>

<label>Foto de cédula</label>
<input type="file" id="cedulaFile" accept="image/*">
<div class="preview" id="txtCedula">Sin imagen</div>

<button type="button" id="btnPaso4" disabled>SIGUIENTE</button>
</div>

<!-- PASO 5 -->
<div id="paso5" class="paso">
<h3>Armadura</h3>

<select id="nombreCamiseta">
<option value="">Selecciona jugador</option>
</select>

<select id="dorsal">
<option value="">Selecciona dorsal</option>
</select>

<button type="button" id="btnPaso5" disabled>SIGUIENTE</button>
</div>

<!-- PASO 6 -->
<div id="paso6" class="paso">
<h3>Confirmación de pago</h3>

<select id="medias">
<option value="">Medias ($2)</option>
<option value="NO">NO</option>
<option value="SI">SI</option>
</select>

<input id="inscripcion" placeholder="Pago inscripción">
<input id="uniforme" placeholder="Pago uniforme">

<button type="button" id="btnFinal" disabled>FINALIZAR REGISTRO</button>
</div>

<!-- HIDDEN -->
<input type="hidden" id="fotoRostroB64">
<input type="hidden" id="fotoCedulaB64">

</form>

</div>

<div id="loader">Procesando...</div>

<script src="api.js"></script>
<script src="nav.js"></script>

<script>

formRegistro.onsubmit = e => e.preventDefault();

/* ========= PASO 1 ========= */
ced.oninput = () => {
ced.value = ced.value.replace(/\D/g,"");
btnCedula.disabled = ced.value.length !== 10;
};

btnCedula.onclick = () => verPaso(2);

/* ========= PASO 2 ========= */
document.querySelectorAll("#paso2 input").forEach(i=>{
i.oninput = ()=>{
btnPaso2.disabled = !(n1.value && n2.value && ape.value && fecha.value);
};
});
btnPaso2.onclick = ()=>verPaso(3);

/* ========= PASO 3 ========= */
document.querySelectorAll("#paso3 input").forEach(i=>{
i.oninput = ()=>{
btnPaso3.disabled = !(tel.value && correo.value);
};
});
btnPaso3.onclick = ()=>verPaso(4);

/* ========= PASO 4 ========= */
let okR=false, okC=false;

rostroFile.onchange = e=>{
const r=new FileReader();
r.onload=()=>{
fotoRostroB64.value=r.result;
txtRostro.innerText="✔ cargado";
okR=true;
validar4();
};
r.readAsDataURL(e.target.files[0]);
};

cedulaFile.onchange = e=>{
const r=new FileReader();
r.onload=()=>{
fotoCedulaB64.value=r.result;
txtCedula.innerText="✔ cargado";
okC=true;
validar4();
};
r.readAsDataURL(e.target.files[0]);
};

function validar4(){
btnPaso4.disabled = !(okR && okC);
}

btnPaso4.onclick = ()=>verPaso(5);

/* ========= PASO 5 ========= */
const dorsal = document.getElementById("dorsal");

for(let i=1;i<=99;i++){
let o=document.createElement("option");
o.value=i;
o.textContent=i;
dorsal.appendChild(o);
}

document.querySelectorAll("#paso5 select").forEach(s=>{
s.onchange = ()=>{
btnPaso5.disabled = !(nombreCamiseta.value && dorsal.value);
};
});

btnPaso5.onclick = ()=>verPaso(6);

/* ========= PASO 6 (ARREGLADO ✔) ========= */
document.querySelectorAll("#paso6 input,#paso6 select").forEach(i=>{
i.oninput = ()=>{
btnFinal.disabled = !(
medias.value &&
inscripcion.value.trim().length >= 3 &&
uniforme.value.trim().length >= 3
);
};
});

/* ========= FINAL ========= */
btnFinal.onclick = async ()=>{

loader.style.display="flex";

await enviarRegistro();

loader.style.display="none";

const a=document.createElement("a");
a.href=APK_URL;
a.download="NapolesFC.apk";
a.click();

setTimeout(()=>{
window.location.href="login.html";
},1200);

};

</script>

</body>
</html>
