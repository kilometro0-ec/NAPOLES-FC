<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registro Nápoles FC</title>
    <link rel="stylesheet" href="estilos.css?v=4.0">
</head>
<body>

    <!-- Animación Final de Éxito -->
    <div id="final-animacion">
        <img src="https://cdn-icons-png.flaticon.com/512/53/53283.png" class="balon-animado" alt="balon">
        <h2 id="final-status">PROCESANDO...</h2>
        <p id="final-mensaje">Guardando tu información en el club.</p>
    </div>

    <!-- Pantalla de Carga (Loader) -->
    <div id="loader">
        <div class="spinner-balon"></div>
        <p>VALIDANDO DATOS...</p>
    </div>

    <div class="contenedor-principal">
        <header>
            <h1 class="titulo-club">NÁPOLES F.C.</h1>
            <div class="progreso-puntos">
                <div id="p1" class="punto activo"></div>
                <div id="p2" class="punto"></div>
                <div id="p3" class="punto"></div>
                <div id="p4" class="punto"></div>
            </div>
        </header>

        <form id="formRegistro">
            <!-- PASO 1: Datos y Validación de Pago -->
            <div id="step1" class="paso-contenido paso-activo">
                <label class="tag">DATOS DE IDENTIDAD</label>
                <input type="text" id="n1" name="nombre1" placeholder="PRIMER NOMBRE" required oninput="this.value = this.value.toUpperCase()">
                <input type="text" id="n2" name="nombre2" placeholder="SEGUNDO NOMBRE" oninput="this.value = this.value.toUpperCase()">
                <input type="text" id="ape" name="apellidos" placeholder="APELLIDOS COMPLETOS" required oninput="this.value = this.value.toUpperCase()">
                
                <input type="tel" id="ced" name="cedula" placeholder="CÉDULA (10 DÍGITOS)" maxlength="10" required>
                
                <label class="tag">VALIDACIÓN DE PAGO ($5.00)</label>
                <input type="text" id="trans" name="transaccion" placeholder="Nº DE TRANSACCIÓN" required oninput="this.value = this.value.toUpperCase()">
                
                <button type="button" class="btn-siguiente" onclick="validarDatosIniciales()">SIGUIENTE</button>
            </div>

            <!-- PASO 2: Datos Adicionales y Camiseta -->
            <div id="step2" class="paso-contenido">
                <label class="tag">FECHA DE NACIMIENTO</label>
                <input type="date" name="fechaNac" required>
                
                <label class="tag">CORREO (MINÚSCULAS)</label>
                <input type="email" name="correo" placeholder="ejemplo@correo.com" required>

                <label class="tag">DORSAL DISPONIBLE</label>
                <select name="dorsal" id="selectDorsal" required></select>

                <label class="tag">NOMBRE EN CAMISETA</label>
                <select name="nombreCamiseta" id="selectNombreCamiseta" required></select>

                <input type="tel" id="wha" name="telefono" placeholder="WHATSAPP (09XXXXXXXX)" maxlength="10" required>
                
                <input type="hidden" name="estado" value="PENDIENTE">

                <div class="flex-btns">
                    <button type="button" class="btn-atras" onclick="verPaso(1)">ATRÁS</button>
                    <button type="button" class="btn-siguiente" onclick="validarPaso2()">SIGUIENTE</button>
                </div>
            </div>

            <!-- PASO 3: Foto Rostro (Espejo) -->
            <div id="step3" class="paso-contenido">
                <label class="tag">FOTO DEL ROSTRO (TIPO ESPEJO)</label>
                <div class="camara-box">
                    <video id="videoRostro" autoplay playsinline class="espejo"></video>
                    <img id="prevRostro" class="preview-img">
                    <div class="guia-rostro"></div>
                </div>
                <input type="hidden" id="fotoRostroB64" name="fotoRostroB64">
                
                <div id="controlesRostro">
                    <button type="button" class="btn-foto" onclick="capturar('Rostro')">📸 CAPTURAR</button>
                </div>
                <div id="reintentarRostro" class="flex-btns" style="display:none;">
                    <button type="button" class="btn-atras" onclick="reintentar('Rostro')">REPETIR</button>
                    <button type="button" class="btn-siguiente" onclick="verPaso(4)">SIGUIENTE</button>
                </div>
            </div>

            <!-- PASO 4: Foto Cédula -->
            <div id="step4" class="paso-contenido">
                <label class="tag">FOTO DE CÉDULA</label>
                <div class="camara-box">
                    <video id="videoCedula" autoplay playsinline></video>
                    <img id="prevCedula" class="preview-img">
                    <div class="guia-cedula"></div>
                </div>
                <input type="hidden" id="fotoCedulaB64" name="fotoCedulaB64">

                <div id="controlesCedula">
                    <button type="button" class="btn-foto" onclick="capturar('Cedula')">📸 CAPTURAR</button>
                </div>
                <div id="reintentarCedula" class="flex-btns" style="display:none;">
                    <button type="button" class="btn-atras" onclick="reintentar('Cedula')">REPETIR</button>
                    <button type="button" class="btn-finalizar" onclick="enviarTodo()">FINALIZAR</button>
                </div>
            </div>
        </form>
    </div>

    <!-- Scripts en orden -->
    <script src="api.js?v=4.0"></script>
    <script src="script.js?v=4.0"></script>
</body>
</html>
