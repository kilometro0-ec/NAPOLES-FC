<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripción | Nápoles FC</title>
    
    <!-- Configuración PWA Moderna -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#b59461">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Nápoles FC">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Iconos Locales (Asegúrate de que existan en tu carpeta img/) -->
    <link rel="icon" href="img/favicon.png">
    <link rel="apple-touch-icon" href="img/icono-192.png">

    <!-- Enlace a tus estilos externos -->
    <link rel="stylesheet" href="estilos.css">
    
    <style>
        /* Animaciones y estilos adicionales para botones sugeridos */
        :root { 
            --dorado: #b59461; 
            --azul-noche: #0a192f; 
        }

        /* Animación de pulsación para botones */
        .btn-animado {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .btn-animado:hover {
            transform: translateY(-3px);
            filter: brightness(1.2);
            box-shadow: 0 8px 15px rgba(181, 148, 97, 0.4);
        }

        .btn-animado:active {
            transform: scale(0.95);
        }

        /* Brillo al pasar el mouse */
        .btn-animado::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255,255,255,0.1);
            transform: rotate(45deg);
            transition: 0.5s;
            opacity: 0;
        }

        .btn-animado:hover::after {
            left: 120%;
            opacity: 1;
        }

        /* Pantalla de carga mejorada */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 25, 47, 0.98);
            z-index: 10000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .spinner-napoles {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(181, 148, 97, 0.2);
            border-top-color: var(--dorado);
            border-radius: 50%;
            animation: spin 1s infinite linear;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        
        .seccion-oculta { display: none; }
    </style>
</head>
<body>

    <!-- Overlay de Carga -->
    <div id="loader" class="loading-overlay">
        <div class="spinner-napoles"></div>
        <p style="color: var(--dorado); margin-top: 20px; font-weight: bold;">PROCESANDO REGISTRO...</p>
    </div>

    <div class="contenedor-principal">
        <header style="text-align: center; margin-bottom: 30px;">
            <img src="img/logo.png" alt="Logo Nápoles" style="width: 80px;">
            <h2>Inscripción Oficial</h2>
            <p style="color: var(--dorado); font-size: 0.9em;">TEMPORADA 2026</p>
        </header>

        <form id="formularioRegistro">
            
            <!-- PASO 1: IDENTIDAD -->
            <div id="paso1" class="seccion-formulario">
                <label>Primer Nombre</label>
                <input type="text" id="nombre1" placeholder="Ej: JUAN" required>
                
                <label>Segundo Nombre</label>
                <input type="text" id="nombre2" placeholder="Ej: CARLOS" required>
                
                <label>Apellidos</label>
                <input type="text" id="apellidos" placeholder="Ej: PÉREZ ZAMBRANO" required>
                
                <label>Cédula de Identidad</label>
                <input type="text" id="cedula" placeholder="10 dígitos" maxlength="10" required>
                
                <button type="button" class="btn-accion btn-animado" onclick="validarYPasar(1, 2)">SIGUIENTE</button>
            </div>

            <!-- PASO 2: CONTACTO -->
            <div id="paso2" class="seccion-formulario seccion-oculta">
                <label>Fecha de Nacimiento</label>
                <input type="date" id="fechaNac" required>
                
                <label>WhatsApp</label>
                <input type="tel" id="telefono" placeholder="0987654321" maxlength="10" required>
                
                <label>Correo Electrónico</label>
                <input type="email" id="correo" placeholder="ejemplo@correo.com" required>
                
                <div class="botones-nav">
                    <button type="button" class="btn-accion btn-secundario btn-animado" onclick="irAtras(2, 1)">ATRÁS</button>
                    <button type="button" class="btn-accion btn-animado" onclick="validarYPasar(2, 3)">FOTOS</button>
                </div>
            </div>

            <!-- PASO 3: MULTIMEDIA -->
            <div id="paso3" class="seccion-formulario seccion-oculta">
                <label>Foto de Rostro ( सेल्फी )</label>
                <video id="video" autoplay playsinline style="width: 100%; border-radius: 10px; border: 2px solid var(--dorado);"></video>
                <canvas id="canvas" style="display:none;"></canvas>
                
                <button type="button" id="btnCapturar" class="btn-accion btn-animado" style="background: #fff; color: #000; margin-top: 10px;">
                    📸 CAPTURAR FOTO
                </button>
                
                <img id="fotoPreview" class="preview-camara" style="width: 100%; display: none; border-radius: 10px;">
                
                <label style="margin-top: 20px;">Foto de Cédula (Frontal)</label>
                <input type="file" id="fotoCedula" accept="image/*" required>
                
                <div class="botones-nav">
                    <button type="button" class="btn-accion btn-secundario btn-animado" onclick="irAtras(3, 2)">ATRÁS</button>
                    <button type="submit" id="btnFinalizar" class="btn-accion btn-animado">FINALIZAR INSCRIPCIÓN</button>
                </div>
            </div>

        </form>
    </div>

    <!-- CARGA DE SCRIPTS EN ORDEN -->
    <script src="nav.js"></script> <!-- Maneja validarYPasar e irAtras e inicio de cámara -->
    <script src="api.js"></script> <!-- Maneja el submit del formulario y envío a Google -->

    <script>
        // Lógica local para la cámara (puedes moverla a nav.js si prefieres)
        let stream;
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const fotoPreview = document.getElementById('fotoPreview');

        async function iniciarCamara() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                video.style.display = 'block';
                fotoPreview.style.display = 'none';
            } catch (err) {
                alert("Error al acceder a la cámara: " + err);
            }
        }

        document.getElementById('btnCapturar').onclick = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const data = canvas.toDataURL('image/jpeg', 0.8);
            fotoPreview.src = data;
            fotoPreview.style.display = 'block';
            video.style.display = 'none';
            if(stream) stream.getTracks().forEach(track => track.stop());
        };
    </script>
</body>
</html>
