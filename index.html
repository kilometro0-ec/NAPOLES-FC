<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripción | Nápoles FC</title>
    
    <!-- Configuración PWA Moderna -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1A2B48">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Nápoles FC">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Iconos Locales -->
    <link rel="icon" href="img/favicon.png">
    <link rel="apple-touch-icon" href="img/icono-192.png">

    <!-- Enlace a tus estilos externos -->
    <link rel="stylesheet" href="estilos.css">
    
    <style>
        /* Animaciones adicionales para botones */
        .btn-accion {
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
        }

        .btn-accion:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
            box-shadow: 0 5px 15px rgba(0, 139, 148, 0.4) !important;
        }

        .btn-accion:active {
            transform: scale(0.95);
        }

        /* Efecto de brillo al pasar el mouse */
        .btn-accion::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(45deg);
            transition: 0.5s;
            opacity: 0;
        }

        .btn-accion:hover::after {
            left: 120%;
            opacity: 1;
        }

        /* Pantalla de carga (Loader) */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 43, 72, 0.98);
            z-index: 10000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .spinner {
            width: 50px; height: 50px;
            border: 5px solid rgba(181, 148, 97, 0.2);
            border-top: 5px solid #B59461;
            border-radius: 50%;
            animation: spin 1s infinite linear;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .seccion-formulario { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #video { width: 100%; border-radius: 12px; border: 2px solid #B59461; background: #000; }
        .preview-camara { width: 100%; border-radius: 12px; display: none; border: 2px solid #008B94; }
        .seccion-oculta { display: none; }
    </style>
</head>
<body>

    <!-- Pantalla de Carga -->
    <div id="loader" class="loading-overlay">
        <div class="spinner"></div>
        <p style="color: #B59461; margin-top: 20px; font-weight: bold; letter-spacing: 1px;">ENVIANDO DATOS...</p>
    </div>

    <div class="contenedor-principal">
        <header style="text-align: center; margin-bottom: 20px;">
            <img src="img/logo.png" alt="Logo" style="width: 70px;">
            <h2>Inscripción Oficial</h2>
            <p style="color: #B59461; font-size: 0.8em; margin-top: -10px;">CORPORACIÓN 360 • 2026</p>
        </header>

        <form id="formularioRegistro">
            
            <!-- PASO 1 -->
            <div id="paso1" class="seccion-formulario">
                <label>Primer Nombre</label>
                <input type="text" id="nombre1" required placeholder="EJ: JUAN">
                
                <label>Segundo Nombre</label>
                <input type="text" id="nombre2" required placeholder="EJ: CARLOS">
                
                <label>Apellidos</label>
                <input type="text" id="apellidos" required placeholder="EJ: PÉREZ">
                
                <label>Cédula de Identidad</label>
                <input type="text" id="cedula" maxlength="10" required placeholder="10 DÍGITOS">
                
                <button type="button" class="btn-accion" onclick="validarYPasar(1, 2)">Siguiente</button>
            </div>

            <!-- PASO 2 -->
            <div id="paso2" class="seccion-formulario seccion-oculta">
                <label>Fecha de Nacimiento</label>
                <input type="date" id="fechaNac" required>
                
                <label>WhatsApp</label>
                <input type="tel" id="telefono" maxlength="10" required placeholder="0987654321">
                
                <label>Correo Electrónico</label>
                <input type="email" id="correo" required placeholder="usuario@correo.com">
                
                <div style="display: flex; gap: 10px;">
                    <button type="button" class="btn-accion" style="background:#444" onclick="irAtras(2, 1)">Atrás</button>
                    <button type="button" class="btn-accion" onclick="validarYPasar(2, 3)">Siguiente</button>
                </div>
            </div>

            <!-- PASO 3 -->
            <div id="paso3" class="seccion-formulario seccion-oculta">
                <label>Foto de Rostro (Verificación)</label>
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas" style="display:none;"></canvas>
                
                <button type="button" id="btnCapturar" class="btn-accion" style="background: #fff; color: #1A2B48;">
                    📷 CAPTURAR FOTO
                </button>
                
                <img id="fotoPreview" class="preview-camara">
                
                <label style="margin-top: 20px;">Foto de Cédula (Frontal)</label>
                <input type="file" id="fotoCedula" accept="image/*" required>
                
                <div style="display: flex; gap: 10px;">
                    <button type="button" class="btn-accion" style="background:#444" onclick="irAtras(3, 2)">Atrás</button>
                    <button type="submit" class="btn-accion">FINALIZAR INSCRIPCIÓN</button>
                </div>
            </div>

        </form>
    </div>

    <!-- Integración de tus archivos externos -->
    <script src="nav.js"></script>
    <script src="api.js"></script>

    <script>
        /**
         * Lógica de Navegación y Cámara 
         * (Puedes mover esto a nav.js si prefieres tenerlo separado)
         */
        let stream;

        function validarYPasar(actual, siguiente) {
            const inputs = document.querySelectorAll(`#paso${actual} [required]`);
            let valido = true;
            inputs.forEach(i => { if(!i.checkValidity()) { i.reportValidity(); valido = false; } });

            if(valido) {
                document.getElementById(`paso${actual}`).classList.add('seccion-oculta');
                document.getElementById(`paso${siguiente}`).classList.remove('seccion-oculta');
                if(siguiente === 3) iniciarCamara();
            }
        }

        function irAtras(actual, anterior) {
            document.getElementById(`paso${actual}`).classList.add('seccion-oculta');
            document.getElementById(`paso${anterior}`).classList.remove('seccion-oculta');
            if(actual === 3 && stream) stream.getTracks().forEach(t => t.stop());
        }

        async function iniciarCamara() {
            const video = document.getElementById('video');
            const preview = document.getElementById('fotoPreview');
            video.style.display = 'block';
            preview.style.display = 'none';
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
            } catch (e) {
                alert("Para inscribirte, debes permitir el uso de la cámara.");
            }
        }

        document.getElementById('btnCapturar').onclick = () => {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const preview = document.getElementById('fotoPreview');
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            const data = canvas.toDataURL('image/jpeg', 0.8);
            preview.src = data;
            preview.style.display = 'block';
            video.style.display = 'none';
            
            if(stream) stream.getTracks().forEach(t => t.stop());
        };
    </script>
</body>
</html>
