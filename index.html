<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro - Nápoles F.C.</title>

<link rel="icon" href="favicon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1A2B48">

<link rel="stylesheet" href="estilos.css">

<style>
.nav-napoles{display:none !important;}

.paso{display:none;}
.paso.activo{display:block;}

.btn-accion:disabled{
    opacity:0.4;
    pointer-events:none;
}

.btn-accion.loading{
    animation:pulse 1s infinite;
}

@keyframes pulse{
    0%{transform:scale(1)}
    50%{transform:scale(0.97)}
    100%{transform:scale(1)}
}

#contenedor-camara{
    position:relative;
    width:280px;
    height:280px;
    margin:20px auto;
    overflow:hidden;
    border-radius:20px;
    border:2px solid var(--dorado);
}

#video, #previewCamara{
    width:100%;
    height:100%;
    object-fit:cover;
    transform:scaleX(-1);
}

#previewCamara{
    position:absolute;
    top:0;
    left:0;
    display:none;
}

.guia{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:200px;
    height:200px;
    border:3px dashed white;
    border-radius:50%;
    box-shadow:0 0 0 1000px rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<div class="contenedor-principal">

<header>
<h2>NAPOLES F.C.</h2>
<p style="text-align:center;color:var(--dorado)">Ficha de Inscripción</p>
</header>

<form id="formRegistro">

<!-- PASO 1 -->
<div id="paso1" class="paso activo">
<label>Cédula</label>
<input id="ced" maxlength="10" placeholder="10 dígitos">
<button type="button" id="btnCedula" class="btn-accion" disabled>
VALIDAR JUGADOR
</button>
</div>

<!-- PASO 2 -->
<div id="paso2" class="paso">
<label>Cédula</label>
<input id="ced2" readonly>

<input id="n1" placeholder="Primer Nombre">
<input id="n2" placeholder="Segundo Nombre">
<input id="ape" placeholder="Apellidos">

<label>Fecha</label>
<input type="date" id="fecha">

<button type="button" id="btnPaso2" class="btn-accion" disabled>Siguiente</button>
</div>

<!-- PASO 3 -->
<div id="paso3" class="paso">
<input id="tel" placeholder="09XXXXXXXX">
<input id="correo" placeholder="correo@email.com">

<button type="button" id="btnPaso3" class="btn-accion" disabled>Siguiente</button>
</div>

<!-- PASO 4 -->
<div id="paso4" class="paso">

<div id="contenedor-camara">
<video id="video" autoplay></video>
<img id="previewCamara">
<div class="guia"></div>
</div>

<button type="button" id="btnCamara" class="btn-accion">Activar Cámara</button>
<button type="button" id="btnFoto" class="btn-accion" style="background:#B59461">
Capturar Foto
</button>

<input type="file" id="cedulaFile">

<button type="button" id="btnPaso4" class="btn-accion" disabled>Siguiente</button>
</div>

<!-- PASO 5 -->
<div id="paso5" class="paso">
<h3 style="color:var(--dorado)">⚔️ ARMA TU ARMADURA</h3>

<select id="nombreCamiseta">
<option value="">Seleccionar Nombre</option>
</select>

<select id="dorsal">
<option value="">Seleccionar Dorsal</option>
</select>

<button type="button" id="btnPaso5" class="btn-accion" disabled>Siguiente</button>
</div>

<!-- PASO 6 -->
<div id="paso6" class="paso">

<select id="medias">
<option value="">Medias</option>
<option>NO</option>
<option>SI</option>
</select>

<label>Comprobante Inscripción ($5)</label>
<input id="inscripcion" maxlength="10" placeholder="0001234567">

<label>Comprobante Uniforme ($18)</label>
<input id="uniforme" maxlength="10" placeholder="0001234567">

<button type="button" id="btnFinal" class="btn-accion" disabled>
FINALIZAR
</button>

</div>

<input type="hidden" id="fotoRostroB64" name="fotoRostroB64">

</form>
</div>

<!-- LOADER -->
<div id="loader">
<div class="spinner-balon"></div>
<p id="loader-texto">Procesando...</p>
</div>

<script src="api.js"></script>

<script>
// 🔴 EVITA RECARGA (CLAVE)
document.getElementById("formRegistro").addEventListener("submit", e=>{
    e.preventDefault();
});

// ================= PASO 1 =================
ced.addEventListener("input",()=>{
    btnCedula.disabled = ced.value.length !== 10;
});

btnCedula.onclick = async ()=>{
    const cedula = ced.value;

    btnCedula.classList.add("loading");
    loader(true,"Validando cédula...");

    const result = await validarCedulaServidor(cedula);

    if(!result.ok){
        alert("❌ " + result.msg);
        loader(false);
        btnCedula.classList.remove("loading");
        return;
    }

    verPaso(2);

    ced2.value = cedula;
    ced.readOnly = true;
    ced.style.opacity = "0.6";

    loader(false);
    btnCedula.classList.remove("loading");
};

// ================= PASO 2 =================
document.querySelectorAll("#paso2 input").forEach(i=>{
    i.addEventListener("input",()=>{
        btnPaso2.disabled = !n1.value || !ape.value || !fecha.value;
    });
});
btnPaso2.onclick = ()=>verPaso(3);

// ================= PASO 3 =================
document.querySelectorAll("#paso3 input").forEach(i=>{
    i.addEventListener("input",()=>{
        btnPaso3.disabled = !( /^09\d{8}$/.test(tel.value) && /^\S+@\S+\.\S+$/.test(correo.value) );
    });
});
btnPaso3.onclick = ()=>verPaso(4);

// ================= CÁMARA =================
btnCamara.onclick = iniciarCamara;

btnFoto.onclick = ()=>{
    capturarFoto();
    previewCamara.style.display="block";
    video.style.display="none";
};

// ================= PASO 4 =================
cedulaFile.addEventListener("change",()=>{
    btnPaso4.disabled = !(previewCamara.src && cedulaFile.files.length);
});
btnPaso4.onclick = ()=>verPaso(5);

// ================= PASO 5 =================
document.querySelectorAll("#paso5 select").forEach(s=>{
    s.addEventListener("change",()=>{
        btnPaso5.disabled = !(nombreCamiseta.value && dorsal.value);
    });
});
btnPaso5.onclick = ()=>verPaso(6);

// ================= PASO 6 =================
document.querySelectorAll("#paso6 input, #paso6 select").forEach(i=>{
    i.addEventListener("input",()=>{
        btnFinal.disabled = !(medias.value && inscripcion.value.length===10 && uniforme.value.length===10);
    });
});

// ================= FINAL =================
btnFinal.onclick = async ()=>{
    loader(true,"Procesando registro...");
    await enviarRegistro();
};
</script>

</body>
</html>
