<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Nápoles F.C. - Registro Oficial</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        background: radial-gradient(circle at 10% 20%, #0a1928, #020c1a);
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
    }
    .registro-container {
        max-width: 560px;
        width: 100%;
        background: rgba(12, 25, 45, 0.65);
        backdrop-filter: blur(18px);
        border-radius: 2.5rem;
        border: 1px solid rgba(0, 143, 155, 0.3);
        box-shadow: 0 30px 50px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(0, 143, 155, 0.15) inset;
        padding: 2rem 1.8rem;
        transition: transform 0.25s ease, box-shadow 0.3s;
    }
    .registro-container:hover {
        transform: translateY(-3px);
        box-shadow: 0 35px 55px rgba(0, 0, 0, 0.5);
    }
    .header {
        text-align: center;
        margin-bottom: 2.2rem;
    }
    .header h1 {
        font-size: 2rem;
        font-weight: 800;
        background: linear-gradient(135deg, #D4AF37, #F3D572);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        letter-spacing: -0.5px;
        margin-bottom: 0.4rem;
    }
    .header p {
        color: #b0c4de;
        font-size: 0.9rem;
        font-weight: 400;
    }
    .badge {
        display: inline-block;
        background: rgba(0, 143, 155, 0.2);
        border-radius: 60px;
        padding: 0.4rem 1.5rem;
        font-size: 0.9rem;
        color: #8fcbdb;
        margin-top: 0.6rem;
        font-weight: 500;
    }
    .paso {
        display: none;
        animation: fadeSlide 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }
    .paso.activo {
        display: block;
    }
    @keyframes fadeSlide {
        0% { opacity: 0; transform: translateY(12px); }
        100% { opacity: 1; transform: translateY(0); }
    }
    .campo {
        margin-bottom: 1.2rem;
    }
    label {
        display: block;
        font-size: 0.75rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #9ab3cf;
        margin-bottom: 0.25rem;
    }
    input, select {
        width: 100%;
        padding: 0.9rem 1.2rem;
        background: rgba(0, 0, 0, 0.45);
        border: 1px solid rgba(0, 143, 155, 0.6);
        border-radius: 2rem;
        color: white;
        font-size: 1rem;
        font-family: 'Inter', monospace;
        transition: all 0.25s;
        outline: none;
    }
    input:focus, select:focus {
        border-color: #008f9b;
        box-shadow: 0 0 0 3px rgba(0, 143, 155, 0.3);
        background: rgba(0, 0, 0, 0.7);
    }
    input.error, select.error {
        border-color: #ff6b6b;
        animation: shake 0.3s ease;
    }
    @keyframes shake {
        0%,100% { transform: translateX(0); }
        25% { transform: translateX(-4px); }
        75% { transform: translateX(4px); }
    }
    .help-note {
        font-size: 0.7rem;
        color: #8db5d0;
        margin-top: 0.3rem;
        margin-left: 0.8rem;
        font-style: italic;
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .btn-primary {
        background: linear-gradient(105deg, #008f9b, #006b74);
        border: none;
        padding: 0.9rem;
        width: 100%;
        border-radius: 3rem;
        font-weight: 700;
        font-size: 1rem;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: white;
        cursor: pointer;
        margin-top: 1.2rem;
        transition: all 0.25s;
        box-shadow: 0 5px 12px rgba(0, 0, 0, 0.3);
    }
    .btn-primary:hover:not(:disabled) {
        transform: translateY(-2px);
        background: linear-gradient(105deg, #00a5b3, #00808a);
        box-shadow: 0 10px 20px rgba(0, 143, 155, 0.4);
    }
    .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
    }
    .visto-img {
        font-size: 1.3rem;
        color: #2ecc71;
        animation: pop 0.2s ease;
        display: inline-block;
        margin-left: 8px;
    }
    @keyframes pop {
        0% { transform: scale(0); }
        80% { transform: scale(1.2); }
        100% { transform: scale(1); }
    }
    .radio-group {
        display: flex;
        gap: 1.5rem;
        margin: 0.5rem 0 0.2rem;
    }
    .radio-group label {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.9rem;
        text-transform: none;
        font-weight: normal;
        color: #b0c4de;
        cursor: pointer;
    }
    .radio-group input {
        width: auto;
        margin: 0;
        transform: scale(1.1);
    }
    .condicional {
        margin-top: 0.8rem;
        transition: all 0.2s;
    }
    .aviso-pago {
        background: rgba(0, 0, 0, 0.4);
        border-left: 3px solid #ffb347;
        padding: 0.6rem 1rem;
        border-radius: 1rem;
        font-size: 0.8rem;
        color: #f3d572;
    }
    #loader, #modalExito { display: none; /* resto de estilos ya están */ }
    /* Asegurar que el modal se vea */
    #modalExito {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(12px);
        justify-content: center;
        align-items: center;
        z-index: 20000;
    }
    .modal-card {
        background: rgba(10, 25, 45, 0.95);
        border-radius: 2rem;
        padding: 2rem;
        text-align: center;
        border: 2px solid #008f9b;
        max-width: 300px;
        width: 85%;
        animation: zoom 0.3s ease;
    }
    @keyframes zoom {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
    }
    .modal-card h2 { color: #008f9b; margin-bottom: 0.8rem; }
    .toast {
        position: fixed;
        bottom: 25px;
        left: 50%;
        transform: translateX(-50%);
        background: #1e2a3e;
        backdrop-filter: blur(12px);
        padding: 0.75rem 1.5rem;
        border-radius: 3rem;
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 500;
        z-index: 10001;
        animation: toastIn 0.25s ease;
        box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        border-left: 5px solid #008f9b;
        color: white;
        font-size: 0.85rem;
        max-width: 90%;
    }
    .toast.error { border-left-color: #ff6b6b; }
    .toast.success { border-left-color: #2ecc71; }
    @keyframes toastIn {
        from { opacity: 0; transform: translateX(-50%) translateY(20px); }
        to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    @media (max-width: 550px) {
        .registro-container { padding: 1.5rem; }
        .header h1 { font-size: 1.6rem; }
        input, select, .btn-primary { padding: 0.8rem 1rem; }
    }
</style>
</head>
<body>

<div class="registro-container">
    <div class="header">
        <h1>NAPOLES F.C.</h1>
        <p>Formulario de registro oficial</p>
        <div class="badge">🏆 Temporada 2026 - 2027</div>
    </div>

    <form id="formRegistro">
        <!-- PASO 1: Cédula -->
        <div id="paso1" class="paso activo">
            <div class="campo">
                <label>🔢 CÉDULA (10 dígitos)</label>
                <input type="text" id="ced" maxlength="10" placeholder="Ej: 1234567890" autocomplete="off">
                <div class="help-note"><span>🔑</span> Ingresa tu número de cédula para empezar</div>
            </div>
            <button type="button" id="btnCedula" class="btn-primary" disabled>Validar</button>
        </div>

        <!-- PASO 2: Datos personales -->
        <div id="paso2" class="paso">
            <div class="campo"><label>Primer nombre</label><input type="text" id="n1" placeholder="Ej: LEONARDO"></div>
            <div class="campo"><label>Segundo nombre</label><input type="text" id="n2" placeholder="ADRIAN"></div>
            <div class="campo"><label>Apellidos</label><input type="text" id="ape" placeholder="Ej: MUÑOZ BUENDIA"></div>
            <div class="campo"><label>Fecha de nacimiento</label><input type="date" id="fecha"></div>
            <div class="help-note"><span>📅</span> Aquí debes ingresar tu fecha de nacimiento</div>
            <button type="button" id="btnPaso2" class="btn-primary" disabled>Siguiente</button>
        </div>

        <!-- PASO 3: Contacto -->
        <div id="paso3" class="paso">
            <div class="campo"><label>Teléfono (10 dígitos)</label><input type="tel" id="tel" maxlength="10" placeholder="Ej: 0991234567"></div>
            <div class="campo"><label>Correo electrónico</label><input type="email" id="correo" placeholder="tú@ejemplo.com"></div>
            <div class="help-note"><span>📞</span> Queremos estar en contacto contigo</div>
            <button type="button" id="btnPaso3" class="btn-primary" disabled>Siguiente</button>
        </div>

        <!-- PASO 4: Fotos -->
        <div id="paso4" class="paso">
            <div class="campo"><label>📸 Foto perfil... Sonrie</label><input type="file" id="rostro" accept="image/jpeg,image/png"><span id="vistoRostro" class="visto-img"></span></div>
            <div class="campo"><label>🪪 Foto de tu cédula (L. Frontal)</label><input type="file" id="cedulaFile" accept="image/jpeg,image/png"><span id="vistoCedula" class="visto-img"></span></div>
            <button type="button" id="btnPaso4" class="btn-primary" disabled>Siguiente</button>
        </div>

        <!-- PASO 5: Armadura -->
        <div id="paso5" class="paso">
            <div class="campo"><label>🏷️ Nombre en tu camiseta</label><select id="nombreCamiseta"></select></div>
            <div class="campo"><label>🔢 Número de tu dorsal</label><select id="dorsal"></select></div>
            <button type="button" id="btnPaso5" class="btn-primary" disabled>Siguiente</button>
        </div>

        <!-- PASO 6: Valores con pago de uniforme -->
        <div id="paso6" class="paso">
            <div class="campo"><label>🧦 Medias extras (+$2)</label>
                <select id="medias">
                    <option value="">Selecciona</option>
                    <option value="NO">No</option>
                    <option value="SI">Sí</option>
                </select>
            </div>
            <div class="campo"><label>💰 N° transacción valor de inscripción ($5)</label>
                <input id="inscripcion" placeholder="Ej: PAGO-12345">
            </div>
            <div class="campo">
                <label>👕 Pago del uniforme (abono 75% + medias)</label>
                <div class="radio-group">
                    <label><input type="radio" name="pagoUniforme" value="si"> Sí, ya pagué</label>
                    <label><input type="radio" name="pagoUniforme" value="no"> No, aún no pago</label>
                </div>
                <div id="uniformeCondicional" class="condicional"></div>
                <input type="hidden" id="uniforme" value="">
            </div>
            <button type="button" id="btnFinal" class="btn-primary" disabled>Finalizar registro</button>
        </div>

        <input type="hidden" id="fotoRostroB64">
        <input type="hidden" id="fotoCedulaB64">
    </form>
</div>

<div id="loader"><div class="spinner" style="width:60px;height:60px;border:4px solid rgba(0,143,155,0.25);border-top:4px solid #008f9b;border-radius:50%;animation:spin 0.8s linear infinite;"></div><div id="loader-texto">Procesando...</div></div>
<div id="modalExito"><div class="modal-card"><h2>✅ ¡Registro exitoso!</h2><p>Redirigiendo en <span id="contador">3</span> segundos...</p></div></div>

<script>
// ========== SOLUCIÓN PARA ACTIVAR BOTÓN DE CÉDULA ==========
// Este script garantiza que al escribir 10 dígitos se habilite el botón Validar
const cedulaInput = document.getElementById('ced');
const btnValidar = document.getElementById('btnCedula');

if (cedulaInput && btnValidar) {
    cedulaInput.addEventListener('input', function(e) {
        // Solo números y máximo 10
        this.value = this.value.replace(/\D/g, '').slice(0, 10);
        // Habilitar botón si la longitud es exactamente 10
        btnValidar.disabled = this.value.length !== 10;
    });
}

// ========== LÓGICA DEL RESTO DEL FORMULARIO (pasos, imágenes, dorsales, pago uniforme) ==========
// Aquí puedes incluir el resto de tu lógica (la que estaba en frontend.js)
// Por ahora solo incluimos lo necesario para que el botón funcione.
// Si ya tienes frontend.js, asegúrate de que contenga toda la lógica (validación de cédula con backend)
// No elimines el script de frontend.js que está abajo.

// Para no duplicar, dejamos que frontend.js maneje el resto de validaciones.
// Pero como frontend.js también tiene la habilitación del botón, no habrá conflicto.
// Este script extra asegura que funcione incluso si frontend.js falla.
</script>

<script src="frontend.js"></script>
</body>
</html>
