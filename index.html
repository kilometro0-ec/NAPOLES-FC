<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registro - Nápoles F.C.</title>
    
    <!-- Vinculación del Manifiesto para PWA -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Vinculación de tus Estilos Externos -->
    <link rel="stylesheet" href="estilos.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="contenedor-principal">
        <header>
            <img src="logo-napoles.png" alt="NAPOLES FC" id="logo-club">
            <h2>Registro de Jugador</h2>
        </header>

        <form id="formRegistro" onsubmit="event.preventDefault();">
            
            <!-- PASO 1: VALIDACIÓN (Cédula y Transacción) -->
            <div id="paso1">
                <label>Cédula de Identidad</label>
                <input type="number" id="ced" name="cedula" placeholder="10 dígitos" required>
                
                <label>Número de Transacción</label>
                <input type="text" id="trans" name="transaccion" placeholder="Código de comprobante" required>
                
                <button type="button" class="btn-accion" onclick="validarPaso1()">Verificar Datos</button>
            </div>

            <!-- PASO 2: DATOS PERSONALES -->
            <div id="paso2" style="display:none;">
                <label>Primer Nombre</label>
                <input type="text" id="n1" name="nombre1" required>
                <label>Segundo Nombre</label>
                <input type="text" id="n2" name="nombre2">
                <label>Apellidos Completos</label>
                <input type="text" id="ape" name="apellidos" required>
                <label>Fecha de Nacimiento</label>
                <input type="date" name="fechaNac" required>
                <label>Teléfono</label>
                <input type="tel" name="telefono" placeholder="09..." required>
                <label>Correo Electrónico</label>
                <input type="email" id="correo" name="correo" required>
                <button type="button" class="btn-accion" onclick="procesarNombres()">Siguiente</button>
            </div>

            <!-- PASO 3: DORSAL -->
            <div id="paso3" style="display:none;">
                <label>Nombre en la Camiseta</label>
                <select id="selectNombreCamiseta" name="nombreCamiseta"></select>
                <label>Dorsal Preferido</label>
                <select id="selectDorsal" name="dorsal"></select>
                <button type="button" class="btn-accion" onclick="verPaso(4)">Siguiente</button>
            </div>

            <!-- PASO 4: FOTOS -->
            <div id="paso4" style="display:none;">
                <label>Foto del Jugador (Rostro)</label>
                <input type="file" accept="image/*" capture="user" onchange="aBase64(this, 'fotoRostroB64')">
                <input type="hidden" id="fotoRostroB64" name="fotoRostroB64">

                <label>Foto de la Cédula</label>
                <input type="file" accept="image/*" onchange="aBase64(this, 'fotoCedulaB64')">
                <input type="hidden" id="fotoCedulaB64" name="fotoCedulaB64">

                <button type="button" class="btn-accion" onclick="enviarRegistro()">Finalizar Registro</button>
            </div>
        </form>
    </div>

    <!-- Pantallas de Carga -->
    <div id="loader"><div class="spinner-balon"></div><p>Validando en Base de Datos...</p></div>
    <div id="final-animacion">
        <div class="spinner-balon"></div>
        <h3 id="final-status">PROCESANDO...</h3>
        <p id="final-mensaje">Guardando en la familia Nápoles F.C.</p>
    </div>

    <!-- Carga de tus archivos JavaScript externos -->
    <script src="nav.js"></script>
    <script src="api.js"></script>
    
    <script>
        // Registro del Service Worker para que funcione como PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('SW registrado', reg))
                .catch(err => console.warn('Error al registrar SW', err));
        }
    </script>
</body>
</html>
