<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nápoles F.C. - Registro Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">

    <style>
        /* ====== TU CSS COMPLETO SIN CAMBIOS ====== */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background: radial-gradient(circle at 10% 20%, #0a1928, #020c1a);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .contenedor-principal {
            max-width: 520px;
            width: 100%;
            background: rgba(26, 43, 72, 0.75);
            backdrop-filter: blur(18px);
            border-radius: 2rem;
            padding: 2rem;
            border: 1px solid rgba(181, 148, 97, 0.4);
        }

        h1 {
            text-align: center;
            color: #D4AF37;
            font-weight: 800;
        }

        .countdown-number {
            font-size: 1.5rem;
            font-weight: 800;
            color: #D4AF37;
        }

        .countdown-message {
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: #8db5d0;
            text-align: center;
        }

        .btn-primary {
            width: 100%;
            padding: 0.9rem;
            border-radius: 2rem;
            background: #008B94;
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }

        .btn-primary:disabled {
            opacity: 0.5;
        }

        .paso { display: none; }
        .paso.activo { display: block; }

        #loader, #modalExito {
            display: none;
        }
    </style>
</head>

<body>

<div class="contenedor-principal">
    <h1>⚽ NÁPOLES F.C.</h1>

    <!-- COUNTDOWN -->
    <div style="text-align:center;margin:1rem 0;">
        <div id="days" class="countdown-number">00</div>
        <div id="hours" class="countdown-number">00</div>
        <div id="minutes" class="countdown-number">00</div>
        <div id="seconds" class="countdown-number">00</div>
        <div id="countdownMessage" class="countdown-message"></div>
    </div>

    <form id="formRegistro">

        <div id="paso1" class="paso activo">
            <input id="ced" placeholder="Cédula">
            <button type="button" id="btnCedula" class="btn-primary" disabled>Validar</button>
        </div>

        <div id="paso2" class="paso">
            <input id="n1" placeholder="Nombre">
            <input id="ape" placeholder="Apellido">
            <input id="fecha" type="date">
            <button type="button" id="btnPaso2" class="btn-primary" disabled>Siguiente</button>
        </div>

        <div id="paso3" class="paso">
            <input id="tel" placeholder="Teléfono">
            <input id="correo" placeholder="Correo">
            <button type="button" id="btnPaso3" class="btn-primary" disabled>Siguiente</button>
        </div>

        <div id="paso4" class="paso">
            <input type="file" id="rostro">
            <input type="file" id="cedulaFile">
            <button type="button" id="btnPaso4" class="btn-primary" disabled>Siguiente</button>
        </div>

        <div id="paso5" class="paso">
            <select id="nombreCamiseta"><option value="">Nombre</option></select>
            <select id="dorsal"><option value="">Dorsal</option></select>
            <button type="button" id="btnPaso5" class="btn-primary" disabled>Siguiente</button>
        </div>

        <div id="paso6" class="paso">
            <select id="talla">
                <option value="">Talla</option>
                <option>S</option><option>M</option><option>L</option><option>XL</option>
            </select>

            <select id="medias">
                <option value="">Medias</option>
                <option>SI</option><option>NO</option>
            </select>

            <input id="inscripcion" placeholder="Pago inscripción">
            <input id="uniforme" placeholder="Pago uniforme">

            <button type="button" id="btnFinal" class="btn-primary" disabled>Finalizar</button>
        </div>

    </form>
</div>

<!-- LOADER -->
<div id="loader"></div>

<!-- MODAL -->
<div id="modalExito">
    <h2>Registro exitoso ⚽</h2>
</div>

<script>
const URL_GAS = "https://script.google.com/macros/s/AKfycbxGkRjKO-6HXVBUdzLPzoiPYAd5wR_zSfAHRWHaRKW0bxHxAm7HDL3eJY7s6QPU6S2g/exec";

/* ================= COUNTDOWN CON GOL DE ORO ================= */

function actualizarCountdown() {

    // ⚽ NUEVA FECHA: LUNES 11 PM
    const fechaObjetivo = new Date(2026, 4, 11, 23, 0, 0);

    const ahora = new Date();
    const diferencia = fechaObjetivo - ahora;

    const d = document.getElementById('days');
    const h = document.getElementById('hours');
    const m = document.getElementById('minutes');
    const s = document.getElementById('seconds');
    const msg = document.getElementById('countdownMessage');

    if (diferencia <= 0) {

        d.textContent = "00";
        h.textContent = "00";
        m.textContent = "00";
        s.textContent = "00";

        msg.innerHTML = "⚽ TIEMPO EXTRA ACTIVADO — GOL DE ORO ⚽";
        msg.style.color = "#ffd700";
        msg.style.fontWeight = "800";

        window.tiempoExtra = true;
        return;
    }

    const days = Math.floor(diferencia / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diferencia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((diferencia % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((diferencia % (1000 * 60)) / 1000);

    d.textContent = String(days).padStart(2,'0');
    h.textContent = String(hours).padStart(2,'0');
    m.textContent = String(minutes).padStart(2,'0');
    s.textContent = String(seconds).padStart(2,'0');

    msg.innerHTML = "📅 Cierre oficial: Lunes 11 PM — posible tiempo extra ⚽";
}

setInterval(actualizarCountdown, 1000);
actualizarCountdown();

</script>

</body>
</html>
