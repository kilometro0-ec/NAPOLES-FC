<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro - Nápoles F.C.</title>

<link rel="icon" href="favicon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1A2B48">

<link rel="stylesheet" href="estilos.css">

<style>
.paso{display:none;}
.paso.activo{display:block;animation:fade .3s ease;}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

.btn-accion:disabled{
opacity:.4;
pointer-events:none;
}

.btn-accion.loading{
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(.96)}
100%{transform:scale(1)}
}

#loader{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
backdrop-filter:blur(6px);
justify-content:center;
align-items:center;
flex-direction:column;
color:#fff;
}
</style>
</head>

<body>

<div class="contenedor-principal">

<header>
<h2>NAPOLES F.C.</h2>
<p>Ficha de inscripción - Temporada 2026</p>
</header>

<form id="formRegistro">

<!-- PASO 1 -->
<div id="paso1" class="paso activo">
<input id="ced" name="cedula" maxlength="10" placeholder="CÉDULA (10 dígitos)">
<button type="button" id="btnCedula" class="btn-accion" disabled>VALIDAR</button>
</div>

<!-- PASO 2 -->
<div id="paso2" class="paso">
<input id="ced2" readonly>
<input id="n1" placeholder="PRIMER NOMBRE">
<input id="n2" placeholder="SEGUNDO NOMBRE">
<input id="ape" placeholder="APELLIDOS">
<input type="date" id="fecha">
<button type="button" id="btnPaso2" class="btn-accion" disabled>SIGUIENTE</button>
</div>

<!-- PASO 3 -->
<div id="paso3" class="paso">
<input id="tel" placeholder="09XXXXXXXX">
<input id="correo" placeholder="correo@email.com">
<button type="button" id="btnPaso3" class="btn-accion" disabled>SIGUIENTE</button>
</div>

<!-- PASO 4 (SIN CÁMARA) -->
<div id="paso4" class="paso">

<h3>📷 SUBE TU FOTO DE CÉDULA</h3>

<input type="file" id="cedulaFile" accept="image/*">

<p id="fotoEstado">No has seleccionado imagen</p>

<button type="button" id="btnPaso4" class="btn-accion" disabled>SIGUIENTE</button>

</div>

<!-- PASO 5 -->
<div id="paso5" class="paso">
<h3>⚔️ ARMA TU ARMADURA</h3>

<select id="nombreCamiseta"></select>
<select id="dorsal"></select>

<button type="button" id="btnPaso5" class="btn-accion" disabled>SIGUIENTE</button>
</div>

<!-- PASO 6 -->
<div id="paso6" class="paso">

<select id="medias">
<option value="">Medias extras ($2)</option>
<option value="NO">NO</option>
<option value="SI">SI</option>
</select>

<input id="inscripcion" maxlength="10" placeholder="Pago inscripción ($5)">
<input id="uniforme" maxlength="10" placeholder="Pago uniforme ($18)">

<button type="button" id="btnFinal" class="btn-accion" disabled>FINALIZAR</button>

</div>

<input type="hidden" id="fotoRostroB64">
<input type="hidden" id="fotoCedulaB64">

</form>

</div>

<div id="loader">
<p>Procesando...</p>
</div>

<!-- APK -->
<script>
const APK_URL = "https://kilometro0-ec.github.io/NAPOLES-FC/apk/miapp.apk";
</script>

<script src="api.js"></script>

<script>

// evitar submit
formRegistro.onsubmit = e => e.preventDefault();

/* =======================
   PASO 1 CÉDULA
======================= */
ced.oninput = () => {
  ced.value = ced.value.replace(/\D/g, "");
  if (ced.value.length > 10) ced.value = ced.value.slice(0, 10);
  btnCedula.disabled = ced.value.length !== 10;
};

/* =======================
   VALIDAR CÉDULA
======================= */
btnCedula.onclick = async () => {

  btnCedula.classList.add("loading");

  const r = await validarCedulaServidor(ced.value);

  if (!r.ok) {
    alert(r.msg);
    btnCedula.classList.remove("loading");
    return;
  }

  ced2.value = ced.value;
  ced.readOnly = true;

  verPaso(2);

  btnCedula.classList.remove("loading");
};

/* =======================
   PASO 2
======================= */
document.querySelectorAll("#paso2 input").forEach(i => {
  i.oninput = () => {
    btnPaso2.disabled = !(n1.value && ape.value && fecha.value);
  };
});

btnPaso2.onclick = () => verPaso(3);

/* =======================
   PASO 3
======================= */
document.querySelectorAll("#paso3 input").forEach(i => {
  i.oninput = () => {
    btnPaso3.disabled = !(
      /^09\d{8}$/.test(tel.value) &&
      /^\S+@\S+\.\S+$/.test(correo.value)
    );
  };
});

btnPaso3.onclick = () => verPaso(4);

/* =======================
   PASO 4 FOTO GALERÍA
======================= */
cedulaFile.onchange = (e) => {

  const file = e.target.files[0];

  if (!file) return;

  const reader = new FileReader();

  reader.onload = () => {
    fotoCedulaB64.value = reader.result;
    document.getElementById("fotoEstado").innerText = "Imagen cargada ✔";
    btnPaso4.disabled = false;
  };

  reader.readAsDataURL(file);
};

btnPaso4.onclick = async () => {
  await cargarArmadura();
  verPaso(5);
};

/* =======================
   PASO 5
======================= */
document.querySelectorAll("#paso5 select").forEach(s => {
  s.onchange = () => {
    btnPaso5.disabled = !(nombreCamiseta.value && dorsal.value);
  };
});

btnPaso5.onclick = () => verPaso(6);

/* =======================
   PASO 6
======================= */
document.querySelectorAll("#paso6 input,#paso6 select").forEach(i => {
  i.oninput = () => {
    btnFinal.disabled = !(
      medias.value &&
      inscripcion.value.length >= 4 &&
      uniforme.value.length >= 4
    );
  };
});

/* =======================
   FINALIZAR
======================= */
btnFinal.onclick = async () => {

  loader.style.display = "flex";

  await enviarRegistro();

  loader.style.display = "none";

  // DESCARGA APK
  const link = document.createElement("a");
  link.href = APK_URL;
  link.download = "NapolesFC.apk";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);

  // LOGIN
  setTimeout(() => {
    window.location.href = "login.html";
  }, 1200);

};

</script>

</body>
</html>
