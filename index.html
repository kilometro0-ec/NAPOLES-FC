<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nápoles F.C. - Registro</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0a">

<link rel="stylesheet" href="estilos.css">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #0a0a0a, #0f172a);
    color: white;
    font-family: 'Roboto';
}

.contenedor-principal {
    max-width: 420px;
    margin: auto;
    padding: 20px;
}

.paso {
    display: none;
    animation: fade 0.4s ease;
}

.paso.activo {
    display: block;
}

@keyframes fade {
    from {opacity:0; transform: translateY(10px);}
    to {opacity:1; transform: translateY(0);}
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background: #2563eb;
    color: white;
    font-weight: bold;
}

#loader {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
}

.spinner {
    width: 50px;
    height: 50px;
    border: 5px solid #333;
    border-top: 5px solid #3b82f6;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

.preview {
    width: 100px;
    border-radius: 10px;
    margin-top: 10px;
}
</style>

</head>
<body>

<div class="contenedor-principal">

<h2 style="font-family:Orbitron;">NAPOLES F.C.</h2>

<form id="formRegistro">

<div id="paso1" class="paso activo">
<input type="number" id="ced" name="cedula" placeholder="Cédula" required>
<button type="button" onclick="validarCedulaEstricta()">Validar</button>
</div>

<div id="paso2" class="paso">
<input id="n1" name="nombre1" placeholder="Primer Nombre" required>
<input id="n2" name="nombre2" placeholder="Segundo Nombre">
<input name="apellidos" placeholder="Apellidos" required>
<input type="date" name="fechaNac" required>
<button type="button" onclick="verPaso(3)">Siguiente</button>
</div>

<div id="paso3" class="paso">
<input name="telefono" placeholder="WhatsApp" required>
<input name="correo" placeholder="Correo" required>
<button type="button" onclick="verPaso(4)">Siguiente</button>
</div>

<div id="paso4" class="paso">
<video id="video" autoplay></video>
<button type="button" onclick="iniciarCamara()">Activar Cámara</button>
<button type="button" onclick="capturarFoto()">Capturar</button>

<img id="previewRostro" class="preview">

<input type="file" onchange="previewFile(this,'previewCedula','fotoCedulaB64')" required>
<img id="previewCedula" class="preview">

<input type="hidden" id="fotoRostroB64" name="fotoRostroB64">
<input type="hidden" id="fotoCedulaB64" name="fotoCedulaB64">

<button type="button" onclick="abrirArmadura()">Siguiente</button>
</div>

<div id="paso5" class="paso">
<select id="selectNombreCamiseta" name="nombreCamiseta"></select>
<select id="selectDorsal" name="dorsal"></select>
<button onclick="verPaso(6)" type="button">Siguiente</button>
</div>

<div id="paso6" class="paso">
<select name="mediasExtras" required>
<option value="">Medias</option>
<option value="NO">NO</option>
<option value="SI">SI</option>
</select>

<input name="transaccionInscripcion" placeholder="Comprobante inscripción" required>
<input name="transaccionUniforme" placeholder="Comprobante uniforme" required>

<button type="button" onclick="enviarRegistro()">FINALIZAR</button>
</div>

</form>

</div>

<div id="loader">
<div class="spinner"></div>
<p id="loader-texto">Procesando...</p>
</div>

<script src="api.js"></script>
<script src="nav.js"></script>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
