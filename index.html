<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripción | Nápoles FC</title>
    
    <!-- Configuración PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1A2B48">
    
    <!-- Iconos Locales (Asegúrate de que existan en la carpeta img) -->
    <link rel="icon" href="img/favicon.png">

    <!-- Enlaces a archivos CSS -->
    <link rel="stylesheet" href="estilos.css">
    
    <style>
        /* Estilos críticos para el funcionamiento de los pasos */
        .loading-overlay {
            display: none; /* Se activa desde api.js */
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 43, 72, 0.98);
            z-index: 10000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .spinner {
            width: 50px; height: 50px;
            border: 5px solid rgba(181, 148, 97, 0.2);
            border-top: 5px solid #B59461;
            border-radius: 50%;
            animation: spin 1s infinite linear;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .seccion-oculta { display: none !important; }
        
        #video { width: 100%; border-radius: 12px; border: 2px solid #B59461; background: #000; }
        .preview-camara { width: 100%; border-radius: 12px; display: none; border: 2px solid #008B94; }
        
        /* Botones */
        .btn-accion {
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <!-- Pantalla de Carga (api.js la mostrará con ID "loader") -->
    <div id="loader" class="loading-overlay">
        <div class="spinner"></div>
        <p style="color: #B59461; margin-top: 20px; font-weight: bold;">PROCESANDO INSCRIPCIÓN...</p>
    </div>

    <div class="contenedor-principal">
        <header style="text-align: center; margin-bottom: 20px;">
            <img src="img/logo.png" alt="Logo" style="width: 70px;">
            <h2>Inscripción Oficial</h2>
            <p style="color: #B59461; font-size: 0.8em; margin-top: -10px;">CORPORACIÓN 360 • 2026</p>
        </header>

        <!-- IMPORTANTE: El ID debe ser 'formularioRegistro' para que api.js lo encuentre -->
        <form id="formularioRegistro">
            
            <!-- PASO 1: Datos Personales -->
            <div id="paso1" class="seccion-formulario">
                <label>Primer Nombre</label>
                <input type="text" id="nombre1" name="nombre1" required placeholder="EJ: JUAN">
                
                <label>Segundo Nombre</label>
                <input type="text" id="nombre2" name="nombre2" required placeholder="EJ: CARLOS">
                
                <label>Apellidos</label>
                <input type="text" id="apellidos" name="apellidos" required placeholder="EJ: PÉREZ">
                
                <label>Cédula de Identidad</label>
                <input type="text" id="cedula" name="cedula" maxlength="10" required placeholder="10 DÍGITOS">
                
                <button type="button" class="btn-accion" style="background:#B59461; color:white;" onclick="validarYPasar(1, 2)">Siguiente</button>
            </div>

            <!-- PASO 2: Contacto -->
            <div id="paso2" class="seccion-formulario seccion-oculta">
                <label>Fecha de Nacimiento</label>
                <input type="date" id="fechaNac" name="fechaNac" required>
                
                <label>WhatsApp</label>
                <input type="tel" id="telefono" name="telefono" maxlength="10" required placeholder="0987654321">
                
                <label>Correo Electrónico</label>
                <input type="email" id="correo" name="correo" required placeholder="usuario@correo.com">
                
                <div style="display: flex; gap: 10px;">
                    <button type="button" class="btn-accion" style="background:#444; color:white;" onclick="irAtras(2, 1)">Atrás</button>
                    <button type="button" class="btn-accion" style="background:#B59461; color:white;" onclick="validarYPasar(2, 3)">Siguiente</button>
                </div>
            </div>

            <!-- PASO 3: Multimedia -->
            <div id="paso3" class="seccion-formulario seccion-oculta">
                <label>Foto de Rostro (Verificación)</label>
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas" style="display:none;"></canvas>
                
                <button type="button" id="btnCapturar" class="btn-accion" style="background: #fff; color: #1A2B48; border: 1px solid #1A2B48;">
                    📷 CAPTURAR FOTO
                </button>
                
                <!-- La imagen donde se guarda la captura -->
                <img id="fotoPreview" class="preview-camara" src="">
                
                <label style="margin-top: 20px;">Foto de Cédula (Frontal)</label>
                <!-- El ID debe ser 'fotoCedula' para api.js -->
                <input type="file" id="fotoCedula" name="fotoCedula" accept="image/*" required>
                
                <div style="display: flex; gap: 10px;">
                    <button type="button" class="btn-accion" style="background:#444; color:white;" onclick="irAtras(3, 2)">Atrás</button>
                    <button type="submit" class="btn-accion" style="background:#008B94; color:white;">FINALIZAR INSCRIPCIÓN</button>
                </div>
            </div>

        </form>
    </div>

    <!-- CARGA DE SCRIPTS AL FINAL -->
    <script src="nav.js"></script>
    <script src="api.js"></script>

    <script>
        // Lógica de navegación interna (Paso a Paso)
        let stream;

        function validarYPasar(actual, siguiente) {
            const inputs = document.querySelectorAll(`#paso${actual} [required]`);
            let valido = true;
            inputs.forEach(i => { if(!i.checkValidity()) { i.reportValidity(); valido = false; } });

            if(valido) {
                document.getElementById(`paso${actual}`).classList.add('seccion-oculta');
                document.getElementById(`paso${siguiente}`).classList.remove('seccion-oculta');
                if(siguiente === 3) iniciarCamara();
            }
        }

        function irAtras(actual, anterior) {
            document.getElementById(`paso${actual}`).classList.add('seccion-oculta');
            document.getElementById(`paso${anterior}`).classList.remove('seccion-oculta');
            if(actual === 3 && stream) stream.getTracks().forEach(t => t.stop());
        }

        async function iniciarCamara() {
            const video = document.getElementById('video');
            const preview = document.getElementById('fotoPreview');
            video.style.display = 'block';
            preview.style.display = 'none';
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
            } catch (e) {
                alert("Para inscribirte, activa la cámara.");
            }
        }

        document.getElementById('btnCapturar').onclick = () => {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const preview = document.getElementById('fotoPreview');
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            const data = canvas.toDataURL('image/jpeg', 0.8);
            preview.src = data; // ESTO ES LO QUE ENVÍA api.js
            preview.style.display = 'block';
            video.style.display = 'none';
            
            if(stream) stream.getTracks().forEach(t => t.stop());
        };
    </script>
</body>
</html>
