<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro - Nápoles F.C.</title>

<link rel="icon" href="favicon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1A2B48">

<link rel="stylesheet" href="estilos.css">

<style>
/* SOLO lógica visual, NO rompe tu diseño */
.paso{display:none;}
.paso.activo{display:block;}

.btn-accion:disabled{
    opacity:0.4;
    pointer-events:none;
}

.btn-accion.loading{
    animation:pulse 1s infinite;
}

@keyframes pulse{
    0%{transform:scale(1)}
    50%{transform:scale(0.96)}
    100%{transform:scale(1)}
}
</style>
</head>

<body>

<div class="contenedor-principal">

<header style="text-align:center">
<h2>NAPOLES F.C.</h2>
<p>Ficha de Inscripción</p>
<p style="color:gold">Temporada 2026 - 2027</p>
</header>

<form id="formRegistro">

<!-- PASO 1 -->
<div id="paso1" class="paso activo">

<label>Cédula de identidad</label>
<input id="ced" maxlength="10" placeholder="Ingrese 10 dígitos">

<button type="button" id="btnCedula" class="btn-accion" disabled>
Validar jugador
</button>

</div>

<!-- PASO 2 -->
<div id="paso2" class="paso">

<label>Cédula</label>
<input id="ced2" readonly>

<input id="n1" placeholder="Primer Nombre">
<input id="n2" placeholder="Segundo Nombre">
<input id="ape" placeholder="Apellidos">

<label>Fecha de nacimiento</label>
<input type="date" id="fecha">

<button type="button" id="btnPaso2" class="btn-accion" disabled>Siguiente</button>

</div>

<!-- PASO 3 -->
<div id="paso3" class="paso">

<input id="tel" placeholder="Teléfono (09XXXXXXXX)">
<input id="correo" placeholder="Correo electrónico">

<button type="button" id="btnPaso3" class="btn-accion" disabled>Siguiente</button>

</div>

<!-- PASO 4 -->
<div id="paso4" class="paso">

<div id="contenedor-camara">
<video id="video" autoplay></video>
<img id="previewCamara">
</div>

<button type="button" id="btnCamara" class="btn-accion">Activar Cámara</button>
<button type="button" id="btnFoto" class="btn-accion" style="background:#B59461">
Capturar Foto
</button>

<label>Foto de cédula</label>
<input type="file" id="cedulaFile">

<button type="button" id="btnPaso4" class="btn-accion" disabled>Siguiente</button>

</div>

<!-- PASO 5 -->
<div id="paso5" class="paso">

<h3>⚔️ Arma tu armadura</h3>

<select id="nombreCamiseta">
<option value="">Selecciona nombre</option>
</select>

<select id="dorsal">
<option value="">Selecciona dorsal</option>
</select>

<button type="button" id="btnPaso5" class="btn-accion" disabled>Siguiente</button>

</div>

<!-- PASO 6 -->
<div id="paso6" class="paso">

<label>¿Desea medias extras?</label>
<select id="medias">
<option value="">Seleccione</option>
<option value="NO">NO ($0)</option>
<option value="SI">SI (+$2)</option>
</select>

<label>Comprobante inscripción ($5)</label>
<input id="inscripcion" maxlength="12" placeholder="Ej: 0001234567">

<label>Comprobante uniforme ($18)</label>
<input id="uniforme" maxlength="12" placeholder="Ej: 0001234567">

<button type="button" id="btnFinal" class="btn-accion" disabled>
Finalizar registro
</button>

</div>

<input type="hidden" id="fotoRostroB64" name="fotoRostroB64">
<input type="hidden" id="fotoCedulaB64" name="fotoCedulaB64">

</form>
</div>

<!-- LOADER -->
<div id="loader" style="display:none;position:fixed;inset:0;background:#000c;align-items:center;justify-content:center;flex-direction:column;">
<p id="loader-texto">Procesando...</p>
</div>

<script src="api.js"></script>

<script>

// ================= BLOQUEAR RECARGA =================
formRegistro.addEventListener("submit",e=>e.preventDefault());

// ================= MAYÚSCULAS =================
document.addEventListener("input",e=>{
    if(e.target.type !== "email"){
        e.target.value = e.target.value.toUpperCase();
    }
});

// ================= PASO 1 =================
ced.oninput = ()=>{
    btnCedula.disabled = ced.value.length !== 10;
};

btnCedula.onclick = async ()=>{
    btnCedula.classList.add("loading");
    loader(true,"Validando cédula...");

    const r = await validarCedulaServidor(ced.value);

    if(!r.ok){
        alert("❌ " + r.msg);
        loader(false);
        btnCedula.classList.remove("loading");
        return;
    }

    ced2.value = ced.value;
    ced.readOnly = true;

    verPaso(2);

    loader(false);
    btnCedula.classList.remove("loading");
};

// ================= PASO 2 =================
[n1,ape,fecha].forEach(i=>{
    i.oninput = ()=>{
        btnPaso2.disabled = !(n1.value && ape.value && fecha.value);
    };
});
btnPaso2.onclick = ()=>verPaso(3);

// ================= PASO 3 =================
[tel,correo].forEach(i=>{
    i.oninput = ()=>{
        btnPaso3.disabled = !( /^09\d{8}$/.test(tel.value) && /\S+@\S+\.\S+/.test(correo.value) );
    };
});
btnPaso3.onclick = ()=>verPaso(4);

// ================= CÁMARA =================
btnCamara.onclick = iniciarCamara;

btnFoto.onclick = ()=>{
    capturarFoto();
    previewCamara.style.display="block";
    video.style.display="none";
};

// ================= PASO 4 =================
cedulaFile.onchange = ()=>{
    btnPaso4.disabled = !(previewCamara.src && cedulaFile.files.length);
};

btnPaso4.onclick = async ()=>{
    loader(true,"Preparando armadura...");
    await cargarArmadura();
    loader(false);
    verPaso(5);
};

// ================= ARMADURA =================
async function cargarArmadura(){

    nombreCamiseta.innerHTML = `<option value="">Selecciona</option>`;
    dorsal.innerHTML = `<option value="">Cargando...</option>`;

    // nombres
    nombreCamiseta.add(new Option(n1.value,n1.value));
    if(n2.value) nombreCamiseta.add(new Option(n2.value,n2.value));

    // dorsales
    try{
        const res = await fetch(`${URL_GAS}?action=getDorsales`);
        const usados = await res.json();

        dorsal.innerHTML = `<option value="">Selecciona</option>`;

        for(let i=1;i<=99;i++){
            if(!usados.includes(i)){
                dorsal.add(new Option("Dorsal "+i,i));
            }
        }

    }catch{
        for(let i=1;i<=99;i++){
            dorsal.add(new Option("Dorsal "+i,i));
        }
    }
}

// ================= PASO 5 =================
[nombreCamiseta,dorsal].forEach(s=>{
    s.onchange = ()=>{
        btnPaso5.disabled = !(nombreCamiseta.value && dorsal.value);
    };
});
btnPaso5.onclick = ()=>verPaso(6);

// ================= PASO 6 =================
[medias,inscripcion,uniforme].forEach(i=>{
    i.oninput = ()=>{
        btnFinal.disabled = !(medias.value && inscripcion.value.length>=4 && uniforme.value.length>=4);
    };
});

// ================= FINAL =================
btnFinal.onclick = async ()=>{
    loader(true,"Guardando información...");
    await enviarRegistro();
};

</script>

</body>
</html>
