<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{

    font-family:'Inter',sans-serif;

    background:
    radial-gradient(
        circle at top left,
        rgba(124,58,237,.15),
        transparent 30%
    ),
    radial-gradient(
        circle at bottom right,
        rgba(59,130,246,.12),
        transparent 30%
    ),
    #f5f7fb;

    min-height:100vh;

    overflow-x:hidden;
}

.glass{

    background:
    rgba(255,255,255,.72);

    backdrop-filter:
    blur(18px);

    border:
    1px solid rgba(255,255,255,.4);
}

.wave{

    position:fixed;

    width:900px;
    height:900px;

    border-radius:999px;

    filter:blur(120px);

    z-index:-1;

    animation:
    floatWave 18s infinite linear;
}

.wave1{

    top:-300px;
    left:-300px;

    background:
    rgba(124,58,237,.18);
}

.wave2{

    bottom:-300px;
    right:-300px;

    background:
    rgba(59,130,246,.16);

    animation-duration:24s;
}

@keyframes floatWave{

    0%{
        transform:
        rotate(0deg)
        translateY(0px);
    }

    50%{
        transform:
        rotate(180deg)
        translateY(30px);
    }

    100%{
        transform:
        rotate(360deg)
        translateY(0px);
    }
}

.material-symbols-outlined{

    font-variation-settings:
    'FILL' 0,
    'wght' 500,
    'GRAD' 0,
    'opsz' 24;
}

.player-card{

    transition:.25s;
}

.player-card:hover{

    transform:
    translateY(-3px);

    box-shadow:
    0 15px 35px rgba(15,23,42,.08);
}

.scroll-hidden::-webkit-scrollbar{
    display:none;
}

</style>

</head>

<script src="./config.js"></script>

<script>

// =========================================
// VALIDAR ADMIN
// =========================================

if(
    localStorage.getItem(
        'admin_activo'
    ) !== 'true'
){
    window.location.href =
    './login.html';
}

// =========================================
// VARIABLES
// =========================================

const playersContainer =
document.getElementById(
    'playersContainer'
);

const searchInput =
document.getElementById(
    'searchInput'
);

const totalJugadores =
document.getElementById(
    'totalJugadores'
);

const totalPendientes =
document.getElementById(
    'totalPendientes'
);

const totalAprobados =
document.getElementById(
    'totalAprobados'
);

const totalRechazados =
document.getElementById(
    'totalRechazados'
);

let jugadoresGlobal = [];

let estadoActivo =
'TODOS';

// =========================================
// CARGAR JUGADORES
// =========================================

async function cargarJugadores(){

    try{

        const response =
        await fetch(
`${CONFIG.URL_GAS}?action=getJugadores&t=${Date.now()}`
        );

        const data =
        await response.json();

        jugadoresGlobal =
        data.jugadores || [];

        actualizarCards();

        renderJugadores(
            jugadoresGlobal
        );

    }catch(err){

        playersContainer.innerHTML =
        `
        <div
        class="
        glass
        rounded-3xl
        p-10
        text-center
        text-red-500
        ">

            Error cargando jugadores

        </div>
        `;
    }
}

// =========================================
// ACTUALIZAR CARDS
// =========================================

function actualizarCards(){

    totalJugadores.innerText =
    jugadoresGlobal.length;

    totalPendientes.innerText =
    jugadoresGlobal.filter(j =>

        (j.estado || '')
        .toUpperCase()
        === 'PENDIENTE'

    ).length;

    totalAprobados.innerText =
    jugadoresGlobal.filter(j =>

        (j.estado || '')
        .toUpperCase()
        === 'APROBADO'

    ).length;

    totalRechazados.innerText =
    jugadoresGlobal.filter(j =>

        (j.estado || '')
        .toUpperCase()
        === 'RECHAZADO'

    ).length;
}

// =========================================
// RENDER
// =========================================

function renderJugadores(lista){

    playersContainer.innerHTML = '';

    if(lista.length === 0){

        playersContainer.innerHTML =
        `
        <div
        class="
        glass
        rounded-3xl
        p-10
        text-center
        text-slate-500
        col-span-full
        ">

            No hay jugadores

        </div>
        `;

        return;
    }

    lista.forEach(jugador => {

        const estado =
        (
            jugador.estado ||
            'PENDIENTE'
        ).toUpperCase();

        let badge = `
        bg-amber-100
        text-amber-700
        `;

        if(
            estado === 'APROBADO'
        ){

            badge = `
            bg-emerald-100
            text-emerald-700
            `;
        }

        if(
            estado === 'RECHAZADO'
        ){

            badge = `
            bg-red-100
            text-red-700
            `;
        }

        const iniciales =

        (
            (jugador.primerNombre || '')
            .charAt(0)

            +

            (jugador.apellidos || '')
            .charAt(0)

        ).toUpperCase();

        const card =
        document.createElement('div');

        card.className =
        `
        player-card
        glass
        rounded-[32px]
        p-5
        `;

        card.innerHTML = `

        <div
        class="
        flex
        items-start
        justify-between
        gap-4
        ">

            <div
            class="
            flex
            gap-4
            ">

                <div
                class="
                w-20
                h-20
                rounded-[28px]
                overflow-hidden
                bg-gradient-to-br
                from-violet-600
                to-fuchsia-500
                text-white
                flex
                items-center
                justify-center
                font-black
                text-xl
                shrink-0
                ">

                    ${
                        jugador.foto
                        ?

                        `<img
                        src="${jugador.foto}"
                        class="
                        w-full
                        h-full
                        object-cover
                        ">`

                        :

                        iniciales
                    }

                </div>

                <div>

                    <h3
                    class="
                    text-lg
                    font-black
                    leading-tight
                    ">

                        ${jugador.primerNombre}
                        ${jugador.apellidos}

                    </h3>

                    <p
                    class="
                    text-sm
                    text-slate-500
                    mt-1
                    ">

                        ${jugador.cedula}

                    </p>

                    <div
                    class="
                    inline-flex
                    items-center
                    px-4
                    h-9
                    rounded-full
                    text-xs
                    font-black
                    mt-3
                    ${badge}
                    ">

                        ${estado}

                    </div>

                </div>

            </div>

            <div
            class="
            flex
            flex-col
            gap-3
            ">

                ${
                    estado !==
                    'APROBADO'

                    ?

                    `
                    <button
                    onclick="aprobarJugador('${jugador.cedula}')"
                    class="
                    w-12
                    h-12
                    rounded-2xl
                    bg-emerald-500
                    text-white
                    flex
                    items-center
                    justify-center
                    shadow-lg
                    ">

                        <span class="material-symbols-outlined">
                            check
                        </span>

                    </button>
                    `

                    :

                    ''
                }

                ${
                    estado !==
                    'RECHAZADO'

                    ?

                    `
                    <button
                    onclick="rechazarJugador('${jugador.cedula}')"
                    class="
                    w-12
                    h-12
                    rounded-2xl
                    bg-red-500
                    text-white
                    flex
                    items-center
                    justify-center
                    shadow-lg
                    ">

                        <span class="material-symbols-outlined">
                            close
                        </span>

                    </button>
                    `

                    :

                    ''
                }

            </div>

        </div>
        `;

        playersContainer.appendChild(
            card
        );

    });
}

// =========================================
// FILTROS
// =========================================

document
.querySelectorAll('.filter-btn')
.forEach(btn => {

    btn.addEventListener(
    'click',
    () => {

        document
        .querySelectorAll(
            '.filter-btn'
        )
        .forEach(b => {

            b.classList.remove(
                'bg-violet-600',
                'text-white'
            );

            b.classList.add(
                'glass'
            );
        });

        btn.classList.remove(
            'glass'
        );

        btn.classList.add(
            'bg-violet-600',
            'text-white'
        );

        estadoActivo =
        btn.dataset.estado;

        aplicarFiltros();
    });

});

// =========================================
// BUSCADOR
// =========================================

searchInput.addEventListener(
'input',
aplicarFiltros
);

// =========================================
// FILTROS
// =========================================

function aplicarFiltros(){

    const texto =

    searchInput.value
    .toLowerCase()
    .trim();

    let lista =
    [...jugadoresGlobal];

    if(
        estadoActivo !==
        'TODOS'
    ){

        lista =
        lista.filter(j =>

            (
                j.estado ||
                ''
            )
            .toUpperCase()

            === estadoActivo
        );
    }

    lista =
    lista.filter(j => {

        return (

            (j.primerNombre || '')
            .toLowerCase()
            .includes(texto)

            ||

            (j.apellidos || '')
            .toLowerCase()
            .includes(texto)

            ||

            (j.cedula || '')
            .includes(texto)
        );
    });

    renderJugadores(lista);
}

// =========================================
// APROBAR
// =========================================

async function aprobarJugador(
    cedula
){

    const ok =
    confirm(
        '¿Aprobar jugador?'
    );

    if(!ok){
        return;
    }

    try{

        const response =
        await fetch(
`${CONFIG.URL_GAS}?action=aprobarJugador&cedula=${cedula}`
        );

        const data =
        await response.json();

        if(data.ok){

            const mensaje =

`🏆 ¡BIENVENIDO A NÁPOLES F.C.! ⚽🔥

Tu registro fue aprobado exitosamente 🙌

Ya eres parte oficial del club 💙

📲 Ingresa ahora a tu panel de jugador:
https://kilometro0-ec.github.io/NAPOLES-FC/login.html

✅ Para ingresar solo debes colocar tu número de cédula.

⚽ Revisa tus estadísticas
🏅 Mira tus partidos
👕 Consulta tu perfil

¡Nos vemos en la cancha campeón! 💪🔥`;

            let telefono =
            String(
                data.telefono || ''
            )
            .replace(/\D/g,'');

            if(
                telefono.startsWith('0')
            ){
                telefono =
                telefono.substring(1);
            }

            if(
                !telefono.startsWith('593')
            ){
                telefono =
                '593' + telefono;
            }

            window.open(
`https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`,
'_blank'
            );

            cargarJugadores();

        }else{

            alert(
                data.error ||
                'No se pudo aprobar'
            );
        }

    }catch(err){

        alert(
            'Error aprobando'
        );
    }
}

// =========================================
// RECHAZAR
// =========================================

async function rechazarJugador(
    cedula
){

    const ok =
    confirm(
        '¿Rechazar jugador?'
    );

    if(!ok){
        return;
    }

    try{

        const response =
        await fetch(
`${CONFIG.URL_GAS}?action=rechazarJugador&cedula=${cedula}`
        );

        const data =
        await response.json();

        if(data.ok){

            cargarJugadores();

        }else{

            alert(
                data.error ||
                'No se pudo rechazar'
            );
        }

    }catch(err){

        alert(
            'Error rechazando'
        );
    }
}

// =========================================
// INIT
// =========================================

cargarJugadores();

</script>
