<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Jugadores - Nápoles F.C.</title>

<script src="https://cdn.tailwindcss.com"></script>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
rel="stylesheet">

<link
href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{

    font-family:'Inter',sans-serif;

    background:
    linear-gradient(
    180deg,
    #f8fafc 0%,
    #eef2ff 45%,
    #e9d5ff 100%
    );

    min-height:100vh;

    color:#111827;

    overflow-x:hidden;
}

/* =========================================
SCROLL
========================================= */

::-webkit-scrollbar{
    width:6px;
    height:6px;
}

::-webkit-scrollbar-thumb{
    background:#a855f7;
    border-radius:999px;
}

/* =========================================
HEADER
========================================= */

.topbar{

    position:sticky;

    top:0;

    z-index:999;

    backdrop-filter:blur(18px);

    background:rgba(255,255,255,.78);

    border-bottom:
    1px solid rgba(255,255,255,.3);

    padding:18px;

    display:flex;

    align-items:center;

    justify-content:space-between;
}

.title-box h1{

    font-size:1.2rem;

    font-weight:900;

    color:#111827;
}

.title-box p{

    color:#6b7280;

    font-size:.85rem;

    margin-top:2px;
}

.top-actions{

    display:flex;

    align-items:center;

    gap:10px;
}

.icon-btn{

    width:48px;
    height:48px;

    border:none;

    border-radius:18px;

    background:rgba(255,255,255,.7);

    backdrop-filter:blur(14px);

    display:flex;

    align-items:center;

    justify-content:center;

    cursor:pointer;

    color:#111827;

    box-shadow:
    0 10px 30px rgba(0,0,0,.06);

    transition:.2s;
}

.icon-btn:active{
    transform:scale(.95);
}

/* =========================================
STATS
========================================= */

.stats-grid{

    display:grid;

    grid-template-columns:
    repeat(4,1fr);

    gap:10px;

    padding:18px;
}

.stat-card{

    background:
    rgba(255,255,255,.7);

    backdrop-filter:blur(18px);

    border:
    1px solid rgba(255,255,255,.4);

    border-radius:24px;

    padding:16px 12px;

    box-shadow:
    0 10px 30px rgba(0,0,0,.06);

    text-align:center;

    cursor:pointer;

    transition:.25s;
}

.stat-card.active{

    background:
    linear-gradient(
    135deg,
    #7c3aed,
    #a855f7
    );

    color:#fff;
}

.stat-card h2{

    font-size:1.7rem;

    font-weight:900;
}

.stat-card p{

    font-size:.72rem;

    margin-top:4px;

    font-weight:700;
}

/* =========================================
SEARCH
========================================= */

.search-section{

    padding:0 18px 16px;

    display:flex;

    align-items:center;

    gap:12px;
}

.search-box{

    flex:1;

    background:
    rgba(255,255,255,.75);

    backdrop-filter:blur(14px);

    border-radius:22px;

    padding:14px 16px;

    display:flex;

    align-items:center;

    gap:10px;

    box-shadow:
    0 10px 30px rgba(0,0,0,.05);
}

.search-box input{

    border:none;

    outline:none;

    background:none;

    width:100%;

    font-size:.95rem;

    font-family:'Inter',sans-serif;
}

.filter-btn{

    width:56px;
    height:56px;

    border:none;

    border-radius:20px;

    background:
    linear-gradient(
    135deg,
    #7c3aed,
    #a855f7
    );

    color:#fff;

    display:flex;

    align-items:center;

    justify-content:center;

    cursor:pointer;

    box-shadow:
    0 10px 30px rgba(124,58,237,.3);
}

/* =========================================
FILTER MENU
========================================= */

.filter-menu{

    position:fixed;

    top:120px;

    right:18px;

    width:240px;

    background:
    rgba(255,255,255,.92);

    backdrop-filter:blur(18px);

    border-radius:24px;

    padding:18px;

    z-index:999;

    box-shadow:
    0 20px 40px rgba(0,0,0,.12);

    display:none;
}

.filter-menu button{

    width:100%;

    border:none;

    background:#f3f4f6;

    height:48px;

    border-radius:16px;

    margin-bottom:10px;

    font-weight:700;

    cursor:pointer;
}

.filter-menu button.active{

    background:
    linear-gradient(
    135deg,
    #7c3aed,
    #a855f7
    );

    color:#fff;
}

/* =========================================
PLAYERS
========================================= */

.players{

    padding:0 18px 140px;
}

.player-card{

    position:relative;

    background:
    rgba(255,255,255,.75);

    backdrop-filter:blur(18px);

    border:
    1px solid rgba(255,255,255,.4);

    border-radius:34px;

    padding:22px;

    margin-bottom:18px;

    overflow:hidden;

    box-shadow:
    0 15px 40px rgba(0,0,0,.06);
}

/* =========================================
TOP PLAYER
========================================= */

.player-top{

    display:flex;

    justify-content:space-between;

    align-items:flex-start;
}

.player-avatar{

    width:84px;
    height:84px;

    border-radius:28px;

    overflow:hidden;

    flex-shrink:0;

    border:4px solid #fff;

    box-shadow:
    0 10px 30px rgba(0,0,0,.1);
}

.player-avatar img{

    width:100%;
    height:100%;

    object-fit:cover;
}

/* =========================================
CAMISETA CARD
========================================= */

.camiseta-card{

    background:
    linear-gradient(
    135deg,
    #111827,
    #374151
    );

    border-radius:24px;

    width:130px;

    height:84px;

    color:#fff;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    box-shadow:
    0 10px 30px rgba(0,0,0,.2);
}

.camiseta-card h3{

    font-size:1rem;

    font-weight:900;
}

.camiseta-card p{

    font-size:2rem;

    font-weight:900;

    margin-top:4px;
}

/* =========================================
INFO
========================================= */

.player-info{

    margin-top:18px;
}

.player-info h2{

    font-size:1.15rem;

    font-weight:900;

    color:#111827;
}

.player-info p{

    color:#6b7280;

    font-size:.88rem;

    margin-top:5px;

    line-height:1.5;
}

/* =========================================
ESTADO
========================================= */

.estado{

    margin-top:14px;

    display:inline-flex;

    align-items:center;

    justify-content:center;

    min-width:120px;

    height:34px;

    border-radius:999px;

    font-size:.78rem;

    font-weight:800;
}

.aprobado{

    background:#dcfce7;

    color:#166534;
}

.pendiente{

    background:#fef3c7;

    color:#92400e;
}

.rechazado{

    background:#fee2e2;

    color:#991b1b;
}

/* =========================================
ACTIONS
========================================= */

.player-actions{

    margin-top:20px;

    display:grid;

    grid-template-columns:
    repeat(4,1fr);

    gap:12px;
}

.action-btn{

    height:52px;

    border:none;

    border-radius:18px;

    display:flex;

    align-items:center;

    justify-content:center;

    color:#fff;

    cursor:pointer;

    transition:.2s;
}

.action-btn:active{
    transform:scale(.94);
}

.approve{
    background:#16a34a;
}

.reject{
    background:#ef4444;
}

.edit{
    background:#2563eb;
}

.whatsapp{
    background:#22c55e;
}

/* =========================================
RESPONSIVE
========================================= */

@media(max-width:700px){

    .stats-grid{
        grid-template-columns:
        repeat(4,1fr);
    }

    .stat-card h2{
        font-size:1.2rem;
    }

    .stat-card p{
        font-size:.62rem;
    }
}

</style>

</head>

<body>

<!-- ======================================
HEADER
====================================== -->

<header class="topbar">

    <div class="title-box">

        <h1>
            Nápoles F.C.
        </h1>

        <p>
            Gestión de jugadores
        </p>

    </div>

    <div class="top-actions">

        <button
        class="icon-btn"
        onclick="descargarPDF()">

            <span class="material-symbols-outlined">
                picture_as_pdf
            </span>

        </button>

        <button
        class="icon-btn"
        onclick="cerrarSesion()">

            <span class="material-symbols-outlined">
                logout
            </span>

        </button>

    </div>

</header>

<!-- ======================================
STATS
====================================== -->

<section class="stats-grid">

    <div
    class="stat-card active"
    onclick="filtrarEstado('TODOS', this)">

        <h2 id="totalJugadores">
            0
        </h2>

        <p>
            TOTAL
        </p>

    </div>

    <div
    class="stat-card"
    onclick="filtrarEstado('PENDIENTE', this)">

        <h2 id="totalPendientes">
            0
        </h2>

        <p>
            PENDIENTES
        </p>

    </div>

    <div
    class="stat-card"
    onclick="filtrarEstado('APROBADO', this)">

        <h2 id="totalAprobados">
            0
        </h2>

        <p>
            APROBADOS
        </p>

    </div>

    <div
    class="stat-card"
    onclick="filtrarEstado('RECHAZADO', this)">

        <h2 id="totalRechazados">
            0
        </h2>

        <p>
            RECHAZADOS
        </p>

    </div>

</section>

<!-- ======================================
SEARCH
====================================== -->

<section class="search-section">

    <div class="search-box">

        <span class="material-symbols-outlined">
            search
        </span>

        <input
        type="text"
        id="searchInput"
        placeholder="Buscar jugador...">

    </div>

    <button
    class="filter-btn"
    onclick="toggleFilters()">

        <span class="material-symbols-outlined">
            tune
        </span>

    </button>

</section>

<!-- ======================================
FILTER MENU
====================================== -->

<div
class="filter-menu"
id="filterMenu">

    <button
    onclick="ordenarJugadores('DESC', this)"
    class="active">

        Más recientes

    </button>

    <button
    onclick="ordenarJugadores('ASC', this)">

        Más antiguos

    </button>

    <button
    onclick="filtrarPorEdad('MAYOR')">

        Mayor edad

    </button>

    <button
    onclick="filtrarPorEdad('MENOR')">

        Menor edad

    </button>

</div>

<!-- ======================================
PLAYERS
====================================== -->

<section
class="players"
id="playersContainer">

    <p style="padding:20px">
        Cargando jugadores...
    </p>

</section>

<script src="./config.js"></script>

<script>

// =========================================
// VALIDAR ADMIN
// =========================================

if(
    localStorage.getItem(
        'admin_activo'
    ) !== 'true'
){
    window.location.href =
    './login.html';
}

const playersContainer =
document.getElementById(
    'playersContainer'
);

const searchInput =
document.getElementById(
    'searchInput'
);

const filterMenu =
document.getElementById(
    'filterMenu'
);

let jugadoresGlobal = [];

let estadoActual = 'TODOS';

// =========================================
// CARGAR
// =========================================

async function cargarJugadores(){

    try{

        const response =
        await fetch(
`${CONFIG.URL_GAS}?action=getJugadores&t=${Date.now()}`
        );

        const data =
        await response.json();

        jugadoresGlobal =
        data.jugadores || [];

        jugadoresGlobal.sort(
            (a,b) =>
            b.fila - a.fila
        );

        actualizarStats();

        renderJugadores(
            jugadoresGlobal
        );

    }catch(err){

        playersContainer.innerHTML =
        '<p>Error cargando jugadores</p>';
    }
}

// =========================================
// STATS
// =========================================

function actualizarStats(){

    const pendientes =
    jugadoresGlobal.filter(j =>

        (j.estado || '')
        .toUpperCase() ===
        'PENDIENTE'
    ).length;

    const aprobados =
    jugadoresGlobal.filter(j =>

        (j.estado || '')
        .toUpperCase() ===
        'APROBADO'
    ).length;

    const rechazados =
    jugadoresGlobal.filter(j =>

        (j.estado || '')
        .toUpperCase() ===
        'RECHAZADO'
    ).length;

    document.getElementById(
        'totalJugadores'
    ).innerText =
    jugadoresGlobal.length;

    document.getElementById(
        'totalPendientes'
    ).innerText =
    pendientes;

    document.getElementById(
        'totalAprobados'
    ).innerText =
    aprobados;

    document.getElementById(
        'totalRechazados'
    ).innerText =
    rechazados;
}

// =========================================
// AVATAR FUTBOLISTA
// =========================================

function obtenerAvatar(index){

    const avatars = [

'https://randomuser.me/api/portraits/men/11.jpg',

'https://randomuser.me/api/portraits/men/12.jpg',

'https://randomuser.me/api/portraits/men/13.jpg',

'https://randomuser.me/api/portraits/men/14.jpg',

'https://randomuser.me/api/portraits/men/15.jpg',

'https://randomuser.me/api/portraits/men/16.jpg',

'https://randomuser.me/api/portraits/men/17.jpg',

'https://randomuser.me/api/portraits/men/18.jpg',

'https://randomuser.me/api/portraits/men/19.jpg',

'https://randomuser.me/api/portraits/men/20.jpg'

    ];

    return avatars[
        index % avatars.length
    ];
}

// =========================================
// RENDER
// =========================================

function renderJugadores(lista){

    playersContainer.innerHTML = '';

    if(lista.length === 0){

        playersContainer.innerHTML =
        '<p style="padding:20px">No hay jugadores</p>';

        return;
    }

    lista.forEach((jugador,index) => {

        let estadoClass =
        'pendiente';

        if(
            jugador.estado ===
            'APROBADO'
        ){
            estadoClass =
            'aprobado';
        }

        if(
            jugador.estado ===
            'RECHAZADO'
        ){
            estadoClass =
            'rechazado';
        }

        const card =
        document.createElement('div');

        card.className =
        'player-card';

        card.innerHTML = `

        <div class="player-top">

            <div class="player-avatar">

                <img
                src="${
                    jugador.foto
                    ||
                    obtenerAvatar(index)
                }">

            </div>

            <div class="camiseta-card">

                <h3>
                    ${
                        jugador.nombreCamiseta
                        || 'NAPOLES'
                    }
                </h3>

                <p>
                    #${
                        jugador.dorsal
                        || '-'
                    }
                </p>

            </div>

        </div>

        <div class="player-info">

            <h2>

                ${
                    jugador.primerNombre
                    || ''
                }

                ${
                    jugador.segundoNombre
                    || ''
                }

                ${
                    jugador.apellidos
                    || ''
                }

            </h2>

            <p>

                Cédula:
                ${jugador.cedula}

                <br>

                Edad:
                ${jugador.edad || '-'}

                <br>

                Tel:
                ${jugador.telefono || '-'}

            </p>

            <div
            class="estado ${estadoClass}">

                ${
                    jugador.estado
                    || 'PENDIENTE'
                }

            </div>

        </div>

        <div class="player-actions">

            <button
            class="action-btn approve"
            onclick="aprobarJugador('${jugador.cedula}')">

                <span class="material-symbols-outlined">
                    check
                </span>

            </button>

            <button
            class="action-btn reject"
            onclick="rechazarJugador('${jugador.cedula}')">

                <span class="material-symbols-outlined">
                    close
                </span>

            </button>

            <button
            class="action-btn edit"
            onclick="editarJugador('${jugador.cedula}')">

                <span class="material-symbols-outlined">
                    edit
                </span>

            </button>

            <button
            class="action-btn whatsapp"
            onclick="enviarWhatsapp('${jugador.telefono}')">

                <span class="material-symbols-outlined">
                    chat
                </span>

            </button>

        </div>
        `;

        playersContainer
        .appendChild(card);

    });
}

// =========================================
// FILTRAR ESTADO
// =========================================

function filtrarEstado(
    estado,
    btn
){

    estadoActual =
    estado;

    document
    .querySelectorAll('.stat-card')
    .forEach(card => {

        card.classList.remove(
            'active'
        );
    });

    btn.classList.add(
        'active'
    );

    if(estado === 'TODOS'){

        renderJugadores(
            jugadoresGlobal
        );

        return;
    }

    const filtrados =
    jugadoresGlobal.filter(j =>

        (j.estado || '')
        .toUpperCase()
        === estado
    );

    renderJugadores(
        filtrados
    );
}

// =========================================
// BUSCADOR
// =========================================

searchInput.addEventListener(
'input',
e => {

    const texto =
    e.target.value
    .toLowerCase()
    .trim();

    let lista =
    jugadoresGlobal;

    if(
        estadoActual !==
        'TODOS'
    ){

        lista =
        lista.filter(j =>

            (j.estado || '')
            .toUpperCase()
            === estadoActual
        );
    }

    const filtrados =
    lista.filter(j => {

        return (

            (j.primerNombre || '')
            .toLowerCase()
            .includes(texto)

            ||

            (j.apellidos || '')
            .toLowerCase()
            .includes(texto)

            ||

            (j.cedula || '')
            .includes(texto)

            ||

            (j.nombreCamiseta || '')
            .toLowerCase()
            .includes(texto)
        );
    });

    renderJugadores(
        filtrados
    );
});

// =========================================
// FILTER MENU
// =========================================

function toggleFilters(){

    if(
        filterMenu.style.display
        === 'block'
    ){

        filterMenu.style.display =
        'none';

    }else{

        filterMenu.style.display =
        'block';
    }
}

// =========================================
// ORDEN
// =========================================

function ordenarJugadores(
    tipo,
    btn
){

    document
    .querySelectorAll(
        '.filter-menu button'
    )
    .forEach(b => {

        b.classList.remove(
            'active'
        );
    });

    btn.classList.add(
        'active'
    );

    if(tipo === 'DESC'){

        jugadoresGlobal.sort(
            (a,b) =>
            b.fila - a.fila
        );

    }else{

        jugadoresGlobal.sort(
            (a,b) =>
            a.fila - b.fila
        );
    }

    renderJugadores(
        jugadoresGlobal
    );

    filterMenu.style.display =
    'none';
}

// =========================================
// EDAD
// =========================================

function filtrarPorEdad(tipo){

    let lista = [
        ...jugadoresGlobal
    ];

    if(tipo === 'MAYOR'){

        lista.sort(
            (a,b) =>
            (b.edad || 0)
            -
            (a.edad || 0)
        );

    }else{

        lista.sort(
            (a,b) =>
            (a.edad || 0)
            -
            (b.edad || 0)
        );
    }

    renderJugadores(lista);

    filterMenu.style.display =
    'none';
}

// =========================================
// APROBAR
// =========================================

async function aprobarJugador(
    cedula
){

    const ok =
    confirm(
        '¿Aprobar jugador?'
    );

    if(!ok){
        return;
    }

    try{

        const response =
        await fetch(
`${CONFIG.URL_GAS}?action=aprobarJugador&cedula=${cedula}`
        );

        const data =
        await response.json();

        if(data.ok){

            const mensaje =

`🏆 *¡BIENVENIDO A NÁPOLES F.C.!* ⚽🔥

Tu registro fue aprobado exitosamente 🙌

Ya eres parte oficial del club 💙

📲 Ingresa ahora a tu panel de jugador:
https://kilometro0-ec.github.io/NAPOLES-FC/login.html

✅ Para entrar solo debes colocar tu número de cédula.

⚽ Mira tus estadísticas
🏅 Mira tus partidos
👕 Revisa tu perfil

¡Nos vemos en la cancha campeón! 💪🔥`;

            window.open(
`https://wa.me/593${data.telefono}?text=${encodeURIComponent(mensaje)}`,
'_blank'
            );

            cargarJugadores();
        }

    }catch(err){

        alert(
            'Error aprobando'
        );
    }
}

// =========================================
// RECHAZAR
// =========================================

async function rechazarJugador(
    cedula
){

    const ok =
    confirm(
        '¿Rechazar jugador?'
    );

    if(!ok){
        return;
    }

    try{

        const response =
        await fetch(
`${CONFIG.URL_GAS}?action=rechazarJugador&cedula=${cedula}`
        );

        const data =
        await response.json();

        if(data.ok){

            cargarJugadores();
        }

    }catch(err){

        alert(
            'Error rechazando'
        );
    }
}

// =========================================
// EDITAR
// =========================================

function editarJugador(
    cedula
){

    localStorage.setItem(
        'editCedula',
        cedula
    );

    window.location.href =
    './editar-jugador.html';
}

// =========================================
// WHATSAPP
// =========================================

function enviarWhatsapp(
    telefono
){

    if(!telefono){

        alert(
            'Jugador sin teléfono'
        );

        return;
    }

    telefono =
    telefono.replace(/\D/g,'');

    window.open(
`https://wa.me/593${telefono}`,
'_blank'
    );
}

// =========================================
// PDF
// =========================================

function descargarPDF(){

    const {
        jsPDF
    } = window.jspdf;

    const doc =
    new jsPDF();

    doc.setFontSize(18);

    doc.text(
        'Nápoles F.C. - Jugadores',
        14,
        20
    );

    let y = 40;

    jugadoresGlobal.forEach(j => {

        doc.setFontSize(12);

        doc.text(
`${j.primerNombre || ''} ${j.apellidos || ''}`,
14,
y
        );

        doc.text(
`Cédula: ${j.cedula || ''}`,
14,
y + 7
        );

        doc.text(
`Estado: ${j.estado || ''}`,
14,
y + 14
        );

        y += 28;

        if(y > 260){

            doc.addPage();

            y = 20;
        }
    });

    doc.save(
        'jugadores-napoles.pdf'
    );
}

// =========================================
// CERRAR
// =========================================

function cerrarSesion(){

    localStorage.removeItem(
        'admin_activo'
    );

    window.location.href =
    './login.html';
}

// =========================================
// INIT
// =========================================

cargarJugadores();

</script>
