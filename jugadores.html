<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Jugadores - Nápoles F.C.</title>

<script src="https://cdn.tailwindcss.com"></script>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
rel="stylesheet">

<link
href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{

font-family:'Inter',sans-serif;

background:
linear-gradient(
180deg,
#f8fafc 0%,
#eef2ff 100%
);

min-height:100vh;

overflow-x:hidden;
}

.wave-bg{

position:fixed;

inset:0;

overflow:hidden;

z-index:-1;

pointer-events:none;
}

.wave{

position:absolute;

width:220%;

height:280px;

left:-60%;

border-radius:45%;

opacity:.12;

filter:blur(10px);
}

.wave1{

background:
linear-gradient(
90deg,
#7c3aed,
#a855f7,
#d8b4fe
);

bottom:-140px;

animation:
waveMove 18s linear infinite;
}

.wave2{

background:
linear-gradient(
90deg,
#2563eb,
#60a5fa,
#ffffff
);

bottom:-180px;

opacity:.08;

animation:
waveMoveReverse 28s linear infinite;
}

@keyframes waveMove{

0%{
transform:
translateX(0)
rotate(0deg);
}

100%{
transform:
translateX(-12%)
rotate(360deg);
}
}

@keyframes waveMoveReverse{

0%{
transform:
translateX(0)
rotate(0deg);
}

100%{
transform:
translateX(12%)
rotate(-360deg);
}
}

.glass{

background:rgba(255,255,255,.75);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.35);
}

.stat-card{

border-radius:28px;

padding:18px;

min-width:0;

cursor:pointer;

transition:.25s;
}

.stat-card:hover{

transform:translateY(-3px);
}

.stat-card.active{

outline:3px solid #7c3aed;
}

.player-card{

border-radius:28px;

transition:.25s;
}

.player-card:hover{

transform:translateY(-2px);
}

.estado{

padding:6px 14px;

border-radius:999px;

font-size:.72rem;

font-weight:800;
}

.aprobado{

background:#dcfce7;

color:#166534;
}

.pendiente{

background:#fef3c7;

color:#92400e;
}

.rechazado{

background:#fee2e2;

color:#991b1b;
}

.action-btn{

width:44px;
height:44px;

border-radius:16px;

display:flex;

align-items:center;

justify-content:center;

border:none;

cursor:pointer;

color:#fff;

transition:.2s;
}

.action-btn:active{

transform:scale(.94);
}

.approve{
background:#16a34a;
}

.reject{
background:#ef4444;
}

.edit{
background:#2563eb;
}

.avatar-player{

width:72px;
height:72px;

border-radius:22px;

object-fit:cover;

border:3px solid rgba(255,255,255,.8);

box-shadow:
0 10px 25px rgba(15,23,42,.12);
}

@media(max-width:700px){

.stats-grid{

grid-template-columns:
repeat(4,minmax(130px,1fr));

overflow:auto;
}

.player-card{

flex-direction:column;

align-items:flex-start;

gap:16px;
}

.player-actions{

width:100%;

justify-content:flex-end;
}
}

</style>

</head>

<body>

<div class="wave-bg">

<div class="wave wave1"></div>

<div class="wave wave2"></div>

</div>

<script src="./config.js"></script>

<script>

if(
localStorage.getItem('admin_activo')
!== 'true'
){
window.location.href =
'./login.html';
}

</script>

<div class="max-w-7xl mx-auto px-4 pb-32">

<!-- HEADER -->

<header
class="glass sticky top-0 z-50 rounded-b-3xl px-5 py-4 mb-5 flex items-center justify-between">

<div>

<h1 class="text-2xl font-black text-slate-900">
Jugadores
</h1>

<p class="text-sm text-slate-500 font-semibold">
Nápoles F.C.
</p>

</div>

<div class="flex items-center gap-3">

<button
onclick="descargarPDF()"
class="w-12 h-12 rounded-2xl bg-red-500 text-white flex items-center justify-center shadow-lg">

<span class="material-symbols-outlined">
picture_as_pdf
</span>

</button>

<button
onclick="cerrarSesion()"
class="w-12 h-12 rounded-2xl bg-slate-900 text-white flex items-center justify-center shadow-lg">

<span class="material-symbols-outlined">
logout
</span>

</button>

</div>

</header>

<!-- STATS -->

<section
class="stats-grid grid grid-cols-4 gap-4 mb-5">

<div
class="stat-card glass active"
onclick="filtrarEstado('TODOS',this)">

<p class="text-slate-500 text-xs font-bold mb-2">
JUGADORES
</p>

<h2
id="totalJugadores"
class="text-3xl font-black text-slate-900">
0
</h2>

</div>

<div
class="stat-card glass"
onclick="filtrarEstado('PENDIENTE',this)">

<p class="text-amber-600 text-xs font-bold mb-2">
PENDIENTES
</p>

<h2
id="totalPendientes"
class="text-3xl font-black text-amber-600">
0
</h2>

</div>

<div
class="stat-card glass"
onclick="filtrarEstado('APROBADO',this)">

<p class="text-emerald-600 text-xs font-bold mb-2">
APROBADOS
</p>

<h2
id="totalAprobados"
class="text-3xl font-black text-emerald-600">
0
</h2>

</div>

<div
class="stat-card glass"
onclick="filtrarEstado('RECHAZADO',this)">

<p class="text-red-600 text-xs font-bold mb-2">
RECHAZADOS
</p>

<h2
id="totalRechazados"
class="text-3xl font-black text-red-600">
0
</h2>

</div>

</section>

<!-- SEARCH -->

<section class="glass rounded-3xl p-4 mb-5">

<div class="flex items-center gap-3">

<span class="material-symbols-outlined text-slate-400">
search
</span>

<input
id="searchInput"
type="text"
placeholder="Buscar jugador..."
class="w-full bg-transparent outline-none text-slate-900 font-semibold">

</div>

</section>

<!-- PLAYERS -->

<section
id="playersContainer"
class="space-y-4">

<p class="p-6 text-slate-500">
Cargando jugadores...
</p>

</section>

</div>

<script>

const playersContainer =
document.getElementById(
'playersContainer'
);

const searchInput =
document.getElementById(
'searchInput'
);

let jugadoresGlobal = [];

let estadoActual =
'TODOS';

// ======================================
// AVATARES HOMBRES
// ======================================

const avatars = [

'https://randomuser.me/api/portraits/men/11.jpg',
'https://randomuser.me/api/portraits/men/12.jpg',
'https://randomuser.me/api/portraits/men/13.jpg',
'https://randomuser.me/api/portraits/men/14.jpg',
'https://randomuser.me/api/portraits/men/15.jpg',
'https://randomuser.me/api/portraits/men/16.jpg',
'https://randomuser.me/api/portraits/men/17.jpg',
'https://randomuser.me/api/portraits/men/18.jpg',
'https://randomuser.me/api/portraits/men/19.jpg',
'https://randomuser.me/api/portraits/men/20.jpg'

];

// ======================================
// CARGAR
// ======================================

async function cargarJugadores(){

try{

const response =
await fetch(
`${CONFIG.URL_GAS}?action=getJugadores&t=${Date.now()}`
);

const data =
await response.json();

jugadoresGlobal =
(data.jugadores || [])

.sort((a,b) => b.fila - a.fila);

actualizarCards();

renderJugadores(
jugadoresGlobal
);

}catch(err){

playersContainer.innerHTML =
'<p>Error cargando jugadores</p>';

console.log(err);
}
}

// ======================================
// CARDS
// ======================================

function actualizarCards(){

const pendientes =
jugadoresGlobal.filter(j =>

(j.estado || '')
.toUpperCase()
=== 'PENDIENTE'

).length;

const aprobados =
jugadoresGlobal.filter(j =>

(j.estado || '')
.toUpperCase()
=== 'APROBADO'

).length;

const rechazados =
jugadoresGlobal.filter(j =>

(j.estado || '')
.toUpperCase()
=== 'RECHAZADO'

).length;

document.getElementById(
'totalJugadores'
).innerText =
jugadoresGlobal.length;

document.getElementById(
'totalPendientes'
).innerText =
pendientes;

document.getElementById(
'totalAprobados'
).innerText =
aprobados;

document.getElementById(
'totalRechazados'
).innerText =
rechazados;
}

// ======================================
// RENDER
// ======================================

function renderJugadores(lista){

playersContainer.innerHTML = '';

if(lista.length === 0){

playersContainer.innerHTML =

`
<div class="glass rounded-3xl p-8 text-center">

<h2 class="text-xl font-black text-slate-800 mb-2">
Sin jugadores
</h2>

<p class="text-slate-500">
No hay resultados
</p>

</div>
`;

return;
}

lista.forEach((jugador,index) => {

let estadoClass =
'pendiente';

if(
jugador.estado ===
'APROBADO'
){
estadoClass =
'aprobado';
}

if(
jugador.estado ===
'RECHAZADO'
){
estadoClass =
'rechazado';
}

const avatar =
jugador.foto
||
avatars[
index % avatars.length
];

const card =
document.createElement('div');

card.className =

'player-card glass p-5 flex items-center justify-between';

card.innerHTML = `

<div class="flex items-center gap-4">

<img
src="${avatar}"
class="avatar-player">

<div>

<h3 class="text-lg font-black text-slate-900">

${jugador.nombreCamiseta || jugador.primerNombre}

</h3>

<p class="text-sm text-slate-500 font-semibold mb-2">

#${jugador.dorsal || '--'}
•
${jugador.cedula}

</p>

<div class="estado ${estadoClass}">

${jugador.estado || 'PENDIENTE'}

</div>

</div>

</div>

<div class="player-actions flex gap-3">

${
jugador.estado !==
'APROBADO'
?

`
<button
class="action-btn approve"
onclick="aprobarJugador('${jugador.cedula}')">

<span class="material-symbols-outlined">
check
</span>

</button>
`

:
''
}

${
jugador.estado !==
'RECHAZADO'
?

`
<button
class="action-btn reject"
onclick="rechazarJugador('${jugador.cedula}')">

<span class="material-symbols-outlined">
close
</span>

</button>
`

:
''
}

<button
class="action-btn edit"
onclick="editarJugador('${jugador.cedula}')">

<span class="material-symbols-outlined">
edit
</span>

</button>

</div>
`;

playersContainer.appendChild(card);

});
}

// ======================================
// FILTRO
// ======================================

function filtrarEstado(
estado,
btn
){

estadoActual =
estado;

document
.querySelectorAll('.stat-card')
.forEach(card => {

card.classList.remove(
'active'
);

});

if(btn){

btn.classList.add(
'active'
);

}

let lista =
[...jugadoresGlobal];

if(estado !== 'TODOS'){

lista =
lista.filter(j =>

(j.estado || '')
.toUpperCase()
=== estado
);
}

renderJugadores(lista);
}

// ======================================
// BUSCAR
// ======================================

searchInput.addEventListener(
'input',
e => {

const texto =
e.target.value
.toLowerCase()
.trim();

let lista =
[...jugadoresGlobal];

if(estadoActual !== 'TODOS'){

lista =
lista.filter(j =>

(j.estado || '')
.toUpperCase()
=== estadoActual
);
}

lista =
lista.filter(j => {

return (

(j.primerNombre || '')
.toLowerCase()
.includes(texto)

||

(j.apellidos || '')
.toLowerCase()
.includes(texto)

||

(j.nombreCamiseta || '')
.toLowerCase()
.includes(texto)

||

(j.cedula || '')
.includes(texto)
);

});

renderJugadores(lista);

});

// ======================================
// APROBAR
// ======================================

async function aprobarJugador(
cedula
){

const ok =
confirm(
'¿Aprobar jugador?'
);

if(!ok){
return;
}

try{

const response =
await fetch(
`${CONFIG.URL_GAS}?action=aprobarJugador&cedula=${cedula}`
);

const data =
await response.json();

if(data.ok){

const mensaje =

`🏆 *¡BIENVENIDO A NÁPOLES F.C.!* ⚽🔥

Tu registro fue aprobado exitosamente 🙌

Ya eres parte oficial del club 💙

📲 Ingresa ahora a tu panel de jugador:
https://kilometro0-ec.github.io/NAPOLES-FC/login.html

✅ Para entrar solo debes colocar tu número de cédula.

⚽ Mira tus estadísticas
🏅 Mira tus partidos
👕 Revisa tu perfil

¡Nos vemos en la cancha campeón! 💪🔥`;

window.open(
`https://wa.me/593${data.telefono}?text=${encodeURIComponent(mensaje)}`,
'_blank'
);

cargarJugadores();
}

}catch(err){

alert(
'Error aprobando'
);
}
}

// ======================================
// RECHAZAR
// ======================================

async function rechazarJugador(
cedula
){

const ok =
confirm(
'¿Rechazar jugador?'
);

if(!ok){
return;
}

try{

const response =
await fetch(
`${CONFIG.URL_GAS}?action=rechazarJugador&cedula=${cedula}`
);

const data =
await response.json();

if(data.ok){

cargarJugadores();
}

}catch(err){

alert(
'Error rechazando'
);
}
}

// ======================================
// EDITAR
// ======================================

function editarJugador(
cedula
){

localStorage.setItem(
'editCedula',
cedula
);

window.location.href =
'./editar-jugador.html';
}

// ======================================
// PDF
// ======================================

function descargarPDF(){

const {
jsPDF
} = window.jspdf;

const doc =
new jsPDF();

doc.setFontSize(20);

doc.text(
'Jugadores Nápoles F.C.',
20,
20
);

let y = 40;

jugadoresGlobal.forEach(j => {

doc.setFontSize(12);

doc.text(

`${j.nombreCamiseta || ''} | #${j.dorsal || '--'} | ${j.estado || 'PENDIENTE'}`,

20,

y
);

y += 10;

if(y > 270){

doc.addPage();

y = 20;
}
});

doc.save(
'jugadores-napoles.pdf'
);
}

// ======================================
// LOGOUT
// ======================================

function cerrarSesion(){

localStorage.removeItem(
'admin_activo'
);

window.location.href =
'./login.html';
}

// ======================================
// INIT
// ======================================

cargarJugadores();

</script>

</body>
</html>
