<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jugadores | Nápoles FC</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
padding:15px;
background:#111827;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
cursor:pointer;
}

.container{
padding:15px;
}

.card{
background:#1f2937;
padding:15px;
border-radius:12px;
margin-bottom:10px;
}

.btn{
padding:8px 12px;
border:none;
border-radius:8px;
margin:3px;
}

.apr{background:#16a34a;color:white;}
.rec{background:#dc2626;color:white;}
.edi{background:#2563eb;color:white;}

</style>

<script src="./config.js"></script>

</head>

<body>

<header>
<h2>Jugadores</h2>
<button onclick="logout()">Salir</button>
</header>

<div class="container" id="lista"></div>

<script>

// =========================
// LOGIN PROTECT
// =========================
if(localStorage.getItem('admin_activo') !== 'true'){
  window.location.href = './login.html';
}

// =========================
// CARGAR
// =========================
async function cargar(){

const res = await fetch(CONFIG.URL_GAS + '?action=getJugadores');
const data = await res.json();

const cont = document.getElementById('lista');
cont.innerHTML = '';

data.jugadores.forEach(j=>{

cont.innerHTML += `
<div class="card">
  <h3>${j.primerNombre} ${j.apellidos}</h3>
  <p>${j.cedula}</p>
  <p>Estado: ${j.estado || 'PENDIENTE'}</p>

  <button class="btn apr" onclick="aprobar('${j.cedula}')">Aprobar</button>
  <button class="btn rec" onclick="rechazar('${j.cedula}')">Rechazar</button>
</div>
`;

});

}

// =========================
// ACCIONES
// =========================
async function aprobar(c){

await fetch(CONFIG.URL_GAS + '?action=aprobarJugador&cedula=' + c);
cargar();

}

async function rechazar(c){

await fetch(CONFIG.URL_GAS + '?action=rechazarJugador&cedula=' + c);
cargar();

}

// =========================
// LOGOUT
// =========================
function logout(){
localStorage.removeItem('admin_activo');
window.location.href = './login.html';
}

cargar();

</script>

</body>
</html>
