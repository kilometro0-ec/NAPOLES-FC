<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Jugadores - Nápoles F.C.</title>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<link
href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{

    font-family:'Inter',sans-serif;

    background:#f3f6fb;

    color:#111827;

    min-height:100vh;

    overflow-x:hidden;
}

/* =========================================
HEADER
========================================= */

.topbar{

    position:sticky;

    top:0;

    z-index:100;

    background:rgba(255,255,255,.92);

    backdrop-filter:blur(14px);

    border-bottom:1px solid #e5e7eb;

    padding:16px 18px;

    display:flex;

    align-items:center;

    justify-content:space-between;
}

.top-left{

    display:flex;

    align-items:center;

    gap:14px;
}

.admin-info h1{

    font-size:1.1rem;

    font-weight:800;
}

.admin-info p{

    font-size:.85rem;

    color:#6b7280;

    margin-top:2px;
}

.avatar{

    width:46px;
    height:46px;

    border-radius:16px;

    background:linear-gradient(
    135deg,
    #2563eb,
    #60a5fa
    );

    display:flex;

    align-items:center;

    justify-content:center;

    color:#fff;

    font-weight:800;

    font-size:1rem;
}

/* =========================================
SEARCH
========================================= */

.search-box{

    padding:20px 18px 10px;
}

.search{

    background:#fff;

    border-radius:18px;

    padding:14px 16px;

    display:flex;

    align-items:center;

    gap:10px;

    box-shadow:
    0 10px 30px rgba(15,23,42,.05);
}

.search input{

    border:none;

    outline:none;

    width:100%;

    background:none;

    font-size:.95rem;

    font-family:'Inter',sans-serif;
}

.search .material-symbols-outlined{

    color:#6b7280;
}

/* =========================================
PLAYERS
========================================= */

.players{

    padding:14px 18px 40px;
}

.player-card{

    background:#fff;

    border-radius:24px;

    padding:18px;

    margin-bottom:16px;

    display:flex;

    align-items:center;

    justify-content:space-between;

    box-shadow:
    0 10px 30px rgba(15,23,42,.05);
}

.player-left{

    display:flex;

    align-items:center;

    gap:14px;
}

.player-avatar{

    width:60px;
    height:60px;

    border-radius:18px;

    background:linear-gradient(
    135deg,
    #2563eb,
    #60a5fa
    );

    display:flex;

    align-items:center;

    justify-content:center;

    color:#fff;

    font-size:1.1rem;

    font-weight:800;
}

.player-info h3{

    font-size:1rem;

    font-weight:800;

    margin-bottom:4px;
}

.player-info p{

    color:#6b7280;

    font-size:.88rem;
}

.player-actions{

    display:flex;

    gap:10px;
}

.action-btn{

    width:42px;
    height:42px;

    border:none;

    border-radius:14px;

    cursor:pointer;

    display:flex;

    align-items:center;

    justify-content:center;

    color:#fff;
}

.edit{
    background:#2563eb;
}

.delete{
    background:#ef4444;
}

/* =========================================
ADD BUTTON
========================================= */

.fab{

    position:fixed;

    right:20px;
    bottom:20px;

    width:64px;
    height:64px;

    border:none;

    border-radius:22px;

    background:linear-gradient(
    135deg,
    #2563eb,
    #60a5fa
    );

    color:#fff;

    display:flex;

    align-items:center;

    justify-content:center;

    cursor:pointer;

    box-shadow:
    0 15px 35px rgba(37,99,235,.35);
}

.fab .material-symbols-outlined{
    font-size:34px;
}

/* =========================================
RESPONSIVE
========================================= */

@media(min-width:700px){

    .players,
    .search-box{
        max-width:700px;
        margin:auto;
    }
}

</style>

</head>

<body>

<!-- ======================================
TOPBAR
====================================== -->

<header class="topbar">

    <div class="top-left">

        <div class="admin-info">

            <h1>Jugadores</h1>

            <p>Nápoles F.C.</p>

    </div>

    <div class="avatar">
        J
    </div>

</header>

<section class="search-box">

<!-- ======================================

        </div>

        <div class="player-actions">

            <button class="action-btn edit">

                <span class="material-symbols-outlined">
                    edit
                </span>

            </button>

            <button class="action-btn delete">

                <span class="material-symbols-outlined">
                    delete
                </span>

            </button>

        </div>

    </div>

    <!-- PLAYER -->

    <div class="player-card">

        <div class="player-left">

            <div class="player-avatar">
                LM
            </div>

            <div class="player-info">

                <h3>Luis Mendoza</h3>

                <p>Mediocampista • #10</p>

            </div>

        </div>

        <div class="player-actions">

            <button class="action-btn edit">

                <span class="material-symbols-outlined">
                    edit
                </span>

            </button>

            <button class="action-btn delete">

                <span class="material-symbols-outlined">
                    delete
                </span>

            </button>

        </div>

    </div>

    <!-- PLAYER -->

    <div class="player-card">

        <div class="player-left">

            <div class="player-avatar">
                JP
            </div>

            <div class="player-info">

                <h3>Juan Pérez</h3>

                <p>Defensa • #4</p>

            </div>

        </div>

        <div class="player-actions">

            <button class="action-btn edit">

                <span class="material-symbols-outlined">
                    edit
                </span>

            </button>

            <button class="action-btn delete">

                <span class="material-symbols-outlined">
                    delete
                </span>

            </button>

        </div>

    </div>

    <!-- PLAYER -->

    <div class="player-card">

        <div class="player-left">

            <div class="player-avatar">
                AG
            </div>

            <div class="player-info">

                <h3>Andrés Gómez</h3>

                <p>Portero • #1</p>

            </div>

        </div>

        <div class="player-actions">

            <button class="action-btn edit">

                <span class="material-symbols-outlined">
                    edit
                </span>

            </button>

            <button class="action-btn delete">

                <span class="material-symbols-outlined">
                    delete
                </span>

            </button>

        </div>

    </div>

</section>

<!-- ======================================
ADD PLAYER BUTTON
====================================== -->

<button class="fab">

    <span class="material-symbols-outlined">
        add
    </span>

</button>

<script>

    localStorage.getItem('admin_activo')

    window.location.href = './login.html';

</script>

</body>
</html>
