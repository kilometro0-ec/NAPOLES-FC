<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Jugadores - Nápoles F.C.</title>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<link
href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{

    font-family:'Inter',sans-serif;

    background:
    linear-gradient(
    180deg,
    #ffffff 0%,
    #faf7ff 45%,
    #f5f3ff 100%
    );

    color:#111827;

    min-height:100vh;

    overflow-x:hidden;

    position:relative;
}

/* =========================================
ONDAS
========================================= */

.wave-bg{

    position:fixed;

    inset:0;

    overflow:hidden;

    z-index:-1;

    pointer-events:none;
}

.wave{

    position:absolute;

    width:220%;

    height:280px;

    left:-60%;

    border-radius:45%;

    opacity:.14;

    filter:blur(8px);
}

.wave1{

    background:
    linear-gradient(
    90deg,
    #a855f7,
    #c084fc,
    #f3e8ff
    );

    bottom:-140px;

    animation:
    waveMove 18s linear infinite;
}

.wave2{

    background:
    linear-gradient(
    90deg,
    #7c3aed,
    #d8b4fe,
    #ffffff
    );

    bottom:-180px;

    opacity:.08;

    animation:
    waveMoveReverse 28s linear infinite;
}

@keyframes waveMove{

    0%{
        transform:
        translateX(0)
        rotate(0deg);
    }

    100%{
        transform:
        translateX(-12%)
        rotate(360deg);
    }
}

@keyframes waveMoveReverse{

    0%{
        transform:
        translateX(0)
        rotate(0deg);
    }

    100%{
        transform:
        translateX(12%)
        rotate(-360deg);
    }
}

/* =========================================
HEADER
========================================= */

.topbar{

    position:sticky;

    top:0;

    z-index:100;

    background:rgba(255,255,255,.78);

    backdrop-filter:blur(14px);

    border-bottom:1px solid rgba(168,85,247,.08);

    padding:16px 18px;

    display:flex;

    align-items:center;

    justify-content:space-between;
}

.top-left{

    display:flex;

    align-items:center;

    gap:14px;
}

.admin-info h1{

    font-size:1.1rem;

    font-weight:800;
}

.admin-info p{

    font-size:.85rem;

    color:#6b7280;

    margin-top:2px;
}

.avatar{

    width:46px;
    height:46px;

    border-radius:16px;

    background:linear-gradient(
    135deg,
    #2563eb,
    #60a5fa
    );

    display:flex;

    align-items:center;

    justify-content:center;

    color:#fff;

    font-weight:800;

    font-size:1rem;

    box-shadow:
    0 10px 25px rgba(37,99,235,.25);
}

/* =========================================
SEARCH
========================================= */

.search-box{

    padding:20px 18px 10px;
}

.search{

    background:rgba(255,255,255,.85);

    backdrop-filter:blur(12px);

    border:1px solid rgba(168,85,247,.08);

    border-radius:20px;

    padding:14px 16px;

    display:flex;

    align-items:center;

    gap:10px;

    box-shadow:
    0 10px 30px rgba(15,23,42,.05);
}

.search input{

    border:none;

    outline:none;

    width:100%;

    background:none;

    font-size:.95rem;

    font-family:'Inter',sans-serif;
}

.search .material-symbols-outlined{

    color:#6b7280;
}

/* =========================================
PLAYERS
========================================= */

.players{

    padding:14px 18px 120px;
}

.player-card{

    background:rgba(255,255,255,.86);

    backdrop-filter:blur(12px);

    border:1px solid rgba(168,85,247,.08);

    border-radius:24px;

    padding:18px;

    margin-bottom:16px;

    display:flex;

    align-items:center;

    justify-content:space-between;

    box-shadow:
    0 10px 30px rgba(15,23,42,.05);

    transition:.25s;
}

.player-card:hover{

    transform:
    translateY(-2px);

    box-shadow:
    0 18px 35px rgba(124,58,237,.08);
}

.player-left{

    display:flex;

    align-items:center;

    gap:14px;
}

.player-avatar{

    width:60px;
    height:60px;

    border-radius:18px;

    background:linear-gradient(
    135deg,
    #2563eb,
    #60a5fa
    );

    display:flex;

    align-items:center;

    justify-content:center;

    color:#fff;

    font-size:1rem;

    font-weight:800;

    overflow:hidden;

    flex-shrink:0;
}

.player-avatar img{

    width:100%;
    height:100%;
    object-fit:cover;
}

.player-info h3{

    font-size:1rem;

    font-weight:800;

    margin-bottom:4px;
}

.player-info p{

    color:#6b7280;

    font-size:.88rem;

    line-height:1.4;
}

.player-actions{

    display:flex;

    gap:10px;
}

.action-btn{

    width:42px;
    height:42px;

    border:none;

    border-radius:14px;

    cursor:pointer;

    display:flex;

    align-items:center;

    justify-content:center;

    color:#fff;

    transition:.2s;
}

.action-btn:active{
    transform:scale(.95);
}

.edit{
    background:#2563eb;
}

.delete{
    background:#ef4444;
}

/* =========================================
FAB
========================================= */

.fab{

    position:fixed;

    right:20px;
    bottom:20px;

    width:64px;
    height:64px;

    border:none;

    border-radius:22px;

    background:linear-gradient(
    135deg,
    #7c3aed,
    #a855f7
    );

    color:#fff;

    display:flex;

    align-items:center;

    justify-content:center;

    cursor:pointer;

    box-shadow:
    0 18px 40px rgba(124,58,237,.35);

    z-index:99;
}

.fab .material-symbols-outlined{
    font-size:34px;
}

/* =========================================
RESPONSIVE
========================================= */

@media(min-width:700px){

    .players,
    .search-box{
        max-width:700px;
        margin:auto;
    }
}

</style>

</head>

<body>

<!-- ======================================
ONDAS
====================================== -->

<div class="wave-bg">

    <div class="wave wave1"></div>

    <div class="wave wave2"></div>

</div>

<!-- ======================================
TOPBAR
====================================== -->

<header class="topbar">

    <div class="top-left">

        <div class="admin-info">

            <h1>Jugadores</h1>

            <p>Nápoles F.C.</p>

        </div>

    </div>

    <div class="avatar">
        J
    </div>

</header>

<!-- ======================================
SEARCH
====================================== -->

<section class="search-box">

    <div class="search">

        <span class="material-symbols-outlined">
            search
        </span>

        <input
        type="text"
        id="searchInput"
        placeholder="Buscar jugador...">

    </div>

</section>

<!-- ======================================
PLAYERS
====================================== -->

<section
class="players"
id="playersContainer">

    <p style="padding:20px">
        Cargando jugadores...
    </p>

</section>

<!-- ======================================
FAB
====================================== -->

<button
class="fab"
onclick="window.location.href='nuevo-jugador.html'">

    <span class="material-symbols-outlined">
        add
    </span>

</button>

<script src="./config.js"></script>

<script>

// =========================================
// VALIDAR ADMIN
// =========================================

if(
    localStorage.getItem('admin_activo')
    !== 'true'
){
    window.location.href =
    './login.html';
}

const playersContainer =
document.getElementById(
    'playersContainer'
);

const searchInput =
document.getElementById(
    'searchInput'
);

let jugadoresGlobal = [];

// =========================================
// CARGAR JUGADORES
// =========================================

async function cargarJugadores(){

    try{

        const response =
        await fetch(
`${CONFIG.URL_GAS}?action=getJugadores&t=${Date.now()}`
        );

        const data =
        await response.json();

        if(!data.ok){

            playersContainer.innerHTML =
            '<p>Error cargando jugadores</p>';

            return;
        }

        jugadoresGlobal =
        data.jugadores;

        renderJugadores(
            jugadoresGlobal
        );

    }catch(err){

        playersContainer.innerHTML =
        '<p>Error conexión</p>';

        console.log(err);
    }
}

// =========================================
// RENDER
// =========================================

function renderJugadores(lista){

    playersContainer.innerHTML = '';

    if(lista.length === 0){

        playersContainer.innerHTML =
        '<p>No hay jugadores</p>';

        return;
    }

    lista.forEach(jugador => {

        const iniciales =
        (
            (jugador.primerNombre || '')
            .charAt(0) +

            (jugador.apellidos || '')
            .charAt(0)
        ).toUpperCase();

        const card =
        document.createElement('div');

        card.className =
        'player-card';

        card.innerHTML = `

        <div class="player-left">

            <div class="player-avatar">

                ${
                    jugador.foto
                    ?
                    `<img
                    src="${jugador.foto}"
                    alt="foto">`
                    :
                    iniciales
                }

            </div>

            <div class="player-info">

                <h3>
                ${jugador.primerNombre}
                ${jugador.apellidos}
                </h3>

                <p>
                #${jugador.dorsal || '-'}
                •
                ${jugador.estado || 'PENDIENTE'}
                </p>

            </div>

        </div>

        <div class="player-actions">

            <button
            class="action-btn edit"
            onclick="editarJugador('${jugador.cedula}')">

                <span class="material-symbols-outlined">
                    edit
                </span>

            </button>

            <button
            class="action-btn delete"
            onclick="eliminarJugador(${jugador.fila})">

                <span class="material-symbols-outlined">
                    delete
                </span>

            </button>

        </div>
        `;

        playersContainer.appendChild(card);
    });
}

// =========================================
// BUSCADOR
// =========================================

searchInput.addEventListener('input', e => {

    const texto =
    e.target.value
    .toLowerCase()
    .trim();

    const filtrados =
    jugadoresGlobal.filter(j => {

        return (

            (j.primerNombre || '')
            .toLowerCase()
            .includes(texto)

            ||

            (j.apellidos || '')
            .toLowerCase()
            .includes(texto)

            ||

            (j.cedula || '')
            .includes(texto)
        );
    });

    renderJugadores(
        filtrados
    );
});

// =========================================
// ELIMINAR
// =========================================

async function eliminarJugador(fila){

    const ok =
    confirm(
        '¿Eliminar jugador?'
    );

    if(!ok){
        return;
    }

    try{

        const response =
        await fetch(
`${CONFIG.URL_GAS}?action=eliminarJugador&fila=${fila}`
        );

        const data =
        await response.json();

        if(data.ok){

            cargarJugadores();

        }else{

            alert(
                data.error
            );
        }

    }catch(err){

        alert(
            'Error eliminando'
        );
    }
}

// =========================================
// EDITAR
// =========================================

function editarJugador(cedula){

    localStorage.setItem(
        'editCedula',
        cedula
    );

    window.location.href =
    './editar-jugador.html';
}

// =========================================
// INIT
// =========================================

cargarJugadores();

</script>

</body>
</html>
