<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Jugadores - Nápoles F.C.</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
font-family:'Inter',sans-serif;
background:linear-gradient(180deg,#f5f3ff 0%,#ffffff 100%);
min-height:100vh;
overflow-x:hidden;
color:#111827;
}

.wave-bg{
position:fixed;
inset:0;
z-index:-1;
overflow:hidden;
}

.wave{
position:absolute;
width:220%;
height:300px;
border-radius:45%;
filter:blur(20px);
opacity:.15;
}

.wave1{
background:linear-gradient(90deg,#7c3aed,#a855f7,#c084fc);
bottom:-120px;
left:-60%;
animation:waveMove 20s linear infinite;
}

.wave2{
background:linear-gradient(90deg,#c084fc,#ffffff,#7c3aed);
bottom:-160px;
left:-60%;
animation:waveMove2 28s linear infinite;
}

@keyframes waveMove{
100%{
transform:translateX(-10%) rotate(360deg);
}
}

@keyframes waveMove2{
100%{
transform:translateX(10%) rotate(-360deg);
}
}

.topbar{
position:sticky;
top:0;
z-index:999;
display:flex;
align-items:center;
justify-content:space-between;
padding:18px;
backdrop-filter:blur(14px);
background:rgba(255,255,255,.7);
border-bottom:1px solid rgba(124,58,237,.1);
}

.title h1{
font-size:1.2rem;
font-weight:900;
}

.title p{
font-size:.85rem;
color:#6b7280;
}

.top-actions{
display:flex;
gap:12px;
}

.icon-btn{
width:48px;
height:48px;
border:none;
border-radius:18px;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 10px 30px rgba(0,0,0,.06);
cursor:pointer;
}

.cards-row{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
padding:18px;
}

.stat-card{
background:rgba(255,255,255,.82);
backdrop-filter:blur(14px);
border-radius:24px;
padding:16px;
text-align:center;
cursor:pointer;
transition:.25s;
border:2px solid transparent;
box-shadow:0 10px 30px rgba(0,0,0,.05);
}

.stat-card.active{
border-color:#7c3aed;
transform:translateY(-2px);
}

.stat-card h2{
font-size:1.6rem;
font-weight:900;
}

.stat-card p{
font-size:.82rem;
font-weight:700;
margin-top:4px;
color:#6b7280;
}

.search-section{
padding:0 18px 12px;
display:flex;
gap:12px;
}

.search-box{
flex:1;
height:58px;
border-radius:22px;
background:white;
display:flex;
align-items:center;
gap:12px;
padding:0 18px;
box-shadow:0 10px 30px rgba(0,0,0,.05);
}

.search-box input{
width:100%;
border:none;
outline:none;
font-size:.95rem;
background:none;
}

.players{
padding:6px 18px 120px;
}

.player-card{
background:rgba(255,255,255,.86);
backdrop-filter:blur(16px);
border-radius:30px;
padding:18px;
margin-bottom:16px;
display:flex;
justify-content:space-between;
gap:14px;
box-shadow:0 10px 30px rgba(0,0,0,.06);
}

.player-left{
display:flex;
gap:14px;
flex:1;
}

.avatar{
width:78px;
height:78px;
border-radius:24px;
background:linear-gradient(135deg,#7c3aed,#9333ea);
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
flex-shrink:0;
padding:0;
border:3px solid rgba(255,255,255,.7);
box-shadow:0 10px 25px rgba(124,58,237,.25);
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

.player-info{
flex:1;
}

.player-info h3{
font-size:1rem;
font-weight:900;
margin-bottom:4px;
}

.player-info p{
font-size:.85rem;
color:#6b7280;
margin-bottom:6px;
}

.jersey-card{
display:flex;
align-items:center;
gap:12px;
background:linear-gradient(135deg,#7c3aed,#9333ea);
padding:12px 14px;
border-radius:18px;
color:white;
margin-top:8px;
}

.jersey-number{
width:48px;
height:48px;
border-radius:16px;
background:rgba(255,255,255,.15);
display:flex;
align-items:center;
justify-content:center;
font-size:1.2rem;
font-weight:900;
}

.estado{
display:inline-flex;
align-items:center;
justify-content:center;
padding:7px 14px;
border-radius:999px;
font-size:.75rem;
font-weight:800;
margin-top:10px;
}

.aprobado{
background:#dcfce7;
color:#166534;
}

.pendiente{
background:#fef3c7;
color:#92400e;
}

.rechazado{
background:#fee2e2;
color:#991b1b;
}

.player-actions{
display:flex;
flex-direction:column;
gap:10px;
}

.action-btn{
width:48px;
height:48px;
border:none;
border-radius:18px;
display:flex;
align-items:center;
justify-content:center;
color:white;
cursor:pointer;
}

.approve{
background:#16a34a;
}

.reject{
background:#ef4444;
}

.edit{
background:#2563eb;
}

.whatsapp{
background:#16a34a;
}

.filter-popup{
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
padding:20px;
}

.filter-box{
width:100%;
max-width:340px;
background:white;
border-radius:28px;
padding:22px;
}

.filter-box h2{
font-size:1.1rem;
font-weight:900;
margin-bottom:16px;
}

.filter-option{
width:100%;
height:52px;
border:none;
border-radius:18px;
margin-bottom:10px;
font-weight:800;
cursor:pointer;
background:#f3f4f6;
}

@media(max-width:768px){

.cards-row{
grid-template-columns:repeat(4,1fr);
gap:8px;
}

.stat-card{
padding:12px 8px;
border-radius:18px;
}

.stat-card h2{
font-size:1.1rem;
}

.stat-card p{
font-size:.68rem;
}

.player-card{
flex-direction:column;
}

.player-actions{
flex-direction:row;
width:100%;
justify-content:flex-end;
}

.avatar{
width:72px;
height:72px;
}

}

</style>
</head>
<body>

<div class="wave-bg">
<div class="wave wave1"></div>
<div class="wave wave2"></div>
</div>

<header class="topbar">

<div class="title">
<h1>Nápoles F.C.</h1>
<p>Panel de jugadores</p>
</div>

<div class="top-actions">

<button class="icon-btn" onclick="abrirFiltros()">
<span class="material-symbols-outlined">filter_alt</span>
</button>

<button class="icon-btn" onclick="descargarPDF()">
<span class="material-symbols-outlined">picture_as_pdf</span>
</button>

<button class="icon-btn" onclick="cerrarSesion()">
<span class="material-symbols-outlined">logout</span>
</button>

</div>

</header>

<section class="cards-row">

<div class="stat-card active" id="cardTotal" onclick="filtrarCard('TODOS',this)">
<h2 id="totalJugadores">0</h2>
<p>TOTAL</p>
</div>

<div class="stat-card" id="cardAprobados" onclick="filtrarCard('APROBADO',this)">
<h2 id="totalAprobados">0</h2>
<p>APROBADOS</p>
</div>

<div class="stat-card" id="cardPendientes" onclick="filtrarCard('PENDIENTE',this)">
<h2 id="totalPendientes">0</h2>
<p>PENDIENTES</p>
</div>

<div class="stat-card" id="cardRechazados" onclick="filtrarCard('RECHAZADO',this)">
<h2 id="totalRechazados">0</h2>
<p>RECHAZADOS</p>
</div>

</section>

<section class="search-section">

<div class="search-box">
<span class="material-symbols-outlined">search</span>
<input type="text" id="searchInput" placeholder="Buscar jugador...">
</div>

</section>

<section class="players" id="playersContainer">
<p>Cargando jugadores...</p>
</section>

<div class="filter-popup" id="filterPopup">
<div class="filter-box">
<h2>Filtrar jugadores</h2>

<button class="filter-option" onclick="ordenarPor('dorsal')">
Ordenar por dorsal
</button>

<button class="filter-option" onclick="ordenarPor('nombre')">
Ordenar por nombre
</button>

<button class="filter-option" onclick="ordenarPor('estado')">
Ordenar por estado
</button>

<button class="filter-option" onclick="cerrarFiltros()">
Cerrar
</button>

</div>
</div>

<script src="./config.js"></script>

<script>

if(localStorage.getItem('admin_activo') !== 'true'){
window.location.href='./login.html';
}

const AVATARES = [
'https://api.dicebear.com/7.x/bottts/svg?seed=SpiderMan&backgroundColor=b6e3f4',
'https://api.dicebear.com/7.x/bottts/svg?seed=Batman&backgroundColor=c0aede',
'https://api.dicebear.com/7.x/bottts/svg?seed=Superman&backgroundColor=ffd5dc',
'https://api.dicebear.com/7.x/bottts/svg?seed=IronMan&backgroundColor=ffdfbf',
'https://api.dicebear.com/7.x/bottts/svg?seed=Thor&backgroundColor=d1d4f9',
'https://api.dicebear.com/7.x/bottts/svg?seed=CaptainAmerica&backgroundColor=c0aede',
'https://api.dicebear.com/7.x/bottts/svg?seed=Flash&backgroundColor=ffd5dc',
'https://api.dicebear.com/7.x/bottts/svg?seed=Hulk&backgroundColor=d1d4f9',
'https://api.dicebear.com/7.x/bottts/svg?seed=DoctorStrange&backgroundColor=b6e3f4',
'https://api.dicebear.com/7.x/bottts/svg?seed=GreenLantern&backgroundColor=ffdfbf'
];

const playersContainer = document.getElementById('playersContainer');
const searchInput = document.getElementById('searchInput');

let jugadoresGlobal = [];
let jugadoresFiltrados = [];
let filtroActual = 'TODOS';

async function cargarJugadores(){

try{

const response = await fetch(`${CONFIG.URL_GAS}?action=getJugadores&t=${Date.now()}`);

const data = await response.json();

jugadoresGlobal = (data.jugadores || []).sort((a,b)=>{
return Number(a.dorsal || 999) - Number(b.dorsal || 999);
});

jugadoresFiltrados = [...jugadoresGlobal];

actualizarCards();
renderJugadores(jugadoresGlobal);

}catch(err){
playersContainer.innerHTML='<p>Error cargando jugadores</p>';
}
}

function actualizarCards(){

const total = jugadoresGlobal.length;
const aprobados = jugadoresGlobal.filter(j=>String(j.estado).toUpperCase()==='APROBADO').length;
const pendientes = jugadoresGlobal.filter(j=>!j.estado || String(j.estado).toUpperCase()==='PENDIENTE').length;
const rechazados = jugadoresGlobal.filter(j=>String(j.estado).toUpperCase()==='RECHAZADO').length;


document.getElementById('totalJugadores').innerText = total;
document.getElementById('totalAprobados').innerText = aprobados;
document.getElementById('totalPendientes').innerText = pendientes;
document.getElementById('totalRechazados').innerText = rechazados;
}

function renderJugadores(lista){

playersContainer.innerHTML='';

if(lista.length===0){
playersContainer.innerHTML='<p>No hay jugadores</p>';
return;
}

lista.forEach((jugador,index)=>{

const avatar = AVATARES[index % AVATARES.length];

let estadoClass = 'pendiente';

if(String(jugador.estado).toUpperCase()==='APROBADO'){
estadoClass='aprobado';
}

if(String(jugador.estado).toUpperCase()==='RECHAZADO'){
estadoClass='rechazado';
}

const card = document.createElement('div');
card.className='player-card';

card.innerHTML=`

<div class="player-left">

<div class="avatar">
<img
src="${avatar}"
alt="Avatar Superhéroe"
loading="lazy"
referrerpolicy="no-referrer"
style="width:100%;height:100%;object-fit:cover;display:block;">
</div>

<div class="player-info">

<h3>
${jugador.primerNombre || ''}
${jugador.segundoNombre || ''}
${jugador.apellidos || ''}
</h3>

<p>
Cédula: ${jugador.cedula || ''}
</p>

<p>
Teléfono: ${jugador.telefono || 'No registrado'}
</p>

<div class="jersey-card">
<div class="jersey-number">
#${jugador.dorsal || '--'}
</div>
<div>
<div style="font-weight:900;font-size:.95rem;">
${jugador.nombreCamiseta || 'SIN NOMBRE'}
</div>
<div style="font-size:.8rem;opacity:.9;">
Nombre camiseta
</div>
</div>
</div>

<div class="estado ${estadoClass}">
${jugador.estado || 'PENDIENTE'}
</div>

</div>

</div>

<div class="player-actions">

<button
class="action-btn approve"
onclick="aprobarJugador('${jugador.cedula}')">
<span class="material-symbols-outlined">check</span>
</button>

<button
class="action-btn reject"
onclick="rechazarJugador('${jugador.cedula}')">
<span class="material-symbols-outlined">close</span>
</button>

<button
class="action-btn whatsapp"
onclick="enviarWhatsapp('${jugador.telefono}','${jugador.primerNombre}')">
<span class="material-symbols-outlined">chat</span>
</button>

<button
class="action-btn edit"
onclick="editarJugador('${jugador.cedula}')">
<span class="material-symbols-outlined">edit</span>
</button>

</div>

`;

playersContainer.appendChild(card);

});
}

function filtrarCard(estado,btn){

filtroActual = estado;


document.querySelectorAll('.stat-card').forEach(c=>{
c.classList.remove('active');
});

btn.classList.add('active');

if(estado==='TODOS'){
renderJugadores(jugadoresGlobal);
return;
}

const filtrados = jugadoresGlobal.filter(j=>{
return String(j.estado || 'PENDIENTE').toUpperCase()===estado;
});

renderJugadores(filtrados);
}

searchInput.addEventListener('input',e=>{

const texto = e.target.value.toLowerCase().trim();

const filtrados = jugadoresGlobal.filter(j=>{

const nombre = `${j.primerNombre || ''} ${j.apellidos || ''}`.toLowerCase();

return nombre.includes(texto)
|| String(j.cedula || '').includes(texto)
|| String(j.dorsal || '').includes(texto)
|| String(j.nombreCamiseta || '').toLowerCase().includes(texto);

});

renderJugadores(filtrados);

});

async function aprobarJugador(cedula){

const ok = confirm('¿Aprobar jugador?');
if(!ok) return;

try{

const response = await fetch(`${CONFIG.URL_GAS}?action=aprobarJugador&cedula=${cedula}`);
const data = await response.json();

if(data.ok){

const mensaje = `🏆 *¡BIENVENIDO A NÁPOLES F.C.!* ⚽🔥\n\nTu registro fue aprobado exitosamente 🙌\n\nYa eres parte oficial del club 💙\n\n📲 Ingresa ahora a tu panel de jugador:\nhttps://kilometro0-ec.github.io/NAPOLES-FC/login.html\n\n✅ Usa tu número de cédula para ingresar\n\n⚽ Mira tus estadísticas\n🏅 Mira tus partidos\n👕 Revisa tu perfil\n💪 Bienvenido crack`;

const telefono = String(data.telefono || '').replace(/\D/g,'');

const tipoWhatsapp = localStorage.getItem('tipo_whatsapp') || 'normal';

let url = '';

if(tipoWhatsapp === 'business'){
url = `https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`;
}else{
url = `https://api.whatsapp.com/send?phone=${telefono}&text=${encodeURIComponent(mensaje)}`;
}

window.open(url,'_blank');

cargarJugadores();
}

}catch(err){
alert('Error aprobando jugador');
}
}

async function rechazarJugador(cedula){

const ok = confirm('¿Rechazar jugador?');
if(!ok) return;

try{

const response = await fetch(`${CONFIG.URL_GAS}?action=rechazarJugador&cedula=${cedula}`);
const data = await response.json();

if(data.ok){
cargarJugadores();
}

}catch(err){
alert('Error rechazando');
}
}

function enviarWhatsapp(telefono,nombre){

telefono = String(telefono || '').replace(/\D/g,'');

const mensaje = `Hola ${nombre} ⚽`;

const tipoWhatsapp = localStorage.getItem('tipo_whatsapp') || 'normal';

let url = '';

if(tipoWhatsapp === 'business'){
url = `https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`;
}else{
url = `https://api.whatsapp.com/send?phone=${telefono}&text=${encodeURIComponent(mensaje)}`;
}

window.open(url,'_blank');
}

function editarJugador(cedula){
localStorage.setItem('editCedula',cedula);
window.location.href='./editar-jugador.html';
}

function abrirFiltros(){
document.getElementById('filterPopup').style.display='flex';
}

function cerrarFiltros(){
document.getElementById('filterPopup').style.display='none';
}

function ordenarPor(tipo){

if(tipo==='dorsal'){
jugadoresGlobal.sort((a,b)=>Number(a.dorsal||999)-Number(b.dorsal||999));
}

if(tipo==='nombre'){
jugadoresGlobal.sort((a,b)=>String(a.primerNombre).localeCompare(String(b.primerNombre)));
}

if(tipo==='estado'){
jugadoresGlobal.sort((a,b)=>String(a.estado).localeCompare(String(b.estado)));
}

renderJugadores(jugadoresGlobal);
cerrarFiltros();
}

function descargarPDF(){

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

const rows = jugadoresGlobal.map(j=>[
`${j.primerNombre || ''} ${j.apellidos || ''}`,
j.cedula || '',
j.dorsal || '',
j.nombreCamiseta || '',
j.estado || 'PENDIENTE'
]);


doc.text('Jugadores Nápoles F.C.',14,15);


doc.autoTable({
head:[[ 'Jugador','Cédula','Dorsal','Camiseta','Estado' ]],
body:rows,
startY:22
});


doc.save('jugadores-napoles.pdf');
}

function cerrarSesion(){
localStorage.removeItem('admin_activo');
window.location.href='./login.html';
}

if(!localStorage.getItem('tipo_whatsapp')){

const usarBusiness = confirm('¿Deseas usar WhatsApp Business?\nAceptar = Business\nCancelar = Normal');

if(usarBusiness){
localStorage.setItem('tipo_whatsapp','business');
}else{
localStorage.setItem('tipo_whatsapp','normal');
}
}

cargarJugadores();

</script>

</body>
</html>
