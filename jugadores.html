<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Jugadores - Nápoles F.C.</title>

<script src="https://cdn.tailwindcss.com"></script>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
rel="stylesheet">

<link
href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{

    font-family:'Inter',sans-serif;

    background:
    linear-gradient(
    180deg,
    #f5f3ff 0%,
    #ffffff 35%,
    #f8fafc 100%
    );

    min-height:100vh;

    overflow-x:hidden;
}

/* =====================================
SCROLL
===================================== */

::-webkit-scrollbar{
    width:0;
    height:0;
}

/* =====================================
WAVES
===================================== */

.wave-bg{

    position:fixed;

    inset:0;

    overflow:hidden;

    z-index:-1;

    pointer-events:none;
}

.wave{

    position:absolute;

    width:220%;

    height:280px;

    left:-60%;

    border-radius:45%;

    opacity:.10;

    filter:blur(10px);
}

.wave1{

    background:
    linear-gradient(
    90deg,
    #7c3aed,
    #a855f7,
    #d8b4fe
    );

    bottom:-140px;

    animation:
    waveMove 18s linear infinite;
}

.wave2{

    background:
    linear-gradient(
    90deg,
    #2563eb,
    #7c3aed,
    #ffffff
    );

    bottom:-180px;

    animation:
    waveMoveReverse 28s linear infinite;
}

@keyframes waveMove{

    0%{
        transform:
        translateX(0)
        rotate(0deg);
    }

    100%{
        transform:
        translateX(-12%)
        rotate(360deg);
    }
}

@keyframes waveMoveReverse{

    0%{
        transform:
        translateX(0)
        rotate(0deg);
    }

    100%{
        transform:
        translateX(12%)
        rotate(-360deg);
    }
}

/* =====================================
TOPBAR
===================================== */

.topbar{

    position:sticky;

    top:0;

    z-index:100;

    backdrop-filter:blur(18px);

    background:
    rgba(255,255,255,.78);

    border-bottom:
    1px solid rgba(124,58,237,.08);

    padding:16px;

    display:flex;

    align-items:center;

    justify-content:space-between;
}

.logo-box{

    display:flex;

    align-items:center;

    gap:12px;
}

.logo{

    width:52px;
    height:52px;

    border-radius:18px;

    background:
    linear-gradient(
    135deg,
    #7c3aed,
    #a855f7
    );

    display:flex;

    align-items:center;

    justify-content:center;

    color:#fff;

    font-size:1.2rem;

    font-weight:900;

    box-shadow:
    0 15px 35px rgba(124,58,237,.30);
}

.top-info h1{

    font-size:1.1rem;

    font-weight:900;

    color:#111827;
}

.top-info p{

    font-size:.84rem;

    color:#6b7280;
}

.top-actions{

    display:flex;

    align-items:center;

    gap:10px;
}

.top-btn{

    width:46px;
    height:46px;

    border:none;

    border-radius:16px;

    background:#fff;

    display:flex;

    align-items:center;

    justify-content:center;

    cursor:pointer;

    box-shadow:
    0 10px 25px rgba(15,23,42,.06);
}

/* =====================================
CARDS TOP
===================================== */

.stats-wrapper{

    padding:16px;

    overflow-x:auto;
}

.stats-row{

    display:flex;

    gap:12px;

    min-width:max-content;
}

.stat-card{

    min-width:145px;

    background:
    rgba(255,255,255,.82);

    backdrop-filter:blur(12px);

    border:
    1px solid rgba(124,58,237,.08);

    border-radius:24px;

    padding:18px;

    box-shadow:
    0 10px 30px rgba(15,23,42,.05);
}

.stat-card h3{

    font-size:1.8rem;

    font-weight:900;

    margin-bottom:4px;

    color:#111827;
}

.stat-card p{

    font-size:.8rem;

    color:#6b7280;

    font-weight:700;
}

/* =====================================
SEARCH
===================================== */

.search-area{

    padding:0 16px 16px;
}

.search-box{

    width:100%;

    background:
    rgba(255,255,255,.84);

    backdrop-filter:blur(14px);

    border:
    1px solid rgba(124,58,237,.08);

    border-radius:22px;

    padding:15px 16px;

    display:flex;

    align-items:center;

    gap:12px;

    box-shadow:
    0 10px 30px rgba(15,23,42,.05);
}

.search-box input{

    width:100%;

    border:none;

    outline:none;

    background:none;

    font-size:.95rem;

    font-family:'Inter';
}

/* =====================================
FILTER
===================================== */

.filter-area{

    padding:0 16px 10px;

    display:flex;

    justify-content:flex-end;
}

.filter-btn{

    width:54px;
    height:54px;

    border:none;

    border-radius:20px;

    background:
    linear-gradient(
    135deg,
    #7c3aed,
    #a855f7
    );

    color:#fff;

    display:flex;

    align-items:center;

    justify-content:center;

    cursor:pointer;

    box-shadow:
    0 15px 35px rgba(124,58,237,.30);
}

/* =====================================
PLAYERS
===================================== */

.players{

    padding:10px 16px 120px;
}

.player-card{

    background:
    rgba(255,255,255,.88);

    backdrop-filter:blur(12px);

    border:
    1px solid rgba(124,58,237,.08);

    border-radius:28px;

    padding:18px;

    margin-bottom:18px;

    box-shadow:
    0 12px 30px rgba(15,23,42,.05);
}

/* =====================================
TOP PLAYER
===================================== */

.player-top{

    display:flex;

    gap:14px;

    align-items:center;

    margin-bottom:16px;
}

/* =====================================
ANIMATED AVATAR
===================================== */

.player-avatar{

    width:92px;
    height:92px;

    border-radius:26px;

    overflow:hidden;

    flex-shrink:0;

    border:4px solid #fff;

    box-shadow:
    0 12px 28px rgba(124,58,237,.18);
}

.player-avatar img{

    width:100%;
    height:100%;

    object-fit:cover;
}

/* =====================================
JERSEY CARD
===================================== */

.jersey-card{

    flex:1;

    background:
    linear-gradient(
    135deg,
    #0f172a,
    #1e293b
    );

    border-radius:24px;

    padding:18px;

    color:#fff;

    position:relative;

    overflow:hidden;
}

.jersey-card::before{

    content:'';

    position:absolute;

    width:120px;
    height:120px;

    background:
    rgba(255,255,255,.05);

    border-radius:50%;

    top:-30px;
    right:-20px;
}

.jersey-name{

    font-size:1rem;

    font-weight:900;

    letter-spacing:1px;

    position:relative;

    z-index:2;
}

.jersey-number{

    font-size:2.8rem;

    font-weight:900;

    line-height:1;

    margin-top:8px;

    position:relative;

    z-index:2;
}

/* =====================================
INFO
===================================== */

.player-name{

    font-size:1rem;

    font-weight:900;

    color:#111827;

    margin-bottom:8px;
}

.player-meta{

    display:flex;

    flex-wrap:wrap;

    gap:8px;

    margin-bottom:14px;
}

.meta-badge{

    padding:8px 14px;

    border-radius:999px;

    font-size:.72rem;

    font-weight:800;
}

.estado-aprobado{

    background:#dcfce7;

    color:#166534;
}

.estado-pendiente{

    background:#fef3c7;

    color:#92400e;
}

.estado-rechazado{

    background:#fee2e2;

    color:#991b1b;
}

.meta-default{

    background:#eef2ff;

    color:#3730a3;
}

/* =====================================
ACTIONS
===================================== */

.actions{

    display:flex;

    gap:10px;

    flex-wrap:wrap;
}

.action-btn{

    flex:1;

    min-width:64px;

    height:46px;

    border:none;

    border-radius:18px;

    color:#fff;

    display:flex;

    align-items:center;

    justify-content:center;

    cursor:pointer;

    font-weight:700;
}

.approve{
    background:#16a34a;
}

.reject{
    background:#ef4444;
}

.edit{
    background:#2563eb;
}

.whatsapp{
    background:#22c55e;
}

/* =====================================
FAB
===================================== */

.fab{

    position:fixed;

    right:22px;
    bottom:22px;

    width:68px;
    height:68px;

    border:none;

    border-radius:26px;

    background:
    linear-gradient(
    135deg,
    #7c3aed,
    #a855f7
    );

    color:#fff;

    display:flex;

    align-items:center;

    justify-content:center;

    box-shadow:
    0 20px 40px rgba(124,58,237,.35);

    cursor:pointer;
}

.fab .material-symbols-outlined{
    font-size:36px;
}

</style>

</head>

<body>

<!-- WAVES -->

<div class="wave-bg">

    <div class="wave wave1"></div>

    <div class="wave wave2"></div>

</div>

<!-- TOPBAR -->

<header class="topbar">

    <div class="logo-box">

        <div class="logo">
            N
        </div>

        <div class="top-info">

            <h1>Nápoles F.C.</h1>

            <p>Panel Administrativo</p>

        </div>

    </div>

    <div class="top-actions">

        <button
        class="top-btn"
        onclick="descargarPDF()">

            <span class="material-symbols-outlined">
                picture_as_pdf
            </span>

        </button>

        <button
        class="top-btn"
        onclick="cerrarSesion()">

            <span class="material-symbols-outlined">
                logout
            </span>

        </button>

    </div>

</header>

<!-- STATS -->

<section class="stats-wrapper">

    <div class="stats-row">

        <div class="stat-card">

            <h3 id="totalJugadores">
                0
            </h3>

            <p>TOTAL</p>

        </div>

        <div class="stat-card">

            <h3 id="aprobados">
                0
            </h3>

            <p>APROBADOS</p>

        </div>

        <div class="stat-card">

            <h3 id="pendientes">
                0
            </h3>

            <p>PENDIENTES</p>

        </div>

        <div class="stat-card">

            <h3 id="rechazados">
                0
            </h3>

            <p>RECHAZADOS</p>

        </div>

    </div>

</section>

<!-- SEARCH -->

<section class="search-area">

    <div class="search-box">

        <span class="material-symbols-outlined">
            search
        </span>

        <input
        type="text"
        id="searchInput"
        placeholder="Buscar jugador...">

    </div>

</section>

<!-- FILTER -->

<section class="filter-area">

    <button
    class="filter-btn"
    onclick="mostrarFiltros()">

        <span class="material-symbols-outlined">
            tune
        </span>

    </button>

</section>

<!-- PLAYERS -->

<section
class="players"
id="playersContainer">

    <p style="padding:20px">
        Cargando jugadores...
    </p>

</section>

<!-- FAB -->

<button
class="fab"
onclick="window.location.href='nuevo-jugador.html'">

    <span class="material-symbols-outlined">
        add
    </span>

</button>

<script src="./config.js"></script>

<script>

// =========================================
// VALIDAR ADMIN
// =========================================

if(
    localStorage.getItem('admin_activo')
    !== 'true'
){
    window.location.href =
    './login.html';
}

const playersContainer =
document.getElementById(
    'playersContainer'
);

const searchInput =
document.getElementById(
    'searchInput'
);

let jugadoresGlobal = [];

let filtroActual = 'TODOS';

// =========================================
// AVATARES HOMBRES ANIMADOS
// =========================================

const avatars = [

'https://api.dicebear.com/7.x/adventurer/svg?seed=Carlos&gender=male',
'https://api.dicebear.com/7.x/adventurer/svg?seed=Luis&gender=male',
'https://api.dicebear.com/7.x/adventurer/svg?seed=Pedro&gender=male',
'https://api.dicebear.com/7.x/adventurer/svg?seed=Andres&gender=male',
'https://api.dicebear.com/7.x/adventurer/svg?seed=Jhon&gender=male',
'https://api.dicebear.com/7.x/adventurer/svg?seed=Marco&gender=male',
'https://api.dicebear.com/7.x/adventurer/svg?seed=David&gender=male',
'https://api.dicebear.com/7.x/adventurer/svg?seed=Kevin&gender=male'

];

// =========================================
// CARGAR JUGADORES
// =========================================

async function cargarJugadores(){

    try{

        const response =
        await fetch(
`${CONFIG.URL_GAS}?action=getJugadores&t=${Date.now()}`
        );

        const data =
        await response.json();

        jugadoresGlobal =
        data.jugadores || [];

        // =====================================
        // ORDENAR POR DORSAL
        // =====================================

        jugadoresGlobal.sort((a,b)=>{

            return (
                Number(a.dorsal || 0)
                -
                Number(b.dorsal || 0)
            );
        });

        actualizarStats();

        renderJugadores(
            jugadoresGlobal
        );

    }catch(err){

        playersContainer.innerHTML =
        '<p>Error cargando jugadores</p>';
    }
}

// =========================================
// STATS
// =========================================

function actualizarStats(){

    const total =
    jugadoresGlobal.length;

    const aprobados =
    jugadoresGlobal.filter(j =>

        (j.estado || '')
        .toUpperCase()
        === 'APROBADO'

    ).length;

    const pendientes =
    jugadoresGlobal.filter(j =>

        !j.estado ||

        (j.estado || '')
        .toUpperCase()
        === 'PENDIENTE'

    ).length;

    const rechazados =
    jugadoresGlobal.filter(j =>

        (j.estado || '')
        .toUpperCase()
        === 'RECHAZADO'

    ).length;

    document.getElementById(
        'totalJugadores'
    ).innerText = total;

    document.getElementById(
        'aprobados'
    ).innerText = aprobados;

    document.getElementById(
        'pendientes'
    ).innerText = pendientes;

    document.getElementById(
        'rechazados'
    ).innerText = rechazados;
}

// =========================================
// RENDER
// =========================================

function renderJugadores(lista){

    playersContainer.innerHTML = '';

    if(lista.length === 0){

        playersContainer.innerHTML =
        '<p>No hay jugadores</p>';

        return;
    }

    lista.forEach((jugador,index) => {

        const avatar =
        jugador.foto
        ||
        avatars[
            index % avatars.length
        ];

        let estadoClass =
        'estado-pendiente';

        if(
            jugador.estado ===
            'APROBADO'
        ){
            estadoClass =
            'estado-aprobado';
        }

        if(
            jugador.estado ===
            'RECHAZADO'
        ){
            estadoClass =
            'estado-rechazado';
        }

        const card =
        document.createElement('div');

        card.className =
        'player-card';

        card.innerHTML = `

        <div class="player-top">

            <div class="player-avatar">

                <img src="${avatar}">

            </div>

            <div class="jersey-card">

                <div class="jersey-name">
                    ${
                        jugador.nombreCamiseta
                        || 'NAPOLES'
                    }
                </div>

                <div class="jersey-number">
                    #${
                        jugador.dorsal
                        || '-'
                    }
                </div>

            </div>

        </div>

        <div class="player-name">

            ${jugador.primerNombre}
            ${jugador.apellidos}

        </div>

        <div class="player-meta">

            <div class="meta-badge ${estadoClass}">

                ${
                    jugador.estado
                    || 'PENDIENTE'
                }

            </div>

            <div class="meta-badge meta-default">

                ${jugador.cedula}

            </div>

            <div class="meta-badge meta-default">

                ${jugador.telefono || 'Sin teléfono'}

            </div>

        </div>

        <div class="actions">

            <button
            class="action-btn approve"
            onclick="aprobarJugador('${jugador.cedula}')">

                <span class="material-symbols-outlined">
                    check
                </span>

            </button>

            <button
            class="action-btn reject"
            onclick="rechazarJugador('${jugador.cedula}')">

                <span class="material-symbols-outlined">
                    close
                </span>

            </button>

            <button
            class="action-btn edit"
            onclick="editarJugador('${jugador.cedula}')">

                <span class="material-symbols-outlined">
                    edit
                </span>

            </button>

            <button
            class="action-btn whatsapp"
            onclick="enviarWhatsapp('${jugador.telefono}')">

                <span class="material-symbols-outlined">
                    chat
                </span>

            </button>

        </div>
        `;

        playersContainer.appendChild(card);
    });
}

// =========================================
// BUSCADOR
// =========================================

searchInput.addEventListener(
'input',
e => {

    buscarJugadores(
        e.target.value
    );
});

function buscarJugadores(texto){

    texto =
    texto.toLowerCase()
    .trim();

    let lista =
    jugadoresGlobal;

    if(filtroActual !== 'TODOS'){

        lista =
        lista.filter(j =>

            (j.estado || '')
            .toUpperCase()
            === filtroActual
        );
    }

    lista =
    lista.filter(j => {

        return (

            (j.primerNombre || '')
            .toLowerCase()
            .includes(texto)

            ||

            (j.apellidos || '')
            .toLowerCase()
            .includes(texto)

            ||

            (j.nombreCamiseta || '')
            .toLowerCase()
            .includes(texto)

            ||

            String(j.dorsal || '')
            .includes(texto)
        );
    });

    renderJugadores(lista);
}

// =========================================
// FILTROS
// =========================================

function mostrarFiltros(){

    const opcion =
    prompt(
`FILTRAR:

1 = APROBADOS
2 = PENDIENTES
3 = RECHAZADOS
4 = TODOS`
    );

    if(opcion === '1'){
        filtroActual = 'APROBADO';
    }

    else if(opcion === '2'){
        filtroActual = 'PENDIENTE';
    }

    else if(opcion === '3'){
        filtroActual = 'RECHAZADO';
    }

    else{
        filtroActual = 'TODOS';
    }

    buscarJugadores(
        searchInput.value
    );
}

// =========================================
// APROBAR
// =========================================

async function aprobarJugador(
    cedula
){

    const ok =
    confirm(
        '¿Aprobar jugador?'
    );

    if(!ok){
        return;
    }

    try{

        const response =
        await fetch(
`${CONFIG.URL_GAS}?action=aprobarJugador&cedula=${cedula}`
        );

        const data =
        await response.json();

        if(data.ok){

            const mensaje =

`🏆 *¡BIENVENIDO A NÁPOLES F.C.!* ⚽🔥

Tu registro fue aprobado exitosamente 🙌

Ya eres parte oficial del club 💙

📲 Ingresa ahora a tu panel:
https://kilometro0-ec.github.io/NAPOLES-FC/login.html

✅ Solo debes ingresar tu número de cédula.

⚽ Revisa tu perfil
🏅 Mira tus estadísticas
👕 Mira tus partidos

¡Nos vemos en la cancha campeón! 💪🔥`;

            window.open(
`https://wa.me/593${data.telefono}?text=${encodeURIComponent(mensaje)}`,
'_blank'
            );

            cargarJugadores();
        }

    }catch(err){

        alert(
            'Error aprobando'
        );
    }
}

// =========================================
// RECHAZAR
// =========================================

async function rechazarJugador(
    cedula
){

    const ok =
    confirm(
        '¿Rechazar jugador?'
    );

    if(!ok){
        return;
    }

    try{

        const response =
        await fetch(
`${CONFIG.URL_GAS}?action=rechazarJugador&cedula=${cedula}`
        );

        const data =
        await response.json();

        if(data.ok){

            cargarJugadores();
        }

    }catch(err){

        alert(
            'Error rechazando'
        );
    }
}

// =========================================
// EDITAR
// =========================================

function editarJugador(
    cedula
){

    localStorage.setItem(
        'editCedula',
        cedula
    );

    window.location.href =
    './editar-jugador.html';
}

// =========================================
// WHATSAPP
// =========================================

function enviarWhatsapp(
    telefono
){

    if(!telefono){

        alert(
            'Jugador sin teléfono'
        );

        return;
    }

    telefono =
    telefono.replace(/\D/g,'');

    window.open(
`https://wa.me/593${telefono}`,
'_blank'
    );
}

// =========================================
// PDF
// =========================================

function descargarPDF(){

    window.print();
}

// =========================================
// LOGOUT
// =========================================

function cerrarSesion(){

    localStorage.removeItem(
        'admin_activo'
    );

    window.location.href =
    './login.html';
}

// =========================================
// INIT
// =========================================

cargarJugadores();

</script>

</body>
</html>
