<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Jugadores | Nápoles F.C.</title>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
rel="stylesheet">

<link
href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{

    font-family:'Inter',sans-serif;

    background:
    linear-gradient(
    180deg,
    #f8fafc 0%,
    #eef2ff 100%
    );

    min-height:100vh;

    overflow-x:hidden;

    color:#111827;
}

/* ====================================
TOPBAR
==================================== */

.topbar{

    position:sticky;

    top:0;

    z-index:100;

    padding:16px;

    display:flex;

    align-items:center;

    justify-content:space-between;

    background:
    rgba(255,255,255,.75);

    backdrop-filter:blur(20px);

    border-bottom:
    1px solid rgba(255,255,255,.4);
}

.logo h1{

    font-size:1.2rem;

    font-weight:900;
}

.logo p{

    font-size:.82rem;

    color:#6b7280;
}

.top-actions{

    display:flex;

    gap:10px;
}

.top-btn{

    width:46px;
    height:46px;

    border:none;

    border-radius:16px;

    background:#fff;

    display:flex;

    align-items:center;

    justify-content:center;

    cursor:pointer;

    box-shadow:
    0 10px 25px rgba(0,0,0,.06);
}

/* ====================================
STATS
==================================== */

.stats-grid{

    display:grid;

    grid-template-columns:
    repeat(4,1fr);

    gap:10px;

    padding:16px;
}

.stat-card{

    background:
    rgba(255,255,255,.7);

    backdrop-filter:blur(18px);

    border-radius:24px;

    padding:14px 10px;

    text-align:center;

    box-shadow:
    0 12px 30px rgba(0,0,0,.05);
}

.stat-card h2{

    font-size:1.25rem;

    font-weight:900;
}

.stat-card p{

    margin-top:4px;

    font-size:.7rem;

    color:#6b7280;

    font-weight:800;
}

/* ====================================
SEARCH
==================================== */

.search-area{

    padding:0 16px 16px;
}

.search-box{

    background:#fff;

    border-radius:24px;

    padding:14px 16px;

    display:flex;

    align-items:center;

    gap:10px;

    box-shadow:
    0 10px 25px rgba(0,0,0,.05);
}

.search-box input{

    width:100%;

    border:none;

    outline:none;

    background:none;

    font-size:.95rem;
}

/* ====================================
PLAYERS
==================================== */

.players{

    padding:0 16px 120px;
}

.player-card{

    background:
    rgba(255,255,255,.78);

    backdrop-filter:blur(18px);

    border-radius:30px;

    padding:16px;

    margin-bottom:18px;

    display:flex;

    align-items:center;

    justify-content:space-between;

    box-shadow:
    0 14px 35px rgba(0,0,0,.05);
}

.player-left{

    display:flex;

    align-items:center;

    gap:14px;
}

/* ====================================
AVATAR
==================================== */

.player-avatar{

    width:76px;
    height:76px;

    border-radius:24px;

    overflow:hidden;

    flex-shrink:0;

    padding:3px;

    background:
    linear-gradient(
    135deg,
    #7c3aed,
    #a855f7
    );

    box-shadow:
    0 10px 25px rgba(124,58,237,.25);
}

.player-avatar img{

    width:100%;
    height:100%;

    border-radius:20px;

    object-fit:cover;

    background:#fff;
}

/* ====================================
INFO
==================================== */

.player-info h3{

    font-size:1rem;

    font-weight:900;
}

.player-info p{

    font-size:.82rem;

    color:#6b7280;

    margin-top:3px;
}

.shirt-box{

    margin-top:10px;

    display:inline-flex;

    align-items:center;

    gap:10px;

    padding:8px 12px;

    border-radius:16px;

    background:
    linear-gradient(
    135deg,
    #111827,
    #1f2937
    );

    color:#fff;
}

.shirt-box strong{

    font-size:.92rem;
}

.dorsal{

    width:32px;
    height:32px;

    border-radius:12px;

    background:#a855f7;

    display:flex;

    align-items:center;

    justify-content:center;

    font-weight:900;
}

/* ====================================
STATUS
==================================== */

.estado{

    margin-top:10px;

    display:inline-flex;

    align-items:center;

    justify-content:center;

    padding:0 14px;

    height:30px;

    border-radius:999px;

    font-size:.72rem;

    font-weight:800;
}

.aprobado{

    background:#dcfce7;
    color:#166534;
}

.pendiente{

    background:#fef3c7;
    color:#92400e;
}

.rechazado{

    background:#fee2e2;
    color:#991b1b;
}

/* ====================================
ACTIONS
==================================== */

.player-actions{

    display:flex;

    flex-direction:column;

    gap:10px;
}

.action-btn{

    width:46px;
    height:46px;

    border:none;

    border-radius:16px;

    display:flex;

    align-items:center;

    justify-content:center;

    color:#fff;

    cursor:pointer;

    transition:.25s;
}

.action-btn:hover{

    transform:scale(1.05);
}

.approve{
    background:#16a34a;
}

.reject{
    background:#ef4444;
}

.whatsapp{
    background:#22c55e;
}

.edit{
    background:#2563eb;
}

/* ====================================
RESPONSIVE
==================================== */

@media(max-width:700px){

    .stats-grid{

        grid-template-columns:
        repeat(4,1fr);

        gap:8px;
    }

    .stat-card{

        padding:10px 4px;
    }

    .stat-card h2{

        font-size:1rem;
    }

    .stat-card p{

        font-size:.58rem;
    }

    .player-card{

        flex-direction:column;

        align-items:flex-start;

        gap:16px;
    }

    .player-actions{

        width:100%;

        flex-direction:row;

        justify-content:flex-end;
    }
}

</style>

</head>

<body>

<!-- ====================================
TOPBAR
==================================== -->

<header class="topbar">

    <div class="logo">

        <h1>Jugadores</h1>

        <p>Nápoles F.C.</p>

    </div>

    <div class="top-actions">

        <button
        class="top-btn"
        onclick="descargarPDF()">

            <span class="material-symbols-outlined">
                picture_as_pdf
            </span>

        </button>

        <button
        class="top-btn"
        onclick="cerrarSesion()">

            <span class="material-symbols-outlined">
                logout
            </span>

        </button>

    </div>

</header>

<!-- ====================================
STATS
==================================== -->

<section class="stats-grid">

    <div class="stat-card">

        <h2 id="totalJugadores">0</h2>

        <p>TOTAL</p>

    </div>

    <div class="stat-card">

        <h2 id="aprobados">0</h2>

        <p>APROBADOS</p>

    </div>

    <div class="stat-card">

        <h2 id="pendientes">0</h2>

        <p>PENDIENTES</p>

    </div>

    <div class="stat-card">

        <h2 id="rechazados">0</h2>

        <p>RECHAZADOS</p>

    </div>

</section>

<!-- ====================================
SEARCH
==================================== -->

<section class="search-area">

    <div class="search-box">

        <span class="material-symbols-outlined">
            search
        </span>

        <input
        type="text"
        id="searchInput"
        placeholder="Buscar jugador...">

    </div>

</section>

<!-- ====================================
PLAYERS
==================================== -->

<section
class="players"
id="playersContainer">

</section>

<script src="./config.js"></script>

<script>

if(
localStorage.getItem(
'admin_activo'
)!=='true'
){
    window.location.href=
    './login.html';
}

const playersContainer=
document.getElementById(
'playersContainer'
);

const searchInput=
document.getElementById(
'searchInput'
);

let jugadoresGlobal=[];

/* ====================================
LOAD
==================================== */

async function cargarJugadores(){

    try{

        const response=
        await fetch(
`${CONFIG.URL_GAS}?action=getJugadores&t=${Date.now()}`
        );

        const data=
        await response.json();

        jugadoresGlobal=
        data.jugadores || [];

        jugadoresGlobal.sort((a,b)=>

        (Number(a.dorsal)||999)

        -

        (Number(b.dorsal)||999)
        );

        actualizarStats();

        renderJugadores(
        jugadoresGlobal
        );

    }catch(err){

        playersContainer.innerHTML=
        '<p>Error conexión</p>';
    }
}

/* ====================================
STATS
==================================== */

function actualizarStats(){

    document.getElementById(
    'totalJugadores'
    ).innerText=
    jugadoresGlobal.length;

    document.getElementById(
    'aprobados'
    ).innerText=
    jugadoresGlobal.filter(j=>

    j.estado==='APROBADO'
    ).length;

    document.getElementById(
    'pendientes'
    ).innerText=
    jugadoresGlobal.filter(j=>

    !j.estado ||

    j.estado==='PENDIENTE'
    ).length;

    document.getElementById(
    'rechazados'
    ).innerText=
    jugadoresGlobal.filter(j=>

    j.estado==='RECHAZADO'
    ).length;
}

/* ====================================
RENDER
==================================== */

function renderJugadores(lista){

    playersContainer.innerHTML='';

    lista.forEach(jugador=>{

        let estadoClass=
        'pendiente';

        if(
        jugador.estado==='APROBADO'
        ){
            estadoClass='aprobado';
        }

        if(
        jugador.estado==='RECHAZADO'
        ){
            estadoClass='rechazado';
        }

        const card=
        document.createElement('div');

        card.className=
        'player-card';

        card.innerHTML=`

        <div class="player-left">

            <div class="player-avatar">

                <img
                src="https://api.dicebear.com/7.x/personas/svg?seed=${jugador.cedula}&gender=male"
                alt="avatar">

            </div>

            <div class="player-info">

                <h3>
                    ${jugador.primerNombre}
                    ${jugador.apellidos}
                </h3>

                <p>
                    ${jugador.cedula}
                </p>

                <div class="shirt-box">

                    <strong>
                        ${jugador.nombreCamiseta || 'NAPOLES'}
                    </strong>

                    <div class="dorsal">
                        ${jugador.dorsal || 0}
                    </div>

                </div>

                <div
                class="estado ${estadoClass}">

                    ${
                        jugador.estado
                        || 'PENDIENTE'
                    }

                </div>

            </div>

        </div>

        <div class="player-actions">

            ${
                jugador.estado !== 'APROBADO'
                ?
                `
                <button
                class="action-btn approve"
                onclick="aprobarJugador('${jugador.cedula}')">

                    <span class="material-symbols-outlined">
                        check
                    </span>

                </button>
                `
                :
                ''
            }

            ${
                jugador.estado !== 'RECHAZADO'
                ?
                `
                <button
                class="action-btn reject"
                onclick="rechazarJugador('${jugador.cedula}')">

                    <span class="material-symbols-outlined">
                        close
                    </span>

                </button>
                `
                :
                ''
            }

            <button
            class="action-btn whatsapp"
            onclick="enviarWhatsapp('${jugador.telefono}')">

                <span class="material-symbols-outlined">
                    chat
                </span>

            </button>

            <button
            class="action-btn edit"
            onclick="editarJugador('${jugador.cedula}')">

                <span class="material-symbols-outlined">
                    edit
                </span>

            </button>

        </div>
        `;

        playersContainer.appendChild(
        card
        );
    });
}

/* ====================================
SEARCH
==================================== */

searchInput.addEventListener(
'input',
e=>{

    const texto=
    e.target.value
    .toLowerCase();

    const filtrados=
    jugadoresGlobal.filter(j=>

    (j.primerNombre||'')
    .toLowerCase()
    .includes(texto)

    ||

    (j.apellidos||'')
    .toLowerCase()
    .includes(texto)

    ||

    (j.nombreCamiseta||'')
    .toLowerCase()
    .includes(texto)

    ||

    (j.dorsal||'')
    .toString()
    .includes(texto)
    );

    renderJugadores(
    filtrados
    );
});

/* ====================================
APROBAR
==================================== */

async function aprobarJugador(
cedula
){

    const ok=
    confirm(
    '¿Aprobar jugador?'
    );

    if(!ok){
        return;
    }

    try{

        const response=
        await fetch(
`${CONFIG.URL_GAS}?action=aprobarJugador&cedula=${cedula}`
        );

        const data=
        await response.json();

        if(data.ok){

            const mensaje=

`🏆 Bienvenido a Nápoles F.C.

Tu registro fue aprobado exitosamente ⚽🔥`;

            if(data.telefono){

                window.open(
`https://wa.me/593${data.telefono}?text=${encodeURIComponent(mensaje)}`,
'_blank'
                );
            }

            cargarJugadores();
        }

    }catch(err){

        alert(
        'Error aprobando jugador'
        );
    }
}

/* ====================================
RECHAZAR
==================================== */

async function rechazarJugador(
cedula
){

    const ok=
    confirm(
    '¿Rechazar jugador?'
    );

    if(!ok){
        return;
    }

    try{

        const response=
        await fetch(
`${CONFIG.URL_GAS}?action=rechazarJugador&cedula=${cedula}`
        );

        const data=
        await response.json();

        if(data.ok){

            cargarJugadores();
        }

    }catch(err){

        alert(
        'Error rechazando jugador'
        );
    }
}

/* ====================================
EDIT
==================================== */

function editarJugador(
cedula
){

    localStorage.setItem(
    'editCedula',
    cedula
    );

    window.location.href=
    './editar-jugador.html';
}

/* ====================================
WHATSAPP
==================================== */

function enviarWhatsapp(
telefono
){

    if(!telefono){
        return;
    }

    window.open(
`https://wa.me/593${telefono}`,
'_blank'
    );
}

/* ====================================
PDF
==================================== */

function descargarPDF(){

    window.print();
}

/* ====================================
LOGOUT
==================================== */

function cerrarSesion(){

    localStorage.removeItem(
    'admin_activo'
    );

    window.location.href=
    './login.html';
}

/* ====================================
INIT
==================================== */

cargarJugadores();

</script>

</body>
</html>
