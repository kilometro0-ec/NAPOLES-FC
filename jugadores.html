<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Jugadores - Nápoles F.C.</title>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<link
href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{

    font-family:'Inter',sans-serif;

    background:
    linear-gradient(
    180deg,
    #ffffff 0%,
    #faf7ff 45%,
    #f5f3ff 100%
    );

    color:#111827;

    min-height:100vh;

    overflow-x:hidden;

    position:relative;
}

/* =========================================
ONDAS
========================================= */

.wave-bg{

    position:fixed;

    inset:0;

    overflow:hidden;

    z-index:-1;

    pointer-events:none;
}

.wave{

    position:absolute;

    width:220%;

    height:280px;

    left:-60%;

    border-radius:45%;

    opacity:.14;

    filter:blur(8px);
}

.wave1{

    background:
    linear-gradient(
    90deg,
    #a855f7,
    #c084fc,
    #f3e8ff
    );

    bottom:-140px;

    animation:
    waveMove 18s linear infinite;
}

.wave2{

    background:
    linear-gradient(
    90deg,
    #7c3aed,
    #d8b4fe,
    #ffffff
    );

    bottom:-180px;

    opacity:.08;

    animation:
    waveMoveReverse 28s linear infinite;
}

@keyframes waveMove{

    0%{
        transform:
        translateX(0)
        rotate(0deg);
    }

    100%{
        transform:
        translateX(-12%)
        rotate(360deg);
    }
}

@keyframes waveMoveReverse{

    0%{
        transform:
        translateX(0)
        rotate(0deg);
    }

    100%{
        transform:
        translateX(12%)
        rotate(-360deg);
    }
}

/* =========================================
HEADER
========================================= */

.topbar{

    position:sticky;

    top:0;

    z-index:100;

    background:rgba(255,255,255,.78);

    backdrop-filter:blur(14px);

    border-bottom:1px solid rgba(168,85,247,.08);

    padding:16px 18px;

    display:flex;

    align-items:center;

    justify-content:space-between;
}

.admin-info h1{

    font-size:1.1rem;

    font-weight:800;
}

.admin-info p{

    font-size:.85rem;

    color:#6b7280;

    margin-top:2px;
}

.avatar{

    width:46px;
    height:46px;

    border-radius:16px;

    background:linear-gradient(
    135deg,
    #7c3aed,
    #a855f7
    );

    display:flex;

    align-items:center;

    justify-content:center;

    color:#fff;

    font-weight:800;

    font-size:1rem;

    box-shadow:
    0 10px 25px rgba(124,58,237,.25);
}

/* =========================================
SEARCH
========================================= */

.search-box{

    padding:20px 18px 10px;
}

.search{

    background:rgba(255,255,255,.85);

    backdrop-filter:blur(12px);

    border:1px solid rgba(168,85,247,.08);

    border-radius:20px;

    padding:14px 16px;

    display:flex;

    align-items:center;

    gap:10px;

    box-shadow:
    0 10px 30px rgba(15,23,42,.05);
}

.search input{

    border:none;

    outline:none;

    width:100%;

    background:none;

    font-size:.95rem;

    font-family:'Inter',sans-serif;
}

/* =========================================
FILTROS
========================================= */

.filters{

    padding:0 18px 10px;

    display:flex;

    gap:10px;

    overflow:auto;
}

.filter-btn{

    border:none;

    min-width:120px;

    height:44px;

    border-radius:999px;

    background:#fff;

    color:#6b7280;

    font-weight:700;

    cursor:pointer;

    transition:.25s;

    box-shadow:
    0 8px 20px rgba(15,23,42,.05);
}

.filter-btn.active{

    background:
    linear-gradient(
    135deg,
    #7c3aed,
    #a855f7
    );

    color:#fff;
}

/* =========================================
PLAYERS
========================================= */

.players{

    padding:14px 18px 120px;
}

.player-card{

    background:rgba(255,255,255,.88);

    backdrop-filter:blur(12px);

    border:1px solid rgba(168,85,247,.08);

    border-radius:24px;

    padding:18px;

    margin-bottom:16px;

    display:flex;

    align-items:center;

    justify-content:space-between;

    box-shadow:
    0 10px 30px rgba(15,23,42,.05);

    transition:.25s;
}

.player-left{

    display:flex;

    align-items:center;

    gap:14px;
}

.player-avatar{

    width:68px;
    height:68px;

    border-radius:22px;

    background:
    linear-gradient(
    135deg,
    #7c3aed,
    #a855f7
    );

    display:flex;

    align-items:center;

    justify-content:center;

    overflow:hidden;

    color:#fff;

    font-weight:800;

    font-size:1rem;

    flex-shrink:0;
}

.player-avatar img{

    width:100%;
    height:100%;

    object-fit:cover;
}

.player-info h3{

    font-size:1rem;

    font-weight:800;

    margin-bottom:4px;
}

.player-info p{

    color:#6b7280;

    font-size:.88rem;

    margin-bottom:8px;
}

/* =========================================
ESTADOS
========================================= */

.estado{

    display:inline-flex;

    align-items:center;

    justify-content:center;

    min-width:110px;

    height:30px;

    border-radius:999px;

    padding:0 14px;

    font-size:.75rem;

    font-weight:800;
}

.aprobado{

    background:#dcfce7;

    color:#166534;
}

.pendiente{

    background:#fef3c7;

    color:#92400e;
}

.rechazado{

    background:#fee2e2;

    color:#991b1b;
}

/* =========================================
BOTONES
========================================= */

.player-actions{

    display:flex;

    flex-direction:column;

    gap:10px;
}

.action-btn{

    width:44px;
    height:44px;

    border:none;

    border-radius:16px;

    color:#fff;

    cursor:pointer;

    display:flex;

    align-items:center;

    justify-content:center;
}

.approve{
    background:#16a34a;
}

.reject{
    background:#ef4444;
}

.edit{
    background:#2563eb;
}

/* =========================================
FAB
========================================= */

.fab{

    position:fixed;

    right:20px;
    bottom:20px;

    width:66px;
    height:66px;

    border:none;

    border-radius:24px;

    background:
    linear-gradient(
    135deg,
    #7c3aed,
    #a855f7
    );

    color:#fff;

    display:flex;

    align-items:center;

    justify-content:center;

    cursor:pointer;

    box-shadow:
    0 20px 40px rgba(124,58,237,.35);

    z-index:99;
}

.fab .material-symbols-outlined{
    font-size:34px;
}

</style>

</head>

<body>

<!-- ======================================
ONDAS
====================================== -->

<div class="wave-bg">

    <div class="wave wave1"></div>

    <div class="wave wave2"></div>

</div>

<!-- ======================================
HEADER
====================================== -->

<header class="topbar">

    <div class="admin-info">

        <h1>Jugadores</h1>

        <p>Nápoles F.C.</p>

    </div>

    <div class="avatar">
        G
    </div>

</header>

<!-- ======================================
SEARCH
====================================== -->

<section class="search-box">

    <div class="search">

        <span class="material-symbols-outlined">
            search
        </span>

        <input
        type="text"
        id="searchInput"
        placeholder="Buscar jugador...">

    </div>

</section>

<!-- ======================================
FILTROS
====================================== -->

<section class="filters">

    <button
    class="filter-btn active"
    onclick="filtrarEstado('TODOS', this)">
        Todos
    </button>

    <button
    class="filter-btn"
    onclick="filtrarEstado('PENDIENTE', this)">
        Pendientes
    </button>

    <button
    class="filter-btn"
    onclick="filtrarEstado('APROBADO', this)">
        Aprobados
    </button>

    <button
    class="filter-btn"
    onclick="filtrarEstado('RECHAZADO', this)">
        Rechazados
    </button>

</section>

<!-- ======================================
PLAYERS
====================================== -->

<section
class="players"
id="playersContainer">

    <p style="padding:20px">
        Cargando jugadores...
    </p>

</section>

<!-- ======================================
FAB
====================================== -->

<button
class="fab"
onclick="window.location.href='nuevo-jugador.html'">

    <span class="material-symbols-outlined">
        add
    </span>

</button>

<script src="./config.js"></script>

<script>

// =========================================
// VALIDAR ADMIN
// =========================================

if(
    localStorage.getItem('admin_activo')
    !== 'true'
){
    window.location.href =
    './login.html';
}

const playersContainer =
document.getElementById(
    'playersContainer'
);

const searchInput =
document.getElementById(
    'searchInput'
);

let jugadoresGlobal = [];

// =========================================
// CARGAR
// =========================================

async function cargarJugadores(){

    try{

        const response =
        await fetch(
`${CONFIG.URL_GAS}?action=getJugadores&t=${Date.now()}`
        );

        const data =
        await response.json();

        jugadoresGlobal =
        data.jugadores || [];

        renderJugadores(
            jugadoresGlobal
        );

    }catch(err){

        playersContainer.innerHTML =
        '<p>Error conexión</p>';
    }
}

// =========================================
// RENDER
// =========================================

function renderJugadores(lista){

    playersContainer.innerHTML = '';

    if(lista.length === 0){

        playersContainer.innerHTML =
        '<p>No hay jugadores</p>';

        return;
    }

    lista.forEach(jugador => {

        const iniciales =

        (
            (jugador.primerNombre || '')
            .charAt(0)

            +

            (jugador.apellidos || '')
            .charAt(0)

        ).toUpperCase();

        let estadoClass =
        'pendiente';

        if(
            jugador.estado ===
            'APROBADO'
        ){
            estadoClass =
            'aprobado';
        }

        if(
            jugador.estado ===
            'RECHAZADO'
        ){
            estadoClass =
            'rechazado';
        }

        const card =
        document.createElement('div');

        card.className =
        'player-card';

        card.innerHTML = `

        <div class="player-left">

            <div class="player-avatar">

                ${
                    jugador.foto
                    ?
                    `<img src="${jugador.foto}">`
                    :
                    iniciales
                }

            </div>

            <div class="player-info">

                <h3>
                    ${jugador.primerNombre}
                    ${jugador.apellidos}
                </h3>

                <p>
                    ${jugador.cedula}
                </p>

                <div
                class="estado ${estadoClass}">

                    ${
                        jugador.estado
                        || 'PENDIENTE'
                    }

                </div>

            </div>

        </div>

        <div class="player-actions">

            ${
                jugador.estado !==
                'APROBADO'
                ?
                `
                <button
                class="action-btn approve"
                onclick="aprobarJugador('${jugador.cedula}')">

                    <span class="material-symbols-outlined">
                        check
                    </span>

                </button>
                `
                :
                ''
            }

            ${
                jugador.estado !==
                'RECHAZADO'
                ?
                `
                <button
                class="action-btn reject"
                onclick="rechazarJugador('${jugador.cedula}')">

                    <span class="material-symbols-outlined">
                        close
                    </span>

                </button>
                `
                :
                ''
            }

            <button
            class="action-btn edit"
            onclick="editarJugador('${jugador.cedula}')">

                <span class="material-symbols-outlined">
                    edit
                </span>

            </button>

        </div>
        `;

        playersContainer
        .appendChild(card);

    });
}

// =========================================
// FILTRO
// =========================================

function filtrarEstado(
    estado,
    btn
){

    document
    .querySelectorAll('.filter-btn')
    .forEach(b => {

        b.classList.remove(
            'active'
        );
    });

    btn.classList.add(
        'active'
    );

    if(estado === 'TODOS'){

        renderJugadores(
            jugadoresGlobal
        );

        return;
    }

    const filtrados =
    jugadoresGlobal.filter(j =>

        (j.estado || '')
        .toUpperCase()
        === estado
    );

    renderJugadores(
        filtrados
    );
}

// =========================================
// BUSCAR
// =========================================

searchInput.addEventListener(
'input',
e => {

    const texto =
    e.target.value
    .toLowerCase()
    .trim();

    const filtrados =
    jugadoresGlobal.filter(j => {

        return (

            (j.primerNombre || '')
            .toLowerCase()
            .includes(texto)

            ||

            (j.apellidos || '')
            .toLowerCase()
            .includes(texto)

            ||

            (j.cedula || '')
            .includes(texto)
        );
    });

    renderJugadores(
        filtrados
    );
});

// =========================================
// APROBAR
// =========================================

async function aprobarJugador(
    cedula
){

    const ok =
    confirm(
        '¿Aprobar jugador?'
    );

    if(!ok){
        return;
    }

    try{

        const response =
        await fetch(
`${CONFIG.URL_GAS}?action=aprobarJugador&cedula=${cedula}`
        );

        const data =
        await response.json();

        if(data.ok){

            const mensaje =

`🏆 *¡BIENVENIDO A NÁPOLES F.C.!* ⚽🔥

Tu registro fue aprobado exitosamente 🙌

Ya eres parte oficial del club 💙

📲 Ingresa ahora a tu panel de jugador:
https://kilometro0-ec.github.io/NAPOLES-FC/login.html

✅ Para entrar solo debes colocar tu número de cédula.

⚽ Mira tus estadísticas
🏅 Mira tus partidos
👕 Revisa tu perfil

¡Nos vemos en la cancha campeón! 💪🔥`;

            window.open(
`https://wa.me/593${data.telefono}?text=${encodeURIComponent(mensaje)}`,
'_blank'
            );

            cargarJugadores();
        }

    }catch(err){

        alert(
            'Error aprobando'
        );
    }
}

// =========================================
// RECHAZAR
// =========================================

async function rechazarJugador(
    cedula
){

    const ok =
    confirm(
        '¿Rechazar jugador?'
    );

    if(!ok){
        return;
    }

    try{

        const response =
        await fetch(
`${CONFIG.URL_GAS}?action=rechazarJugador&cedula=${cedula}`
        );

        const data =
        await response.json();

        if(data.ok){

            cargarJugadores();
        }

    }catch(err){

        alert(
            'Error rechazando'
        );
    }
}

// =========================================
// EDITAR
// =========================================

function editarJugador(
    cedula
){

    localStorage.setItem(
        'editCedula',
        cedula
    );

    window.location.href =
    './editar-jugador.html';
}

// =========================================
// INIT
// =========================================

cargarJugadores();

</script>

</body>
</html>
