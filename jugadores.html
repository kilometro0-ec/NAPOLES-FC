<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8" />

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>

<title>Nápoles FC - Jugadores</title>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
rel="stylesheet"/>

<link
href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
rel="stylesheet"/>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{

font-family:'Inter',sans-serif;

background:
linear-gradient(
180deg,
#0f172a 0%,
#111827 100%
);

color:white;

overflow-x:hidden;
}

/* ====================================
BACKGROUND
==================================== */

.bg-blur{

position:fixed;
inset:0;
z-index:-1;
overflow:hidden;
}

.blur{

position:absolute;
border-radius:999px;
filter:blur(100px);
opacity:.22;
}

.blur1{

width:340px;
height:340px;

background:#7c3aed;

top:-100px;
left:-100px;
}

.blur2{

width:340px;
height:340px;

background:#2563eb;

bottom:-120px;
right:-100px;
}

/* ====================================
TOPBAR
==================================== */

.topbar{

position:sticky;
top:0;

z-index:100;

display:flex;
justify-content:space-between;
align-items:center;

padding:18px;

background:
rgba(15,23,42,.8);

backdrop-filter:blur(18px);

border-bottom:
1px solid rgba(255,255,255,.06);
}

.logo h1{

font-size:1.15rem;
font-weight:900;
}

.logo p{

font-size:.75rem;
opacity:.7;
margin-top:2px;
}

.top-actions{

display:flex;
gap:10px;
}

.icon-btn{

width:46px;
height:46px;

border:none;

border-radius:18px;

background:
rgba(255,255,255,.08);

display:flex;
align-items:center;
justify-content:center;

color:white;

cursor:pointer;

transition:.25s;
}

.icon-btn:hover{

transform:scale(1.06);
}

/* ====================================
STATS
==================================== */

.stats{

display:grid;

grid-template-columns:
repeat(4,1fr);

gap:10px;

padding:16px;
}

.stat-card{

background:
rgba(255,255,255,.08);

border:
1px solid rgba(255,255,255,.08);

backdrop-filter:blur(18px);

border-radius:24px;

padding:16px 10px;

text-align:center;

cursor:pointer;

transition:.25s;
}

.stat-card.active{

background:
linear-gradient(
135deg,
#7c3aed,
#2563eb
);
}

.stat-card h2{

font-size:1.3rem;
font-weight:900;
}

.stat-card p{

font-size:.72rem;
opacity:.8;
margin-top:4px;
}

/* ====================================
SEARCH
==================================== */

.search-section{

padding:0 16px 16px;
}

.search-box{

display:flex;
align-items:center;
gap:10px;

background:
rgba(255,255,255,.08);

padding:14px 16px;

border-radius:22px;

backdrop-filter:blur(18px);
}

.search-box input{

width:100%;

border:none;
outline:none;

background:none;

color:white;

font-size:.95rem;
}

.search-box input::placeholder{

color:#cbd5e1;
}

/* ====================================
FILTER MENU
==================================== */

.filter-popup{

position:fixed;

top:90px;
right:16px;

width:220px;

background:#111827;

border-radius:20px;

padding:14px;

display:none;

z-index:999;

border:
1px solid rgba(255,255,255,.08);

box-shadow:
0 20px 40px rgba(0,0,0,.4);
}

.filter-popup button{

width:100%;

height:46px;

border:none;

margin-bottom:8px;

border-radius:14px;

background:
rgba(255,255,255,.06);

color:white;

font-weight:700;

cursor:pointer;
}

/* ====================================
PLAYERS
==================================== */

.players{

padding:0 16px 120px;
}

.player-card{

background:
rgba(255,255,255,.08);

border:
1px solid rgba(255,255,255,.08);

backdrop-filter:blur(18px);

border-radius:28px;

padding:16px;

margin-bottom:18px;
}

.player-top{

display:flex;
justify-content:space-between;
gap:14px;
}

.player-left{

display:flex;
gap:14px;
}

.avatar{

width:78px;
height:78px;

border-radius:22px;

overflow:hidden;

flex-shrink:0;

background:#1e293b;
}

.avatar img{

width:100%;
height:100%;

object-fit:cover;
}

.player-info h3{

font-size:1rem;
font-weight:800;
}

.player-info p{

font-size:.82rem;
opacity:.8;
margin-top:4px;
}

/* ====================================
CAMISETA
==================================== */

.camiseta{

margin-top:16px;

background:
linear-gradient(
135deg,
#2563eb,
#7c3aed
);

padding:16px;

border-radius:24px;

display:flex;
justify-content:space-between;
align-items:center;
}

.camiseta small{

display:block;

font-size:.7rem;

opacity:.8;

margin-bottom:4px;
}

.camiseta h2{

font-size:1.15rem;
font-weight:900;
}

.dorsal{

width:58px;
height:58px;

border-radius:18px;

background:white;

display:flex;
align-items:center;
justify-content:center;

color:#111827;

font-size:1.4rem;
font-weight:900;
}

/* ====================================
STATUS
==================================== */

.estado{

display:inline-flex;

margin-top:12px;

padding:8px 14px;

border-radius:999px;

font-size:.72rem;
font-weight:800;
}

.aprobado{

background:#166534;
}

.pendiente{

background:#92400e;
}

.rechazado{

background:#991b1b;
}

/* ====================================
ACTIONS
==================================== */

.actions{

margin-top:16px;

display:flex;
flex-wrap:wrap;
gap:10px;
}

.action-btn{

flex:1;

min-width:120px;

height:46px;

border:none;

border-radius:16px;

display:flex;
align-items:center;
justify-content:center;
gap:8px;

font-weight:700;

cursor:pointer;

color:white;
}

.whatsapp-btn{

background:#16a34a;
}

.edit-btn{

background:#2563eb;
}

.approve-btn{

background:#15803d;
}

.reject-btn{

background:#dc2626;
}

/* ====================================
RESPONSIVE
==================================== */

@media(max-width:700px){

.stats{

grid-template-columns:
repeat(4,1fr);

overflow:auto;
}

.stat-card{

min-width:92px;
}

.player-top{

flex-direction:column;
}
}

</style>

</head>

<body>

<!-- ====================================
BACKGROUND
==================================== -->

<div class="bg-blur">

<div class="blur blur1"></div>

<div class="blur blur2"></div>

</div>

<!-- ====================================
TOPBAR
==================================== -->

<header class="topbar">

<div class="logo">

<h1>⚽ Nápoles FC</h1>

<p>Panel Administrador</p>

</div>

<div class="top-actions">

<button
class="icon-btn"
onclick="configurarWhatsapp()">

<span class="material-symbols-outlined">
forum
</span>

</button>

<button
class="icon-btn"
onclick="exportarPDF()">

<span class="material-symbols-outlined">
picture_as_pdf
</span>

</button>

<button
class="icon-btn"
onclick="toggleFiltros()">

<span class="material-symbols-outlined">
filter_alt
</span>

</button>

<button
class="icon-btn"
onclick="cerrarSesion()">

<span class="material-symbols-outlined">
logout
</span>

</button>

</div>

</header>

<!-- ====================================
STATS
==================================== -->

<section class="stats">

<div
class="stat-card active"
onclick="filtrarEstado('TODOS',this)">

<h2 id="totalJugadores">0</h2>

<p>TOTAL</p>

</div>

<div
class="stat-card"
onclick="filtrarEstado('APROBADO',this)">

<h2 id="totalAprobados">0</h2>

<p>APROBADOS</p>

</div>

<div
class="stat-card"
onclick="filtrarEstado('PENDIENTE',this)">

<h2 id="totalPendientes">0</h2>

<p>PENDIENTES</p>

</div>

<div
class="stat-card"
onclick="filtrarEstado('RECHAZADO',this)">

<h2 id="totalRechazados">0</h2>

<p>RECHAZADOS</p>

</div>

</section>

<!-- ====================================
SEARCH
==================================== -->

<section class="search-section">

<div class="search-box">

<span class="material-symbols-outlined">
search
</span>

<input
type="text"
id="searchInput"
placeholder="Buscar jugador..." />

</div>

</section>

<!-- ====================================
FILTER POPUP
==================================== -->

<div
class="filter-popup"
id="filterPopup">

<button onclick="ordenarPorDorsal()">
Ordenar por dorsal
</button>

<button onclick="ordenarAZ()">
Ordenar A-Z
</button>

<button onclick="ordenarZA()">
Ordenar Z-A
</button>

<button onclick="exportarPDF()">
Descargar PDF
</button>

</div>

<!-- ====================================
PLAYERS
==================================== -->

<section
class="players"
id="playersContainer">

</section>

<script src="./config.js"></script>

<script>

// ============================================
// LOGIN
// ============================================

if(
localStorage.getItem('admin_activo')
!== 'true'
){

window.location.href =
'./login.html';
}

// ============================================
// VARIABLES
// ============================================

const playersContainer =
document.getElementById(
'playersContainer'
);

const searchInput =
document.getElementById(
'searchInput'
);

const filterPopup =
document.getElementById(
'filterPopup'
);

let jugadoresGlobal = [];

// ============================================
// AVATARES HOMBRES ANIMADOS
// ============================================

const avatars = [

'https://api.dicebear.com/7.x/adventurer/svg?seed=Juan',

'https://api.dicebear.com/7.x/adventurer/svg?seed=Carlos',

'https://api.dicebear.com/7.x/adventurer/svg?seed=Pedro',

'https://api.dicebear.com/7.x/adventurer/svg?seed=Luis',

'https://api.dicebear.com/7.x/adventurer/svg?seed=Marco',

'https://api.dicebear.com/7.x/adventurer/svg?seed=Jose',

'https://api.dicebear.com/7.x/adventurer/svg?seed=Diego',

'https://api.dicebear.com/7.x/adventurer/svg?seed=Andres'
];

// ============================================
// CONFIG WHATSAPP
// ============================================

if(!localStorage.getItem('tipo_whatsapp')){

localStorage.setItem(
'tipo_whatsapp',
'normal'
);
}

function configurarWhatsapp(){

const actual =
localStorage.getItem(
'tipo_whatsapp'
) || 'normal';

const usarBusiness =
confirm(

`WhatsApp actual:
${actual.toUpperCase()}

ACEPTAR = BUSINESS
CANCELAR = NORMAL`
);

if(usarBusiness){

localStorage.setItem(
'tipo_whatsapp',
'business'
);

alert(
'WhatsApp Business configurado'
);

}else{

localStorage.setItem(
'tipo_whatsapp',
'normal'
);

alert(
'WhatsApp normal configurado'
);
}
}

// ============================================
// LOAD PLAYERS
// ============================================

async function cargarJugadores(){

try{

const response =
await fetch(
`${CONFIG.URL_GAS}?action=getJugadores&t=${Date.now()}`
);

const data =
await response.json();

jugadoresGlobal =
(data.jugadores || [])

.sort((a,b)=>

Number(a.dorsal || 0)
-
Number(b.dorsal || 0)
);

actualizarStats();

renderJugadores(
jugadoresGlobal
);

}catch(err){

playersContainer.innerHTML =
'<p>Error conexión</p>';
}
}

// ============================================
// STATS
// ============================================

function actualizarStats(){

document.getElementById(
'totalJugadores'
).innerText =
jugadoresGlobal.length;

document.getElementById(
'totalAprobados'
).innerText =
jugadoresGlobal.filter(j=>
(j.estado || '')
.toUpperCase()
=== 'APROBADO'
).length;

document.getElementById(
'totalPendientes'
).innerText =
jugadoresGlobal.filter(j=>

(j.estado || '')
.toUpperCase()
!== 'APROBADO'

&&

(j.estado || '')
.toUpperCase()
!== 'RECHAZADO'
).length;

document.getElementById(
'totalRechazados'
).innerText =
jugadoresGlobal.filter(j=>
(j.estado || '')
.toUpperCase()
=== 'RECHAZADO'
).length;
}

// ============================================
// RENDER
// ============================================

function renderJugadores(lista){

playersContainer.innerHTML = '';

if(lista.length === 0){

playersContainer.innerHTML =
'<p>No hay jugadores</p>';

return;
}

lista.forEach((jugador,index)=>{

const avatar =
avatars[
index % avatars.length
];

let estado =
'PENDIENTE';

if(jugador.estado){

estado =
jugador.estado
.toUpperCase();
}

let estadoClass =
'pendiente';

if(estado === 'APROBADO'){
estadoClass = 'aprobado';
}

if(estado === 'RECHAZADO'){
estadoClass = 'rechazado';
}

const card =
document.createElement('div');

card.className =
'player-card';

card.innerHTML = `

<div class="player-top">

<div class="player-left">

<div class="avatar">

<img src="${avatar}" />

</div>

<div class="player-info">

<h3>
${jugador.primerNombre}
${jugador.segundoNombre || ''}
${jugador.apellidos}
</h3>

<p>
Cédula:
${jugador.cedula}
</p>

<p>
Tel:
${jugador.telefono || '---'}
</p>

<div class="estado ${estadoClass}">
${estado}
</div>

</div>

</div>

</div>

<div class="camiseta">

<div>

<small>
NOMBRE CAMISETA
</small>

<h2>
${jugador.nombreCamiseta || 'SIN NOMBRE'}
</h2>

</div>

<div class="dorsal">
${jugador.dorsal || '0'}
</div>

</div>

<div class="actions">

<button
class="action-btn whatsapp-btn"
onclick="enviarWhatsapp('${jugador.telefono}','${jugador.primerNombre}')">

<span class="material-symbols-outlined">
forum
</span>

WhatsApp

</button>

<button
class="action-btn edit-btn"
onclick="editarJugador('${jugador.cedula}')">

<span class="material-symbols-outlined">
edit
</span>

Editar

</button>

${
estado !== 'APROBADO'
?
`
<button
class="action-btn approve-btn"
onclick="aprobarJugador('${jugador.cedula}')">

<span class="material-symbols-outlined">
check_circle
</span>

Aprobar

</button>
`
:
''
}

${
estado !== 'RECHAZADO'
?
`
<button
class="action-btn reject-btn"
onclick="rechazarJugador('${jugador.cedula}')">

<span class="material-symbols-outlined">
cancel
</span>

Rechazar

</button>
`
:
''
}

</div>
`;

playersContainer.appendChild(card);

});
}

// ============================================
// FILTER CARDS
// ============================================

function filtrarEstado(
estado,
card
){

document
.querySelectorAll('.stat-card')
.forEach(c=>
c.classList.remove('active')
);

card.classList.add(
'active'
);

if(estado === 'TODOS'){

renderJugadores(
jugadoresGlobal
);

return;
}

const filtrados =
jugadoresGlobal.filter(j=>

(j.estado || '')
.toUpperCase()
=== estado
);

renderJugadores(
filtrados
);
}

// ============================================
// SEARCH
// ============================================

searchInput.addEventListener(
'input',
e=>{

const texto =
e.target.value
.toLowerCase()
.trim();

const filtrados =
jugadoresGlobal.filter(j=>{

return (

(j.primerNombre || '')
.toLowerCase()
.includes(texto)

||

(j.apellidos || '')
.toLowerCase()
.includes(texto)

||

(j.nombreCamiseta || '')
.toLowerCase()
.includes(texto)

||

String(j.dorsal || '')
.includes(texto)
);
});

renderJugadores(
filtrados
);
}
);

// ============================================
// FILTER POPUP
// ============================================

function toggleFiltros(){

filterPopup.style.display =

filterPopup.style.display
=== 'block'

? 'none'
: 'block';
}

// ============================================
// ORDERS
// ============================================

function ordenarPorDorsal(){

jugadoresGlobal.sort((a,b)=>

Number(a.dorsal || 0)
-
Number(b.dorsal || 0)
);

renderJugadores(
jugadoresGlobal
);

toggleFiltros();
}

function ordenarAZ(){

jugadoresGlobal.sort((a,b)=>

(a.primerNombre || '')
.localeCompare(
b.primerNombre || ''
)
);

renderJugadores(
jugadoresGlobal
);

toggleFiltros();
}

function ordenarZA(){

jugadoresGlobal.sort((a,b)=>

(b.primerNombre || '')
.localeCompare(
a.primerNombre || ''
)
);

renderJugadores(
jugadoresGlobal
);

toggleFiltros();
}

// ============================================
// WHATSAPP
// ============================================

function enviarWhatsapp(
telefono,
nombre
){

if(!telefono){

alert(
'Jugador sin teléfono'
);

return;
}

telefono =
telefono.replace(/\D/g,'');

const tipo =
localStorage.getItem(
'tipo_whatsapp'
) || 'normal';

const mensaje =

`🏆 *NÁPOLES F.C.* ⚽🔥

Hola ${nombre},

Tu registro ha sido procesado correctamente 🙌

📲 Ingresa aquí:
https://kilometro0-ec.github.io/NAPOLES-FC/login.html

✅ Consulta:
⚽ Estadísticas
🏅 Partidos
👕 Perfil
💳 Estado de pagos

¡Nos vemos en la cancha campeón! 💪🔥`;

let url = '';

// NORMAL
if(tipo === 'normal'){

url =
`https://api.whatsapp.com/send?phone=593${telefono}&text=${encodeURIComponent(mensaje)}`;
}

// BUSINESS
if(tipo === 'business'){

url =
`https://business.whatsapp.com/send?phone=593${telefono}&text=${encodeURIComponent(mensaje)}`;
}

window.location.href = url;
}

// ============================================
// APROBAR
// ============================================

async function aprobarJugador(
cedula
){

const ok =
confirm(
'¿Aprobar jugador?'
);

if(!ok){
return;
}

try{

const response =
await fetch(
`${CONFIG.URL_GAS}?action=aprobarJugador&cedula=${cedula}`
);

const data =
await response.json();

if(data.ok){

enviarWhatsapp(
data.telefono,
'Jugador'
);

cargarJugadores();
}

}catch(err){

alert(
'Error aprobando'
);
}
}

// ============================================
// RECHAZAR
// ============================================

async function rechazarJugador(
cedula
){

const ok =
confirm(
'¿Rechazar jugador?'
);

if(!ok){
return;
}

try{

const response =
await fetch(
`${CONFIG.URL_GAS}?action=rechazarJugador&cedula=${cedula}`
);

const data =
await response.json();

if(data.ok){

cargarJugadores();
}

}catch(err){

alert(
'Error rechazando'
);
}
}

// ============================================
// EDITAR
// ============================================

function editarJugador(
cedula
){

localStorage.setItem(
'editCedula',
cedula
);

window.location.href =
'./editar-jugador.html';
}

// ============================================
// PDF
// ============================================

function exportarPDF(){

const { jsPDF } =
window.jspdf;

const doc =
new jsPDF();

doc.setFontSize(18);

doc.text(
'Listado Jugadores Nápoles FC',
14,
20
);

let y = 35;

jugadoresGlobal.forEach(j=>{

doc.setFontSize(11);

doc.text(

`${j.dorsal || 0} - ${j.nombreCamiseta || ''} - ${j.primerNombre} ${j.apellidos}`,

14,

y
);

y += 8;

if(y > 280){

doc.addPage();

y = 20;
}
});

doc.save(
'jugadores_napoles_fc.pdf'
);
}

// ============================================
// LOGOUT
// ============================================

function cerrarSesion(){

localStorage.removeItem(
'admin_activo'
);

window.location.href =
'./login.html';
}

// ============================================
// INIT
// ============================================

cargarJugadores();

</script>

</body>
</html>
