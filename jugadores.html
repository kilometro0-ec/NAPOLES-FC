<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Jugadores - Nápoles F.C.</title>

<!-- FONTS -->

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
rel="stylesheet">

<link
href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
rel="stylesheet">

<!-- TAILWIND -->

<script src="https://cdn.tailwindcss.com"></script>

<!-- PDF -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{

    font-family:'Inter',sans-serif;

    background:
    linear-gradient(
    180deg,
    #f8fafc 0%,
    #eef2ff 100%
    );

    min-height:100vh;

    color:#0f172a;

    overflow-x:hidden;
}

/* =====================================
WAVES
===================================== */

.wave-bg{

    position:fixed;

    inset:0;

    z-index:-1;

    overflow:hidden;
}

.wave{

    position:absolute;

    width:220%;

    height:320px;

    left:-60%;

    border-radius:45%;

    filter:blur(12px);

    opacity:.15;
}

.wave1{

    bottom:-140px;

    background:
    linear-gradient(
    90deg,
    #7c3aed,
    #a855f7,
    #c084fc
    );

    animation:waveMove 18s linear infinite;
}

.wave2{

    bottom:-180px;

    background:
    linear-gradient(
    90deg,
    #2563eb,
    #60a5fa,
    #dbeafe
    );

    animation:waveMove2 26s linear infinite;

    opacity:.08;
}

@keyframes waveMove{

    0%{
        transform:
        translateX(0)
        rotate(0deg);
    }

    100%{
        transform:
        translateX(-12%)
        rotate(360deg);
    }
}

@keyframes waveMove2{

    0%{
        transform:
        translateX(0)
        rotate(0deg);
    }

    100%{
        transform:
        translateX(12%)
        rotate(-360deg);
    }
}

/* =====================================
HEADER
===================================== */

.topbar{

    position:sticky;

    top:0;

    z-index:100;

    backdrop-filter:blur(16px);

    background:rgba(255,255,255,.72);

    border-bottom:1px solid rgba(255,255,255,.4);

    padding:18px;

    display:flex;

    justify-content:space-between;

    align-items:center;
}

.logo{

    display:flex;

    flex-direction:column;
}

.logo h1{

    font-size:1.2rem;

    font-weight:900;
}

.logo p{

    color:#64748b;

    font-size:.85rem;
}

.avatar{

    width:52px;
    height:52px;

    border-radius:20px;

    background:
    linear-gradient(
    135deg,
    #7c3aed,
    #2563eb
    );

    display:flex;

    align-items:center;

    justify-content:center;

    color:#fff;

    font-weight:900;

    box-shadow:
    0 20px 40px rgba(124,58,237,.25);
}

/* =====================================
CARDS
===================================== */

.stats{

    padding:18px;

    display:grid;

    grid-template-columns:
    repeat(4,1fr);

    gap:12px;
}

.stat-card{

    background:rgba(255,255,255,.75);

    backdrop-filter:blur(14px);

    border:1px solid rgba(255,255,255,.4);

    border-radius:24px;

    padding:18px;

    cursor:pointer;

    transition:.25s;

    box-shadow:
    0 12px 30px rgba(15,23,42,.06);
}

.stat-card:hover{

    transform:
    translateY(-4px);
}

.stat-card.active{

    outline:2px solid #7c3aed;
}

.stat-card h2{

    font-size:1.8rem;

    font-weight:900;
}

.stat-card p{

    margin-top:4px;

    color:#64748b;

    font-size:.85rem;

    font-weight:700;
}

/* =====================================
TOOLS
===================================== */

.tools{

    padding:0 18px 18px;

    display:flex;

    flex-direction:column;

    gap:14px;
}

.search{

    background:rgba(255,255,255,.8);

    border-radius:22px;

    padding:15px 18px;

    display:flex;

    align-items:center;

    gap:10px;

    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,.5);
}

.search input{

    width:100%;

    border:none;

    background:none;

    outline:none;

    font-size:.95rem;
}

.filters{

    display:flex;

    gap:12px;

    overflow:auto;
}

.filters select{

    min-width:170px;

    height:48px;

    border:none;

    border-radius:18px;

    padding:0 14px;

    font-weight:700;

    background:#fff;

    color:#0f172a;

    box-shadow:
    0 10px 24px rgba(15,23,42,.05);
}

.pdf-btn{

    height:52px;

    border:none;

    border-radius:20px;

    background:
    linear-gradient(
    135deg,
    #dc2626,
    #ef4444
    );

    color:#fff;

    font-weight:800;

    cursor:pointer;

    display:flex;

    align-items:center;

    justify-content:center;

    gap:10px;

    box-shadow:
    0 18px 30px rgba(239,68,68,.25);
}

/* =====================================
PLAYERS
===================================== */

.players{

    padding:0 18px 120px;

    display:flex;

    flex-direction:column;

    gap:16px;
}

.player-card{

    background:rgba(255,255,255,.82);

    backdrop-filter:blur(14px);

    border-radius:28px;

    padding:18px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    border:1px solid rgba(255,255,255,.5);

    box-shadow:
    0 15px 40px rgba(15,23,42,.06);
}

.player-left{

    display:flex;

    gap:14px;

    align-items:center;
}

.player-avatar{

    width:74px;
    height:74px;

    border-radius:24px;

    overflow:hidden;

    flex-shrink:0;

    background:#e2e8f0;
}

.player-avatar img{

    width:100%;
    height:100%;

    object-fit:cover;
}

.player-info h3{

    font-size:1rem;

    font-weight:900;

    margin-bottom:4px;
}

.player-info p{

    font-size:.85rem;

    color:#64748b;

    margin-bottom:8px;
}

.estado{

    display:inline-flex;

    align-items:center;

    justify-content:center;

    height:30px;

    padding:0 14px;

    border-radius:999px;

    font-size:.72rem;

    font-weight:900;
}

.aprobado{

    background:#dcfce7;

    color:#166534;
}

.pendiente{

    background:#fef3c7;

    color:#92400e;
}

.rechazado{

    background:#fee2e2;

    color:#991b1b;
}

.player-actions{

    display:flex;

    flex-direction:column;

    gap:10px;
}

.action-btn{

    width:46px;
    height:46px;

    border:none;

    border-radius:18px;

    color:#fff;

    cursor:pointer;

    display:flex;

    align-items:center;

    justify-content:center;
}

.approve{
    background:#16a34a;
}

.reject{
    background:#ef4444;
}

.edit{
    background:#2563eb;
}

/* =====================================
FAB
===================================== */

.fab{

    position:fixed;

    right:20px;
    bottom:20px;

    width:68px;
    height:68px;

    border:none;

    border-radius:26px;

    background:
    linear-gradient(
    135deg,
    #7c3aed,
    #2563eb
    );

    color:#fff;

    display:flex;

    align-items:center;

    justify-content:center;

    cursor:pointer;

    z-index:99;

    box-shadow:
    0 25px 50px rgba(124,58,237,.35);
}

.fab span{
    font-size:34px;
}

/* =====================================
RESPONSIVE
===================================== */

@media(max-width:900px){

    .stats{

        grid-template-columns:
        repeat(2,1fr);
    }
}

</style>

</head>

<body>

<div class="wave-bg">

    <div class="wave wave1"></div>

    <div class="wave wave2"></div>

</div>

<!-- =====================================
HEADER
===================================== -->

<header class="topbar">

    <div class="logo">

        <h1>Nápoles F.C.</h1>

        <p>Panel jugadores</p>

    </div>

    <div class="avatar">
        A
    </div>

</header>

<!-- =====================================
STATS
===================================== -->

<section class="stats">

    <div
    class="stat-card active"
    onclick="filtrarRapido('TODOS', this)">

        <h2 id="totalJugadores">0</h2>

        <p>Total</p>

    </div>

    <div
    class="stat-card"
    onclick="filtrarRapido('PENDIENTE', this)">

        <h2 id="totalPendientes">0</h2>

        <p>Pendientes</p>

    </div>

    <div
    class="stat-card"
    onclick="filtrarRapido('APROBADO', this)">

        <h2 id="totalAprobados">0</h2>

        <p>Aprobados</p>

    </div>

    <div
    class="stat-card"
    onclick="filtrarRapido('RECHAZADO', this)">

        <h2 id="totalRechazados">0</h2>

        <p>Rechazados</p>

    </div>

</section>

<!-- =====================================
TOOLS
===================================== -->

<section class="tools">

    <div class="search">

        <span class="material-symbols-outlined">
            search
        </span>

        <input
        type="text"
        id="searchInput"
        placeholder="Buscar jugador...">

    </div>

    <div class="filters">

        <select id="estadoFilter">

            <option value="TODOS">
                Todos
            </option>

            <option value="PENDIENTE">
                Pendientes
            </option>

            <option value="APROBADO">
                Aprobados
            </option>

            <option value="RECHAZADO">
                Rechazados
            </option>

        </select>

        <select id="ordenFilter">

            <option value="DESC">
                Más recientes
            </option>

            <option value="ASC">
                Más antiguos
            </option>

        </select>

    </div>

    <button
    class="pdf-btn"
    onclick="descargarPDF()">

        <span class="material-symbols-outlined">
            picture_as_pdf
        </span>

        Descargar PDF

    </button>

</section>

<!-- =====================================
PLAYERS
===================================== -->

<section
class="players"
id="playersContainer">

</section>

<!-- =====================================
FAB
===================================== -->

<button
class="fab"
onclick="window.location.href='nuevo-jugador.html'">

    <span class="material-symbols-outlined">
        add
    </span>

</button>

<script src="./config.js"></script>

<script>

// =====================================
// VALIDAR ADMIN
// =====================================

if(
    localStorage.getItem(
        'admin_activo'
    ) !== 'true'
){
    window.location.href =
    './login.html';
}

// =====================================
// VARIABLES
// =====================================

const playersContainer =
document.getElementById(
    'playersContainer'
);

const searchInput =
document.getElementById(
    'searchInput'
);

const estadoFilter =
document.getElementById(
    'estadoFilter'
);

const ordenFilter =
document.getElementById(
    'ordenFilter'
);

let jugadoresGlobal = [];

let filtroActual =
'TODOS';

// =====================================
// CARGAR
// =====================================

async function cargarJugadores(){

    try{

        const response =
        await fetch(
`${CONFIG.URL_GAS}?action=getJugadores&t=${Date.now()}`
        );

        const data =
        await response.json();

        jugadoresGlobal =
        data.jugadores || [];

        actualizarCards();

        aplicarFiltros();

    }catch(err){

        playersContainer.innerHTML =
        '<p>Error conexión</p>';
    }
}

// =====================================
// ACTUALIZAR CARDS
// =====================================

function actualizarCards(){

    document.getElementById(
        'totalJugadores'
    ).innerText =
    jugadoresGlobal.length;

    document.getElementById(
        'totalPendientes'
    ).innerText =
    jugadoresGlobal.filter(j =>
        (j.estado || '')
        .toUpperCase() ===
        'PENDIENTE'
    ).length;

    document.getElementById(
        'totalAprobados'
    ).innerText =
    jugadoresGlobal.filter(j =>
        (j.estado || '')
        .toUpperCase() ===
        'APROBADO'
    ).length;

    document.getElementById(
        'totalRechazados'
    ).innerText =
    jugadoresGlobal.filter(j =>
        (j.estado || '')
        .toUpperCase() ===
        'RECHAZADO'
    ).length;
}

// =====================================
// FILTRO RAPIDO
// =====================================

function filtrarRapido(
    estado,
    el
){

    filtroActual = estado;

    document
    .querySelectorAll('.stat-card')
    .forEach(c => {

        c.classList.remove(
            'active'
        );
    });

    el.classList.add(
        'active'
    );

    estadoFilter.value =
    estado;

    aplicarFiltros();
}

// =====================================
// FILTROS
// =====================================

function aplicarFiltros(){

    let lista =
    [...jugadoresGlobal];

    // ORDEN DESCENDENTE

    lista.sort((a,b)=>{

        if(
            ordenFilter.value ===
            'DESC'
        ){

            return b.fila - a.fila;
        }

        return a.fila - b.fila;
    });

    // ESTADO

    const estado =
    estadoFilter.value;

    if(estado !== 'TODOS'){

        lista =
        lista.filter(j =>

            (j.estado || '')
            .toUpperCase()
            === estado
        );
    }

    // BUSCADOR

    const texto =
    searchInput.value
    .toLowerCase()
    .trim();

    if(texto){

        lista =
        lista.filter(j =>

            (j.primerNombre || '')
            .toLowerCase()
            .includes(texto)

            ||

            (j.apellidos || '')
            .toLowerCase()
            .includes(texto)

            ||

            (j.cedula || '')
            .includes(texto)
        );
    }

    renderJugadores(lista);
}

// =====================================
// RENDER
// =====================================

function renderJugadores(lista){

    playersContainer.innerHTML =
    '';

    if(lista.length === 0){

        playersContainer.innerHTML =
        `
        <div style="
        padding:30px;
        text-align:center;
        font-weight:800;
        color:#64748b;
        ">
        No hay jugadores
        </div>
        `;

        return;
    }

    lista.forEach(jugador => {

        let estadoClass =
        'pendiente';

        if(
            jugador.estado ===
            'APROBADO'
        ){
            estadoClass =
            'aprobado';
        }

        if(
            jugador.estado ===
            'RECHAZADO'
        ){
            estadoClass =
            'rechazado';
        }

        const card =
        document.createElement(
            'div'
        );

        card.className =
        'player-card';

        card.innerHTML = `

        <div class="player-left">

            <div class="player-avatar">

                <img
                src="
https://api.dicebear.com/7.x/adventurer/svg?seed=${jugador.cedula}
                ">

            </div>

            <div class="player-info">

                <h3>
                    ${jugador.primerNombre}
                    ${jugador.apellidos}
                </h3>

                <p>
                    ${jugador.cedula}
                </p>

                <div
                class="estado ${estadoClass}">

                    ${
                        jugador.estado
                        || 'PENDIENTE'
                    }

                </div>

            </div>

        </div>

        <div class="player-actions">

            ${
                jugador.estado !==
                'APROBADO'
                ?
                `
                <button
                class="action-btn approve"
                onclick="aprobarJugador('${jugador.cedula}')">

                    <span class="material-symbols-outlined">
                        check
                    </span>

                </button>
                `
                :
                ''
            }

            ${
                jugador.estado !==
                'RECHAZADO'
                ?
                `
                <button
                class="action-btn reject"
                onclick="rechazarJugador('${jugador.cedula}')">

                    <span class="material-symbols-outlined">
                        close
                    </span>

                </button>
                `
                :
                ''
            }

            <button
            class="action-btn edit"
            onclick="editarJugador('${jugador.cedula}')">

                <span class="material-symbols-outlined">
                    edit
                </span>

            </button>

        </div>
        `;

        playersContainer
        .appendChild(card);
    });
}

// =====================================
// PDF
// =====================================

function descargarPDF(){

    const { jsPDF } =
    window.jspdf;

    const doc =
    new jsPDF();

    doc.setFontSize(18);

    doc.text(
        'Jugadores Nápoles F.C.',
        14,
        20
    );

    let y = 35;

    let lista =
    [...jugadoresGlobal];

    const estado =
    estadoFilter.value;

    if(estado !== 'TODOS'){

        lista =
        lista.filter(j =>

            (j.estado || '')
            .toUpperCase()
            === estado
        );
    }

    lista.forEach(j => {

        doc.setFontSize(11);

        doc.text(
`${j.primerNombre} ${j.apellidos} | ${j.cedula} | ${j.estado}`,
        14,
        y
        );

        y += 10;

        if(y > 270){

            doc.addPage();

            y = 20;
        }
    });

    doc.save(
        'jugadores-napoles.pdf'
    );
}

// =====================================
// APROBAR
// =====================================

async function aprobarJugador(
    cedula
){

    const ok =
    confirm(
        '¿Aprobar jugador?'
    );

    if(!ok){
        return;
    }

    try{

        const response =
        await fetch(
`${CONFIG.URL_GAS}?action=aprobarJugador&cedula=${cedula}`
        );

        const data =
        await response.json();

        if(data.ok){

            const mensaje =

`🏆 ¡BIENVENIDO A NÁPOLES F.C! ⚽🔥

Tu registro fue aprobado exitosamente 🙌

📲 Ingresa ahora:
https://kilometro0-ec.github.io/NAPOLES-FC/login.html

✅ Solo usa tu número de cédula.

⚽ Revisa estadísticas
🏅 Mira tus partidos
👕 Gestiona tu perfil

¡Nos vemos campeón! 💪🔥`;

            window.open(
`https://wa.me/593${data.telefono}?text=${encodeURIComponent(mensaje)}`,
'_blank'
            );

            cargarJugadores();
        }

    }catch(err){

        alert(
            'Error aprobando'
        );
    }
}

// =====================================
// RECHAZAR
// =====================================

async function rechazarJugador(
    cedula
){

    const ok =
    confirm(
        '¿Rechazar jugador?'
    );

    if(!ok){
        return;
    }

    try{

        const response =
        await fetch(
`${CONFIG.URL_GAS}?action=rechazarJugador&cedula=${cedula}`
        );

        const data =
        await response.json();

        if(data.ok){

            cargarJugadores();
        }

    }catch(err){

        alert(
            'Error rechazando'
        );
    }
}

// =====================================
// EDITAR
// =====================================

function editarJugador(
    cedula
){

    localStorage.setItem(
        'editCedula',
        cedula
    );

    window.location.href =
    './editar-jugador.html';
}

// =====================================
// EVENTS
// =====================================

searchInput.addEventListener(
'input',
aplicarFiltros
);

estadoFilter.addEventListener(
'change',
aplicarFiltros
);

ordenFilter.addEventListener(
'change',
aplicarFiltros
);

// =====================================
// INIT
// =====================================

cargarJugadores();

</script>

</body>
</html>
