<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Jugadores - Nápoles F.C.</title>

<script src="https://cdn.tailwindcss.com"></script>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
rel="stylesheet">

<link
href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{

    font-family:'Inter',sans-serif;

    background:
    radial-gradient(circle at top,#312e81 0%,#111827 45%,#020617 100%);

    min-height:100vh;

    color:#fff;

    overflow-x:hidden;
}

/* ======================================
SCROLL
====================================== */

::-webkit-scrollbar{
    width:6px;
}

::-webkit-scrollbar-thumb{
    background:#7c3aed;
    border-radius:20px;
}

/* ======================================
TOPBAR
====================================== */

.topbar{

    position:sticky;

    top:0;

    z-index:100;

    backdrop-filter:blur(18px);

    background:rgba(15,23,42,.78);

    border-bottom:
    1px solid rgba(255,255,255,.06);

    padding:18px;
}

.top-content{

    display:flex;

    align-items:center;

    justify-content:space-between;

    gap:12px;
}

.top-left h1{

    font-size:1.3rem;

    font-weight:900;

    letter-spacing:-.5px;
}

.top-left p{

    color:#94a3b8;

    margin-top:4px;

    font-size:.85rem;
}

.top-actions{

    display:flex;

    align-items:center;

    gap:10px;
}

.top-btn{

    width:50px;
    height:50px;

    border:none;

    border-radius:18px;

    background:
    rgba(255,255,255,.08);

    color:#fff;

    cursor:pointer;

    display:flex;

    align-items:center;

    justify-content:center;

    transition:.25s;
}

.top-btn:hover{

    transform:translateY(-2px);

    background:
    rgba(124,58,237,.35);
}

/* ======================================
CARDS
====================================== */

.stats-grid{

    display:grid;

    grid-template-columns:
    repeat(4,1fr);

    gap:12px;

    padding:18px;
}

.stat-card{

    position:relative;

    overflow:hidden;

    border-radius:28px;

    padding:18px;

    cursor:pointer;

    transition:.3s;

    background:
    rgba(255,255,255,.08);

    border:
    1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(14px);
}

.stat-card:hover{

    transform:
    translateY(-4px);
}

.stat-card::before{

    content:'';

    position:absolute;

    width:120px;
    height:120px;

    background:
    rgba(255,255,255,.08);

    border-radius:50%;

    top:-40px;
    right:-40px;
}

.stat-card h3{

    font-size:.82rem;

    color:#cbd5e1;

    margin-bottom:10px;

    position:relative;

    z-index:2;
}

.stat-card p{

    font-size:2rem;

    font-weight:900;

    position:relative;

    z-index:2;
}

.total{
    background:
    linear-gradient(
    135deg,
    #2563eb,
    #1d4ed8
    );
}

.aprobados{
    background:
    linear-gradient(
    135deg,
    #059669,
    #10b981
    );
}

.pendientes{
    background:
    linear-gradient(
    135deg,
    #d97706,
    #f59e0b
    );
}

.rechazados{
    background:
    linear-gradient(
    135deg,
    #dc2626,
    #ef4444
    );
}

/* ======================================
SEARCH
====================================== */

.search-box{

    padding:0 18px 10px;
}

.search{

    height:60px;

    border-radius:24px;

    display:flex;

    align-items:center;

    gap:12px;

    padding:0 18px;

    background:
    rgba(255,255,255,.08);

    border:
    1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(14px);
}

.search input{

    width:100%;

    border:none;

    outline:none;

    background:none;

    color:#fff;

    font-size:1rem;
}

.search input::placeholder{
    color:#94a3b8;
}

/* ======================================
FILTERS
====================================== */

.filters-bar{

    padding:10px 18px 0;

    display:flex;

    justify-content:flex-end;
}

.filter-select{

    height:48px;

    border:none;

    outline:none;

    border-radius:18px;

    padding:0 18px;

    background:
    rgba(255,255,255,.08);

    color:#fff;

    font-weight:700;

    backdrop-filter:blur(12px);
}

.filter-select option{
    color:#000;
}

/* ======================================
PLAYERS
====================================== */

.players{

    padding:18px 18px 120px;

    display:flex;

    flex-direction:column;

    gap:18px;
}

.player-card{

    position:relative;

    overflow:hidden;

    border-radius:32px;

    background:
    rgba(255,255,255,.08);

    border:
    1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(18px);

    padding:18px;

    transition:.3s;
}

.player-card:hover{

    transform:
    translateY(-4px);
}

.player-top{

    display:flex;

    align-items:center;

    justify-content:space-between;

    margin-bottom:16px;
}

/* ======================================
CAMISETA
====================================== */

.jersey{

    width:110px;
    height:120px;

    border-radius:26px;

    background:
    linear-gradient(
    180deg,
    #2563eb,
    #1e40af
    );

    position:relative;

    overflow:hidden;

    display:flex;

    align-items:center;

    justify-content:center;

    flex-direction:column;

    box-shadow:
    0 15px 40px rgba(37,99,235,.35);
}

.jersey::before{

    content:'';

    position:absolute;

    top:-25px;
    left:50%;

    transform:translateX(-50%);

    width:52px;
    height:40px;

    background:#0f172a;

    border-radius:0 0 20px 20px;
}

.player-avatar{

    position:absolute;

    top:8px;
    right:8px;

    width:42px;
    height:42px;

    border-radius:50%;

    border:2px solid rgba(255,255,255,.3);

    overflow:hidden;
}

.player-avatar img{

    width:100%;
    height:100%;

    object-fit:cover;
}

.jersey-number{

    font-size:2rem;

    font-weight:900;

    margin-top:14px;
}

.jersey-name{

    font-size:.72rem;

    font-weight:800;

    text-align:center;

    padding:0 8px;

    margin-top:2px;
}

/* ======================================
INFO
====================================== */

.player-info{

    flex:1;

    padding-left:18px;
}

.player-info h2{

    font-size:1.05rem;

    font-weight:900;

    margin-bottom:6px;
}

.player-info p{

    color:#cbd5e1;

    font-size:.9rem;

    margin-bottom:5px;
}

/* ======================================
ESTADO
====================================== */

.estado{

    display:inline-flex;

    align-items:center;

    justify-content:center;

    height:34px;

    min-width:120px;

    border-radius:999px;

    padding:0 16px;

    font-size:.75rem;

    font-weight:800;

    margin-top:10px;
}

.estado.aprobado{

    background:#dcfce7;

    color:#166534;
}

.estado.pendiente{

    background:#fef3c7;

    color:#92400e;
}

.estado.rechazado{

    background:#fee2e2;

    color:#991b1b;
}

/* ======================================
ACTIONS
====================================== */

.player-actions{

    display:flex;

    gap:10px;

    flex-wrap:wrap;

    margin-top:18px;
}

.action-btn{

    flex:1;

    min-width:90px;

    height:50px;

    border:none;

    border-radius:18px;

    font-weight:800;

    color:#fff;

    cursor:pointer;

    display:flex;

    align-items:center;

    justify-content:center;

    gap:8px;

    transition:.25s;
}

.action-btn:hover{
    transform:translateY(-2px);
}

.edit{
    background:#2563eb;
}

.whatsapp{
    background:#16a34a;
}

.approve{
    background:#059669;
}

.reject{
    background:#dc2626;
}

/* ======================================
RESPONSIVE
====================================== */

@media(max-width:900px){

    .stats-grid{

        grid-template-columns:
        repeat(2,1fr);
    }

    .player-top{

        flex-direction:column;

        align-items:flex-start;
    }

    .player-info{
        padding-left:0;
        padding-top:18px;
    }
}

</style>

</head>

<body>

<!-- ======================================
TOPBAR
====================================== -->

<header class="topbar">

    <div class="top-content">

        <div class="top-left">

            <h1>
                ⚽ Jugadores
            </h1>

            <p>
                Panel administrativo Nápoles F.C.
            </p>

        </div>

        <div class="top-actions">

            <button
            class="top-btn"
            onclick="descargarPDF()">

                <span class="material-symbols-outlined">
                    picture_as_pdf
                </span>

            </button>

            <button
            class="top-btn"
            onclick="cerrarSesion()">

                <span class="material-symbols-outlined">
                    logout
                </span>

            </button>

        </div>

    </div>

</header>

<!-- ======================================
STATS
====================================== -->

<section class="stats-grid">

    <div
    class="stat-card total"
    onclick="filtrarEstado('TODOS')">

        <h3>Total</h3>

        <p id="totalJugadores">
            0
        </p>

    </div>

    <div
    class="stat-card aprobados"
    onclick="filtrarEstado('APROBADO')">

        <h3>Aprobados</h3>

        <p id="totalAprobados">
            0
        </p>

    </div>

    <div
    class="stat-card pendientes"
    onclick="filtrarEstado('PENDIENTE')">

        <h3>Pendientes</h3>

        <p id="totalPendientes">
            0
        </p>

    </div>

    <div
    class="stat-card rechazados"
    onclick="filtrarEstado('RECHAZADO')">

        <h3>Rechazados</h3>

        <p id="totalRechazados">
            0
        </p>

    </div>

</section>

<!-- ======================================
SEARCH
====================================== -->

<section class="search-box">

    <div class="search">

        <span class="material-symbols-outlined">
            search
        </span>

        <input
        type="text"
        id="searchInput"
        placeholder="Buscar jugador...">

    </div>

</section>

<!-- ======================================
FILTER
====================================== -->

<section class="filters-bar">

    <select
    id="filterSelect"
    class="filter-select">

        <option value="TODOS">
            Todos
        </option>

        <option value="APROBADO">
            Aprobados
        </option>

        <option value="PENDIENTE">
            Pendientes
        </option>

        <option value="RECHAZADO">
            Rechazados
        </option>

    </select>

</section>

<!-- ======================================
PLAYERS
====================================== -->

<section
class="players"
id="playersContainer">

    <p>
        Cargando jugadores...
    </p>

</section>

<script src="./config.js"></script>

<script>

// ======================================
// VALIDAR ADMIN
// ======================================

if(
    localStorage.getItem(
        'admin_activo'
    ) !== 'true'
){
    window.location.href =
    './login.html';
}

// ======================================
// VARIABLES
// ======================================

const playersContainer =
document.getElementById(
    'playersContainer'
);

const searchInput =
document.getElementById(
    'searchInput'
);

const filterSelect =
document.getElementById(
    'filterSelect'
);

let jugadoresGlobal = [];

let estadoActual = 'TODOS';

// ======================================
// AVATARES FUTBOLISTAS
// ======================================

const avatars = [

'https://randomuser.me/api/portraits/men/11.jpg',
'https://randomuser.me/api/portraits/men/32.jpg',
'https://randomuser.me/api/portraits/men/45.jpg',
'https://randomuser.me/api/portraits/men/52.jpg',
'https://randomuser.me/api/portraits/men/65.jpg',
'https://randomuser.me/api/portraits/men/77.jpg',
'https://randomuser.me/api/portraits/men/81.jpg',
'https://randomuser.me/api/portraits/men/90.jpg'

];

// ======================================
// CARGAR
// ======================================

async function cargarJugadores(){

    try{

        const response =
        await fetch(
`${CONFIG.URL_GAS}?action=getJugadores&t=${Date.now()}`
        );

        const data =
        await response.json();

        jugadoresGlobal =
        (data.jugadores || [])

        .sort((a,b) =>

            Number(b.dorsal || 0)

            -

            Number(a.dorsal || 0)
        );

        actualizarCards();

        aplicarFiltros();

    }catch(err){

        playersContainer.innerHTML =
        '<p>Error conexión</p>';
    }
}

// ======================================
// STATS
// ======================================

function actualizarCards(){

    document.getElementById(
        'totalJugadores'
    ).innerText =
    jugadoresGlobal.length;

    document.getElementById(
        'totalAprobados'
    ).innerText =

    jugadoresGlobal.filter(j =>

        (j.estado || '')
        .toUpperCase()
        === 'APROBADO'

    ).length;

    document.getElementById(
        'totalPendientes'
    ).innerText =

    jugadoresGlobal.filter(j =>

        (j.estado || '')
        .toUpperCase()
        === 'PENDIENTE'

    ).length;

    document.getElementById(
        'totalRechazados'
    ).innerText =

    jugadoresGlobal.filter(j =>

        (j.estado || '')
        .toUpperCase()
        === 'RECHAZADO'

    ).length;
}

// ======================================
// RENDER
// ======================================

function renderJugadores(lista){

    playersContainer.innerHTML = '';

    if(lista.length === 0){

        playersContainer.innerHTML =
        `
        <p style="
        text-align:center;
        color:#cbd5e1;
        padding:40px;">
        No hay jugadores
        </p>
        `;

        return;
    }

    lista.forEach((jugador,index) => {

        let estadoClass =
        'pendiente';

        if(
            jugador.estado ===
            'APROBADO'
        ){
            estadoClass =
            'aprobado';
        }

        if(
            jugador.estado ===
            'RECHAZADO'
        ){
            estadoClass =
            'rechazado';
        }

        const avatar =
        avatars[
            index % avatars.length
        ];

        const card =
        document.createElement('div');

        card.className =
        'player-card';

        card.innerHTML = `

        <div class="player-top">

            <div class="jersey">

                <div class="player-avatar">

                    <img src="${avatar}">

                </div>

                <div class="jersey-number">

                    ${jugador.dorsal || '--'}

                </div>

                <div class="jersey-name">

                    ${
                        jugador.nombreCamiseta
                        || 'NAPOLES'
                    }

                </div>

            </div>

            <div class="player-info">

                <h2>
                    ${jugador.primerNombre || ''}
                    ${jugador.segundoNombre || ''}
                    ${jugador.apellidos || ''}
                </h2>

                <p>
                    🪪 ${jugador.cedula || '-'}
                </p>

                <p>
                    📞 ${jugador.telefono || '-'}
                </p>

                <p>
                    🎂 ${jugador.edad || '-'} años
                </p>

                <div
                class="estado ${estadoClass}">

                    ${
                        jugador.estado
                        || 'PENDIENTE'
                    }

                </div>

            </div>

        </div>

        <div class="player-actions">

            <button
            class="action-btn whatsapp"
            onclick="enviarWhatsapp('${jugador.telefono}')">

                <span class="material-symbols-outlined">
                    chat
                </span>

                WhatsApp

            </button>

            <button
            class="action-btn edit"
            onclick="editarJugador('${jugador.cedula}')">

                <span class="material-symbols-outlined">
                    edit
                </span>

                Editar

            </button>

            ${
                jugador.estado !==
                'APROBADO'
                ?
                `
                <button
                class="action-btn approve"
                onclick="aprobarJugador('${jugador.cedula}')">

                    <span class="material-symbols-outlined">
                        check
                    </span>

                    Aprobar

                </button>
                `
                :
                ''
            }

            ${
                jugador.estado !==
                'RECHAZADO'
                ?
                `
                <button
                class="action-btn reject"
                onclick="rechazarJugador('${jugador.cedula}')">

                    <span class="material-symbols-outlined">
                        close
                    </span>

                    Rechazar

                </button>
                `
                :
                ''
            }

        </div>
        `;

        playersContainer.appendChild(card);

    });
}

// ======================================
// FILTROS
// ======================================

function aplicarFiltros(){

    const texto =
    searchInput.value
    .toLowerCase()
    .trim();

    let lista =
    [...jugadoresGlobal];

    if(estadoActual !== 'TODOS'){

        lista =
        lista.filter(j =>

            (j.estado || '')
            .toUpperCase()

            ===

            estadoActual
        );
    }

    lista =
    lista.filter(j => {

        return (

            (j.primerNombre || '')
            .toLowerCase()
            .includes(texto)

            ||

            (j.apellidos || '')
            .toLowerCase()
            .includes(texto)

            ||

            (j.nombreCamiseta || '')
            .toLowerCase()
            .includes(texto)

            ||

            (j.cedula || '')
            .includes(texto)

            ||

            String(
                j.dorsal || ''
            ).includes(texto)
        );
    });

    renderJugadores(lista);
}

function filtrarEstado(estado){

    estadoActual = estado;

    filterSelect.value =
    estado;

    aplicarFiltros();
}

filterSelect.addEventListener(
'change',
e => {

    estadoActual =
    e.target.value;

    aplicarFiltros();
});

searchInput.addEventListener(
'input',
aplicarFiltros
);

// ======================================
// APROBAR
// ======================================

async function aprobarJugador(
    cedula
){

    const ok =
    confirm(
        '¿Aprobar jugador?'
    );

    if(!ok){
        return;
    }

    try{

        const response =
        await fetch(
`${CONFIG.URL_GAS}?action=aprobarJugador&cedula=${cedula}`
        );

        const data =
        await response.json();

        if(data.ok){

            const mensaje =

`🏆 *¡BIENVENIDO A NÁPOLES F.C.!* ⚽🔥

Tu registro fue aprobado exitosamente 🙌

Ya eres parte oficial del club 💙

📲 Ingresa ahora a tu panel:
https://kilometro0-ec.github.io/NAPOLES-FC/login.html

✅ Solo debes ingresar tu número de cédula.

⚽ Mira tus estadísticas
🏅 Consulta tus partidos
👕 Revisa tu perfil

¡Nos vemos en la cancha campeón! 💪🔥`;

            window.open(
`https://wa.me/593${data.telefono}?text=${encodeURIComponent(mensaje)}`,
'_blank'
            );

            cargarJugadores();
        }

    }catch(err){

        alert(
            'Error aprobando'
        );
    }
}

// ======================================
// RECHAZAR
// ======================================

async function rechazarJugador(
    cedula
){

    const ok =
    confirm(
        '¿Rechazar jugador?'
    );

    if(!ok){
        return;
    }

    try{

        const response =
        await fetch(
`${CONFIG.URL_GAS}?action=rechazarJugador&cedula=${cedula}`
        );

        const data =
        await response.json();

        if(data.ok){

            cargarJugadores();
        }

    }catch(err){

        alert(
            'Error rechazando'
        );
    }
}

// ======================================
// EDITAR
// ======================================

function editarJugador(
    cedula
){

    localStorage.setItem(
        'editCedula',
        cedula
    );

    window.location.href =
    './editar-jugador.html';
}

// ======================================
// WHATSAPP
// ======================================

function enviarWhatsapp(
    telefono
){

    if(!telefono){
        return;
    }

    telefono =
    telefono.replace(/\D/g,'');

    window.open(
`https://wa.me/593${telefono}`,
'_blank'
    );
}

// ======================================
// PDF
// ======================================

function descargarPDF(){

    window.print();
}

// ======================================
// LOGOUT
// ======================================

function cerrarSesion(){

    localStorage.removeItem(
        'admin_activo'
    );

    window.location.href =
    './login.html';
}

// ======================================
// INIT
// ======================================

cargarJugadores();

</script>

</body>

</html>
