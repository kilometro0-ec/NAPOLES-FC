<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Estadísticas - Nápoles F.C.</title>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<link
href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{

    font-family:'Inter',sans-serif;

    background:#f3f6fb;

    color:#111827;

    min-height:100vh;

    overflow-x:hidden;
}

/* =========================================
HEADER
========================================= */

.topbar{

    position:sticky;

    top:0;

    z-index:100;

    background:rgba(255,255,255,.92);

    backdrop-filter:blur(14px);

    border-bottom:1px solid #e5e7eb;

    padding:16px 18px;

    display:flex;

    align-items:center;

    justify-content:space-between;
}

.top-left{

    display:flex;

    align-items:center;

    gap:14px;
}

.admin-info h1{

    font-size:1.1rem;

    font-weight:800;
}

.admin-info p{

    font-size:.85rem;

    color:#6b7280;

    margin-top:2px;
}

.avatar{

    width:46px;
    height:46px;

    border-radius:16px;

    background:linear-gradient(
    135deg,
    #db2777,
    #f472b6
    );

    display:flex;

    align-items:center;

    justify-content:center;

    color:#fff;

    font-weight:800;

    font-size:1rem;
}

/* =========================================
SUMMARY
========================================= */

.summary{

    padding:20px 18px 10px;

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:14px;
}

.summary-card{

    background:#fff;

    border-radius:24px;

    padding:20px;

    box-shadow:
    0 10px 30px rgba(15,23,42,.05);
}

.summary-card h3{

    font-size:1.8rem;

    font-weight:900;

    margin-bottom:6px;

    color:#db2777;
}

.summary-card p{

    color:#6b7280;

    font-size:.88rem;
}

/* =========================================
TOP PLAYERS
========================================= */

.players{

    padding:14px 18px 40px;
}

.section-title{

    font-size:1rem;

    font-weight:800;

    margin-bottom:14px;
}

.player-card{

    background:#fff;

    border-radius:24px;

    padding:18px;

    margin-bottom:16px;

    display:flex;

    align-items:center;

    justify-content:space-between;

    box-shadow:
    0 10px 30px rgba(15,23,42,.05);
}

.player-left{

    display:flex;

    align-items:center;

    gap:14px;
}

.player-avatar{

    width:60px;
    height:60px;

    border-radius:18px;

    background:linear-gradient(
    135deg,
    #db2777,
    #f472b6
    );

    display:flex;

    align-items:center;

    justify-content:center;

    color:#fff;

    font-size:1rem;

    font-weight:800;
}

.player-info h3{

    font-size:1rem;

    font-weight:800;

    margin-bottom:4px;
}

.player-info p{

    color:#6b7280;

    font-size:.86rem;
}

.player-stats{

    text-align:right;
}

.player-stats h4{

    font-size:1.4rem;

    font-weight:900;

    color:#db2777;
}

.player-stats p{

    color:#6b7280;

    font-size:.82rem;
}

/* =========================================
CHART
========================================= */

.chart-card{

    background:#fff;

    border-radius:24px;

    padding:22px;

    margin-bottom:18px;

    box-shadow:
    0 10px 30px rgba(15,23,42,.05);
}

.chart-bars{

    display:flex;

    align-items:flex-end;

    justify-content:space-between;

    height:180px;

    margin-top:20px;
}

.bar{

    width:18%;

    background:linear-gradient(
    180deg,
    #f472b6,
    #db2777
    );

    border-radius:14px 14px 6px 6px;

    position:relative;
}

.bar span{

    position:absolute;

    bottom:-28px;

    left:50%;

    transform:translateX(-50%);

    font-size:.78rem;

    color:#6b7280;

    font-weight:700;
}

/* =========================================
RESPONSIVE
========================================= */

@media(min-width:700px){

    .summary,
    .players{
        max-width:700px;
        margin:auto;
    }
}

</style>

</head>

<body>

<!-- ======================================
TOPBAR
====================================== -->

<header class="topbar">

    <div class="top-left">

        <div class="admin-info">

            <h1>Estadísticas</h1>

            <p>Nápoles F.C.</p>

        </div>

    </div>

    <div class="avatar">
        E
    </div>

</header>

<!-- ======================================
SUMMARY
====================================== -->

<section class="summary">

    <div class="summary-card">

        <h3>28</h3>

        <p>Goles Totales</p>

    </div>

    <div class="summary-card">

        <h3>11</h3>

        <p>Partidos Jugados</p>

    </div>

    <div class="summary-card">

        <h3>8</h3>

        <p>Victorias</p>

    </div>

    <div class="summary-card">

        <h3>3</h3>

        <p>Empates</p>

    </div>

</section>

<!-- ======================================
PLAYERS
====================================== -->

<section class="players">

    <h2 class="section-title">
        Máximos Goleadores
    </h2>

    <!-- PLAYER -->

    <div class="player-card">

        <div class="player-left">

            <div class="player-avatar">
                CR
            </div>

            <div class="player-info">

                <h3>Cristian Ruiz</h3>

                <p>Delantero</p>

            </div>

        </div>

        <div class="player-stats">

            <h4>12</h4>

            <p>Goles</p>

        </div>

    </div>

    <!-- PLAYER -->

    <div class="player-card">

        <div class="player-left">

            <div class="player-avatar">
                LM
            </div>

            <div class="player-info">

                <h3>Luis Mendoza</h3>

                <p>Mediocampista</p>

            </div>

        </div>

        <div class="player-stats">

            <h4>8</h4>

            <p>Asistencias</p>

        </div>

    </div>

    <!-- PLAYER -->

    <div class="player-card">

        <div class="player-left">

            <div class="player-avatar">
                AG
            </div>

            <div class="player-info">

                <h3>Andrés Gómez</h3>

                <p>Portero</p>

            </div>

        </div>

        <div class="player-stats">

            <h4>5</h4>

            <p>Atajadas</p>

        </div>

    </div>

    <!-- CHART -->

    <div class="chart-card">

        <h2 class="section-title">
            Rendimiento Mensual
        </h2>

        <div class="chart-bars">

            <div
            class="bar"
            style="height:60%;">

                <span>Ene</span>

            </div>

            <div
            class="bar"
            style="height:85%;">

                <span>Feb</span>

            </div>

            <div
            class="bar"
            style="height:40%;">

                <span>Mar</span>

            </div>

            <div
            class="bar"
            style="height:95%;">

                <span>Abr</span>

            </div>

            <div
            class="bar"
            style="height:75%;">

                <span>May</span>

            </div>

        </div>

    </div>

</section>

<script>

// =========================================
// VALIDAR ADMIN
// =========================================

if(
    localStorage.getItem('admin_activo')
    !== 'true'
){
    window.location.href = './login.html';
}

</script>

</body>
</html>
