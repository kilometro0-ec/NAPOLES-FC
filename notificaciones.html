<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nápoles F.C. - Control de Asistencia</title>

<style>

:root{
  --primary-dark:#111111;
  --accent-gold:#d4af37;
  --sport-green:#2ecc71;
  --sport-amber:#f39c12;
  --sport-red:#e74c3c;
  --card-bg:#1a1a1a;
  --text-light:#ffffff;
  --text-muted:#aaaaaa;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#0b0b0b;
  color:var(--text-light);
  font-family:'Segoe UI',Roboto,Arial,sans-serif;
  min-height:100vh;
  padding:20px;
}

.inauguracion-container{
  width:100%;
  max-width:700px;
  margin:auto;
}

.alerta-notificacion-sport{
  background:rgba(243,156,18,.1);
  border:1px solid rgba(243,156,18,.25);
  border-left:4px solid var(--sport-amber);
  padding:14px;
  border-radius:12px;
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:18px;
  transition:.3s;
}

.alerta-notificacion-sport.completado{
  background:rgba(46,204,113,.1);
  border-left:4px solid var(--sport-green);
}

.alerta-icon{
  font-size:22px;
}

.alerta-cuerpo{
  font-size:13px;
  line-height:1.5;
}

.alerta-titulo{
  color:var(--accent-gold);
  font-weight:700;
}

.asistencia-card{
  background:var(--card-bg);
  border:1px solid #262626;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 10px 40px rgba(0,0,0,.5);
}

.card-header-sport{
  background:linear-gradient(135deg,#111 0%,#222 100%);
  padding:24px;
  text-align:center;
  border-bottom:2px solid var(--accent-gold);
}

.sport-badge{
  display:inline-block;
  background:rgba(212,175,55,.12);
  border:1px solid rgba(212,175,55,.25);
  color:var(--accent-gold);
  font-size:11px;
  font-weight:700;
  padding:5px 12px;
  border-radius:20px;
  margin-bottom:10px;
}

.card-header-sport h3{
  font-size:24px;
  margin-bottom:6px;
}

.sub-date{
  color:var(--text-muted);
  font-size:13px;
}

.card-body-metrics{
  padding:22px;
}

.metric-featured{
  background:rgba(255,255,255,.02);
  border:1px solid #2a2a2a;
  border-radius:14px;
  padding:24px;
  text-align:center;
  margin-bottom:18px;
}

.metric-label{
  font-size:11px;
  letter-spacing:.5px;
  color:var(--text-muted);
  font-weight:600;
}

.metric-featured h1{
  font-size:60px;
  margin:10px 0;
  line-height:1;
}

.metric-desc{
  color:var(--text-muted);
  font-size:12px;
}

.metrics-grid-split{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.metric-box{
  background:#1f1f1f;
  border:1px solid #2c2c2c;
  border-radius:12px;
  padding:16px;
  display:flex;
  align-items:center;
  gap:12px;
}

.box-green{
  border-left:4px solid var(--sport-green);
}

.box-amber{
  border-left:4px solid var(--sport-amber);
}

.icon-wrap{
  font-size:24px;
}

.box-qty{
  font-size:24px;
  font-weight:700;
}

.box-label{
  font-size:12px;
  color:var(--text-muted);
}

.cuadro-multa-club{
  margin:0 22px 22px 22px;
  padding:22px;
  background:#141414;
  border:1px dashed #333;
  border-radius:14px;
  text-align:center;
}

.m-monto-total{
  display:block;
  font-size:34px;
  font-weight:800;
  color:var(--sport-red);
  margin-bottom:8px;
}

.m-label-total{
  font-size:12px;
  color:var(--text-muted);
  line-height:1.7;
}

.progress-container-club{
  padding:0 22px 26px 22px;
}

.progress-labels{
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
  font-size:12px;
  color:var(--text-muted);
}

.progress-bar-bg{
  height:8px;
  background:#222;
  border-radius:5px;
  overflow:hidden;
}

.progress-bar-fill{
  height:100%;
  width:0%;
  background:linear-gradient(
    90deg,
    var(--accent-gold) 0%,
    var(--sport-green) 100%
  );
  transition:.6s;
}

.lista-confirmados{
  padding:22px;
  border-top:1px solid #222;
}

.lista-confirmados h4{
  margin-bottom:14px;
  color:var(--accent-gold);
}

.jugador-row{
  background:#181818;
  border:1px solid #262626;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.estado-ok{
  color:var(--sport-green);
  font-size:12px;
  font-weight:700;
}

.estado-rep{
  color:var(--sport-amber);
  font-size:12px;
  font-weight:700;
}

.loading-pulse{
  animation:pulse 1.8s infinite;
}

@keyframes pulse{
  0%{opacity:.5;}
  50%{opacity:1;}
  100%{opacity:.5;}
}

</style>
</head>

<body>

<div class="inauguracion-container">

<div id="notificacion-resumen"
class="alerta-notificacion-sport loading-pulse">

<span class="alerta-icon">⏳</span>

<div class="alerta-cuerpo">
<strong class="alerta-titulo">Sincronizando:</strong>
<span id="txt-alerta-mensaje">
Conectando con Google Sheets...
</span>
</div>

</div>

<div class="asistencia-card">

<div class="card-header-sport">

<div class="sport-badge">
📌 CONTROL OFICIAL
</div>

<h3>Inauguración Nápoles F.C.</h3>

<p class="sub-date">
Sistema en Tiempo Real
</p>

</div>

<div class="card-body-metrics">

<div class="metric-featured">

<span class="metric-label">
TOTAL RESPUESTAS
</span>

<h1 id="txt-total-global">0</h1>

<p class="metric-desc">
Jugadores confirmados
</p>

</div>

<div class="metrics-grid-split">

<div class="metric-box box-green">

<div class="icon-wrap">🏃</div>

<div>
<div class="box-qty" id="txt-van-jugadores">0</div>
<div class="box-label">Asisten</div>
</div>

</div>

<div class="metric-box box-amber">

<div class="icon-wrap">🤝</div>

<div>
<div class="box-qty" id="txt-van-delegados">0</div>
<div class="box-label">Representantes</div>
</div>

</div>

</div>

</div>

<div class="cuadro-multa-club">

<span class="m-monto-total"
id="txt-saldo-multa-club">$0.00</span>

<span class="m-label-total">
Calculando multas...
</span>

</div>

<div class="progress-container-club">

<div class="progress-labels">

<span>Progreso General</span>

<span id="txt-porcentaje-progreso">0%</span>

</div>

<div class="progress-bar-bg">

<div id="bar-progreso-llenado"
class="progress-bar-fill"></div>

</div>

</div>

<div class="lista-confirmados">

<h4>Jugadores Confirmados</h4>

<div id="listaJugadores"></div>

</div>

</div>

</div>

<script src="config.js"></script>

<script>

const API_URL = CONFIG.URL_GAS;

/*
========================================
TOTAL REAL DE JUGADORES
========================================
*/

const TOTAL_PLANTILLA = 22;

window.addEventListener(
"DOMContentLoaded",
() => {

  cargarDatosInauguracion();

  /*
  AUTO REFRESH
  */

  setInterval(() => {
    cargarDatosInauguracion();
  }, 30000);

}
);

async function cargarDatosInauguracion(){

try{

const response =
await fetch(
`${API_URL}?action=getConfirmadosInauguracion&nocache=${Date.now()}`
);

const data = await response.json();

console.log(data);

if(data.success){

actualizarInterfazDashboard(data);

}else{

mostrarErrorUI(
data.message || "Error"
);

}

}catch(error){

console.error(error);

mostrarErrorUI(
"No se pudo conectar con Apps Script"
);

}

}

function actualizarInterfazDashboard(json){

const resumen = json.conteo || {};

const totalGlobal = resumen.total || 0;
const totalAsisten = resumen.asistiran || 0;
const totalRepresentantes = resumen.representante || 0;

/*
========================================
CONTADORES
========================================
*/

document.getElementById(
"txt-total-global"
).innerText = totalGlobal;

document.getElementById(
"txt-van-jugadores"
).innerText = totalAsisten;

document.getElementById(
"txt-van-delegados"
).innerText = totalRepresentantes;

/*
========================================
JUGADORES FALTANTES
========================================
*/

const sinResponder =
Math.max(
TOTAL_PLANTILLA - totalGlobal,
0
);

/*
========================================
MULTA BASE
22 jugadores x $10
========================================
*/

const multaBase =
TOTAL_PLANTILLA * 10;

/*
========================================
DESCUENTO
Cada confirmación reduce $2
========================================
*/

const descuentoConfirmados =
totalGlobal * 2;

/*
========================================
MULTA ACTUAL
========================================
*/

const multaActual =
Math.max(
multaBase - descuentoConfirmados,
0
);

/*
========================================
MULTA POR JUGADOR
========================================
*/

const multaPorFaltar =
sinResponder > 0
? (multaActual / sinResponder)
: 0;

/*
========================================
MOSTRAR TOTAL
========================================
*/

document.getElementById(
"txt-saldo-multa-club"
).innerText =
"$" + multaActual.toFixed(2);

/*
========================================
DETALLE ABAJO
========================================
*/

document.querySelector(
".m-label-total"
).innerHTML =
`
Faltan <strong>${sinResponder}</strong> jugadores por responder
<br><br>

Valor de la multa a pagar dividido para los jugadores que faltaron a la inauguración:

<br><br>

<strong style="
color:#e74c3c;
font-size:16px;">
$${multaPorFaltar.toFixed(2)}
</strong>
`;

/*
========================================
PROGRESO
========================================
*/

const porcentaje =
Math.min(
Math.round(
(totalGlobal / TOTAL_PLANTILLA) * 100
),
100
);

document.getElementById(
"txt-porcentaje-progreso"
).innerText =
porcentaje + "%";

document.getElementById(
"bar-progreso-llenado"
).style.width =
porcentaje + "%";

/*
========================================
ALERTA SUPERIOR
========================================
*/

const notifBox =
document.getElementById(
"notificacion-resumen"
);

notifBox.classList.remove(
"loading-pulse"
);

const alertaTxt =
document.getElementById(
"txt-alerta-mensaje"
);

if(sinResponder > 0){

notifBox.classList.remove(
"completado"
);

notifBox.querySelector(
".alerta-icon"
).innerText = "📢";

alertaTxt.innerHTML =
`Faltan <strong>${sinResponder}</strong> jugadores por responder.`;

}else{

notifBox.classList.add(
"completado"
);

notifBox.querySelector(
".alerta-icon"
).innerText = "✅";

alertaTxt.innerHTML =
`<strong>Todos confirmaron asistencia.</strong>`;

}

renderizarJugadores(
json.jugadores || []
);

}

function renderizarJugadores(lista){

const contenedor =
document.getElementById(
"listaJugadores"
);

if(lista.length === 0){

contenedor.innerHTML =
`
<div style="
text-align:center;
padding:20px;
color:#888;">
No existen respuestas aún
</div>
`;

return;

}

contenedor.innerHTML =
lista.map(j => {

const estado =
j.respuesta.includes("Representante")
?
`<span class="estado-rep">REPRESENTANTE</span>`
:
`<span class="estado-ok">CONFIRMADO</span>`;

return `
<div class="jugador-row">

<div>
<div style="font-weight:700;">
${j.nombre}
</div>

<div style="
font-size:12px;
color:#888;">
${j.categoria}
</div>
</div>

${estado}

</div>
`;

}).join("");

}

function mostrarErrorUI(mensaje){

const notifBox =
document.getElementById(
"notificacion-resumen"
);

notifBox.classList.remove(
"loading-pulse"
);

notifBox.style.background =
"rgba(231,76,60,.1)";

notifBox.style.borderLeft =
"4px solid #e74c3c";

notifBox.querySelector(
".alerta-icon"
).innerText = "❌";

document.getElementById(
"txt-alerta-mensaje"
).innerText = mensaje;

}

</script>

</body>
</html>
