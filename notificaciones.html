<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Nápoles F.C. - Sistema de Control Integrado</title>
    <!-- Google Fonts & Font Awesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #0d47a1;
            --primary-dark: #002171;
            --secondary-color: #ffb300;
            --accent-danger: #d32f2f;
            --accent-success: #388e3c;
            --text-dark: #212121;
            --bg-light: #f5f5f5;
            --card-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            padding-bottom: 30px;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 24px;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        header p {
            font-size: 14px;
            color: #bbdefb;
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 15px;
        }

        /* PANEL DE NOTICIAS SUPER MINIMIZADO */
        .noticias-mini-panel {
            background: linear-gradient(135deg, #fffde7, #fff9c4);
            border-left: 5px solid var(--secondary-color);
            border-radius: 8px;
            padding: 12px 15px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .noticias-mini-panel .icon-box {
            background-color: var(--secondary-color);
            color: var(--primary-dark);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .noticias-content {
            flex-grow: 1;
        }

        .noticias-content h4 {
            font-size: 13px;
            text-transform: uppercase;
            color: #7f6d00;
            margin-bottom: 2px;
            font-weight: 700;
        }

        .noticias-content .multa-texto {
            font-size: 14px;
            font-weight: bold;
            color: var(--accent-danger);
            margin-bottom: 3px;
        }

        .noticias-content .mensaje-club {
            font-size: 13px;
            font-style: italic;
            color: #424242;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        .card h2 {
            font-size: 20px;
            color: var(--primary-color);
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* Animación de carga solicitada */
        .loading-box {
            display: none; /* Se controla desde config.js */
            text-align: center;
            padding: 20px;
            color: var(--primary-color);
        }

        .spinner {
            border: 4px solid rgba(0,0,0,0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: var(--primary-color);
            animation: spin 1s linear infinite;
            margin: 0 auto 10px auto;
        }

        .table-responsive {
            overflow-x: auto;
            margin-top: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        th {
            background-color: #f5f5f5;
        }

        .resumen-asistencias {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .resumen-box {
            background-color: #f8f9fa;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
        }

        .resumen-box span {
            display: block;
            font-size: 18px;
            font-weight: bold;
            color: var(--primary-color);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .resumen-asistencias { grid-template-columns: 1fr; }
            .noticias-mini-panel { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

    <header>
        <h1>NÁPOLES F.C.</h1>
        <p>Panel de Control Integrado</p>
    </header>

    <div class="container">

        <!-- COMPONENTE: MINIPANEL DE NOTICIAS ASIGNADO DESDE CONFIG.JS -->
        <div class="noticias-mini-panel" id="panelNoticias">
            <div class="icon-box">
                <i class="fa-solid fa-bullhorn"></i>
            </div>
            <div class="noticias-content">
                <h4>📢 NOTICIA PARA JUGADORES</h4>
                <div class="multa-texto" id="txtMulta">
                    Cargando multas aproximadas...
                </div>
                <div class="mensaje-club" id="txtMensajeClub">
                    Cargando mensaje del equipo...
                </div>
            </div>
        </div>

        <!-- PORTAL DE ACCESO -->
        <div class="card" id="vistaLogin">
            <h2><i class="fa-solid fa-id-card"></i> Portal de Jugadores</h2>
            <div class="form-group">
                <label for="cedulaInput">Número de Cédula:</label>
                <input type="text" id="cedulaInput" class="form-control" placeholder="Ej: 1726XXXXXX">
            </div>
            <!-- Llama a la función de tu config.js -->
            <button class="btn" onclick="buscarJugador()">
                <i class="fa-solid fa-magnifying-glass"></i> Consultar Ficha
            </button>
        </div>

        <!-- PANEL DE ANIMACIÓN DE CARGA HASTA QUE LA INFORMACIÓN ESTÉ LISTA -->
        <div class="loading-box" id="loader">
            <div class="spinner"></div>
            <p id="loaderTexto">Buscando información...</p>
        </div>

        <!-- TABLA GENERAL DE ASISTENCIAS -->
        <div class="card" id="vistaConfirmados">
            <h2><i class="fa-solid fa-users-check"></i> Confirmados Inauguración</h2>
            
            <div class="resumen-asistencias">
                <div class="resumen-box">
                    <span id="numTotal">0</span>
                    <label>Respuestas</label>
                </div>
                <div class="resumen-box">
                    <span id="numAsistiran" style="color: var(--accent-success);">0</span>
                    <label>Asistirán</label>
                </div>
                <div class="resumen-box">
                    <span id="numRepresentante" style="color: var(--secondary-color);">0</span>
                    <label>Representantes</label>
                </div>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Jugador / Deportista</th>
                            <th>Categoría</th>
                            <th>Estado Asistencia</th>
                        </tr>
                    </thead>
                    <tbody id="tablaConfirmadosBody">
                        <!-- Se llena desde tu config.js -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- ENLACE CORRECTO A TU ARCHIVO DE CONFIGURACIÓN EN LA RAÍZ -->
    <script src="config.js"></script>
</body>
</html>
