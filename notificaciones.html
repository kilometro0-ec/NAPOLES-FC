<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Notificaciones - Nápoles F.C.</title>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<link
href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{

    font-family:'Inter',sans-serif;

    background:
    linear-gradient(
    180deg,
    #ffffff 0%,
    #f7f7ff 45%,
    #f3f4f6 100%
    );

    color:#111827;

    min-height:100vh;

    padding-bottom:120px;
}

/* ====================================
HEADER
==================================== */

.topbar{

    position:sticky;

    top:0;

    z-index:100;

    background:rgba(255,255,255,.85);

    backdrop-filter:blur(12px);

    padding:18px;

    border-bottom:
    1px solid rgba(0,0,0,.05);

    display:flex;

    align-items:center;

    justify-content:space-between;
}

.topbar h1{

    font-size:1.1rem;

    font-weight:800;
}

.back-btn{

    width:42px;
    height:42px;

    border-radius:14px;

    border:none;

    background:#eef2ff;

    display:flex;

    align-items:center;

    justify-content:center;

    cursor:pointer;
}

/* ====================================
CONTENIDO
==================================== */

.container{

    padding:18px;
}

.card{

    background:#fff;

    border-radius:26px;

    padding:20px;

    box-shadow:
    0 10px 30px rgba(0,0,0,.05);

    border:1px solid rgba(0,0,0,.04);
}

.card h2{

    font-size:1.1rem;

    margin-bottom:18px;

    font-weight:800;
}

.input-group{

    margin-bottom:16px;
}

.input-group label{

    display:block;

    font-size:.88rem;

    margin-bottom:8px;

    color:#4b5563;

    font-weight:600;
}

.input-group input,
.input-group textarea{

    width:100%;

    border:none;

    background:#f3f4f6;

    border-radius:18px;

    padding:16px;

    font-size:.95rem;

    font-family:'Inter',sans-serif;

    outline:none;
}

textarea{

    resize:none;

    min-height:140px;
}

.btn{

    width:100%;

    border:none;

    border-radius:18px;

    padding:18px;

    background:
    linear-gradient(
    135deg,
    #0891b2,
    #06b6d4
    );

    color:#fff;

    font-size:1rem;

    font-weight:800;

    cursor:pointer;

    transition:.2s;
}

.btn:active{
    transform:scale(.98);
}

.estado{

    margin-top:16px;

    text-align:center;

    font-size:.92rem;

    font-weight:700;
}

.ok{
    color:#16a34a;
}

.error{
    color:#dc2626;
}

</style>

</head>

<body>

<header class="topbar">

    <button
    class="back-btn"
    onclick="history.back()">

        <span class="material-symbols-outlined">
            arrow_back
        </span>

    </button>

    <h1>Crear Notificación</h1>

    <div style="width:42px"></div>

</header>

<div class="container">

    <div class="card">

        <h2>
            Nueva noticia para jugadores
        </h2>

        <div class="input-group">

            <label>
                Título
            </label>

            <input
            type="text"
            id="titulo"
            placeholder="Ej: Entrenamiento viernes">

        </div>

        <div class="input-group">

            <label>
                Descripción
            </label>

            <textarea
            id="mensaje"
            placeholder="Escribe la noticia o anuncio..."></textarea>

        </div>

        <button
        class="btn"
        onclick="guardarNotificacion()">

            Publicar noticia

        </button>

        <div
        id="estado"
        class="estado"></div>

    </div>

</div>

<script>

/* ====================================
CONFIG
==================================== */

const SCRIPT_URL =
'https://script.google.com/macros/s/TU_SCRIPT_ID/exec';

/* ====================================
GUARDAR
==================================== */

async function guardarNotificacion(){

    const titulo =
    document.getElementById('titulo').value.trim();

    const mensaje =
    document.getElementById('mensaje').value.trim();

    const estado =
    document.getElementById('estado');

    if(!titulo || !mensaje){

        estado.innerHTML =
        'Completa todos los campos';

        estado.className =
        'estado error';

        return;
    }

    estado.innerHTML =
    'Publicando noticia...';

    estado.className =
    'estado';

    try{

        const response =
        await fetch(SCRIPT_URL,{

            method:'POST',

            body:JSON.stringify({

                accion:'crearNotificacion',

                titulo:titulo,

                mensaje:mensaje

            })

        });

        const data =
        await response.json();

        if(data.success){

            estado.innerHTML =
            '✅ Notificación publicada';

            estado.className =
            'estado ok';

            document.getElementById('titulo').value = '';

            document.getElementById('mensaje').value = '';

        }else{

            estado.innerHTML =
            'Error al guardar';

            estado.className =
            'estado error';
        }

    }catch(error){

        estado.innerHTML =
        'Error de conexión';

        estado.className =
        'estado error';

        console.error(error);
    }
}

</script>

</body>
</html>
